                bindAdminPanelEvents() {
                    const modalOverlay = document.getElementById('adminPanelOverlay');
                    document.getElementById('closeAdminPanel').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });
                    modalOverlay.addEventListener('click', (e) => {
                        if (e.target === modalOverlay) modalOverlay.classList.remove('open');
                    });

                    const adminTabs = document.querySelectorAll('[data-admin-tab]');
                    adminTabs.forEach(tab => {
                        tab.addEventListener('click', () => {
                            adminTabs.forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');
                            const tabName = tab.dataset.adminTab;
                            
                            document.getElementById('adminRequestsTab').classList.add('hidden');
                            document.getElementById('adminVerificationsTab').classList.add('hidden');
                            document.getElementById('adminPaymentMethodsTab').classList.add('hidden');
                            document.getElementById('adminAdsTab').classList.add('hidden');
                            document.getElementById('adminTasksTab').classList.add('hidden');
                            
                            if (tabName === 'requests') {
                                document.getElementById('adminRequestsTab').classList.remove('hidden');
                            } else if (tabName === 'verifications') {
                                document.getElementById('adminVerificationsTab').classList.remove('hidden');
                            } else if (tabName === 'payment-methods') {
                                document.getElementById('adminPaymentMethodsTab').classList.remove('hidden');
                            } else if (tabName === 'ads') {
                                document.getElementById('adminAdsTab').classList.remove('hidden');
                            } else if (tabName === 'tasks') {
                                document.getElementById('adminTasksTab').classList.remove('hidden');
                            }
                        });
                    });

                    document.querySelectorAll('.accept-request').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            const type = btn.dataset.type;
                            const request = type === 'deposit' 
                                ? this.state.depositRequests.find(r => r.id === id)
                                : this.state.withdrawalRequests.find(r => r.id === id);
                            if (request) {
                                const success = this.data.acceptRequest(request, type);
                                if (success) {
                                    this.toast.success(`✅ تم قبول طلب ${type === 'deposit' ? 'الشحن' : 'السحب'}
                                        • المستخدم: ${request.userName}
                                        • المبلغ: ${request.amount}`);
                                    this.openAdminPanel();
                                    this.updateBalanceDisplay();
                                } else {
                                    this.toast.error('❌ حدث خطأ (قد يكون الرصيد غير كافٍ)');
                                }
                            }
                        });
                    });

                    document.querySelectorAll('.reject-request').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            const type = btn.dataset.type;
                            const request = type === 'deposit' 
                                ? this.state.depositRequests.find(r => r.id === id)
                                : this.state.withdrawalRequests.find(r => r.id === id);
                            if (request) {
                                this.data.rejectRequest(request, type);
                                this.toast.info(`❌ تم رفض طلب ${type === 'deposit' ? 'الشحن' : 'السحب'}`);
                                this.openAdminPanel();
                            }
                        });
                    });

                    document.querySelectorAll('.accept-task').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const userId = btn.dataset.userId;
                            const taskId = btn.dataset.taskId;
                            const success = this.taskSystem.verifyTask(userId, taskId, true);
                            
                            if (success) {
                                this.toast.success('✅ تم قبول المهمة وإضافة المكافأة');
                                this.openAdminPanel();
                                this.updateBalanceDisplay();
                            }
                        });
                    });

                    document.querySelectorAll('.reject-task').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const userId = btn.dataset.userId;
                            const taskId = btn.dataset.taskId;
                            const success = this.taskSystem.verifyTask(userId, taskId, false);
                            
                            if (success) {
                                this.toast.info('❌ تم رفض المهمة');
                                this.openAdminPanel();
                            }
                        });
                    });

                    document.getElementById('addPaymentMethodBtn')?.addEventListener('click', () => {
                        this.openPaymentMethodModal();
                    });

                    document.querySelectorAll('.edit-payment-method').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            this.openPaymentMethodModal(id);
                        });
                    });

                                        document.querySelectorAll('.delete-payment-method').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            if (confirm('هل أنت متأكد من حذف طريقة الدفع هذه؟')) {
                                this.data.deletePaymentMethod(id);
                                this.toast.success('تم الحذف بنجاح');
                                this.openAdminPanel();
                            }
                        });
                    });

                    // إضافة إعلان
                    document.getElementById('addAdBtn')?.addEventListener('click', () => {
                        this.openAdModal();
                    });

                    // تعديل وحذف الإعلانات
                    document.querySelectorAll('.edit-ad').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            this.openAdModal(id);
                        });
                    });

                    document.querySelectorAll('.delete-ad').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            if (confirm('هل أنت متأكد من حذف هذا الإعلان؟')) {
                                this.adSystem.deleteAd(id);
                                this.toast.success('تم الحذف بنجاح');
                                this.openAdminPanel();
                            }
                        });
                    });

                    // إضافة مهمة
                    document.getElementById('addTaskBtn')?.addEventListener('click', () => {
                        this.openTaskModal();
                    });

                    // تعديل وحذف المهام
                    document.querySelectorAll('.edit-task').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            this.openTaskModal(id);
                        });
                    });

                    document.querySelectorAll('.delete-task').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            if (confirm('هل أنت متأكد من حذف هذه المهمة؟')) {
                                this.taskSystem.deleteTask(id);
                                this.toast.success('تم الحذف بنجاح');
                                this.openAdminPanel();
                            }
                        });
                    });
                }

                // مودال إضافة/تعديل إعلان
                openAdModal(editingId = null) {
                    const modalOverlay = document.getElementById('paymentMethodModalOverlay');
                    const modalContent = document.getElementById('paymentMethodModalContent');
                    const ad = editingId ? this.state.ads.find(a => a.id === editingId) : null;
                    
                    modalContent.innerHTML = `
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-black">${ad ? 'تعديل إعلان' : 'إضافة إعلان جديد'}</h2>
                            <button id="closePaymentMethodModal" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                        <form id="paymentMethodForm" class="space-y-4">
                            <input type="hidden" id="methodId" value="${ad?.id || ''}">
                            <div>
                                <label class="text-sm text-gray-400 mb-1 block">عنوان الإعلان</label>
                                <input type="text" id="adTitle" required value="${ad?.title || ''}" class="input-field" placeholder="مثال: تطبيق توصيل الطعام">
                            </div>
                            <div>
                                <label class="text-sm text-gray-400 mb-1 block">وصف الإعلان</label>
                                <textarea id="adDescription" rows="2" class="input-field" placeholder="وصف مختصر للإعلان">${ad?.description || ''}</textarea>
                            </div>
                            <div>
                                <label class="text-sm text-gray-400 mb-1 block">الأيقونة (class FontAwesome)</label>
                                <input type="text" id="adImage" value="${ad?.image || 'fa-solid fa-image'}" class="input-field" placeholder="مثال: fa-solid fa-pizza-slice">
                            </div>
                            <div>
                                <label class="text-sm text-gray-400 mb-1 block">المكافأة</label>
                                <input type="number" id="adReward" required value="${ad?.reward || 50}" class="input-field" placeholder="أدخل المكافأة">
                            </div>
                            <div>
                                <label class="text-sm text-gray-400 mb-1 block">رابط الإعلان</label>
                                <input type="url" id="adLink" required value="${ad?.link || ''}" class="input-field" placeholder="https://example.com">
                            </div>
                            <div class="checkbox-container">
                                <input type="checkbox" id="adActive" ${ad?.active !== false ? 'checked' : ''}>
                                <span class="checkbox-custom">
                                    <i class="fa-solid fa-check"></i>
                                </span>
                                <span class="text-sm">نشط</span>
                            </div>
                            <div class="flex gap-3 pt-4">
                                <button type="submit" class="btn-primary flex-1">حفظ</button>
                                <button type="button" id="cancelPaymentMethod" class="btn-secondary flex-1">إلغاء</button>
                            </div>
                        </form>
                    `;
                    
                    modalOverlay.classList.add('open');
                    
                    document.getElementById('closePaymentMethodModal').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });
                    
                    document.getElementById('cancelPaymentMethod').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });
                    
                    document.getElementById('paymentMethodForm').addEventListener('submit', (e) => {
                        e.preventDefault();
                        const formData = {
                            title: document.getElementById('adTitle').value,
                            description: document.getElementById('adDescription').value,
                            image: document.getElementById('adImage').value,
                            reward: parseInt(document.getElementById('adReward').value),
                            link: document.getElementById('adLink').value,
                            active: document.getElementById('adActive').checked
                        };
                        
                        if (editingId) {
                            this.adSystem.updateAd(editingId, formData);
                            this.toast.success('تم تحديث الإعلان بنجاح');
                        } else {
                            this.adSystem.addAd(formData);
                            this.toast.success('تمت إضافة الإعلان بنجاح');
                        }
                        
                        modalOverlay.classList.remove('open');
                        this.openAdminPanel();
                    });
                }

                // مودال إضافة/تعديل مهمة
                openTaskModal(editingId = null) {
                    const modalOverlay = document.getElementById('paymentMethodModalOverlay');
                    const modalContent = document.getElementById('paymentMethodModalContent');
                    const task = editingId ? this.state.tasks.find(t => t.id === editingId) : null;
                    
                    modalContent.innerHTML = `
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-black">${task ? 'تعديل مهمة' : 'إضافة مهمة جديدة'}</h2>
                            <button id="closePaymentMethodModal" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                        <form id="paymentMethodForm" class="space-y-4">
                            <input type="hidden" id="methodId" value="${task?.id || ''}">
                            <div>
                                <label class="text-sm text-gray-400 mb-1 block">عنوان المهمة</label>
                                <input type="text" id="taskTitle" required value="${task?.title || ''}" class="input-field" placeholder="مثال: مهمة الاشتراك">
                            </div>
                            <div>
                                <label class="text-sm text-gray-400 mb-1 block">وصف المهمة</label>
                                <textarea id="taskDescription" rows="2" required class="input-field" placeholder="وصف مختصر للمهمة">${task?.description || ''}</textarea>
                            </div>
                            <div>
                                <label class="text-sm text-gray-400 mb-1 block">المكافأة</label>
                                <input type="number" id="taskReward" required value="${task?.reward || 100}" class="input-field" placeholder="أدخل المكافأة">
                            </div>
                            <div>
                                <label class="text-sm text-gray-400 mb-1 block">نوع التحقق</label>
                                <select id="taskVerificationType" class="input-field">
                                    <option value="screenshot" ${task?.verificationType === 'screenshot' ? 'selected' : ''}>لقطة شاشة</option>
                                    <option value="text" ${task?.verificationType === 'text' ? 'selected' : ''}>نص</option>
                                    <option value="link" ${task?.verificationType === 'link' ? 'selected' : ''}>رابط</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-sm text-gray-400 mb-1 block">بيانات التحقق (اختياري)</label>
                                <input type="text" id="taskVerificationData" value="${task?.verificationData || ''}" class="input-field" placeholder="مثال: https://t.me/your_channel">
                            </div>
                            <div>
                                <label class="text-sm text-gray-400 mb-1 block">تعليمات المهمة</label>
                                <textarea id="taskInstructions" rows="3" required class="input-field" placeholder="اكتب التعليمات هنا">${task?.instructions || ''}</textarea>
                            </div>
                            <div class="checkbox-container">
                                <input type="checkbox" id="taskActive" ${task?.active !== false ? 'checked' : ''}>
                                <span class="checkbox-custom">
                                    <i class="fa-solid fa-check"></i>
                                </span>
                                <span class="text-sm">نشط</span>
                            </div>
                            <div class="flex gap-3 pt-4">
                                <button type="submit" class="btn-primary flex-1">حفظ</button>
                                <button type="button" id="cancelPaymentMethod" class="btn-secondary flex-1">إلغاء</button>
                            </div>
                        </form>
                    `;
                    
                    modalOverlay.classList.add('open');
                    
                    document.getElementById('closePaymentMethodModal').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });
                    
                    document.getElementById('cancelPaymentMethod').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });
                    
                    document.getElementById('paymentMethodForm').addEventListener('submit', (e) => {
                        e.preventDefault();
                        const formData = {
                            title: document.getElementById('taskTitle').value,
                            description: document.getElementById('taskDescription').value,
                            reward: parseInt(document.getElementById('taskReward').value),
                            verificationType: document.getElementById('taskVerificationType').value,
                            verificationData: document.getElementById('taskVerificationData').value,
                            instructions: document.getElementById('taskInstructions').value,
                            active: document.getElementById('taskActive').checked
                        };
                        
                        if (editingId) {
                            this.taskSystem.updateTask(editingId, formData);
                            this.toast.success('تم تحديث المهمة بنجاح');
                        } else {
                            this.taskSystem.addTask(formData);
                            this.toast.success('تمت إضافة المهمة بنجاح');
                        }
                        
                        modalOverlay.classList.remove('open');
                        this.openAdminPanel();
                    });
                }

                // مودال إضافة/تعديل طريقة دفع
                openPaymentMethodModal(editingId = null) {
                    const modalOverlay = document.getElementById('paymentMethodModalOverlay');
                    const modalContent = document.getElementById('paymentMethodModalContent');
                    const method = editingId ? this.state.paymentMethods.find(m => m.id === editingId) : null;
                    
                    modalContent.innerHTML = `
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-black">${method ? 'تعديل طريقة دفع' : 'إضافة طريقة دفع جديدة'}</h2>
                            <button id="closePaymentMethodModal" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                        <form id="paymentMethodForm" class="space-y-4">
                            <input type="hidden" id="methodId" value="${method?.id || ''}">
                            <div>
                                <label class="text-sm text-gray-400 mb-1 block">اسم الطريقة</label>
                                <input type="text" id="methodName" required value="${method?.name || ''}" class="input-field" placeholder="مثال: USDT (TRC20)">
                            </div>
                            <div>
                                <label class="text-sm text-gray-400 mb-1 block">الأيقونة (class FontAwesome)</label>
                                <input type="text" id="methodIcon" value="${method?.icon || 'fa-solid fa-credit-card'}" class="input-field" placeholder="مثال: fa-brands fa-tether">
                            </div>
                            <div>
                                <label class="text-sm text-gray-400 mb-1 block">وصف مختصر</label>
                                <input type="text" id="methodDescription" value="${method?.description || ''}" class="input-field" placeholder="وصف مختصر">
                            </div>
                            <div>
                                <label class="text-sm text-gray-400 mb-1 block">تفاصيل الإيداع</label>
                                <textarea id="methodDepositDetails" rows="3" class="input-field" placeholder="تفاصيل الإيداع">${method?.depositDetails || ''}</textarea>
                            </div>
                            <div>
                                <label class="text-sm text-gray-400 mb-1 block">تفاصيل السحب (placeholder)</label>
                                <input type="text" id="methodWithdrawDetails" value="${method?.withdrawDetails || ''}" class="input-field" placeholder="مثال: أدخل عنوان USDT الخاص بك">
                            </div>
                            <div class="flex gap-3 pt-4">
                                <button type="submit" class="btn-primary flex-1">حفظ</button>
                                <button type="button" id="cancelPaymentMethod" class="btn-secondary flex-1">إلغاء</button>
                            </div>
                        </form>
                    `;
                    
                    modalOverlay.classList.add('open');
                    
                    document.getElementById('closePaymentMethodModal').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });
                    
                    document.getElementById('cancelPaymentMethod').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });
                    
                    document.getElementById('paymentMethodForm').addEventListener('submit', (e) => {
                        e.preventDefault();
                        const formData = {
                            name: document.getElementById('methodName').value,
                            icon: document.getElementById('methodIcon').value,
                            description: document.getElementById('methodDescription').value,
                            depositDetails: document.getElementById('methodDepositDetails').value,
                            withdrawDetails: document.getElementById('methodWithdrawDetails').value
                        };
                        const id = document.getElementById('methodId').value;
                        
                        if (id) {
                            this.data.updatePaymentMethod(id, formData);
                            this.toast.success('تم التحديث بنجاح');
                        } else {
                            this.data.addPaymentMethod(formData);
                            this.toast.success('تمت الإضافة بنجاح');
                        }
                        
                        modalOverlay.classList.remove('open');
                        this.openAdminPanel();
                    });
                }

                // مودال الإشعارات
                openNotificationsModal() {
                    const modalOverlay = document.getElementById('walletModalOverlay');
                    const modalContent = document.getElementById('walletModalContent');
                    modalContent.innerHTML = this.renderNotificationsModal();
                    modalOverlay.classList.add('open');
                    this.bindNotificationsModalEvents();
                }

                renderNotificationsModal() {
                    const userId = this.state.user.id;
                    const notifications = this.data.notificationService.getUserNotifications(userId);
                    
                    const notificationsHtml = notifications.length === 0 
                        ? '<div class="text-center py-8"><i class="fa-regular fa-bell-slash text-5xl text-gray-600 mb-4"></i><p class="text-gray-400">لا توجد إشعارات</p></div>'
                        : notifications.map(n => `
                            <div class="transaction-item ${n.read ? 'opacity-60' : ''}" data-id="${n.id}">
                                <div class="flex-1">
                                    <div class="font-black flex items-center gap-2">
                                        ${!n.read ? '<span class="w-2 h-2 bg-blue-500 rounded-full"></span>' : ''}
                                        ${n.title}
                                    </div>
                                    <div class="text-sm mt-1">${n.message}</div>
                                    <div class="text-xs text-gray-400 mt-2">${DateUtils.getTimeAgo(n.date)}</div>
                                </div>
                                ${!n.read ? `
                                    <button class="mark-read text-xs text-blue-400 hover:text-blue-300 w-8 h-8 rounded-full hover:bg-white/5" data-id="${n.id}">
                                        <i class="fa-regular fa-circle-check"></i>
                                    </button>
                                ` : ''}
                            </div>
                        `).join('');
                    
                    return `
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-black">الإشعارات</h2>
                            <button id="closeNotificationsModal" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                        <div class="flex justify-end mb-4">
                            <button id="markAllRead" class="btn-primary text-sm py-2 px-4">
                                <i class="fa-regular fa-bell-slash ml-1"></i> تحديد الكل كمقروء
                            </button>
                        </div>
                        <div class="max-h-96 overflow-y-auto space-y-2">
                            ${notificationsHtml}
                        </div>
                    `;
                }

                bindNotificationsModalEvents() {
                    const modalOverlay = document.getElementById('walletModalOverlay');
                    
                    document.getElementById('closeNotificationsModal').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });
                    
                    document.getElementById('markAllRead')?.addEventListener('click', () => {
                        this.data.notificationService.markAllAsRead(this.state.user.id);
                        this.toast.success('تم تحديد الكل كمقروء');
                        this.openNotificationsModal();
                        this.updateNotificationBadge();
                    });
                    
                    document.querySelectorAll('.mark-read').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const id = btn.dataset.id;
                            this.data.notificationService.markAsRead(id);
                            this.openNotificationsModal();
                            this.updateNotificationBadge();
                        });
                    });
                    
                    modalOverlay.addEventListener('click', (e) => {
                        if (e.target === modalOverlay) modalOverlay.classList.remove('open');
                    });
                }
            }

            // ======================== التطبيق الرئيسي المتطور ========================
            class App {
                constructor() {
                    this.state = new AppState();
                    this.telegram = new TelegramService();
                    this.toast = new ToastManager('toastContainer');
                    this.data = new DataService(this.state);
                    this.ui = new UIManager(this.state, this.data, this.telegram, this.toast);
                    
                    this.init();
                }

                async init() {
                    // التحقق من بيئة تيليجرام
                    if (!this.telegram.isAvailable) {
                        this.state.telegramMissing = true;
                        this.state.loading = false;
                        this.ui.render();
                        return;
                    }

                    this.telegram.init();

                    // التحقق من صحة البيانات
                    if (!this.telegram.isValid() || !this.telegram.getUser()) {
                        this.state.accessDenied = true;
                        this.state.loading = false;
                        this.ui.render();
                        return;
                    }

                    const user = this.telegram.getUser();
                    this.state.user = user;
                    this.state.isAdmin = (user.id === CONFIG.ADMIN_ID);

                    // تسجيل المستخدم
                    this.data.registerUser(user.id);

                    // تحميل الثيم
                    const savedTheme = this.data.loadTheme();
                    this.applyTheme(savedTheme);

                    // تحميل الإعدادات وتطبيقها على الـ Toast
                    this.loadSettings();

                    // محاكاة تحميل البيانات
                    this.state.loading = true;
                    this.ui.render();

                    try {
                        await new Promise(resolve => setTimeout(resolve, 1000));
                        this.data.loadStats();
                        this.state.loading = false;
                        this.ui.render();

                        // إعداد زر MainButton
                        this.telegram.setMainButton(
                            this.state.isAdmin ? "لوحة التحكم" : "تحديث البيانات",
                            '#3b82f6',
                            '#ffffff',
                            true,
                            () => {
                                this.telegram.showPopup({
                                    title: this.state.isAdmin ? 'مرحباً أيها المدير' : 'نظام آمن',
                                    message: this.state.isAdmin 
                                        ? `لديك صلاحيات كاملة. الطلبات المعلقة: ${this.data.getPendingDeposits().length + this.data.getPendingWithdrawals().length}`
                                        : `أهلاً ${user.first_name}، اتصالك آمن.`,
                                    buttons: [{ type: 'ok', text: 'حسناً' }]
                                });
                            }
                        );

                        this.toast.success(`مرحباً ${user.first_name}، أهلاً بك في المحفظة المتطورة`);
                        
                        // إضافة إشعار ترحيبي
                        this.data.notificationService.addNotification(
                            user.id,
                            '🎉 مرحباً بك',
                            'شكراً لانضمامك إلينا! يمكنك الآن البدء في مشاهدة الإعلانات وإنجاز المهام لكسب المكافآت.',
                            'info'
                        );
                        
                    } catch (error) {
                        console.error('Initialization error:', error);
                        this.toast.error('حدث خطأ أثناء تحميل البيانات');
                        this.state.loading = false;
                        this.ui.render();
                    }
                }

                loadSettings() {
                    const settings = this.state.settings;
                    this.toast.soundEnabled = settings.sound;
                    this.toast.vibrateEnabled = settings.vibrate;
                    
                    const soundToggle = document.getElementById('soundToggle');
                    const vibrateToggle = document.getElementById('vibrateToggle');
                    const notificationsToggle = document.getElementById('notificationsToggle');
                    
                    if (soundToggle) soundToggle.checked = settings.sound;
                    if (vibrateToggle) vibrateToggle.checked = settings.vibrate;
                    if (notificationsToggle) notificationsToggle.checked = settings.notifications;
                }

                applyTheme(theme) {
                    const root = document.documentElement;
                    const themeIcon = document.getElementById('themeIcon');
                    
                    if (theme === 'light') {
                        root.style.setProperty('--tg-theme-bg-color', '#f8fafc');
                        root.style.setProperty('--tg-theme-text-color', '#0f172a');
                        root.style.setProperty('--tg-theme-button-color', '#3b82f6');
                        root.style.setProperty('--tg-theme-button-text-color', '#ffffff');
                        if (themeIcon) themeIcon.className = 'fa-solid fa-sun';
                    } else {
                        root.style.setProperty('--tg-theme-bg-color', '#0f172a');
                        root.style.setProperty('--tg-theme-text-color', '#ffffff');
                        root.style.setProperty('--tg-theme-button-color', '#3b82f6');
                        root.style.setProperty('--tg-theme-button-text-color', '#ffffff');
                        if (themeIcon) themeIcon.className = 'fa-solid fa-moon';
                    }
                }
            }

            // ======================== بدء التطبيق ========================
            // التأكد من تحميل الصفحة بالكامل
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', startApp);
            } else {
                startApp();
            }

            function startApp() {
                // إنشاء التطبيق
                const app = new App();

                // أحداث عامة (السمة والإعدادات)
                const themeToggle = document.getElementById('themeToggle');
                if (themeToggle) {
                    themeToggle.addEventListener('click', () => {
                        const newTheme = app.state.theme === 'dark' ? 'light' : 'dark';
                        app.state.theme = newTheme;
                        app.data.saveTheme(newTheme);
                        app.applyTheme(newTheme);
                        app.toast.info(`تم تغيير السمة إلى ${newTheme === 'dark' ? 'الداكنة' : 'الفاتحة'}`);
                    });
                }

                // إعدادات
                const settingsOverlay = document.getElementById('settingsOverlay');
                const settingsPanel = document.getElementById('settingsPanel');
                
                // فتح لوحة الإعدادات (يمكن ربطها بأيقونة الترس في المستقبل)
                // هنا نضيف مستمع لفتح الإعدادات عند النقر على أيقونة السمة (يمكن تعديله لاحقاً)
                
                const closeSettings = document.getElementById('closeSettings');
                if (closeSettings) {
                    closeSettings.addEventListener('click', () => {
                        settingsOverlay.classList.remove('open');
                        settingsPanel.classList.remove('open');
                    });
                }

                if (settingsOverlay) {
                    settingsOverlay.addEventListener('click', () => {
                        settingsOverlay.classList.remove('open');
                        settingsPanel.classList.remove('open');
                    });
                }

                // فتح الإعدادات (يمكن تفعيلها عند الحاجة)
                // مثال: إضافة زر الإعدادات في المستقبل
                // يمكن إضافة هذا السطر لفتح الإعدادات للاختبار
                // setTimeout(() => {
                //     settingsOverlay.classList.add('open');
                //     settingsPanel.classList.add('open');
                // }, 2000);

                // أحداث تغيير الإعدادات
                const languageSelect = document.getElementById('languageSelect');
                if (languageSelect) {
                    languageSelect.addEventListener('change', (e) => {
                        app.state.settings.language = e.target.value;
                        app.data.saveSettings();
                        app.toast.success(`تم تغيير اللغة إلى ${e.target.value === 'ar' ? 'العربية' : 'الإنجليزية'}`);
                    });
                }

                const notificationsToggle = document.getElementById('notificationsToggle');
                if (notificationsToggle) {
                    notificationsToggle.addEventListener('change', (e) => {
                        app.state.settings.notifications = e.target.checked;
                        app.data.saveSettings();
                        app.toast.success(e.target.checked ? 'تم تفعيل الإشعارات' : 'تم إيقاف الإشعارات');
                    });
                }

                const soundToggle = document.getElementById('soundToggle');
                if (soundToggle) {
                    soundToggle.addEventListener('change', (e) => {
                        app.state.settings.sound = e.target.checked;
                        app.data.saveSettings();
                        app.toast.soundEnabled = e.target.checked;
                        app.toast.success(e.target.checked ? 'تم تفعيل التنبيه الصوتي' : 'تم إيقاف التنبيه الصوتي');
                    });
                }

                const vibrateToggle = document.getElementById('vibrateToggle');
                if (vibrateToggle) {
                    vibrateToggle.addEventListener('change', (e) => {
                        app.state.settings.vibrate = e.target.checked;
                        app.data.saveSettings();
                        app.toast.vibrateEnabled = e.target.checked;
                        app.toast.success(e.target.checked ? 'تم تفعيل الاهتزاز' : 'تم إيقاف الاهتزاز');
                    });
                }
            }
        })();
    </script>
</body>
</html>
