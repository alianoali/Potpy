<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICHANCY BLACK BOT | منصة احترافية</title>
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
    <style>
        :root {
            --bg: #050a15;
            --surface: rgba(16, 23, 45, 0.85);
            --border: rgba(255, 255, 255, 0.06);
            --gold: #ffc840;
            --gold-dark: #e8a020;
            --accent: #2AABEE;
            --danger: #ff4d4d;
            --success: #4ADE80;
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --radius: 24px;
            --radius-sm: 14px;
            --transition: 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', 'Tajawal', system-ui, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* خلفية متحركة */
        .scene {
            position: relative;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 50% 30%, #0a1a3a 0%, #050a15 70%);
            overflow: hidden;
            transition: filter 0.8s;
        }
        .scene.blurred {
            filter: blur(12px);
        }
        canvas {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        /* بوابة الدخول */
        .login-gate {
            position: absolute;
            inset: 0;
            z-index: 100;
            background: rgba(5, 10, 25, 0.82);
            backdrop-filter: blur(25px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s, visibility 0.5s;
        }
        .login-gate.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .login-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.015));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 34px;
            padding: 40px 32px;
            text-align: center;
            max-width: 420px;
            width: 92%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
        }
        .login-bot-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 18px;
            background: radial-gradient(circle at 30% 30%, #444, #111);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            box-shadow: 0 0 28px rgba(255, 180, 0, 0.25);
        }
        .login-bot-icon .eye {
            width: 10px;
            height: 17px;
            background: var(--gold);
            border-radius: 6px;
            box-shadow: 0 0 10px var(--gold);
        }
        .login-title {
            color: #fff;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .login-sub {
            color: var(--text-dim);
            font-size: 13px;
            margin-bottom: 28px;
        }
        #telegram-login-container {
            min-height: 48px;
            margin-bottom: 8px;
        }
        .error-msg {
            background: rgba(255, 77, 77, 0.12);
            border: 1px solid rgba(255, 77, 77, 0.35);
            color: #ff6b6b;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 12px;
            margin-top: 14px;
            display: none;
        }
        .error-msg.show {
            display: block;
            animation: shake 0.4s;
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-5px);
            }
            75% {
                transform: translateX(5px);
            }
        }

        /* واجهة التطبيق */
        .app-shell {
            position: absolute;
            inset: 0;
            z-index: 50;
            display: none;
            flex-direction: column;
            pointer-events: none;
        }
        .app-shell.active {
            display: flex;
        }
        .app-shell>* {
            pointer-events: auto;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(10, 18, 35, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
        }
        .brand span {
            color: #fff;
            font-weight: 700;
            font-size: 17px;
        }
        .user-pill {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 40px;
            padding: 5px 16px 5px 5px;
            cursor: pointer;
            transition: all var(--transition);
        }
        .user-pill img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #FFD700;
            object-fit: cover;
        }
        .user-pill .uname {
            color: #fff;
            font-weight: 600;
            font-size: 13px;
        }
        .logout-icon {
            width: 28px;
            height: 28px;
            background: rgba(255, 77, 77, 0.2);
            border: none;
            border-radius: 50%;
            color: var(--danger);
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }
        .logout-icon:hover {
            background: rgba(255, 77, 77, 0.4);
            color: #fff;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            -webkit-overflow-scrolling: touch;
        }
        .main-content::-webkit-scrollbar {
            width: 4px;
        }
        .main-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* ألسنة التنقل */
        .nav-tabs {
            display: flex;
            gap: 6px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 34px;
            padding: 5px;
            width: fit-content;
            margin: 0 auto;
            flex-wrap: wrap;
        }
        .nav-tab {
            padding: 9px 20px;
            border-radius: 28px;
            background: transparent;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all var(--transition);
            font-family: inherit;
        }
        .nav-tab.active {
            background: rgba(255, 200, 0, 0.2);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 200, 0, 0.2);
        }
        .nav-tab:hover:not(.active) {
            color: #fff;
            background: rgba(255, 255, 255, 0.06);
        }

        /* اللوحات */
        .panel {
            display: none;
            flex-direction: column;
            gap: 18px;
        }
        .panel.active {
            display: flex;
        }

        /* بطاقات */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: fadeSlideIn 0.4s ease;
        }
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .welcome-hero {
            background: linear-gradient(135deg, rgba(255, 200, 0, 0.08), rgba(42, 171, 238, 0.05));
            border: 1px solid rgba(255, 200, 0, 0.15);
            padding: 28px 22px;
            text-align: center;
            border-radius: var(--radius);
        }
        .welcome-hero h2 {
            color: #fff;
            font-size: 28px;
            font-weight: 800;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all var(--transition);
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #FFD700, #f0a000);
            color: #000;
            box-shadow: 0 4px 15px rgba(240, 160, 0, 0.3);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
        }
        .btn-danger {
            background: rgba(255, 77, 77, 0.15);
            border: 1px solid var(--danger);
            color: var(--danger);
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 10px;
        }
        .btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.1);
        }

        /* مؤشر التحميل */
        .loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 250;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
        }
        .loading-overlay.active {
            display: flex;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            z-index: 300;
            background: rgba(20, 30, 50, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 14px 28px;
            border-radius: 34px;
            font-size: 13px;
            font-weight: 600;
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .bot-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -55%);
            z-index: 8;
            pointer-events: none;
            transition: opacity 0.5s;
            text-align: center;
        }
        .bot-area.dimmed {
            opacity: 0.15;
        }
    </style>
</head>
<body>

    <div class="scene blurred" id="mainScene">
        <canvas id="c"></canvas>
        <div class="bot-area" id="botArea">
            <div style="width:140px;height:140px;border-radius:50%;background:radial-gradient(circle at 40% 30%, #2a2a2a, #111 65%, #050505);box-shadow:0 0 40px rgba(240,180,0,0.08);margin:0 auto;"></div>
            <div style="margin-top:12px;color:#fff;font-weight:900;font-size:32px;">ICHANCY</div>
        </div>
    </div>

    <!-- بوابة الدخول -->
    <div class="login-gate" id="loginGate">
        <div class="login-card">
            <div class="login-bot-icon"><div class="eye"></div><div class="eye"></div></div>
            <div class="login-title">ICHANCY BLACK BOT</div>
            <div class="login-sub">سجل دخولك عبر تلغرام للوصول إلى حسابك الشخصي</div>
            <div id="telegram-login-container"></div>
            <div class="error-msg" id="errorMsg"></div>
            <div style="color:rgba(255,255,255,0.25);font-size:10px;margin-top:14px;">🔒 خصوصية تامة – قاعدة بيانات محلية متطورة</div>
        </div>
    </div>

    <!-- واجهة التطبيق -->
    <div class="app-shell" id="appShell">
        <div class="topbar">
            <div class="brand"><span>ICHANCY</span></div>
            <div class="user-pill" id="userPill">
                <span class="uname" id="pillName">مستخدم</span>
                <img id="pillImg" src="" alt="">
                <button class="logout-icon" onclick="event.stopPropagation(); performLogout()">⏻</button>
            </div>
        </div>
        <div class="main-content" id="mainContent">
            <div class="nav-tabs" id="navTabs"></div>
            <div class="panel active" id="panelDashboard"></div>
            <div class="panel" id="panelProfile"></div>
            <div class="panel" id="panelNotes"></div>
            <div class="panel" id="panelSettings"></div>
            <div class="panel" id="panelAdmin"></div>
        </div>
    </div>

    <!-- مؤشر التحميل -->
    <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

    <div class="toast" id="toast"></div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // ==================== إعدادات ====================
        const CONFIG = {
            BOT_USERNAME: 'ICHANCY_BOT',
            VERIFY_API_URL: '',
            SESSION_KEY: 'ichancy_secure_session',
            SESSION_DURATION: 24 * 60 * 60 * 1000,
            ADMIN_TELEGRAM_ID: '7609492965',
            APP_VERSION: '5.0.1',
        };

        // ==================== قاعدة بيانات Dexie ====================
        const db = new Dexie('IchancyDB');
        db.version(4).stores({
            users: '++id, telegramId, username, firstName, createdAt, updatedAt',
            sessions: '++id, userId, loginTime',
            notes: '++id, userId, title, content, createdAt',
            activityLog: '++id, userId, action, timestamp',
            settings: 'userId, notifications, language',
        });

        // ==================== خلفية متحركة ====================
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let w, h;
        let resizeTimeout;

        function resizeCanvas() {
            w = canvas.width = innerWidth;
            h = canvas.height = innerHeight;
            drawBackground();
        }

        function drawBackground() {
            ctx.fillStyle = '#050a15';
            ctx.fillRect(0, 0, w, h);
            const g = ctx.createRadialGradient(w / 2, h * 0.7, 0, w / 2, h * 0.7, w * 0.6);
            g.addColorStop(0, 'rgba(0,80,200,0.06)');
            g.addColorStop(1, 'transparent');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, w, h);
        }
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(resizeCanvas, 100);
        });
        resizeCanvas();

        // ==================== الحالة العامة ====================
        let currentUserId = null;
        let currentTelegramUser = null;
        let isAdmin = false;
        let sessionCheckInterval = null;

        // ==================== عناصر DOM ====================
        const $ = (s) => document.querySelector(s);
        const gate = $('#loginGate');
        const scene = $('#mainScene');
        const appShell = $('#appShell');
        const botArea = $('#botArea');
        const errorMsg = $('#errorMsg');
        const loginContainer = $('#telegram-login-container');
        const toast = $('#toast');
        const loadingOverlay = $('#loadingOverlay');
        const pillName = $('#pillName');
        const pillImg = $('#pillImg');
        const navTabsContainer = $('#navTabs');
        const panels = {
            dashboard: $('#panelDashboard'),
            profile: $('#panelProfile'),
            notes: $('#panelNotes'),
            settings: $('#panelSettings'),
            admin: $('#panelAdmin'),
        };

        // ==================== تنبيهات ====================
        let toastTimer;

        function showToast(msg) {
            clearTimeout(toastTimer);
            toast.textContent = msg;
            toast.classList.add('show');
            toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
            setTimeout(() => errorMsg.classList.remove('show'), 5000);
        }

        function showLoading() {
            loadingOverlay.classList.add('active');
        }

        function hideLoading() {
            loadingOverlay.classList.remove('active');
        }

        // ==================== عمليات قاعدة البيانات ====================
        async function findOrCreateUser(tgUser) {
            try {
                const existing = await db.users.where('telegramId').equals(tgUser.id).first();
                if (existing) {
                    await db.users.update(existing.id, {
                        firstName: tgUser.first_name || existing.firstName,
                        lastName: tgUser.last_name || existing.lastName,
                        username: tgUser.username || existing.username,
                        photoUrl: tgUser.photo_url || existing.photoUrl,
                        updatedAt: Date.now(),
                    });
                    return existing.id;
                } else {
                    const id = await db.users.add({
                        telegramId: tgUser.id,
                        firstName: tgUser.first_name || '',
                        lastName: tgUser.last_name || '',
                        username: tgUser.username || '',
                        photoUrl: tgUser.photo_url || '',
                        createdAt: Date.now(),
                        updatedAt: Date.now(),
                    });
                    await db.settings.put({ userId: id, notifications: true, language: 'ar' });
                    return id;
                }
            } catch (error) {
                console.error('فشل في إنشاء/تحديث المستخدم:', error);
                showError('حدث خطأ في قاعدة البيانات. يرجى المحاولة مرة أخرى.');
                return null;
            }
        }

        async function logActivity(userId, action, details = '') {
            try {
                await db.activityLog.add({ userId, action, timestamp: Date.now(), details });
            } catch (error) {
                console.error('فشل في تسجيل النشاط:', error);
            }
        }

        async function getSettings(userId) {
            try {
                const s = await db.settings.where('userId').equals(userId).first();
                return s || { notifications: true, language: 'ar' };
            } catch (error) {
                console.error('فشل في جلب الإعدادات:', error);
                return { notifications: true, language: 'ar' };
            }
        }

        async function updateSettings(userId, updates) {
            try {
                const exist = await db.settings.where('userId').equals(userId).first();
                if (exist) await db.settings.update(exist.id, updates);
                else await db.settings.put({ userId, ...updates });
                await logActivity(userId, 'settings_changed', JSON.stringify(updates));
            } catch (error) {
                console.error('فشل في تحديث الإعدادات:', error);
                showError('فشل في تحديث الإعدادات');
            }
        }

        async function deleteUserAccount(userId) {
            try {
                const user = await db.users.get(userId);
                if (!user) return false;
                if (user.telegramId.toString() === CONFIG.ADMIN_TELEGRAM_ID) {
                    showToast('لا يمكن حذف حساب المشرف');
                    return false;
                }
                await db.transaction('rw', db.users, db.sessions, db.notes, db.activityLog, db.settings, async () => {
                    await db.users.delete(userId);
                    await db.sessions.where('userId').equals(userId).delete();
                    await db.notes.where('userId').equals(userId).delete();
                    await db.activityLog.where('userId').equals(userId).delete();
                    await db.settings.where('userId').equals(userId).delete();
                });
                if (currentUserId) await logActivity(currentUserId, 'admin_deleted_user',
                `حذف المستخدم ${user.telegramId}`);
                return true;
            } catch (error) {
                console.error('فشل في حذف المستخدم:', error);
                showError('فشل في حذف المستخدم');
                return false;
            }
        }

        async function getAllUsers() {
            try {
                return await db.users.orderBy('createdAt').reverse().toArray();
            } catch (error) {
                console.error('فشل في جلب المستخدمين:', error);
                return [];
            }
        }

        // ==================== إدارة الجلسة ====================
        function getSession() {
            const raw = localStorage.getItem(CONFIG.SESSION_KEY);
            if (!raw) return null;
            try {
                const s = JSON.parse(raw);
                if (s.expiresAt && Date.now() < s.expiresAt && s.userId) return s;
                localStorage.removeItem(CONFIG.SESSION_KEY);
            } catch (e) { localStorage.removeItem(CONFIG.SESSION_KEY); }
            return null;
        }

        function setSession(userId, tgUser) {
            localStorage.setItem(CONFIG.SESSION_KEY, JSON.stringify({
                userId,
                telegramUser: tgUser,
                expiresAt: Date.now() + CONFIG.SESSION_DURATION,
            }));
        }

        function clearSession() {
            localStorage.removeItem(CONFIG.SESSION_KEY);
        }

        function startSessionCheck() {
            stopSessionCheck();
            sessionCheckInterval = setInterval(() => {
                const session = getSession();
                if (!session) {
                    performLogout();
                }
            }, 30000); // فحص كل 30 ثانية
        }

        function stopSessionCheck() {
            if (sessionCheckInterval) {
                clearInterval(sessionCheckInterval);
                sessionCheckInterval = null;
            }
        }

        // ==================== إعادة تعيين كاملة للحالة ====================
        function fullReset() {
            currentUserId = null;
            currentTelegramUser = null;
            isAdmin = false;
            Object.values(panels).forEach(p => { if (p) p.innerHTML = ''; });
            stopSessionCheck();
        }

        // ==================== بناء ألسنة التنقل ====================
        function buildNavTabs() {
            const tabs = [
                { id: 'dashboard', icon: '📊', text: 'لوحة التحكم' },
                { id: 'profile', icon: '👤', text: 'الملف الشخصي' },
                { id: 'notes', icon: '📝', text: 'ملاحظاتي' },
                { id: 'settings', icon: '⚙️', text: 'الإعدادات' },
            ];
            if (isAdmin) tabs.push({ id: 'admin', icon: '🛡️', text: 'إدارة المستخدمين' });
            navTabsContainer.innerHTML = tabs.map(t =>
                `<button class="nav-tab${t.id === 'dashboard' ? ' active' : ''}" data-panel="${t.id}">${t.icon} ${t.text}</button>`
            ).join('');
        }

        async function switchPanel(panelName) {
            document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
            const activeTab = document.querySelector(`.nav-tab[data-panel="${panelName}"]`);
            if (activeTab) activeTab.classList.add('active');
            Object.values(panels).forEach(p => p.classList.remove('active'));
            const panel = panels[panelName];
            if (panel) panel.classList.add('active');

            showLoading();
            try {
                if (panelName === 'dashboard') await renderDashboard();
                if (panelName === 'profile') await renderProfile();
                if (panelName === 'notes') await renderNotes();
                if (panelName === 'settings') await renderSettings();
                if (panelName === 'admin' && isAdmin) await renderAdminPanel();
            } catch (error) {
                console.error('فشل في عرض اللوحة:', error);
                showError('حدث خطأ أثناء تحميل البيانات');
            } finally {
                hideLoading();
            }
        }

        navTabsContainer.addEventListener('click', (e) => {
            if (e.target.classList.contains('nav-tab')) {
                switchPanel(e.target.dataset.panel);
            }
        });

        // ==================== دوال العرض ====================
        async function renderDashboard() {
            if (!currentUserId) return performLogout();
            const user = await db.users.get(currentUserId);
            if (!user) return performLogout();
            const activity = await db.activityLog.where('userId').equals(currentUserId).reverse().limit(5).toArray();
            const notesCount = await db.notes.where('userId').equals(currentUserId).count();
            const totalActions = await db.activityLog.where('userId').equals(currentUserId).count();
            const settings = await getSettings(currentUserId);
            const fullName = [user.firstName, user.lastName].filter(Boolean).join(' ') || 'مستخدم';

            panels.dashboard.innerHTML = `
                <div class="welcome-hero">
                    <h2>👋 أهلاً بك، ${escapeHTML(fullName)}!</h2>
                    <p style="color:var(--text-dim);margin-top:8px;">مرحباً بعودتك إلى لوحة التحكم الخاصة بك.</p>
                </div>
                <div class="card">
                    <div style="display:flex;gap:12px;">
                        <div style="flex:1;text-align:center;background:rgba(255,255,255,0.02);border-radius:12px;padding:14px;">
                            <div style="color:var(--gold);font-size:26px;font-weight:800;">${notesCount}</div>
                            <div style="color:var(--text-dim);font-size:10px;">ملاحظة</div>
                        </div>
                        <div style="flex:1;text-align:center;background:rgba(255,255,255,0.02);border-radius:12px;padding:14px;">
                            <div style="color:#fff;font-size:26px;font-weight:800;">${totalActions}</div>
                            <div style="color:var(--text-dim);font-size:10px;">إجراء</div>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div style="color:#fff;font-weight:700;margin-bottom:12px;">🕒 آخر النشاطات</div>
                    ${activity.length === 0 ? '<div style="color:var(--text-dim);text-align:center;">لا توجد نشاطات</div>' :
                    activity.map(a => `
                        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:12px;color:#ddd;">
                            <span>${escapeHTML(a.action)}</span>
                            <span style="color:var(--text-dim);">${new Date(a.timestamp).toLocaleString('ar-EG',{hour:'2-digit',minute:'2-digit',day:'numeric',month:'numeric'})}</span>
                        </div>`).join('')}
                </div>`;
        }

        async function renderProfile() {
            if (!currentUserId) return performLogout();
            const user = await db.users.get(currentUserId);
            if (!user) return performLogout();
            const settings = await getSettings(currentUserId);
            const sessionsCount = await db.sessions.where('userId').equals(currentUserId).count();
            const notesCount = await db.notes.where('userId').equals(currentUserId).count();

            panels.profile.innerHTML = `
                <div class="card">
                    <div style="display:flex;align-items:center;gap:18px;">
                        <img src="${escapeHTML(user.photoUrl) || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.firstName||'U')}&background=FFD700&color=000&size=256`}" style="width:80px;height:80px;border-radius:50%;border:3px solid #FFD700;object-fit:cover;" onerror="this.src='https://ui-avatars.com/api/?name=U&background=555&color=fff&size=256'">
                        <div>
                            <div style="color:#fff;font-size:22px;font-weight:800;">${escapeHTML(user.firstName||'')} ${escapeHTML(user.lastName||'')}</div>
                            <div style="color:var(--accent);">@${escapeHTML(user.username||'unknown')}</div>
                            <div style="color:var(--text-dim);font-size:11px;">Telegram ID: ${user.telegramId}</div>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="editProfile()" style="margin-top:16px;">✏️ تعديل الملف</button>
                </div>
                <div class="card">
                    <table style="width:100%;color:#ddd;font-size:12px;">
                        <tr><td style="color:var(--text-dim);padding:6px;">📅 تاريخ التسجيل</td><td>${new Date(user.createdAt).toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'})}</td></tr>
                        <tr><td style="color:var(--text-dim);padding:6px;">🔑 الجلسات</td><td>${sessionsCount}</td></tr>
                        <tr><td style="color:var(--text-dim);padding:6px;">📝 الملاحظات</td><td>${notesCount}</td></tr>
                        <tr><td style="color:var(--text-dim);padding:6px;">🌐 اللغة</td><td>${settings.language === 'ar' ? 'العربية' : 'English'}</td></tr>
                    </table>
                </div>`;
        }

        async function renderNotes() {
            if (!currentUserId) return performLogout();
            const notes = await db.notes.where('userId').equals(currentUserId).reverse().sortBy('createdAt');
            panels.notes.innerHTML = `
                <div class="card">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <span style="color:#fff;font-weight:700;">📝 ملاحظاتي</span>
                        <button class="btn btn-primary btn-sm" onclick="addNote()">➕ جديدة</button>
                    </div>
                    ${notes.length === 0 ? '<div style="color:var(--text-dim);text-align:center;padding:20px;">لا توجد ملاحظات</div>' :
                    notes.map(n => `
                        <div style="background:rgba(255,255,255,0.02);border-radius:12px;padding:12px;margin-top:8px;">
                            <div style="color:#fff;font-weight:600;">${escapeHTML(n.title)}</div>
                            <div style="color:var(--text-dim);font-size:11px;margin-top:4px;">${escapeHTML(n.content)}</div>
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
                                <span style="font-size:10px;color:rgba(255,255,255,0.2);">${new Date(n.createdAt).toLocaleString('ar-EG')}</span>
                                <button class="btn btn-danger btn-sm" onclick="deleteNoteById(${n.id})">🗑</button>
                            </div>
                        </div>`).join('')}
                </div>`;
        }

        async function renderSettings() {
            if (!currentUserId) return performLogout();
            const settings = await getSettings(currentUserId);
            panels.settings.innerHTML = `
                <div class="card">
                    <div style="color:#fff;font-weight:700;margin-bottom:12px;">⚙️ الإعدادات</div>
                    <button class="btn btn-outline btn-sm" onclick="toggleNotifications()">${settings.notifications ? '🔕 إيقاف الإشعارات' : '🔔 تشغيل الإشعارات'}</button>
                    <button class="btn btn-outline btn-sm" onclick="switchLanguage()" style="margin:0 8px;">🌍 تبديل اللغة</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteMyAccount()">🗑 حذف حسابي</button>
                </div>`;
        }

        async function renderAdminPanel() {
            if (!isAdmin || !currentUserId) return;
            const users = await getAllUsers();
            panels.admin.innerHTML = `
                <div class="card">
                    <div style="color:#fff;font-weight:700;margin-bottom:12px;">🛡️ إدارة المستخدمين (${users.length})</div>
                    <div style="overflow-x:auto;">
                        <table style="width:100%;font-size:12px;color:#ddd;">
                            <thead><tr><th>Telegram ID</th><th>الاسم</th><th>تاريخ التسجيل</th><th>إجراء</th></tr></thead>
                            <tbody>${users.map(u => `
                                <tr>
                                    <td>${u.telegramId}</td>
                                    <td>${escapeHTML(u.firstName||'')} ${escapeHTML(u.lastName||'')}</td>
                                    <td>${new Date(u.createdAt).toLocaleDateString('ar-EG')}</td>
                                    <td><button class="btn btn-danger btn-sm" onclick="adminDeleteUser(${u.id})">🗑</button></td>
                                </tr>`).join('')}</tbody>
                        </table>
                    </div>
                </div>`;
        }

        // ==================== إجراءات المستخدم ====================
        function editProfile() {
            if (!currentUserId) return;
            db.users.get(currentUserId).then(user => {
                if (!user) return;
                const firstName = prompt('الاسم الأول:', user.firstName);
                if (firstName === null) return;
                const lastName = prompt('اسم العائلة:', user.lastName);
                if (lastName === null) return;
                const username = prompt('اسم المستخدم:', user.username);
                if (username === null) return;
                const photoUrl = prompt('رابط الصورة:', user.photoUrl);
                if (photoUrl === null) return;
                showLoading();
                db.users.update(currentUserId, { firstName, lastName, username, photoUrl, updatedAt: Date.now() })
                    .then(async () => {
                        await logActivity(currentUserId, 'profile_updated');
                        updateUserPill();
                        await switchPanel('profile');
                        showToast('✅ تم التحديث');
                    })
                    .catch(() => showError('فشل في تحديث الملف'))
                    .finally(() => hideLoading());
            });
        }

        function addNote() {
            if (!currentUserId) return;
            const title = prompt('عنوان الملاحظة:');
            if (!title) return;
            const content = prompt('المحتوى:');
            if (content === null) return;
            showLoading();
            db.notes.add({ userId: currentUserId, title, content: content || '', createdAt: Date.now() })
                .then(async () => {
                    await logActivity(currentUserId, 'note_added', title);
                    await switchPanel('notes');
                    showToast('📝 تمت الإضافة');
                })
                .catch(() => showError('فشل في إضافة الملاحظة'))
                .finally(() => hideLoading());
        }

        function deleteNoteById(id) {
            if (confirm('حذف الملاحظة؟')) {
                showLoading();
                db.notes.delete(id).then(async () => {
                    await logActivity(currentUserId, 'note_deleted');
                    await switchPanel('notes');
                    showToast('🗑 تم الحذف');
                })
                .catch(() => showError('فشل في حذف الملاحظة'))
                .finally(() => hideLoading());
            }
        }

        async function toggleNotifications() {
            if (!currentUserId) return;
            showLoading();
            try {
                const s = await getSettings(currentUserId);
                await updateSettings(currentUserId, { notifications: !s.notifications });
                await switchPanel('settings');
                showToast(s.notifications ? '🔕 تم الإيقاف' : '🔔 تم التشغيل');
            } catch (error) {
                showError('فشل في تحديث الإعدادات');
            } finally {
                hideLoading();
            }
        }

        async function switchLanguage() {
            if (!currentUserId) return;
            showLoading();
            try {
                const s = await getSettings(currentUserId);
                const newLang = s.language === 'ar' ? 'en' : 'ar';
                await updateSettings(currentUserId, { language: newLang });
                await switchPanel('settings');
                showToast(newLang === 'ar' ? 'العربية' : 'English');
            } catch (error) {
                showError('فشل في تغيير اللغة');
            } finally {
                hideLoading();
            }
        }

        async function deleteMyAccount() {
            if (!currentUserId) return;
            if (confirm('⚠️ حذف نهائي للحساب وجميع البيانات؟')) {
                showLoading();
                try {
                    await deleteUserAccount(currentUserId);
                    performLogout();
                } catch (error) {
                    showError('فشل في حذف الحساب');
                } finally {
                    hideLoading();
                }
            }
        }

        async function adminDeleteUser(userId) {
            if (confirm('حذف هذا المستخدم نهائياً؟')) {
                showLoading();
                try {
                    const success = await deleteUserAccount(userId);
                    if (success) {
                        await switchPanel('admin');
                        showToast('🗑 تم الحذف');
                    }
                } catch (error) {
                    showError('فشل في حذف المستخدم');
                } finally {
                    hideLoading();
                }
            }
        }

        // ==================== تحديث شريط المستخدم ====================
        async function updateUserPill() {
            if (!currentUserId) return;
            try {
                const user = await db.users.get(currentUserId);
                if (!user) return;
                const name = [user.firstName, user.lastName].filter(Boolean).join(' ') || 'مستخدم';
                pillName.textContent = name;
                pillImg.src = user.photoUrl ||
                    `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=FFD700&color=000&size=40`;
                pillImg.onerror = () => { pillImg.src =
                        'https://ui-avatars.com/api/?name=U&background=555&color=fff&size=40'; };
            } catch (error) {
                console.error('فشل في تحديث شريط المستخدم:', error);
            }
        }

        function escapeHTML(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ==================== دورة الحياة ====================
        async function showApp(tgUser) {
            fullReset();
            clearSession();
            showLoading();
            try {
                const userId = await findOrCreateUser(tgUser);
                if (!userId) {
                    hideLoading();
                    return;
                }
                currentUserId = userId;
                currentTelegramUser = tgUser;
                isAdmin = (tgUser.id.toString() === CONFIG.ADMIN_TELEGRAM_ID);
                setSession(userId, tgUser);
                await db.sessions.add({ userId, loginTime: Date.now() });
                await logActivity(userId, 'login', 'تسجيل دخول');
                gate.classList.add('hidden');
                scene.classList.remove('blurred');
                appShell.classList.add('active');
                botArea.classList.add('dimmed');
                buildNavTabs();
                await updateUserPill();
                await switchPanel('dashboard');
                startSessionCheck();
                const name = [tgUser.first_name, tgUser.last_name].filter(Boolean).join(' ') || 'مستخدم';
                showToast(`👋 أهلاً ${name}!`);
            } catch (error) {
                console.error('فشل في بدء التطبيق:', error);
                showError('حدث خطأ أثناء تحميل التطبيق');
            } finally {
                hideLoading();
            }
        }

        async function performLogout() {
            if (currentUserId) await logActivity(currentUserId, 'logout');
            fullReset();
            clearSession();
            appShell.classList.remove('active');
            gate.classList.remove('hidden');
            scene.classList.add('blurred');
            botArea.classList.remove('dimmed');
            loginContainer.innerHTML = '';
            createTelegramWidget();
            showToast('👋 تم تسجيل الخروج');
        }

        async function checkExistingSession() {
            const session = getSession();
            if (!session || !session.userId) return false;
            showLoading();
            try {
                const user = await db.users.get(session.userId);
                if (!user) { clearSession();
                    hideLoading(); return false; }
                currentUserId = user.id;
                currentTelegramUser = session.telegramUser;
                isAdmin = (user.telegramId.toString() === CONFIG.ADMIN_TELEGRAM_ID);
                gate.classList.add('hidden');
                scene.classList.remove('blurred');
                appShell.classList.add('active');
                botArea.classList.add('dimmed');
                buildNavTabs();
                await updateUserPill();
                await switchPanel('dashboard');
                startSessionCheck();
                showToast('👋 مرحباً بعودتك');
                return true;
            } catch (error) {
                console.error('فشل في استعادة الجلسة:', error);
                return false;
            } finally {
                hideLoading();
            }
        }

        // ==================== مصادقة تلغرام ====================
        function onTelegramAuth(userData) {
            if (!userData || !userData.id) { showError('بيانات غير مكتملة'); return; }
            const tgUser = {
                id: userData.id,
                first_name: userData.first_name || '',
                last_name: userData.last_name || '',
                username: userData.username || '',
                photo_url: userData.photo_url || '',
                auth_date: userData.auth_date || Math.floor(Date.now() / 1000),
                hash: userData.hash || '',
            };
            if (CONFIG.VERIFY_API_URL) {
                fetch(CONFIG.VERIFY_API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(userData) })
                    .then(r => r.json())
                    .then(d => { if (d.valid) showApp(tgUser);
                        else showError('فشل التحقق'); })
                    .catch(() => showError('خطأ في السيرفر'));
            } else {
                showApp(tgUser);
            }
        }

        function handleWebAppAuth() {
            if (!window.Telegram?.WebApp?.initDataUnsafe?.user) return false;
            const u = window.Telegram.WebApp.initDataUnsafe.user;
            const tgUser = {
                id: u.id,
                first_name: u.first_name || '',
                last_name: u.last_name || '',
                username: u.username || '',
                photo_url: u.photo_url || '',
                auth_date: u.auth_date || Math.floor(Date.now() / 1000),
                hash: '',
            };
            showApp(tgUser);
            return true;
        }

        function createTelegramWidget() {
            loginContainer.innerHTML = '';
            const script = document.createElement('script');
            script.src = 'https://telegram.org/js/telegram-widget.js?22';
            script.async = true;
            script.setAttribute('data-telegram-login', CONFIG.BOT_USERNAME);
            script.setAttribute('data-size', 'large');
            script.setAttribute('data-radius', '12');
            script.setAttribute('data-onauth', 'onTelegramAuth(user)');
            loginContainer.appendChild(script);
        }

        // ==================== بدء التشغيل ====================
        async function init() {
            if (await checkExistingSession()) return;
            if (handleWebAppAuth()) return;
            createTelegramWidget();
            gate.classList.remove('hidden');
        }

        // تنظيف عند مغادرة الصفحة
        window.addEventListener('beforeunload', () => {
            stopSessionCheck();
            clearTimeout(toastTimer);
        });

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
