                    const form = document.getElementById('createTicketForm');
                    const list = document.getElementById('ticketList');

                    createBtn.addEventListener('click', () => {
                        form.classList.remove('hidden');
                        list.classList.add('hidden');
                        createBtn.classList.add('hidden');
                    });

                    document.getElementById('cancelCreateTicket')?.addEventListener('click', () => {
                        form.classList.add('hidden');
                        list.classList.remove('hidden');
                        createBtn.classList.remove('hidden');
                    });

                    document.getElementById('submitTicket')?.addEventListener('click', () => {
                        const title = document.getElementById('ticketTitle').value.trim();
                        const description = document.getElementById('ticketDescription').value.trim();
                        const priority = document.getElementById('ticketPriority').value;

                        if (!title || !description) {
                            this.toast.error('يرجى ملء جميع الحقول');
                            return;
                        }

                        const ticket = this.data.createSupportTicket(title, description, priority);
                        if (ticket) {
                            this.toast.success('✅ تم إنشاء التذكرة بنجاح');
                            this.openUserTickets(); // إعادة فتح النافذة لتحديث القائمة
                        }
                    });

                    document.querySelectorAll('.ticket-item').forEach(item => {
                        item.addEventListener('click', () => {
                            const ticketId = item.dataset.id;
                            this.openTicketDetails(ticketId);
                        });
                    });
                }

                openTicketDetails(ticketId) {
                    const ticket = this.state.supportTickets.find(t => t.id === ticketId);
                    if (!ticket) return;

                    const messagesHtml = ticket.messages.map(msg => `
                        <div class="chat-message ${msg.sender === 'user' ? 'outgoing' : 'incoming'}">
                            <div class="message-bubble">
                                <div class="text-sm">${Utils.escapeHtml(msg.message)}</div>
                                <div class="message-info">
                                    <span>${Utils.formatTime(msg.date)}</span>
                                    <span>${msg.sender === 'user' ? 'أنت' : 'فريق الدعم'}</span>
                                </div>
                            </div>
                        </div>
                    `).join('');

                    const contentHtml = `
                        <h2 class="text-xl font-bold mb-4 text-center">تفاصيل التذكرة</h2>

                        <div class="glass-card p-4 rounded-2xl mb-4">
                            <div class="font-bold">${Utils.escapeHtml(ticket.title)}</div>
                            <div class="text-sm text-gray-300 mt-1">${Utils.escapeHtml(ticket.description)}</div>
                            <div class="flex items-center gap-2 mt-2">
                                <span class="ticket-status ${ticket.status}">
                                    ${ticket.status === 'open' ? 'مفتوحة' : (ticket.status === 'closed' ? 'مغلقة' : 'معلقة')}
                                </span>
                                <span class="text-xs text-gray-400">الأولوية: ${ticket.priority === 'high' ? 'عالية' : (ticket.priority === 'medium' ? 'متوسطة' : 'منخفضة')}</span>
                            </div>
                        </div>

                        <div class="chat-container glass-card p-3 rounded-2xl" style="height: 300px;">
                            <div class="chat-messages hide-scrollbar" id="ticketMessages">
                                ${messagesHtml}
                            </div>

                            ${ticket.status !== 'closed' ? `
                                <div class="flex gap-2 mt-2">
                                    <input type="text" id="ticketReply" placeholder="اكتب ردك..." class="flex-1 bg-slate-800 border border-white/10 rounded-full px-4 py-2 text-white">
                                    <button id="sendTicketReply" class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center hover:bg-blue-700 transition-colors flex-shrink-0">
                                        <i class="fa-solid fa-paper-plane"></i>
                                    </button>
                                </div>
                            ` : ''}
                        </div>

                        ${ticket.status !== 'closed' && !this.state.isAdmin ? `
                            <button id="closeTicketBtn" class="w-full btn-danger py-2 mt-3">
                                <i class="fa-solid fa-lock ml-2"></i>
                                إغلاق التذكرة
                            </button>
                        ` : ''}
                    `;

                    this.openModal('ticketModalOverlay', contentHtml);

                    // ربط الأحداث الخاصة بالتذكرة
                    const sendReply = document.getElementById('sendTicketReply');
                    if (sendReply) {
                        sendReply.addEventListener('click', () => {
                            const reply = document.getElementById('ticketReply').value.trim();
                            if (!reply) return;

                            this.data.addTicketMessage(ticketId, reply, this.state.isAdmin ? 'support' : 'user');
                            this.openTicketDetails(ticketId); // إعادة فتح النافذة لتحديث الرسائل
                        });
                    }

                    const closeTicketBtn = document.getElementById('closeTicketBtn');
                    if (closeTicketBtn) {
                        closeTicketBtn.addEventListener('click', () => {
                            if (confirm('هل أنت متأكد من إغلاق هذه التذكرة؟')) {
                                this.data.updateTicketStatus(ticketId, 'closed');
                                this.toast.info('تم إغلاق التذكرة');
                                this.closeAllModals();
                            }
                        });
                    }

                    const messagesContainer = document.getElementById('ticketMessages');
                    if (messagesContainer) {
                        messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    }
                }

                        document.getElementById('faqId').value = '';
                        document.getElementById('faqQuestion').value = '';

                        document.getElementById('faqList').classList.remove('hidden');

                    document.getElementById('saveFAQ').addEventListener('click', () => {

                        if (!question || !answer) {

                            this.toast.success('✅ تم إضافة السؤال');

                        this.openFAQManagement(); // إعادة فتح النافذة لتحديث القائمة

                    document.querySelectorAll('.edit-faq').forEach(btn => {

                        <div id="walletTabContent">
                            <div class="tab-pane" id="tab-deposit">

                bindWalletModalEvents() {
                    const overlay = document.getElementById('walletModalOverlay');

                    const tabs = document.querySelectorAll('.wallet-tab');
                    tabs.forEach(tab => {
                        tab.addEventListener('click', () => {
                            tabs.forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');
                            
                            document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.add('hidden'));
                            document.getElementById(`tab-${tab.dataset.tab}`).classList.remove('hidden');
                        });
                    });

                    document.getElementById('tab-deposit').classList.remove('hidden');

                    let selectedMethod = null;
                    const methods = document.querySelectorAll('.payment-methods-list .payment-method');
                    const detailsDiv = document.getElementById('depositDetails');
                    const detailsText = document.getElementById('depositDetailsText');

                    methods.forEach(method => {
                        method.addEventListener('click', () => {
                            methods.forEach(m => m.classList.remove('selected'));
                            method.classList.add('selected');
                            selectedMethod = method.dataset.methodId;

                            const methodObj = this.state.paymentMethods.find(m => m.id === selectedMethod);
                            if (methodObj?.depositDetails) {
                                detailsText.innerHTML = methodObj.depositDetails.replace(/\n/g, '<br>');
                                detailsDiv.classList.remove('hidden');
                            } else {
                                detailsDiv.classList.add('hidden');
                            }
                        });
                    });

                    document.getElementById('depositBtn')?.addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('depositAmount').value);
                        const txId = document.getElementById('depositTransactionId').value.trim();

                        if (isNaN(amount) || amount <= 0) {
                            this.toast.error('أدخل مبلغ صحيح');
                            return;
                        }
                        if (!selectedMethod) {
                            this.toast.error('اختر طريقة دفع');
                            return;
                        }
                        if (!txId) {
                            this.toast.error('أدخل رقم العملية');
                            return;
                        }

                        const request = this.data.addDepositRequest(amount, selectedMethod, txId);
                        if (request) {
                            this.toast.success(`✅ تم تقديم طلب الشحن بمبلغ ${Utils.formatUSD(amount)}`);
                            document.getElementById('depositAmount').value = '';
                            document.getElementById('depositTransactionId').value = '';
                            methods.forEach(m => m.classList.remove('selected'));
                            detailsDiv.classList.add('hidden');
                            selectedMethod = null;
                        }
                    });

                    let selectedWithdrawMethod = null;
                    document.querySelectorAll('#tab-withdraw .payment-method').forEach(method => {
                        method.addEventListener('click', () => {
                            document.querySelectorAll('#tab-withdraw .payment-method').forEach(m => m.classList.remove('selected'));
                            method.classList.add('selected');
                            selectedWithdrawMethod = method.dataset.methodId;
                            
                            const methodObj = this.state.paymentMethods.find(m => m.id === selectedWithdrawMethod);
                            const detailsInput = document.getElementById('withdrawDetails');
                            if (methodObj) {
                                detailsInput.placeholder = methodObj.withdrawDetails || 'أدخل التفاصيل';
                            }
                        });
                    });

                    document.getElementById('withdrawBtn')?.addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('withdrawAmount').value);
                        const details = document.getElementById('withdrawDetails').value.trim();

                        if (isNaN(amount) || amount <= 0) {
                            this.toast.error('أدخل مبلغ صحيح');
                            return;
                        }
                        if (!selectedWithdrawMethod) {
                            this.toast.error('اختر طريقة سحب');
                            return;
                        }
                        if (!details) {
                            this.toast.error('أدخل التفاصيل');
                            return;
                        }

                        const result = this.data.addWithdrawalRequest(amount, selectedWithdrawMethod, details);
                        if (result.success) {
                            this.toast.success(`✅ تم تقديم طلب السحب بمبلغ ${Utils.formatUSD(amount)}`);
                            document.getElementById('withdrawAmount').value = '';
                            document.getElementById('withdrawDetails').value = '';
                            document.querySelectorAll('#tab-withdraw .payment-method').forEach(m => m.classList.remove('selected'));
                            selectedWithdrawMethod = null;
                        } else {
                            this.toast.error(result.error);
                        }
                    });

                    document.getElementById('transferBtn')?.addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('transferAmount').value);
                        const targetId = parseInt(document.getElementById('transferUserId').value);

                        if (isNaN(amount) || amount <= 0) {
                            this.toast.error('أدخل مبلغ صحيح');
                            return;
                        }
                        if (!targetId || isNaN(targetId)) {
                            this.toast.error('أدخل معرف المستخدم');
                            return;
                        }

                        // تحسين: منع التحويل إلى نفس المستخدم
                        if (targetId === this.state.user.id) {
                            this.toast.error('لا يمكنك التحويل إلى نفسك');
                            return;
                        }

                        const userData = this.data.getUserData(targetId);
                        if (!userData) {
                            this.toast.error('المستخدم غير موجود');
                            return;
                        }

                        if (amount > (this.state.currentUser?.balance || 0)) {
                            this.toast.error('الرصيد غير كافٍ');
                            return;
                        }

                        const withdrawResult = this.data.updateBalance(
                            this.state.user.id,
                            -amount,
                            `تحويل إلى المستخدم ${targetId}`,
                            'transfer_out'
                        );

                        if (withdrawResult.success) {
                            this.data.updateBalance(
                                targetId,
                                amount,
                                `تحويل من المستخدم ${this.state.user.id}`,
                                'transfer_in'
                            );

                            this.toast.success(`✅ تم تحويل ${Utils.formatUSD(amount)} بنجاح`);
                            document.getElementById('transferAmount').value = '';
                            document.getElementById('transferUserId').value = '';
                        }
                    });
                }

                    // تأكد من أن المستخدم هو المدير

                    const contentHtml = this.renderAdminPanel();
                    this.openModal('adminPanelOverlay', contentHtml);

                    const users = this.data.getAllUsers();

                    return `

                bindAdminPanelEvents() {
                    const tabs = document.querySelectorAll('[data-admin-tab]');
                    tabs.forEach(tab => {
                        tab.addEventListener('click', () => {
                            tabs.forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');
                            
                            document.getElementById('adminRequestsTab').classList.add('hidden');
                            document.getElementById('adminUsersTab').classList.add('hidden');
                            document.getElementById('adminPaymentTab').classList.add('hidden');
                            
                            if (tab.dataset.adminTab === 'requests') {
                                document.getElementById('adminRequestsTab').classList.remove('hidden');
                            } else if (tab.dataset.adminTab === 'users') {
                                document.getElementById('adminUsersTab').classList.remove('hidden');
                            } else if (tab.dataset.adminTab === 'payment') {
                                document.getElementById('adminPaymentTab').classList.remove('hidden');
                            }
                        });
                    });

                    document.querySelectorAll('.accept-request').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const item = e.target.closest('[data-id]');
                            const id = item.dataset.id;
                            const type = item.dataset.type;
                            
                            if (this.data.acceptRequest(id, type)) {
                                this.toast.success('تم قبول الطلب');
                                this.openAdminPanel(); // إعادة فتح النافذة لتحديث القائمة
                            } else {
                                this.toast.error('حدث خطأ');
                            }
                        });
                    });

                    document.querySelectorAll('.reject-request').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const item = e.target.closest('[data-id]');
                            const id = item.dataset.id;
                            const type = item.dataset.type;
                            
                            if (this.data.rejectRequest(id, type)) {
                                this.toast.info('تم رفض الطلب');
                                this.openAdminPanel();
                            }
                        });
                    });

                    document.querySelectorAll('.edit-user-balance').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const userId = btn.dataset.id;
                            this.openEditBalanceModal(userId);
                        });
                    });

                    document.querySelectorAll('.toggle-user-block').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const userId = btn.dataset.id;
                            const user = this.data.getUserData(parseInt(userId));
                            user.blocked = !user.blocked;
                            this.data.updateUser(parseInt(userId), user);
                            this.toast.success(user.blocked ? 'تم حظر المستخدم' : 'تم رفع الحظر');
                            this.openAdminPanel();
                        });
                    });

                    document.getElementById('addPaymentMethodBtn')?.addEventListener('click', () => {
                        this.openPaymentMethodModal();
                    });

                    document.querySelectorAll('.edit-payment-method').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            this.openPaymentMethodModal(id);
                        });
                    });

                    document.querySelectorAll('.delete-payment-method').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            if (confirm('هل أنت متأكد من الحذف؟')) {
                                this.data.deletePaymentMethod(id);
                                this.toast.success('تم الحذف بنجاح');
                                this.openAdminPanel();
                            }
                        });
                    });
                }

                openEditBalanceModal(userId) {
                    const user = this.data.getUserData(parseInt(userId));
                    
                    const contentHtml = `
                        <h2 class="text-xl font-bold mb-4 text-center">تعديل رصيد المستخدم ${userId}</h2>
                        <div class="space-y-3">
                            <div class="text-center">
                                <span class="text-gray-400">الرصيد الحالي:</span>
                                <span class="text-xl font-bold text-white">${Utils.formatUSD(user.balance)}</span>
                            </div>
                            <div>
                                <select id="balanceOperation" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                                    <option value="add">إضافة</option>
                                    <option value="subtract">خصم</option>
                                    <option value="set">تعيين</option>
                                </select>
                            </div>
                            <div>
                                <input type="number" id="balanceAmount" placeholder="المبلغ ($)" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                            </div>
                            <div>
                                <input type="text" id="balanceReason" placeholder="السبب (اختياري)" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                            </div>
                            <button id="applyBalanceChange" class="w-full btn-primary py-2 mt-2">تطبيق</button>
                        </div>
                    `;
                    
                    this.openModal('editBalanceModalOverlay', contentHtml);
                    
                    document.getElementById('applyBalanceChange').addEventListener('click', () => {
                        const operation = document.getElementById('balanceOperation').value;
                        const amount = parseFloat(document.getElementById('balanceAmount').value);
                        const reason = document.getElementById('balanceReason').value || 'تعديل يدوي';
                        
                        if (isNaN(amount) || amount < 0) {
                            this.toast.error('أدخل مبلغ صحيح');
                            return;
                        }
                        
                        let delta = 0;
                        if (operation === 'add') delta = amount;
                        else if (operation === 'subtract') delta = -amount;
                        else delta = amount - user.balance;
                        
                        const result = this.data.updateBalance(parseInt(userId), delta, reason, 'admin');
                        if (result.success) {
                            this.toast.success(`✅ تم تعديل الرصيد بنجاح`);
                            this.closeAllModals();
                            this.openAdminPanel(); // إعادة فتح لوحة الإدارة
                        }
                    });
                }

                openPaymentMethodModal(editingId = null) {
                    const method = editingId ? this.state.paymentMethods.find(m => m.id === editingId) : null;
                    
                    const contentHtml = `
                        <h2 class="text-xl font-bold mb-4 text-center">${method ? 'تعديل طريقة دفع' : 'إضافة طريقة دفع'}</h2>
                        <form id="paymentMethodForm" class="space-y-3">
                            <input type="hidden" id="methodId" value="${method?.id || ''}">
                            
                            <div>
                                <label class="text-sm text-gray-400">صورة الطريقة</label>
                                <div class="image-upload-area" id="imageUploadArea">
                                    <input type="file" id="imageInput" accept="image/*" class="hidden">
                                    <div id="imagePreviewContainer" class="flex flex-col items-center">
                                        ${method && method.iconType === 'image' && method.icon ? 
                                            `<img src="${method.icon}" class="image-preview" id="imagePreview">` : 
                                            `<i class="fa-solid fa-cloud-upload-alt text-3xl text-gray-400 mb-2"></i>
                                             <p class="text-sm text-gray-400">انقر أو اسحب صورة</p>`
                                        }
                                    </div>
                                </div>
                                ${method && method.iconType === 'image' && method.icon ? 
                                    `<button type="button" id="deleteImageBtn" class="delete-image-btn mt-2"><i class="fa-solid fa-trash"></i></button>` : ''
                                }
                            </div>

                            <div>
                                <input type="text" id="methodName" placeholder="اسم الطريقة" value="${Utils.escapeHtml(method?.name || '')}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white" required>
                            </div>
                            <div>
                                <input type="text" id="methodIcon" placeholder="أيقونة FontAwesome" value="${method?.iconType !== 'image' ? (method?.icon || '') : ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                            </div>
                            <div>
                                <input type="text" id="methodDescription" placeholder="وصف مختصر" value="${Utils.escapeHtml(method?.description || '')}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                            </div>
                            <div>
                                <textarea id="methodDepositDetails" placeholder="تفاصيل الإيداع" rows="2" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">${Utils.escapeHtml(method?.depositDetails || '')}</textarea>
                            </div>
                            <div>
                                <input type="text" id="methodWithdrawDetails" placeholder="تفاصيل السحب" value="${Utils.escapeHtml(method?.withdrawDetails || '')}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                            </div>
                            <div class="flex gap-2 pt-2">
                                <button type="submit" class="flex-1 btn-primary py-2">حفظ</button>
                                <button type="button" id="cancelPaymentMethod" class="flex-1 bg-gray-600 py-2 rounded-lg font-bold hover:bg-gray-700 transition-colors">إلغاء</button>
                            </div>
                        </form>
                    `;
                    
                    this.openModal('paymentMethodModalOverlay', contentHtml);
                    
                    const imageInput = document.getElementById('imageInput');
                    const imageUploadArea = document.getElementById('imageUploadArea');
                    const imagePreviewContainer = document.getElementById('imagePreviewContainer');
                    
                    imageUploadArea.addEventListener('click', () => imageInput.click());
                    
                    imageUploadArea.addEventListener('dragover', (e) => {
                        e.preventDefault();
                        imageUploadArea.style.borderColor = '#3b82f6';
                    });
                    
                    imageUploadArea.addEventListener('dragleave', () => {
                        imageUploadArea.style.borderColor = 'rgba(59, 130, 246, 0.5)';
                    });
                    
                    imageUploadArea.addEventListener('drop', (e) => {
                        e.preventDefault();
                        imageUploadArea.style.borderColor = 'rgba(59, 130, 246, 0.5)';
                        const file = e.dataTransfer.files[0];
                        if (file) handleImageFile(file);
                    });
                    
                    imageInput.addEventListener('change', (e) => {
                        const file = e.target.files[0];
                        if (file) handleImageFile(file);
                    });

                    const handleImageFile = (file) => {
                        const validation = Utils.validateImage(file);
                        if (!validation.valid) {
                            this.toast.error(validation.error);
                            return;
                        }

                        const reader = new FileReader();
                        reader.onload = (e) => {
                            const imageData = e.target.result;
                            imagePreviewContainer.innerHTML = `<img src="${imageData}" class="image-preview" id="imagePreview">`;
                            imageUploadArea.dataset.imageBase64 = imageData;
                            
                            if (!document.getElementById('deleteImageBtn')) {
                                const deleteBtn = document.createElement('button');
                                deleteBtn.type = 'button';
                                deleteBtn.id = 'deleteImageBtn';
                                deleteBtn.className = 'delete-image-btn mt-2';
                                deleteBtn.innerHTML = '<i class="fa-solid fa-trash"></i>';
                                deleteBtn.addEventListener('click', () => {
                                    delete imageUploadArea.dataset.imageBase64;
                                    imageInput.value = '';
                                    imagePreviewContainer.innerHTML = `
                                        <i class="fa-solid fa-cloud-upload-alt text-3xl text-gray-400 mb-2"></i>
                                        <p class="text-sm text-gray-400">انقر أو اسحب صورة</p>
                                    `;
                                    deleteBtn.remove();
                                });
                                imageUploadArea.parentNode.appendChild(deleteBtn);
                            }
                        };
                        reader.readAsDataURL(file);
                    };

                    const deleteImageBtn = document.getElementById('deleteImageBtn');
                    if (deleteImageBtn) {
                        deleteImageBtn.addEventListener('click', () => {
                            delete imageUploadArea.dataset.imageBase64;
                            imageInput.value = '';
                            imagePreviewContainer.innerHTML = `
                                <i class="fa-solid fa-cloud-upload-alt text-3xl text-gray-400 mb-2"></i>
                                <p class="text-sm text-gray-400">انقر أو اسحب صورة</p>
                            `;
                            deleteImageBtn.remove();
                        });
                    }

                    document.getElementById('cancelPaymentMethod').addEventListener('click', () => {
                        this.closeAllModals();
                    });

                    document.getElementById('paymentMethodForm').addEventListener('submit', (e) => {
                        e.preventDefault();
                        
                        const imageBase64 = imageUploadArea.dataset.imageBase64;
                        const iconType = imageBase64 ? 'image' : 'fa';
                        const icon = imageBase64 ? imageBase64 : document.getElementById('methodIcon').value;
                        
                        const formData = {
                            name: document.getElementById('methodName').value,
                            icon: icon,
                            iconType: iconType,
                            description: document.getElementById('methodDescription').value,
                            depositDetails: document.getElementById('methodDepositDetails').value,
                            withdrawDetails: document.getElementById('methodWithdrawDetails').value
                        };
                        
                        const id = document.getElementById('methodId').value;
                        
                        if (id) {
                            this.data.updatePaymentMethod(id, formData);
                            this.toast.success('تم التحديث بنجاح');
                        } else {
                            this.data.addPaymentMethod(formData);
                            this.toast.success('تمت الإضافة بنجاح');
                        }
                        
                        this.closeAllModals();
                        this.openAdminPanel(); // إعادة فتح لوحة الإدارة
                    });
                }

                    document.querySelectorAll('.mark-read').forEach(btn => {

                            e.stopPropagation();
                            const id = btn.dataset.id;
                            this.data.markNotificationAsRead(id);
                            this.openNotificationsModal();
                        });
                    });
                }
            }

            // ==================== فئة التطبيق الرئيسية ====================
            class App {
                constructor() {
                    this.state = {
                        user: null,
                        isAdmin: false,
                        loading: true,
                        accessDenied: false,
                        telegramMissing: false,
                        theme: 'dark',
                        users: {},
                        currentUser: null,
                        depositRequests: [],
                        withdrawalRequests: [],
                        paymentMethods: [],
                        notifications: [],
                        chatMessages: [],
                        supportTickets: [],
                        faqItems: [],
                        unreadNotifications: 0,
                        settings: {
                            language: 'ar',
                            notifications: true,
                            sound: true,
                            vibrate: true,
                            autoRefresh: true
                        },
                        stats: {
                            users: 0,
                            dailyOps: 0
                        },
                        
                        set(key, value) {
                            const oldValue = this[key];
                            this[key] = value;
                            window.dispatchEvent(new CustomEvent('stateChanged', { 
                                detail: { key, value, oldValue } 
                            }));
                        }
                    };
                    
                    this.telegram = new TelegramService();
                    this.toast = new ToastManager();
                    this.data = new DataService(this.state);
                    this.ui = new UIManager(this.state, this.data, this.telegram, this.toast);
                    
                    this.init();
                }

                async init() {
                    if (!this.telegram.isAvailable) {
                        this.state.telegramMissing = true;
                        this.state.loading = false;
                        this.ui.render();
                        return;
                    }

                    this.telegram.init();

                    if (!this.telegram.isValid() || !this.telegram.getUser()) {
                        this.state.accessDenied = true;
                        this.state.loading = false;
                        this.ui.render();
                        return;
                    }

                    const user = this.telegram.getUser();
                    this.state.user = user;
                    this.state.isAdmin = (user.id === CONFIG.ADMIN_ID);

                    const userData = this.data.getUserData(user.id);
                    this.state.currentUser = userData;

                    if (!userData.name) {
                        userData.name = `${user.first_name} ${user.last_name || ''}`.trim();
                        this.data.updateUser(user.id, userData);
                    }

                    const savedTheme = this.data.loadTheme();
                    this.applyTheme(savedTheme);
                    this.loadSettings();

                    this.state.loading = true;
                    this.ui.render();

                    try {
                        await new Promise(resolve => setTimeout(resolve, 1000));
                        this.state.loading = false;
                        this.ui.render();

                        this.telegram.setMainButton(
                            this.state.isAdmin ? "لوحة التحكم" : "تحديث البيانات",
                            '#3b82f6',
                            '#ffffff',
                            true,
                            () => {
                                this.telegram.showPopup({
                                    title: this.state.isAdmin ? 'مرحباً أيها المدير' : 'نظام آمن',
                                    message: this.state.isAdmin 
                                        ? `لديك صلاحيات كاملة. الطلبات المعلقة: ${this.data.getPendingRequestsCount()}`
                                        : `أهلاً ${user.first_name}، اتصالك آمن.`,
                                    buttons: [{ type: 'ok', text: 'حسناً' }]
                                });
                            }
                        );

                        this.toast.success(`مرحباً ${user.first_name}، أهلاً بك في المحفظة المتطورة`);
                        
                        this.data.startAutoRefresh(() => this.refreshData());
                    } catch (error) {
                        console.error('Initialization error:', error);
                        this.toast.error('حدث خطأ أثناء تحميل البيانات');
                        this.state.loading = false;
                        this.ui.render();
                    }
                }

                refreshData() {
                    if (this.state.user) {
                        const userData = this.data.getUserData(this.state.user.id);
                        if (userData.balance !== this.state.currentUser?.balance) {
                            this.state.set('currentUser', userData);
                            this.showAutoUpdateIndicator('تم تحديث الرصيد تلقائياً');
                        }
                        
                        const unreadCount = this.data.getUnreadCount(this.state.user.id);
                        if (unreadCount !== this.state.unreadNotifications) {
                            this.state.set('unreadNotifications', unreadCount);
                        }
                    }
                }

                showAutoUpdateIndicator(message) {
                    const indicator = document.getElementById('autoUpdateIndicator');
                    if (indicator) {
                        indicator.classList.remove('hidden');
                        indicator.querySelector('span').textContent = message;
                        
                        setTimeout(() => {
                            indicator.classList.add('hidden');
                        }, 2000);
                    }
                }

                loadSettings() {
                    const settings = this.state.settings;
                    this.toast.soundEnabled = settings.sound;
                    this.toast.vibrateEnabled = settings.vibrate;
                    
                    const soundToggle = document.getElementById('soundToggle');
                    const vibrateToggle = document.getElementById('vibrateToggle');
                    const autoRefreshToggle = document.getElementById('autoRefreshToggle');
                    
                    if (soundToggle) soundToggle.checked = settings.sound;
                    if (vibrateToggle) vibrateToggle.checked = settings.vibrate;
                    if (autoRefreshToggle) autoRefreshToggle.checked = settings.autoRefresh;
                }

                applyTheme(theme) {
                    const root = document.documentElement;
                    const themeIcon = document.getElementById('themeIcon');
                    
                    if (theme === 'light') {
                        root.style.setProperty('--tg-theme-bg-color', '#f8fafc');
                        root.style.setProperty('--tg-theme-text-color', '#0f172a');
                        if (themeIcon) themeIcon.className = 'fa-solid fa-sun';
                    } else {
                        root.style.setProperty('--tg-theme-bg-color', '#0f172a');
                        root.style.setProperty('--tg-theme-text-color', '#ffffff');
                        if (themeIcon) themeIcon.className = 'fa-solid fa-moon';
                    }
                }
            }

            // ==================== تشغيل التطبيق ====================
            const app = new App();

            // ==================== مستمعو الأحداث العامة ====================
            document.getElementById('themeToggle').addEventListener('click', () => {
                const newTheme = app.state.theme === 'dark' ? 'light' : 'dark';
                app.state.theme = newTheme;
                app.data.saveTheme(newTheme);
                app.applyTheme(newTheme);
                app.toast.info(`تم تغيير السمة إلى ${newTheme === 'dark' ? 'الداكنة' : 'الفاتحة'}`);
            });

            console.log('✅ تم تشغيل التطبيق بنجاح مع التحسينات');
        })();
    </script>
</body>
</html>
