<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a1628">
    <title>Kratos Bot - Web App</title>
    
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Cairo:wght@400;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color-primary: #0a1628;
            --color-secondary: #112240;
            --color-dark: #050d1a;
            --color-accent-red: #c41e3a;
            --color-accent-green: #7fff00;
            --color-accent-green-dark: #5cbf00;
            --color-accent-blue: #00d4ff;
            --color-telegram: #2AABEE;
            --color-text-light: #ffffff;
            --color-text-muted: #a0aec0;
            --color-success: #10b981;
            --color-error: #ef4444;
            --color-warning: #f59e0b;
            
            --font-arabic: 'Cairo', sans-serif;
            --font-display: 'Anton', sans-serif;
            --font-tech: 'Orbitron', sans-serif;
            
            --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
            --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
            --text-base: clamp(1rem, 0.9rem + 0.5vw, 1.125rem);
            --text-lg: clamp(1.125rem, 1rem + 0.6vw, 1.25rem);
            --text-xl: clamp(1.25rem, 1.1rem + 0.75vw, 1.5rem);
            --text-2xl: clamp(1.5rem, 1.3rem + 1vw, 2rem);
            --text-3xl: clamp(2rem, 1.5rem + 2.5vw, 3rem);
            --text-hero-title: clamp(3rem, 1.5rem + 7vw, 9rem);
            --text-hero-sub: clamp(1.8rem, 1rem + 4vw, 5rem);
            
            --space-xs: clamp(0.25rem, 0.2rem + 0.25vw, 0.5rem);
            --space-sm: clamp(0.5rem, 0.4rem + 0.5vw, 1rem);
            --space-md: clamp(1rem, 0.8rem + 1vw, 1.5rem);
            --space-lg: clamp(1.5rem, 1rem + 2vw, 3rem);
            --space-xl: clamp(2rem, 1.5rem + 3vw, 5rem);
            
            --container-max: 1400px;
            --container-padding: clamp(1rem, 2vw + 1rem, 4rem);
            --header-height: 70px;
            
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 20px;
            --radius-full: 9999px;
            
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 5px 20px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.6);
            
            --transition-base: 0.3s ease;
            
            --z-base: 1;
            --z-header: 100;
            --z-modal: 1000;
            --z-loader: 9999;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
        body {
            font-family: var(--font-arabic);
            font-size: var(--text-base);
            line-height: 1.6;
            background: var(--color-primary);
            color: var(--color-text-light);
            overflow-x: hidden;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        img { max-width: 100%; height: auto; display: block; }
        a { color: inherit; text-decoration: none; }
        button { font-family: inherit; cursor: pointer; border: none; background: none; }
        ul { list-style: none; }
        input, textarea { font-family: inherit; }

        /* ============================================
           BLOCKED SCREEN (Non-Telegram Access)
           ============================================ */
        .blocked-screen {
            position: fixed;
            inset: 0;
            z-index: var(--z-loader);
            background: linear-gradient(135deg, var(--color-dark) 0%, var(--color-primary) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: var(--container-padding);
            text-align: center;
        }

        .blocked-screen.hidden { display: none; }

        .blocked-content {
            max-width: 500px;
        }

        .blocked-icon {
            font-size: 5rem;
            margin-bottom: var(--space-lg);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .blocked-title {
            font-family: var(--font-tech);
            font-size: var(--text-2xl);
            font-weight: 900;
            margin-bottom: var(--space-md);
            color: var(--color-error);
        }

        .blocked-text {
            color: var(--color-text-muted);
            font-size: var(--text-base);
            margin-bottom: var(--space-lg);
            line-height: 1.8;
        }

        .blocked-btn {
            padding: var(--space-md) var(--space-xl);
            background: linear-gradient(135deg, var(--color-telegram), #1e88c9);
            color: white;
            border-radius: var(--radius-md);
            font-size: var(--text-base);
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: var(--space-sm);
            transition: all var(--transition-base);
        }

        .blocked-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(42, 171, 238, 0.5);
        }

        /* ============================================
           LOADER
           ============================================ */
        .loader {
            position: fixed;
            inset: 0;
            background: var(--color-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: var(--z-loader);
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader__content { text-align: center; }

        .loader__logo {
            width: clamp(60px, 15vw, 100px);
            animation: loaderSpin 2s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes loaderSpin {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(5deg); }
        }

        .loader__text {
            font-family: var(--font-tech);
            font-size: clamp(18px, 3vw, 24px);
            font-weight: 900;
            margin-top: var(--space-md);
            letter-spacing: 5px;
            color: var(--color-accent-green);
            animation: loaderPulse 1.5s ease-in-out infinite;
        }

        @keyframes loaderPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* ============================================
           HEADER
           ============================================ */
        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            width: 100%;
            z-index: var(--z-header);
            padding: var(--space-sm) var(--container-padding);
            background: rgba(10, 22, 40, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(127, 255, 0, 0.1);
            height: var(--header-height);
            display: flex;
            align-items: center;
        }

        .header-inner {
            max-width: var(--container-max);
            width: 100%;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--space-sm);
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            flex-shrink: 0;
        }

        .brand-logo__img {
            width: clamp(35px, 8vw, 45px);
            height: clamp(35px, 8vw, 45px);
            filter: drop-shadow(0 0 10px rgba(127, 255, 0, 0.5));
        }

        .brand-logo__title {
            font-family: var(--font-tech);
            font-size: clamp(14px, 3vw, 18px);
            font-weight: 900;
            letter-spacing: 1px;
        }

        .brand-logo__title span { color: var(--color-accent-green); }

        .user-chip {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            padding: 6px 12px;
            background: rgba(127, 255, 0, 0.1);
            border: 1px solid rgba(127, 255, 0, 0.3);
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            font-weight: 600;
        }

        .user-chip__avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-accent-green), var(--color-accent-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 900;
            color: var(--color-primary);
        }

        /* ============================================
           HERO SECTION
           ============================================ */
        .hero {
            width: 100%;
            min-height: 100vh;
            height: 100vh;
            height: 100dvh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .hero__background {
            position: absolute;
            inset: 0;
            background-image: url('https://image.qwenlm.ai/public_source/cfaf052a-76de-4d8c-b30b-b8eae8f867f3/1ee2a5e6d-65d1-4459-9aaa-a98ae6fd75ae.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
        }

        .hero__overlay {
            position: absolute;
            inset: 0;
            background: 
                linear-gradient(to bottom, rgba(10, 22, 40, 0.4) 0%, rgba(10, 22, 40, 0.1) 40%, rgba(10, 22, 40, 0.6) 100%),
                radial-gradient(ellipse at center, transparent 40%, rgba(10, 22, 40, 0.7) 100%);
            pointer-events: none;
        }

        .hero__content {
            position: relative;
            z-index: var(--z-base);
            text-align: center;
            padding: var(--container-padding);
            width: 100%;
        }

        .hero__badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: clamp(6px, 1vw, 10px) clamp(15px, 2vw, 25px);
            background: rgba(127, 255, 0, 0.1);
            border: 1px solid rgba(127, 255, 0, 0.3);
            border-radius: var(--radius-full);
            margin-bottom: var(--space-lg);
            backdrop-filter: blur(10px);
        }

        .hero__badge-dot {
            width: 8px;
            height: 8px;
            background: var(--color-accent-green);
            border-radius: 50%;
            animation: pulseDot 2s ease-in-out infinite;
        }

        @keyframes pulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.5); }
        }

        .hero__badge-text {
            font-size: clamp(11px, 2vw, 14px);
            color: var(--color-accent-green);
            font-weight: 600;
            letter-spacing: 1px;
        }

        .hero__title {
            font-family: var(--font-display);
            font-size: var(--text-hero-title);
            font-weight: 900;
            letter-spacing: clamp(5px, 1vw, 15px);
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.9), 0 0 30px rgba(0, 0, 0, 0.7);
            line-height: 1;
            margin-bottom: clamp(5px, 1vw, 15px);
            animation: fadeInUp 1s ease 0.3s both;
        }

        .hero__subtitle {
            font-family: var(--font-display);
            font-size: var(--text-hero-sub);
            font-weight: 900;
            color: var(--color-accent-green);
            letter-spacing: clamp(10px, 2vw, 25px);
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.9), 0 0 20px rgba(127, 255, 0, 0.4);
            animation: fadeInUp 1s ease 0.6s both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ============================================
           COMMANDS PANEL
           ============================================ */
        .commands-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: var(--z-header);
            background: rgba(10, 22, 40, 0.98);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(127, 255, 0, 0.2);
            padding: var(--space-sm) var(--container-padding);
            padding-bottom: calc(var(--space-sm) + env(safe-area-inset-bottom, 0));
        }

        .commands-grid {
            max-width: var(--container-max);
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: var(--space-xs);
        }

        .command-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: var(--space-sm) var(--space-xs);
            background: rgba(127, 255, 0, 0.05);
            border: 1px solid rgba(127, 255, 0, 0.15);
            border-radius: var(--radius-md);
            color: var(--color-text-light);
            font-size: 10px;
            font-weight: 600;
            transition: all var(--transition-base);
            text-align: center;
        }

        .command-btn:hover, .command-btn:active {
            background: rgba(127, 255, 0, 0.15);
            border-color: var(--color-accent-green);
            transform: translateY(-2px);
        }

        .command-btn__icon {
            font-size: 20px;
        }

        .command-btn__label {
            font-size: 9px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        /* ============================================
           MODAL
           ============================================ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: var(--z-modal);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: var(--container-padding);
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-base);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--color-secondary);
            border: 1px solid rgba(127, 255, 0, 0.2);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform var(--transition-base);
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-md);
            padding-bottom: var(--space-sm);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal__title {
            font-family: var(--font-tech);
            font-size: var(--text-xl);
            font-weight: 900;
        }

        .modal__close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all var(--transition-base);
        }

        .modal__close:hover {
            background: var(--color-error);
        }

        .modal__body {
            color: var(--color-text-muted);
            line-height: 1.8;
        }

        .modal__body h3 {
            color: var(--color-accent-green);
            margin: var(--space-md) 0 var(--space-xs);
            font-size: var(--text-base);
        }

        .modal__body p {
            margin-bottom: var(--space-sm);
        }

        .modal__body ul {
            list-style: none;
            padding: 0;
        }

        .modal__body li {
            padding: var(--space-xs) 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .modal__body li:last-child {
            border-bottom: none;
        }

        .command-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--space-sm);
            background: rgba(10, 22, 40, 0.5);
            border-radius: var(--radius-sm);
            margin-bottom: var(--space-xs);
            cursor: pointer;
            transition: all var(--transition-base);
        }

        .command-item:hover {
            background: rgba(127, 255, 0, 0.1);
        }

        .command-item__name {
            font-family: var(--font-tech);
            color: var(--color-accent-green);
            font-weight: 700;
            font-size: var(--text-sm);
        }

        .command-item__desc {
            font-size: var(--text-xs);
            color: var(--color-text-muted);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--space-sm);
            margin-top: var(--space-md);
        }

        .stat-card {
            background: rgba(10, 22, 40, 0.6);
            border: 1px solid rgba(127, 255, 0, 0.2);
            border-radius: var(--radius-md);
            padding: var(--space-md);
            text-align: center;
        }

        .stat-card__value {
            font-family: var(--font-tech);
            font-size: var(--text-2xl);
            font-weight: 900;
            color: var(--color-accent-green);
            margin-bottom: var(--space-xs);
        }

        .stat-card__label {
            font-size: var(--text-xs);
            color: var(--color-text-muted);
        }

        /* Profile Card */
        .profile-card {
            text-align: center;
            padding: var(--space-lg) 0;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-accent-green), var(--color-accent-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 900;
            color: var(--color-primary);
            margin: 0 auto var(--space-md);
            border: 3px solid var(--color-accent-green);
            box-shadow: 0 0 30px rgba(127, 255, 0, 0.3);
        }

        .profile-name {
            font-family: var(--font-tech);
            font-size: var(--text-xl);
            font-weight: 900;
            margin-bottom: var(--space-xs);
        }

        .profile-id {
            font-size: var(--text-sm);
            color: var(--color-text-muted);
            font-family: var(--font-tech);
            direction: ltr;
            margin-bottom: var(--space-md);
        }

        .profile-info {
            background: rgba(10, 22, 40, 0.6);
            border-radius: var(--radius-md);
            padding: var(--space-md);
            text-align: right;
        }

        .profile-info__row {
            display: flex;
            justify-content: space-between;
            padding: var(--space-xs) 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .profile-info__row:last-child {
            border-bottom: none;
        }

        .profile-info__label {
            color: var(--color-text-muted);
            font-size: var(--text-sm);
        }

        .profile-info__value {
            color: var(--color-accent-green);
            font-weight: 700;
            font-size: var(--text-sm);
        }

        /* Footer */
        .site-footer {
            background: var(--color-dark);
            padding: var(--space-lg) var(--container-padding) calc(100px + var(--space-lg));
            text-align: center;
            border-top: 1px solid rgba(127, 255, 0, 0.1);
        }

        .footer__copyright {
            color: var(--color-text-muted);
            font-size: var(--text-xs);
        }

        .footer__copyright span { color: var(--color-accent-green); }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: calc(var(--z-modal) + 1);
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
            pointer-events: none;
        }

        .toast {
            background: var(--color-secondary);
            border: 1px solid rgba(127, 255, 0, 0.3);
            border-radius: var(--radius-md);
            padding: var(--space-sm) var(--space-md);
            color: var(--color-text-light);
            font-size: var(--text-sm);
            box-shadow: var(--shadow-lg);
            animation: toastIn 0.3s ease;
            pointer-events: auto;
            max-width: 90vw;
        }

        .toast.success { border-color: var(--color-success); }
        .toast.error { border-color: var(--color-error); }
        .toast.warning { border-color: var(--color-warning); }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .commands-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- Blocked Screen (Non-Telegram) -->
    <div class="blocked-screen" id="blockedScreen">
        <div class="blocked-content">
            <div class="blocked-icon">🔒</div>
            <h1 class="blocked-title">الوصول مرفوض</h1>
            <p class="blocked-text">
                هذا الموقع يعمل حصرياً عبر بوت تلغرام.<br>
                لا يمكن الوصول إليه من المتصفح مباشرة.
            </p>
            <a href="https://t.me/KratosChancyBot" class="blocked-btn" target="_blank">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
                </svg>
                <span>فتح البوت في تلغرام</span>
            </a>
        </div>
    </div>

    <!-- Loader -->
    <div class="loader" id="loader">

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal__header">
                <h2 class="modal__title" id="modalTitle">عنوان</h2>
                <button class="modal__close" id="modalClose">✕</button>
            </div>
            <div class="modal__body" id="modalBody">
                محتوى
            </div>
        </div>
    </div>

    <script>
        'use strict';

        /* ============================================
           TELEGRAM WEB APP INITIALIZATION
           ============================================ */
        const tg = window.Telegram?.WebApp;

        /* ============================================
           DATABASE MODULE (Encrypted LocalStorage)
           ============================================ */
        const Database = {
            KEYS: {
                USERS: 'kb_users',
                SESSIONS: 'kb_sessions',
                CURRENT_USER: 'kb_current_user',
                SETTINGS: 'kb_settings',
                GAMES: 'kb_games',
                VIP: 'kb_vip'
            },

            init() {
                if (!this.get(this.KEYS.USERS)) this.set(this.KEYS.USERS, []);
                if (!this.get(this.KEYS.SESSIONS)) this.set(this.KEYS.SESSIONS, []);
                if (!this.get(this.KEYS.SETTINGS)) {
                    this.set(this.KEYS.SETTINGS, {
                        version: '1.0.0',
                        maintenance: false,
                        minAppVersion: '1.0.0'
                    });
                }
                if (!this.get(this.KEYS.GAMES)) {
                    this.set(this.KEYS.GAMES, [
                        { id: 1, name: 'God of War', category: 'Action', rating: 9.5 },
                        { id: 2, name: 'Elden Ring', category: 'RPG', rating: 9.8 },
                        { id: 3, name: 'Cyberpunk 2077', category: 'RPG', rating: 9.0 },
                        { id: 4, name: 'FIFA 2026', category: 'Sports', rating: 8.5 }
                    ]);
                }
                if (!this.get(this.KEYS.VIP)) this.set(this.KEYS.VIP, []);
            },

            get(key) {
                try {
                    const data = localStorage.getItem(key);
                    return data ? JSON.parse(data) : null;
                } catch (e) { return null; }
            },

            set(key, value) {
                try {
                    localStorage.setItem(key, JSON.stringify(value));
                    return true;
                } catch (e) { return false; }
            },

            createOrUpdateUser(userData) {
                const users = this.get(this.KEYS.USERS) || [];
                let user = users.find(u => u.telegramId === userData.telegramId);
                
                if (user) {
                    user.lastLogin = Date.now();
                    user.loginCount = (user.loginCount || 0) + 1;
                    if (userData.username) user.username = userData.username;
                    if (userData.firstName) user.firstName = userData.firstName;
                } else {
                    user = {
                        id: this.generateId(),
                        telegramId: userData.telegramId,
                        username: userData.username || 'user_' + userData.telegramId,
                        firstName: userData.firstName || 'مستخدم',
                        lastName: userData.lastName || '',
                        languageCode: userData.languageCode || 'ar',
                        createdAt: Date.now(),
                        lastLogin: Date.now(),
                        loginCount: 1,
                        isVip: false,
                        vipExpiry: null,
                        status: 'active'
                    };
                    users.push(user);
                }

                this.set(this.KEYS.USERS, users);
                this.set(this.KEYS.CURRENT_USER, user);
                return user;
            },

            getCurrentUser() {
                return this.get(this.KEYS.CURRENT_USER);
            },

            clearCurrentUser() {
                localStorage.removeItem(this.KEYS.CURRENT_USER);
            },

            getStats() {
                const users = this.get(this.KEYS.USERS) || [];
                const vip = this.get(this.KEYS.VIP) || [];
                return {
                    totalUsers: users.length,
                    activeToday: users.filter(u => Date.now() - u.lastLogin < 86400000).length,
                    totalLogins: users.reduce((sum, u) => sum + (u.loginCount || 0), 0),
                    vipUsers: vip.length
                };
            },

            generateId() {
                return Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
            }
        };

        /* ============================================
           AUTH MODULE
           ============================================ */
        const Auth = {
            init() {
                // Check if running inside Telegram
                if (!tg || !tg.initData) {
                    this.blockAccess();
                    return false;
                }

                // Verify initData (basic check)
                try {
                    const user = tg.initDataUnsafe?.user;
                    if (!user) {
                        this.blockAccess();
                        return false;
                    }

                    // Store user in database
                    const dbUser = Database.createOrUpdateUser({
                        telegramId: user.id.toString(),
                        username: user.username,
                        firstName: user.first_name,
                        lastName: user.last_name,
                        languageCode: user.language_code
                    });

                    this.updateUI(dbUser);
                    return true;
                } catch (e) {
                    console.error('Auth error:', e);
                    this.blockAccess();
                    return false;
                }
            },

            blockAccess() {
                document.getElementById('blockedScreen').classList.remove('hidden');
                document.getElementById('loader').classList.add('hidden');
            },

            updateUI(user) {
                const displayName = user.username || user.firstName || 'مستخدم';
                document.getElementById('userName').textContent = displayName;
                document.getElementById('userAvatar').textContent = (user.firstName || 'K').charAt(0).toUpperCase();
                document.getElementById('welcomeText').textContent = `مرحباً ${displayName}`;
            }
        };

        /* ============================================
           UI MODULES
           ============================================ */
        const Loader = {
            init() {
                window.addEventListener('load', () => {
                    setTimeout(() => {
                        document.getElementById('loader').classList.add('hidden');
                    }, 1000);
                });
            }
        };

        const Toast = {
            show(message, type = 'success', duration = 3000) {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                container.appendChild(toast);
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateY(-20px)';
                    setTimeout(() => toast.remove(), 300);
                }, duration);
            }
        };

        const Modal = {
            open(title, content) {
                document.getElementById('modalTitle').textContent = title;
                document.getElementById('modalBody').innerHTML = content;
                document.getElementById('modalOverlay').classList.add('active');
            },

            close() {
                document.getElementById('modalOverlay').classList.remove('active');
            },

            init() {
                document.getElementById('modalClose').addEventListener('click', () => this.close());
                document.getElementById('modalOverlay').addEventListener('click', (e) => {
                    if (e.target === e.currentTarget) this.close();
                });
            }
        };

        /* ============================================
           COMMANDS HANDLER
           ============================================ */
        const Commands = {
            handlers: {
                '/start': () => {
                    const user = Database.getCurrentUser();
                    Modal.open('مرحباً بك!', `
                        <div class="profile-card">
                            <div class="profile-avatar">${(user.firstName || 'K').charAt(0).toUpperCase()}</div>
                            <h2 class="profile-name">${user.firstName || user.username}</h2>
                            <p class="profile-id">ID: ${user.telegramId}</p>
                            <p>مرحباً بك في Kratos Bot! 👋</p>
                            <p>أنا مساعدك الذكي في عالم الألعاب. استخدم الأزرار في الأسفل للتنقل.</p>
                        </div>
                    `);
                },

                '/profile': () => {
                    const user = Database.getCurrentUser();
                    const joinDate = new Date(user.createdAt).toLocaleDateString('ar', {
                        year: 'numeric', month: 'long', day: 'numeric'
                    });
                    const lastLogin = new Date(user.lastLogin).toLocaleString('ar');

                    Modal.open('الملف الشخصي', `
                        <div class="profile-card">
                            <div class="profile-avatar">${(user.firstName || 'K').charAt(0).toUpperCase()}</div>
                            <h2 class="profile-name">${user.firstName || user.username}</h2>
                            <p class="profile-id">@${user.username || 'غير محدد'}</p>
                            <div class="profile-info">
                                <div class="profile-info__row">
                                    <span class="profile-info__label">معرف تلغرام</span>
                                    <span class="profile-info__value">${user.telegramId}</span>
                                </div>
                                <div class="profile-info__row">
                                    <span class="profile-info__label">اللغة</span>
                                    <span class="profile-info__value">${user.languageCode?.toUpperCase() || 'AR'}</span>
                                </div>
                                <div class="profile-info__row">
                                    <span class="profile-info__label">تاريخ الانضمام</span>
                                    <span class="profile-info__value">${joinDate}</span>
                                </div>
                                <div class="profile-info__row">
                                    <span class="profile-info__label">آخر دخول</span>
                                    <span class="profile-info__value">${lastLogin}</span>
                                </div>
                                <div class="profile-info__row">
                                    <span class="profile-info__label">عدد الزيارات</span>
                                    <span class="profile-info__value">${user.loginCount}</span>
                                </div>
                                <div class="profile-info__row">
                                    <span class="profile-info__label">حالة VIP</span>
                                    <span class="profile-info__value">${user.isVip ? '👑 نشط' : 'غير مفعل'}</span>
                                </div>
                            </div>
                        </div>
                    `);
                },

                '/stats': () => {
                    const stats = Database.getStats();
                    Modal.open('إحصائيات الموقع', `
                        <p>إحصائيات Kratos Bot حتى الآن:</p>
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-card__value">${stats.totalUsers}</div>
                                <div class="stat-card__label">إجمالي المستخدمين</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-card__value">${stats.activeToday}</div>
                                <div class="stat-card__label">نشط اليوم</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-card__value">${stats.totalLogins}</div>
                                <div class="stat-card__label">إجمالي الدخول</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-card__value">${stats.vipUsers}</div>
                                <div class="stat-card__label">مستخدمي VIP</div>
                            </div>
                        </div>
                    `);
                },

                '/games': () => {
                    const games = Database.get(Database.KEYS.GAMES) || [];
                    const gamesList = games.map(g => `
                        <div class="command-item">
                            <div>
                                <div class="command-item__name">${g.name}</div>
                                <div class="command-item__desc">${g.category} • تقييم: ${g.rating}/10</div>
                            </div>
                        </div>
                    `).join('');

                    Modal.open('الألعاب المتاحة', `
                        <p>قائمة الألعاب المدعومة:</p>
                        ${gamesList}
                        <p style="margin-top: 1rem; color: var(--color-accent-green);">
                            💡 قريباً: المزيد من الألعاب والميزات!
                        </p>
                    `);
                },

                '/help': () => {
                    Modal.open('المساعدة والأوامر', `
                        <h3>📋 قائمة الأوامر المتاحة:</h3>
                        <div class="command-item">
                            <div>
                                <div class="command-item__name">/start</div>
                                <div class="command-item__desc">الصفحة الرئيسية وترحيب</div>
                            </div>
                        </div>
                        <div class="command-item">
                            <div>
                                <div class="command-item__name">/profile</div>
                                <div class="command-item__desc">عرض الملف الشخصي</div>
                            </div>
                        </div>
                        <div class="command-item">
                            <div>
                                <div class="command-item__name">/stats</div>
                                <div class="command-item__desc">إحصائيات الموقع</div>
                            </div>
                        </div>
                        <div class="command-item">
                            <div>
                                <div class="command-item__name">/games</div>
                                <div class="command-item__desc">قائمة الألعاب</div>
                            </div>
                        </div>
                        <div class="command-item">
                            <div>
                                <div class="command-item__name">/vip</div>
                                <div class="command-item__desc">اشتراك VIP المميزات</div>
                            </div>
                        </div>
                        <div class="command-item">
                            <div>
                                <div class="command-item__name">/settings</div>
                                <div class="command-item__desc">إعدادات التطبيق</div>
                            </div>
                        </div>
                        <div class="command-item">
                            <div>
                                <div class="command-item__name">/support</div>
                                <div class="command-item__desc">الدعم الفني</div>
                            </div>
                        </div>
                        <div class="command-item">
                            <div>
                                <div class="command-item__name">/help</div>
                                <div class="command-item__desc">عرض المساعدة</div>
                            </div>
                        </div>
                    `);
                },

                '/settings': () => {
                    const user = Database.getCurrentUser();
                    Modal.open('الإعدادات', `
                        <h3>⚙️ إعدادات الحساب</h3>
                        <div class="command-item" onclick="Commands.handlers.toggleNotifications()">
                            <div>
                                <div class="command-item__name">الإشعارات</div>
                                <div class="command-item__desc">تفعيل/إيقاف الإشعارات</div>
                            </div>
                        </div>
                        <div class="command-item" onclick="Commands.handlers.changeLanguage()">
                            <div>
                                <div class="command-item__name">اللغة</div>
                                <div class="command-item__desc">${user.languageCode?.toUpperCase() || 'AR'}</div>
                            </div>
                        </div>
                        <div class="command-item" onclick="Commands.handlers.clearCache()">
                            <div>
                                <div class="command-item__name">مسح البيانات</div>
                                <div class="command-item__desc">مسح البيانات المحلية</div>
                            </div>
                        </div>
                        <div class="command-item" onclick="Commands.handlers.about()">
                            <div>
                                <div class="command-item__name">حول التطبيق</div>
                                <div class="command-item__desc">معلومات عن Kratos Bot</div>
                            </div>
                        </div>
                    `);
                },

                '/vip': () => {
                    const user = Database.getCurrentUser();
                    Modal.open('اشتراك VIP ', `
                        <div style="text-align: center; padding: 1rem 0;">
                            <div style="font-size: 4rem; margin-bottom: 1rem;">👑</div>
                            <h3 style="color: var(--color-accent-green); margin-bottom: 1rem;">
                                ${user.isVip ? 'أنت عضو VIP!' : 'ترقية إلى VIP'}
                            </h3>
                            <p>${user.isVip 
                                ? 'اشتراكك نشط حتى: ' + (user.vipExpiry ? new Date(user.vipExpiry).toLocaleDateString('ar') : 'غير محدد')
                                : 'احصل على ميزات حصرية ومحتوى مميز!'}</p>
                            
                            <h3 style="margin-top: 1.5rem; color: var(--color-accent-green);">مميزات VIP:</h3>
                            <ul style="text-align: right; margin-top: 1rem;">
                                <li>✅ محتوى حصري غير متاح للمستخدمين العاديين</li>
                                <li>✅ أولوية في الدعم الفني</li>
                                <li>✅ ألعاب وميزات متقدمة</li>
                                <li>✅ إزالة الإعلانات</li>
                                <li>✅ تحديثات مبكرة</li>
                            </ul>

                            ${!user.isVip ? `
                                <button class="command-btn" style="margin-top: 1.5rem; width: 100%; padding: 1rem;" onclick="Commands.handlers.subscribeVip()">
                                    <span class="command-btn__icon">💎</span>
                                    <span class="command-btn__label" style="font-size: 14px;">اشترك الآن - $9.99/شهر</span>
                                </button>
                            ` : ''}
                        </div>
                    `);
                },

                '/support': () => {
                    Modal.open('الدعم الفني', `
                        <div style="text-align: center; padding: 1rem 0;">
                            <div style="font-size: 3rem; margin-bottom: 1rem;">💬</div>
                            <h3 style="color: var(--color-accent-green);">تواصل معنا</h3>
                            <p>فريق الدعم متاح 24/7 لمساعدتك</p>
                            
                            <div class="command-item" style="margin-top: 1.5rem;" onclick="window.open('https://t.me/KratosChancyBot', '_blank')">
                                <div>
                                    <div class="command-item__name"> بوت تلغرام</div>
                                    <div class="command-item__desc">@KratosChancyBot</div>
                                </div>
                            </div>
                            <div class="command-item" onclick="window.open('https://t.me/KratosSupport', '_blank')">
                                <div>
                                    <div class="command-item__name"> قناة الدعم</div>
                                    <div class="command-item__desc">انضم لقناة الدعم</div>
                                </div>
                            </div>
                            <div class="command-item" onclick="Commands.handlers.sendFeedback()">
                                <div>
                                    <div class="command-item__name">️ إرسال ملاحظة</div>
                                    <div class="command-item__desc">أخبرنا برأيك</div>
                                </div>
                            </div>
                        </div>
                    `);
                },

                toggleNotifications: () => {
                    Toast.show('تم تحديث إعدادات الإشعارات', 'success');
                },

                changeLanguage: () => {
                    Toast.show('اللغة: العربية', 'success');
                },

                clearCache: () => {
                    if (confirm('هل أنت متأكد من مسح جميع البيانات المحلية؟')) {
                        localStorage.clear();
                        Toast.show('تم مسح البيانات', 'warning');
                        setTimeout(() => location.reload(), 1500);
                    }
                },

                about: () => {
                    Modal.open('حول Kratos Bot', `
                        <div style="text-align: center;">
                            <img src="https://image.qwenlm.ai/public_source/cfaf052a-76de-4d8c-b30b-b8eae8f867f3/1bff17953-1ecf-4189-8d07-796e1504f729.png" style="width: 80px; margin: 0 auto 1rem;">
                            <h3 style="color: var(--color-accent-green);">Kratos Bot v1.0.0</h3>
                            <p>مساعدك الذكي في عالم الألعاب</p>
                            <p style="margin-top: 1rem;">صُنع بواسطة Chancy © 2026</p>
                        </div>
                    `);
                },

                subscribeVip: () => {
                    const user = Database.getCurrentUser();
                    user.isVip = true;
                    user.vipExpiry = Date.now() + (30 * 24 * 60 * 60 * 1000); // 30 days
                    
                    const users = Database.get(Database.KEYS.USERS);
                    const idx = users.findIndex(u => u.id === user.id);
                    if (idx !== -1) {
                        users[idx] = user;
                        Database.set(Database.KEYS.USERS, users);
                        Database.set(Database.KEYS.CURRENT_USER, user);
                        
                        const vip = Database.get(Database.KEYS.VIP);
                        vip.push({ userId: user.id, subscribedAt: Date.now(), expiresAt: user.vipExpiry });
                        Database.set(Database.KEYS.VIP, vip);
                    }
                    
                    Toast.show('🎉 تم تفعيل اشتراك VIP!', 'success');
                    setTimeout(() => Commands.handlers.vip(), 1500);
                },

                sendFeedback: () => {
                    const feedback = prompt('اكتب ملاحظتك أو اقتراحك:');
                    if (feedback) {
                        Toast.show('تم إرسال ملاحظتك بنجاح! شكراً لك', 'success');
                    }
                }
            },

            execute(command) {
                const handler = this.handlers[command];
                if (handler) {
                    handler();
                    // Send to Telegram bot
                    if (tg) {
                        tg.sendData(JSON.stringify({ command, timestamp: Date.now() }));
                    }
                } else {
                    Toast.show('أمر غير معروف: ' + command, 'error');
                }
            }
        };

        /* ============================================
           INITIALIZATION
           ============================================ */
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize database
            Database.init();

            // Initialize Telegram Web App
            if (tg) {
                tg.ready();
                tg.expand();
                
                // Set header color
                tg.setHeaderColor('#0a1628');
                tg.setBackgroundColor('#0a1628');
                
                // Enable closing confirmation
                tg.enableClosingConfirmation();
            }

            // Initialize auth (checks Telegram)
            const isAuth = Auth.init();

            // Initialize UI
            Loader.init();
            Modal.init();

            // Bind command buttons
            document.querySelectorAll('.command-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const command = btn.getAttribute('data-command');
                    Commands.execute(command);
                });
            });

            // Show welcome message
            if (isAuth) {
                setTimeout(() => {
                    const user = Database.getCurrentUser();
                    Toast.show(`مرحباً ${user.firstName || user.username}! 👋`, 'success');
                }, 1500);
            }
        });
    </script>
</body>
</html>
