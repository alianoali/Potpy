                            <div class="mb-3">
                                <label class="block text-sm text-gray-400 mb-1">الاسم</label>
                                <input type="text" id="productName" class="custom-input" value="${product?.name || ''}" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="block text-sm text-gray-400 mb-1">الوصف</label>
                                <textarea id="productDescription" rows="2" class="custom-input">${product?.description || ''}</textarea>
                            </div>
                            
                            <div class="mb-3">
                                <label class="block text-sm text-gray-400 mb-1">السعر</label>
                                <input type="number" id="productPrice" class="custom-input" value="${product?.price || ''}" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="block text-sm text-gray-400 mb-1">القسم</label>
                                <select id="productCategoryId" class="custom-input">
                                    ${categoryOptions}
                                </select>
                            </div>
                            
                            <div class="mb-3">
                                <label class="block text-sm text-gray-400 mb-1">الأيقونة</label>
                                <input type="text" id="productIcon" class="custom-input" value="${product?.icon || 'fa-box'}" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="block text-sm text-gray-400 mb-1">المخزون (-1 لغير محدود)</label>
                                <input type="number" id="productStock" class="custom-input" value="${product?.stock ?? -1}">
                            </div>
                            
                            <div class="mb-3">
                                <label class="block text-sm text-gray-400 mb-1">الخصم (%)</label>
                                <input type="number" id="productDiscount" class="custom-input" value="${product?.discount || 0}" min="0" max="100">
                            </div>
                            
                            <div class="mb-3">
                                <label class="block text-sm text-gray-400 mb-1">التقييم</label>
                                <input type="number" id="productRating" class="custom-input" value="${product?.rating || 0}" step="0.1" min="0" max="5">
                            </div>
                            
                            <div class="mb-3">
                                <label class="block text-sm text-gray-400 mb-1">الحقول المطلوبة (JSON)</label>
                                <textarea id="productFields" rows="4" class="custom-input">${JSON.stringify(product?.inputFields || [], null, 2)}</textarea>
                                <p class="text-xs text-gray-400 mt-1">مثال: [{"name":"userId","label":"معرف المستخدم","type":"text","required":true}]</p>
                            </div>
                            
                            <div class="mb-3">
                                <label class="block text-sm text-gray-400 mb-1">بيانات التسليم (JSON)</label>
                                <textarea id="productFulfillment" rows="3" class="custom-input">${JSON.stringify(product?.fulfillment || { type: 'manual' }, null, 2)}</textarea>
                            </div>
                            
                            <div class="flex gap-2 mt-4">
                                <button type="submit" class="btn-primary flex-1">حفظ</button>
                                <button type="button" class="btn-secondary flex-1" id="cancelBtn">إلغاء</button>
                            </div>
                        </form>
                    `;
                    
                    this.modalOverlay.classList.add('active');
                    
                    const closeBtn = this.modalContent.querySelector('.close-modal');
                    closeBtn?.addEventListener('click', () => this.modalOverlay.classList.remove('active'));
                    
                    this.modalContent.getElementById('cancelBtn')?.addEventListener('click', () => {
                        this.modalOverlay.classList.remove('active');
                    });
                    
                    this.modalContent.getElementById('productForm')?.addEventListener('submit', (e) => {
                        e.preventDefault();
                        
                        try {
                            const formData = {
                                name: this.modalContent.getElementById('productName').value,
                                description: this.modalContent.getElementById('productDescription').value,
                                price: parseFloat(this.modalContent.getElementById('productPrice').value),
                                categoryId: this.modalContent.getElementById('productCategoryId').value,
                                icon: this.modalContent.getElementById('productIcon').value,
                                stock: parseInt(this.modalContent.getElementById('productStock').value),
                                discount: parseFloat(this.modalContent.getElementById('productDiscount').value) || 0,
                                rating: parseFloat(this.modalContent.getElementById('productRating').value) || 0,
                                inputFields: JSON.parse(this.modalContent.getElementById('productFields').value),
                                fulfillment: JSON.parse(this.modalContent.getElementById('productFulfillment').value)
                            };
                            
                            const id = this.modalContent.getElementById('productId').value;
                            
                            if (id) {
                                this.data.updateProduct(id, formData);
                                this.toast.success('تم التحديث بنجاح');
                            } else {
                                this.data.addProduct(formData);
                                this.toast.success('تمت الإضافة بنجاح');
                            }
                            
                            this.modalOverlay.classList.remove('active');
                        } catch (error) {
                            this.toast.error('خطأ في صيغة JSON');
                        }
                    });
                }

                // ========== All Orders Modal ==========
                openAllOrdersModal() {
                    const orders = this.data.orders;
                    
                    const ordersHtml = orders.map(o => {
                        const user = this.data.users?.find(u => u.id === o.userId) || { first_name: 'مستخدم' };
                        return `
                            <div class="p-4 border-b border-white/5">
                                <div class="flex justify-between items-start mb-2">
                                    <div class="font-bold">${o.productName}</div>
                                    <select class="order-status bg-slate-700 text-white text-sm rounded-lg px-2 py-1" data-order-id="${o.id}">
                                        <option value="pending" ${o.status === 'pending' ? 'selected' : ''}>قيد الانتظار</option>
                                        <option value="confirmed" ${o.status === 'confirmed' ? 'selected' : ''}>مؤكد</option>
                                        <option value="shipped" ${o.status === 'shipped' ? 'selected' : ''}>تم الشحن</option>
                                        <option value="delivered" ${o.status === 'delivered' ? 'selected' : ''}>تم التسليم</option>
                                        <option value="cancelled" ${o.status === 'cancelled' ? 'selected' : ''}>ملغي</option>
                                    </select>
                                </div>
                                <div class="text-sm">المستخدم: ${o.userId}</div>
                                <div class="text-sm">الكمية: ${o.quantity} | المجموع: ${o.total}</div>
                                <div class="text-xs text-gray-400">${formatDate(o.date)}</div>
                            </div>
                        `;
                    }).join('');
                    
                    this.modalContent.innerHTML = `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">جميع الطلبات</h2>
                            <button class="close-modal w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 transition">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                        
                        <div class="scroll-custom" style="max-height: 600px; overflow-y: auto;">
                            ${ordersHtml || '<p class="text-center text-gray-400 py-8">لا توجد طلبات</p>'}
                        </div>
                    `;
                    
                    this.modalOverlay.classList.add('active');
                    
                    const closeBtn = this.modalContent.querySelector('.close-modal');
                    closeBtn?.addEventListener('click', () => this.modalOverlay.classList.remove('active'));
                    
                    this.modalContent.querySelectorAll('.order-status').forEach(select => {
                        select.addEventListener('change', (e) => {
                            const orderId = select.dataset.orderId;
                            const newStatus = e.target.value;
                            
                            if (this.data.updateOrderStatus(orderId, newStatus)) {
                                this.toast.success('تم تحديث حالة الطلب');
                            }
                        });
                    });
                }
            }

            // ======================== Main App ========================
            class App {
                constructor() {
                    this.toast = new Toast();
                    this.telegram = new TelegramService();
                    this.data = new DataService();
                    this.ui = null;
                    
                    this.init();
                }

                init() {
                    // Check Telegram
                    if (!this.telegram.isAvailable) {
                        this.showTelegramMissing();
                        return;
                    }
                    
                    this.telegram.init();
                    
                    // Get user
                    const user = this.telegram.getUser();
                    
                    if (!user) {
                        this.showAccessDenied();
                        return;
                    }
                    
                    // Set user
                    this.data.user = user;
                    
                    // Load cart for this user
                    const savedCart = Storage.get(`${CONFIG.STORAGE_KEYS.CART}_${user.id}`, []);
                    this.data.cart = savedCart;
                    
                    // Register user
                    this.data.registerUser(user.id);
                    
                    // Initialize UI
                    this.ui = new UIManager(this.data, this.telegram, this.toast);
                    
                    // Set main button
                    this.telegram.setMainButton('تحديث', () => {
                        this.ui.render();
                        this.toast.success('تم تحديث البيانات');
                    });
                    
                    // Welcome message
                    this.toast.success(`مرحباً ${user.first_name} 👋`);
                }

                showTelegramMissing() {
                    document.getElementById('app').innerHTML = `
                        <div class="glass-card p-8 rounded-3xl text-center animate-slide">
                            <div class="w-20 h-20 bg-orange-500/10 text-orange-500 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">
                                <i class="fa-solid fa-exclamation-triangle"></i>
                            </div>
                            <h2 class="text-2xl font-bold mb-2">بيئة غير مدعومة</h2>
                            <p class="text-gray-400 mb-6">يجب فتح هذا التطبيق من داخل تيليجرام</p>
                            <a href="https://t.me/your_bot" target="_blank" class="btn-primary inline-block">
                                <i class="fa-brands fa-telegram ml-2"></i>
                                فتح في تيليجرام
                            </a>
                        </div>
                    `;
                }

                showAccessDenied() {
                    document.getElementById('app').innerHTML = `
                        <div class="glass-card p-8 rounded-3xl text-center animate-slide">
                            <div class="w-20 h-20 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">
                                <i class="fa-solid fa-shield-halved"></i>
                            </div>
                            <h2 class="text-2xl font-bold mb-2">دخول محظور</h2>
                            <p class="text-gray-400 mb-6">يجب فتح هذا التطبيق من خلال البوت الرسمي</p>
                            <a href="https://t.me/your_bot" target="_blank" class="btn-primary inline-block">
                                <i class="fa-brands fa-telegram ml-2"></i>
                                فتح البوت
                            </a>
                        </div>
                    `;
                }
            }

            // Start the app
            new App();
        })();
    </script>
</body>
</html>
