                renderCasinoWheel() {
                    const balance = this.state.currentUserData?.balance || 0;
                    const settings = this.state.casinoSettings;
                    const segments = settings.wheelSegments;

                    // إنشاء Canvas للعجلة (سيتم الرسم لاحقاً)
                    return `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">🎰 عجلة الحظ</h2>
                            <button id="closeCasinoModal" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                        <div class="text-center mb-3">
                            <span class="text-gray-400">رصيدك:</span>
                            <span class="text-xl font-bold text-white" id="casinoBalance">${balance.toLocaleString('ar-EG')}</span>
                        </div>

                        <div class="casino-wheel-container">
                            <canvas id="wheelCanvas" class="wheel-canvas" width="250" height="250"></canvas>
                            <div class="wheel-pointer"></div>
                            <div class="wheel-center"></div>
                        </div>

                        <div class="flex justify-center items-center gap-3 my-4">
                            <input type="number" id="betAmount" class="bet-input" placeholder="الرهان" min="1" max="${balance}" value="10">
                            <button id="spinWheelBtn" class="spin-btn">🔄 دير العجلة</button>
                        </div>

                        <div id="spinResult" class="text-center text-lg font-bold mb-2"></div>

                        <div class="casino-history" id="casinoHistoryList">
                            ${this.renderCasinoHistory()}
                        </div>
                    `;
                }

                renderCasinoHistory() {
                    const userId = this.state.user.id;
                    const history = this.data.getUserCasinoHistory(userId);
                    if (history.length === 0) return '<p class="text-center text-gray-400">لا يوجد سجل بعد</p>';
                    return history.map(r => `
                        <div class="casino-history-item">
                            <span>${DateUtils.formatDateTime(r.date).split(' ')[0]}</span>
                            <span>رهان ${r.bet}</span>
                            <span class="${r.result === 'win' ? 'win-text' : 'lose-text'}">${r.result === 'win' ? '+' + r.winAmount : '- ' + r.bet}</span>
                        </div>
                    `).join('');
                }

                bindCasinoWheelEvents() {
                    const modalOverlay = document.getElementById('casinoModalOverlay');
                    document.getElementById('closeCasinoModal').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });
                    modalOverlay.addEventListener('click', (e) => {
                        if (e.target === modalOverlay) modalOverlay.classList.remove('open');
                    });

                    const canvas = document.getElementById('wheelCanvas');
                    const ctx = canvas.getContext('2d');
                    const segments = this.state.casinoSettings.wheelSegments;
                    const totalSegments = segments.length;
                    const anglePerSegment = (2 * Math.PI) / totalSegments;

                    // رسم العجلة
                    const drawWheel = (rotation = 0) => {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        for (let i = 0; i < totalSegments; i++) {
                            const startAngle = i * anglePerSegment + rotation;
                            const endAngle = startAngle + anglePerSegment;
                            ctx.beginPath();
                            ctx.moveTo(125, 125);
                            ctx.arc(125, 125, 120, startAngle, endAngle);
                            ctx.closePath();
                            ctx.fillStyle = segments[i].color;
                            ctx.fill();
                            ctx.strokeStyle = '#fff';
                            ctx.lineWidth = 2;
                            ctx.stroke();

                            // رسم النص
                            ctx.save();
                            ctx.translate(125, 125);
                            ctx.rotate(startAngle + anglePerSegment / 2);
                            ctx.textAlign = 'center';
                            ctx.fillStyle = '#fff';
                            ctx.font = 'bold 12px Cairo';
                            ctx.shadowColor = '#000';
                            ctx.shadowBlur = 4;
                            ctx.fillText(segments[i].multiplier + 'x', 70, 0);
                            ctx.restore();
                        }
                    };
                    drawWheel();

                    const spinBtn = document.getElementById('spinWheelBtn');
                    const betInput = document.getElementById('betAmount');
                    const resultDiv = document.getElementById('spinResult');
                    const balanceSpan = document.getElementById('casinoBalance');

                    let isSpinning = false;

                    spinBtn.addEventListener('click', () => {
                        if (isSpinning) return;
                        const bet = parseInt(betInput.value);
                        if (isNaN(bet) || bet <= 0) {
                            this.toast.error('أدخل رهان صحيح');
                            return;
                        }
                        const currentBalance = this.state.currentUserData?.balance || 0;
                        if (bet > currentBalance) {
                            this.toast.error('الرصيد غير كافٍ');
                            return;
                        }

                        isSpinning = true;
                        spinBtn.disabled = true;

                        // طلب معالجة الرهان من DataService
                        const result = this.data.processWheelBet(this.state.user.id, bet);
                        if (!result.success) {
                            this.toast.error(result.message);
                            isSpinning = false;
                            spinBtn.disabled = false;
                            return;
                        }

                        // تحديث الرصيد في الواجهة
                        balanceSpan.innerText = result.newBalance.toLocaleString('ar-EG');
                        this.updateBalanceDisplay();

                        // دوران العجلة بشكل عشوائي
                        const spins = 5 + Math.floor(Math.random() * 5); // عدد الدورات الكاملة
                        const targetAngle = Math.random() * 2 * Math.PI; // زاوية عشوائية
                        const finalRotation = spins * 2 * Math.PI + targetAngle;

                        // محاكاة الدوران
                        let startTime = null;
                        const duration = 3000; // 3 ثوانٍ

                        const animate = (timestamp) => {
                            if (!startTime) startTime = timestamp;
                            const elapsed = timestamp - startTime;
                            const progress = Math.min(elapsed / duration, 1);
                            // easeOutCubic
                            const easeProgress = 1 - Math.pow(1 - progress, 3);
                            const currentRotation = easeProgress * finalRotation;
                            drawWheel(currentRotation);

                            if (progress < 1) {
                                requestAnimationFrame(animate);
                            } else {
                                // انتهى الدوران، حدد القطاع الفائز
                                // نعكس الاتجاه لأن canvas rotate عكس عقارب الساعة، والعجلة تدور مع عقارب الساعة
                                const normalized = (2 * Math.PI - (targetAngle % (2 * Math.PI))) % (2 * Math.PI);
                                const segmentIndex = Math.floor(normalized / anglePerSegment) % totalSegments;
                                const winningSegment = segments[segmentIndex];
                                
                                // لكن النتيجة الفعلية يجب أن تكون من result.segment
                                // للتوافق، نعرض النتيجة المخزنة
                                const winAmount = result.winAmount;
                                const winText = winAmount > 0 ? `ربحت ${winAmount} 🎉` : 'خسرت الرهان 😢';
                                resultDiv.innerHTML = `${winText} (${result.segment.label})`;

                                // تحديث سجل المستخدم
                                document.getElementById('casinoHistoryList').innerHTML = this.renderCasinoHistory();

                                isSpinning = false;
                                spinBtn.disabled = false;
                            }
                        };

                        requestAnimationFrame(animate);
                    });
                }
            }

            // ======================== التطبيق الرئيسي ========================
            class App {
                constructor() {
                    this.state = new AppState();
                    this.telegram = new TelegramService();
                    this.toast = new ToastManager('toastContainer');
                    this.data = new DataService(this.state);
                    this.ui = new UIManager(this.state, this.data, this.telegram, this.toast);
                    
                    this.init();
                }

                async init() {
                    if (!this.telegram.isAvailable) {
                        this.state.telegramMissing = true;
                        this.state.loading = false;
                        this.ui.render();
                        return;
                    }

                    this.telegram.init();

                    if (!this.telegram.isValid() || !this.telegram.getUser()) {
                        this.state.accessDenied = true;
                        this.state.loading = false;
                        this.ui.render();
                        return;
                    }

                    const user = this.telegram.getUser();
                    this.state.user = user;
                    this.state.isAdmin = (user.id === CONFIG.ADMIN_ID);

                    const userData = this.data.getUserData(user.id);
                    this.state.currentUserData = userData;

                    if (!userData.name) {
                        userData.name = `${user.first_name} ${user.last_name || ''}`.trim();
                        this.data.saveUserData(user.id, userData);
                    }

                    const savedTheme = this.data.loadTheme();
                    this.applyTheme(savedTheme);
                    this.loadSettings();

                    this.state.loading = true;
                    this.ui.render();

                    try {
                        await new Promise(resolve => setTimeout(resolve, 1000));
                        this.data.loadStats();
                        this.state.loading = false;
                        this.ui.render();

                        this.telegram.setMainButton(
                            this.state.isAdmin ? "لوحة التحكم" : "تحديث البيانات",
                            '#3b82f6',
                            '#ffffff',
                            true,
                            () => {
                                this.telegram.showPopup({
                                    title: this.state.isAdmin ? 'مرحباً أيها المدير' : 'نظام آمن',
                                    message: this.state.isAdmin 
                                        ? `لديك صلاحيات كاملة. الطلبات المعلقة: ${this.data.getPendingDeposits().length + this.data.getPendingWithdrawals().length}`
                                        : `أهلاً ${user.first_name}، اتصالك آمن.`,
                                    buttons: [{ type: 'ok', text: 'حسناً' }]
                                });
                            }
                        );

                        this.toast.success(`مرحباً ${user.first_name}، أهلاً بك في المحفظة المتطورة`);
                    } catch (error) {
                        console.error('Initialization error:', error);
                        this.toast.error('حدث خطأ أثناء تحميل البيانات');
                        this.state.loading = false;
                        this.ui.render();
                    }
                }

                loadSettings() {
                    const settings = this.state.settings;
                    this.toast.soundEnabled = settings.sound;
                    this.toast.vibrateEnabled = settings.vibrate;
                    
                    const soundToggle = document.getElementById('soundToggle');
                    const vibrateToggle = document.getElementById('vibrateToggle');
                    if (soundToggle) soundToggle.checked = settings.sound;
                    if (vibrateToggle) vibrateToggle.checked = settings.vibrate;
                }

                applyTheme(theme) {
                    const root = document.documentElement;
                    const themeIcon = document.getElementById('themeIcon');
                    
                    if (theme === 'light') {
                        root.style.setProperty('--tg-theme-bg-color', '#f8fafc');
                        root.style.setProperty('--tg-theme-text-color', '#0f172a');
                        root.style.setProperty('--tg-theme-button-color', '#3b82f6');
                        root.style.setProperty('--tg-theme-button-text-color', '#ffffff');
                        if (themeIcon) themeIcon.className = 'fa-solid fa-sun';
                    } else {
                        root.style.setProperty('--tg-theme-bg-color', '#0f172a');
                        root.style.setProperty('--tg-theme-text-color', '#ffffff');
                        root.style.setProperty('--tg-theme-button-color', '#3b82f6');
                        root.style.setProperty('--tg-theme-button-text-color', '#ffffff');
                        if (themeIcon) themeIcon.className = 'fa-solid fa-moon';
                    }
                }
            }

            // بدء التطبيق
            const app = new App();

            // أحداث عامة
            document.getElementById('themeToggle').addEventListener('click', () => {
                const newTheme = app.state.theme === 'dark' ? 'light' : 'dark';
                app.state.theme = newTheme;
                app.data.saveTheme(newTheme);
                app.applyTheme(newTheme);
                app.toast.info(`تم تغيير السمة إلى ${newTheme === 'dark' ? 'الداكنة' : 'الفاتحة'}`);
            });

            // إعدادات
            const settingsOverlay = document.getElementById('settingsOverlay');
            const settingsPanel = document.getElementById('settingsPanel');
            
            document.getElementById('closeSettings').addEventListener('click', () => {
                settingsOverlay.classList.remove('open');
                settingsPanel.classList.remove('open');
            });

            settingsOverlay.addEventListener('click', () => {
                settingsOverlay.classList.remove('open');
                settingsPanel.classList.remove('open');
            });

            document.getElementById('languageSelect').addEventListener('change', (e) => {
                app.state.settings.language = e.target.value;
                app.data.saveSettings();
                app.toast.success(`تم تغيير اللغة إلى ${e.target.value === 'ar' ? 'العربية' : 'الإنجليزية'}`);
            });

            document.getElementById('notificationsToggle').addEventListener('change', (e) => {
                app.state.settings.notifications = e.target.checked;
                app.data.saveSettings();
                app.toast.success(e.target.checked ? 'تم تفعيل الإشعارات' : 'تم إيقاف الإشعارات');
            });

            document.getElementById('soundToggle').addEventListener('change', (e) => {
                app.state.settings.sound = e.target.checked;
                app.data.saveSettings();
                app.toast.soundEnabled = e.target.checked;
                app.toast.success(e.target.checked ? 'تم تفعيل التنبيه الصوتي' : 'تم إيقاف التنبيه الصوتي');
            });

            document.getElementById('vibrateToggle').addEventListener('change', (e) => {
                app.state.settings.vibrate = e.target.checked;
                app.data.saveSettings();
                app.toast.vibrateEnabled = e.target.checked;
                app.toast.success(e.target.checked ? 'تم تفعيل الاهتزاز' : 'تم إيقاف الاهتزاز');
            });
        })();
    </script>
</body>
</html>
