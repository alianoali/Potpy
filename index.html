<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>المحفظة الذكية - Telegram Web App</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <!-- Emoji Support -->
    <link href="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.14.0/dist/emoji-picker-element.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --secondary: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark-bg: #0f172a;
            --light-bg: #f8fafc;
            --dark-text: #ffffff;
            --light-text: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--tg-theme-bg-color, var(--dark-bg));
            color: var(--tg-theme-text-color, var(--dark-text));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease;
            padding: 0 10px;
        }

        /* الخلفية المتحركة */
        .ambient-bg {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }
        
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 10s infinite ease-in-out;
        }
        
        .orb-1 { top: -10%; right: -10%; width: min(300px, 50vw); height: min(300px, 50vw); background: var(--primary); }
        .orb-2 { bottom: -10%; left: -10%; width: min(250px, 40vw); height: min(250px, 40vw); background: var(--secondary); animation-delay: 5s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, 40px); }
        }

        /* Glassmorphism المحسن */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            background: rgba(40, 51, 69, 0.8);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-slide-up {
            animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* Loader المحسن */
        .spinner {
            width: clamp(40px, 8vw, 48px);
            height: clamp(40px, 8vw, 48px);
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--tg-theme-button-color, var(--primary));
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Avatar */
        .avatar {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(18px, 5vw, 24px);
            color: white;
            font-weight: bold;
        }

        /* Toast Notifications المحسنة */
        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 90%;
            max-width: 350px;
            pointer-events: none;
        }

        .toast {
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: clamp(10px, 2vw, 12px) clamp(16px, 3vw, 20px);
            color: white;
            font-size: clamp(12px, 3vw, 14px);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: toastIn 0.3s ease, toastOut 0.3s ease 4.7s forwards;
            pointer-events: auto;
            direction: rtl;
            line-height: 1.5;
        }

        /* Theme Toggle المحسن */
        .theme-toggle {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: clamp(12px, 3vw, 14px);
        }

        /* أيقونة المحفظة المتطورة */
        .wallet-icon {
            width: clamp(60px, 15vw, 80px);
            height: clamp(60px, 15vw, 80px);
            background: linear-gradient(145deg, var(--primary), var(--secondary));
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.5), 0 0 0 2px rgba(255, 255, 255, 0.1) inset;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: floatWallet 3s infinite ease-in-out;
            position: relative;
            overflow: hidden;
        }

        .wallet-icon i {
            font-size: clamp(24px, 6vw, 36px);
        }

        /* Badge الرصيد */
        .balance-badge {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: clamp(6px, 1.5vw, 8px) clamp(12px, 3vw, 16px);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: clamp(14px, 4vw, 16px);
            font-weight: 600;
        }

        /* Chat Styles */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: min(500px, 70vh);
            max-height: 70vh;
        }

        .message-bubble {
            max-width: min(85%, 300px);
            padding: clamp(8px, 2vw, 10px) clamp(10px, 2.5vw, 14px);
            border-radius: 20px;
            font-size: clamp(12px, 3vw, 14px);
        }

        .quick-reply-btn {
            padding: clamp(4px, 1vw, 6px) clamp(8px, 2vw, 12px);
            font-size: clamp(10px, 2.5vw, 12px);
        }

        /* Balance Progress */
        .balance-progress {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .balance-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        /* Main Container Responsive */
        #app {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            padding: clamp(10px, 3vw, 20px);
        }

        /* Grid Improvements */
        .grid-cols-3 {
            grid-template-columns: repeat(3, 1fr);
        }

        @media (min-width: 640px) {
            .grid-cols-3 {
                grid-template-columns: repeat(3, 1fr);
            }
            .grid-cols-2 {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 768px) {
            .md\:grid-cols-4 {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .lg\:grid-cols-6 {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        /* Wallet Tabs Responsive */
        .wallet-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .wallet-tab {
            padding: clamp(8px, 2vw, 10px) clamp(12px, 3vw, 16px);
            font-size: clamp(12px, 3vw, 14px);
            white-space: nowrap;
        }

        @media (max-width: 480px) {
            .wallet-tabs {
                overflow-x: auto;
                flex-wrap: nowrap;
                justify-content: flex-start;
                -webkit-overflow-scrolling: touch;
                padding-bottom: 5px;
            }
            
            .wallet-tab {
                flex: 0 0 auto;
            }
        }

        /* Modal Responsive */
        .modal-content {
            width: min(95%, 500px);
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            padding: clamp(15px, 4vw, 24px);
        }

        /* Admin Panel */
        .user-item, .payment-method-admin {
            padding: clamp(10px, 2.5vw, 12px);
        }

        /* Transaction Items */
        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: clamp(10px, 2.5vw, 12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: clamp(12px, 3vw, 14px);
        }

        /* Payment Methods */
        .payment-method {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: clamp(10px, 2.5vw, 12px);
            cursor: pointer;
            transition: all 0.2s;
        }

        .payment-icon {
            width: clamp(32px, 8vw, 40px);
            height: clamp(32px, 8vw, 40px);
            background: rgba(59, 130, 246, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(16px, 4vw, 20px);
        }

        /* Buttons */
        .btn-primary, .btn-success, .btn-danger {
            padding: clamp(8px, 2vw, 10px) clamp(12px, 3vw, 16px);
            border-radius: 12px;
            font-size: clamp(12px, 3vw, 14px);
        }

        /* Typography */
        h2 {
            font-size: clamp(18px, 5vw, 24px);
        }

        h3 {
            font-size: clamp(16px, 4.5vw, 20px);
        }

        /* Hide scrollbar but keep functionality */
        .hide-scrollbar {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Auto Update Indicator */
        .auto-update-indicator {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 1000;
            font-size: clamp(12px, 3vw, 14px);
        }

        /* Chat list items */
        .chat-list-item {
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: background 0.2s;
        }
        .chat-list-item:hover {
            background: rgba(255,255,255,0.05);
        }
        .chat-list-item.unread {
            background: rgba(59,130,246,0.1);
        }

        /* Modal overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 10px;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal-content {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            max-height: 90vh;
            overflow-y: auto;
            width: min(95%, 500px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease;
        }

        @media (min-width: 768px) {
            .modal-content {
                padding: 24px;
                width: min(90%, 600px);
            }
        }

        /* Payment method selection */
        .payment-method.selected {
            background: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
        }

        /* Transaction amounts */
        .transaction-amount.positive {
            color: var(--success);
        }

        .transaction-amount.negative {
            color: var(--danger);
        }

        /* Emoji picker */
        .emoji-picker-container {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: none;
        }

        .emoji-picker-container.open {
            display: block;
        }

        emoji-picker {
            width: min(300px, 90vw);
            height: 400px;
            --background: rgba(20, 30, 40, 0.95);
            --border-color: var(--glass-border);
        }

        /* Chat message */
        .chat-message {
            display: flex;
            margin-bottom: 8px;
        }
        .chat-message.outgoing {
            justify-content: flex-end;
        }
        .chat-message.incoming {
            justify-content: flex-start;
        }
        .message-bubble {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 18px;
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .outgoing .message-bubble {
            background: #3b82f6;
        }
        .message-info {
            display: flex;
            gap: 8px;
            margin-top: 4px;
            font-size: 10px;
            opacity: 0.7;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .typing-indicator {
            display: flex;
            align-items: center;
            padding: 8px;
        }
        .typing-indicator span {
            width: 6px;
            height: 6px;
            margin: 0 2px;
            background: #888;
            border-radius: 50%;
            display: inline-block;
            animation: typing 1.4s infinite both;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.4; transform: scale(1); }
        }
        .quick-replies {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px 0;
        }
        .quick-reply-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 16px;
            padding: 6px 12px;
            color: white;
            white-space: nowrap;
        }
        .chat-list-item {
            cursor: pointer;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            transition: background 0.2s;
        }
        .chat-list-item:hover {
            background: rgba(255,255,255,0.1);
        }
        .chat-list-item.unread {
            background: rgba(59,130,246,0.15);
        }
        .notification-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .faq-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 8px 12px;
            cursor: pointer;
        }
        .faq-question {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .faq-answer {
            margin-top: 8px;
            color: #aaa;
            display: none;
        }
        .faq-item.open .faq-answer {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
        <span class="text-sm">السمة</span>
    </button>

    <!-- Main Container -->
    <div id="app" class="w-full relative"></div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Modals Container -->
    <div class="modal-overlay" id="walletModalOverlay">
        <div class="modal-content" id="walletModalContent"></div>
    </div>

    <div class="modal-overlay" id="adminPanelOverlay">
        <div class="modal-content" id="adminPanelContent" style="max-width: 500px;"></div>
    </div>

    <div class="modal-overlay" id="paymentMethodModalOverlay">
        <div class="modal-content" id="paymentMethodModalContent"></div>
    </div>

    <div class="modal-overlay" id="editBalanceModalOverlay">
        <div class="modal-content" id="editBalanceModalContent" style="max-width: 350px;"></div>
    </div>

    <div class="modal-overlay" id="supportChatModalOverlay">
        <div class="modal-content" id="supportChatModalContent" style="max-width: 450px;"></div>
    </div>

    <div class="modal-overlay" id="ticketModalOverlay">
        <div class="modal-content" id="ticketModalContent" style="max-width: 400px;"></div>
    </div>

    <!-- Emoji Picker Container -->
    <div class="emoji-picker-container" id="emojiPickerContainer">
        <emoji-picker class="light"></emoji-picker>
    </div>

    <!-- Auto Update Indicator -->
    <div id="autoUpdateIndicator" class="auto-update-indicator hidden">
        <i class="fa-solid fa-rotate"></i>
        <span>جاري تحديث الرصيد...</span>
    </div>

    <script type="module">
        (function() {
            'use strict';

            // ==================== Configuration ====================
            const CONFIG = {
                ADMIN_ID: 7609492965,
                DEFAULT_BALANCE: 100,
                MAX_TRANSACTIONS: 50,
                MAX_IMAGE_SIZE: 200 * 1024, // 200KB after compression
                ALLOWED_IMAGE_TYPES: ['image/jpeg', 'image/png', 'image/gif', 'image/webp'],
                AUTO_REFRESH_INTERVAL: 15000, // 15 seconds
                STORAGE_KEYS: {
                    USERS_DATA: 'wallet_users_data',
                    WITHDRAWAL_REQUESTS: 'wallet_withdrawal_requests',
                    PAYMENT_METHODS: 'wallet_payment_methods',
                    THEME: 'wallet_theme',
                    SETTINGS: 'wallet_settings',
                    NOTIFICATIONS: 'wallet_notifications',
                    DAILY_OPS: 'wallet_daily_ops',
                    CHAT_MESSAGES: 'wallet_chat_messages',
                    SUPPORT_TICKETS: 'wallet_support_tickets',
                    FAQ_ITEMS: 'wallet_faq_items',
                    // جديد: مفاتيح الإعلانات
                    CAMPAIGNS: 'wallet_campaigns',
                    CLICKS: 'wallet_clicks'
                },
                BALANCE_LEVELS: [
                    { threshold: 0, color: '#ef4444', name: 'منخفض' },
                    { threshold: 100, color: '#f59e0b', name: 'متوسط' },
                    { threshold: 500, color: '#10b981', name: 'جيد' },
                    { threshold: 1000, color: '#3b82f6', name: 'ممتاز' },
                    { threshold: 5000, color: '#8b5cf6', name: 'ماسي' }
                ],
                SUPPORT_TEAM: [
                    { id: 'support1', name: 'فهد الدعم', avatar: 'fa-solid fa-headset' },
                    { id: 'support2', name: 'سارة الخدمة', avatar: 'fa-solid fa-user-tie' },
                    { id: 'support3', name: 'أحمد المساعدة', avatar: 'fa-solid fa-user-graduate' }
                ],
                QUICK_REPLIES: {
                    user: [
                        'كيف يمكنني الشحن؟ 💰',
                        'مشكلة في السحب ❌',
                        'تحويل إلى مستخدم آخر 🔄',
                        'الرصيد لا يظهر ⚠️',
                        'شكراً لكم 👍'
                    ],
                    admin: [
                        'تم استلام طلبك ✅',
                        'يرجى الانتظار قليلاً ⏳',
                        'تم حل المشكلة 🎉',
                        'هل تحتاج مساعدة أخرى؟ 🤔',
                        'شكراً لتواصلك معنا 🙏'
                    ]
                },
                FAQ_ITEMS: [
                    {
                        question: 'كيف يمكنني شحن المحفظة؟',
                        answer: 'يمكنك شحن المحفظة عبر طرق الدفع المتاحة: USDT، بطاقات فيزا، أو تحويل بنكي. اختر طريقة الدفع المناسبة لك وأدخل رقم العملية.'
                    },
                    {
                        question: 'كم يستغرق طلب السحب؟',
                        answer: 'يتم مراجعة طلبات السحب خلال 24 ساعة كحد أقصى، وفي معظم الحالات خلال 2-4 ساعات عمل.'
                    },
                    {
                        question: 'ما هي عمولة التحويل بين المستخدمين؟',
                        answer: 'التحويلات بين المستخدمين مجانية تماماً!'
                    },
                    {
                        question: 'كيف أتصل بفريق الدعم؟',
                        answer: 'يمكنك التواصل معنا مباشرة عبر نظام الدردشة المدمج، أو فتح تذكرة دعم للمشاكل المعقدة.'
                    }
                ],
                SUPPORT_ID: 'support_team', // معرف ثابت للدعم
                // جديد: إعدادات الإعلانات
                CAMPAIGNS: {
                    DEFAULT_CPC: 0.05, // 5 سنتات افتراضياً
                    MAX_CLICKS_PER_USER_PER_CAMPAIGN: 1, // مرة واحدة لكل حملة
                    COOLDOWN_HOURS: 24, // فترة التهدئة بين النقرات
                    MIN_BUDGET: 1 // أقل ميزانية للحملة بالدولار
                }
            };

            // ==================== Utilities ====================
            const Utils = {
                generateId: (prefix = '') => prefix + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                
                getTodayDate: () => new Date().toISOString().split('T')[0],
                
                formatDateTime: (isoString) => {
                    try {
                        return new Date(isoString).toLocaleString('ar-EG');
                    } catch {
                        return isoString;
                    }
                },
                
                formatDate: (isoString) => {
                    try {
                        return new Date(isoString).toLocaleDateString('ar-EG');
                    } catch {
                        return isoString;
                    }
                },
                
                formatTime: (isoString) => {
                    try {
                        return new Date(isoString).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
                    } catch {
                        return isoString;
                    }
                },
                
                formatNumber: (num) => {
                    return num?.toLocaleString('ar-EG') || '0';
                },
                
                formatUSD: (num) => {
                    return `$${Utils.formatNumber(num)}`;
                },
                
                validateImage: (file) => {
                    if (!CONFIG.ALLOWED_IMAGE_TYPES.includes(file.type)) {
                        return { valid: false, error: 'نوع الملف غير مسموح' };
                    }
                    if (file.size > 5 * 1024 * 1024) {
                        return { valid: false, error: 'حجم الصورة كبير جداً (الحد الأقصى 5 ميجابايت قبل الضغط)' };
                    }
                    return { valid: true };
                },
                
                compressImage: (file, maxSize = 200 * 1024, maxWidth = 800) => {
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            const img = new Image();
                            img.onload = () => {
                                const canvas = document.createElement('canvas');
                                let width = img.width;
                                let height = img.height;
                                
                                if (width > height) {
                                    if (width > maxWidth) {
                                        height *= maxWidth / width;
                                        width = maxWidth;
                                    }
                                } else {
                                    if (height > maxWidth) {
                                        width *= maxWidth / height;
                                        height = maxWidth;
                                    }
                                }
                                
                                canvas.width = width;
                                canvas.height = height;
                                const ctx = canvas.getContext('2d');
                                ctx.drawImage(img, 0, 0, width, height);
                                
                                let quality = 0.9;
                                let compressedDataUrl;
                                do {
                                    compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
                                    quality -= 0.1;
                                } while (compressedDataUrl.length > maxSize * 1.37 && quality > 0.1);
    
                                resolve(compressedDataUrl);
                            };
                            img.onerror = reject;
                            img.src = e.target.result;
                        };
                        reader.onerror = reject;
                        reader.readAsDataURL(file);
                    });
                },
                
                calculateBalanceLevel: (balance) => {
                    const level = CONFIG.BALANCE_LEVELS
                        .slice()
                        .reverse()
                        .find(l => balance >= l.threshold);
                    return level || CONFIG.BALANCE_LEVELS[0];
                },
                
                safeJSONParse: (str, fallback = null) => {
                    try {
                        return JSON.parse(str);
                    } catch {
                        return fallback;
                    }
                },
                
                debounce: (func, wait) => {
                    let timeout;
                    return function executedFunction(...args) {
                        const later = () => {
                            clearTimeout(timeout);
                            func(...args);
                        };
                        clearTimeout(timeout);
                        timeout = setTimeout(later, wait);
                    };
                },
                
                truncate: (str, length = 50) => {
                    return str.length > length ? str.substring(0, length) + '...' : str;
                },
                
                escapeHtml: (text) => {
                    const div = document.createElement('div');
                    div.textContent = text;
                    return div.innerHTML;
                },

                checkNotBlocked: (user) => {
                    return user && !user.blocked;
                }
            };

            // ==================== Storage Service ====================
            class StorageService {
                static get(key, defaultValue = null) {
                    try {
                        const value = localStorage.getItem(key);
                        return value ? Utils.safeJSONParse(value, defaultValue) : defaultValue;
                    } catch (error) {
                        console.error(`Storage get error: ${key}`, error);
                        return defaultValue;
                    }
                }

                static set(key, value) {
                    try {
                        localStorage.setItem(key, JSON.stringify(value));
                        return true;
                    } catch (error) {
                        console.error(`Storage set error: ${key}`, error);
                        return false;
                    }
                }

                static remove(key) {
                    try {
                        localStorage.removeItem(key);
                        return true;
                    } catch (error) {
                        console.error(`Storage remove error: ${key}`, error);
                        return false;
                    }
                }
            }

            // ==================== Toast Manager ====================
            class ToastManager {
                constructor() {
                    this.container = document.getElementById('toastContainer');
                    if (!this.container) {
                        this.container = document.createElement('div');
                        this.container.id = 'toastContainer';
                        this.container.className = 'toast-container';
                        document.body.appendChild(this.container);
                    }
                    this.soundEnabled = true;
                    this.vibrateEnabled = true;
                }

                show(message, type = 'info', duration = 5000) {
                    const toast = document.createElement('div');
                    toast.className = `toast ${type}`;
                    
                    const icons = {
                        success: 'fa-solid fa-check',
                        error: 'fa-solid fa-exclamation',
                        warning: 'fa-solid fa-triangle-exclamation',
                        info: 'fa-solid fa-info'
                    };
                    
                    toast.innerHTML = `
                        <div class="toast-icon"><i class="${icons[type] || icons.info}"></i></div>
                        <div class="toast-message">${message}</div>
                    `;
                    
                    this.container.appendChild(toast);
                    
                    if (this.soundEnabled) this.playSound(type);
                    if (this.vibrateEnabled && navigator.vibrate) navigator.vibrate(200);
                    
                    setTimeout(() => toast.remove(), duration);
                }

                playSound(type) {
                    try {
                        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        const oscillator = audioContext.createOscillator();
                        const gainNode = audioContext.createGain();
                        
                        oscillator.connect(gainNode);
                        gainNode.connect(audioContext.destination);
                        
                        oscillator.type = 'sine';
                        oscillator.frequency.value = type === 'success' ? 800 : (type === 'warning' ? 600 : 400);
                        gainNode.gain.value = 0.1;
                        
                        oscillator.start();
                        oscillator.stop(audioContext.currentTime + 0.2);
                        
                        audioContext.resume();
                    } catch (error) {
                        console.log('Audio not supported', error);
                    }
                }

                success(message) { this.show(message, 'success'); }
                error(message) { this.show(message, 'error'); }
                warning(message) { this.show(message, 'warning'); }
                info(message) { this.show(message, 'info'); }
            }

            // ==================== Data Service ====================
            class DataService {
                constructor(state) {
                    this.state = state;
                    this.refreshInterval = null;
                    this.loadInitialData();
                }

                loadInitialData() {
                    this.loadUsers();
                    this.loadRequests();
                    this.loadPaymentMethods();
                    this.loadSettings();
                    this.loadNotifications();
                    this.loadChatMessages();
                    this.loadSupportTickets();
                    this.loadFAQItems();
                    // جديد: تحميل بيانات الإعلانات
                    this.loadCampaigns();
                    this.loadClicks();
                }

                // Users
                loadUsers() {
                    this.state.users = StorageService.get(CONFIG.STORAGE_KEYS.USERS_DATA, {});
                }

                saveUsers() {
                    StorageService.set(CONFIG.STORAGE_KEYS.USERS_DATA, this.state.users);
                }

                getUserData(userId) {
                    if (!this.state.users[userId]) {
                        this.state.users[userId] = {
                            balance: CONFIG.DEFAULT_BALANCE,
                            transactions: [],
                            blocked: false,
                            createdAt: new Date().toISOString(),
                            lastActive: new Date().toISOString(),
                            name: this.state.user ? `${this.state.user.first_name} ${this.state.user.last_name || ''}`.trim() : `مستخدم ${userId}`,
                            username: this.state.user?.username || '',
                            supportTickets: 0,
                            totalChats: 0,
                            // جديد: إحصائيات الإعلانات للمستخدم
                            totalEarnedFromAds: 0,
                            totalClicks: 0
                        };
                        this.saveUsers();
                    }
                    return this.state.users[userId];
                }

                updateUser(userId, data) {
                    this.state.users[userId] = { ...this.state.users[userId], ...data };
                    this.saveUsers();
                    
                    if (this.state.user && this.state.user.id == userId) {
                        this.state.set('currentUser', this.state.users[userId]);
                    }
                }

                checkBlocked(userId) {
                    const user = this.getUserData(userId);
                    if (user.blocked) {
                        return { blocked: true, message: 'هذا الحساب محظور ولا يمكنه إجراء العمليات.' };
                    }
                    return { blocked: false };
                }

                updateBalance(userId, delta, reason, type = 'adjust') {
                    const blockCheck = this.checkBlocked(userId);
                    if (blockCheck.blocked) {
                        return { success: false, error: blockCheck.message };
                    }

                    const user = this.getUserData(userId);
                    const oldBalance = user.balance;
                    const newBalance = user.balance + delta;
                    
                    if (newBalance < 0) {
                        return { success: false, error: 'الرصيد غير كافٍ' };
                    }
                    
                    user.balance = newBalance;
                    
                    const transaction = {
                        id: Utils.generateId('tx_'),
                        type,
                        amount: delta,
                        note: reason,
                        date: new Date().toISOString(),
                        status: 'completed',
                        oldBalance,
                        newBalance
                    };
                    
                    user.transactions.unshift(transaction);
                    if (user.transactions.length > CONFIG.MAX_TRANSACTIONS) {
                        user.transactions.pop();
                    }
                    
                    user.lastActive = new Date().toISOString();
                    this.updateUser(userId, user);
                    
                    this.addNotification(
                        userId,
                        delta > 0 ? '💰 إيداع' : '💸 سحب',
                        `${delta > 0 ? 'تمت إضافة' : 'تم خصم'} ${Utils.formatUSD(Math.abs(delta))} إلى رصيدك. الرصيد الجديد: ${Utils.formatUSD(newBalance)}`,
                        delta > 0 ? 'success' : 'warning'
                    );
                    
                    return { success: true, transaction, newBalance, oldBalance };
                }

                getAllUsers() {
                    return Object.entries(this.state.users).map(([id, data]) => ({
                        id: parseInt(id),
                        name: data.name || `مستخدم ${id}`,
                        username: data.username || '',
                        balance: data.balance,
                        blocked: data.blocked || false,
                        transactionsCount: data.transactions.length,
                        lastActive: data.lastActive,
                        createdAt: data.createdAt,
                        supportTickets: data.supportTickets || 0,
                        totalEarnedFromAds: data.totalEarnedFromAds || 0,
                        totalClicks: data.totalClicks || 0
                    }));
                }

                // Requests (only withdrawal)
                loadRequests() {
                    this.state.withdrawalRequests = StorageService.get(CONFIG.STORAGE_KEYS.WITHDRAWAL_REQUESTS, []);
                }

                saveRequests() {
                    StorageService.set(CONFIG.STORAGE_KEYS.WITHDRAWAL_REQUESTS, this.state.withdrawalRequests);
                }

                addWithdrawalRequest(amount, methodId, details) {
                    if (!this.state.user) return { success: false, error: 'المستخدم غير موجود' };
                    
                    const blockCheck = this.checkBlocked(this.state.user.id);
                    if (blockCheck.blocked) {
                        return { success: false, error: blockCheck.message };
                    }
                    
                    const user = this.getUserData(this.state.user.id);
                    if (amount > user.balance) {
                        return { success: false, error: 'الرصيد غير كافٍ' };
                    }
                    
                    const method = this.state.paymentMethods.find(m => m.id === methodId);
                    const request = {
                        id: Utils.generateId('with_'),
                        userId: this.state.user.id,
                        userName: `${this.state.user.first_name} ${this.state.user.last_name || ''}`.trim(),
                        amount,
                        method: method ? method.name : methodId,
                        methodId,
                        details,
                        status: 'pending',
                        date: new Date().toISOString()
                    };
                    
                    this.state.withdrawalRequests.push(request);
                    this.saveRequests();
                    this.incrementDailyOps();
                    
                    return { success: true, request };
                }

                acceptRequest(requestId, type) {
                    if (type === 'withdrawal') {
                        const request = this.state.withdrawalRequests.find(r => r.id === requestId);
                        if (request && request.status === 'pending') {
                            const user = this.getUserData(request.userId);
                            if (user.balance >= request.amount) {
                                request.status = 'approved';
                                const result = this.updateBalance(
                                    request.userId,
                                    -request.amount,
                                    `سحب عبر ${request.method}`,
                                    'withdraw'
                                );
                                if (result.success) {
                                    this.saveRequests();
                                    this.addNotification(
                                        request.userId,
                                        '✅ تم قبول طلب السحب',
                                        `تم خصم ${Utils.formatUSD(request.amount)} من رصيدك.`,
                                        'success'
                                    );
                                    return true;
                                }
                            }
                        }
                    }
                    return false;
                }

                rejectRequest(requestId, type) {
                    if (type === 'withdrawal') {
                        const request = this.state.withdrawalRequests.find(r => r.id === requestId);
                        if (request) {
                            request.status = 'rejected';
                            this.saveRequests();
                            this.addNotification(
                                request.userId,
                                '❌ تم رفض طلب السحب',
                                `تم رفض طلب السحب بمبلغ ${Utils.formatUSD(request.amount)}`,
                                'error'
                            );
                            return true;
                        }
                    }
                    return false;
                }

                getPendingRequestsCount() {
                    return this.state.withdrawalRequests.filter(r => r.status === 'pending').length;
                }

                // Payment Methods
                loadPaymentMethods() {

                    if (saved && saved.length) {
                        this.state.paymentMethods = saved;
                    } else {

                                name: 'USDT (TRC20)', 
                                icon: 'fa-brands fa-tether', 
                                iconType: 'fa', 
                                description: 'عملة رقمية مستقرة - دولار',
                                withdrawDetails: 'أدخل عنوان USDT الخاص بك'
                            },
                            { 
                                id: Utils.generateId('visa_'), 
                                name: 'Visa / Mastercard', 
                                icon: 'fa-regular fa-credit-card', 
                                iconType: 'fa', 
                                description: 'بطاقات ائتمانية - دولار',
                                withdrawDetails: 'أدخل بيانات بطاقتك'
                            },
                            { 
                                id: Utils.generateId('bank_'), 
                                name: 'تحويل بنكي', 
                                icon: 'fa-solid fa-building-columns', 
                                iconType: 'fa', 
                                description: 'حوالة بنكية - دولار',
                                withdrawDetails: 'أدخل رقم IBAN الخاص بك'
                            }
                        ];
                    }
                }

                savePaymentMethods() {
                    StorageService.set(CONFIG.STORAGE_KEYS.PAYMENT_METHODS, this.state.paymentMethods);
                }

                addPaymentMethod(method) {
                    const newMethod = { id: Utils.generateId('pm_'), ...method };
                    this.state.paymentMethods.push(newMethod);
                    this.savePaymentMethods();
                    return newMethod;
                }

                updatePaymentMethod(id, data) {
                    const index = this.state.paymentMethods.findIndex(m => m.id === id);
                    if (index !== -1) {
                        this.state.paymentMethods[index] = { ...this.state.paymentMethods[index], ...data };
                        this.savePaymentMethods();
                        return true;
                    }
                    return false;
                }

                deletePaymentMethod(id) {
                    this.state.paymentMethods = this.state.paymentMethods.filter(m => m.id !== id);
                    this.savePaymentMethods();
                }

                // Notifications
                loadNotifications() {
                    this.state.notifications = StorageService.get(CONFIG.STORAGE_KEYS.NOTIFICATIONS, []);
                }

                saveNotifications() {
                    StorageService.set(CONFIG.STORAGE_KEYS.NOTIFICATIONS, this.state.notifications);
                }

                addNotification(userId, title, message, type = 'info') {
                    const notification = {
                        id: Utils.generateId('notif_'),
                        userId,
                        title,
                        message,
                        type,
                        read: false,
                        date: new Date().toISOString()
                    };
                    this.state.notifications.push(notification);
                    this.saveNotifications();
                    
                    if (this.state.user && this.state.user.id == userId) {
                        this.state.set('unreadNotifications', this.getUnreadCount(userId));
                    }
                    
                    return notification;
                }

                markNotificationAsRead(id) {
                    const notification = this.state.notifications.find(n => n.id === id);
                    if (notification) {
                        notification.read = true;
                        this.saveNotifications();
                        if (this.state.user) {
                            this.state.set('unreadNotifications', this.getUnreadCount(this.state.user.id));
                        }
                    }
                }

                markAllAsRead(userId) {
                    this.state.notifications.forEach(n => {
                        if (n.userId === userId && !n.read) n.read = true;
                    });
                    this.saveNotifications();
                    if (userId === this.state.user?.id) {
                        this.state.set('unreadNotifications', 0);
                    }
                }

                getUserNotifications(userId) {
                    return this.state.notifications
                        .filter(n => n.userId === userId)
                        .sort((a, b) => new Date(b.date) - new Date(a.date));
                }

                getUnreadCount(userId) {
                    return this.state.notifications.filter(n => n.userId === userId && !n.read).length;
                }

                // Chat Messages
                loadChatMessages() {
                    this.state.chatMessages = StorageService.get(CONFIG.STORAGE_KEYS.CHAT_MESSAGES, []);
                }

                saveChatMessages() {
                    StorageService.set(CONFIG.STORAGE_KEYS.CHAT_MESSAGES, this.state.chatMessages);
                }

                addChatMessage(message, userId = null, isSupport = false, recipientUserId = null) {
                    const cleanMessage = Utils.escapeHtml(message);
                    
                    const msg = {
                        id: Utils.generateId('chat_'),
                        userId: userId || this.state.user?.id,
                        userName: this.state.user ? `${this.state.user.first_name} ${this.state.user.last_name || ''}`.trim() : 'مستخدم',
                        message: cleanMessage,
                        isSupport: isSupport,
                        supportId: isSupport ? CONFIG.SUPPORT_TEAM[Math.floor(Math.random() * CONFIG.SUPPORT_TEAM.length)].id : null,
                        supportName: isSupport ? CONFIG.SUPPORT_TEAM[Math.floor(Math.random() * CONFIG.SUPPORT_TEAM.length)].name : null,
                        recipientUserId: recipientUserId,
                        read: false,
                        date: new Date().toISOString(),
                        status: 'sent'
                    };
                    
                    this.state.chatMessages.push(msg);
                    this.saveChatMessages();
                    
                    if (!isSupport && this.state.user && !this.state.isAdmin) {
                        this.addNotification(
                            CONFIG.ADMIN_ID,
                            '💬 رسالة دعم جديدة',
                            `من: ${this.state.user.first_name}\nالرسالة: ${Utils.truncate(cleanMessage, 30)}`,
                            'info'
                        );
                    }
                    
                    return msg;
                }

                getChatMessages(userId = null, otherUserId = null) {
                    let messages = this.state.chatMessages;
                    
                    if (userId && otherUserId) {
                        messages = messages.filter(m => 
                            (m.userId === userId && m.recipientUserId === otherUserId) ||
                            (m.userId === otherUserId && m.recipientUserId === userId)
                        );
                    } else if (userId) {
                        messages = messages.filter(m => 
                            m.userId === userId || 
                            m.recipientUserId === userId
                        );
                    }
                    
                    return messages
                        .sort((a, b) => new Date(a.date) - new Date(b.date))
                        .slice(-50);
                }

                markChatAsRead(userId, otherUserId = null) {
                    this.state.chatMessages.forEach(m => {
                        if (otherUserId) {
                            if ((m.userId === userId && m.recipientUserId === otherUserId) ||
                                (m.userId === otherUserId && m.recipientUserId === userId)) {
                                m.read = true;
                            }
                        } else {
                            if (m.userId === userId || m.recipientUserId === userId) {
                                m.read = true;
                            }
                        }
                    });
                    this.saveChatMessages();
                }

                getUnreadChatCount(userId = null, otherUserId = null) {
                    let messages = this.state.chatMessages.filter(m => !m.read);
                    if (userId && otherUserId) {
                        messages = messages.filter(m => 
                            (m.userId === userId && m.recipientUserId === otherUserId) ||
                            (m.userId === otherUserId && m.recipientUserId === userId)
                        );
                    } else if (userId) {
                        messages = messages.filter(m => 
                            m.userId === userId || m.recipientUserId === userId
                        );
                    }
                    return messages.length;
                }

                getUsersWithChats() {
                    const usersMap = new Map();
                    this.state.chatMessages.forEach(msg => {
                        if (msg.userId && msg.userId !== CONFIG.ADMIN_ID && msg.userId !== CONFIG.SUPPORT_ID) {
                            if (!usersMap.has(msg.userId)) {
                                usersMap.set(msg.userId, {
                                    userId: msg.userId,
                                    userName: msg.userName,
                                    lastMessage: msg.message,
                                    lastMessageTime: msg.date,
                                    unread: !msg.read && msg.recipientUserId === CONFIG.ADMIN_ID ? 1 : 0
                                });
                            } else {
                                const existing = usersMap.get(msg.userId);
                                if (new Date(msg.date) > new Date(existing.lastMessageTime)) {
                                    existing.lastMessage = msg.message;
                                    existing.lastMessageTime = msg.date;
                                }
                                if (!msg.read && msg.recipientUserId === CONFIG.ADMIN_ID) {
                                    existing.unread = (existing.unread || 0) + 1;
                                }
                            }
                        }
                        if (msg.recipientUserId && msg.recipientUserId !== CONFIG.ADMIN_ID && msg.recipientUserId !== CONFIG.SUPPORT_ID) {
                            if (!usersMap.has(msg.recipientUserId)) {
                                const userData = this.getUserData(msg.recipientUserId);
                                usersMap.set(msg.recipientUserId, {
                                    userId: msg.recipientUserId,
                                    userName: userData.name || `مستخدم ${msg.recipientUserId}`,
                                    lastMessage: msg.message,
                                    lastMessageTime: msg.date,
                                    unread: !msg.read && msg.isSupport ? 1 : 0
                                });
                            } else {
                                const existing = usersMap.get(msg.recipientUserId);
                                if (new Date(msg.date) > new Date(existing.lastMessageTime)) {
                                    existing.lastMessage = msg.message;
                                    existing.lastMessageTime = msg.date;
                                }
                                if (!msg.read && msg.isSupport) {
                                    existing.unread = (existing.unread || 0) + 1;
                                }
                            }
                        }
                    });
                    return Array.from(usersMap.values()).sort((a,b) => new Date(b.lastMessageTime) - new Date(a.lastMessageTime));
                }

                // Support Tickets
                loadSupportTickets() {
                    this.state.supportTickets = StorageService.get(CONFIG.STORAGE_KEYS.SUPPORT_TICKETS, []);

                saveSupportTickets() {

                    if (blockCheck.blocked) {
                        this.toast?.error(blockCheck.message);
                        return null;
                    }
                    
                    const user = this.getUserData(this.state.user.id);
                    
                    const ticket = {
                        id: Utils.generateId('ticket_'),
                        userId: this.state.user.id,
                        userName: `${this.state.user.first_name} ${this.state.user.last_name || ''}`.trim(),
                        title: title,
                        description: description,
                        priority: priority,
                        status: 'open',
                        createdAt: new Date().toISOString(),
                        updatedAt: new Date().toISOString(),
                        messages: [
                            {
                                id: Utils.generateId('tmsg_'),
                                sender: 'user',
                                message: description,
                                date: new Date().toISOString()
                            }
                        ]
                    };
                    
                    this.state.supportTickets.push(ticket);
                    
                    user.supportTickets = (user.supportTickets || 0) + 1;
                    this.updateUser(this.state.user.id, user);
                    
                    this.saveSupportTickets();
                    
                    this.addNotification(
                        CONFIG.ADMIN_ID,
                        '🎫 تذكرة دعم جديدة',
                        `من: ${ticket.userName}\nالعنوان: ${Utils.truncate(title, 30)}`,
                        'warning'
                    );
                    
                    return ticket;
                }

                addTicketMessage(ticketId, message, sender = 'user') {
                    const ticket = this.state.supportTickets.find(t => t.id === ticketId);
                    if (ticket) {
                        const cleanMessage = Utils.escapeHtml(message);
                        const msg = {
                            id: Utils.generateId('tmsg_'),
                            sender: sender,
                            message: cleanMessage,
                            date: new Date().toISOString()
                        };
                        
                        ticket.messages.push(msg);
                        ticket.updatedAt = new Date().toISOString();
                        
                        if (sender === 'user' && ticket.status === 'closed') {
                            ticket.status = 'pending';
                        }
                        
                        this.saveSupportTickets();
                        
                        if (sender === 'user') {
                            this.addNotification(
                                CONFIG.ADMIN_ID,
                                '📝 رد على تذكرة',
                                `التذكرة: ${Utils.truncate(ticket.title, 30)}`,
                                'info'
                            );
                        }
                        
                        return msg;
                    }
                    return null;
                }

                transferBalance(fromUserId, toUserId, amount, reason = 'تحويل') {
                    const fromBlock = this.checkBlocked(fromUserId);
                    if (fromBlock.blocked) {
                        return { success: false, error: 'المرسل محظور' };
                    }
                    const toBlock = this.checkBlocked(toUserId);
                    if (toBlock.blocked) {
                        return { success: false, error: 'المستلم محظور' };
                    }

                    const fromUser = this.getUserData(fromUserId);
                    const toUser = this.getUserData(toUserId);

                    if (fromUser.balance < amount) {
                        return { success: false, error: 'الرصيد غير كافٍ' };
                    }

                    const oldFromBalance = fromUser.balance;
                    const oldToBalance = toUser.balance;

                    fromUser.balance -= amount;
                    toUser.balance += amount;

                    const fromTx = {
                        id: Utils.generateId('tx_'),
                        type: 'transfer_out',
                        amount: -amount,
                        note: `تحويل إلى المستخدم ${toUserId}`,
                        date: new Date().toISOString(),
                        status: 'completed',
                        oldBalance: oldFromBalance,
                        newBalance: fromUser.balance
                    };
                    fromUser.transactions.unshift(fromTx);

                    const toTx = {
                        id: Utils.generateId('tx_'),
                        type: 'transfer_in',
                        amount: amount,
                        note: `تحويل من المستخدم ${fromUserId}`,
                        date: new Date().toISOString(),
                        status: 'completed',
                        oldBalance: oldToBalance,
                        newBalance: toUser.balance
                    };
                    toUser.transactions.unshift(toTx);

                    try {
                        this.updateUser(fromUserId, fromUser);
                        this.updateUser(toUserId, toUser);
                        
                        this.addNotification(fromUserId, '💸 تحويل صادر', `تم تحويل ${Utils.formatUSD(amount)} إلى المستخدم ${toUserId}`, 'info');
                        this.addNotification(toUserId, '💰 تحويل وارد', `استلمت ${Utils.formatUSD(amount)} من المستخدم ${fromUserId}`, 'success');
                        
                        return { success: true, fromTx, toTx };
                    } catch (error) {
                        fromUser.balance = oldFromBalance;
                        toUser.balance = oldToBalance;
                        fromUser.transactions.shift();
                        toUser.transactions.shift();
                        this.updateUser(fromUserId, fromUser);
                        this.updateUser(toUserId, toUser);
                        return { success: false, error: 'فشلت عملية الحفظ' };
                    }
                }

                // ========== جديد: دوال الإعلانات ==========
                loadCampaigns() {
                    this.state.campaigns = StorageService.get(CONFIG.STORAGE_KEYS.CAMPAIGNS, []);

                addCampaign(campaignData) {
                    const campaign = {
                        id: Utils.generateId('camp_'),

                        createdAt: new Date().toISOString(),
                        status: campaignData.status || 'active',
                        maxClicksPerUser: campaignData.maxClicksPerUser || CONFIG.CAMPAIGNS.MAX_CLICKS_PER_USER_PER_CAMPAIGN,
                        cooldownHours: campaignData.cooldownHours || CONFIG.CAMPAIGNS.COOLDOWN_HOURS

                    this.saveCampaigns();
                    return campaign;
                }

                updateCampaign(id, data) {
                    const index = this.state.campaigns.findIndex(c => c.id === id);
                    if (index !== -1) {
                        this.state.campaigns[index] = { ...this.state.campaigns[index], ...data };
                        this.saveCampaigns();
                        return true;
                    }
                    return false;
                }

                deleteCampaign(id) {

                    this.saveCampaigns();
                }

                recordClick(campaignId, userId) {
                    // 1. التحقق من وجود المستخدم وعدم حظره
                    const user = this.getUserData(userId);
                    if (user.blocked) {
                        return { success: false, error: 'المستخدم محظور' };
                    }

                    // 2. العثور على الحملة
                    const campaign = this.state.campaigns.find(c => c.id === campaignId);
                    if (!campaign) {
                        return { success: false, error: 'الحملة غير موجودة' };
                    }

                    // 3. التحقق من حالة الحملة
                    if (campaign.status !== 'active') {
                        return { success: false, error: 'الحملة غير نشطة' };
                    }

                    // 4. التحقق من الميزانية
                    if (campaign.spent >= campaign.budget) {
                        return { success: false, error: 'انتهت ميزانية الحملة' };
                    }

                    // 5. التحقق من تاريخ الانتهاء
                    if (campaign.endDate && new Date(campaign.endDate) < new Date()) {
                        return { success: false, error: 'انتهت صلاحية الحملة' };
                    }

                    // 6. التحقق من عدد النقرات السابقة للمستخدم على هذه الحملة
                    const userClicks = this.state.clicks.filter(c => 
                        c.campaignId === campaignId && c.userId === userId
                    );
                    if (userClicks.length >= campaign.maxClicksPerUser) {
                        return { success: false, error: 'لقد تجاوزت الحد المسموح من النقرات على هذا الإعلان' };
                    }

                    // 7. التحقق من فترة التهدئة (إذا وجدت نقرات سابقة)
                    if (userClicks.length > 0 && campaign.cooldownHours > 0) {
                        const lastClick = userClicks.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp))[0];
                        const hoursSinceLast = (new Date() - new Date(lastClick.timestamp)) / (1000 * 60 * 60);
                        if (hoursSinceLast < campaign.cooldownHours) {
                            const remaining = Math.ceil(campaign.cooldownHours - hoursSinceLast);
                            return { success: false, error: `يجب الانتظار ${remaining} ساعة قبل النقر مرة أخرى` };
                        }
                    }

                    // 8. تسجيل النقرة
                    const click = {
                        id: Utils.generateId('click_'),
                        campaignId,
                        userId,
                        earned: campaign.cpc,
                        userAgent: navigator.userAgent,
                        timestamp: new Date().toISOString(),
                        validated: true
                    };
                    this.state.clicks.push(click);
                    this.saveClicks();

                    // 9. تحديث رصيد المستخدم
                    const balanceResult = this.updateBalance(
                        userId,
                        campaign.cpc,
                        `ربح من إعلان: ${campaign.title}`,
                        'ad_reward'
                    );
                    if (!balanceResult.success) {
                        // إذا فشل تحديث الرصيد، نحذف النقرة
                        this.state.clicks = this.state.clicks.filter(c => c.id !== click.id);
                        this.saveClicks();
                        return { success: false, error: balanceResult.error };
                    }

                    // 10. تحديث مصروفات الحملة
                    campaign.spent += campaign.cpc;
                    if (campaign.spent >= campaign.budget) {
                        campaign.status = 'ended'; // تنتهي الحملة تلقائياً
                    }
                    this.saveCampaigns();

                    // 11. تحديث إحصائيات المستخدم
                    user.totalEarnedFromAds = (user.totalEarnedFromAds || 0) + campaign.cpc;
                    user.totalClicks = (user.totalClicks || 0) + 1;
                    this.updateUser(userId, user);

                    return { success: true, earned: campaign.cpc, campaignTitle: campaign.title };
                }

                getCampaignStats(campaignId) {
                    const campaign = this.state.campaigns.find(c => c.id === campaignId);
                    if (!campaign) return null;

                    const clicks = this.state.clicks.filter(c => c.campaignId === campaignId);
                    const uniqueUsers = new Set(clicks.map(c => c.userId)).size;

                    return {
                        totalClicks: clicks.length,
                        uniqueUsers,
                        spent: campaign.spent,
                        remaining: campaign.budget - campaign.spent,
                        performance: clicks.length > 0 ? (uniqueUsers / clicks.length * 100).toFixed(1) : 0
                    };
                }

                getAllCampaignsStats() {
                    return this.state.campaigns.map(c => ({
                        ...c,
                        stats: this.getCampaignStats(c.id)
                    }));
                }
            }

                    document.querySelectorAll('.quick-action').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const action = btn.dataset.action;
                            if (action === 'wallet') {
                                this.openWalletModal();

                                    this.openAdminChatList();
                                } else {
                                    this.openSupportChat();

                renderAdsModal() {
                    const campaigns = this.data.getActiveCampaigns();
                    const campaignsHtml = campaigns.map(c => `
                        <div class="glass-card p-3 rounded-2xl mb-3 cursor-pointer hover:bg-white/5 transition ad-item" data-campaign-id="${c.id}">
                            <div class="flex gap-3">

                                        </span>
                                        <span class="text-xs text-gray-400">
                                            متبقي: ${Utils.formatUSD(c.budget - c.spent)}
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('') || '<p class="text-center text-gray-400 py-6">لا توجد إعلانات متاحة حالياً</p>';

                    return `
                        <div class="flex justify-between items-center mb-4">

                            ${campaignsHtml}

                        <div class="mt-4 text-xs text-gray-400 bg-blue-500/10 p-3 rounded-xl">
                            <i class="fa-solid fa-circle-info ml-1"></i>
                            اضغط على أي إعلان للمشاهدة وكسب الرصيد. يُضاف الرصيد فوراً بعد التحقق.

                bindAdsModalEvents() {
                    const modal = document.getElementById('walletModalOverlay');
                    
                    document.getElementById('closeAdsModal').addEventListener('click', () => {
                        modal.classList.remove('open');
                    });

                    modal.addEventListener('click', (e) => {
                        if (e.target === modal) modal.classList.remove('open');
                    });

                    document.querySelectorAll('.ad-item').forEach(item => {
                        item.addEventListener('click', () => {
                            const campaignId = item.dataset.campaignId;
                            this.handleAdClick(campaignId);
                        });
                    });
