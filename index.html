<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة تيليجرام المتطورة</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts (Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                    },
                    colors: {
                        tg: {
                            bg: 'var(--tg-theme-bg-color, #0f172a)',
                            text: 'var(--tg-theme-text-color, #ffffff)',
                            button: 'var(--tg-theme-button-color, #3b82f6)',
                            buttonText: 'var(--tg-theme-button-text-color, #ffffff)',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--tg-theme-bg-color, #0f172a);
            color: var(--tg-theme-text-color, #ffffff);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        /* الخلفية المتحركة */
        .ambient-light { position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: -1; pointer-events: none; }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; animation: float 10s infinite ease-in-out; }
        .orb-1 { top: -10%; right: -10%; width: 300px; height: 300px; background: #3b82f6; animation-delay: 0s; }
        .orb-2 { bottom: -10%; left: -10%; width: 250px; height: 250px; background: #8b5cf6; animation-delay: 5s; }
        @keyframes float { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(20px, 40px); } }

        /* Glassmorphism */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        .glass-card:hover { background: rgba(40, 51, 69, 0.8); border-color: rgba(255, 255, 255, 0.15); }

        /* Animations */
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-enter { animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        /* Loader */
        .spinner { width: 50px; height: 50px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--tg-theme-button-color, #3b82f6); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Avatar */
        .default-avatar { background: linear-gradient(135deg, #3b82f6, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; font-weight: bold; }

        /* Toast */
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); color: white; padding: 12px 24px; border-radius: 50px; font-size: 14px; z-index: 1000; animation: toastIn 0.3s ease; border: 1px solid rgba(255,255,255,0.1); }
        @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }

        /* Theme Toggle */
        .theme-toggle { position: fixed; top: 16px; left: 16px; z-index: 100; background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; padding: 8px 16px; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: all 0.3s ease; }
        .theme-toggle:hover { background: rgba(40, 51, 69, 0.8); }

        /* Wallet Specific Styles */
        .wallet-gradient { background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(139, 92, 246, 0.2)); }
        .coin-icon-glow { filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.6)); }
        
        /* Modal Overlay */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 2000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-content { transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .modal-overlay.active .modal-content { transform: scale(1); }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="ambient-light">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Theme Toggle -->
    <div class="theme-toggle" id="themeToggle">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
        <span class="text-sm">السمة</span>
    </div>

    <!-- Main Container -->
    <div id="app" class="w-full max-w-md p-5 relative"></div>

    <!-- Deposit Modal (Hidden by default) -->
    <div class="modal-overlay" id="depositModal">
        <div class="modal-content glass-card w-[90%] max-w-sm p-6 rounded-3xl relative">
            <button id="closeModal" class="absolute top-4 left-4 w-8 h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors">
                <i class="fa-solid fa-times text-white"></i>
            </button>
            
            <div class="text-center mb-6">
                <div class="w-16 h-16 mx-auto bg-gradient-to-br from-yellow-400 to-orange-500 rounded-full flex items-center justify-center mb-3 shadow-lg shadow-orange-500/20">
                    <i class="fa-solid fa-coins text-2xl text-white"></i>
                </div>
                <h3 class="text-xl font-bold text-white">شحن المحفظة</h3>
                <p class="text-gray-400 text-sm mt-1">اختر المبلغ المراد شحنه</p>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-6">
                <button onclick="selectAmount(10)" class="amount-btn py-3 rounded-xl border border-white/10 bg-white/5 hover:bg-blue-600 hover:border-blue-500 transition-all font-bold text-white">10$</button>
                <button onclick="selectAmount(50)" class="amount-btn py-3 rounded-xl border border-white/10 bg-white/5 hover:bg-blue-600 hover:border-blue-500 transition-all font-bold text-white">50$</button>
                <button onclick="selectAmount(100)" class="amount-btn py-3 rounded-xl border border-white/10 bg-white/5 hover:bg-blue-600 hover:border-blue-500 transition-all font-bold text-white">100$</button>
                <button onclick="selectAmount('custom')" class="amount-btn py-3 rounded-xl border border-white/10 bg-white/5 hover:bg-blue-600 hover:border-blue-500 transition-all font-bold text-white">أخرى</button>
            </div>

            <button id="confirmDeposit" class="w-full py-3.5 rounded-xl font-bold text-white bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 transition-all shadow-lg shadow-blue-500/20 flex items-center justify-center gap-2">
                <i class="fa-solid fa-paper-plane"></i>
                تأكيد الطلب
            </button>
        </div>
    </div>

    <script>
        (function() {
            // ---------------------------------------------------------
            // إعدادات النظام
            // ---------------------------------------------------------
            const ADMIN_ID = 7609492965; // ضع معرف المشرف هنا
            
            // ---------------------------------------------------------
            // حالة التطبيق (State)
            // ---------------------------------------------------------
            const state = {
                user: null,
                isAdmin: false,
                loading: true,
                accessDenied: false,
                telegramMissing: false,
                balance: 0,
                stats: { users: 0, bots: 0, dailyOps: 0 },
                theme: 'dark',
                transactions: [] // سجل العمليات
            };

            let tg = null;
            try { tg = window.Telegram?.WebApp; } catch (e) { tg = null; }

            const appContainer = document.getElementById('app');
            const depositModal = document.getElementById('depositModal');
            
            // ---------------------------------------------------------
            // دوال مساعدة
            // ---------------------------------------------------------
            function safeLocalStorageGet(key, defaultValue) {
                try { const value = localStorage.getItem(key); return value !== null ? value : defaultValue; } catch (e) { return defaultValue; }
            }
            function safeLocalStorageSet(key, value) { try { localStorage.setItem(key, value); } catch (e) {} }

            function showToast(message, type = 'info') {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }

            function updateTheme(theme) {
                if (theme === 'light') {
                    document.documentElement.style.setProperty('--tg-theme-bg-color', '#f8fafc');
                    document.documentElement.style.setProperty('--tg-theme-text-color', '#0f172a');
                    document.getElementById('themeIcon').className = 'fa-solid fa-sun';
                } else {
                    document.documentElement.style.setProperty('--tg-theme-bg-color', '#0f172a');
                    document.documentElement.style.setProperty('--tg-theme-text-color', '#ffffff');
                    document.getElementById('themeIcon').className = 'fa-solid fa-moon';
                }
                safeLocalStorageSet('theme', theme);
            }

            // ---------------------------------------------------------
            // منطق الإحصائيات والبيانات
            // ---------------------------------------------------------
            function updateStats() {
                try {
                    let usersSet = new Set(JSON.parse(safeLocalStorageGet('app_users', '[]')));
                    state.stats.users = usersSet.size;
                    state.stats.bots = 1; 
                    const today = new Date().toISOString().split('T')[0];
                    let dailyOpsData = JSON.parse(safeLocalStorageGet('daily_ops', '{}'));
                    state.stats.dailyOps = dailyOpsData[today] || 0;
                } catch (e) {}
            }

            function registerUser(userId) {
                try {
                    let usersSet = new Set(JSON.parse(safeLocalStorageGet('app_users', '[]')));
                    if (!usersSet.has(userId)) {
                        usersSet.add(userId);
                        safeLocalStorageSet('app_users', JSON.stringify([...usersSet]));
                        updateStats();
                    }
                } catch (e) {}
            }

            // ---------------------------------------------------------
            // منطق المحفظة
            // ---------------------------------------------------------
            function formatCurrency(amount) {
                return amount.toLocaleString('ar-EG');
            }

            function addTransaction(type, amount) {
                const now = new Date();
                const timeString = now.getHours() + ':' + (now.getMinutes()<10?'0':'') + now.getMinutes();
                state.transactions.unshift({
                    id: Date.now(),
                    type: type, // 'deposit' or 'withdraw'
                    amount: amount,
                    time: timeString,
                    status: 'completed'
                });
                if(state.transactions.length > 5) state.transactions.pop();
            }

            // ---------------------------------------------------------
            // مكونات الواجهة (UI Components)
            // ---------------------------------------------------------
            const components = {
                loading: () => `
                    <div class="flex flex-col items-center justify-center text-center space-y-6 animate-enter">
                        <div class="spinner"></div>
                        <div><h2 class="text-xl font-bold mb-1">جاري التحقق...</h2><p class="text-sm text-gray-400">نحن نتأكد من هويتك عبر تيليجرام</p></div>
                    </div>`,

                accessDenied: () => `
                    <div class="glass-card p-8 rounded-3xl shadow-2xl text-center max-w-md w-full animate-enter border-red-500/20">
                        <div class="w-20 h-20 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl"><i class="fa-solid fa-shield-halved"></i></div>
                        <h2 class="text-2xl font-bold mb-2">دخول محظور</h2>
                        <p class="text-gray-400 mb-8 text-sm">يجب فتح هذا التطبيق حصراً من خلال بوت تيليجرام.</p>
                        <a href="https://telegram.org" target="_blank" class="block w-full py-3.5 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-500 transition-all">فتح تيليجرام</a>
                    </div>`,

                telegramMissing: () => `
                    <div class="glass-card p-8 rounded-3xl shadow-2xl text-center max-w-md w-full animate-enter border-orange-500/20">
                        <div class="w-20 h-20 bg-orange-500/10 text-orange-500 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl"><i class="fa-solid fa-exclamation-triangle"></i></div>
                        <h2 class="text-2xl font-bold mb-2">بيئة غير مدعومة</h2>
                        <p class="text-gray-400 mb-8 text-sm">يرجى فتح هذا الرابط من داخل تطبيق تيليجرام.</p>
                        <a href="https://t.me/your_bot_username" target="_blank" class="block w-full py-3.5 rounded-xl font-bold text-white bg-orange-600 hover:bg-orange-500 transition-all">فتح البوت</a>
                    </div>`,

                // بطاقة المحفظة المتطورة
                walletCard: (balance) => `
                    <div class="glass-card wallet-gradient p-5 rounded-3xl relative overflow-hidden group shadow-xl shadow-blue-900/20 border-blue-500/20">
                        <!-- خلفية جمالية -->
                        <div class="absolute -right-6 -top-6 w-32 h-32 bg-blue-500/20 rounded-full blur-2xl group-hover:bg-blue-500/30 transition-all duration-500"></div>
                        <div class="absolute -left-6 -bottom-6 w-24 h-24 bg-purple-500/20 rounded-full blur-2xl"></div>

                        <div class="relative z-10">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <p class="text-blue-200 text-xs font-medium mb-1 flex items-center gap-2">
                                        <i class="fa-solid fa-wallet"></i> المحفظة الرقمية
                                    </p>
                                    <h3 class="text-3xl font-black text-white tracking-tight drop-shadow-md">
                                        ${formatCurrency(balance)} <span class="text-lg text-yellow-400 font-bold">$</span>
                                    </h3>
                                </div>
                                <div class="w-12 h-12 rounded-2xl bg-white/10 backdrop-blur-md border border-white/20 flex items-center justify-center shadow-inner">
                                    <i class="fa-solid fa-coins text-yellow-400 text-xl coin-icon-glow"></i>
                                </div>
                            </div>

                            <div class="flex gap-3">
                                <button id="depositBtn" class="flex-1 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-500 text-white text-sm font-bold shadow-lg shadow-blue-600/30 transition-all active:scale-95 flex items-center justify-center gap-2">
                                    <i class="fa-solid fa-plus"></i> شحن
                                </button>
                                <button class="flex-1 py-2.5 rounded-xl bg-white/10 hover:bg-white/20 text-white text-sm font-bold border border-white/10 transition-all active:scale-95 flex items-center justify-center gap-2">
                                    <i class="fa-solid fa-arrow-right-from-bracket"></i> سحب
                                </button>
                            </div>
                        </div>
                    </div>
                `,

                // سجل العمليات
                transactionHistory: (transactions) => {
                    if(transactions.length === 0) return '';
                    return `
                        <div class="mt-6">
                            <h4 class="text-sm font-bold text-gray-400 mb-3 px-1">آخر العمليات</h4>
                            <div class="space-y-3">
                                ${transactions.map(tx => `
                                    <div class="glass-card p-3 rounded-2xl flex items-center justify-between hover:bg-white/5 transition-colors">
                                        <div class="flex items-center gap-3">
                                            <div class="w-10 h-10 rounded-full ${tx.type === 'deposit' ? 'bg-green-500/10 text-green-400' : 'bg-red-500/10 text-red-400'} flex items-center justify-center">
                                                <i class="fa-solid ${tx.type === 'deposit' ? 'fa-arrow-down' : 'fa-arrow-up'}"></i>
                                            </div>
                                            <div>
                                                <p class="text-sm font-bold text-white">${tx.type === 'deposit' ? 'شحن رصيد' : 'سحب رصيد'}</p>
                                                <p class="text-[10px] text-gray-500">${tx.time}</p>
                                            </div>
                                        </div>
                                        <span class="font-bold text-sm ${tx.type === 'deposit' ? 'text-green-400' : 'text-red-400'}">
                                            ${tx.type === 'deposit' ? '+' : '-'}${formatCurrency(tx.amount)}$
                                        </span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                },

                userDashboard: (user, balance) => {
                    const fullName = `${user.first_name} ${user.last_name || ''}`.trim();
                    const initials = (user.first_name.charAt(0) + (user.last_name ? user.last_name.charAt(0) : '')).toUpperCase();
                    const photoUrl = user.photo_url;

                    return `
                        <div class="space-y-5 animate-enter pb-10">
                            <!-- Profile Header -->
                            <div class="glass-card p-5 rounded-3xl relative overflow-hidden">
                                <div class="flex items-center gap-4 relative z-10">
                                    <div class="w-14 h-14 rounded-2xl border border-white/10 overflow-hidden bg-slate-800 shadow-lg flex-shrink-0">
                                        ${photoUrl ? `<img src="${photoUrl}" class="w-full h-full object-cover">` : `<div class="w-full h-full default-avatar"><span>${initials}</span></div>`}
                                    </div>
                                    <div class="flex-1">
                                        <h2 class="text-lg font-bold truncate">${fullName}</h2>
                                        <p class="text-xs text-gray-400 font-mono">ID: ${user.id}</p>
                                        <div class="inline-flex items-center gap-1.5 mt-1.5 px-2 py-0.5 rounded-md bg-green-500/10 border border-green-500/20">
                                            <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                                            <span class="text-[10px] font-bold text-green-400">نشط</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Wallet Component -->
                            ${components.walletCard(balance)}

                            <!-- Transaction History -->
                            ${components.transactionHistory(state.transactions)}

                            <!-- Stats Grid -->
                            <div class="grid grid-cols-2 gap-4">
                                <div class="glass-card p-4 rounded-2xl flex flex-col items-center justify-center text-center">
                                    <i class="fa-solid fa-chart-pie text-blue-400 text-xl mb-2"></i>
                                    <span class="text-gray-400 text-xs">الإحصائيات</span>
                                    <span class="text-white font-bold">100%</span>
                                </div>
                                <div class="glass-card p-4 rounded-2xl flex flex-col items-center justify-center text-center">
                                    <i class="fa-solid fa-crown text-purple-400 text-xl mb-2"></i>
                                    <span class="text-gray-400 text-xs">الرتبة</span>
                                    <span class="text-white font-bold">مميز</span>
                                </div>
                            </div>

                            <button id="logoutBtn" class="w-full py-4 rounded-xl font-bold text-red-400 hover:bg-red-500/10 transition-all border border-transparent hover:border-red-500/20 flex items-center justify-center gap-2">
                                <i class="fa-solid fa-arrow-right-from-bracket"></i> تسجيل الخروج
                            </button>
                        </div>
                    `;
                },

                adminDashboard: (user, balance, stats) => {
                    const fullName = `${user.first_name} ${user.last_name || ''}`.trim();
                    const initials = (user.first_name.charAt(0) + (user.last_name ? user.last_name.charAt(0) : '')).toUpperCase();
                    const photoUrl = user.photo_url;

                    return `
                        <div class="space-y-5 animate-enter pb-10">
                            <div class="glass-card p-5 rounded-3xl relative overflow-hidden border-2 border-yellow-500/30">
                                <div class="flex items-center gap-4 relative z-10">
                                    <div class="w-14 h-14 rounded-2xl border border-white/10 overflow-hidden bg-slate-800 shadow-lg flex-shrink-0">
                                        ${photoUrl ? `<img src="${photoUrl}" class="w-full h-full object-cover">` : `<div class="w-full h-full default-avatar"><span>${initials}</span></div>`}
                                    </div>
                                    <div class="flex-1">
                                        <h2 class="text-lg font-bold truncate">${fullName}</h2>
                                        <p class="text-xs text-gray-400 font-mono">ID: ${user.id}</p>
                                        <div class="inline-flex items-center gap-1.5 mt-1.5 px-2 py-0.5 rounded-md bg-yellow-500/20 border border-yellow-500/30">
                                            <i class="fa-solid fa-crown text-yellow-400 text-[10px]"></i>
                                            <span class="text-[10px] font-bold text-yellow-300">مدير النظام</span>
                                        </div>
                                    </div>
                                    <div class="flex flex-col items-end">
                                        <span class="text-[10px] text-gray-400">رصيد البوت</span>
                                        <span class="font-bold text-white text-lg">${formatCurrency(balance)}$</span>
                                    </div>
                                </div>
                            </div>

                            ${components.walletCard(balance)}
                            ${components.transactionHistory(state.transactions)}

                            <div class="grid grid-cols-3 gap-2">
                                <div class="glass-card p-3 rounded-2xl text-center">
                                    <i class="fa-solid fa-users text-blue-400 mb-1"></i>
                                    <span class="text-gray-400 text-[10px] block">المستخدمين</span>
                                    <span class="text-white font-bold text-sm">${stats.users}</span>
                                </div>
                                <div class="glass-card p-3 rounded-2xl text-center">
                                    <i class="fa-solid fa-robot text-green-400 mb-1"></i>
                                    <span class="text-gray-400 text-[10px] block">البوتات</span>
                                    <span class="text-white font-bold text-sm">${stats.bots}</span>
                                </div>
                                <div class="glass-card p-3 rounded-2xl text-center">
                                    <i class="fa-solid fa-chart-line text-purple-400 mb-1"></i>
                                    <span class="text-gray-400 text-[10px] block">اليوم</span>
                                    <span class="text-white font-bold text-sm">${stats.dailyOps}</span>
                                </div>
                            </div>

                            <button id="logoutBtn" class="w-full py-4 rounded-xl font-bold text-red-400 hover:bg-red-500/10 transition-all border border-transparent hover:border-red-500/20 flex items-center justify-center gap-2">
                                <i class="fa-solid fa-arrow-right-from-bracket"></i> تسجيل الخروج
                            </button>
                        </div>
                    `;
                }
            };

            // ---------------------------------------------------------
            // التصيير والأحداث (Render & Events)
            // ---------------------------------------------------------
            function render() {
                if (state.telegramMissing) appContainer.innerHTML = components.telegramMissing();
                else if (state.loading) appContainer.innerHTML = components.loading();
                else if (state.accessDenied) appContainer.innerHTML = components.accessDenied();
                else if (state.isAdmin) appContainer.innerHTML = components.adminDashboard(state.user, state.balance, state.stats);
                else appContainer.innerHTML = components.userDashboard(state.user, state.balance);

                bindEvents();
            }

            function bindEvents() {
                const logoutBtn = document.getElementById('logoutBtn');
                if (logoutBtn) logoutBtn.addEventListener('click', () => tg && tg.close());

                const depositBtn = document.getElementById('depositBtn');
                if (depositBtn) {
                    depositBtn.addEventListener('click', () => {
                        depositModal.classList.add('active');
                        if(tg) tg.HapticFeedback.impactOccurred('light');
                    });
                }

                const closeModal = document.getElementById('closeModal');
                if(closeModal) {
                    closeModal.addEventListener('click', () => {
                        depositModal.classList.remove('active');
                        if(tg) tg.HapticFeedback.impactOccurred('light');
                    });
                }

                depositModal.addEventListener('click', (e) => {
                    if(e.target === depositModal) depositModal.classList.remove('active');
                });

                const confirmBtn = document.getElementById('confirmDeposit');
                if(confirmBtn) {
                    confirmBtn.addEventListener('click', () => {
                        const selected = document.querySelector('.amount-btn.bg-blue-600');
                        if(!selected) {
                            showToast('الرجاء اختيار مبلغ', 'error');
                            return;
                        }
                        const amount = selected.textContent.replace('$','');
                        
                        if(tg) tg.HapticFeedback.notificationOccurred('success');
                        depositModal.classList.remove('active');
                        showToast(`تم إرسال طلب شحن ${amount}$ بنجاح!`);
                        
                        // تحديث الرصيد والعمليات
                        state.balance += parseInt(amount);
                        addTransaction('deposit', parseInt(amount));
                        render(); 
                    });
                }
            }

            // دالة اختيار المبلغ (Global)
            window.selectAmount = function(amount) {
                document.querySelectorAll('.amount-btn').forEach(btn => {
                    btn.classList.remove('bg-blue-600', 'border-blue-500');
                    btn.classList.add('bg-white/5', 'border-white/10');
                });
                event.target.classList.remove('bg-white/5', 'border-white/10');
                event.target.classList.add('bg-blue-600', 'border-blue-500');
                if(tg) tg.HapticFeedback.selectionChanged();
            };

            // ---------------------------------------------------------
            // تهيئة التطبيق
            // ---------------------------------------------------------
            async function initApp() {
                if (!tg) {
                    state.telegramMissing = true;
                    state.loading = false;
                    render();
                    return;
                }

                tg.expand();
                tg.ready();

                const savedTheme = safeLocalStorageGet('theme', 'dark');
                state.theme = savedTheme;
                updateTheme(savedTheme);

                if (!tg.initData || !tg.initDataUnsafe.user) {
                    state.loading = false;
                    state.accessDenied = true;
                    render();
                    return;
                }

                const user = tg.initDataUnsafe.user;
                state.user = user;
                state.isAdmin = (user.id === ADMIN_ID);
                registerUser(user.id);

                try {
                    await new Promise(resolve => setTimeout(resolve, 1500));
                    
                    // تعيين أرصدة افتراضية للتجربة
                    state.balance = state.isAdmin ? 50000 : 150; 
                    
                    // إضافة عمليات وهمية إذا كان السجل فارغاً
                    if(state.transactions.length === 0) {
                        addTransaction('deposit', 100);
                        addTransaction('withdraw', 20);
                    }
                    
                    updateStats();
                    state.loading = false;
                    render();

                    tg.MainButton.setText("تحديث البيانات");
                    tg.MainButton.setTextColor("#ffffff");
                    tg.MainButton.setColor("#3b82f6");
                    tg.MainButton.show();

                    tg.MainButton.onClick(() => {
                        tg.showPopup({
                            title: 'نظام آمن',
                            message: `أهلاً ${user.first_name}، بياناتك محدثة.`,
                            buttons: [{type: 'ok', text: 'حسناً'}]
                        });
                    });

                } catch (error) {
                    console.error(error);
                    state.loading = false;
                    render();
                }
            }

            document.getElementById('themeToggle').addEventListener('click', () => {
                state.theme = state.theme === 'dark' ? 'light' : 'dark';
                updateTheme(state.theme);
            });

            initApp();
        })();
    </script>
</body>
</html>
