                updateBalanceDisplay() {
                    const balanceSpan = document.querySelector('#balanceBadge span');
                    if (balanceSpan) {
                        balanceSpan.textContent = this.state.balance.toLocaleString('ar-EG');
                    }
                }

                updateStatsDisplay() {
                    const stats = this.state.stats;
                    const usersEl = document.getElementById('statsUsers');
                    const botsEl = document.getElementById('statsBots');
                    const dailyOpsEl = document.getElementById('statsDailyOps');
                    if (usersEl) usersEl.textContent = stats.users.toLocaleString('ar-EG');
                    if (botsEl) botsEl.textContent = stats.bots;
                    if (dailyOpsEl) dailyOpsEl.textContent = stats.dailyOps;
                }

                bindEvents() {
                    const logoutBtn = document.getElementById('logoutBtn');
                    if (logoutBtn) {
                        logoutBtn.addEventListener('click', () => {
                            this.tg.close();
                            this.toast.info('تم تسجيل الخروج بنجاح');
                        });
                    }

                    const walletIcon = document.getElementById('walletIconLarge');
                    if (walletIcon) {
                        walletIcon.addEventListener('click', () => this.openWalletModal());
                    }

                    const adminPanelBtn = document.getElementById('openAdminPanelBtn');
                    if (adminPanelBtn) {
                        adminPanelBtn.addEventListener('click', () => this.openAdminPanel());
                    }

                    const notificationBell = document.getElementById('notificationBell');
                    if (notificationBell) {
                        notificationBell.addEventListener('click', () => this.openNotificationsModal());
                    }

                    const openGamesBtn = document.getElementById('openGamesBtn');
                    if (openGamesBtn) {
                        openGamesBtn.addEventListener('click', () => this.openGamesLobby());
                    }

                    const openRouletteBtn = document.getElementById('openRouletteBtn');
                    if (openRouletteBtn) {
                        openRouletteBtn.addEventListener('click', () => this.openRouletteLobby());
                    }

                    this.updateActiveGamesBadge();
                }

                updateActiveGamesBadge() {
                    const badge = document.getElementById('activeGamesBadge');
                    if (!badge) return;
                    
                    const activeChallenges = this.games.getActiveChallenges().length;
                    if (activeChallenges > 0) {
                        badge.style.display = 'flex';
                        badge.textContent = activeChallenges > 9 ? '9+' : activeChallenges;
                    } else {
                        badge.style.display = 'none';
                    }
                }

                // ========== نوافذ مودال ==========
                openWalletModal() {
                    const modalOverlay = document.getElementById('walletModalOverlay');
                    const modalContent = document.getElementById('walletModalContent');
                    modalContent.innerHTML = this.renderWalletModal();
                    modalOverlay.classList.add('open');
                    this.bindWalletModalEvents();
                }

                renderWalletModal() {
                    const balance = this.state.balance;
                    const transactions = this.state.wallet.transactions;
                    const paymentMethods = this.state.paymentMethods;

                    const transactionsHtml = transactions.length === 0 
                        ? '<p class="text-center text-gray-400 py-4">لا توجد معاملات بعد</p>'
                        : transactions.map(tx => {
                            const amountClass = tx.amount > 0 ? 'positive' : 'negative';
                            const amountStr = (tx.amount > 0 ? '+' : '') + tx.amount.toLocaleString('ar-EG');
                            return `
                                <div class="transaction-item">
                                    <div>
                                        <div class="font-medium">${tx.note || tx.type}</div>
                                        <div class="text-xs text-gray-400">${DateUtils.formatDateTime(tx.date)}</div>
                                    </div>
                                    <div class="transaction-amount ${amountClass} font-bold">${amountStr}</div>
                                </div>
                            `;
                        }).join('');

                    const paymentMethodsHtml = paymentMethods.map(m => `
                        <div class="payment-method" data-method-id="${m.id}">
                            <div class="payment-icon">
                                <i class="${m.icon}"></i>
                            </div>
                            <div class="flex-1">
                                <div class="font-bold">${m.name}</div>
                                <div class="text-xs text-gray-400">${(m.description || '').substring(0, 30)}...</div>
                            </div>
                        </div>
                    `).join('');

                    const withdrawMethodsHtml = paymentMethods.map(m => `
                        <div class="payment-method" data-method-id="${m.id}">
                            <div class="payment-icon">
                                <i class="${m.icon}"></i>
                            </div>
                            <div class="flex-1">
                                <div class="font-bold">${m.name}</div>
                            </div>
                        </div>
                    `).join('');

                    return `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">محفظتي</h2>
                            <button id="closeWalletModal" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="glass-card p-6 rounded-2xl text-center mb-4">
                            <div class="text-gray-400 text-sm mb-1">الرصيد الحالي</div>
                            <div class="text-3xl font-bold text-white">${balance.toLocaleString('ar-EG')}</div>
                            <div class="text-xs text-gray-400 mt-1">عملة البوت</div>
                        </div>

                        <div class="wallet-tabs">
                            <button class="wallet-tab active" data-tab="deposit"><i class="fa-solid fa-arrow-down"></i> شحن</button>
                            <button class="wallet-tab" data-tab="withdraw"><i class="fa-solid fa-arrow-up"></i> سحب</button>
                            <button class="wallet-tab" data-tab="transfer"><i class="fa-solid fa-exchange-alt"></i> تحويل</button>
                            <button class="wallet-tab" data-tab="history"><i class="fa-solid fa-history"></i> السجل</button>
                        </div>

                        <div id="walletTabContent">
                            <!-- تبويب الشحن -->
                            <div class="tab-pane active" id="tab-deposit">
                                <p class="text-sm text-gray-300 mb-3">اختر طريقة الدفع:</p>
                                <div class="payment-methods-list mb-4">
                                    ${paymentMethodsHtml}
                                </div>
                                
                                <div id="depositDetailsDisplay" class="payment-details hidden">
                                    <strong>تفاصيل الإيداع:</strong>
                                    <div id="depositDetailsText"></div>
                                </div>

                                <div class="mb-3">
                                    <label class="text-sm text-gray-400">رقم العملية (TXID):</label>
                                    <input type="text" id="depositTransactionId" placeholder="أدخل رقم العملية" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                                </div>

                                <div class="flex gap-2">
                                    <input type="number" id="depositAmount" placeholder="المبلغ" class="flex-1 bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                                    <button id="depositBtn" class="bg-blue-600 px-4 rounded-lg font-bold">تقديم طلب</button>
                                </div>
                                <p class="text-xs text-gray-400 mt-2">سيتم مراجعة طلبك من قبل الإدارة.</p>
                            </div>

                            <!-- تبويب السحب -->
                            <div class="tab-pane hidden" id="tab-withdraw">
                                <p class="text-sm text-gray-300 mb-3">اختر طريقة السحب:</p>
                                <div class="payment-methods-list mb-4" id="withdrawMethodsList">
                                    ${withdrawMethodsHtml}
                                </div>
                                <div id="withdrawDetailsContainer" class="mb-3">
                                    <input type="text" id="withdrawDetails" placeholder="أدخل التفاصيل" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 mb-2 text-white">
                                </div>
                                <div class="flex gap-2">
                                    <input type="number" id="withdrawAmount" placeholder="المبلغ" class="flex-1 bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                                    <button id="withdrawBtn" class="bg-red-600 px-4 rounded-lg font-bold">طلب سحب</button>
                                </div>
                                <p class="text-xs text-gray-400 mt-2">سيتم مراجعة طلب السحب من قبل الإدارة.</p>
                            </div>

                            <!-- تبويب التحويل -->
                            <div class="tab-pane hidden" id="tab-transfer">
                                <p class="text-sm text-gray-300 mb-2">تحويل إلى مستخدم آخر:</p>
                                <input type="text" id="transferUserId" placeholder="معرف المستخدم" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 mb-2 text-white">
                                <div class="flex gap-2">
                                    <input type="number" id="transferAmount" placeholder="المبلغ" class="flex-1 bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                                    <button id="transferBtn" class="bg-green-600 px-4 rounded-lg font-bold">تحويل</button>
                                </div>
                            </div>

                            <!-- تبويب السجل -->
                            <div class="tab-pane hidden" id="tab-history">
                                <div class="max-h-64 overflow-y-auto">
                                    ${transactionsHtml}
                                </div>
                            </div>
                        </div>
                    `;
                }

                bindWalletModalEvents() {
                    const modalOverlay = document.getElementById('walletModalOverlay');
                    document.getElementById('closeWalletModal').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });
                    modalOverlay.addEventListener('click', (e) => {
                        if (e.target === modalOverlay) modalOverlay.classList.remove('open');
                    });

                    const tabs = document.querySelectorAll('.wallet-tab');
                    tabs.forEach(tab => {
                        tab.addEventListener('click', () => {
                            tabs.forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');
                            const tabId = tab.dataset.tab;
                            document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.add('hidden'));
                            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
                        });
                    });

                    const paymentMethods = document.querySelectorAll('.payment-methods-list .payment-method');
                    let selectedMethod = null;
                    const detailsDisplay = document.getElementById('depositDetailsDisplay');
                    const detailsText = document.getElementById('depositDetailsText');
                    
                    paymentMethods.forEach(method => {
                        method.addEventListener('click', () => {
                            paymentMethods.forEach(m => m.classList.remove('selected'));
                            method.classList.add('selected');
                            selectedMethod = method.dataset.methodId;
                            
                            const methodObj = this.state.paymentMethods.find(m => m.id === selectedMethod);
                            if (methodObj && methodObj.depositDetails) {
                                detailsText.innerHTML = methodObj.depositDetails.replace(/\n/g, '<br>');
                                detailsDisplay.classList.remove('hidden');
                            } else {
                                detailsDisplay.classList.add('hidden');
                            }
                        });
                    });

                    document.getElementById('depositBtn')?.addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('depositAmount').value);
                        const transactionId = document.getElementById('depositTransactionId').value.trim();
                        
                        if (isNaN(amount) || amount <= 0) {
                            this.toast.error('أدخل مبلغ صحيح');
                            return;
                        }
                        if (!selectedMethod) {
                            this.toast.error('اختر طريقة دفع أولاً');
                            return;
                        }
                        if (!transactionId) {
                            this.toast.error('يرجى إدخال رقم العملية');
                            return;
                        }
                        
                        const request = this.data.addDepositRequest(amount, selectedMethod, transactionId, this.state.user);
                        
                        this.toast.success(`✅ تم تقديم طلب الشحن بنجاح
                            • المستخدم: ${this.state.user.first_name} ${this.state.user.last_name || ''}
                            • المبلغ: ${amount}
                            • الطريقة: ${request.method}
                            • رقم العملية: ${transactionId}
                            • رقم الطلب: ${request.id}
                            • التاريخ: ${new Date(request.date).toLocaleString('ar-EG')}
                            • الحالة: قيد المراجعة`);
                        
                        document.getElementById('depositAmount').value = '';
                        document.getElementById('depositTransactionId').value = '';
                        paymentMethods.forEach(m => m.classList.remove('selected'));
                        selectedMethod = null;
                        detailsDisplay.classList.add('hidden');
                    });

                    const withdrawMethods = document.querySelectorAll('#withdrawMethodsList .payment-method');
                    let selectedWithdrawMethod = null;
                    withdrawMethods.forEach(method => {
                        method.addEventListener('click', () => {
                            withdrawMethods.forEach(m => m.classList.remove('selected'));
                            method.classList.add('selected');
                            selectedWithdrawMethod = method.dataset.methodId;
                            
                            const methodObj = this.state.paymentMethods.find(m => m.id === selectedWithdrawMethod);
                            const detailsInput = document.getElementById('withdrawDetails');
                            if (methodObj) {
                                detailsInput.placeholder = methodObj.withdrawDetails || 'أدخل التفاصيل';
                            }
                        });
                    });

                    document.getElementById('withdrawBtn')?.addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('withdrawAmount').value);
                        const details = document.getElementById('withdrawDetails').value.trim();
                        if (isNaN(amount) || amount <= 0) {
                            this.toast.error('أدخل مبلغ صحيح');
                            return;
                        }
                        if (!selectedWithdrawMethod) {
                            this.toast.error('اختر طريقة سحب أولاً');
                            return;
                        }
                        if (!details) {
                            this.toast.error('أدخل التفاصيل المطلوبة');
                            return;
                        }
                        const result = this.data.addWithdrawalRequest(amount, selectedWithdrawMethod, details, this.state.user);
                        if (result.success) {
                            const request = result.request;
                            this.toast.success(`✅ تم تقديم طلب السحب بنجاح
                                • المستخدم: ${this.state.user.first_name} ${this.state.user.last_name || ''}
                                • المبلغ: ${amount}
                                • الطريقة: ${request.method}
                                • التفاصيل: ${details}
                                • رقم الطلب: ${request.id}
                                • التاريخ: ${new Date(request.date).toLocaleString('ar-EG')}
                                • الحالة: قيد المراجعة`);
                            
                            document.getElementById('withdrawAmount').value = '';
                            document.getElementById('withdrawDetails').value = '';
                            withdrawMethods.forEach(m => m.classList.remove('selected'));
                            selectedWithdrawMethod = null;
                        } else {
                            this.toast.error(result.message);
                        }
                    });

                    document.getElementById('transferBtn')?.addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('transferAmount').value);
                        const targetId = document.getElementById('transferUserId').value.trim();
                        if (isNaN(amount) || amount <= 0) {
                            this.toast.error('أدخل مبلغ صحيح');
                            return;
                        }
                        if (!targetId) {
                            this.toast.error('أدخل معرف المستخدم');
                            return;
                        }
                        if (amount > this.state.balance) {
                            this.toast.error('الرصيد غير كافٍ');
                            return;
                        }
                        this.state.balance -= amount;
                        this.data.addTransaction('transfer', -amount, `تحويل إلى المستخدم ${targetId}`);
                        this.data.saveWallet();
                        this.toast.success('تم التحويل بنجاح');
                        document.getElementById('transferAmount').value = '';
                        document.getElementById('transferUserId').value = '';
                        this.updateBalanceDisplay();
                        this.openWalletModal();
                    });
                }

                // ========== نظام الألعاب ==========
                openGamesLobby() {
                    const modalOverlay = document.getElementById('gamesModalOverlay');
                    const modalContent = document.getElementById('gamesModalContent');
                    modalContent.innerHTML = this.renderGamesLobby();
                    modalOverlay.classList.add('open');
                    this.bindGamesLobbyEvents();
                }

                renderGamesLobby() {
                    const activeChallenges = this.games.getActiveChallenges();
                    const userActiveGame = this.games.getUserActiveGame(this.state.user.id);
                    
                    const challengesHtml = activeChallenges.length === 0 
                        ? '<p class="text-center text-gray-400 py-4">لا توجد تحديات نشطة حالياً</p>'
                        : activeChallenges.map(c => `
                            <div class="challenge-item">
                                <div class="flex-1">
                                    <div class="challenge-creator">${c.creatorName}</div>
                                    <div class="text-xs text-gray-400">رهان: <span class="challenge-bet">${c.betAmount}</span></div>
                                </div>
                                <button class="join-challenge-btn" data-challenge-id="${c.id}" ${c.creatorId === this.state.user.id || userActiveGame ? 'disabled' : ''}>
                                    ${c.creatorId === this.state.user.id ? 'تحديك' : 'انضمام'}
                                </button>
                            </div>
                        `).join('');

                    return `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">🎮 غرفة الألعاب</h2>
                            <button id="closeGamesModal" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="wallet-tabs mb-3">
                            <button class="wallet-tab active" data-game-tab="lobby">غرفة الانتظار</button>
                            <button class="wallet-tab" data-game-tab="create">إنشاء تحدي</button>
                            ${userActiveGame ? '<button class="wallet-tab" data-game-tab="current">تحدي الحالي</button>' : ''}
                        </div>

                        <div id="gameLobbyTab" class="game-tab-content">
                            <h3 class="text-sm font-bold mb-2">التحديات المتاحة:</h3>
                            <div class="max-h-80 overflow-y-auto">
                                ${challengesHtml}
                            </div>
                        </div>

                        <div id="gameCreateTab" class="game-tab-content hidden">
                            <h3 class="text-sm font-bold mb-3">إنشاء تحدي روليت روسية</h3>
                            <div class="space-y-4">
                                <div>
                                    <label class="text-sm text-gray-400">مبلغ الرهان:</label>
                                    <input type="number" id="challengeBetAmount" min="10" max="${this.state.balance}" value="100" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                                </div>
                                <div>
                                    <label class="text-sm text-gray-400">نوع التحدي:</label>
                                    <select id="challengeType" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                                        <option value="public">عام (يمكن للجميع الانضمام)</option>
                                        <option value="private">خاص (لأصدقائك فقط)</option>
                                    </select>
                                </div>
                                <div class="flex gap-2">
                                    <button id="createChallengeBtn" class="flex-1 bg-blue-600 py-3 rounded-lg font-bold">
                                        إنشاء التحدي
                                    </button>
                                    <button id="cancelCreateBtn" class="flex-1 bg-gray-600 py-3 rounded-lg font-bold">
                                        إلغاء
                                    </button>
                                </div>
                            </div>
                        </div>

                        ${userActiveGame ? `
                            <div id="gameCurrentTab" class="game-tab-content hidden">
                                <div class="text-center py-3">
                                    <p class="text-sm mb-2">لديك تحدي نشط!</p>
                                    <button id="goToGameBtn" class="bg-green-600 px-4 py-2 rounded-lg text-sm">
                                        الذهاب إلى اللعبة
                                    </button>
                                </div>
                            </div>
                        ` : ''}
                    `;
                }

                bindGamesLobbyEvents() {
                    const modalOverlay = document.getElementById('gamesModalOverlay');
                    document.getElementById('closeGamesModal').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });
                    modalOverlay.addEventListener('click', (e) => {
                        if (e.target === modalOverlay) modalOverlay.classList.remove('open');
                    });

                    const gameTabs = document.querySelectorAll('[data-game-tab]');
                    gameTabs.forEach(tab => {
                        tab.addEventListener('click', () => {
                            gameTabs.forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');
                            const tabName = tab.dataset.gameTab;
                            document.getElementById('gameLobbyTab').classList.add('hidden');
                            document.getElementById('gameCreateTab').classList.add('hidden');
                            if (document.getElementById('gameCurrentTab')) {
                                document.getElementById('gameCurrentTab').classList.add('hidden');
                            }
                            
                            if (tabName === 'lobby') {
                                document.getElementById('gameLobbyTab').classList.remove('hidden');
                            } else if (tabName === 'create') {
                                document.getElementById('gameCreateTab').classList.remove('hidden');
                            } else if (tabName === 'current') {
                                document.getElementById('gameCurrentTab').classList.remove('hidden');
                            }
                        });
                    });

                    document.querySelectorAll('.join-challenge-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const challengeId = btn.dataset.challengeId;
                            const result = this.games.joinRouletteChallenge(challengeId, this.state.user.id, this.state.user.first_name);
                            
                            if (result.success) {
                                this.toast.success('تم الانضمام إلى التحدي بنجاح!');
                                modalOverlay.classList.remove('open');
                                this.openRouletteGame(result.challenge);
                            } else {
                                this.toast.error(result.message);
                            }
                        });
                    });

                    document.getElementById('createChallengeBtn')?.addEventListener('click', () => {
                        const betAmount = parseFloat(document.getElementById('challengeBetAmount').value);
                        const isPublic = document.getElementById('challengeType').value === 'public';
                        
                        if (isNaN(betAmount) || betAmount < 10) {
                            this.toast.error('أدخل مبلغ صحيح (10 على الأقل)');
                            return;
                        }
                        
                        if (betAmount > this.state.balance) {
                            this.toast.error('الرصيد غير كافٍ');
                            return;
                        }
                        
                        const result = this.games.createRouletteChallenge(
                            this.state.user.id,
                            this.state.user.first_name,
                            betAmount,
                            isPublic
                        );
                        
                        if (result.success) {
                            this.toast.success('تم إنشاء التحدي بنجاح! في انتظار المنافس');
                            modalOverlay.classList.remove('open');
                            this.openRouletteGame(result.challenge);
                        } else {
                            this.toast.error(result.message);
                        }
                    });

                    document.getElementById('cancelCreateBtn')?.addEventListener('click', () => {
                        document.querySelector('[data-game-tab="lobby"]').click();
                    });

                    document.getElementById('goToGameBtn')?.addEventListener('click', () => {
                        const game = this.games.getUserActiveGame(this.state.user.id);
                        if (game) {
                            modalOverlay.classList.remove('open');
                            this.openRouletteGame(game);
                        }
                    });
                }

                openRouletteLobby() {
                    const game = this.games.getUserActiveGame(this.state.user.id);
                    if (game) {
                        this.openRouletteGame(game);
                    } else {
                        this.openGamesLobby();
                    }
                }

                openRouletteGame(challenge) {
                    const modalOverlay = document.getElementById('rouletteGameModalOverlay');
                    const modalContent = document.getElementById('rouletteGameModalContent');
                    modalContent.innerHTML = this.renderRouletteGame(challenge);
                    modalOverlay.classList.add('open');
                    this.bindRouletteGameEvents(challenge);
                }

                renderRouletteGame(challenge) {
                    const user = this.state.user;
                    const player1 = challenge.players[0];
                    const player2 = challenge.players[1];
                    const isCreator = challenge.creatorId === user.id;
                    const isPlayerTurn = challenge.settings.turn === user.id;
                    const gameActive = challenge.status === 'active';
                    const gameFinished = challenge.status === 'finished';
                    
                    const chambers = [];
                    for (let i = 0; i < challenge.settings.chambers; i++) {
                        const isLoaded = i === challenge.settings.bulletPosition;
                        const isCurrent = i === challenge.settings.currentChamber && gameActive;
                        const isShot = challenge.settings.results.some(r => r.chamber === i && r.isShot);
                        const isPast = i < challenge.settings.currentChamber;
                        
                        chambers.push(`
                            <div class="chamber ${isLoaded ? 'loaded' : ''} ${isCurrent ? 'current' : ''} ${isShot ? 'shot' : ''}" 
                                 style="left: ${(i * 16) + 5}%">
                                ${isShot ? '💥' : (isLoaded && isPast ? '💀' : '')}
                            </div>
                        `);
                    }

                    return `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">🔫 الروليت الروسية</h2>
                            <button id="closeRouletteGame" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="roulette-container">
                            <div class="gun-model">
                                ${chambers.join('')}
                            </div>

                            <div class="flex justify-between items-center mt-4">
                                <div class="player-info">
                                    <div class="player-avatar ${player1.id === challenge.settings.turn ? 'current-turn' : ''} ${gameFinished && challenge.settings.winner === player1.id ? 'winner' : ''}">
                                        ${player1.name.charAt(0)}
                                    </div>
                                    <div class="text-xs mt-1">${player1.name}</div>
                                    ${player1.id === challenge.creatorId ? '<div class="text-[10px] text-yellow-400">⭐ منشئ</div>' : ''}
                                </div>
                                <div class="text-center">
                                    <div class="text-yellow-400 font-bold">${challenge.betAmount}</div>
                                    <div class="text-xs text-gray-400">الرهان</div>
                                </div>
                                <div class="player-info">
                                    <div class="player-avatar ${player2 ? (player2.id === challenge.settings.turn ? 'current-turn' : '') : ''} ${gameFinished && challenge.settings.winner === player2?.id ? 'winner' : ''}">
                                        ${player2 ? player2.name.charAt(0) : '?'}
                                    </div>
                                    <div class="text-xs mt-1">${player2 ? player2.name : 'في انتظار...'}</div>
                                </div>
                            </div>

                            <div class="bullet-indicator mt-4">
                                ${[...Array(challenge.settings.chambers)].map((_, i) => `
                                    <div class="bullet-dot ${i === challenge.settings.bulletPosition ? 'loaded' : ''} ${i < challenge.settings.currentChamber ? 'used' : ''}"></div>
                                `).join('')}
                            </div>

                            ${gameFinished ? `
                                <div class="text-center mt-4 p-3 rounded-lg bg-green-500/20 border border-green-500/30">
                                    <div class="text-green-400 font-bold">🏆 الفائز: ${challenge.players.find(p => p.id === challenge.settings.winner)?.name}</div>
                                    <div class="text-sm mt-1">فاز بمبلغ ${challenge.betAmount * 2}</div>
                                </div>
                            ` : ''}

                            ${!player2 ? `
                                <div class="text-center mt-4 p-3 rounded-lg bg-yellow-500/20 border border-yellow-500/30">
                                    <div class="text-yellow-400">⏳ في انتظار منافس...</div>
                                    ${isCreator ? `
                                        <button id="cancelChallengeBtn" class="mt-2 bg-red-500/20 text-red-400 px-4 py-2 rounded-lg text-sm">
                                            إلغاء التحدي
                                        </button>
                                    ` : ''}
                                </div>
                            ` : ''}

                            ${gameActive && player2 ? `
                                <div class="text-center mt-4">
                                    ${isPlayerTurn ? `
                                        <button id="pullTriggerBtn" class="bg-red-600 text-white px-6 py-3 rounded-xl font-bold w-full">
                                            🔫 اسحب الزناد
                                        </button>
                                        <p class="text-xs text-gray-400 mt-2">الرهان: ${challenge.betAmount}</p>
                                    ` : `
                                        <div class="p-3 rounded-lg bg-gray-700/50">
                                            <p class="text-sm">⏳ دور المنافس...</p>
                                        </div>
                                    `}
                                </div>
                            ` : ''}

                            ${!gameActive && player2 && !gameFinished ? `
                                <div class="text-center mt-4">
                                    <div class="p-3 rounded-lg bg-blue-500/20">
                                        <p class="text-sm">🎮 اللعبة جاهزة للبدء</p>
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }

                bindRouletteGameEvents(challenge) {
                    const modalOverlay = document.getElementById('rouletteGameModalOverlay');
                    document.getElementById('closeRouletteGame').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                        this.updateActiveGamesBadge();
                        this.render();
                    });
                    modalOverlay.addEventListener('click', (e) => {
                        if (e.target === modalOverlay) {
                            modalOverlay.classList.remove('open');
                            this.updateActiveGamesBadge();
                            this.render();
                        }
                    });

                    const cancelBtn = document.getElementById('cancelChallengeBtn');
                    if (cancelBtn) {
                        cancelBtn.addEventListener('click', () => {
                            const result = this.games.cancelChallenge(challenge.id, this.state.user.id);
                            if (result.success) {
                                this.toast.success('تم إلغاء التحدي واسترجاع الرصيد');
                                modalOverlay.classList.remove('open');
                                this.updateActiveGamesBadge();
                                this.render();
                            } else {
                                this.toast.error(result.message);
                            }
                        });
                    }

                    const pullTriggerBtn = document.getElementById('pullTriggerBtn');
                    if (pullTriggerBtn) {
                        pullTriggerBtn.addEventListener('click', () => {
                            const result = this.games.takeRouletteTurn(challenge.id, this.state.user.id);
                            if (result.success) {
                                if (result.isShot) {
                                    // انتهت اللعبة، أغلق المودال بعد 3 ثوان
                                    setTimeout(() => {
                                        modalOverlay.classList.remove('open');
                                        this.updateActiveGamesBadge();
                                        this.render();
                                    }, 3000);
                                }
                                // إعادة رسم اللعبة
                                setTimeout(() => {
                                    const updatedChallenge = this.games.getUserActiveGame(this.state.user.id);
                                    if (updatedChallenge) {
                                        this.openRouletteGame(updatedChallenge);
                                    } else {
                                        modalOverlay.classList.remove('open');
                                        this.render();
                                    }
                                }, 500);
                            } else {
                                this.toast.error(result.message);
                            }
                        });
                    }
                }

                // ========== لوحة المشرف ==========
                openAdminPanel() {
                    const modalOverlay = document.getElementById('adminPanelOverlay');
                    const modalContent = document.getElementById('adminPanelContent');
                    modalContent.innerHTML = this.renderAdminPanel();
                    modalOverlay.classList.add('open');
                    this.bindAdminPanelEvents();
                }

                renderAdminPanel() {
                    const pendingDeposits = this.data.getPendingDeposits();
                    const pendingWithdrawals = this.data.getPendingWithdrawals();

                    const depositsHtml = pendingDeposits.length === 0 
                        ? '<p class="text-gray-400 text-center py-2">لا توجد طلبات شحن معلقة</p>'
                        : pendingDeposits.map(req => `
                            <div class="request-item" data-id="${req.id}" data-type="deposit">
                                <div class="request-header">
                                    <span class="font-bold">${req.userName}</span>
                                    <span class="badge-pending">قيد الانتظار</span>
                                </div>
                                <div class="text-sm">المبلغ: <span class="text-blue-400">${req.amount.toLocaleString('ar-EG')}</span></div>
                                <div class="text-xs text-gray-400">الطريقة: ${req.method}</div>
                                <div class="text-xs text-gray-400">رقم العملية: <span class="text-yellow-400">${req.transactionId || 'غير محدد'}</span></div>
                                <div class="text-xs text-gray-400">التاريخ: ${DateUtils.formatDateTime(req.date)}</div>
                                <div class="request-actions">
                                    <button class="btn-accept accept-request" data-id="${req.id}" data-type="deposit">قبول</button>
                                    <button class="btn-reject reject-request" data-id="${req.id}" data-type="deposit">رفض</button>
                                </div>
                            </div>
                        `).join('');

                    const withdrawalsHtml = pendingWithdrawals.length === 0 
                        ? '<p class="text-gray-400 text-center py-2">لا توجد طلبات سحب معلقة</p>'
                        : pendingWithdrawals.map(req => `
                            <div class="request-item" data-id="${req.id}" data-type="withdrawal">
                                <div class="request-header">
                                    <span class="font-bold">${req.userName}</span>
                                    <span class="badge-pending">قيد الانتظار</span>
                                </div>
                                <div class="text-sm">المبلغ: <span class="text-red-400">${req.amount.toLocaleString('ar-EG')}</span></div>
                                <div class="text-xs text-gray-400">الطريقة: ${req.method}</div>
                                <div class="text-xs text-gray-400">التفاصيل: ${req.details || 'غير محدد'}</div>
                                <div class="text-xs text-gray-400">التاريخ: ${DateUtils.formatDateTime(req.date)}</div>
                                <div class="request-actions">
                                    <button class="btn-accept accept-request" data-id="${req.id}" data-type="withdrawal">قبول</button>
                                    <button class="btn-reject reject-request" data-id="${req.id}" data-type="withdrawal">رفض</button>
                                </div>
                            </div>
                        `).join('');

                    const paymentMethodsHtml = this.state.paymentMethods.map(m => `
                        <div class="payment-method-admin">
                            <div class="flex items-center gap-3">
                                <div class="payment-icon">
                                    <i class="${m.icon}"></i>
                                </div>
                                <div>
                                    <div class="font-bold">${m.name}</div>
                                    <div class="text-xs text-gray-400">${m.description || ''}</div>
                                </div>
                            </div>
                            <div class="actions">
                                <button class="edit-payment-method" data-id="${m.id}" title="تعديل"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button class="delete-payment-method" data-id="${m.id}" title="حذف"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                    `).join('');

                    return `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">لوحة الإدارة</h2>
                            <button id="closeAdminPanel" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="wallet-tabs mb-3">
                            <button class="wallet-tab active" data-admin-tab="requests">الطلبات</button>
                            <button class="wallet-tab" data-admin-tab="payment-methods">طرق الدفع</button>
                        </div>

                        <div id="adminRequestsTab" class="admin-tab-content">
                            <div class="space-y-6">
                                <div>
                                    <h3 class="text-lg font-bold mb-2 flex items-center gap-2">
                                        <i class="fa-solid fa-arrow-down text-green-400"></i>
                                        طلبات الشحن المعلقة
                                        <span class="bg-blue-600 text-white text-xs px-2 py-1 rounded-full">${pendingDeposits.length}</span>
                                    </h3>
                                    <div class="admin-requests-panel">${depositsHtml}</div>
                                </div>
                                <div>
                                    <h3 class="text-lg font-bold mb-2 flex items-center gap-2">
                                        <i class="fa-solid fa-arrow-up text-red-400"></i>
                                        طلبات السحب المعلقة
                                        <span class="bg-blue-600 text-white text-xs px-2 py-1 rounded-full">${pendingWithdrawals.length}</span>
                                    </h3>
                                    <div class="admin-requests-panel">${withdrawalsHtml}</div>
                                </div>
                            </div>
                        </div>

                        <div id="adminPaymentMethodsTab" class="admin-tab-content hidden">
                            <div class="flex justify-between items-center mb-3">
                                <h3 class="text-lg font-bold">طرق الدفع المتاحة</h3>
                                <button id="addPaymentMethodBtn" class="bg-blue-600 px-3 py-1 rounded-lg text-sm"><i class="fa-solid fa-plus"></i> إضافة</button>
                            </div>
                            <div class="space-y-2 max-h-96 overflow-y-auto">
                                ${paymentMethodsHtml}
                            </div>
                        </div>
                    `;
                }

                bindAdminPanelEvents() {
                    const modalOverlay = document.getElementById('adminPanelOverlay');
                    document.getElementById('closeAdminPanel').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });
                    modalOverlay.addEventListener('click', (e) => {
                        if (e.target === modalOverlay) modalOverlay.classList.remove('open');
                    });

                    const adminTabs = document.querySelectorAll('[data-admin-tab]');
                    adminTabs.forEach(tab => {
                        tab.addEventListener('click', () => {
                            adminTabs.forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');
                            const tabName = tab.dataset.adminTab;
                            if (tabName === 'requests') {
                                document.getElementById('adminRequestsTab').classList.remove('hidden');
                                document.getElementById('adminPaymentMethodsTab').classList.add('hidden');
                            } else {
                                document.getElementById('adminRequestsTab').classList.add('hidden');
                                document.getElementById('adminPaymentMethodsTab').classList.remove('hidden');
                            }
                        });
                    });

                    document.querySelectorAll('.accept-request').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            const type = btn.dataset.type;
                            const request = type === 'deposit' 
                                ? this.state.depositRequests.find(r => r.id === id)
                                : this.state.withdrawalRequests.find(r => r.id === id);
                            if (request) {
                                const success = this.data.acceptRequest(request, type);
                                if (success) {
                                    this.toast.success(`✅ تم قبول طلب ${type === 'deposit' ? 'الشحن' : 'السحب'}
                                        • المستخدم: ${request.userName}
                                        • المبلغ: ${request.amount}
                                        • الطريقة: ${request.method}
                                        ${type === 'deposit' ? `• رقم العملية: ${request.transactionId}` : `• التفاصيل: ${request.details}`}
                                        • رقم الطلب: ${request.id}`);
                                    this.openAdminPanel();
                                } else {
                                    this.toast.error('❌ حدث خطأ (قد يكون الرصيد غير كافٍ)');
                                }
                            }
                        });
                    });

                    document.querySelectorAll('.reject-request').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            const type = btn.dataset.type;
                            const request = type === 'deposit' 
                                ? this.state.depositRequests.find(r => r.id === id)
                                : this.state.withdrawalRequests.find(r => r.id === id);
                            if (request) {
                                this.data.rejectRequest(request, type);
                                this.toast.info(`❌ تم رفض طلب ${type === 'deposit' ? 'الشحن' : 'السحب'}
                                    • المستخدم: ${request.userName}
                                    • المبلغ: ${request.amount}
                                    • الطريقة: ${request.method}
                                    ${type === 'deposit' ? `• رقم العملية: ${request.transactionId}` : `• التفاصيل: ${request.details}`}
                                    • رقم الطلب: ${request.id}`);
                                this.openAdminPanel();
                            }
                        });
                    });

                    document.getElementById('addPaymentMethodBtn')?.addEventListener('click', () => {
                        this.openPaymentMethodModal();
                    });

                    document.querySelectorAll('.edit-payment-method').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            this.openPaymentMethodModal(id);
                        });
                    });

                    document.querySelectorAll('.delete-payment-method').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            if (confirm('هل أنت متأكد من حذف طريقة الدفع هذه؟')) {
                                this.data.deletePaymentMethod(id);
                                this.toast.success('تم الحذف بنجاح');
                                this.openAdminPanel();
                            }
                        });
                    });
                }

                openPaymentMethodModal(editingId = null) {
                    const modalOverlay = document.getElementById('paymentMethodModalOverlay');
                    const modalContent = document.getElementById('paymentMethodModalContent');
                    const method = editingId ? this.state.paymentMethods.find(m => m.id === editingId) : null;
                    
                    modalContent.innerHTML = `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">${method ? 'تعديل طريقة دفع' : 'إضافة طريقة دفع جديدة'}</h2>
                            <button id="closePaymentMethodModal" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                        <form id="paymentMethodForm" class="space-y-3">
                            <input type="hidden" id="methodId" value="${method?.id || ''}">
                            <div>
                                <label class="text-sm text-gray-400">اسم الطريقة</label>
                                <input type="text" id="methodName" required value="${method?.name || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                            </div>
                            <div>
                                <label class="text-sm text-gray-400">الأيقونة (class FontAwesome)</label>
                                <input type="text" id="methodIcon" value="${method?.icon || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                            </div>
                            <div>
                                <label class="text-sm text-gray-400">وصف مختصر</label>
                                <input type="text" id="methodDescription" value="${method?.description || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                            </div>
                            <div>
                                <label class="text-sm text-gray-400">تفاصيل الإيداع</label>
                                <textarea id="methodDepositDetails" rows="2" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">${method?.depositDetails || ''}</textarea>
                            </div>
                            <div>
                                <label class="text-sm text-gray-400">تفاصيل السحب (placeholder)</label>
                                <input type="text" id="methodWithdrawDetails" value="${method?.withdrawDetails || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                            </div>
                            <div class="flex gap-2 pt-2">
                                <button type="submit" class="flex-1 bg-blue-600 py-2 rounded-lg font-bold">حفظ</button>
                                <button type="button" id="cancelPaymentMethod" class="flex-1 bg-gray-600 py-2 rounded-lg font-bold">إلغاء</button>
                            </div>
                        </form>
                    `;
                    
                    modalOverlay.classList.add('open');
                    this.bindPaymentMethodModalEvents();
                }

                bindPaymentMethodModalEvents() {
                    const modalOverlay = document.getElementById('paymentMethodModalOverlay');
                    document.getElementById('closePaymentMethodModal').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });
                    document.getElementById('cancelPaymentMethod').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });
                    modalOverlay.addEventListener('click', (e) => {
                        if (e.target === modalOverlay) modalOverlay.classList.remove('open');
                    });

                    document.getElementById('paymentMethodForm').addEventListener('submit', (e) => {
                        e.preventDefault();
                        const formData = {
                            name: document.getElementById('methodName').value,
                            icon: document.getElementById('methodIcon').value,
                            description: document.getElementById('methodDescription').value,
                            depositDetails: document.getElementById('methodDepositDetails').value,
                            withdrawDetails: document.getElementById('methodWithdrawDetails').value
                        };
                        const id = document.getElementById('methodId').value;
                        
                        if (id) {
                            this.data.updatePaymentMethod(id, formData);
                            this.toast.success('تم التحديث بنجاح');
                        } else {
                            this.data.addPaymentMethod(formData);
                            this.toast.success('تمت الإضافة بنجاح');
                        }
                        
                        modalOverlay.classList.remove('open');
                        this.openAdminPanel();
                    });
                }

                openNotificationsModal() {
                    const modalOverlay = document.getElementById('walletModalOverlay');
                    const modalContent = document.getElementById('walletModalContent');
                    modalContent.innerHTML = this.renderNotificationsModal();
                    modalOverlay.classList.add('open');
                    this.bindNotificationsModalEvents();
                }

                renderNotificationsModal() {
                    const userId = this.state.user.id;
                    const notifications = this.data.notificationService.getUserNotifications(userId);
                    
                    const notificationsHtml = notifications.length === 0 
                        ? '<p class="text-center text-gray-400 py-8">لا توجد إشعارات</p>'
                        : notifications.map(n => `
                            <div class="transaction-item ${n.read ? 'opacity-60' : ''}" data-id="${n.id}">
                                <div class="flex-1">
                                    <div class="font-bold flex items-center gap-2">
                                        ${!n.read ? '<span class="w-2 h-2 bg-blue-500 rounded-full"></span>' : ''}
                                        ${n.title}
                                    </div>
                                    <div class="text-sm">${n.message}</div>
                                    <div class="text-xs text-gray-400 mt-1">${DateUtils.formatDateTime(n.date)}</div>
                                </div>
                                ${!n.read ? `
                                    <button class="mark-read text-xs text-blue-400 hover:text-blue-300" data-id="${n.id}">
                                        <i class="fa-regular fa-circle-check"></i>
                                    </button>
                                ` : ''}
                            </div>
                        `).join('');
                    
                    return `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">الإشعارات</h2>
                            <button id="closeNotificationsModal" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                        <div class="flex justify-end mb-3">
                            <button id="markAllRead" class="text-sm bg-blue-600 px-3 py-1 rounded-lg">
                                <i class="fa-regular fa-bell-slash ml-1"></i> تحديد الكل كمقروء
                            </button>
                        </div>
                        <div class="max-h-96 overflow-y-auto space-y-2">
                            ${notificationsHtml}
                        </div>
                    `;
                }

                bindNotificationsModalEvents() {
                    const modalOverlay = document.getElementById('walletModalOverlay');
                    document.getElementById('closeNotificationsModal').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });
                    
                    document.getElementById('markAllRead')?.addEventListener('click', () => {
                        this.data.notificationService.markAllAsRead(this.state.user.id);
                        this.toast.success('تم تحديد الكل كمقروء');
                        this.openNotificationsModal();
                        this.updateNotificationBadge();
                    });
                    
                    document.querySelectorAll('.mark-read').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const id = btn.dataset.id;
                            this.data.notificationService.markAsRead(id);
                            this.openNotificationsModal();
                            this.updateNotificationBadge();
                        });
                    });
                    
                    modalOverlay.addEventListener('click', (e) => {
                        if (e.target === modalOverlay) modalOverlay.classList.remove('open');
                    });
                }
            }

            // ======================== التطبيق الرئيسي ========================
            class App {
                constructor() {
                    this.state = new AppState();
                    this.telegram = new TelegramService();
                    this.toast = new ToastManager('toastContainer');
                    this.data = new DataService(this.state);
                    this.games = new GamesService(this.state, this.data, this.toast, this.data.notificationService);
                    this.ui = new UIManager(this.state, this.data, this.telegram, this.toast, this.games);
                    
                    this.init();
                }

                async init() {
                    if (!this.telegram.isAvailable) {
                        this.state.telegramMissing = true;
                        this.state.loading = false;
                        this.ui.render();
                        return;
                    }

                    this.telegram.init();

                    if (!this.telegram.isValid() || !this.telegram.getUser()) {
                        this.state.accessDenied = true;
                        this.state.loading = false;
                        this.ui.render();
                        return;
                    }

                    const user = this.telegram.getUser();
                    this.state.user = user;
                    this.state.isAdmin = (user.id === CONFIG.ADMIN_ID);

                    this.data.registerUser(user.id);

                    const savedTheme = this.data.loadTheme();
                    this.applyTheme(savedTheme);

                    this.loadSettings();

                    this.state.loading = true;
                    this.ui.render();

                    try {
                        await new Promise(resolve => setTimeout(resolve, 1000));
                        this.data.loadStats();
                        this.state.loading = false;
                        this.ui.render();

                        this.telegram.setMainButton(
                            this.state.isAdmin ? "لوحة التحكم" : "تحديث البيانات",
                            '#3b82f6',
                            '#ffffff',
                            true,
                            () => {
                                this.telegram.showPopup({
                                    title: this.state.isAdmin ? 'مرحباً أيها المدير' : 'نظام آمن',
                                    message: this.state.isAdmin 
                                        ? `لديك صلاحيات كاملة. الطلبات المعلقة: ${this.data.getPendingDeposits().length + this.data.getPendingWithdrawals().length}`
                                        : `أهلاً ${user.first_name}، اتصالك آمن.`,
                                    buttons: [{ type: 'ok', text: 'حسناً' }]
                                });
                            }
                        );

                        this.toast.success(`مرحباً ${user.first_name}، أهلاً بك في المحفظة المتطورة`);
                    } catch (error) {
                        console.error('Initialization error:', error);
                        this.toast.error('حدث خطأ أثناء تحميل البيانات');
                        this.state.loading = false;
                        this.ui.render();
                    }
                }

                loadSettings() {
                    const settings = this.state.settings;
                    this.toast.soundEnabled = settings.sound;
                    this.toast.vibrateEnabled = settings.vibrate;
                    
                    document.getElementById('soundToggle').checked = settings.sound;
                    document.getElementById('vibrateToggle').checked = settings.vibrate;
                }

                applyTheme(theme) {
                    const root = document.documentElement;
                    const themeIcon = document.getElementById('themeIcon');
                    
                    if (theme === 'light') {
                        root.style.setProperty('--tg-theme-bg-color', '#f8fafc');
                        root.style.setProperty('--tg-theme-text-color', '#0f172a');
                        root.style.setProperty('--tg-theme-button-color', '#3b82f6');
                        root.style.setProperty('--tg-theme-button-text-color', '#ffffff');
                        themeIcon.className = 'fa-solid fa-sun';
                    } else {
                        root.style.setProperty('--tg-theme-bg-color', '#0f172a');
                        root.style.setProperty('--tg-theme-text-color', '#ffffff');
                        root.style.setProperty('--tg-theme-button-color', '#3b82f6');
                        root.style.setProperty('--tg-theme-button-text-color', '#ffffff');
                        themeIcon.className = 'fa-solid fa-moon';
                    }
                }
            }

            // ======================== بدء التطبيق ========================
            const app = new App();

            document.getElementById('themeToggle').addEventListener('click', () => {
                const newTheme = app.state.theme === 'dark' ? 'light' : 'dark';
                app.state.theme = newTheme;
                app.data.saveTheme(newTheme);
                app.applyTheme(newTheme);
                app.toast.info(`تم تغيير السمة إلى ${newTheme === 'dark' ? 'الداكنة' : 'الفاتحة'}`);
            });

            const settingsOverlay = document.getElementById('settingsOverlay');
            const settingsPanel = document.getElementById('settingsPanel');
            
            document.getElementById('closeSettings').addEventListener('click', () => {
                settingsOverlay.classList.remove('open');
                settingsPanel.classList.remove('open');
            });

            settingsOverlay.addEventListener('click', () => {
                settingsOverlay.classList.remove('open');
                settingsPanel.classList.remove('open');
            });

            document.getElementById('languageSelect').addEventListener('change', (e) => {
                app.state.settings.language = e.target.value;
                app.data.saveSettings();
                app.toast.success(`تم تغيير اللغة إلى ${e.target.value === 'ar' ? 'العربية' : 'الإنجليزية'}`);
            });

            document.getElementById('notificationsToggle').addEventListener('change', (e) => {
                app.state.settings.notifications = e.target.checked;
                app.data.saveSettings();
                app.toast.success(e.target.checked ? 'تم تفعيل الإشعارات' : 'تم إيقاف الإشعارات');
            });

            document.getElementById('soundToggle').addEventListener('change', (e) => {
                app.state.settings.sound = e.target.checked;
                app.data.saveSettings();
                app.toast.soundEnabled = e.target.checked;
                app.toast.success(e.target.checked ? 'تم تفعيل التنبيه الصوتي' : 'تم إيقاف التنبيه الصوتي');
            });

            document.getElementById('vibrateToggle').addEventListener('change', (e) => {
                app.state.settings.vibrate = e.target.checked;
                app.data.saveSettings();
                app.toast.vibrateEnabled = e.target.checked;
                app.toast.success(e.target.checked ? 'تم تفعيل الاهتزاز' : 'تم إيقاف الاهتزاز');
            });
        })();
    </script>
</body>
</html>
