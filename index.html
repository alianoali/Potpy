<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة تيليجرام المتطورة - محفظة احترافية مع إدارة مشرف</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts (Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                    },
                    colors: {
                        tg: {
                            bg: 'var(--tg-theme-bg-color, #0f172a)',
                            text: 'var(--tg-theme-text-color, #ffffff)',
                            button: 'var(--tg-theme-button-color, #3b82f6)',
                            buttonText: 'var(--tg-theme-button-text-color, #ffffff)',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--tg-theme-bg-color, #0f172a);
            color: var(--tg-theme-text-color, #ffffff);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* الخلفية المتحركة */
        .ambient-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }
        
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 10s infinite ease-in-out;
        }
        
        .orb-1 { top: -10%; right: -10%; width: 300px; height: 300px; background: #3b82f6; animation-delay: 0s; }
        .orb-2 { bottom: -10%; left: -10%; width: 250px; height: 250px; background: #8b5cf6; animation-delay: 5s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, 40px); }
        }

        /* Glassmorphism */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(40, 51, 69, 0.8);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Animations */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-enter {
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Loader */
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--tg-theme-button-color, #3b82f6);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Avatar */
        .default-avatar {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            font-weight: bold;
        }

        /* Toast Notifications - متطور */
        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 90%;
            max-width: 350px;
            pointer-events: none;
        }

        .toast {
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 12px 20px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: toastSlideUp 0.3s ease, toastFadeOut 0.3s ease 2.7s forwards;
            pointer-events: auto;
            direction: rtl;
        }

        .toast.success { border-right: 4px solid #10b981; }
        .toast.error { border-right: 4px solid #ef4444; }
        .toast.warning { border-right: 4px solid #f59e0b; }
        .toast.info { border-right: 4px solid #3b82f6; }

        .toast-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .toast.success .toast-icon { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .toast.error .toast-icon { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .toast.warning .toast-icon { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .toast.info .toast-icon { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }

        .toast-message {
            flex: 1;
        }

        @keyframes toastSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastFadeOut {
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* Theme toggle */
        .theme-toggle {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: rgba(40, 51, 69, 0.8);
        }

        /* Settings panel */
        .settings-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 1000;
            border-radius: 30px 30px 0 0;
        }

        .settings-panel.open {
            transform: translateY(0);
        }

        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .settings-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        /* Wallet Modal */
        .wallet-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .wallet-modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .wallet-modal {
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .wallet-modal-overlay.open .wallet-modal {
            transform: scale(1);
        }

        .wallet-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 12px;
            flex-wrap: wrap;
        }

        .wallet-tab {
            flex: 1;
            min-width: 70px;
            padding: 8px 5px;
            text-align: center;
            border-radius: 12px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.5);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
        }

        .wallet-tab.active {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .wallet-tab i {
            margin-left: 6px;
            font-size: 14px;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .transaction-amount.positive { color: #10b981; }
        .transaction-amount.negative { color: #ef4444; }

        /* أيقونة المحفظة الكبيرة والمتطورة */
        .wallet-icon-large {
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, #3b82f6, #8b5cf6);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.5), 0 0 0 2px rgba(255,255,255,0.1) inset;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: floatWallet 3s infinite ease-in-out;
            position: relative;
            overflow: hidden;
        }

        .wallet-icon-large::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), transparent 70%);
            opacity: 0.6;
        }

        .wallet-icon-large i {
            font-size: 36px;
            color: white;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            animation: pulseIcon 2s infinite ease-in-out;
            position: relative;
            z-index: 2;
        }

        .wallet-icon-large:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.8), 0 0 0 4px rgba(255,255,255,0.2) inset;
        }

        @keyframes floatWallet {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        @keyframes pulseIcon {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* بطاقة الرصيد الصغيرة */
        .balance-badge {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 6px 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 12px;
        }

        .balance-badge i {
            color: #fbbf24;
        }

        /* طرق الدفع - صور وأيقونات */
        .payment-method {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
        }

        .payment-method:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .payment-method.selected {
            background: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
        }

        .payment-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: #334155;
            color: white;
            flex-shrink: 0;
        }
        
        .payment-icon img {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            object-fit: cover;
        }

        /* تفاصيل طريقة الدفع عند الاختيار */
        .payment-details {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 12px;
            margin: 10px 0 15px 0;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 13px;
            line-height: 1.6;
        }

        .payment-details strong {
            color: #3b82f6;
        }

        /* لوحة المشرف */
        .admin-requests-panel {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 16px;
            margin-top: 16px;
        }

        .request-item {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .request-id {
            font-size: 10px;
            color: #94a3b8;
            font-family: monospace;
        }

        .request-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-accept {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-accept:hover {
            background: rgba(16, 185, 129, 0.3);
        }

        .btn-reject {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-reject:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .badge-pending {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 600;
        }

        /* أزرار تحرير طرق الدفع */
        .payment-method-admin {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .payment-method-admin .actions button {
            background: transparent;
            border: none;
            color: #94a3b8;
            margin: 0 4px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .payment-method-admin .actions button:hover {
            color: white;
        }
        .payment-method-admin .actions button.delete:hover { color: #ef4444; }
        .payment-method-admin .actions button.edit:hover { color: #3b82f6; }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="ambient-light">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Theme Toggle -->
    <div class="theme-toggle" id="themeToggle">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
        <span class="text-sm">السمة</span>
    </div>

    <!-- Main Container -->
    <div id="app" class="w-full max-w-md p-5 relative"></div>

    <!-- Settings Panel -->
    <div class="settings-overlay" id="settingsOverlay"></div>
    <div class="settings-panel" id="settingsPanel">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-bold">الإعدادات</h3>
            <button id="closeSettings" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
        <div class="space-y-4">
            <div class="flex items-center justify-between">
                <span>اللغة</span>
                <select class="bg-white/10 rounded-lg p-2" id="languageSelect">
                    <option value="ar">العربية</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div class="flex items-center justify-between">
                <span>الإشعارات</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" id="notificationsToggle">
                    <div class="w-11 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600"></div>
                </label>
            </div>
        </div>
    </div>

    <!-- Toast Container للتنبيهات المتطورة -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Wallet Modal (سيتم تعبئته ديناميكياً) -->
    <div class="wallet-modal-overlay" id="walletModalOverlay">
        <div class="wallet-modal" id="walletModalContent"></div>
    </div>

    <!-- Admin Panel Modal (لإدارة الطلبات وطرق الدفع) -->
    <div class="wallet-modal-overlay" id="adminPanelOverlay">
        <div class="wallet-modal" id="adminPanelContent" style="max-width: 500px;"></div>
    </div>

    <!-- Modal for editing payment method -->
    <div class="wallet-modal-overlay" id="paymentMethodModalOverlay">
        <div class="wallet-modal" id="paymentMethodModalContent" style="max-width: 450px;"></div>
    </div>

    <script>
        (function() {
            // -----------------------------------------------
            // إعدادات ثابتة
            // -----------------------------------------------
            const ADMIN_ID = 7609492965; // غيّر هذا إلى معرف المشرف الخاص بك
            
            // -----------------------------------------------
            // طرق الدفع الافتراضية (سيتم تحميلها من localStorage)

            // -----------------------------------------------

            const appContainer = document.getElementById('app');
            
            // مراجع العناصر
            const settingsOverlay = document.getElementById('settingsOverlay');

            const themeToggle = document.getElementById('themeToggle');

            const paymentMethodModalOverlay = document.getElementById('paymentMethodModalOverlay');
            const paymentMethodModalContent = document.getElementById('paymentMethodModalContent');
            const toastContainer = document.getElementById('toastContainer');

            // -----------------------------------------------
            // نظام التنبيهات المتطور
            // -----------------------------------------------
            function showToast(message, type = 'info', duration = 3000) {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                
                // اختيار الأيقونة حسب النوع
                let iconHtml = '';
                switch(type) {
                    case 'success':
                        iconHtml = '<i class="fa-solid fa-check"></i>';
                        break;
                    case 'error':
                        iconHtml = '<i class="fa-solid fa-exclamation"></i>';
                        break;
                    case 'warning':
                        iconHtml = '<i class="fa-solid fa-triangle-exclamation"></i>';
                        break;
                    default:
                        iconHtml = '<i class="fa-solid fa-info"></i>';
                }
                
                toast.innerHTML = `
                    <div class="toast-icon">${iconHtml}</div>
                    <div class="toast-message">${message}</div>
                `;
                
                toastContainer.appendChild(toast);
                
                setTimeout(() => {
                    toast.remove();
                }, duration);
            }

            // دوال مساعدة للتنبيهات السريعة
            const toast = {
                success: (msg) => showToast(msg, 'success'),
                error: (msg) => showToast(msg, 'error'),
                warning: (msg) => showToast(msg, 'warning'),
                info: (msg) => showToast(msg, 'info')
            };

            // -----------------------------------------------
            // دوال مساعدة (مع معالجة أخطاء localStorage)
            // -----------------------------------------------
            function safeLocalStorageGet(key, defaultValue) {
                try {
                    const value = localStorage.getItem(key);
                    return value !== null ? JSON.parse(value) : defaultValue;
                } catch (e) {
                    return defaultValue;
                }
            }

            function safeLocalStorageSet(key, value) {
                try {
                    localStorage.setItem(key, JSON.stringify(value));
                } catch (e) {
                    // تجاهل الخطأ
                }
            }

            function updateTheme(theme) {
                if (theme === 'light') {
                    document.documentElement.style.setProperty('--tg-theme-bg-color', '#f8fafc');
                    document.documentElement.style.setProperty('--tg-theme-text-color', '#0f172a');
                    document.documentElement.style.setProperty('--tg-theme-button-color', '#3b82f6');
                    document.documentElement.style.setProperty('--tg-theme-button-text-color', '#ffffff');
                    themeIcon.className = 'fa-solid fa-sun';
                } else {
                    document.documentElement.style.setProperty('--tg-theme-bg-color', '#0f172a');
                    document.documentElement.style.setProperty('--tg-theme-text-color', '#ffffff');
                    document.documentElement.style.setProperty('--tg-theme-button-color', '#3b82f6');
                    document.documentElement.style.setProperty('--tg-theme-button-text-color', '#ffffff');
                    themeIcon.className = 'fa-solid fa-moon';
                }
                safeLocalStorageSet('theme', theme);
            }

            // دوال الإحصائيات الحقيقية
            function getTodayDate() {
                return new Date().toISOString().split('T')[0];
            }

            function updateStats() {
                try {
                    let usersSet = new Set(safeLocalStorageGet('app_users', []));
                    state.stats.users = usersSet.size;

                    let bots = safeLocalStorageGet('app_bots', [{ id: 123456, name: 'البوت الرسمي' }]);
                    state.stats.bots = bots.length;

                    const today = getTodayDate();
                    let dailyOpsData = safeLocalStorageGet('daily_ops', {});
                    state.stats.dailyOps = dailyOpsData[today] || 0;
                } catch (e) {
                    state.stats.users = 0;
                    state.stats.bots = 1;
                    state.stats.dailyOps = 0;
                }
            }

            function incrementDailyOps() {
                try {
                    const today = getTodayDate();
                    let dailyOpsData = safeLocalStorageGet('daily_ops', {});
                    dailyOpsData[today] = (dailyOpsData[today] || 0) + 1;
                    safeLocalStorageSet('daily_ops', dailyOpsData);
                    updateStats();
                } catch (e) {}
            }

            function registerUser(userId) {
                try {
                    let usersSet = new Set(safeLocalStorageGet('app_users', []));
                    if (!usersSet.has(userId)) {
                        usersSet.add(userId);
                        safeLocalStorageSet('app_users', [...usersSet]);
                        updateStats();
                    }
                } catch (e) {}
            }

            // دوال المحفظة والطلبات
            function loadWalletData() {
                try {
                    const saved = safeLocalStorageGet('wallet_data', null);
                    if (saved) {
                        state.balance = saved.balance || 0;
                        state.wallet.transactions = saved.transactions || [];
                        state.wallet.address = saved.address || state.wallet.address;
                    } else {
                        // بيانات افتراضية للمستخدم الجديد
                        state.balance = 1000;  // رصيد تجريبي
                        state.wallet.transactions = [];
                    }
                } catch (e) {
                    state.balance = 1000;
                    state.wallet.transactions = [];
                }
            }

            function saveWalletData() {
                try {
                    const data = {
                        balance: state.balance,
                        transactions: state.wallet.transactions,
                        address: state.wallet.address
                    };
                    safeLocalStorageSet('wallet_data', data);
                } catch (e) {}
            }

            // دوال طرق الدفع
            function loadPaymentMethods() {
                try {
                    const saved = safeLocalStorageGet('payment_methods', null);
                    if (saved && Array.isArray(saved) && saved.length > 0) {
                        state.paymentMethods = saved;
                    } else {
                        state.paymentMethods = DEFAULT_PAYMENT_METHODS.map(m => ({ 
                            ...m, 
                            id: m.id + '_' + Date.now() + Math.random().toString(36).substr(2,4) 
                        }));
                    }
                } catch (e) {
                    state.paymentMethods = DEFAULT_PAYMENT_METHODS;
                }
            }

            function savePaymentMethods() {
                try {
                    safeLocalStorageSet('payment_methods', state.paymentMethods);
                } catch (e) {}
            }

            // إضافة طريقة دفع جديدة
            function addPaymentMethod(methodData) {
                const newMethod = {
                    id: 'pm_' + Date.now() + Math.random().toString(36).substr(2, 6),
                    ...methodData
                };
                state.paymentMethods.push(newMethod);
                savePaymentMethods();
                return newMethod;
            }

            // تحديث طريقة دفع
            function updatePaymentMethod(id, newData) {
                const index = state.paymentMethods.findIndex(m => m.id === id);
                if (index !== -1) {
                    state.paymentMethods[index] = { ...state.paymentMethods[index], ...newData };
                    savePaymentMethods();
                    return true;
                }
                return false;
            }

            // حذف طريقة دفع
            function deletePaymentMethod(id) {
                state.paymentMethods = state.paymentMethods.filter(m => m.id !== id);
                savePaymentMethods();
            }

            // دوال الطلبات
            function loadRequests() {
                try {
                    const deposits = safeLocalStorageGet('deposit_requests', []);
                    const withdrawals = safeLocalStorageGet('withdrawal_requests', []);
                    state.depositRequests = deposits;
                    state.withdrawalRequests = withdrawals;
                } catch (e) {
                    state.depositRequests = [];
                    state.withdrawalRequests = [];
                }
            }

            function saveRequests() {
                try {
                    safeLocalStorageSet('deposit_requests', state.depositRequests);
                    safeLocalStorageSet('withdrawal_requests', state.withdrawalRequests);
                } catch (e) {}
            }

            function addTransaction(type, amount, note = '', status = 'مكتمل') {
                const tx = {
                    id: Date.now() + Math.random().toString(36).substr(2, 5),
                    type: type, // 'deposit', 'withdraw', 'transfer'
                    amount: amount,
                    note: note,
                    status: status,
                    date: new Date().toISOString()
                };
                state.wallet.transactions.unshift(tx);
                if (state.wallet.transactions.length > 50) state.wallet.transactions.pop();
                saveWalletData();
            }

            // إضافة طلب شحن (يتطلب موافقة المشرف) - مع إضافة رقم العملية
            function addDepositRequest(amount, methodId, transactionId) {
                const method = state.paymentMethods.find(m => m.id === methodId);
                const request = {
                    id: 'dep_' + Date.now() + Math.random().toString(36).substr(2, 5),
                    userId: state.user.id,
                    userName: `${state.user.first_name} ${state.user.last_name || ''}`.trim(),
                    amount: amount,
                    method: method ? method.name : methodId,
                    methodId: methodId,
                    transactionId: transactionId, // رقم العملية
                    status: 'pending', // pending, approved, rejected
                    date: new Date().toISOString()
                };
                state.depositRequests.push(request);
                saveRequests();
                incrementDailyOps();
                return request.id;
            }

            // إضافة طلب سحب (يتطلب موافقة المشرف)
            function addWithdrawalRequest(amount, methodId, details) {
                if (amount > state.balance) {
                    return { success: false, message: 'الرصيد غير كافٍ' };
                }
                const method = state.paymentMethods.find(m => m.id === methodId);
                const request = {
                    id: 'with_' + Date.now() + Math.random().toString(36).substr(2, 5),
                    userId: state.user.id,
                    userName: `${state.user.first_name} ${state.user.last_name || ''}`.trim(),
                    amount: amount,
                    method: method ? method.name : methodId,
                    methodId: methodId,
                    details: details,
                    status: 'pending',
                    date: new Date().toISOString()
                };
                state.withdrawalRequests.push(request);
                saveRequests();
                incrementDailyOps();
                return { success: true, id: request.id };
            }

            // الموافقة على طلب (للمشرف)
            function acceptRequest(request, type) {
                if (type === 'deposit') {
                    const req = state.depositRequests.find(r => r.id === request.id);
                    if (req && req.status === 'pending') {
                        req.status = 'approved';
                        // زيادة الرصيد
                        state.balance += req.amount;
                        // تسجيل المعاملة
                        addTransaction('deposit', req.amount, `شحن عبر ${req.method} (تمت الموافقة) - رقم العملية: ${req.transactionId || 'غير محدد'}`);
                        saveWalletData();
                        saveRequests();
                        return true;
                    }
                } else if (type === 'withdrawal') {
                    const req = state.withdrawalRequests.find(r => r.id === request.id);
                    if (req && req.status === 'pending') {
                        // التحقق من الرصيد (قد يتغير بمرور الوقت)
                        if (state.balance >= req.amount) {
                            req.status = 'approved';
                            state.balance -= req.amount;
                            addTransaction('withdraw', -req.amount, `سحب عبر ${req.method} إلى ${req.details || 'محفظة'}`);
                            saveWalletData();
                            saveRequests();
                            return true;
                        } else {
                            return false; // رصيد غير كافٍ (يمكن رفض تلقائي)
                        }
                    }
                }
                return false;
            }

            // رفض الطلب
            function rejectRequest(request, type) {
                if (type === 'deposit') {
                    const req = state.depositRequests.find(r => r.id === request.id);
                    if (req) {
                        req.status = 'rejected';
                        saveRequests();
                        return true;
                    }
                } else if (type === 'withdrawal') {
                    const req = state.withdrawalRequests.find(r => r.id === request.id);
                    if (req) {
                        req.status = 'rejected';
                        saveRequests();
                        return true;
                    }
                }
                return false;
            }

            // دوال لعرض الطلبات في لوحة المشرف
            function getPendingDeposits() {
                return state.depositRequests.filter(r => r.status === 'pending');
            }

                return state.withdrawalRequests.filter(r => r.status === 'pending');

            function renderWalletModal() {
                const balance = state.balance;
                const transactions = state.wallet.transactions;
                const address = state.wallet.address;

                let transactionsHtml = '';
                if (transactions.length === 0) {
                    transactionsHtml = '<p class="text-center text-gray-400 py-4">لا توجد معاملات بعد</p>';
                } else {
                    transactionsHtml = transactions.map(tx => {
                        const amountClass = tx.amount > 0 ? 'positive' : 'negative';
                        const amountStr = (tx.amount > 0 ? '+' : '') + tx.amount.toLocaleString('ar-EG');
                        const date = new Date(tx.date).toLocaleString('ar-EG');
                        return `
                            <div class="transaction-item">
                                <div>
                                    <div class="font-medium">${tx.note || tx.type}</div>
                                    <div class="text-xs text-gray-400">${date}</div>
                                </div>
                                <div class="transaction-amount ${amountClass} font-bold">${amountStr}</div>
                            </div>
                        `;
                    }).join('');
                }

                // إنشاء خيارات طرق الدفع (للعرض في tabs) باستخدام state.paymentMethods
                const paymentMethodsHtml = state.paymentMethods.map(m => `
                    <div class="payment-method" data-method-id="${m.id}">
                        <div class="payment-icon ${m.iconClass || ''}">
                            ${m.imageUrl ? `<img src="${m.imageUrl}" alt="${m.name}">` : `<i class="${m.icon}"></i>`}
                        </div>
                        <div class="flex-1">
                            <div class="font-bold">${m.name}</div>
                            <div class="text-xs text-gray-400">${(m.description || '').substring(0, 30)}...</div>
                        </div>

                const withdrawMethodsHtml = state.paymentMethods.map(m => `
                    <div class="payment-method" data-method-id="${m.id}">
                        <div class="payment-icon ${m.iconClass || ''}">
                            ${m.imageUrl ? `<img src="${m.imageUrl}" alt="${m.name}">` : `<i class="${m.icon}"></i>`}

                        <div class="flex-1">

                return `
                    <div class="flex justify-between items-center mb-4">

                        <button id="closeWalletModal" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">

                    <!-- الرصيد -->

                                <input type="number" id="depositAmount" placeholder="المبلغ" class="flex-1 bg-slate-800 border border-white/10 rounded-lg p-2 text-white">

                            </div>

                            <p class="text-xs text-gray-400 mt-2">سيتم مراجعة طلب السحب من قبل الإدارة وتحويل المبلغ بعد الموافقة.</p>

            // دالة عرض لوحة المشرف (إدارة الطلبات + طرق الدفع) مع عرض رقم العملية في طلبات الشحن
            function renderAdminPanel() {

                const depositsHtml = pendingDeposits.length === 0

                                <span class="font-bold">${req.userName}</span>

                            </div>

                            <div class="text-xs text-gray-400">الطريقة: ${req.method}</div>

                    ? '<p class="text-gray-400 text-center py-2">لا توجد طلبات سحب معلقة</p>'

                        <div class="request-item" data-id="${req.id}" data-type="withdrawal">
                            <div class="request-header">
                                <span class="font-bold">${req.userName}</span>
                                <span class="badge-pending">قيد الانتظار</span>
                            </div>
                            <div class="text-sm">المبلغ: <span class="text-red-400">${req.amount.toLocaleString('ar-EG')}</span></div>
                            <div class="text-xs text-gray-400">الطريقة: ${req.method}</div>
                            <div class="text-xs text-gray-400">التفاصيل: ${req.details || 'غير محدد'}</div>
                            <div class="text-xs text-gray-400">التاريخ: ${new Date(req.date).toLocaleString('ar-EG')}</div>
                            <div class="request-actions">
                                <button class="btn-accept accept-request" data-id="${req.id}" data-type="withdrawal">قبول</button>

                // عرض طرق الدفع الحالية
                const paymentMethodsHtml = state.paymentMethods.map(m => `
                    <div class="payment-method-admin">
                        <div class="flex items-center gap-3">
                            <div class="payment-icon ${m.iconClass || ''}">
                                ${m.imageUrl ? `<img src="${m.imageUrl}" alt="${m.name}">` : `<i class="${m.icon}"></i>`}
                            </div>
                            <div>
                                <div class="font-bold">${m.name}</div>
                                <div class="text-xs text-gray-400">${m.description || ''}</div>
                            </div>
                        </div>
                        <div class="actions">
                            <button class="edit-payment-method" data-id="${m.id}" title="تعديل"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button class="delete-payment-method" data-id="${m.id}" title="حذف"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                `).join('');

                return `
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold">لوحة الإدارة</h2>
                        <button id="closeAdminPanel" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                            <i class="fa-solid fa-times"></i>
                        </button>
                    </div>

                    <!-- تبويبات الإدارة -->
                    <div class="wallet-tabs mb-3">
                        <button class="wallet-tab active" data-admin-tab="requests">الطلبات</button>
                        <button class="wallet-tab" data-admin-tab="payment-methods">طرق الدفع</button>
                    </div>

                    <!-- محتوى تبويب الطلبات -->
                    <div id="adminRequestsTab" class="admin-tab-content">
                        <div class="space-y-6">
                            <!-- طلبات الشحن -->
                            <div>
                                <h3 class="text-lg font-bold mb-2 flex items-center gap-2">
                                    <i class="fa-solid fa-arrow-down text-green-400"></i>
                                    طلبات الشحن المعلقة
                                    <span class="bg-blue-600 text-white text-xs px-2 py-1 rounded-full">${pendingDeposits.length}</span>
                                </h3>
                                <div class="admin-requests-panel">
                                    ${depositsHtml}
                                </div>
                            </div>

                            <!-- طلبات السحب -->
                            <div>
                                <h3 class="text-lg font-bold mb-2 flex items-center gap-2">
                                    <i class="fa-solid fa-arrow-up text-red-400"></i>
                                    طلبات السحب المعلقة
                                    <span class="bg-blue-600 text-white text-xs px-2 py-1 rounded-full">${pendingWithdrawals.length}</span>
                                </h3>
                                <div class="admin-requests-panel">
                                    ${withdrawalsHtml}
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- محتوى تبويب طرق الدفع -->
                    <div id="adminPaymentMethodsTab" class="admin-tab-content hidden">
                        <div class="flex justify-between items-center mb-3">
                            <h3 class="text-lg font-bold">طرق الدفع المتاحة</h3>
                            <button id="addPaymentMethodBtn" class="bg-blue-600 px-3 py-1 rounded-lg text-sm"><i class="fa-solid fa-plus"></i> إضافة</button>
                        </div>
                        <div class="space-y-2 max-h-96 overflow-y-auto">
                            ${paymentMethodsHtml}
                        </div>
                    </div>
                `;
            }

            // نافذة تعديل/إضافة طريقة دفع
            function renderPaymentMethodModal(editingId = null) {
                const method = editingId ? state.paymentMethods.find(m => m.id === editingId) : null;
                const title = method ? 'تعديل طريقة دفع' : 'إضافة طريقة دفع جديدة';
                return `
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold">${title}</h2>
                        <button id="closePaymentMethodModal" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                            <i class="fa-solid fa-times"></i>
                        </button>
                    </div>
                    <form id="paymentMethodForm" class="space-y-3">
                        <input type="hidden" id="methodId" value="${method?.id || ''}">
                        <div>
                            <label class="text-sm text-gray-400">اسم الطريقة</label>
                            <input type="text" id="methodName" required value="${method?.name || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                        </div>
                        <div>
                            <label class="text-sm text-gray-400">الأيقونة (class FontAwesome مثل "fa-brands fa-tether")</label>
                            <input type="text" id="methodIcon" value="${method?.icon || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                        </div>
                        <div>
                            <label class="text-sm text-gray-400">وصف مختصر</label>
                            <input type="text" id="methodDescription" value="${method?.description || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                        </div>
                        <div>
                            <label class="text-sm text-gray-400">تفاصيل الإيداع (تظهر للمستخدم)</label>
                            <textarea id="methodDepositDetails" rows="2" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">${method?.depositDetails || ''}</textarea>
                        </div>
                        <div>
                            <label class="text-sm text-gray-400">تفاصيل السحب (placeholder)</label>
                            <input type="text" id="methodWithdrawDetails" value="${method?.withdrawDetails || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                        </div>
                        <div>
                            <label class="text-sm text-gray-400">حقل إضافي 1 (مثال: عنوان المحفظة)</label>
                            <input type="text" id="methodExtra1" value="${method?.extraField1 || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                        </div>
                        <div>
                            <label class="text-sm text-gray-400">حقل إضافي 2 (مثال: الشبكة)</label>
                            <input type="text" id="methodExtra2" value="${method?.extraField2 || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                        </div>
                        <div>
                            <label class="text-sm text-gray-400">رابط صورة (اختياري)</label>
                            <input type="url" id="methodImageUrl" value="${method?.imageUrl || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                        </div>
                        <div class="flex gap-2 pt-2">
                            <button type="submit" class="flex-1 bg-blue-600 py-2 rounded-lg font-bold">حفظ</button>
                            <button type="button" id="cancelPaymentMethod" class="flex-1 bg-gray-600 py-2 rounded-lg font-bold">إلغاء</button>
                        </div>

                `;
            }

            // -----------------------------------------------
            // دالة التصيير (Render)
            // -----------------------------------------------
            function render() {
                if (state.telegramMissing) {
                    appContainer.innerHTML = components.telegramMissing();
                } else if (state.loading) {
                    appContainer.innerHTML = components.loading();
                } else if (state.accessDenied) {
                    appContainer.innerHTML = components.accessDenied();
                } else if (state.isAdmin) {
                    appContainer.innerHTML = components.adminDashboard(state.user, state.balance, state.stats);
                } else {
                    appContainer.innerHTML = components.userDashboard(state.user, state.balance);
                }

                // إعادة ربط الأحداث بعد التصيير
                bindEvents();
            }

            // -----------------------------------------------
            // ربط الأحداث (Event Binding)
            // -----------------------------------------------
            function bindEvents() {
                // زر تسجيل الخروج
                const logoutBtn = document.getElementById('logoutBtn');
                if (logoutBtn) {
                    logoutBtn.addEventListener('click', () => {
                        if (tg) tg.close();
                        toast.info('تم تسجيل الخروج بنجاح');
                    });
                }

                // أيقونة المحفظة الكبيرة
                const walletIconLarge = document.getElementById('walletIconLarge');
                if (walletIconLarge) {
                    walletIconLarge.addEventListener('click', () => {
                        openWalletModal();
                    });
                }

                // زر فتح لوحة المشرف (إذا كان موجوداً)
                const openAdminPanelBtn = document.getElementById('openAdminPanelBtn');
                if (openAdminPanelBtn) {
                    openAdminPanelBtn.addEventListener('click', () => {
                        openAdminPanel();
                    });
                }
            }

            // دوال فتح وإغلاق المحفظة
            function openWalletModal() {
                walletModalContent.innerHTML = renderWalletModal();
                walletModalOverlay.classList.add('open');
                bindWalletModalEvents();
            }

            function bindWalletModalEvents() {
                document.getElementById('closeWalletModal').addEventListener('click', closeWalletModal);
                walletModalOverlay.addEventListener('click', (e) => {
                    if (e.target === walletModalOverlay) closeWalletModal();
                });

                // تبديل التبويبات
                const tabs = document.querySelectorAll('.wallet-tab');
                tabs.forEach(tab => {
                    tab.addEventListener('click', () => {
                        tabs.forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        const tabId = tab.dataset.tab;
                        document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.add('hidden'));
                        document.getElementById(`tab-${tabId}`).classList.remove('hidden');
                    });
                });

                // اختيار طريقة الدفع في الشحن مع عرض التفاصيل
                const paymentMethods = document.querySelectorAll('.payment-methods-list .payment-method');
                let selectedMethod = null;
                const detailsDisplay = document.getElementById('depositDetailsDisplay');
                const detailsText = document.getElementById('depositDetailsText');
                
                paymentMethods.forEach(method => {
                    method.addEventListener('click', () => {
                        paymentMethods.forEach(m => m.classList.remove('selected'));
                        method.classList.add('selected');
                        selectedMethod = method.dataset.methodId;
                        
                        // عرض تفاصيل الطريقة المختارة
                        const methodObj = state.paymentMethods.find(m => m.id === selectedMethod);
                        if (methodObj && methodObj.depositDetails) {
                            detailsText.innerHTML = methodObj.depositDetails.replace(/\n/g, '<br>');
                            detailsDisplay.classList.remove('hidden');
                        } else {
                            detailsDisplay.classList.add('hidden');
                        }
                    });
                });

                // زر تقديم طلب شحن
                document.getElementById('depositBtn')?.addEventListener('click', () => {
                    const amount = parseFloat(document.getElementById('depositAmount').value);
                    const transactionId = document.getElementById('depositTransactionId').value.trim();
                    
                    if (isNaN(amount) || amount <= 0) {
                        toast.error('أدخل مبلغ صحيح');
                        return;
                    }
                    if (!selectedMethod) {
                        toast.error('اختر طريقة دفع أولاً');
                        return;
                    }
                    if (!transactionId) {
                        toast.error('يرجى إدخال رقم العملية (TXID)');
                        return;
                    }
                    
                    const requestId = addDepositRequest(amount, selectedMethod, transactionId);
                    toast.success(`تم تقديم طلب الشحن بنجاح (رقم: ${requestId})، بانتظار المراجعة`);
                    
                    document.getElementById('depositAmount').value = '';
                    document.getElementById('depositTransactionId').value = '';
                    paymentMethods.forEach(m => m.classList.remove('selected'));
                    selectedMethod = null;
                    detailsDisplay.classList.add('hidden');
                });

                // اختيار طريقة السحب
                const withdrawMethods = document.querySelectorAll('#withdrawMethodsList .payment-method');
                let selectedWithdrawMethod = null;
                withdrawMethods.forEach(method => {
                    method.addEventListener('click', () => {
                        withdrawMethods.forEach(m => m.classList.remove('selected'));
                        method.classList.add('selected');
                        selectedWithdrawMethod = method.dataset.methodId;
                        // تحديث placeholder حسب الطريقة المختارة
                        const methodObj = state.paymentMethods.find(m => m.id === selectedWithdrawMethod);
                        const detailsInput = document.getElementById('withdrawDetails');
                        if (methodObj) {
                            detailsInput.placeholder = methodObj.withdrawDetails || 'أدخل التفاصيل';
                        }
                    });
                });

                // زر طلب السحب
                document.getElementById('withdrawBtn')?.addEventListener('click', () => {
                    const amount = parseFloat(document.getElementById('withdrawAmount').value);
                    const details = document.getElementById('withdrawDetails').value.trim();
                    if (isNaN(amount) || amount <= 0) {
                        toast.error('أدخل مبلغ صحيح');
                        return;
                    }
                    if (!selectedWithdrawMethod) {
                        toast.error('اختر طريقة سحب أولاً');
                        return;
                    }
                    if (!details) {
                        toast.error('أدخل التفاصيل المطلوبة');
                        return;
                    }
                    const result = addWithdrawalRequest(amount, selectedWithdrawMethod, details);
                    if (result.success) {
                        toast.success(`تم تقديم طلب السحب بنجاح (رقم: ${result.id})، بانتظار المراجعة`);
                        document.getElementById('withdrawAmount').value = '';
                        document.getElementById('withdrawDetails').value = '';
                        withdrawMethods.forEach(m => m.classList.remove('selected'));
                        selectedWithdrawMethod = null;
                        updateBalanceDisplay();
                    } else {
                        toast.error(result.message);
                    }
                });

                // زر التحويل (مباشر)
                document.getElementById('transferBtn')?.addEventListener('click', () => {
                    const amount = parseFloat(document.getElementById('transferAmount').value);
                    const targetId = document.getElementById('transferUserId').value.trim();
                    if (isNaN(amount) || amount <= 0) {
                        toast.error('أدخل مبلغ صحيح');
                        return;
                    }
                    if (!targetId) {
                        toast.error('أدخل معرف المستخدم');
                        return;
                    }
                    if (amount > state.balance) {
                        toast.error('الرصيد غير كافٍ');
                        return;
                    }
                    // محاكاة تحويل (يمكن جعلها حقيقية لاحقاً)
                    state.balance -= amount;
                    addTransaction('transfer', -amount, `تحويل إلى المستخدم ${targetId}`);
                    saveWalletData();
                    toast.success('تم التحويل بنجاح');
                    document.getElementById('transferAmount').value = '';
                    document.getElementById('transferUserId').value = '';
                    updateBalanceDisplay();
                    // تحديث المحتوى
                    walletModalContent.innerHTML = renderWalletModal();
                    bindWalletModalEvents();
                });
            }

            function closeWalletModal() {
                walletModalOverlay.classList.remove('open');
            }

            // دوال لوحة المشرف
            function openAdminPanel() {
                adminPanelContent.innerHTML = renderAdminPanel();
                adminPanelOverlay.classList.add('open');
                bindAdminPanelEvents();
            }

            function bindAdminPanelEvents() {
                document.getElementById('closeAdminPanel').addEventListener('click', closeAdminPanel);
                adminPanelOverlay.addEventListener('click', (e) => {
                    if (e.target === adminPanelOverlay) closeAdminPanel();
                });

                // تبديل التبويبات داخل لوحة المشرف
                const adminTabs = document.querySelectorAll('[data-admin-tab]');
                adminTabs.forEach(tab => {
                    tab.addEventListener('click', () => {
                        adminTabs.forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        const tabName = tab.dataset.adminTab;
                        if (tabName === 'requests') {
                            document.getElementById('adminRequestsTab').classList.remove('hidden');
                            document.getElementById('adminPaymentMethodsTab').classList.add('hidden');
                        } else {
                            document.getElementById('adminRequestsTab').classList.add('hidden');
                            document.getElementById('adminPaymentMethodsTab').classList.remove('hidden');
                        }
                    });
                });

                // أزرار قبول الطلبات
                document.querySelectorAll('.accept-request').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = btn.dataset.id;
                        const type = btn.dataset.type;
                        const request = type === 'deposit' 
                            ? state.depositRequests.find(r => r.id === id)
                            : state.withdrawalRequests.find(r => r.id === id);
                        if (request) {
                            const success = acceptRequest(request, type);
                            if (success) {
                                toast.success(`تم قبول الطلب ${id}`);
                                // تحديث لوحة المشرف
                                adminPanelContent.innerHTML = renderAdminPanel();
                                bindAdminPanelEvents();
                                // تحديث الرصيد في الواجهة الرئيسية إذا كان مفتوحاً
                                updateBalanceDisplay();
                                // إذا كانت المحفظة مفتوحة، تحديثها
                                if (walletModalOverlay.classList.contains('open')) {
                                    walletModalContent.innerHTML = renderWalletModal();
                                    bindWalletModalEvents();
                                }
                            } else {
                                toast.error('حدث خطأ أثناء قبول الطلب (قد يكون الرصيد غير كافٍ)');
                            }
                        }
                    });
                });

                // أزرار رفض الطلبات
                document.querySelectorAll('.reject-request').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = btn.dataset.id;
                        const type = btn.dataset.type;
                        const request = type === 'deposit' 
                            ? state.depositRequests.find(r => r.id === id)
                            : state.withdrawalRequests.find(r => r.id === id);
                        if (request) {
                            const success = rejectRequest(request, type);
                            if (success) {
                                toast.info(`تم رفض الطلب ${id}`);
                                adminPanelContent.innerHTML = renderAdminPanel();
                                bindAdminPanelEvents();
                            } else {
                                toast.error('حدث خطأ أثناء رفض الطلب');
                            }
                        }
                    });
                });

                // إدارة طرق الدفع: زر الإضافة
                document.getElementById('addPaymentMethodBtn')?.addEventListener('click', () => {
                    openPaymentMethodModal();
                });

                // أزرار تعديل وحذف طرق الدفع
                document.querySelectorAll('.edit-payment-method').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = btn.dataset.id;
                        openPaymentMethodModal(id);
                    });
                });

                document.querySelectorAll('.delete-payment-method').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = btn.dataset.id;
                        if (confirm('هل أنت متأكد من حذف طريقة الدفع هذه؟')) {
                            deletePaymentMethod(id);
                            adminPanelContent.innerHTML = renderAdminPanel();
                            bindAdminPanelEvents();
                            toast.success('تم الحذف بنجاح');
                        }
                    });
                });
            }

            function closeAdminPanel() {
                adminPanelOverlay.classList.remove('open');
            }

            // نافذة تعديل/إضافة طريقة دفع
            function openPaymentMethodModal(editingId = null) {
                paymentMethodModalContent.innerHTML = renderPaymentMethodModal(editingId);
                paymentMethodModalOverlay.classList.add('open');
                bindPaymentMethodModalEvents(editingId);
            }

            function bindPaymentMethodModalEvents(editingId) {
                document.getElementById('closePaymentMethodModal').addEventListener('click', closePaymentMethodModal);
                document.getElementById('cancelPaymentMethod').addEventListener('click', closePaymentMethodModal);
                paymentMethodModalOverlay.addEventListener('click', (e) => {
                    if (e.target === paymentMethodModalOverlay) closePaymentMethodModal();
                });

                document.getElementById('paymentMethodForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const formData = {
                        name: document.getElementById('methodName').value,
                        icon: document.getElementById('methodIcon').value,
                        description: document.getElementById('methodDescription').value,
                        depositDetails: document.getElementById('methodDepositDetails').value,
                        withdrawDetails: document.getElementById('methodWithdrawDetails').value,
                        extraField1: document.getElementById('methodExtra1').value,
                        extraField2: document.getElementById('methodExtra2').value,
                        imageUrl: document.getElementById('methodImageUrl').value,
                    };
                    const id = document.getElementById('methodId').value;
                    if (id) {
                        // تحديث
                        updatePaymentMethod(id, formData);
                        toast.success('تم التحديث بنجاح');
                    } else {
                        // إضافة
                        addPaymentMethod(formData);
                        toast.success('تمت الإضافة بنجاح');
                    }
                    closePaymentMethodModal();
                    // إعادة تحميل لوحة المشرف
                    adminPanelContent.innerHTML = renderAdminPanel();
                    bindAdminPanelEvents();
                });
            }

            function closePaymentMethodModal() {
                paymentMethodModalOverlay.classList.remove('open');
            }

            function updateBalanceDisplay() {
                // تحديث عرض الرصيد في البطاقة الصغيرة (إذا كانت موجودة)
                const balanceBadge = document.querySelector('.balance-badge span');
                if (balanceBadge) balanceBadge.textContent = state.balance.toLocaleString('ar-EG');
            }

            // -----------------------------------------------
            // تهيئة التطبيق
            // -----------------------------------------------
            async function initApp() {
                if (!tg) {
                    state.telegramMissing = true;
                    state.loading = false;
                    render();
                    return;
                }

                tg.expand();
                tg.ready();

                // استعادة السمة من localStorage
                const savedTheme = safeLocalStorageGet('theme', 'dark');
                state.theme = savedTheme;
                updateTheme(savedTheme);

                // التحقق من الأمان
                if (!tg.initData || !tg.initDataUnsafe.user) {
                    state.loading = false;
                    state.accessDenied = true;
                    render();
                    return;
                }

                const user = tg.initDataUnsafe.user;
                state.user = user;
                state.isAdmin = (user.id === ADMIN_ID);

                // تسجيل المستخدم الفريد
                registerUser(user.id);

                // تحميل بيانات المحفظة والطلبات وطرق الدفع
                loadWalletData();
                loadRequests();
                loadPaymentMethods();

                // محاكاة جلب البيانات من الخادم
                try {
                    await new Promise(resolve => setTimeout(resolve, 1000));

                    // تحديث الإحصائيات الحقيقية
                    updateStats();

                    state.loading = false;
                    render();

                    // إعداد زر MainButton
                    tg.MainButton.setText(state.isAdmin ? "لوحة التحكم" : "تحديث البيانات");
                    tg.MainButton.setTextColor("#ffffff");
                    tg.MainButton.setColor("#3b82f6");
                    tg.MainButton.show();

                    tg.MainButton.onClick(() => {
                        tg.showPopup({
                            title: state.isAdmin ? 'مرحباً أيها المدير' : 'نظام آمن',
                            message: state.isAdmin ? 
                                `لديك صلاحيات كاملة في النظام. الطلبات المعلقة: ${getPendingDeposits().length + getPendingWithdrawals().length}` : 
                                `أهلاً ${user.first_name}، اتصالك مشفر ومحمي بالكامل.`,
                            buttons: [{type: 'ok', text: 'حسناً'}]
                        });
                    });

                    // ترحيب
                    toast.success(`مرحباً ${user.first_name}، أهلاً بك في المحفظة المتطورة`);

                } catch (error) {
                    console.error('Error loading data:', error);
                    toast.error('حدث خطأ أثناء تحميل البيانات');
                    state.loading = false;
                    render();
                }
            }

            // -----------------------------------------------
            // أحداث عامة
            // -----------------------------------------------
            themeToggle.addEventListener('click', () => {
                state.theme = state.theme === 'dark' ? 'light' : 'dark';
                updateTheme(state.theme);
                toast.info(`تم تغيير السمة إلى ${state.theme === 'dark' ? 'الداكنة' : 'الفاتحة'}`);
            });

            // إغلاق الإعدادات
            document.getElementById('closeSettings').addEventListener('click', () => {
                settingsOverlay.classList.remove('open');
                settingsPanel.classList.remove('open');
            });

            settingsOverlay.addEventListener('click', () => {
                settingsOverlay.classList.remove('open');
                settingsPanel.classList.remove('open');
            });

            // حفظ الإعدادات
            document.getElementById('languageSelect').addEventListener('change', (e) => {
                state.settings.language = e.target.value;
                toast.success(`تم تغيير اللغة إلى ${e.target.value === 'ar' ? 'العربية' : 'الإنجليزية'}`);
            });

            document.getElementById('notificationsToggle').addEventListener('change', (e) => {
                state.settings.notifications = e.target.checked;
                toast.success(e.target.checked ? 'تم تفعيل الإشعارات' : 'تم إيقاف الإشعارات');
            });

            // بدء التطبيق
            initApp();
        })();
    </script>
</body>
</html>
