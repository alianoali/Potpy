<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICHANCY BLACK BOT - لوحة التحكم</title>
    <style>
        :root {
            --bg-deep: #060e1f;
            --gold: #ffc840;
            --gold2: #f0a020;
            --card-bg: rgba(20, 28, 48, 0.75);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --text-dim: rgba(255, 255, 255, 0.5);
            --accent: #2AABEE;
            --danger: #ff4d4d;
            --success: #4ADE80;
            --radius-lg: 22px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', 'Tajawal', Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ============ BACKGROUND SCENE ============ */
        .scene {
            width: 100%;
            height: 100%;
            position: relative;
            background: var(--bg-deep);
            overflow: hidden;
            filter: blur(10px);
            transition: filter 0.6s ease;
        }
        .scene.unlocked {
            filter: blur(0);
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* ============ LOGIN GATE ============ */
        .login-gate {
            position: absolute;
            inset: 0;
            z-index: 100;
            background: rgba(5, 10, 25, 0.88);
            backdrop-filter: blur(18px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .login-gate.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .login-card {
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.015));
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-lg);
            padding: 38px 32px;
            text-align: center;
            max-width: 430px;
            width: 92%;
            box-shadow: 0 20px 55px rgba(0, 0, 0, 0.55);
        }
        .login-bot-icon {
            width: 74px;
            height: 74px;
            margin: 0 auto 18px;
            background: radial-gradient(circle at 30% 30%, #3a3a3a, #111);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            box-shadow: 0 0 22px rgba(255, 180, 0, 0.18);
        }
        .login-bot-icon .eye {
            width: 10px;
            height: 17px;
            background: var(--gold);
            border-radius: 6px;
            box-shadow: 0 0 9px var(--gold);
        }
        .login-title {
            color: #fff;
            font-size: 23px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .login-sub {
            color: var(--text-dim);
            font-size: 13.5px;
            margin-bottom: 28px;
            line-height: 1.5;
        }
        #telegram-login-container {
            display: flex;
            justify-content: center;
            min-height: 48px;
            margin-bottom: 8px;
        }
        #telegram-login-container iframe {
            border-radius: 12px !important;
            overflow: hidden;
        }
        .error-msg {
            background: rgba(255, 77, 77, 0.13);
            border: 1px solid rgba(255, 77, 77, 0.35);
            color: #ff6b6b;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 12.5px;
            margin-top: 14px;
            display: none;
            animation: shake 0.4s ease;
        }
        .error-msg.show {
            display: block;
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-6px);
            }
            50% {
                transform: translateX(6px);
            }
            75% {
                transform: translateX(-3px);
            }
        }
        .login-note {
            color: rgba(255, 255, 255, 0.3);
            font-size: 10.5px;
            margin-top: 14px;
            line-height: 1.5;
        }
        .login-note svg {
            vertical-align: middle;
            margin-left: 3px;
        }

        /* ============ TOP BAR (post-login) ============ */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            padding: 14px 18px;
            display: none;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }
        .top-bar>* {
            pointer-events: auto;
        }
        .top-bar.visible {
            display: flex;
        }
        .brand-pill {
            display: flex;
            align-items: center;
            gap: 7px;
            background: rgba(15, 22, 40, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: 7px 15px;
            backdrop-filter: blur(8px);
        }
        .brand-pill .bolt svg {
            width: 16px;
            height: 16px;
        }
        .brand-pill span {
            color: #fff;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.5px;
        }
        .user-pill {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(20, 30, 50, 0.75);
            border: 1px solid rgba(255, 215, 0, 0.18);
            border-radius: 40px;
            padding: 6px 14px 6px 6px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all var(--transition);
        }
        .user-pill:hover {
            border-color: rgba(255, 215, 0, 0.5);
            box-shadow: 0 0 16px rgba(255, 215, 0, 0.08);
        }
        .user-pill img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #FFD700;
        }
        .user-pill .uname {
            color: #fff;
            font-weight: 600;
            font-size: 13px;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .user-pill .logout-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 77, 77, 0.15);
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            margin-right: 2px;
        }
        .user-pill .logout-dot:hover {
            background: rgba(255, 77, 77, 0.3);
            color: #fff;
        }

        /* ============ DASHBOARD PANEL ============ */
        .dashboard {
            position: absolute;
            inset: 0;
            z-index: 60;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            pointer-events: none;
            padding-top: 85px;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }
        .dashboard.active {
            display: flex;
        }
        .dashboard>* {
            pointer-events: auto;
        }
        .dash-container {
            width: 92%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding-bottom: 30px;
        }

        /* Cards */
        .dash-card {
            background: var(--card-bg);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 20px 18px;
            backdrop-filter: blur(12px);
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }
        .dash-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.25), transparent);
            opacity: 0;
            transition: opacity var(--transition);
        }
        .dash-card:hover::before {
            opacity: 1;
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }
        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .card-icon.gold {
            background: rgba(255, 200, 0, 0.15);
            color: var(--gold);
        }
        .card-icon.blue {
            background: rgba(42, 171, 238, 0.15);
            color: var(--accent);
        }
        .card-icon.green {
            background: rgba(74, 222, 128, 0.15);
            color: var(--success);
        }
        .card-title {
            color: #fff;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.3px;
        }
        .card-subtitle {
            color: var(--text-dim);
            font-size: 11px;
        }

        /* Profile Card */
        .profile-highlight {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 6px 0;
        }
        .profile-highlight img {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #FFD700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            flex-shrink: 0;
        }
        .profile-details {
            flex: 1;
            min-width: 0;
        }
        .profile-details .pname {
            color: #fff;
            font-size: 20px;
            font-weight: 800;
            line-height: 1.2;
        }
        .profile-details .puname {
            color: var(--accent);
            font-size: 13px;
            direction: ltr;
            text-align: right;
        }
        .profile-details .pid {
            color: var(--text-dim);
            font-size: 11px;
            direction: ltr;
            text-align: right;
            margin-top: 2px;
        }

        /* Stats Row */
        .stats-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .stat-box {
            flex: 1;
            min-width: 80px;
            background: rgba(255, 255, 255, 0.025);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-md);
            padding: 14px 12px;
            text-align: center;
            transition: all var(--transition);
        }
        .stat-box:hover {
            border-color: rgba(255, 215, 0, 0.25);
            background: rgba(255, 255, 255, 0.04);
        }
        .stat-value {
            color: #fff;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        .stat-value.gold-text {
            color: var(--gold);
        }
        .stat-label {
            color: var(--text-dim);
            font-size: 10.5px;
            margin-top: 3px;
        }

        /* Account Data Rows */
        .data-rows {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.025);
            border-radius: var(--radius-sm);
            padding: 11px 14px;
            transition: all var(--transition);
        }
        .data-row:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .data-row .dlbl {
            color: var(--text-dim);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .data-row .dval {
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            direction: ltr;
            max-width: 55%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .dval.success {
            color: var(--success) !important;
        }
        .dval.warn {
            color: #fbbf24 !important;
        }

        /* Action Buttons */
        .actions-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            flex: 1;
            min-width: 100px;
            padding: 12px 16px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.3px;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, #FFD700, #f0a000);
            color: #000;
            box-shadow: 0 4px 18px rgba(240, 160, 0, 0.3);
        }
        .btn-primary:hover {
            box-shadow: 0 6px 24px rgba(240, 160, 0, 0.45);
            transform: translateY(-1px);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
        }
        .btn-outline:hover {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.05);
        }
        .btn-danger {
            background: transparent;
            border: 1px solid rgba(255, 77, 77, 0.35);
            color: var(--danger);
        }
        .btn-danger:hover {
            background: rgba(255, 77, 77, 0.12);
            border-color: var(--danger);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            z-index: 300;
            background: #1a2035;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 12px 22px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ============ BOT AREA (background) ============ */
        .bot-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -55%);
            z-index: 8;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .bot-area.dimmed {
            opacity: 0.25;
        }
        .ring-wrap {
            position: relative;
            width: 240px;
            height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ring-svg {
            position: absolute;
            width: 240px;
            height: 240px;
        }
        .ring-dot {
            position: absolute;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            top: 50%;
            left: 50%;
        }
        .rd-glow {
            background: radial-gradient(circle, #ffe89a, #f0c040, #e8a020);
            box-shadow: 0 0 9px rgba(240, 192, 64, 0.85), 0 0 20px rgba(240, 192, 64, 0.35);
            width: 12px !important;
            height: 12px !important;
        }
        .rd-sm {
            background: radial-gradient(circle, #ffe070, #d8a830);
            box-shadow: 0 0 6px rgba(216, 168, 48, 0.6), 0 0 14px rgba(216, 168, 48, 0.25);
        }
        .head {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            position: relative;
            z-index: 2;
            background: radial-gradient(circle at 38% 30%, #2a2a2a 0%, #1a1a1a 35%, #0d0d0d 65%, #050505 100%);
            box-shadow: 0 0 40px rgba(240, 180, 0, 0.08), 0 0 80px rgba(240, 180, 0, 0.03), inset 0 -25px 45px rgba(0, 0, 0, 0.9), inset 0 6px 20px rgba(60, 60, 60, 0.15);
        }
        .head::after {
            content: '';
            position: absolute;
            top: 12%;
            left: 22%;
            width: 56%;
            height: 30%;
            background: radial-gradient(ellipse, rgba(255, 255, 255, 0.05), transparent);
            border-radius: 50%;
        }
        .eye {
            position: absolute;
            width: 22px;
            height: 38px;
            border-radius: 11px;
            background: radial-gradient(ellipse at 45% 40%, #fff5d0, #ffc840, #f0a020);
            box-shadow: 0 0 15px rgba(255, 200, 50, 0.8), 0 0 35px rgba(255, 200, 50, 0.35);
            top: 50%;
            transform: translateY(-50%);
        }
        .eye-l {
            left: 28px;
        }
        .eye-r {
            right: 28px;
        }
        .eye::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 8px;
            background: rgba(255, 255, 255, 0.45);
            border-radius: 50%;
            filter: blur(1.2px);
        }
        .mouth {
            position: absolute;
            bottom: 28%;
            left: 50%;
            transform: translateX(-50%);
            width: 42px;
            height: 3px;
            border-radius: 2px;
            background: linear-gradient(90deg, transparent, #ffc840, #e8a020, #ffc840, transparent);
            box-shadow: 0 0 8px rgba(255, 200, 50, 0.45);
        }
        .ear {
            position: absolute;
            width: 13px;
            height: 44px;
            border-radius: 6px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(180deg, #1a1a1a, #0a0a0a);
            box-shadow: inset 0 0 6px rgba(0, 0, 0, 0.9);
        }
        .ear-l {
            left: -2px;
        }
        .ear-r {
            right: -2px;
        }
        .title-area {
            text-align: center;
            margin-top: 14px;
        }
        .t-main {
            font-size: 42px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 3px;
            line-height: 1;
            text-transform: uppercase;
        }
        .t-sub {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 2px;
        }
        .t-black {
            background: linear-gradient(180deg, #ffd600, #f0a000);
            color: #000;
            font-size: 20px;
            font-weight: 900;
            padding: 1px 10px 3px;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: inline-block;
            border-radius: 2px;
        }
        .t-bot {
            color: #fff;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-left: 3px;
        }
        .footer-credits {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: opacity 0.5s ease;
        }
        .footer-credits.dimmed {
            opacity: 0.3;
        }
        .globe {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 200, 0, 0.5);
            position: relative;
            background: radial-gradient(circle, rgba(255, 200, 0, 0.06), transparent);
        }
        .globe::before {
            content: '';
            position: absolute;
            inset: 2px;
            border-radius: 50%;
            border: 1px solid rgba(255, 200, 0, 0.2);
        }
        .globe::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border-left: 1px solid rgba(255, 200, 0, 0.2);
            border-right: 1px solid rgba(255, 200, 0, 0.2);
        }
        .url {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.55);
            letter-spacing: 2.5px;
            text-transform: uppercase;
        }

        /* Decorative elements */
        .decoration {
            position: absolute;
            z-index: 5;
            pointer-events: none;
        }
        .dots-tr {
            top: 22px;
            right: 28px;
            display: flex;
            gap: 6px;
        }
        .dots-bl {
            bottom: 22px;
            left: 28px;
            display: flex;
            gap: 6px;
        }
        .dot-w {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
        }

        /* Scrollbar */
        .dashboard::-webkit-scrollbar {
            width: 3px;
        }
        .dashboard::-webkit-scrollbar-track {
            background: transparent;
        }
        .dashboard::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .dash-container {
                width: 95%;
                gap: 10px;
            }
            .dash-card {
                padding: 16px 14px;
                border-radius: var(--radius-md);
            }
            .profile-highlight img {
                width: 52px;
                height: 52px;
            }
            .profile-details .pname {
                font-size: 17px;
            }
            .stat-value {
                font-size: 20px;
            }
            .btn {
                font-size: 12px;
                padding: 10px 12px;
            }
            .t-main {
                font-size: 34px;
            }
            .t-black,
            .t-bot {
                font-size: 17px;
            }
            .ring-wrap {
                width: 200px;
                height: 200px;
            }
            .ring-svg {
                width: 200px;
                height: 200px;
            }
            .head {
                width: 130px;
                height: 130px;
            }
            .eye {
                width: 18px;
                height: 30px;
            }
            .eye-l {
                left: 22px;
            }
            .eye-r {
                right: 22px;
            }
            .ear {
                width: 10px;
                height: 34px;
            }
        }
    </style>
</head>
<body>

    <!-- ========== BACKGROUND SCENE ========== -->
    <div class="scene" id="mainScene">
        <canvas id="c"></canvas>

        <!-- Decorations -->
        <div class="decoration dots-tr"><div class="dot-w"></div><div class="dot-w"></div><div class="dot-w"></div><div class="dot-w"></div></div>
        <div class="decoration dots-bl"><div class="dot-w"></div><div class="dot-w"></div><div class="dot-w"></div><div class="dot-w"></div></div>
        <div class="decoration" style="top:0;left:0;width:80px;height:140px;">
            <div style="position:absolute;top:0;left:0;width:1px;height:100px;background:linear-gradient(to bottom,rgba(255,255,255,0.45),transparent);transform:rotate(25deg);transform-origin:top left"></div>
        </div>
        <div class="decoration" style="bottom:0;right:0;width:80px;height:140px;">

    <!-- ========== SCRIPTS ========== -->
    <script src="https://telegram.org/js/telegram-web-app.js">

    <script>
        // =============================================
        // ⚙️ الإعدادات
        // =============================================
        const CONFIG = {
            BOT_USERNAME: 'ICHANCY_BOT',
            VERIFY_API_URL: '',
            STORAGE_KEY_PREFIX: 'ichancy_acc_',
            SESSION_KEY: 'ichancy_active_session',
            SESSION_DURATION: 24 * 60 * 60 * 1000,
            APP_VERSION: '2.0.0',
        };

        // =============================================
        // 🎨 BACKGROUND CANVAS
        // =============================================
        const C = document.getElementById('c'),
            X = C.getContext('2d');
        let W, H;

        function resizeCanvas() {
            W = C.width = window.innerWidth;
            H = C.height = window.innerHeight;
            drawBackground();
        }

        function drawBackground() {
            X.fillStyle = '#060e1f';
            X.fillRect(0, 0, W, H);
            const cx = W / 2,
                cy = H / 2;
            let g = X.createRadialGradient(cx, cy * 0.85, 0, cx, cy * 0.85, W * 0.55);
            g.addColorStop(0, 'rgba(0,100,220,0.09)');
            g.addColorStop(1, 'transparent');
            X.fillStyle = g;
            X.fillRect(0, 0, W, H);
            g = X.createRadialGradient(cx, 0, 0, cx, 0, H * 0.5);
            g.addColorStop(0, 'rgba(20,120,240,0.09)');
            g.addColorStop(1, 'transparent');
            X.fillStyle = g;
            X.fillRect(0, 0, W, H);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // =============================================
        // 💍 RING DOTS
        // =============================================
        const rd = document.getElementById('rdots');
        const R = 108,
            n = 14;
        for (let i = 0; i < n; i++) {
            const a = (i / n) * Math.PI * 2 - Math.PI / 2;
            const d = document.createElement('div');
            const big = i % 4 === 0;
            d.className = 'ring-dot ' + (big ? 'rd-glow' : 'rd-sm');
            d.style.transform = `translate(calc(-50% + ${Math.cos(a)*R}px), calc(-50% + ${Math.sin(a)*R}px))`;
            rd.appendChild(d);
        }

        // =============================================
        // 🤖 BOT ANIMATION
        // =============================================
        const head = document.querySelector('.head');
        let f = 0;

        function anim() { f++;
            head.style.transform = `translateY(${Math.sin(f*0.018)*2.5}px)`;
            requestAnimationFrame(anim); }
        anim();

        // =============================================
        // 📦 DOM REFERENCES
        // =============================================
        const gate = document.getElementById('loginGate');
        const scene = document.getElementById('mainScene');
        const topBar = document.getElementById('topBar');
        const dashboard = document.getElementById('dashboard');
        const dashContainer = document.getElementById('dashContainer');
        const botArea = document.getElementById('botArea');
        const footerCredits = document.getElementById('footerCredits');
        const errorMsg = document.getElementById('errorMsg');
        const loginContainer = document.getElementById('telegram-login-container');
        const toast = document.getElementById('toast');
        let toastTimer;

        function showToast(msg) {
            clearTimeout(toastTimer);
            toast.textContent = msg;
            toast.classList.add('show');
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
            setTimeout(() => errorMsg.classList.remove('show'), 5000);
        }

        // =============================================
        // 🔐 CRYPTO HELPERS
        // =============================================
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function hmacSha256(key, message) {
            const keyBuffer = new TextEncoder().encode(key);
            const msgBuffer = new TextEncoder().encode(message);
            const cryptoKey = await crypto.subtle.importKey('raw', keyBuffer, { name: 'HMAC',
                hash: 'SHA-256' }, false, ['sign']);
            const signature = await crypto.subtle.sign('HMAC', cryptoKey, msgBuffer);
            const hashArray = Array.from(new Uint8Array(signature));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // =============================================
        // 💾 USER ACCOUNT STORAGE
        // =============================================
        function getAccountKey(userId) {
            return CONFIG.STORAGE_KEY_PREFIX + userId;
        }

        function saveUserAccount(user) {
            const key = getAccountKey(user.id);
            let accountData = {
                user: user,
                createdAt: Date.now(),
                lastLogin: Date.now(),
                loginCount: 1,
                settings: {
                    notifications: true,
                    language: 'ar',
                    theme: 'dark',
                },
                stats: {
                    visits: 1,
                    actions: 0,
                },
            };

            // محاولة دمج مع بيانات سابقة إن وجدت
            const existing = localStorage.getItem(key);
            if (existing) {
                try {
                    const parsed = JSON.parse(existing);
                    accountData = {
                        ...accountData,
                        createdAt: parsed.createdAt || accountData.createdAt,
                        loginCount: (parsed.loginCount || 0) + 1,
                        settings: parsed.settings || accountData.settings,
                        stats: {
                            visits: (parsed.stats?.visits || 0) + 1,
                            actions: parsed.stats?.actions || 0,
                        },
                        user: { ...parsed.user, ...user },
                    };
                } catch (e) { /* use fresh data */ }
            }

            localStorage.setItem(key, JSON.stringify(accountData));
            return accountData;
        }

        function getUserAccount(userId) {
            const key = getAccountKey(userId);
            const raw = localStorage.getItem(key);
            if (!raw) return null;
            try {
                return JSON.parse(raw);
            } catch (e) {
                return null;
            }
        }

        function updateAccountStats(userId, updates) {
            const key = getAccountKey(userId);
            const raw = localStorage.getItem(key);
            if (!raw) return;
            try {
                const data = JSON.parse(raw);
                data.stats = { ...data.stats, ...updates };
                data.lastLogin = Date.now();
                localStorage.setItem(key, JSON.stringify(data));
            } catch (e) { /* ignore */ }
        }

        function updateAccountSettings(userId, settings) {
            const key = getAccountKey(userId);
            const raw = localStorage.getItem(key);
            if (!raw) return;
            try {
                const data = JSON.parse(raw);
                data.settings = { ...data.settings, ...settings };
                localStorage.setItem(key, JSON.stringify(data));
            } catch (e) { /* ignore */ }
        }

        // =============================================
        // 📋 BUILD DASHBOARD UI
        // =============================================
        function buildDashboard(user, accountData) {
            const fullName = (user.first_name || '') + (user.last_name ? ' ' + user.last_name : '');
            const username = user.username || 'unknown';
            const userId = user.id;
            const photoUrl = user.photo_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(fullName||'U')}&background=FFD700&color=000&size=256`;
            const createdAt = accountData?.createdAt || Date.now();
            const loginCount = accountData?.loginCount || 1;
            const visits = accountData?.stats?.visits || 1;
            const actions = accountData?.stats?.actions || 0;
            const notificationsOn = accountData?.settings?.notifications !== false;
            const lang = accountData?.settings?.language || 'ar';

            const createdDate = new Date(createdAt).toLocaleDateString('ar-EG', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
            });
            const lastLoginDate = new Date(accountData?.lastLogin || Date.now()).toLocaleDateString('ar-EG', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
            });

            dashContainer.innerHTML = `
                <!-- بطاقة الملف الشخصي -->
                <div class="dash-card">
                    <div class="profile-highlight">
                        <img src="${photoUrl}" alt="${fullName}" onerror="this.src='https://ui-avatars.com/api/?name=U&background=555&color=fff&size=256'">
                        <div class="profile-details">
                            <div class="pname">${escapeHTML(fullName || 'مستخدم')}</div>
                            <div class="puname">@${escapeHTML(username)}</div>
                            <div class="pid">ID: ${userId}</div>
                        </div>
                    </div>
                </div>

                <!-- بطاقة الإحصائيات -->
                <div class="dash-card">
                    <div class="card-header">
                        <div class="card-icon gold">📊</div>
                        <div>
                            <div class="card-title">إحصائيات الحساب</div>
                            <div class="card-subtitle">ملخص نشاطك في البوت</div>
                        </div>
                    </div>
                    <div class="stats-row">
                        <div class="stat-box">
                            <div class="stat-value gold-text">${loginCount}</div>
                            <div class="stat-label">تسجيل دخول</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value">${visits}</div>
                            <div class="stat-label">زيارة</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value">${actions}</div>
                            <div class="stat-label">إجراء</div>
                        </div>
                    </div>
                </div>

                <!-- بطاقة بيانات الحساب -->
                <div class="dash-card">
                    <div class="card-header">
                        <div class="card-icon blue">🔐</div>
                        <div>
                            <div class="card-title">معلومات الحساب</div>
                            <div class="card-subtitle">تفاصيل حسابك المرتبط بتلغرام</div>
                        </div>
                    </div>
                    <div class="data-rows">
                        <div class="data-row">
                            <span class="dlbl">📅 تاريخ الإنشاء</span>
                            <span class="dval">${createdDate}</span>
                        </div>
                        <div class="data-row">
                            <span class="dlbl">🕐 آخر دخول</span>
                            <span class="dval">${lastLoginDate}</span>
                        </div>
                        <div class="data-row">
                            <span class="dlbl">✅ حالة الحساب</span>
                            <span class="dval success">● نشط</span>
                        </div>
                        <div class="data-row">
                            <span class="dlbl">🌐 اللغة</span>
                            <span class="dval">${lang === 'ar' ? 'العربية' : lang === 'en' ? 'English' : lang}</span>
                        </div>
                        <div class="data-row">
                            <span class="dlbl">🔔 الإشعارات</span>
                            <span class="dval ${notificationsOn ? 'success' : 'warn'}">${notificationsOn ? 'مفعّلة' : 'معطّلة'}</span>
                        </div>
                    </div>
                </div>

                <!-- بطاقة الإجراءات -->
                <div class="dash-card">
                    <div class="card-header">
                        <div class="card-icon green">⚙️</div>
                        <div>
                            <div class="card-title">الإجراءات والإعدادات</div>
                            <div class="card-subtitle">تحكم في حسابك وإعداداتك</div>
                        </div>
                    </div>
                    <div class="actions-row">
                        <button class="btn btn-primary" onclick="refreshDashboard()" title="تحديث البيانات">🔄 تحديث</button>
                        <button class="btn btn-outline" onclick="toggleNotifications()" title="تشغيل/إيقاف الإشعارات">
                            ${notificationsOn ? '🔔 إيقاف الإشعارات' : '🔕 تشغيل الإشعارات'}
                        </button>
                    </div>
                    <div class="actions-row" style="margin-top:8px;">
                        <button class="btn btn-outline" onclick="switchLanguage()" title="تغيير اللغة">🌍 English</button>
                        <button class="btn btn-danger" onclick="deleteAccount()" title="حذف بيانات الحساب">🗑 حذف البيانات</button>
                    </div>
                </div>

                <!-- بطاقة تسجيل الخروج -->
                <div class="dash-card" style="text-align:center;">
                    <p style="color:var(--text-dim);font-size:12px;margin-bottom:12px;">هل تريد إنهاء الجلسة الحالية؟</p>
                    <button class="btn btn-danger" onclick="logout()" style="max-width:200px;margin:0 auto;">⏻ تسجيل الخروج</button>
                </div>
            `;
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // =============================================
        // 🔄 DASHBOARD ACTIONS
        // =============================================
        function refreshDashboard() {
            const session = getActiveSession();
            if (!session) return;
            const accountData = getUserAccount(session.user.id);
            updateAccountStats(session.user.id, { actions: (accountData?.stats?.actions || 0) + 1 });
            const refreshed = getUserAccount(session.user.id);
            buildDashboard(session.user, refreshed);
            showToast('✅ تم تحديث البيانات بنجاح');
        }

        function toggleNotifications() {
            const session = getActiveSession();
            if (!session) return;
            const accountData = getUserAccount(session.user.id);
            const current = accountData?.settings?.notifications !== false;
            updateAccountSettings(session.user.id, { notifications: !current });
            const refreshed = getUserAccount(session.user.id);
            buildDashboard(session.user, refreshed);
            showToast(!current ? '🔔 تم تشغيل الإشعارات' : '🔕 تم إيقاف الإشعارات');
        }

        function switchLanguage() {
            const session = getActiveSession();
            if (!session) return;
            const accountData = getUserAccount(session.user.id);
            const current = accountData?.settings?.language || 'ar';
            const newLang = current === 'ar' ? 'en' : 'ar';
            updateAccountSettings(session.user.id, { language: newLang });
            const refreshed = getUserAccount(session.user.id);
            buildDashboard(session.user, refreshed);
            showToast(newLang === 'ar' ? '🌐 تم التبديل إلى العربية' : '🌐 Switched to English');
        }

        function deleteAccount() {
            const session = getActiveSession();
            if (!session) return;
            if (confirm(
                    '⚠️ هل أنت متأكد من حذف جميع بيانات حسابك المحفوظة؟\n\nهذا الإجراء لا يمكن التراجع عنه. ستظل بيانات تلغرام الأساسية محفوظة عند إعادة تسجيل الدخول.'
                    )) {
                const key = getAccountKey(session.user.id);
                localStorage.removeItem(key);
                clearSession();
                showToast('🗑 تم حذف بيانات الحساب المحلية');
                setTimeout(() => location.reload(), 1500);
            }
        }

        function toggleDashboard() {
            const isActive = dashboard.classList.contains('active');
            if (isActive) {
                dashboard.classList.remove('active');
                botArea.classList.remove('dimmed');
                footerCredits.classList.remove('dimmed');
            } else {
                dashboard.classList.add('active');
                botArea.classList.add('dimmed');
                footerCredits.classList.add('dimmed');
                // تمرير للأعلى
                dashboard.scrollTop = 0;
            }
        }

        // =============================================
        // 🔑 SESSION MANAGEMENT
        // =============================================
        function getActiveSession() {
            const raw = localStorage.getItem(CONFIG.SESSION_KEY);
            if (!raw) return null;
            try {
                const session = JSON.parse(raw);
                if (session.expiresAt && Date.now() < session.expiresAt && session.user) {
                    return session;
                }
                localStorage.removeItem(CONFIG.SESSION_KEY);
            } catch (e) {
                localStorage.removeItem(CONFIG.SESSION_KEY);
            }
            return null;
        }

        function setActiveSession(user) {
            const session = {
                user: user,
                expiresAt: Date.now() + CONFIG.SESSION_DURATION,
            };
            localStorage.setItem(CONFIG.SESSION_KEY, JSON.stringify(session));
        }

        function clearSession() {
            localStorage.removeItem(CONFIG.SESSION_KEY);
        }

        // =============================================
        // 🚀 SHOW APP AFTER AUTH
        // =============================================
        function showApp(user) {
            // حفظ/تحديث بيانات الحساب
            const accountData = saveUserAccount(user);

            // حفظ الجلسة النشطة
            setActiveSession(user);

            // إخفاء البوابة
            gate.classList.add('hidden');

            // إزالة تشويش الخلفية
            scene.classList.add('unlocked');

            // إظهار الشريط العلوي
            topBar.classList.add('visible');

            // تحديث الشريط العلوي
            const fullName = (user.first_name || '') + (user.last_name ? ' ' + user.last_name : '');
            document.getElementById('pillName').textContent = fullName || 'مستخدم';
            document.getElementById('pillImg').src = user.photo_url ||
                `https://ui-avatars.com/api/?name=${encodeURIComponent(fullName||'U')}&background=FFD700&color=000&size=40`;
            document.getElementById('pillImg').onerror = function() {
                this.src = 'https://ui-avatars.com/api/?name=U&background=555&color=fff&size=40';
            };

            // بناء لوحة التحكم
            buildDashboard(user, accountData);

            // إظهار لوحة التحكم تلقائياً
            setTimeout(() => {
                dashboard.classList.add('active');
                botArea.classList.add('dimmed');
                footerCredits.classList.add('dimmed');
                dashboard.scrollTop = 0;
            }, 400);

            showToast('👋 أهلاً ' + (fullName || 'بك') + '! تم تسجيل الدخول بنجاح');
        }

        // =============================================
        // 🚪 LOGOUT
        // =============================================
        function logout() {
            clearSession();
            dashboard.classList.remove('active');
            botArea.classList.remove('dimmed');
            footerCredits.classList.remove('dimmed');
            topBar.classList.remove('visible');
            gate.classList.remove('hidden');
            scene.classList.remove('unlocked');
            loginContainer.innerHTML = '';
            createTelegramWidget();
            showToast('👋 تم تسجيل الخروج');
        }

        // =============================================
        // 🔍 CHECK EXISTING SESSION
        // =============================================
        function checkExistingSession() {
            const session = getActiveSession();
            if (session && session.user) {
                const accountData = getUserAccount(session.user.id);
                showApp(session.user);
                // تحديث الإحصائيات بصمت
                updateAccountStats(session.user.id, { visits: (accountData?.stats?.visits || 0) + 1 });
                return true;
            }
            return false;
        }

        // =============================================
        // 📱 TELEGRAM WEBAPP HANDLER
        // =============================================
        function handleWebAppAuth() {
            if (!window.Telegram || !window.Telegram.WebApp) return false;
            const tg = window.Telegram.WebApp;
            const initDataUnsafe = tg.initDataUnsafe || {};
            if (initDataUnsafe.user && initDataUnsafe.user.id) {
                const user = {
                    id: initDataUnsafe.user.id,
                    first_name: initDataUnsafe.user.first_name || '',
                    last_name: initDataUnsafe.user.last_name || '',
                    username: initDataUnsafe.user.username || '',
                    photo_url: initDataUnsafe.user.photo_url || '',
                    auth_date: initDataUnsafe.auth_date || Math.floor(Date.now() / 1000),
                    hash: '',
                };
                if (CONFIG.VERIFY_API_URL && tg.initData) {
                    fetch(CONFIG.VERIFY_API_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ initData: tg.initData }),
                        })
                        .then(res => res.json())
                        .then(data => {
                            if (data.valid) showApp(user);
                            else showError('فشل التحقق من بيانات تلغرام.');
                        })
                        .catch(() => {
                            console.warn('تعذر الاتصال بسيرفر التحقق. جارٍ القبول المحلي.');
                            showApp(user);
                        });
                } else {
                    showApp(user);
                }
                return true;
            }
            return false;
        }

        // =============================================
        // 🔘 TELEGRAM WIDGET CALLBACK
        // =============================================
        function onTelegramAuth(userData) {
            console.log('Telegram Auth Data:', userData);
            if (!userData || !userData.id) {
                showError('بيانات تسجيل الدخول غير مكتملة.');
                return;
            }
            const user = {
                id: userData.id,
                first_name: userData.first_name || '',
                last_name: userData.last_name || '',
                username: userData.username || '',
                photo_url: userData.photo_url || '',
                auth_date: userData.auth_date || Math.floor(Date.now() / 1000),
                hash: userData.hash || '',
            };
            if (CONFIG.VERIFY_API_URL) {
                fetch(CONFIG.VERIFY_API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(userData),
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.valid) showApp(user);
                        else showError('فشل التحقق الأمني.');
                    })
                    .catch(err => {
                        console.error('Verification error:', err);
                        showError('خطأ في الاتصال بسيرفر التحقق.');
                    });
            } else {
                console.warn('⚠️ وضع الاختبار: لم يتم التحقق من الهاش.');
                showApp(user);
            }
        }

        // =============================================
        // 🔗 CREATE TELEGRAM WIDGET
        // =============================================
        function createTelegramWidget() {
            loginContainer.innerHTML = '';
            const script = document.createElement('script');
            script.src = 'https://telegram.org/js/telegram-widget.js?22';
            script.async = true;
            script.setAttribute('data-telegram-login', CONFIG.BOT_USERNAME);
            script.setAttribute('data-size', 'large');
            script.setAttribute('data-radius', '12');
            script.setAttribute('data-onauth', 'onTelegramAuth(user)');
            script.setAttribute('data-request-access', 'write');
            script.setAttribute('data-userpic', 'true');
            loginContainer.appendChild(script);
            setTimeout(() => {
                const iframe = loginContainer.querySelector('iframe');
                if (!iframe) {
                    showError('تعذر تحميل زر تسجيل الدخول. تأكد من اتصالك بالإنترنت وأن اسم البوت صحيح.');
                }
            }, 10000);
        }

        // =============================================
        // 🏁 INIT
        // =============================================
        async function init() {
            if (checkExistingSession()) return;
            const isWebApp = !!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp
                .initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user);
            if (isWebApp) {
                console.log('📱 تم اكتشاف بيئة Telegram WebApp');
                if (handleWebAppAuth()) return;
            }
            console.log('🌐 تحميل Telegram Login Widget...');
            createTelegramWidget();
            gate.classList.remove('hidden');
            scene.classList.remove('unlocked');
        }

        document.addEventListener('DOMContentLoaded', init);

        // =============================================

        `);
    </script>
