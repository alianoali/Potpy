                                    <span class="text-white font-bold text-xs md:text-sm">${this.state.stats.dailyOps || 0}</span>
                                </div>
                            </div>

                            <!-- Admin Actions -->
                            <div class="grid grid-cols-2 gap-2 mt-2">
                                <button id="openAdminPanelBtn" class="glass-card p-2 md:p-3 rounded-2xl flex items-center gap-2 md:gap-3 hover:bg-yellow-500/10 transition-all">
                                    <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-yellow-500/20 text-yellow-400 flex items-center justify-center">
                                        <i class="fa-solid fa-gears text-sm md:text-base"></i>
                                    </div>
                                    <div class="text-right">
                                        <div class="font-bold text-xs md:text-sm">لوحة الإدارة</div>
                                        <div class="text-[9px] md:text-xs text-gray-400">إدارة الطلبات</div>
                                    </div>
                                    ${pendingCount > 0 ? `
                                        <span class="bg-red-500 text-white text-[9px] md:text-xs px-1 md:px-2 py-0.5 md:py-1 rounded-full mr-auto">${pendingCount}</span>
                                    ` : ''}
                                </button>
                                <button id="openAdminChatListBtn" class="glass-card p-2 md:p-3 rounded-2xl flex items-center gap-2 md:gap-3 hover:bg-green-500/10 transition-all">
                                    <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-green-500/20 text-green-400 flex items-center justify-center">
                                        <i class="fa-solid fa-headset text-sm md:text-base"></i>
                                    </div>
                                    <div class="text-right">
                                        <div class="font-bold text-xs md:text-sm">المحادثات</div>
                                        <div class="text-[9px] md:text-xs text-gray-400">رد على المستخدمين</div>
                                    </div>
                                    ${unreadChatCount > 0 ? `
                                        <span class="bg-red-500 text-white text-[9px] md:text-xs px-1 md:px-2 py-0.5 md:py-1 rounded-full mr-auto">${unreadChatCount}</span>
                                    ` : ''}
                                </button>
                                <button id="manageTicketsBtn" class="glass-card p-2 md:p-3 rounded-2xl flex items-center gap-2 md:gap-3 hover:bg-purple-500/10 transition-all">
                                    <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-purple-500/20 text-purple-400 flex items-center justify-center">
                                        <i class="fa-solid fa-ticket text-sm md:text-base"></i>
                                    </div>
                                    <div class="text-right">
                                        <div class="font-bold text-xs md:text-sm">التذاكر</div>
                                        <div class="text-[9px] md:text-xs text-gray-400">إدارة تذاكر الدعم</div>
                                    </div>
                                    ${openTickets > 0 ? `
                                        <span class="bg-red-500 text-white text-[9px] md:text-xs px-1 md:px-2 py-0.5 md:py-1 rounded-full mr-auto">${openTickets}</span>
                                    ` : ''}
                                </button>
                                <button id="manageFAQBtn" class="glass-card p-2 md:p-3 rounded-2xl flex items-center gap-2 md:gap-3 hover:bg-blue-500/10 transition-all">
                                    <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-blue-500/20 text-blue-400 flex items-center justify-center">
                                        <i class="fa-solid fa-circle-question text-sm md:text-base"></i>
                                    </div>
                                    <div class="text-right">
                                        <div class="font-bold text-xs md:text-sm">الأسئلة</div>
                                        <div class="text-[9px] md:text-xs text-gray-400">إدارة الأسئلة الشائعة</div>
                                    </div>
                                </button>
                            </div>

                            <!-- Logout Button -->
                            <button id="logoutBtn" class="w-full py-3 md:py-4 rounded-xl font-bold text-red-400 hover:bg-red-500/10 hover:text-red-300 transition-all border border-transparent hover:border-red-500/20 flex items-center justify-center gap-2 group">
                                <i class="fa-solid fa-arrow-right-from-bracket group-hover:-translate-x-1 transition-transform"></i>
                                تسجيل الخروج
                            </button>
                        </div>
                    `;
                }

                bindEvents() {
                    const logoutBtn = document.getElementById('logoutBtn');
                    if (logoutBtn) {
                        logoutBtn.addEventListener('click', () => {
                            this.telegram.close();
                            this.toast.info('تم تسجيل الخروج بنجاح');
                        });
                    }

                    const walletIcon = document.getElementById('walletIcon');
                    if (walletIcon) {
                        walletIcon.addEventListener('click', () => this.openWalletModal());
                    }

                    const adminPanelBtn = document.getElementById('openAdminPanelBtn');
                    if (adminPanelBtn) {
                        adminPanelBtn.addEventListener('click', () => this.openAdminPanel());
                    }

                    const supportChatBell = document.getElementById('supportChatBell');
                    if (supportChatBell) {
                        supportChatBell.addEventListener('click', () => {
                            if (this.state.isAdmin) {
                                this.openAdminChatList();
                            } else {
                                this.openSupportChat();
                            }
                        });
                    }

                    const openAdminChatListBtn = document.getElementById('openAdminChatListBtn');
                    if (openAdminChatListBtn) {
                        openAdminChatListBtn.addEventListener('click', () => this.openAdminChatList());
                    }

                    const manageTicketsBtn = document.getElementById('manageTicketsBtn');
                    if (manageTicketsBtn) {
                        manageTicketsBtn.addEventListener('click', () => this.openTicketManagement());
                    }

                    const manageFAQBtn = document.getElementById('manageFAQBtn');
                    if (manageFAQBtn) {
                        manageFAQBtn.addEventListener('click', () => this.openFAQManagement());
                    }

                    const notificationBell = document.getElementById('notificationBell');
                    if (notificationBell) {
                        notificationBell.addEventListener('click', () => this.openNotificationsModal());
                    }

                    document.querySelectorAll('.quick-action').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const action = btn.dataset.action;
                            if (action === 'wallet') {
                                this.openWalletModal();
                            } else if (action === 'support') {
                                if (this.state.isAdmin) {
                                    this.openAdminChatList();
                                } else {
                                    this.openSupportChat();
                                }
                            } else if (action === 'tickets') {
                                this.openUserTickets();
                            }
                        });
                    });

                    const showAllFAQ = document.getElementById('showAllFAQ');
                    if (showAllFAQ) {
                        showAllFAQ.addEventListener('click', () => {
                            this.openFAQModal();
                        });
                    }
                }

                // فتح قائمة المحادثات للأدمن
                openAdminChatList() {
                    const modal = document.getElementById('supportChatModalOverlay');
                    const content = document.getElementById('supportChatModalContent');
                    content.innerHTML = this.renderAdminChatList();
                    modal.classList.add('open');
                    this.bindAdminChatListEvents();
                }

                renderAdminChatList() {
                    const usersWithChats = this.data.getUsersWithChats();
                    
                    return `
                        <div class="flex justify-between items-center mb-3 md:mb-4">
                            <h2 class="text-lg md:text-xl font-bold">
                                <i class="fa-solid fa-headset ml-2 text-green-400"></i>
                                قائمة المحادثات
                            </h2>
                            <button id="closeSupportChat" class="w-7 h-7 md:w-8 md:h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors">
                                <i class="fa-solid fa-times text-sm md:text-base"></i>
                            </button>
                        </div>

                        <div class="space-y-2 max-h-96 overflow-y-auto hide-scrollbar">
                            ${usersWithChats.map(user => `
                                <div class="chat-list-item ${user.unread ? 'unread' : ''}" data-userid="${user.userId}">
                                    <div class="flex items-center justify-between">
                                        <div>
                                            <div class="font-bold text-sm">${user.userName}</div>
                                            <div class="text-xs text-gray-400">${Utils.truncate(user.lastMessage, 30)}</div>
                                        </div>
                                        <div class="text-left">
                                            <div class="text-[10px] text-gray-500">${Utils.formatTime(user.lastMessageTime)}</div>
                                            ${user.unread ? `<span class="bg-red-500 text-white text-[9px] px-1 rounded-full">${user.unread}</span>` : ''}
                                        </div>
                                    </div>
                                </div>
                            `).join('') || '<p class="text-center text-gray-400 py-4">لا توجد محادثات بعد</p>'}
                        </div>
                    `;
                }

                bindAdminChatListEvents() {
                    const modal = document.getElementById('supportChatModalOverlay');
                    
                    document.getElementById('closeSupportChat').addEventListener('click', () => {
                        modal.classList.remove('open');
                    });

                    modal.addEventListener('click', (e) => {
                        if (e.target === modal) modal.classList.remove('open');
                    });

                    document.querySelectorAll('.chat-list-item').forEach(item => {
                        item.addEventListener('click', () => {
                            const userId = parseInt(item.dataset.userid);
                            this.openSupportChatForUser(userId);
                        });
                    });
                }

                // فتح الدردشة مع مستخدم معين (للأدمن)
                openSupportChatForUser(targetUserId) {
                    const modal = document.getElementById('supportChatModalOverlay');
                    const content = document.getElementById('supportChatModalContent');
                    content.innerHTML = this.renderSupportChat(targetUserId);
                    modal.classList.add('open');
                    
                    this.loadEmojiPicker();
                    
                    this.bindChatEventsForUser(targetUserId);
                    
                    // تحديد قراءة رسائل هذا المستخدم
                    this.data.markChatAsRead(targetUserId, CONFIG.SUPPORT_ID);
                }

                // فتح الدردشة للمستخدم العادي
                openSupportChat() {
                    const modal = document.getElementById('supportChatModalOverlay');
                    const content = document.getElementById('supportChatModalContent');
                    content.innerHTML = this.renderSupportChat(); // بدون targetUserId
                    modal.classList.add('open');
                    
                    this.loadEmojiPicker();
                    
                    this.bindChatEventsForUser(null); // للمستخدم العادي
                    
                    if (this.state.user) {
                        this.data.markChatAsRead(this.state.user.id);
                    }
                }

                renderSupportChat(targetUserId = null) {
                    const isAdmin = this.state.isAdmin;
                    let messages = [];
                    if (isAdmin && targetUserId) {
                        messages = this.data.getChatMessages(targetUserId, CONFIG.SUPPORT_ID);
                    } else if (!isAdmin && this.state.user) {
                        messages = this.data.getChatMessages(this.state.user.id, CONFIG.SUPPORT_ID);
                    } else {
                        messages = [];
                    }
                    
                    const messagesHtml = messages.map(msg => {
                        const isOutgoing = isAdmin ? (msg.isSupport) : (msg.userId === this.state.user?.id && !msg.isSupport);
                        return `
                            <div class="chat-message ${isOutgoing ? 'outgoing' : 'incoming'}">
                                <div class="message-bubble">
                                    <div class="text-xs md:text-sm">${msg.message}</div>
                                    <div class="message-info text-[9px] md:text-xs">
                                        <span>${Utils.formatTime(msg.date)}</span>
                                        ${msg.isSupport ? `<span>${msg.supportName || 'فريق الدعم'}</span>` : ''}
                                        ${isOutgoing ? `
                                            <span class="message-status">
                                                <i class="fa-regular fa-circle-check"></i>
                                            </span>
                                        ` : ''}
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');

                    const quickReplies = isAdmin ? CONFIG.QUICK_REPLIES.admin : CONFIG.QUICK_REPLIES.user;

                    return `
                        <div class="flex justify-between items-center mb-3 md:mb-4">
                            <h2 class="text-lg md:text-xl font-bold">
                                <i class="fa-solid fa-headset ml-2 text-green-400"></i>
                                ${isAdmin ? (targetUserId ? `محادثة مع مستخدم` : 'دردشة الدعم') : 'التواصل مع فريق الدعم'}
                            </h2>
                            <button id="closeSupportChat" class="w-7 h-7 md:w-8 md:h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors">
                                <i class="fa-solid fa-times text-sm md:text-base"></i>
                            </button>
                        </div>

                        <div class="chat-container glass-card p-2 md:p-3 rounded-2xl">
                            <div class="chat-messages hide-scrollbar" id="chatMessages">
                                ${messagesHtml || '<p class="text-center text-gray-400 py-4 text-sm">لا توجد رسائل بعد... ابدأ المحادثة الآن</p>'}
                            </div>

                            <div id="typingIndicator" class="typing-indicator hidden">
                                <span></span><span></span><span></span>
                                <span class="text-xs text-gray-400 mr-2">يكتب...</span>
                            </div>

                            <div class="quick-replies hide-scrollbar" id="quickReplies">
                                ${quickReplies.map(reply => `
                                    <button class="quick-reply-btn text-[9px] md:text-xs">${reply}</button>
                                `).join('')}
                            </div>

                            <div class="flex gap-2 mt-2 relative">
                                <button id="emojiPickerBtn" class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors flex-shrink-0">
                                    <i class="fa-regular fa-face-smile text-sm md:text-base"></i>
                                </button>
                                <input type="text" id="chatMessageInput" placeholder="اكتب رسالتك..." class="flex-1 bg-slate-800 border border-white/10 rounded-full px-3 md:px-4 py-1.5 md:py-2 text-white text-sm md:text-base">
                                <button id="sendChatMessage" class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-blue-600 flex items-center justify-center hover:bg-blue-700 transition-colors flex-shrink-0">
                                    <i class="fa-solid fa-paper-plane text-sm md:text-base"></i>
                                </button>
                            </div>

                            ${isAdmin ? `
                                <div class="mt-2 text-[9px] md:text-xs text-gray-400">
                                    <i class="fa-regular fa-circle-info ml-1"></i>
                                    أنت تتحدث كفريق الدعم
                                </div>
                            ` : ''}
                        </div>
                    `;
                }

                bindChatEventsForUser(targetUserId = null) {
                    const modal = document.getElementById('supportChatModalOverlay');
                    const messagesContainer = document.getElementById('chatMessages');
                    const input = document.getElementById('chatMessageInput');
                    const sendBtn = document.getElementById('sendChatMessage');
                    const emojiBtn = document.getElementById('emojiPickerBtn');
                    const emojiContainer = document.getElementById('emojiPickerContainer');
                    
                    document.getElementById('closeSupportChat').addEventListener('click', () => {
                        modal.classList.remove('open');
                    });

                    modal.addEventListener('click', (e) => {
                        if (e.target === modal) modal.classList.remove('open');
                    });

                    const sendMessage = () => {
                        const message = input.value.trim();
                        if (!message) return;

                        // تحديد المستلم: إذا كان الأدمن و targetUserId موجود، يرسل لذلك المستخدم
                        // إذا كان المستخدم العادي، يرسل للدعم (recipientUserId = CONFIG.SUPPORT_ID)
                        const recipient = this.state.isAdmin ? targetUserId : CONFIG.SUPPORT_ID;
                        
                        this.data.addChatMessage(message, this.state.user?.id, this.state.isAdmin, recipient);
                        
                        const msgDiv = document.createElement('div');
                        msgDiv.className = 'chat-message outgoing';
                        msgDiv.innerHTML = `
                            <div class="message-bubble">
                                <div class="text-xs md:text-sm">${Utils.escapeHtml(message)}</div>
                                <div class="message-info text-[9px] md:text-xs">
                                    <span>${Utils.formatTime(new Date().toISOString())}</span>
                                    <span class="message-status"><i class="fa-regular fa-circle-check"></i></span>
                                </div>
                            </div>
                        `;
                        messagesContainer.appendChild(msgDiv);
                        messagesContainer.scrollTop = messagesContainer.scrollHeight;
                        
                        input.value = '';
                        
                        // لا يوجد محاكاة لردود تلقائية - الردود يدوية فقط
                    };

                    sendBtn.addEventListener('click', sendMessage);
                    
                    input.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') sendMessage();
                    });

                    if (emojiBtn) {
                        emojiBtn.addEventListener('click', () => {
                            emojiContainer.classList.toggle('open');
                        });
                    }

                    document.querySelectorAll('.quick-reply-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            input.value = btn.textContent;
                            sendMessage();
                        });
                    });

                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }

                loadEmojiPicker() {
                    import('https://cdn.jsdelivr.net/npm/emoji-picker-element@1.14.0/dist/emoji-picker-element.min.js')
                        .then(() => {
                            const picker = document.querySelector('emoji-picker');
                            if (picker) {
                                picker.addEventListener('emoji-click', (event) => {
                                    const input = document.getElementById('chatMessageInput');
                                    if (input) {
                                        input.value += event.detail.unicode;
                                        document.getElementById('emojiPickerContainer').classList.remove('open');
                                    }
                                });
                            }
                        })
                        .catch(err => console.log('Emoji picker not loaded', err));
                }

                openUserTickets() {
                    const modal = document.getElementById('ticketModalOverlay');
                    const content = document.getElementById('ticketModalContent');
                    content.innerHTML = this.renderUserTickets();
                    modal.classList.add('open');
                    this.bindTicketEvents();
                }

                renderUserTickets() {
                    const tickets = this.data.getUserTickets(this.state.user.id);
                    
                    return `
                        <div class="flex justify-between items-center mb-3 md:mb-4">
                            <h2 class="text-lg md:text-xl font-bold">
                                <i class="fa-solid fa-ticket ml-2 text-purple-400"></i>
                                تذاكري
                            </h2>
                            <button id="closeTicketModal" class="w-7 h-7 md:w-8 md:h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors">
                                <i class="fa-solid fa-times text-sm md:text-base"></i>
                            </button>
                        </div>

                        <button id="createNewTicket" class="w-full btn-primary py-2 md:py-3 mb-3 md:mb-4 flex items-center justify-center gap-2 text-sm md:text-base">
                            <i class="fa-solid fa-plus"></i>
                            إنشاء تذكرة جديدة
                        </button>

                        <div id="ticketList" class="space-y-2 max-h-80 md:max-h-96 overflow-y-auto hide-scrollbar">
                            ${tickets.map(ticket => `
                                <div class="ticket-item ${ticket.status === 'closed' ? 'closed' : ''}" data-id="${ticket.id}">
                                    <div class="flex justify-between items-start">
                                        <div class="flex-1">
                                            <div class="font-bold text-sm md:text-base">${ticket.title}</div>
                                            <div class="text-[10px] md:text-xs text-gray-400 mt-1">${Utils.truncate(ticket.description, 50)}</div>
                                            <div class="flex items-center gap-2 mt-1 md:mt-2">
                                                <span class="ticket-status ${ticket.status} text-[8px] md:text-xs">
                                                    ${ticket.status === 'open' ? 'مفتوحة' : (ticket.status === 'closed' ? 'مغلقة' : 'معلقة')}
                                                </span>
                                                <span class="text-[9px] md:text-xs text-gray-400">
                                                    ${Utils.formatDate(ticket.updatedAt)}
                                                </span>
                                            </div>
                                        </div>
                                        <i class="fa-solid fa-chevron-left text-gray-400 text-sm"></i>
                                    </div>
                                </div>
                            `).join('') || '<p class="text-center text-gray-400 py-4 text-sm">لا توجد تذاكر بعد</p>'}
                        </div>

                        <div id="createTicketForm" class="hidden mt-3 md:mt-4">
                            <h3 class="font-bold mb-2 md:mb-3 text-sm md:text-base">إنشاء تذكرة جديدة</h3>
                            <input type="text" id="ticketTitle" placeholder="عنوان التذكرة" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 mb-2 text-white text-sm">
                            <textarea id="ticketDescription" placeholder="وصف المشكلة بالتفصيل" rows="3" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 mb-2 text-white text-sm"></textarea>
                            <select id="ticketPriority" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 mb-3 text-white text-sm">
                                <option value="low">منخفضة</option>
                                <option value="medium" selected>متوسطة</option>
                                <option value="high">عالية</option>
                            </select>
                            <div class="flex gap-2">
                                <button id="submitTicket" class="flex-1 btn-success py-2 text-sm">إرسال</button>
                                <button id="cancelCreateTicket" class="flex-1 bg-gray-600 py-2 rounded-lg font-bold hover:bg-gray-700 transition-colors text-sm">إلغاء</button>
                            </div>
                        </div>
                    `;
                }

                bindTicketEvents() {
                    const modal = document.getElementById('ticketModalOverlay');
                    
                    document.getElementById('closeTicketModal').addEventListener('click', () => {
                        modal.classList.remove('open');
                    });

                    modal.addEventListener('click', (e) => {
                        if (e.target === modal) modal.classList.remove('open');
                    });

                    const createBtn = document.getElementById('createNewTicket');
                    const form = document.getElementById('createTicketForm');
                    const list = document.getElementById('ticketList');

                    createBtn.addEventListener('click', () => {
                        form.classList.remove('hidden');
                        list.classList.add('hidden');
                        createBtn.classList.add('hidden');
                    });

                    document.getElementById('cancelCreateTicket')?.addEventListener('click', () => {
                        form.classList.add('hidden');
                        list.classList.remove('hidden');
                        createBtn.classList.remove('hidden');
                    });

                    document.getElementById('submitTicket')?.addEventListener('click', () => {
                        const title = document.getElementById('ticketTitle').value.trim();
                        const description = document.getElementById('ticketDescription').value.trim();
                        const priority = document.getElementById('ticketPriority').value;

                        if (!title || !description) {
                            this.toast.error('يرجى ملء جميع الحقول');
                            return;
                        }

                        const ticket = this.data.createSupportTicket(title, description, priority);
                        if (ticket) {
                            this.toast.success('✅ تم إنشاء التذكرة بنجاح');
                            form.classList.add('hidden');
                            list.classList.remove('hidden');
                            createBtn.classList.remove('hidden');
                            this.openUserTickets();
                        }
                    });

                    document.querySelectorAll('.ticket-item').forEach(item => {
                        item.addEventListener('click', () => {
                            const ticketId = item.dataset.id;
                            this.openTicketDetails(ticketId);
                        });
                    });
                }

                openTicketDetails(ticketId) {
                    const modal = document.getElementById('ticketModalOverlay');
                    const content = document.getElementById('ticketModalContent');
                    const ticket = this.state.supportTickets.find(t => t.id === ticketId);
                    
                    if (!ticket) return;

                    const messagesHtml = ticket.messages.map(msg => `
                        <div class="chat-message ${msg.sender === 'user' ? 'outgoing' : 'incoming'}">
                            <div class="message-bubble">
                                <div class="text-xs md:text-sm">${Utils.escapeHtml(msg.message)}</div>
                                <div class="message-info text-[9px] md:text-xs">
                                    <span>${Utils.formatTime(msg.date)}</span>
                                    <span>${msg.sender === 'user' ? 'أنت' : 'فريق الدعم'}</span>
                                </div>
                            </div>
                        </div>
                    `).join('');

                    content.innerHTML = `
                        <div class="flex justify-between items-center mb-3 md:mb-4">
                            <h2 class="text-lg md:text-xl font-bold">تفاصيل التذكرة</h2>
                            <button id="closeTicketDetails" class="w-7 h-7 md:w-8 md:h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors">
                                <i class="fa-solid fa-times text-sm md:text-base"></i>
                            </button>
                        </div>

                        <div class="glass-card p-3 md:p-4 rounded-2xl mb-3 md:mb-4">
                            <div class="font-bold text-sm md:text-base">${ticket.title}</div>
                            <div class="text-xs md:text-sm text-gray-300 mt-1">${ticket.description}</div>
                            <div class="flex items-center gap-2 mt-1 md:mt-2">
                                <span class="ticket-status ${ticket.status} text-[8px] md:text-xs">

                renderWalletModal() {
                    const userData = this.state.currentUser || { balance: 0, transactions: [] };

                        userData.transactions.map(tx => `
                            <div class="transaction-item">
                                <div>
                                    <div class="font-medium text-xs md:text-sm">${tx.note || tx.type}</div>
                                    <div class="text-[9px] md:text-xs text-gray-400">${Utils.formatDateTime(tx.date)}</div>
                                </div>
                                <div class="transaction-amount ${tx.amount > 0 ? 'positive' : 'negative'} font-bold text-sm md:text-base">
                                    ${tx.amount > 0 ? '+' : ''}${Utils.formatUSD(tx.amount)}
                                </div>
                            </div>
                        `).join('') :
                        '<p class="text-center text-gray-400 py-4 text-sm">لا توجد معاملات بعد</p>';
                    
                    const paymentMethodsHtml = paymentMethods.map(m => `
                        <div class="payment-method" data-method-id="${m.id}">
                            <div class="payment-icon">
                                ${m.iconType === 'image' ?

                                <div class="text-[9px] md:text-xs text-gray-400">${m.description?.substring(0, 30) || ''}...</div>

                        </div>

                        <div class="wallet-tabs">

                                <div class="flex gap-2">
                                    <input type="number" id="withdrawAmount" placeholder="المبلغ ($)" class="flex-1 bg-slate-800 border border-white/10 rounded-lg p-2 text-white text-sm">
                                    <button id="withdrawBtn" class="btn-danger px-3 md:px-4 text-sm">طلب</button>
                                </div>
                                <p class="text-[9px] md:text-xs text-gray-400 mt-2">سيتم مراجعة طلبك من قبل الإدارة</p>

                                <div class="flex gap-2">
                                    <input type="number" id="transferAmount" placeholder="المبلغ ($)" class="flex-1 bg-slate-800 border border-white/10 rounded-lg p-2 text-white text-sm">

                bindWalletModalEvents() {
                    const overlay = document.getElementById('walletModalOverlay');
                    
                    document.getElementById('closeWalletModal').addEventListener('click', () => {
                        overlay.classList.remove('open');
                    });
                    
                    overlay.addEventListener('click', (e) => {
                        if (e.target === overlay) overlay.classList.remove('open');
                    });

                    const tabs = document.querySelectorAll('.wallet-tab');
                    tabs.forEach(tab => {
                        tab.addEventListener('click', () => {
                            tabs.forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');
                            
                            document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.add('hidden'));
                            document.getElementById(`tab-${tab.dataset.tab}`).classList.remove('hidden');
                        });
                    });

                    document.getElementById('tab-withdraw').classList.remove('hidden');

                    let selectedWithdrawMethod = null;
                    document.querySelectorAll('#tab-withdraw .payment-method').forEach(method => {
                        method.addEventListener('click', () => {
                            document.querySelectorAll('#tab-withdraw .payment-method').forEach(m => m.classList.remove('selected'));
                            method.classList.add('selected');
                            selectedWithdrawMethod = method.dataset.methodId;
                            
                            const methodObj = this.state.paymentMethods.find(m => m.id === selectedWithdrawMethod);
                            const detailsInput = document.getElementById('withdrawDetails');
                            if (methodObj) {
                                detailsInput.placeholder = methodObj.withdrawDetails || 'أدخل التفاصيل';
                            }
                        });
                    });

                    document.getElementById('withdrawBtn')?.addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('withdrawAmount').value);
                        const details = document.getElementById('withdrawDetails').value.trim();

                        if (isNaN(amount) || amount <= 0) {
                            this.toast.error('أدخل مبلغ صحيح');
                            return;
                        }
                        if (!selectedWithdrawMethod) {
                            this.toast.error('اختر طريقة سحب');
                            return;
                        }
                        if (!details) {
                            this.toast.error('أدخل التفاصيل');
                            return;
                        }

                        const result = this.data.addWithdrawalRequest(amount, selectedWithdrawMethod, details);
                        if (result.success) {
                            this.toast.success(`✅ تم تقديم طلب السحب بمبلغ ${Utils.formatUSD(amount)}`);
                            document.getElementById('withdrawAmount').value = '';
                            document.getElementById('withdrawDetails').value = '';
                            document.querySelectorAll('#tab-withdraw .payment-method').forEach(m => m.classList.remove('selected'));
                            selectedWithdrawMethod = null;
                        } else {
                            this.toast.error(result.error);
                        }
                    });

                    document.getElementById('transferBtn')?.addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('transferAmount').value);
                        const targetId = parseInt(document.getElementById('transferUserId').value);

                        if (isNaN(amount) || amount <= 0) {
                            this.toast.error('أدخل مبلغ صحيح');
                            return;
                        }
                        if (!targetId || isNaN(targetId)) {
                            this.toast.error('أدخل معرف المستخدم');
                            return;
                        }

                        // التحقق من أن المستهدف غير محظور
                        const targetUser = this.data.getUserData(targetId);
                        if (!targetUser) {
                            this.toast.error('المستخدم غير موجود');
                            return;
                        }
                        if (targetUser.blocked) {
                            this.toast.error('لا يمكن التحويل إلى مستخدم محظور');
                            return;
                        }

                        if (amount > (this.state.currentUser?.balance || 0)) {
                            this.toast.error('الرصيد غير كافٍ');
                            return;
                        }

                        // استخدام الدالة الآمنة للتحويل
                        const result = this.data.transferBalance(
                            this.state.user.id,
                            targetId,
                            amount,
                            'تحويل'
                        );

                        if (result.success) {
                            this.toast.success(`✅ تم تحويل ${Utils.formatUSD(amount)} بنجاح`);
                            document.getElementById('transferAmount').value = '';
                            document.getElementById('transferUserId').value = '';
                        } else {
                            this.toast.error(result.error);
                        }
                    });
                }

                                                <div class="text-[9px] md:text-xs text-gray-400">ID: ${u.id}</div>
                                                <div class="text-[10px] md:text-xs">الرصيد: ${Utils.formatUSD(u.balance)}</div>
                                            </div>
                                            <div class="flex gap-1 md:gap-2">
                                                <button class="edit-user-balance text-blue-400 hover:text-blue-300" data-id="${u.id}" title="تعديل الرصيد">
                                                    <i class="fa-solid fa-pen-to-square text-sm"></i>
                                                </button>
                                                <button class="toggle-user-block ${u.blocked ? 'text-green-400' : 'text-red-400'} hover:opacity-75" data-id="${u.id}" title="${u.blocked ? 'رفع الحظر' : 'حظر'}">
                                                    <i class="fa-solid ${u.blocked ? 'fa-lock-open' : 'fa-lock'} text-sm"></i>
                                                </button>
                                            </div>
                                        </div>
                                        ${u.blocked ? '<span class="badge-blocked mt-1 inline-block text-[8px] md:text-xs bg-red-500/20 text-red-400 px-1 py-0.5 rounded">محظور</span>' : ''}
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div id="adminPaymentTab" class="admin-tab hidden">
                            <div class="flex justify-between items-center mb-2 md:mb-3">
                                <h3 class="text-base md:text-lg font-bold">طرق الدفع</h3>
                                <button id="addPaymentMethodBtn" class="btn-primary px-2 md:px-3 py-1 text-xs md:text-sm">
                                    <i class="fa-solid fa-plus ml-1"></i> إضافة
                                </button>
                            </div>
                            <div class="space-y-2 max-h-80 md:max-h-96 overflow-y-auto hide-scrollbar">
                                ${this.state.paymentMethods.map(m => `
                                    <div class="payment-method-admin glass-card p-2 md:p-3">
                                        <div class="flex items-center justify-between">
                                            <div class="flex items-center gap-2 md:gap-3">
                                                <div class="payment-icon w-8 h-8 md:w-10 md:h-10">
                                                    ${m.iconType === 'image' ? 
                                                        `<img src="${m.icon}" alt="${m.name}" class="w-full h-full object-cover rounded-full">` : 
                                                        `<i class="${m.icon} text-sm md:text-base"></i>`
                                                    }
                                                </div>
                                                <div>
                                                    <div class="font-bold text-xs md:text-sm">${m.name}</div>
                                                    <div class="text-[9px] md:text-xs text-gray-400">${m.description || ''}</div>
                                                </div>
                                            </div>
                                            <div class="flex gap-1 md:gap-2">
                                                <button class="edit-payment-method text-blue-400 hover:text-blue-300" data-id="${m.id}" title="تعديل">
                                                    <i class="fa-solid fa-pen-to-square text-sm"></i>
                                                </button>
                                                <button class="delete-payment-method text-red-400 hover:text-red-300" data-id="${m.id}" title="حذف">
                                                    <i class="fa-solid fa-trash text-sm"></i>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }

                bindAdminPanelEvents() {
                    const overlay = document.getElementById('adminPanelOverlay');
                    
                    document.getElementById('closeAdminPanel').addEventListener('click', () => {
                        overlay.classList.remove('open');
                    });
                    
                    overlay.addEventListener('click', (e) => {
                        if (e.target === overlay) overlay.classList.remove('open');
                    });

                    const tabs = document.querySelectorAll('[data-admin-tab]');
                    tabs.forEach(tab => {
                        tab.addEventListener('click', () => {
                            tabs.forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');
                            
                            document.getElementById('adminRequestsTab').classList.add('hidden');
                            document.getElementById('adminUsersTab').classList.add('hidden');
                            document.getElementById('adminPaymentTab').classList.add('hidden');
                            
                            if (tab.dataset.adminTab === 'requests') {
                                document.getElementById('adminRequestsTab').classList.remove('hidden');
                            } else if (tab.dataset.adminTab === 'users') {
                                document.getElementById('adminUsersTab').classList.remove('hidden');
                            } else if (tab.dataset.adminTab === 'payment') {
                                document.getElementById('adminPaymentTab').classList.remove('hidden');
                            }
                        });
                    });

                    document.querySelectorAll('.accept-request').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const item = e.target.closest('[data-id]');
                            const id = item.dataset.id;
                            const type = item.dataset.type;
                            
                            if (this.data.acceptRequest(id, type)) {
                                this.toast.success('تم قبول الطلب');
                                this.openAdminPanel();
                            } else {
                                this.toast.error('حدث خطأ');
                            }
                        });
                    });

                    document.querySelectorAll('.reject-request').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const item = e.target.closest('[data-id]');
                            const id = item.dataset.id;
                            const type = item.dataset.type;
                            
                            if (this.data.rejectRequest(id, type)) {
                                this.toast.info('تم رفض الطلب');
                                this.openAdminPanel();
                            }
                        });
                    });

                    document.querySelectorAll('.edit-user-balance').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const userId = btn.dataset.id;
                            this.openEditBalanceModal(userId);
                        });
                    });

                    document.querySelectorAll('.toggle-user-block').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const userId = btn.dataset.id;
                            const user = this.data.getUserData(parseInt(userId));
                            user.blocked = !user.blocked;
                            this.data.updateUser(parseInt(userId), user);
                            this.toast.success(user.blocked ? 'تم حظر المستخدم' : 'تم رفع الحظر');
                            // تحديث واجهة المستخدم إذا كان المحظور هو المستخدم الحالي
                            if (this.state.user && this.state.user.id == userId) {
                                this.state.set('currentUser', user);
                            }
                            this.openAdminPanel();
                        });
                    });

                    document.getElementById('addPaymentMethodBtn')?.addEventListener('click', () => {
                        this.openPaymentMethodModal();
                    });

                    document.querySelectorAll('.edit-payment-method').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            this.openPaymentMethodModal(id);
                        });
                    });

                    document.querySelectorAll('.delete-payment-method').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            if (confirm('هل أنت متأكد من الحذف؟')) {
                                this.data.deletePaymentMethod(id);
                                this.toast.success('تم الحذف بنجاح');
                                this.openAdminPanel();
                            }
                        });
                    });
                }

                openEditBalanceModal(userId) {
                    const overlay = document.getElementById('editBalanceModalOverlay');
                    const content = document.getElementById('editBalanceModalContent');
                    const user = this.data.getUserData(parseInt(userId));
                    
                    content.innerHTML = `
                        <div class="flex justify-between items-center mb-3 md:mb-4">
                            <h2 class="text-lg md:text-xl font-bold">تعديل رصيد المستخدم ${userId}</h2>
                            <button id="closeEditBalanceModal" class="w-7 h-7 md:w-8 md:h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors">
                                <i class="fa-solid fa-times text-sm md:text-base"></i>
                            </button>
                        </div>
                        <div class="space-y-2 md:space-y-3">
                            <div class="text-center">
                                <span class="text-xs md:text-sm text-gray-400">الرصيد الحالي:</span>
                                <span class="text-lg md:text-xl font-bold text-white">${Utils.formatUSD(user.balance)}</span>
                            </div>
                            <div>
                                <select id="balanceOperation" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white text-sm">
                                    <option value="add">إضافة</option>
                                    <option value="subtract">خصم</option>
                                    <option value="set">تعيين</option>
                                </select>
                            </div>
                            <div>
                                <input type="number" id="balanceAmount" placeholder="المبلغ ($)" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white text-sm">
                            </div>
                            <div>
                                <input type="text" id="balanceReason" placeholder="السبب (اختياري)" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white text-sm">
                            </div>
                            <button id="applyBalanceChange" class="w-full btn-primary py-2 mt-2 text-sm">تطبيق</button>
                        </div>
                    `;
                    
                    overlay.classList.add('open');
                    
                    document.getElementById('closeEditBalanceModal').addEventListener('click', () => {
                        overlay.classList.remove('open');
                    });
                    
                    document.getElementById('applyBalanceChange').addEventListener('click', () => {
                        const operation = document.getElementById('balanceOperation').value;
                        const amount = parseFloat(document.getElementById('balanceAmount').value);
                        const reason = document.getElementById('balanceReason').value || 'تعديل يدوي';
                        
                        if (isNaN(amount) || amount < 0) {
                            this.toast.error('أدخل مبلغ صحيح');
                            return;
                        }
                        
                        let delta = 0;
                        if (operation === 'add') delta = amount;
                        else if (operation === 'subtract') delta = -amount;
                        else delta = amount - user.balance;
                        
                        const result = this.data.updateBalance(parseInt(userId), delta, reason, 'admin');
                        if (result.success) {
                            this.toast.success(`✅ تم تعديل الرصيد بنجاح`);
                            overlay.classList.remove('open');
                            this.openAdminPanel();
                        }
                    });
                }

                openPaymentMethodModal(editingId = null) {
                    const overlay = document.getElementById('paymentMethodModalOverlay');
                    const content = document.getElementById('paymentMethodModalContent');
                    const method = editingId ? this.state.paymentMethods.find(m => m.id === editingId) : null;
                    
                    content.innerHTML = `
                        <div class="flex justify-between items-center mb-3 md:mb-4">
                            <h2 class="text-lg md:text-xl font-bold">${method ? 'تعديل طريقة دفع' : 'إضافة طريقة دفع'}</h2>
                            <button id="closePaymentMethodModal" class="w-7 h-7 md:w-8 md:h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors">
                                <i class="fa-solid fa-times text-sm md:text-base"></i>
                            </button>
                        </div>
                        <form id="paymentMethodForm" class="space-y-2 md:space-y-3">
                            <input type="hidden" id="methodId" value="${method?.id || ''}">
                            
                            <div>
                                <label class="text-xs md:text-sm text-gray-400">صورة الطريقة</label>
                                <div class="image-upload-area p-3 md:p-4 border border-dashed border-blue-500/50 rounded-lg text-center cursor-pointer" id="imageUploadArea">
                                    <input type="file" id="imageInput" accept="image/*" class="hidden">
                                    <div id="imagePreviewContainer" class="flex flex-col items-center">
                                        ${method && method.iconType === 'image' && method.icon ? 
                                            `<img src="${method.icon}" class="image-preview max-h-20 md:max-h-24 mb-2 rounded-lg">` : 
                                            `<i class="fa-solid fa-cloud-upload-alt text-2xl md:text-3xl text-gray-400 mb-2"></i>
                                             <p class="text-xs md:text-sm text-gray-400">انقر أو اسحب صورة</p>`
                                        }
                                    </div>
                                </div>
                                ${method && method.iconType === 'image' && method.icon ? 
                                    `<button type="button" id="deleteImageBtn" class="delete-image-btn mt-1 text-red-400 text-xs"><i class="fa-solid fa-trash"></i> حذف الصورة</button>` : ''
                                }
                            </div>

                            <div>
                                <input type="text" id="methodName" placeholder="اسم الطريقة" value="${method?.name || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white text-sm" required>
                            </div>
                            <div>
                                <input type="text" id="methodIcon" placeholder="أيقونة FontAwesome" value="${method?.iconType !== 'image' ? (method?.icon || '') : ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white text-sm">
                            </div>
                            <div>
                                <input type="text" id="methodDescription" placeholder="وصف مختصر" value="${method?.description || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white text-sm">
                            </div>
                            <div>
                                <input type="text" id="methodWithdrawDetails" placeholder="تفاصيل السحب" value="${method?.withdrawDetails || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white text-sm">
                            </div>
                            <div class="flex gap-2 pt-2">
                                <button type="submit" class="flex-1 btn-primary py-2 text-sm">حفظ</button>
                                <button type="button" id="cancelPaymentMethod" class="flex-1 bg-gray-600 py-2 rounded-lg font-bold hover:bg-gray-700 transition-colors text-sm">إلغاء</button>
                            </div>
                        </form>
                    `;
                    
                    overlay.classList.add('open');
                    
                    const imageInput = document.getElementById('imageInput');
                    const imageUploadArea = document.getElementById('imageUploadArea');
                    const imagePreviewContainer = document.getElementById('imagePreviewContainer');
                    
                    imageUploadArea.addEventListener('click', () => imageInput.click());
                    
                    imageUploadArea.addEventListener('dragover', (e) => {
                        e.preventDefault();
                        imageUploadArea.style.borderColor = '#3b82f6';
                    });
                    
                    imageUploadArea.addEventListener('dragleave', () => {
                        imageUploadArea.style.borderColor = 'rgba(59, 130, 246, 0.5)';
                    });
                    
                    imageUploadArea.addEventListener('drop', (e) => {
                        e.preventDefault();
                        imageUploadArea.style.borderColor = 'rgba(59, 130, 246, 0.5)';
                        const file = e.dataTransfer.files[0];
                        if (file) handleImageFile(file);
                    });
                    
                    imageInput.addEventListener('change', (e) => {
                        const file = e.target.files[0];
                        if (file) handleImageFile(file);
                    });

                    const handleImageFile = async (file) => {
                        const validation = Utils.validateImage(file);
                        if (!validation.valid) {
                            this.toast.error(validation.error);
                            return;
                        }

                        try {
                            const compressedImage = await Utils.compressImage(file);
                            imagePreviewContainer.innerHTML = `<img src="${compressedImage}" class="image-preview max-h-20 md:max-h-24 mb-2 rounded-lg">`;
                            imageUploadArea.dataset.imageBase64 = compressedImage;
                            
                            if (!document.getElementById('deleteImageBtn')) {
                                const deleteBtn = document.createElement('button');
                                deleteBtn.type = 'button';
                                deleteBtn.id = 'deleteImageBtn';
                                deleteBtn.className = 'delete-image-btn mt-1 text-red-400 text-xs';
                                deleteBtn.innerHTML = '<i class="fa-solid fa-trash"></i> حذف الصورة';
                                deleteBtn.addEventListener('click', () => {
                                    delete imageUploadArea.dataset.imageBase64;
                                    imageInput.value = '';
                                    imagePreviewContainer.innerHTML = `
                                        <i class="fa-solid fa-cloud-upload-alt text-2xl md:text-3xl text-gray-400 mb-2"></i>
                                        <p class="text-xs md:text-sm text-gray-400">انقر أو اسحب صورة</p>
                                    `;
                                    deleteBtn.remove();
                                });
                                imageUploadArea.parentNode.appendChild(deleteBtn);
                            }
                        } catch (error) {
                            this.toast.error('فشل ضغط الصورة');
                        }
                    };

                    const deleteImageBtn = document.getElementById('deleteImageBtn');
                    if (deleteImageBtn) {
                        deleteImageBtn.addEventListener('click', () => {
                            delete imageUploadArea.dataset.imageBase64;
                            imageInput.value = '';
                            imagePreviewContainer.innerHTML = `
                                <i class="fa-solid fa-cloud-upload-alt text-2xl md:text-3xl text-gray-400 mb-2"></i>
                                <p class="text-xs md:text-sm text-gray-400">انقر أو اسحب صورة</p>
                            `;
                            deleteImageBtn.remove();
                        });
                    }

                    document.getElementById('closePaymentMethodModal').addEventListener('click', () => {
                        overlay.classList.remove('open');
                    });
                    
                    document.getElementById('cancelPaymentMethod').addEventListener('click', () => {
                        overlay.classList.remove('open');
                    });
                    
                    overlay.addEventListener('click', (e) => {
                        if (e.target === overlay) overlay.classList.remove('open');
                    });

                    document.getElementById('paymentMethodForm').addEventListener('submit', (e) => {
                        e.preventDefault();
                        
                        const imageBase64 = imageUploadArea.dataset.imageBase64;
                        const iconType = imageBase64 ? 'image' : 'fa';
                        const icon = imageBase64 ? imageBase64 : document.getElementById('methodIcon').value;
                        
                        const formData = {
                            name: document.getElementById('methodName').value,
                            icon: icon,
                            iconType: iconType,
                            description: document.getElementById('methodDescription').value,
                            withdrawDetails: document.getElementById('methodWithdrawDetails').value
                        };
                        
                        const id = document.getElementById('methodId').value;
                        
                        if (id) {
                            this.data.updatePaymentMethod(id, formData);
                            this.toast.success('تم التحديث بنجاح');
                        } else {
                            this.data.addPaymentMethod(formData);
                            this.toast.success('تمت الإضافة بنجاح');
                        }
                        
                        overlay.classList.remove('open');
                        this.openAdminPanel();
                    });
                }

                openNotificationsModal() {
                    const modal = document.getElementById('walletModalOverlay');
                    const content = document.getElementById('walletModalContent');
                    content.innerHTML = this.renderNotificationsModal();
                    modal.classList.add('open');
                    this.bindNotificationsModalEvents();
                }

                renderNotificationsModal() {
                    const userId = this.state.user.id;
                    const notifications = this.data.getUserNotifications(userId);
                    
                    const notificationsHtml = notifications.length ? 
                        notifications.map(n => `
                            <div class="transaction-item ${n.read ? 'opacity-60' : ''}" data-id="${n.id}">
                                <div class="flex-1">
                                    <div class="font-bold flex items-center gap-2 text-xs md:text-sm">
                                        ${!n.read ? '<span class="w-1.5 h-1.5 bg-blue-500 rounded-full"></span>' : ''}
                                        ${n.title}
                                    </div>
                                    <div class="text-[10px] md:text-xs">${n.message}</div>
                                    <div class="text-[8px] md:text-[10px] text-gray-400 mt-1">${Utils.formatDateTime(n.date)}</div>
                                </div>
                                ${!n.read ? `
                                    <button class="mark-read text-blue-400 hover:text-blue-300 text-[10px] md:text-xs" data-id="${n.id}">
                                        <i class="fa-regular fa-circle-check"></i>
                                    </button>
                                ` : ''}
                            </div>
                        `).join('') :
                        '<p class="text-center text-gray-400 py-6 md:py-8 text-sm">لا توجد إشعارات</p>';
                    
                    return `
                        <div class="flex justify-between items-center mb-3 md:mb-4">
                            <h2 class="text-lg md:text-xl font-bold">الإشعارات</h2>
                            <button id="closeNotificationsModal" class="w-7 h-7 md:w-8 md:h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors">
                                <i class="fa-solid fa-times text-sm md:text-base"></i>
                            </button>
                        </div>
                        <div class="flex justify-end mb-2 md:mb-3">
                            <button id="markAllRead" class="btn-primary px-2 md:px-3 py-1 text-xs md:text-sm">
                                <i class="fa-regular fa-bell-slash ml-1"></i> تحديد الكل كمقروء
                            </button>
                        </div>
                        <div class="max-h-72 md:max-h-96 overflow-y-auto hide-scrollbar space-y-1 md:space-y-2">${notificationsHtml}</div>
                    `;
                }

                bindNotificationsModalEvents() {
                    const overlay = document.getElementById('walletModalOverlay');
                    
                    document.getElementById('closeNotificationsModal').addEventListener('click', () => {
                        overlay.classList.remove('open');
                    });
                    
                    document.getElementById('markAllRead')?.addEventListener('click', () => {
                        this.data.markAllAsRead(this.state.user.id);
                        this.toast.success('تم تحديد الكل كمقروء');
                        this.openNotificationsModal();
                    });
                    
                    document.querySelectorAll('.mark-read').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const id = btn.dataset.id;
                            this.data.markNotificationAsRead(id);
                            this.openNotificationsModal();
                        });
                    });
                    
                    overlay.addEventListener('click', (e) => {
                        if (e.target === overlay) overlay.classList.remove('open');
                    });
                }
            }

            // ==================== App Class ====================
            class App {
                constructor() {
                    this.state = {
                        user: null,
                        isAdmin: false,
                        loading: true,
                        accessDenied: false,
                        telegramMissing: false,
                        theme: 'dark',
                        users: {},
                        currentUser: null,
                        withdrawalRequests: [],
                        paymentMethods: [],
                        notifications: [],
                        chatMessages: [],
                        supportTickets: [],
                        faqItems: [],
                        unreadNotifications: 0,
                        settings: {
                            language: 'ar',
                            notifications: true,
                            sound: true,
                            vibrate: true,
                            autoRefresh: true
                        },
                        stats: {
                            users: 0,
                            dailyOps: 0
                        },
                        
                        set(key, value) {
                            const oldValue = this[key];
                            this[key] = value;
                            window.dispatchEvent(new CustomEvent('stateChanged', { 
                                detail: { key, value, oldValue } 
                            }));
                        }
                    };
                    
                    this.telegram = new TelegramService();
                    this.toast = new ToastManager();
                    this.data = new DataService(this.state);
                    this.ui = new UIManager(this.state, this.data, this.telegram, this.toast);
                    
                    this.init();
                }

                async init() {
                    if (!this.telegram.isAvailable) {
                        this.state.telegramMissing = true;
                        this.state.loading = false;
                        this.ui.render();
                        return;
                    }

                    this.telegram.init();

                    if (!this.telegram.isValid() || !this.telegram.getUser()) {
                        this.state.accessDenied = true;
                        this.state.loading = false;
                        this.ui.render();
                        return;
                    }

                    const user = this.telegram.getUser();
                    this.state.user = user;
                    this.state.isAdmin = (user.id === CONFIG.ADMIN_ID);

                    const userData = this.data.getUserData(user.id);
                    this.state.currentUser = userData;

                    if (!userData.name) {
                        userData.name = `${user.first_name} ${user.last_name || ''}`.trim();
                        this.data.updateUser(user.id, userData);
                    }

                    const savedTheme = this.data.loadTheme();
                    this.applyTheme(savedTheme);
                    this.loadSettings();

                    this.state.loading = true;
                    this.ui.render();

                    try {
                        await new Promise(resolve => setTimeout(resolve, 1000));
                        this.state.loading = false;
                        this.ui.render();

                        this.telegram.setMainButton(
                            this.state.isAdmin ? "لوحة التحكم" : "تحديث البيانات",
                            '#3b82f6',
                            '#ffffff',
                            true,
                            () => {
                                this.telegram.showPopup({
                                    title: this.state.isAdmin ? 'مرحباً أيها المدير' : 'نظام آمن',
                                    message: this.state.isAdmin 
                                        ? `لديك صلاحيات كاملة. الطلبات المعلقة: ${this.data.getPendingRequestsCount()}`
                                        : `أهلاً ${user.first_name}، اتصالك آمن.`,
                                    buttons: [{ type: 'ok', text: 'حسناً' }]
                                });
                            }
                        );

                        this.toast.success(`مرحباً ${user.first_name}، أهلاً بك في المحفظة المتطورة`);
                        
                        this.data.startAutoRefresh(() => this.refreshData());
                    } catch (error) {
                        console.error('Initialization error:', error);
                        this.toast.error('حدث خطأ أثناء تحميل البيانات');
                        this.state.loading = false;
                        this.ui.render();
                    }
                }

                refreshData() {
                    if (this.state.user) {
                        const userData = this.data.getUserData(this.state.user.id);
                        if (userData.balance !== this.state.currentUser?.balance) {
                            this.state.set('currentUser', userData);
                            this.showAutoUpdateIndicator('تم تحديث الرصيد تلقائياً');
                        }
                        
                        const unreadCount = this.data.getUnreadCount(this.state.user.id);
                        if (unreadCount !== this.state.unreadNotifications) {
                            this.state.set('unreadNotifications', unreadCount);
                        }
                    }
                }

                showAutoUpdateIndicator(message) {
                    const indicator = document.getElementById('autoUpdateIndicator');
                    if (indicator) {
                        indicator.classList.remove('hidden');
                        indicator.querySelector('span').textContent = message;
                        
                        setTimeout(() => {
                            indicator.classList.add('hidden');
                        }, 2000);
                    }
                }

                loadSettings() {
                    const settings = this.state.settings;
                    this.toast.soundEnabled = settings.sound;
                    this.toast.vibrateEnabled = settings.vibrate;
                }

                applyTheme(theme) {
                    const root = document.documentElement;
                    const themeIcon = document.getElementById('themeIcon');
                    
                    if (theme === 'light') {
                        root.style.setProperty('--tg-theme-bg-color', '#f8fafc');
                        root.style.setProperty('--tg-theme-text-color', '#0f172a');
                        if (themeIcon) themeIcon.className = 'fa-solid fa-sun';
                    } else {
                        root.style.setProperty('--tg-theme-bg-color', '#0f172a');
                        root.style.setProperty('--tg-theme-text-color', '#ffffff');
                        if (themeIcon) themeIcon.className = 'fa-solid fa-moon';
                    }
                }
            }

            const app = new App();

            document.getElementById('themeToggle').addEventListener('click', () => {
                const newTheme = app.state.theme === 'dark' ? 'light' : 'dark';
                app.state.theme = newTheme;
                app.data.saveTheme(newTheme);
                app.applyTheme(newTheme);
                app.toast.info(`تم تغيير السمة إلى ${newTheme === 'dark' ? 'الداكنة' : 'الفاتحة'}`);
            });

            console.log('✅ App initialized successfully with all fixes');
        })();
    </script>
