                    const usersEl = document.getElementById('statsUsers');
                    const botsEl = document.getElementById('statsBots');
                    const dailyOpsEl = document.getElementById('statsDailyOps');
                    if (usersEl) usersEl.textContent = stats.users.toLocaleString('ar-EG');
                    if (botsEl) botsEl.textContent = stats.bots;
                    if (dailyOpsEl) dailyOpsEl.textContent = stats.dailyOps;
                }

                bindEvents() {
                    const logoutBtn = document.getElementById('logoutBtn');
                    if (logoutBtn) {
                        logoutBtn.addEventListener('click', () => {
                            this.tg.close();
                            this.toast.info('تم تسجيل الخروج بنجاح');
                        });
                    }

                    const walletIcon = document.getElementById('walletIconLarge');
                    if (walletIcon) {
                        walletIcon.addEventListener('click', () => this.openWalletModal());
                    }

                    const adminPanelBtn = document.getElementById('openAdminPanelBtn');
                    if (adminPanelBtn) {
                        adminPanelBtn.addEventListener('click', () => this.openAdminPanel());
                    }

                    const notificationBell = document.getElementById('notificationBell');
                    if (notificationBell) {
                        notificationBell.addEventListener('click', () => this.openNotificationsModal());
                    }

                    const openAdsBtn = document.getElementById('openAdsBtn');
                    if (openAdsBtn) {
                        openAdsBtn.addEventListener('click', () => this.openAdsModal());
                    }

                    const openTasksBtn = document.getElementById('openTasksBtn');
                    if (openTasksBtn) {
                        openTasksBtn.addEventListener('click', () => this.openTasksModal());
                    }
                }

                // ========== مودال الإعلانات المتطور ==========
                openAdsModal() {
                    const modalOverlay = document.getElementById('adModalOverlay');
                    const modalContent = document.getElementById('adModalContent');
                    modalContent.innerHTML = this.renderAdsModal();
                    modalOverlay.classList.add('open');
                    this.bindAdsModalEvents();
                }

                renderAdsModal() {
                    const userId = this.state.user.id;
                    const availableAds = this.adSystem.getAvailableAds(userId);
                    const stats = this.adSystem.getUserStats(userId);
                    
                    const adsHtml = availableAds.length === 0 
                        ? '<div class="text-center py-8"><i class="fa-solid fa-face-smile-wink text-5xl text-gray-600 mb-4"></i><p class="text-gray-400">لا توجد إعلانات متاحة اليوم، ترجع غداً!</p></div>'
                        : availableAds.map(ad => `
                            <div class="ad-card" data-ad-id="${ad.id}">
                                <div class="flex items-center gap-4 mb-4">
                                    <div class="w-14 h-14 rounded-2xl bg-blue-500/10 flex items-center justify-center text-3xl">
                                        <i class="${ad.image} text-blue-400"></i>
                                    </div>
                                    <div class="flex-1">
                                        <h3 class="font-black text-lg">${ad.title}</h3>
                                        <p class="text-xs text-gray-400">${ad.description}</p>
                                    </div>
                                    <div class="ad-reward">
                                        <i class="fa-solid fa-coins"></i>
                                        ${ad.reward}
                                    </div>
                                </div>
                                <div class="flex gap-3">
                                    <button class="btn-primary flex-1 watch-ad-btn" data-ad-id="${ad.id}">
                                        <i class="fa-solid fa-play ml-1"></i>
                                        مشاهدة
                                    </button>
                                    <button class="btn-secondary flex-1 preview-ad-btn" data-link="${ad.link}">
                                        <i class="fa-solid fa-eye ml-1"></i>
                                        معاينة
                                    </button>
                                </div>
                            </div>
                        `).join('');

                    return `
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-black">إعلانات اليوم</h2>
                            <button id="closeAdsModal" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="daily-counter mb-6">
                            <div class="flex justify-between text-sm mb-2">
                                <span class="font-bold">مشاهدات اليوم</span>
                                <span class="text-blue-400 font-black">${stats.todayWatched}</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${Math.min(stats.todayWatched * 10, 100)}%"></div>
                            </div>
                            <div class="flex justify-between text-xs text-gray-400 mt-3">
                                <span>إجمالي الأرباح: <span class="text-green-400 font-bold">${stats.totalEarned}</span></span>
                                <span>إجمالي المشاهدات: <span class="text-blue-400 font-bold">${stats.totalWatched}</span></span>
                            </div>
                        </div>

                        <div class="space-y-4 max-h-96 overflow-y-auto px-1">
                            ${adsHtml}
                        </div>
                    `;
                }

                bindAdsModalEvents() {
                    const modalOverlay = document.getElementById('adModalOverlay');
                    
                    document.getElementById('closeAdsModal').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });

                    modalOverlay.addEventListener('click', (e) => {
                        if (e.target === modalOverlay) modalOverlay.classList.remove('open');
                    });

                    document.querySelectorAll('.watch-ad-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const adId = btn.dataset.adId;
                            const result = this.adSystem.watchAd(this.state.user.id, adId);
                            
                            if (result.success) {
                                this.toast.success(`✅ تمت مشاهدة الإعلان بنجاح
                                    • الإعلان: ${result.ad.title}
                                    • المكافأة: ${result.reward}
                                    • الرصيد الجديد: ${this.state.balance}`);
                                
                                this.openAdsModal();
                                this.updateBalanceDisplay();
                            } else {
                                this.toast.error(result.message);
                            }
                        });
                    });

                    document.querySelectorAll('.preview-ad-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const link = btn.dataset.link;
                            this.tg.openLink(link);
                        });
                    });
                }

                // ========== مودال المهام المتطور ==========
                openTasksModal() {
                    const modalOverlay = document.getElementById('taskVerificationModalOverlay');
                    const modalContent = document.getElementById('taskVerificationModalContent');
                    modalContent.innerHTML = this.renderTasksModal();
                    modalOverlay.classList.add('open');
                    this.bindTasksModalEvents();
                }

                renderTasksModal() {
                    const userId = this.state.user.id;
                    const availableTasks = this.taskSystem.getAvailableTasks(userId);
                    const userTasks = this.taskSystem.getUserTasks(userId);
                    const stats = this.taskSystem.getUserTaskStatus(userId);
                    
                    const tasksHtml = availableTasks.length === 0 
                        ? '<div class="text-center py-8"><i class="fa-solid fa-check-circle text-5xl text-gray-600 mb-4"></i><p class="text-gray-400">لا توجد مهام متاحة حالياً</p></div>'
                        : availableTasks.map(task => {
                            const userTask = userTasks.find(t => t.taskId === task.id);
                            const status = userTask ? userTask.status : 'new';
                            
                            let statusClass = '';
                            let statusText = '';
                            let buttonHtml = '';
                            
                            if (status === 'new') {
                                statusClass = 'badge-pending badge';
                                statusText = 'جديد';
                                buttonHtml = `<button class="btn-primary w-full start-task-btn" data-task-id="${task.id}"><i class="fa-solid fa-play ml-1"></i>بدء المهمة</button>`;
                            } else if (status === 'started') {
                                statusClass = 'badge-warning badge';
                                statusText = 'قيد التنفيذ';
                                buttonHtml = `<button class="btn-primary w-full verify-task-btn" data-task-id="${task.id}" style="background: linear-gradient(135deg, #f59e0b, #d97706);"><i class="fa-solid fa-check ml-1"></i>طلب تحقق</button>`;
                            } else if (status === 'pending') {
                                statusClass = 'badge-warning badge';
                                statusText = 'قيد المراجعة';
                                buttonHtml = `<button class="btn-primary w-full" disabled style="opacity: 0.5;"><i class="fa-solid fa-hourglass ml-1"></i>في انتظار المراجعة</button>`;
                            }
                            
                            return `
                                <div class="task-card" data-task-id="${task.id}">
                                    <div class="flex justify-between items-start mb-4">
                                        <div class="flex-1">
                                            <h3 class="font-black text-lg">${task.title}</h3>
                                            <p class="text-sm text-gray-400 mt-1">${task.description}</p>
                                            <div class="text-xs bg-slate-800/50 p-3 rounded-xl mt-3 border border-white/5">
                                                <i class="fa-solid fa-circle-info ml-1 text-blue-400"></i>
                                                ${task.instructions}
                                            </div>
                                        </div>
                                        <div class="flex flex-col items-end gap-2">
                                            <div class="task-reward">
                                                <i class="fa-solid fa-coins"></i>
                                                ${task.reward}
                                            </div>
                                            <span class="${statusClass}">${statusText}</span>
                                        </div>
                                    </div>
                                    ${buttonHtml}
                                </div>
                            `;
                        }).join('');

                    return `
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-black">المهام المتاحة</h2>
                            <button id="closeTasksModal" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="ad-stats mb-6">
                            <div class="ad-stat-card">
                                <div class="ad-stat-value">${stats.completed}</div>
                                <div class="ad-stat-label">مكتملة</div>
                            </div>
                            <div class="ad-stat-card">
                                <div class="ad-stat-value">${stats.pending}</div>
                                <div class="ad-stat-label">قيد المراجعة</div>
                            </div>
                            <div class="ad-stat-card">
                                <div class="ad-stat-value">${stats.started}</div>
                                <div class="ad-stat-label">قيد التنفيذ</div>
                            </div>
                            <div class="ad-stat-card">
                                <div class="ad-stat-value">${stats.total - stats.completed}</div>
                                <div class="ad-stat-label">المتبقي</div>
                            </div>
                        </div>

                        <div class="space-y-4 max-h-96 overflow-y-auto px-1">
                            ${tasksHtml}
                        </div>
                    `;
                }

                bindTasksModalEvents() {
                    const modalOverlay = document.getElementById('taskVerificationModalOverlay');
                    
                    document.getElementById('closeTasksModal').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });

                    modalOverlay.addEventListener('click', (e) => {
                        if (e.target === modalOverlay) modalOverlay.classList.remove('open');
                    });

                    document.querySelectorAll('.start-task-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const taskId = btn.dataset.taskId;
                            const result = this.taskSystem.startTask(this.state.user.id, taskId);
                            
                            if (result.success) {
                                this.toast.success(`تم بدء المهمة بنجاح
                                    • المهمة: ${result.task.title}
                                    • اقرأ التعليمات جيداً قبل التنفيذ`);
                                this.openTasksModal();
                            } else {
                                this.toast.error(result.message);
                            }
                        });
                    });

                    document.querySelectorAll('.verify-task-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const taskId = btn.dataset.taskId;
                            const task = this.state.tasks.find(t => t.id === taskId);
                            
                            if (!task) return;
                            
                            let promptText = '';
                            if (task.verificationType === 'screenshot') {
                                promptText = 'أدخل رابط لقطة الشاشة (يمكنك رفعها على telegra.ph):';
                            } else if (task.verificationType === 'link') {
                                promptText = 'أدخل الرابط المطلوب:';
                            } else {
                                promptText = 'أدخل تفاصيل التحقق:';
                            }
                            
                            const verificationData = prompt(promptText);
                            
                            if (verificationData && verificationData.trim()) {
                                const result = this.taskSystem.requestVerification(this.state.user.id, taskId, verificationData);
                                
                                if (result.success) {
                                    this.toast.success(result.message);
                                    this.openTasksModal();
                                } else {
                                    this.toast.error(result.message);
                                }
                            }
                        });
                    });
                }

                // ========== مودال المحفظة المتطور ==========
                openWalletModal() {
                    const modalOverlay = document.getElementById('walletModalOverlay');
                    const modalContent = document.getElementById('walletModalContent');
                    modalContent.innerHTML = this.renderWalletModal();
                    modalOverlay.classList.add('open');
                    this.bindWalletModalEvents();
                }

                renderWalletModal() {
                    const balance = this.state.balance;
                    const transactions = this.state.wallet.transactions;
                    const paymentMethods = this.state.paymentMethods;

                    const transactionsHtml = transactions.length === 0 
                        ? '<div class="text-center py-8"><i class="fa-solid fa-clock-rotate-left text-5xl text-gray-600 mb-4"></i><p class="text-gray-400">لا توجد معاملات بعد</p></div>'
                        : transactions.map(tx => {
                            const amountClass = tx.amount > 0 ? 'positive' : 'negative';
                            const amountStr = (tx.amount > 0 ? '+' : '') + tx.amount.toLocaleString('ar-EG');
                            return `
                                <div class="transaction-item">
                                    <div>
                                        <div class="font-black">${tx.note || tx.type}</div>
                                        <div class="text-xs text-gray-400">${DateUtils.getTimeAgo(tx.date)}</div>
                                    </div>
                                    <div class="transaction-amount ${amountClass} font-black">${amountStr}</div>
                                </div>
                            `;
                        }).join('');

                    const paymentMethodsHtml = paymentMethods.map(m => `
                        <div class="payment-method" data-method-id="${m.id}">
                            <div class="payment-icon">
                                <i class="${m.icon}"></i>
                            </div>
                            <div class="flex-1">
                                <div class="font-black">${m.name}</div>
                                <div class="text-xs text-gray-400">${(m.description || '').substring(0, 30)}...</div>
                            </div>
                        </div>
                    `).join('');

                    const withdrawMethodsHtml = paymentMethods.map(m => `
                        <div class="payment-method" data-method-id="${m.id}">
                            <div class="payment-icon">
                                <i class="${m.icon}"></i>
                            </div>
                            <div class="flex-1">
                                <div class="font-black">${m.name}</div>
                            </div>
                        </div>
                    `).join('');

                    return `
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-black">محفظتي</h2>
                            <button id="closeWalletModal" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="glass-card p-6 rounded-2xl text-center mb-6 glow">
                            <div class="text-gray-400 text-sm mb-2">الرصيد الحالي</div>
                            <div class="text-4xl font-black text-white">${balance.toLocaleString('ar-EG')}</div>
                            <div class="text-xs text-gray-400 mt-2">عملة البوت</div>
                        </div>

                        <div class="wallet-tabs">
                            <button class="wallet-tab active" data-tab="deposit"><i class="fa-solid fa-arrow-down"></i> شحن</button>
                            <button class="wallet-tab" data-tab="withdraw"><i class="fa-solid fa-arrow-up"></i> سحب</button>
                            <button class="wallet-tab" data-tab="transfer"><i class="fa-solid fa-exchange-alt"></i> تحويل</button>
                            <button class="wallet-tab" data-tab="history"><i class="fa-solid fa-history"></i> السجل</button>
                        </div>

                        <div id="walletTabContent">
                            <!-- تبويب الشحن -->
                            <div class="tab-pane active" id="tab-deposit">
                                <p class="text-sm text-gray-300 mb-4 font-bold">اختر طريقة الدفع:</p>
                                <div class="payment-methods-list mb-4">
                                    ${paymentMethodsHtml}
                                </div>
                                
                                <div id="depositDetailsDisplay" class="payment-details hidden">
                                    <strong class="block mb-2">تفاصيل الإيداع:</strong>
                                    <div id="depositDetailsText" class="text-sm"></div>
                                </div>

                                <div class="mb-4">
                                    <label class="text-sm text-gray-400 mb-1 block">رقم العملية (TXID):</label>
                                    <input type="text" id="depositTransactionId" placeholder="أدخل رقم العملية" class="input-field">
                                </div>

                                <div class="flex gap-3">
                                    <input type="number" id="depositAmount" placeholder="المبلغ" class="input-field flex-1">
                                    <button id="depositBtn" class="btn-primary px-6">تقديم طلب</button>
                                </div>
                                <p class="text-xs text-gray-400 mt-3">سيتم مراجعة طلبك من قبل الإدارة.</p>
                            </div>

                            <!-- تبويب السحب -->
                            <div class="tab-pane hidden" id="tab-withdraw">
                                <p class="text-sm text-gray-300 mb-4 font-bold">اختر طريقة السحب:</p>
                                <div class="payment-methods-list mb-4" id="withdrawMethodsList">
                                    ${withdrawMethodsHtml}
                                </div>
                                <div id="withdrawDetailsContainer" class="mb-4">
                                    <input type="text" id="withdrawDetails" placeholder="أدخل التفاصيل" class="input-field mb-3">
                                </div>
                                <div class="flex gap-3">
                                    <input type="number" id="withdrawAmount" placeholder="المبلغ" class="input-field flex-1">
                                    <button id="withdrawBtn" class="btn-primary px-6" style="background: linear-gradient(135deg, #ef4444, #dc2626);">طلب سحب</button>
                                </div>
                                <p class="text-xs text-gray-400 mt-3">سيتم مراجعة طلب السحب من قبل الإدارة.</p>
                            </div>

                            <!-- تبويب التحويل -->
                            <div class="tab-pane hidden" id="tab-transfer">
                                <p class="text-sm text-gray-300 mb-4 font-bold">تحويل إلى مستخدم آخر:</p>
                                <input type="text" id="transferUserId" placeholder="معرف المستخدم" class="input-field mb-3">
                                <div class="flex gap-3">
                                    <input type="number" id="transferAmount" placeholder="المبلغ" class="input-field flex-1">
                                    <button id="transferBtn" class="btn-primary px-6" style="background: linear-gradient(135deg, #10b981, #059669);">تحويل</button>
                                </div>
                            </div>

                            <!-- تبويب السجل -->
                            <div class="tab-pane hidden" id="tab-history">
                                <div class="max-h-64 overflow-y-auto">
                                    ${transactionsHtml}
                                </div>
                            </div>
                        </div>
                    `;
                }

                bindWalletModalEvents() {
                    const modalOverlay = document.getElementById('walletModalOverlay');
                    document.getElementById('closeWalletModal').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });
                    modalOverlay.addEventListener('click', (e) => {
                        if (e.target === modalOverlay) modalOverlay.classList.remove('open');
                    });

                    const tabs = document.querySelectorAll('.wallet-tab');
                    tabs.forEach(tab => {
                        tab.addEventListener('click', () => {
                            tabs.forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');
                            const tabId = tab.dataset.tab;
                            document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.add('hidden'));
                            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
                        });
                    });

                    const paymentMethods = document.querySelectorAll('.payment-methods-list .payment-method');
                    let selectedMethod = null;
                    const detailsDisplay = document.getElementById('depositDetailsDisplay');
                    const detailsText = document.getElementById('depositDetailsText');
                    
                    paymentMethods.forEach(method => {
                        method.addEventListener('click', () => {
                            paymentMethods.forEach(m => m.classList.remove('selected'));
                            method.classList.add('selected');
                            selectedMethod = method.dataset.methodId;
                            
                            const methodObj = this.state.paymentMethods.find(m => m.id === selectedMethod);
                            if (methodObj && methodObj.depositDetails) {
                                detailsText.innerHTML = methodObj.depositDetails.replace(/\n/g, '<br>');
                                detailsDisplay.classList.remove('hidden');
                            } else {
                                detailsDisplay.classList.add('hidden');
                            }
                        });
                    });

                    document.getElementById('depositBtn')?.addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('depositAmount').value);
                        const transactionId = document.getElementById('depositTransactionId').value.trim();
                        
                        if (!ValidationUtils.isValidAmount(amount)) {
                            this.toast.error('أدخل مبلغ صحيح (1 - 1,000,000)');
                            return;
                        }
                        if (!selectedMethod) {
                            this.toast.error('اختر طريقة دفع أولاً');
                            return;
                        }
                        if (!transactionId) {
                            this.toast.error('يرجى إدخال رقم العملية');
                            return;
                        }
                        
                        const request = this.data.addDepositRequest(amount, selectedMethod, transactionId, this.state.user);
                        
                        this.toast.success(`✅ تم تقديم طلب الشحن بنجاح
                            • المبلغ: ${amount}
                            • الطريقة: ${request.method}
                            • رقم الطلب: ${request.id}`);
                        
                        document.getElementById('depositAmount').value = '';
                        document.getElementById('depositTransactionId').value = '';
                        paymentMethods.forEach(m => m.classList.remove('selected'));
                        selectedMethod = null;
                        detailsDisplay.classList.add('hidden');
                    });

                    const withdrawMethods = document.querySelectorAll('#withdrawMethodsList .payment-method');
                    let selectedWithdrawMethod = null;
                    withdrawMethods.forEach(method => {
                        method.addEventListener('click', () => {
                            withdrawMethods.forEach(m => m.classList.remove('selected'));
                            method.classList.add('selected');
                            selectedWithdrawMethod = method.dataset.methodId;
                            
                            const methodObj = this.state.paymentMethods.find(m => m.id === selectedWithdrawMethod);
                            const detailsInput = document.getElementById('withdrawDetails');
                            if (methodObj) {
                                detailsInput.placeholder = methodObj.withdrawDetails || 'أدخل التفاصيل';
                            }
                        });
                    });

                    document.getElementById('withdrawBtn')?.addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('withdrawAmount').value);
                        const details = document.getElementById('withdrawDetails').value.trim();
                        
                        if (!ValidationUtils.isValidAmount(amount)) {
                            this.toast.error('أدخل مبلغ صحيح (1 - 1,000,000)');
                            return;
                        }
                        if (!selectedWithdrawMethod) {
                            this.toast.error('اختر طريقة سحب أولاً');
                            return;
                        }
                        if (!details) {
                            this.toast.error('أدخل التفاصيل المطلوبة');
                            return;
                        }
                        
                        const result = this.data.addWithdrawalRequest(amount, selectedWithdrawMethod, details, this.state.user);
                        
                        if (result.success) {
                            this.toast.success(`✅ تم تقديم طلب السحب بنجاح
                                • المبلغ: ${amount}
                                • الطريقة: ${result.request.method}
                                • رقم الطلب: ${result.request.id}`);
                            
                            document.getElementById('withdrawAmount').value = '';
                            document.getElementById('withdrawDetails').value = '';
                            withdrawMethods.forEach(m => m.classList.remove('selected'));
                            selectedWithdrawMethod = null;
                            this.updateBalanceDisplay();
                        } else {
                            this.toast.error(result.message);
                        }
                    });

                    document.getElementById('transferBtn')?.addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('transferAmount').value);
                        const targetId = document.getElementById('transferUserId').value.trim();
                        
                        if (!ValidationUtils.isValidAmount(amount)) {
                            this.toast.error('أدخل مبلغ صحيح');
                            return;
                        }
                        if (!ValidationUtils.isValidUserId(targetId)) {
                            this.toast.error('أدخل معرف مستخدم صحيح');
                            return;
                        }
                        if (amount > this.state.balance) {
                            this.toast.error('الرصيد غير كافٍ');
                            return;
                        }
                        
                        this.state.balance -= amount;
                        this.data.addTransaction('transfer', -amount, `تحويل إلى المستخدم ${targetId}`);
                        this.data.saveWallet();
                        
                        this.toast.success('✅ تم التحويل بنجاح');
                        document.getElementById('transferAmount').value = '';
                        document.getElementById('transferUserId').value = '';
                        this.updateBalanceDisplay();
                        this.openWalletModal();
                    });
                }

                // ========== لوحة المشرف المتطورة ==========

                                <div class="text-xs text-gray-400">التفاصيل: ${req.details || 'غير محدد'}</div>

                                    <button class="btn-accept accept-request" data-id="${req.id}" data-type="withdrawal">قبول</button>

                    const verificationsHtml = pendingVerifications.length === 0 
                        ? '<p class="text-gray-400 text-center py-4">لا توجد طلبات تحقق معلقة</p>'
                        : pendingVerifications.map(v => `
                            <div class="request-item" data-user-id="${v.userId}" data-task-id="${v.taskId}">
                                <div class="request-header">
                                    <span class="font-black">المستخدم: ${v.userId}</span>
                                    <span class="badge-pending">في انتظار التحقق</span>
                                </div>
                                <div class="text-sm mb-1">المهمة: <span class="text-purple-400 font-black">${v.taskTitle}</span></div>
                                <div class="text-xs text-gray-400">المكافأة: ${v.taskDetails.reward}</div>
                                <div class="text-xs text-gray-400 mt-2">بيانات التحقق:</div>
                                <div class="text-xs bg-slate-800/50 p-3 rounded-xl mt-1 border border-white/5">${v.verificationData}</div>
                                <div class="text-xs text-gray-400 mt-2">التاريخ: ${DateUtils.getTimeAgo(v.submittedAt)}</div>
                                <div class="request-actions">
                                    <button class="btn-accept accept-task" data-user-id="${v.userId}" data-task-id="${v.taskId}">قبول</button>
                                    <button class="btn-reject reject-task" data-user-id="${v.userId}" data-task-id="${v.taskId}">رفض</button>
                                </div>
                            </div>
                        `).join('');

                    const paymentMethodsHtml = this.state.paymentMethods.map(m => `

                                <div class="payment-icon">
                                    <i class="${m.icon}"></i>
                                </div>

                            <div class="actions">
                                <button class="edit-payment-method" data-id="${m.id}" title="تعديل"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button class="delete-payment-method" data-id="${m.id}" title="حذف"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                    `).join('');

                    const adsHtml = this.state.ads.map(ad => `
                        <div class="payment-method-admin">
                            <div class="flex items-center gap-4">
                                <div class="payment-icon">
                                    <i class="${ad.image}"></i>
                                </div>
                                <div>
                                    <div class="font-black">${ad.title}</div>
                                    <div class="text-xs text-gray-400">مكافأة: ${ad.reward} | مشاهدات: ${ad.views || 0} | ${ad.active ? 'نشط' : 'غير نشط'}</div>

                            </div>
                            <div class="actions">
                                <button class="edit-ad" data-id="${ad.id}" title="تعديل"><i class="fa-solid fa-pen-to-square"></i></button>

                    const tasksHtml = this.state.tasks.map(task => `

                                <div>
                                    <div class="font-black">${task.title}</div>
                                    <div class="text-xs text-gray-400">مكافأة: ${task.reward} | مكتملة: ${task.completedCount || 0} | ${task.active ? 'نشط' : 'غير نشط'}</div>

                            <div class="actions">

                                <button class="delete-task" data-id="${task.id}" title="حذف"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                    `).join('');

                    return `
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-black">لوحة الإدارة</h2>
                            <button id="closeAdminPanel" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="wallet-tabs mb-4 flex-wrap">
                            <button class="wallet-tab active" data-admin-tab="requests">الطلبات</button>
                            <button class="wallet-tab" data-admin-tab="verifications">طلبات التحقق</button>
                            <button class="wallet-tab" data-admin-tab="payment-methods">طرق الدفع</button>
                            <button class="wallet-tab" data-admin-tab="ads">الإعلانات</button>
                            <button class="wallet-tab" data-admin-tab="tasks">المهام</button>
                        </div>

                        <div id="adminRequestsTab" class="admin-tab-content">
                            <div class="space-y-6">
                                <div>
                                    <h3 class="text-lg font-black mb-3 flex items-center gap-2">
                                        <i class="fa-solid fa-arrow-down text-green-400"></i>
                                        طلبات الشحن المعلقة
                                        <span class="bg-blue-600 text-white text-xs px-2 py-1 rounded-full">${pendingDeposits.length}</span>
                                    </h3>
                                    <div class="admin-requests-panel">${depositsHtml}</div>
                                </div>
                                <div>
                                    <h3 class="text-lg font-black mb-3 flex items-center gap-2">
                                        <i class="fa-solid fa-arrow-up text-red-400"></i>
                                        طلبات السحب المعلقة
                                        <span class="bg-blue-600 text-white text-xs px-2 py-1 rounded-full">${pendingWithdrawals.length}</span>
                                    </h3>
                                    <div class="admin-requests-panel">${withdrawalsHtml}</div>
                                </div>
                            </div>
                        </div>

                        <div id="adminVerificationsTab" class="admin-tab-content hidden">
                            <h3 class="text-lg font-black mb-3 flex items-center gap-2">
                                <i class="fa-solid fa-check-circle text-purple-400"></i>
                                طلبات تحقق المهام
                                <span class="bg-blue-600 text-white text-xs px-2 py-1 rounded-full">${pendingVerifications.length}</span>
                            </h3>
                            <div class="admin-requests-panel">${verificationsHtml}</div>
                        </div>

                        <div id="adminPaymentMethodsTab" class="admin-tab-content hidden">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="text-lg font-black">طرق الدفع المتاحة</h3>
                                <button id="addPaymentMethodBtn" class="btn-primary text-sm py-2 px-4"><i class="fa-solid fa-plus ml-1"></i> إضافة</button>
                            </div>
                            <div class="space-y-2 max-h-96 overflow-y-auto">
                                ${paymentMethodsHtml}
                            </div>
                        </div>

                        <div id="adminAdsTab" class="admin-tab-content hidden">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="text-lg font-black">الإعلانات</h3>
                                <button id="addAdBtn" class="btn-primary text-sm py-2 px-4"><i class="fa-solid fa-plus ml-1"></i> إضافة إعلان</button>
                            </div>
                            <div class="space-y-2 max-h-96 overflow-y-auto">
                                ${adsHtml}
                            </div>
                        </div>

                        <div id="adminTasksTab" class="admin-tab-content hidden">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="text-lg font-black">المهام</h3>
                                <button id="addTaskBtn" class="btn-primary text-sm py-2 px-4"><i class="fa-solid fa-plus ml-1"></i> إضافة مهمة</button>
                            </div>
                            <div class="space-y-2 max-h-96 overflow-y-auto">
                                ${tasksHtml}
                            </div>
                        </div>
