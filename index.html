                            <div class="flex gap-3 pt-4">
                                <button type="submit" class="btn btn-primary flex-1">حفظ</button>
                                <button type="button" id="cancelBtn" class="btn btn-outline flex-1">إلغاء</button>
                            </div>
                        </form>
                    `;

                    this.modal.classList.add('open');
                    this.bindCategoryFormEvents();
                }

                openProductModal(id = null) {
                    const product = id ? this.app.store.getProduct(id) : null;
                    const categories = this.app.store.getCategories();
                    
                    this.modalContent.innerHTML = `
                        <div class="modal-header">
                            <h2 class="modal-title">${product ? 'تعديل' : 'إضافة'} منتج</h2>
                            <button class="modal-close" id="closeModalBtn">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <form id="productForm" class="space-y-4 max-h-[70vh] overflow-y-auto custom-scroll p-2">
                            <input type="hidden" id="productId" value="${product?.id || ''}">

                            <div>
                                <label class="input-label">الصورة الرئيسية</label>
                                <div class="upload-area" id="productImageUpload">
                                    <i class="fa-solid fa-cloud-upload-alt text-3xl text-blue-400 mb-2"></i>
                                    <p class="text-sm">اضغط لرفع الصورة الرئيسية</p>
                                    <input type="file" id="productImageFile" accept="image/*" class="hidden">
                                </div>
                                <div id="productImagePreview" class="mt-3 ${product?.imageId ? '' : 'hidden'}">
                                    <img src="${product?.imageId ? this.app.images.getUrl(product.imageId) : ''}" 
                                         class="image-preview mx-auto" id="productPreviewImg">
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="input-label">الاسم</label>
                                    <input type="text" id="productName" value="${product?.name || ''}" 
                                           class="input-field" required>
                                </div>
                                <div>
                                    <label class="input-label">السعر</label>
                                    <input type="number" id="productPrice" value="${product?.price || ''}" 
                                           class="input-field" required>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="input-label">السعر القديم</label>
                                    <input type="number" id="productOldPrice" value="${product?.oldPrice || ''}" 
                                           class="input-field">
                                </div>
                                <div>
                                    <label class="input-label">المخزون</label>
                                    <input type="number" id="productStock" value="${product?.stock ?? -1}" 
                                           class="input-field">
                                </div>
                            </div>

                            <div>
                                <label class="input-label">التصنيف</label>
                                <select id="productCategoryId" class="input-field">
                                    <option value="">اختر تصنيف</option>
                                    ${categories.map(cat => `
                                        <option value="${cat.id}" ${product?.categoryId === cat.id ? 'selected' : ''}>
                                            ${cat.name}
                                        </option>
                                    `).join('')}
                                </select>
                            </div>

                            <div>
                                <label class="input-label">الوصف القصير</label>
                                <input type="text" id="productDescription" value="${product?.description || ''}" 
                                       class="input-field">
                            </div>

                            <div>
                                <label class="input-label">الوصف الطويل</label>
                                <textarea id="productLongDescription" class="input-field" rows="3">${product?.longDescription || ''}</textarea>
                            </div>

                            <div>
                                <label class="input-label">المواصفات (JSON)</label>
                                <textarea id="productSpecifications" class="input-field" rows="3">${JSON.stringify(product?.specifications || {}, null, 2)}</textarea>
                            </div>

                            <div>
                                <label class="input-label">حقول الإدخال (JSON)</label>
                                <textarea id="productFields" class="input-field" rows="3">${JSON.stringify(product?.fields || [], null, 2)}</textarea>
                            </div>

                            <div>
                                <label class="input-label">بيانات التسليم (JSON)</label>
                                <textarea id="productFulfillment" class="input-field" rows="3">${JSON.stringify(product?.fulfillment || { type: 'manual' }, null, 2)}</textarea>
                            </div>

                            <div class="flex items-center gap-3">
                                <input type="checkbox" id="productFeatured" ${product?.featured ? 'checked' : ''}>
                                <label class="input-label mb-0">منتج مميز</label>
                            </div>

                            <div class="flex gap-3 pt-4">
                                <button type="submit" class="btn btn-primary flex-1">حفظ</button>
                                <button type="button" id="cancelBtn" class="btn btn-outline flex-1">إلغاء</button>
                            </div>
                        </form>
                    `;

                    this.modal.classList.add('open');
                    this.bindProductFormEvents();
                }

                bindCategoryFormEvents() {
                    document.getElementById('closeModalBtn').addEventListener('click', () => {
                        this.modal.classList.remove('open');
                    });
                    
                    document.getElementById('cancelBtn').addEventListener('click', () => {
                        this.modal.classList.remove('open');
                    });
                    
                    // رفع الصورة
                    const uploadArea = document.getElementById('categoryImageUpload');
                    const fileInput = document.getElementById('categoryImageFile');
                    
                    uploadArea.addEventListener('click', () => fileInput.click());
                    
                    fileInput.addEventListener('change', async (e) => {
                        const file = e.target.files[0];
                        if (file) {
                            try {
                                const imageId = await this.app.images.upload(file);
                                document.getElementById('categoryPreviewImg').src = this.app.images.getUrl(imageId);
                                document.getElementById('categoryImagePreview').classList.remove('hidden');
                                window.tempImageId = imageId;
                            } catch (error) {
                                this.app.toast.error(error.message);
                            }
                        }
                    });
                    
                    // حفظ التصنيف
                    document.getElementById('categoryForm').addEventListener('submit', async (e) => {
                        e.preventDefault();
                        
                        const formData = {
                            name: document.getElementById('categoryName').value,
                            icon: document.getElementById('categoryIcon').value,
                            description: document.getElementById('categoryDescription').value,
                            color: document.getElementById('categoryColor').value,
                            featured: document.getElementById('categoryFeatured').checked,
                            order: parseInt(document.getElementById('categoryOrder').value) || 0
                        };
                        
                        if (window.tempImageId) {
                            formData.imageId = window.tempImageId;
                        }
                        
                        const id = document.getElementById('categoryId').value;
                        
                        if (id) {
                            await this.app.updateCategory(id, formData);
                        } else {
                            await this.app.addCategory(formData);
                        }
                        
                        delete window.tempImageId;
                    });
                }

                bindProductFormEvents() {
                    document.getElementById('closeModalBtn').addEventListener('click', () => {
                        this.modal.classList.remove('open');
                    });
                    
                    document.getElementById('cancelBtn').addEventListener('click', () => {
                        this.modal.classList.remove('open');
                    });
                    
                    // رفع الصورة
                    const uploadArea = document.getElementById('productImageUpload');
                    const fileInput = document.getElementById('productImageFile');
                    
                    uploadArea.addEventListener('click', () => fileInput.click());
                    
                    fileInput.addEventListener('change', async (e) => {
                        const file = e.target.files[0];
                        if (file) {
                            try {
                                const imageId = await this.app.images.upload(file);
                                document.getElementById('productPreviewImg').src = this.app.images.getUrl(imageId);
                                document.getElementById('productImagePreview').classList.remove('hidden');
                                window.tempProductImage = imageId;
                            } catch (error) {
                                this.app.toast.error(error.message);
                            }
                        }
                    });
                    
                    // حفظ المنتج
                    document.getElementById('productForm').addEventListener('submit', async (e) => {
                        e.preventDefault();
                        
                        try {
                            const formData = {
                                name: document.getElementById('productName').value,
                                price: parseFloat(document.getElementById('productPrice').value),
                                oldPrice: parseFloat(document.getElementById('productOldPrice').value) || null,
                                categoryId: document.getElementById('productCategoryId').value,
                                description: document.getElementById('productDescription').value,
                                longDescription: document.getElementById('productLongDescription').value,
                                stock: parseInt(document.getElementById('productStock').value),
                                featured: document.getElementById('productFeatured').checked,
                                specifications: JSON.parse(document.getElementById('productSpecifications').value || '{}'),
                                fields: JSON.parse(document.getElementById('productFields').value || '[]'),
                                fulfillment: JSON.parse(document.getElementById('productFulfillment').value || '{"type":"manual"}')
                            };
                            
                            if (window.tempProductImage) {
                                formData.imageId = window.tempProductImage;
                            }
                            
                            const id = document.getElementById('productId').value;
                            
                            if (id) {
                                await this.app.updateProduct(id, formData);
                            } else {
                                await this.app.addProduct(formData);
                            }
                            
                            delete window.tempProductImage;
                        } catch (error) {
                            this.app.toast.error('خطأ في صيغة JSON');
                        }
                    });
                }

                filterProducts(searchTerm) {
                    const products = this.app.store.searchProducts(searchTerm);
                    const grid = document.getElementById('productsGrid');
                    
                    if (grid) {
                        grid.innerHTML = products.map(prod => this.renderProductCard(prod)).join('');
                        
                        // إعادة ربط الأحداث
                        document.querySelectorAll('.product-card').forEach(card => {
                            card.addEventListener('click', (e) => {
                                if (e.target.closest('.add-to-cart-btn')) return;
                                const prodId = card.dataset.prodId;
                                this.showProductDetails(prodId);
                            });
                        });
                        
                        document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
                            btn.addEventListener('click', (e) => {
                                e.stopPropagation();
                                const prodId = btn.dataset.prodId;
                                this.app.addToCart(prodId);
                            });
                        });
                    }
                }

                collectFields(fields) {
                    if (!fields) return {};
                    
                    const data = {};
                    fields.forEach(field => {
                        const input = document.getElementById(`field_${field.name}`);
                        if (input) data[field.name] = input.value;
                    });
                    
                    return data;
                }

                openNotifications() {
                    const userId = this.app.user.id;
                    const notifications = this.app.notifications.getForUser(userId, 50);
                    
                    this.modalContent.innerHTML = `
                        <div class="modal-header">
                            <h2 class="modal-title">🔔 الإشعارات</h2>
                            <button class="modal-close" id="closeModalBtn">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="space-y-2 max-h-[70vh] overflow-y-auto custom-scroll">
                            ${notifications.length === 0 ? `
                                <p class="text-gray-400 text-center py-8">لا توجد إشعارات</p>
                            ` : notifications.map(notif => `
                                <div class="glass-card p-4 rounded-xl ${notif.read ? 'opacity-50' : ''}">
                                    <div class="flex justify-between items-start">
                                        <div class="font-bold">${notif.title}</div>
                                        <span class="text-xs text-gray-400">${DateUtils.timeAgo(notif.createdAt)}</span>
                                    </div>
                                    <p class="text-sm text-gray-300 mt-1">${notif.message}</p>
                                </div>
                            `).join('')}
                        </div>

                        ${notifications.length > 0 ? `
                            <button id="markAllReadBtn" class="btn btn-outline w-full mt-4">
                                <i class="fa-regular fa-circle-check ml-2"></i>
                                تحديد الكل كمقروء
                            </button>
                        ` : ''}
                    `;

                    this.modal.classList.add('open');
                    
                    document.getElementById('closeModalBtn').addEventListener('click', () => {
                        this.modal.classList.remove('open');
                    });
                    
                    document.getElementById('markAllReadBtn')?.addEventListener('click', () => {
                        this.app.notifications.markAllAsRead(userId);
                        this.app.toast.success('تم تحديد الكل كمقروء');
                        this.modal.classList.remove('open');
                    });
                }

                updateBalance() {
                    const balanceEl = document.getElementById('balanceDisplay')?.querySelector('span');
                    if (balanceEl) {
                        balanceEl.textContent = this.app.wallet.getBalance().toLocaleString('ar-EG');
                    }
                }

                // ========== ربط الأحداث ==========
                bindEvents() {
                    // زر المحفظة
                    document.getElementById('walletBtn')?.addEventListener('click', () => {
                        this.openWallet();
                    });
                    
                    // زر السلة
                    document.getElementById('cartBtn')?.addEventListener('click', () => {
                        this.openCart();
                    });
                    
                    // زر المتجر
                    document.getElementById('openStoreBtn')?.addEventListener('click', () => {
                        this.openStore();
                    });
                    
                    // زر الشحن
                    document.getElementById('depositBtn')?.addEventListener('click', () => {
                        this.openDeposit();
                    });
                    
                    // زر السحب
                    document.getElementById('withdrawBtn')?.addEventListener('click', () => {
                        this.openWithdraw();
                    });
                    
                    // زر المعاملات
                    document.getElementById('transactionsBtn')?.addEventListener('click', () => {
                        this.openTransactions();
                    });
                    
                    // زر الإشعارات
                    document.getElementById('notificationBell')?.addEventListener('click', () => {
                        this.openNotifications();
                    });
                    
                    // أزرار التصنيفات السريعة
                    document.querySelectorAll('.quick-cat-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const catId = btn.dataset.cat;
                            this.openStore(catId);
                        });
                    });
                    
                    // زر لوحة الإدارة
                    document.getElementById('adminPanelBtn')?.addEventListener('click', () => {
                        this.openAdminPanel();
                    });
                    
                    // زر إدارة المتجر
                    document.getElementById('storeManagementBtn')?.addEventListener('click', () => {
                        this.openStoreManagement();
                    });
                    
                    // زر إدارة طرق الدفع
                    document.getElementById('managePaymentMethodsBtn')?.addEventListener('click', () => {
                        this.openPaymentMethodsManagement();
                    });
                    
                    // زر تسجيل الخروج
                    document.getElementById('logoutBtn')?.addEventListener('click', () => {
                        this.app.logout();
                    });
                }

                bindStoreEvents() {
                    document.getElementById('closeModalBtn').addEventListener('click', () => {
                        this.modal.classList.remove('open');
                    });
                    
                    // البحث
                    const searchInput = document.getElementById('searchInput');
                    if (searchInput) {
                        searchInput.addEventListener('input', (e) => {
                            this.filterProducts(e.target.value);
                        });
                    }
                    
                    // أزرار التصنيفات
                    document.querySelectorAll('.category-chip').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const catId = btn.dataset.cat;
                            this.openStore(catId);
                        });
                    });
                    
                    // أزرار المنتجات
                    document.querySelectorAll('.product-card').forEach(card => {
                        card.addEventListener('click', (e) => {
                            if (e.target.closest('.add-to-cart-btn')) return;
                            const prodId = card.dataset.prodId;
                            this.showProductDetails(prodId);
                        });
                    });
                    
                    // أزرار الإضافة للسلة
                    document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const prodId = btn.dataset.prodId;
                            this.app.addToCart(prodId);
                        });
                    });
                }

                bindProductEvents(product) {
                    document.getElementById('closeModalBtn').addEventListener('click', () => {
                        this.modal.classList.remove('open');
                    });
                    
                    document.getElementById('addToCartBtn').addEventListener('click', () => {
                        const fields = this.collectFields(product.fields);
                        this.app.addToCart(product.id, fields);
                    });
                    
                    document.getElementById('buyNowBtn').addEventListener('click', () => {
                        const fields = this.collectFields(product.fields);
                        this.app.buyNow(product.id, fields);
                    });
                }

                bindAdminPanelEvents() {
                    document.getElementById('closeModalBtn').addEventListener('click', () => {
                        this.modal.classList.remove('open');
                    });
                    
                    // تبديل التبويبات
                    document.querySelectorAll('.tab').forEach(tab => {
                        tab.addEventListener('click', () => {
                            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');
                            
                            const tabName = tab.dataset.tab;
                            document.querySelectorAll('.tab-content').forEach(content => {
                                content.classList.add('hidden');
                            });
                            document.getElementById(`${tabName}Tab`).classList.remove('hidden');
                        });
                    });
                    
                    // قبول طلبات الشحن
                    document.querySelectorAll('.approve-deposit').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            this.app.approveDeposit(id);
                        });
                    });
                    
                    // رفض طلبات الشحن
                    document.querySelectorAll('.reject-deposit').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            this.app.rejectDeposit(id);
                        });
                    });
                    
                    // قبول طلبات السحب
                    document.querySelectorAll('.approve-withdrawal').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            this.app.approveWithdrawal(id);
                        });
                    });
                    
                    // رفض طلبات السحب
                    document.querySelectorAll('.reject-withdrawal').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            this.app.rejectWithdrawal(id);
                        });
                    });
                    
                    // إعادة تعيين التطبيق
                    document.getElementById('resetAppBtn')?.addEventListener('click', () => {
                        if (confirm('هل أنت متأكد؟ سيتم حذف جميع البيانات')) {
                            this.app.resetApp();
                        }
                    });
                }

                bindStoreManagementEvents() {
                    document.getElementById('closeModalBtn').addEventListener('click', () => {
                        this.modal.classList.remove('open');
                    });
                    
                    // تبديل التبويبات
                    document.querySelectorAll('.tab').forEach(tab => {
                        tab.addEventListener('click', () => {
                            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');
                            
                            const tabName = tab.dataset.tab;
                            document.querySelectorAll('.tab-content').forEach(content => {
                                content.classList.add('hidden');
                            });
                            document.getElementById(`${tabName}Tab`).classList.remove('hidden');
                        });
                    });
                    
                    // إضافة تصنيف
                    document.getElementById('addCategoryBtn').addEventListener('click', () => {
                        this.openCategoryModal();
                    });
                    
                    // تعديل تصنيف
                    document.querySelectorAll('.edit-category').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            this.openCategoryModal(id);
                        });
                    });
                    
                    // حذف تصنيف
                    document.querySelectorAll('.delete-category').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            if (confirm('هل أنت متأكد من حذف هذا التصنيف؟')) {
                                this.app.deleteCategory(id);
                            }
                        });
                    });
                    
                    // إضافة منتج
                    document.getElementById('addProductBtn').addEventListener('click', () => {
                        this.openProductModal();
                    });
                    
                    // تعديل منتج
                    document.querySelectorAll('.edit-product').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            this.openProductModal(id);
                        });
                    });
                    
                    // حذف منتج
                    document.querySelectorAll('.delete-product').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            if (confirm('هل أنت متأكد من حذف هذا المنتج؟')) {
                                this.app.deleteProduct(id);
                            }
                        });
                    });
                    
                    // بحث في المنتجات
                    document.getElementById('productSearch')?.addEventListener('input', (e) => {
                        const term = e.target.value.toLowerCase();
                        const products = this.app.store.getProducts().filter(p => 
                            p.name.toLowerCase().includes(term) || 
                            p.description.toLowerCase().includes(term)
                        );
                        
                        const list = document.getElementById('productsList');
                        list.innerHTML = products.map(prod => `
                            <div class="admin-item">
                                <div>
                                    <div class="font-bold">${prod.name}</div>
                                    <div class="text-sm">${prod.price}</div>
                                </div>
                                <div class="actions">
                                    <button class="edit-product" data-id="${prod.id}" title="تعديل">
                                        <i class="fa-solid fa-pen-to-square"></i>
                                    </button>
                                    <button class="delete-product" data-id="${prod.id}" title="حذف">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        `).join('');
                        
                        // إعادة ربط الأحداث
                        this.bindStoreManagementEvents();
                    });
                }
            }

            // ======================== التطبيق الرئيسي المحسن ========================
            class TelegramStoreApp {
                constructor() {
                    // تهيئة الخدمات
                    this.telegram = new TelegramService();
                    this.toast = new ToastManager('toastContainer');
                    this.cache = new CacheService();
                    this.images = new ImageService();
                    
                    // تهيئة مديري البيانات
                    this.users = new UserService();
                    this.wallet = new WalletService();
                    this.paymentMethods = new PaymentMethodService();
                    this.depositRequests = new RequestService('deposit');
                    this.withdrawalRequests = new RequestService('withdrawal');
                    this.notifications = new NotificationService();
                    this.settings = new SettingsService();
                    this.stats = new StatsService();
                    this.store = new StoreService(this.images);
                    this.cart = new CartService();
                    
                    // واجهة المستخدم
                    this.ui = new UIManager(this);
                    
                    // حالة التطبيق
                    this.user = null;
                    this.isAdmin = false;
                    this.loading = true;
                    this.accessDenied = false;
                    this.telegramMissing = false;
                    
                    // ربط التطبيق بالكائن العام
                    window.app = this;
                    
                    // بدء التشغيل
                    this.init();
                }

                async init() {
                    // التحقق من بيئة تيليجرام
                    if (!this.telegram.isAvailable) {
                        this.telegramMissing = true;
                        this.loading = false;
                        this.ui.render();
                        return;
                    }

                    this.telegram.init();

                    if (!this.telegram.isValid() || !this.telegram.getUser()) {
                        this.accessDenied = true;
                        this.loading = false;
                        this.ui.render();
                        return;
                    }

                    // الحصول على بيانات المستخدم
                    this.user = this.telegram.getUser();
                    this.isAdmin = (this.user.id === CONFIG.ADMIN_ID);
                    
                    // تسجيل المستخدم
                    this.users.register(this.user);
                    
                    // تحديث الإحصائيات
                    this.stats.set('users', this.users.getCount());
                    this.stats.set('products', this.store.getProducts().length);
                    
                    // تطبيق السمة المحفوظة
                    this.applyTheme(this.settings.get('theme'));
                    
                    // إنهاء التحميل
                    this.loading = false;
                    this.ui.render();
                    
                    // ترحيب
                    this.toast.success(`مرحباً ${this.user.first_name} 👋`);
                    
                    // تكوين زر تيليجرام الرئيسي
                    this.setupMainButton();
                }

                setupMainButton() {
                    if (this.isAdmin) {
                        this.telegram.setMainButton('لوحة التحكم', {
                            color: '#f59e0b',
                            isVisible: true,
                            callback: () => {
                                this.ui.openAdminPanel();
                            }
                        });
                    } else {
                        this.telegram.setMainButton('المتجر', {
                            color: '#3b82f6',
                            isVisible: true,
                            callback: () => {
                                this.ui.openStore();
                            }
                        });
                    }
                }

                applyTheme(theme) {
                    const root = document.documentElement;
                    const themeIcon = document.getElementById('themeIcon');
                    
                    if (theme === 'light') {
                        root.style.setProperty('--tg-theme-bg-color', '#f8fafc');
                        root.style.setProperty('--tg-theme-text-color', '#0f172a');
                        themeIcon?.classList.remove('fa-moon');
                        themeIcon?.classList.add('fa-sun');
                    } else {
                        root.style.setProperty('--tg-theme-bg-color', '#0f172a');
                        root.style.setProperty('--tg-theme-text-color', '#ffffff');
                        themeIcon?.classList.remove('fa-sun');
                        themeIcon?.classList.add('fa-moon');
                    }
                }

                // ========== إجراءات المتجر ==========
                addToCart(productId, fields = {}) {
                    const product = this.store.getProduct(productId);
                    if (!product) return;
                    
                    this.cart.add(product, fields);
                    
                    this.toast.success(`تمت إضافة ${product.name} إلى السلة`);
                    this.telegram.hapticFeedback('notification', 'success');
                    
                    // تحديث عداد السلة في الواجهة
                    this.ui.render();
                }

                removeFromCart(cartId) {
                    this.cart.remove(cartId);
                    this.toast.success('تمت إزالة المنتج من السلة');
                }

                clearCart() {
                    this.cart.clear();
                    this.toast.success('تم تفريغ السلة');
                }

                async buyNow(productId, fields = {}) {
                    const product = this.store.getProduct(productId);
                    if (!product) return;
                    
                    const balance = this.wallet.getBalance();
                    
                    if (balance < product.price) {
                        this.toast.error('الرصيد غير كافٍ');
                        this.telegram.hapticFeedback('notification', 'error');
                        return;
                    }
                    
                    // خصم الرصيد
                    this.wallet.subtractBalance(product.price, `شراء ${product.name}`);
                    
                    // إنشاء الطلب
                    const order = this.store.createOrder(product, fields, this.user.id, {
                        name: `${this.user.first_name} ${this.user.last_name || ''}`.trim()
                    }, null);
                    
                    // تحديث إحصائيات المستخدم
                    this.users.updateStats(this.user.id, 'order', product.price);
                    
                    // تحديث إحصائيات المتجر
                    this.stats.increment('orders');
                    this.stats.increment('revenue', product.price);
                    
                    // إشعار
                    this.notifications.add(
                        this.user.id,
                        '✅ تم الشراء بنجاح',
                        `تم شراء ${product.name} بقيمة ${product.price}`,
                        'success',
                        { orderId: order.id }
                    );
                    
                    // تأثير
                    this.toast.success('تمت عملية الشراء بنجاح!');
                    this.telegram.hapticFeedback('notification', 'success');
                    
                    // تحديث واجهة المستخدم
                    this.ui.updateBalance();
                    this.ui.modal.classList.remove('open');
                }

                async checkout(paymentMethod) {
                    const cartItems = this.cart.getAll();
                    const total = this.cart.getTotal();
                    
                    if (cartItems.length === 0) {
                        this.toast.error('السلة فارغة');
                        return;
                    }
                    
                    // التحقق من الرصيد إذا كانت طريقة الدفع هي المحفظة
                    if (paymentMethod.type === 'wallet') {
                        const balance = this.wallet.getBalance();
                        if (balance < total) {
                            this.toast.error('الرصيد غير كافٍ');
                            return;
                        }
                        
                        // خصم الرصيد
                        this.wallet.subtractBalance(total, 'شراء منتجات من السلة');
                    } else {
                        // إنشاء طلب شحن للطرق الأخرى
                        this.createDeposit(total, paymentMethod, {
                            type: 'checkout',
                            items: cartItems.map(item => ({
                                productId: item.productId,
                                name: item.name,
                                price: item.price,
                                fields: item.fields
                            }))
                        });
                        
                        this.toast.info('سيتم إكمال الطلب بعد تأكيد الدفع');
                        this.ui.modal.classList.remove('open');
                        return;
                    }
                    
                    // إنشاء الطلبات
                    const orders = [];
                    cartItems.forEach(item => {
                        const product = this.store.getProduct(item.productId);
                        if (product) {
                            const order = this.store.createOrder(
                                product, 
                                item.fields, 
                                this.user.id,
                                { name: `${this.user.first_name} ${this.user.last_name || ''}`.trim() },
                                paymentMethod
                            );
                            orders.push(order);
                        }
                    });
                    
                    // تحديث الإحصائيات
                    this.stats.increment('orders', orders.length);
                    this.stats.increment('revenue', total);
                    
                    // تفريغ السلة
                    this.cart.clear();
                    
                    // إشعار
                    this.notifications.add(
                        this.user.id,
                        '✅ تم الشراء بنجاح',
                        `تم شراء ${orders.length} منتج بقيمة ${total}`,
                        'success',
                        { orders: orders.map(o => o.id) }
                    );
                    
                    this.toast.success('تمت عملية الشراء بنجاح!');
                    this.telegram.hapticFeedback('notification', 'success');
                    
                    this.ui.updateBalance();
                    this.ui.modal.classList.remove('open');
                }

                // ========== إجراءات المحفظة ==========
                createDeposit(amount, method, metadata = {}) {
                    if (amount <= 0) {
                        this.toast.error('المبلغ غير صحيح');
                        return;
                    }
                    
                    const request = this.depositRequests.add({
                        userId: this.user.id,
                        userName: `${this.user.first_name} ${this.user.last_name || ''}`.trim(),
                        amount,
                        method: method.name,
                        methodId: method.id,
                        status: 'pending',
                        metadata
                    });
                    
                    this.notifications.add(
                        CONFIG.ADMIN_ID,
                        '💰 طلب شحن جديد',
                        `مبلغ: ${amount} - الطريقة: ${method.name}`,
                        'info',
                        { requestId: request.id }
                    );
                    
                    this.toast.success('تم إرسال طلب الشحن بنجاح');
                    this.telegram.hapticFeedback('notification', 'success');
                    
                    // عرض تفاصيل الدفع
                    this.ui.modalContent.innerHTML = `
                        <div class="modal-header">
                            <h2 class="modal-title">💰 طلب الشحن</h2>
                            <button class="modal-close" id="closeModalBtn">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="invoice text-center mb-4">
                            <i class="fa-solid fa-circle-check text-4xl mb-2"></i>
                            <h3 class="font-bold text-xl">تم إرسال طلبك</h3>
                            <p class="text-sm opacity-90">رقم الطلب: ${request.id}</p>
                        </div>

                        <div class="glass-card p-4 rounded-xl mb-4">
                            <h3 class="font-bold mb-2">طريقة الدفع: ${method.name}</h3>
                            <p class="text-sm text-gray-300 mb-2">${method.instructions}</p>
                            
                            ${method.details ? `
                                <div class="mt-3 space-y-2">
                                    ${Object.entries(method.details).map(([key, value]) => `
                                        <div class="flex justify-between">
                                            <span class="text-gray-400">${key}:</span>
                                            <span class="font-mono text-sm">${value}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            ` : ''}
                        </div>

                        <div class="glass-card p-4 rounded-xl mb-4">
                            <div class="flex justify-between mb-2">
                                <span>المبلغ:</span>
                                <span class="font-bold">${amount}</span>
                            </div>
                            <div class="flex justify-between">
                                <span>الحالة:</span>
                                <span class="badge badge-warning">قيد الانتظار</span>
                            </div>
                        </div>

                        <p class="text-xs text-gray-400 text-center">
                            سيتم إشعارك عند قبول الطلب
                        </p>
                    `;

                    this.ui.modal.classList.add('open');
                    
                    document.getElementById('closeModalBtn').addEventListener('click', () => {
                        this.ui.modal.classList.remove('open');
                    });
                }

                createWithdrawal(amount, address) {
                    if (amount < 10) {
                        this.toast.error('الحد الأدنى للسحب 10');
                        return;
                    }
                    
                    const balance = this.wallet.getBalance();
                    if (amount > balance) {
                        this.toast.error('الرصيد غير كافٍ');
                        return;
                    }
                    
                    const request = this.withdrawalRequests.add({
                        userId: this.user.id,
                        userName: `${this.user.first_name} ${this.user.last_name || ''}`.trim(),
                        amount,
                        address,
                        status: 'pending'
                    });
                    
                    this.notifications.add(
                        CONFIG.ADMIN_ID,
                        '💸 طلب سحب جديد',
                        `مبلغ: ${amount} - العنوان: ${address}`,
                        'info',
                        { requestId: request.id }
                    );
                    
                    this.toast.success('تم إرسال طلب السحب بنجاح');
                    this.telegram.hapticFeedback('notification', 'success');
                    
                    this.ui.modal.classList.remove('open');
                }

                // ========== إجراءات المدير ==========
                async approveDeposit(requestId) {
                    const request = this.depositRequests.get(requestId);
                    if (!request) return;
                    
                    this.depositRequests.approve(requestId);
                    
                    // إضافة الرصيد
                    this.wallet.addBalance(request.amount, `شحن عبر ${request.method}`, { requestId });
                    
                    // إشعار للمستخدم
                    this.notifications.add(
                        request.userId,
                        '✅ تم قبول طلب الشحن',
                        `تم إضافة ${request.amount} إلى رصيدك`,
                        'success'
                    );
                    
                    this.toast.success('تم قبول طلب الشحن');
                    this.ui.openAdminPanel();
                }

                async rejectDeposit(requestId) {
                    const request = this.depositRequests.get(requestId);
                    if (!request) return;
                    
                    this.depositRequests.reject(requestId, 'تم رفض الطلب من قبل الإدارة');
                    
                    this.notifications.add(
                        request.userId,
                        '❌ تم رفض طلب الشحن',
                        'نأسف، تم رفض طلب الشحن الخاص بك',
                        'error'
                    );
                    
                    this.toast.success('تم رفض طلب الشحن');
                    this.ui.openAdminPanel();
                }

                async approveWithdrawal(requestId) {
                    const request = this.withdrawalRequests.get(requestId);
                    if (!request) return;
                    
                    // التحقق من الرصيد
                    if (this.wallet.getBalance() < request.amount) {
                        this.toast.error('الرصيد غير كافٍ');
                        return;
                    }
                    
                    this.withdrawalRequests.approve(requestId);
                    
                    // خصم الرصيد
                    this.wallet.subtractBalance(request.amount, `سحب إلى ${request.address}`, { requestId });
                    
                    this.notifications.add(
                        request.userId,
                        '✅ تم قبول طلب السحب',
                        `تم خصم ${request.amount} من رصيدك وسيتم تحويلها قريباً`,
                        'success'
                    );
                    
                    this.toast.success('تم قبول طلب السحب');
                    this.ui.openAdminPanel();
                }

                async rejectWithdrawal(requestId) {
                    const request = this.withdrawalRequests.get(requestId);
                    if (!request) return;
                    
                    this.withdrawalRequests.reject(requestId, 'تم رفض الطلب من قبل الإدارة');
                    
                    this.notifications.add(
                        request.userId,
                        '❌ تم رفض طلب السحب',
                        'نأسف، تم رفض طلب السحب الخاص بك',
                        'error'
                    );
                    
                    this.toast.success('تم رفض طلب السحب');
                    this.ui.openAdminPanel();
                }

                // ========== إدارة طرق الدفع ==========
                addPaymentMethod(data) {
                    this.paymentMethods.add(data);
                    this.toast.success('تم إضافة طريقة الدفع بنجاح');
                    this.ui.openPaymentMethodsManagement();
                    this.telegram.hapticFeedback('notification', 'success');
                }

                updatePaymentMethod(id, data) {
                    this.paymentMethods.update(id, data);
                    this.toast.success('تم تحديث طريقة الدفع بنجاح');
                    this.ui.openPaymentMethodsManagement();
                    this.telegram.hapticFeedback('notification', 'success');
                }

                togglePaymentMethod(id) {
                    const enabled = this.paymentMethods.toggle(id);
                    this.toast.success(`تم ${enabled ? 'تفعيل' : 'تعطيل'} طريقة الدفع`);
                    this.ui.openPaymentMethodsManagement();
                    this.telegram.hapticFeedback('notification', 'success');
                }

                // ========== إدارة المتجر ==========
                async addCategory(data) {
                    this.store.addCategory(data);
                    this.toast.success('تم إضافة التصنيف بنجاح');
                    this.ui.openStoreManagement();
                    this.telegram.hapticFeedback('notification', 'success');
                }

                async updateCategory(id, data) {
                    this.store.updateCategory(id, data);
                    this.toast.success('تم تحديث التصنيف بنجاح');
                    this.ui.openStoreManagement();
                    this.telegram.hapticFeedback('notification', 'success');
                }

                async deleteCategory(id) {
                    this.store.deleteCategory(id);
                    this.toast.success('تم حذف التصنيف بنجاح');
                    this.ui.openStoreManagement();
                    this.telegram.hapticFeedback('notification', 'success');
                }

                async addProduct(data) {
                    this.store.addProduct(data);
                    this.stats.set('products', this.store.getProducts().length);
                    this.toast.success('تم إضافة المنتج بنجاح');
                    this.ui.openStoreManagement();
                    this.telegram.hapticFeedback('notification', 'success');
                }

                async updateProduct(id, data) {
                    this.store.updateProduct(id, data);
                    this.toast.success('تم تحديث المنتج بنجاح');
                    this.ui.openStoreManagement();
                    this.telegram.hapticFeedback('notification', 'success');
                }

                async deleteProduct(id) {
                    this.store.deleteProduct(id);
                    this.stats.set('products', this.store.getProducts().length);
                    this.toast.success('تم حذف المنتج بنجاح');
                    this.ui.openStoreManagement();
                    this.telegram.hapticFeedback('notification', 'success');
                }

                async completeOrder(orderId) {
                    this.store.completeOrder(orderId);
                    this.toast.success('تم إكمال الطلب بنجاح');
                    this.telegram.hapticFeedback('notification', 'success');
                    
                    // إشعار للمستخدم
                    const order = this.store.getOrder(orderId);
                    if (order) {
                        this.notifications.add(
                            order.userId,
                            '✅ طلبك جاهز',
                            `طلبك "${order.productName}" أصبح جاهزاً`,
                            'success'
                        );
                    }
                    
                    this.ui.openStoreManagement();
                }

                // ========== إجراءات عامة ==========
                logout() {
                    this.telegram.close();
                }

                resetApp() {
                    // حذف جميع البيانات
                    StorageService.clear();
                    
                    // إعادة تهيئة الخدمات
                    this.wallet = new WalletService();
                    this.paymentMethods = new PaymentMethodService();
                    this.store = new StoreService(this.images);
                    this.cart = new CartService();
                    this.depositRequests = new RequestService('deposit');
                    this.withdrawalRequests = new RequestService('withdrawal');
                    
                    this.toast.success('تم إعادة تعيين التطبيق');
                    this.telegram.hapticFeedback('notification', 'success');
                    
                    // إعادة التحميل
                    setTimeout(() => {
                        window.location.reload();
                    }, 1000);
                }
            }

            // ======================== بدء التطبيق ========================
            const app = new TelegramStoreApp();

            // ======================== أحداث عامة ========================
            document.getElementById('themeToggle').addEventListener('click', () => {
                const newTheme = app.settings.get('theme') === 'dark' ? 'light' : 'dark';
                app.settings.set('theme', newTheme);
                app.applyTheme(newTheme);
                app.toast.info(`تم تغيير السمة إلى ${newTheme === 'dark' ? 'الداكنة' : 'الفاتحة'}`);
            });

            // الإعدادات
            const settingsOverlay = document.getElementById('settingsOverlay');
            const settingsPanel = document.getElementById('settingsPanel');
            
            document.getElementById('closeSettings').addEventListener('click', () => {
                settingsOverlay.classList.remove('open');
                settingsPanel.classList.remove('open');
            });

            settingsOverlay.addEventListener('click', () => {
                settingsOverlay.classList.remove('open');
                settingsPanel.classList.remove('open');
            });

            // فتح الإعدادات عند النقر على زر السمة مع shift
            document.addEventListener('keydown', (e) => {
                if (e.shiftKey && e.key === 'S') {
                    settingsOverlay.classList.add('open');
                    settingsPanel.classList.add('open');
                }
            });

            // حفظ إعدادات الصوت والاهتزاز
            document.getElementById('soundToggle')?.addEventListener('change', (e) => {
                app.settings.set('sound', e.target.checked);
                app.toast.soundEnabled = e.target.checked;
            });

            document.getElementById('vibrateToggle')?.addEventListener('change', (e) => {
                app.settings.set('vibrate', e.target.checked);
                app.toast.vibrateEnabled = e.target.checked;
            });

            document.getElementById('languageSelect')?.addEventListener('change', (e) => {
                app.settings.set('language', e.target.value);
                app.toast.info(`تم تغيير اللغة إلى ${e.target.value === 'ar' ? 'العربية' : 'الإنجليزية'}`);
            });

            document.getElementById('clearCacheBtn')?.addEventListener('click', () => {
                app.cache.clear();
                app.toast.success('تم مسح الذاكرة المؤقتة');
            });
        })();
    </script>
</body>
</html>
