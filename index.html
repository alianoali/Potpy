<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة تيليجرام المتطورة - محفظة احترافية</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts (Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--tg-theme-bg-color, #0f172a);
            color: var(--tg-theme-text-color, #ffffff);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* الخلفية المتحركة */
        .ambient-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }
        
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 10s infinite ease-in-out;
        }
        
        .orb-1 { top: -10%; right: -10%; width: 300px; height: 300px; background: #3b82f6; animation-delay: 0s; }
        .orb-2 { bottom: -10%; left: -10%; width: 250px; height: 250px; background: #8b5cf6; animation-delay: 5s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, 40px); }
        }

        /* Glassmorphism */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(40, 51, 69, 0.8);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Animations */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-enter {
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Loader */
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--tg-theme-button-color, #3b82f6);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Avatar */
        .default-avatar {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            font-weight: bold;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 90%;
            max-width: 350px;
            pointer-events: none;
        }

        .toast {
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 12px 20px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: toastSlideUp 0.3s ease, toastFadeOut 0.3s ease 2.7s forwards;
            pointer-events: auto;
            direction: rtl;
        }

        .toast.success { border-right: 4px solid #10b981; }
        .toast.error { border-right: 4px solid #ef4444; }
        .toast.warning { border-right: 4px solid #f59e0b; }
        .toast.info { border-right: 4px solid #3b82f6; }

        .toast-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .toast.success .toast-icon { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .toast.error .toast-icon { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .toast.warning .toast-icon { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .toast.info .toast-icon { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }

        .toast-message {
            flex: 1;
        }

        @keyframes toastSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastFadeOut {
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* Theme toggle */
        .theme-toggle {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: rgba(40, 51, 69, 0.8);
        }

        /* Settings panel */
        .settings-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 1000;
            border-radius: 30px 30px 0 0;
        }

        .settings-panel.open {
            transform: translateY(0);
        }

        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .settings-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        /* Wallet Modal */
        .wallet-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .wallet-modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .wallet-modal {
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .wallet-modal-overlay.open .wallet-modal {
            transform: scale(1);
        }

        .wallet-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 12px;
            flex-wrap: wrap;
        }

        .wallet-tab {
            flex: 1;
            min-width: 70px;
            padding: 8px 5px;
            text-align: center;
            border-radius: 12px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.5);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
        }

        .wallet-tab.active {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .wallet-tab i {
            margin-left: 6px;
            font-size: 14px;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .transaction-amount.positive { color: #10b981; }
        .transaction-amount.negative { color: #ef4444; }

        /* أيقونة المحفظة الكبيرة */
        .wallet-icon-large {
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, #3b82f6, #8b5cf6);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.5), 0 0 0 2px rgba(255,255,255,0.1) inset;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: floatWallet 3s infinite ease-in-out;
            position: relative;
            overflow: hidden;
        }

        .wallet-icon-large::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), transparent 70%);
            opacity: 0.6;
        }

        .wallet-icon-large i {
            font-size: 36px;
            color: white;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            animation: pulseIcon 2s infinite ease-in-out;
            position: relative;
            z-index: 2;
        }

        .wallet-icon-large:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.8), 0 0 0 4px rgba(255,255,255,0.2) inset;
        }

        @keyframes floatWallet {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        @keyframes pulseIcon {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* بطاقة الرصيد الصغيرة */
        .balance-badge {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 6px 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 12px;
        }

        .balance-badge i {
            color: #fbbf24;
        }

        /* طرق الدفع - صور وأيقونات */
        .payment-method {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
        }

        .payment-method:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .payment-method.selected {
            background: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
        }

        .payment-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: #334155;
            color: white;
            flex-shrink: 0;
        }
        
        .payment-icon img {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            object-fit: cover;
        }

        /* تفاصيل طريقة الدفع في المودال الجديد */
        .detail-payment-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #334155;
            margin-bottom: 10px;
        }
        .detail-payment-icon img {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            object-fit: cover;
        }

        /* لوحة المشرف */
        .admin-requests-panel {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 16px;
            margin-top: 16px;
        }

        .request-item {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .request-id {
            font-size: 10px;
            color: #94a3b8;
            font-family: monospace;
        }

        .request-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-accept {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-accept:hover {
            background: rgba(16, 185, 129, 0.3);
        }

        .btn-reject {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-reject:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .badge-pending {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 600;
        }

        /* أزرار تحرير طرق الدفع */
        .payment-method-admin {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .payment-method-admin .actions button {
            background: transparent;
            border: none;
            color: #94a3b8;
            margin: 0 4px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .payment-method-admin .actions button:hover {
            color: white;
        }
        .payment-method-admin .actions button.delete:hover { color: #ef4444; }
        .payment-method-admin .actions button.edit:hover { color: #3b82f6; }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="ambient-light">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Theme Toggle -->
    <div class="theme-toggle" id="themeToggle">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
        <span class="text-sm">السمة</span>
    </div>

    <!-- Main Container -->
    <div id="app" class="w-full max-w-md p-5 relative"></div>

    <!-- Settings Panel -->
    <div class="settings-overlay" id="settingsOverlay"></div>
    <div class="settings-panel" id="settingsPanel">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-bold">الإعدادات</h3>
            <button id="closeSettings" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
        <div class="space-y-4">
            <div class="flex items-center justify-between">
                <span>اللغة</span>
                <select class="bg-white/10 rounded-lg p-2" id="languageSelect">
                    <option value="ar">العربية</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div class="flex items-center justify-between">
                <span>الإشعارات</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" id="notificationsToggle">
                    <div class="w-11 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600"></div>
                </label>
            </div>
        </div>
    </div>

    <!-- Toast Container للتنبيهات المتطورة -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Wallet Modal -->
    <div class="wallet-modal-overlay" id="walletModalOverlay">
        <div class="wallet-modal" id="walletModalContent"></div>
    </div>

    <!-- Admin Panel Modal -->
    <div class="wallet-modal-overlay" id="adminPanelOverlay">
        <div class="wallet-modal" id="adminPanelContent" style="max-width: 500px;"></div>
    </div>

    <!-- Payment Method Modal (للإضافة/التعديل) -->
    <div class="wallet-modal-overlay" id="paymentMethodModalOverlay">
        <div class="wallet-modal" id="paymentMethodModalContent" style="max-width: 450px;"></div>
    </div>

    <!-- NEW: Payment Method Detail Modal (صفحة تفاصيل طريقة الدفع) -->
    <div class="wallet-modal-overlay" id="paymentMethodDetailOverlay">
        <div class="wallet-modal" id="paymentMethodDetailContent" style="max-width: 450px;"></div>
    </div>

    <script>
        (function() {
            // ======================== الإعدادات الثابتة ========================
            const CONFIG = {
                ADMIN_ID: 7609492965, // غير هذا إلى معرف المشرف الخاص بك
                DEFAULT_BALANCE: 1000,
                MAX_TRANSACTIONS: 50,
                STORAGE_KEYS: {
                    USERS: 'app_users',
                    BOTS: 'app_bots',
                    DAILY_OPS: 'daily_ops',
                    WALLET: 'wallet_data',
                    PAYMENT_METHODS: 'payment_methods',
                    DEPOSIT_REQUESTS: 'deposit_requests',
                    WITHDRAWAL_REQUESTS: 'withdrawal_requests',
                    THEME: 'theme',
                    SETTINGS: 'settings'
                }
            };

            // ======================== خدمات مساعدة ========================
            class StorageService {
                static get(key, defaultValue = null) {
                    try {
                        const value = localStorage.getItem(key);
                        return value !== null ? JSON.parse(value) : defaultValue;
                    } catch (e) {
                        console.warn(`Storage read error for key ${key}:`, e);
                        return defaultValue;
                    }
                }

                static set(key, value) {
                    try {
                        localStorage.setItem(key, JSON.stringify(value));
                        return true;
                    } catch (e) {
                        console.warn(`Storage write error for key ${key}:`, e);
                        return false;
                    }
                }

                static remove(key) {
                    try {
                        localStorage.removeItem(key);
                        return true;
                    } catch (e) {
                        console.warn(`Storage remove error for key ${key}:`, e);
                        return false;
                    }
                }
            }

            class DateUtils {
                static getTodayDate() {
                    return new Date().toISOString().split('T')[0];
                }

                static formatDateTime(isoString) {
                    return new Date(isoString).toLocaleString('ar-EG');
                }

                static formatDate(isoString) {
                    return new Date(isoString).toLocaleDateString('ar-EG');
                }
            }

            class IdGenerator {
                static generate(prefix = '') {
                    return prefix + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                }
            }

            // ======================== نظام التنبيهات المتطور ========================
            class ToastManager {
                constructor(containerId) {
                    this.container = document.getElementById(containerId);
                    if (!this.container) {
                        this.container = document.createElement('div');
                        this.container.id = containerId;
                        this.container.className = 'toast-container';
                        document.body.appendChild(this.container);
                    }
                    this.activeToasts = [];
                }

                show(message, type = 'info', duration = 3000) {
                    const toast = document.createElement('div');
                    toast.className = `toast ${type}`;
                    
                    const iconMap = {
                        success: 'fa-solid fa-check',
                        error: 'fa-solid fa-exclamation',
                        warning: 'fa-solid fa-triangle-exclamation',
                        info: 'fa-solid fa-info'
                    };
                    
                    toast.innerHTML = `
                        <div class="toast-icon"><i class="${iconMap[type] || iconMap.info}"></i></div>
                        <div class="toast-message">${message}</div>
                    `;
                    
                    this.container.appendChild(toast);
                    this.activeToasts.push(toast);
                    
                    setTimeout(() => {
                        toast.remove();
                        this.activeToasts = this.activeToasts.filter(t => t !== toast);
                    }, duration);
                }

                success(message) { this.show(message, 'success'); }
                error(message) { this.show(message, 'error'); }
                warning(message) { this.show(message, 'warning'); }
                info(message) { this.show(message, 'info'); }
            }

            // ======================== خدمة تيليجرام ========================
            class TelegramService {
                constructor() {
                    this.tg = window.Telegram?.WebApp || null;
                    this.isAvailable = !!this.tg;
                }

                init() {
                    if (!this.isAvailable) return false;
                    this.tg.expand();
                    this.tg.ready();
                    return true;
                }

                getUser() {
                    return this.tg?.initDataUnsafe?.user || null;
                }

                isValid() {
                    return this.isAvailable && this.tg?.initData;
                }

                close() {
                    this.tg?.close();
                }

                showPopup(params) {
                    this.tg?.showPopup(params);
                }

                setMainButton(text, color = '#3b82f6', textColor = '#ffffff', isVisible = true, callback = null) {
                    if (!this.tg) return;
                    const btn = this.tg.MainButton;
                    btn.setText(text);
                    btn.setColor(color);
                    btn.setTextColor(textColor);
                    if (isVisible) btn.show(); else btn.hide();
                    if (callback) btn.onClick(callback);
                }

                hideMainButton() {
                    this.tg?.MainButton.hide();
                }
            }

            // ======================== إدارة الحالة المركزية (State) ========================
            class AppState extends EventTarget {
                constructor() {
                    super();
                    this.user = null;
                    this.isAdmin = false;
                    this.loading = true;
                    this.accessDenied = false;
                    this.telegramMissing = false;
                    this.balance = CONFIG.DEFAULT_BALANCE;
                    this.stats = { users: 0, bots: 0, dailyOps: 0 };
                    this.theme = 'dark';
                    this.settings = { language: 'ar', notifications: true };
                    this.wallet = { transactions: [], address: 'T9eK3zX8qLp2mN5rV7bA1cD4fG6hJ8kQ' };
                    this.depositRequests = [];

                    if (this[key] !== undefined) {
                        this[key] = value;
                        this.dispatchEvent(new CustomEvent('stateChanged', { detail: { key, value } }));

                    this.wallet.transactions.unshift(tx);
                    if (this.wallet.transactions.length > CONFIG.MAX_TRANSACTIONS) {

                savePaymentMethods() {
                    StorageService.set(CONFIG.STORAGE_KEYS.PAYMENT_METHODS, this.state.paymentMethods);
                }

                addPaymentMethod(methodData) {
                    const newMethod = { id: IdGenerator.generate('pm_'), ...methodData };
                    this.state.paymentMethods.push(newMethod);
                    this.savePaymentMethods();
                    return newMethod;
                }

                updatePaymentMethod(id, newData) {
                    const index = this.state.paymentMethods.findIndex(m => m.id === id);
                    if (index !== -1) {
                        this.state.paymentMethods[index] = { ...this.state.paymentMethods[index], ...newData };
                        this.savePaymentMethods();
                        return true;
                    }
                    return false;
                }

                deletePaymentMethod(id) {
                    this.state.paymentMethods = this.state.paymentMethods.filter(m => m.id !== id);
                    this.savePaymentMethods();
                }

                // الطلبات
                loadRequests() {
                    this.state.depositRequests = StorageService.get(CONFIG.STORAGE_KEYS.DEPOSIT_REQUESTS, []);
                    this.state.withdrawalRequests = StorageService.get(CONFIG.STORAGE_KEYS.WITHDRAWAL_REQUESTS, []);
                }

                saveRequests() {
                    StorageService.set(CONFIG.STORAGE_KEYS.DEPOSIT_REQUESTS, this.state.depositRequests);
                    StorageService.set(CONFIG.STORAGE_KEYS.WITHDRAWAL_REQUESTS, this.state.withdrawalRequests);
                }

                addDepositRequest(amount, methodId, transactionId, user) {
                    const method = this.state.paymentMethods.find(m => m.id === methodId);
                    const request = {
                        id: IdGenerator.generate('dep_'),
                        userId: user.id,
                        userName: `${user.first_name} ${user.last_name || ''}`.trim(),
                        amount,
                        method: method ? method.name : methodId,
                        methodId,
                        transactionId,
                        status: 'pending',
                        date: new Date().toISOString()
                    };
                    this.state.depositRequests.push(request);
                    this.saveRequests();
                    this.incrementDailyOps();
                    return request.id;
                }

                addWithdrawalRequest(amount, methodId, details, user) {
                    if (amount > this.state.balance) {
                        return { success: false, message: 'الرصيد غير كافٍ' };
                    }
                    const method = this.state.paymentMethods.find(m => m.id === methodId);
                    const request = {
                        id: IdGenerator.generate('with_'),
                        userId: user.id,
                        userName: `${user.first_name} ${user.last_name || ''}`.trim(),
                        amount,
                        method: method ? method.name : methodId,
                        methodId,
                        details,
                        status: 'pending',
                        date: new Date().toISOString()
                    };
                    this.state.withdrawalRequests.push(request);
                    this.saveRequests();
                    this.incrementDailyOps();
                    return { success: true, id: request.id };
                }

                acceptRequest(request, type) {
                    if (type === 'deposit') {
                        const req = this.state.depositRequests.find(r => r.id === request.id);
                        if (req && req.status === 'pending') {
                            req.status = 'approved';
                            this.state.balance += req.amount;
                            this.addTransaction('deposit', req.amount, `شحن عبر ${req.method} (رقم العملية: ${req.transactionId || 'غير محدد'})`);
                            this.saveWallet();
                            this.saveRequests();
                            return true;
                        }
                    } else if (type === 'withdrawal') {
                        const req = this.state.withdrawalRequests.find(r => r.id === request.id);
                        if (req && req.status === 'pending' && this.state.balance >= req.amount) {
                            req.status = 'approved';
                            this.state.balance -= req.amount;
                            this.addTransaction('withdraw', -req.amount, `سحب عبر ${req.method} إلى ${req.details || 'محفظة'}`);
                            this.saveWallet();
                            this.saveRequests();
                            return true;
                        }
                    }
                    return false;
                }

                rejectRequest(request, type) {
                    if (type === 'deposit') {
                        const req = this.state.depositRequests.find(r => r.id === request.id);
                        if (req) {
                            req.status = 'rejected';
                            this.saveRequests();
                            return true;
                        }
                    } else if (type === 'withdrawal') {
                        const req = this.state.withdrawalRequests.find(r => r.id === request.id);
                        if (req) {
                            req.status = 'rejected';
                            this.saveRequests();
                            return true;
                        }
                    }
                    return false;
                }

                getPendingDeposits() {
                    return this.state.depositRequests.filter(r => r.status === 'pending');
                }

                getPendingWithdrawals() {
                    return this.state.withdrawalRequests.filter(r => r.status === 'pending');
                }

                addTransaction(type, amount, note = '', status = 'مكتمل') {
                    const tx = {
                        id: IdGenerator.generate('tx_'),
                        type,
                        amount,
                        note,
                        status,
                        date: new Date().toISOString()
                    };
                    this.state.wallet.transactions.unshift(tx);
                    if (this.state.wallet.transactions.length > CONFIG.MAX_TRANSACTIONS) {
                        this.state.wallet.transactions.pop();
                    }
                    this.saveWallet();
                }

                            <button id="logoutBtn" class="w-full py-4 rounded-xl font-bold text-red-400 hover:bg-red-500/10 hover:text-red-300 transition-all duration-300 border border-transparent hover:border-red-500/20 flex items-center justify-center gap-2 group">
                                <i class="fa-solid fa-arrow-right-from-bracket group-hover:-translate-x-1 transition-transform"></i>
                                تسجيل الخروج
                            </button>
                        </div>
                    `;
                }

                // تحديث عرض الرصيد
                updateBalanceDisplay() {
                    const balanceSpan = document.querySelector('#balanceBadge span');
                    if (balanceSpan) {
                        balanceSpan.textContent = this.state.balance.toLocaleString('ar-EG');
                    }
                }

                // تحديث عرض الإحصائيات
                updateStatsDisplay() {
                    const stats = this.state.stats;
                    const usersEl = document.getElementById('statsUsers');
                    const botsEl = document.getElementById('statsBots');
                    const dailyOpsEl = document.getElementById('statsDailyOps');
                    if (usersEl) usersEl.textContent = stats.users.toLocaleString('ar-EG');
                    if (botsEl) botsEl.textContent = stats.bots;
                    if (dailyOpsEl) dailyOpsEl.textContent = stats.dailyOps;
                }

                // ربط الأحداث العامة
                bindEvents() {
                    const logoutBtn = document.getElementById('logoutBtn');
                    if (logoutBtn) {
                        logoutBtn.addEventListener('click', () => {
                            this.tg.close();
                            this.toast.info('تم تسجيل الخروج بنجاح');
                        });
                    }

                    const walletIcon = document.getElementById('walletIconLarge');
                    if (walletIcon) {
                        walletIcon.addEventListener('click', () => this.openWalletModal());
                    }

                    const adminPanelBtn = document.getElementById('openAdminPanelBtn');
                    if (adminPanelBtn) {
                        adminPanelBtn.addEventListener('click', () => this.openAdminPanel());
                    }
                }

                // ========== نوافذ مودال ==========
                openWalletModal() {
                    const modalOverlay = document.getElementById('walletModalOverlay');
                    const modalContent = document.getElementById('walletModalContent');
                    modalContent.innerHTML = this.renderWalletModal();
                    modalOverlay.classList.add('open');
                    this.bindWalletModalEvents();
                }

                renderWalletModal() {
                    const balance = this.state.balance;
                    const transactions = this.state.wallet.transactions;
                    const paymentMethods = this.state.paymentMethods;

                    const transactionsHtml = transactions.length === 0 
                        ? '<p class="text-center text-gray-400 py-4">لا توجد معاملات بعد</p>'
                        : transactions.map(tx => {
                            const amountClass = tx.amount > 0 ? 'positive' : 'negative';
                            const amountStr = (tx.amount > 0 ? '+' : '') + tx.amount.toLocaleString('ar-EG');
                            return `
                                <div class="transaction-item">
                                    <div>
                                        <div class="font-medium">${tx.note || tx.type}</div>
                                        <div class="text-xs text-gray-400">${DateUtils.formatDateTime(tx.date)}</div>
                                    </div>
                                    <div class="transaction-amount ${amountClass} font-bold">${amountStr}</div>
                                </div>
                            `;
                        }).join('');

                    // عرض طرق الدفع مع الصور
                    const paymentMethodsHtml = paymentMethods.map(m => `
                        <div class="payment-method" data-method-id="${m.id}" data-context="deposit">
                            <div class="payment-icon">
                                ${m.imageUrl ? 
                                    `<img src="${m.imageUrl}" alt="${m.name}" style="width:100%; height:100%; object-fit:contain; background:white; border-radius:8px;">` : 
                                    `<i class="${m.icon}"></i>`
                                }
                            </div>
                            <div class="flex-1">
                                <div class="font-bold">${m.name}</div>
                                <div class="text-xs text-gray-400">${(m.description || '').substring(0, 30)}...</div>
                            </div>
                        </div>
                    `).join('');

                    const withdrawMethodsHtml = paymentMethods.map(m => `
                        <div class="payment-method" data-method-id="${m.id}" data-context="withdraw">
                            <div class="payment-icon">
                                ${m.imageUrl ? 
                                    `<img src="${m.imageUrl}" alt="${m.name}" style="width:100%; height:100%; object-fit:contain; background:white; border-radius:8px;">` : 
                                    `<i class="${m.icon}"></i>`
                                }
                            </div>
                            <div class="flex-1">
                                <div class="font-bold">${m.name}</div>
                            </div>
                        </div>
                    `).join('');

                    return `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">محفظتي</h2>
                            <button id="closeWalletModal" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="glass-card p-6 rounded-2xl text-center mb-4">
                            <div class="text-gray-400 text-sm mb-1">الرصيد الحالي</div>
                            <div class="text-3xl font-bold text-white">${balance.toLocaleString('ar-EG')}</div>
                            <div class="text-xs text-gray-400 mt-1">عملة البوت</div>
                        </div>

                        <div class="wallet-tabs">
                            <button class="wallet-tab active" data-tab="deposit"><i class="fa-solid fa-arrow-down"></i> شحن</button>
                            <button class="wallet-tab" data-tab="withdraw"><i class="fa-solid fa-arrow-up"></i> سحب</button>
                            <button class="wallet-tab" data-tab="transfer"><i class="fa-solid fa-exchange-alt"></i> تحويل</button>
                            <button class="wallet-tab" data-tab="history"><i class="fa-solid fa-history"></i> السجل</button>
                        </div>

                        <div id="walletTabContent">
                            <!-- تبويب الشحن -->
                            <div class="tab-pane active" id="tab-deposit">
                                <p class="text-sm text-gray-300 mb-3">اختر طريقة الدفع:</p>
                                <div class="payment-methods-list mb-4">
                                    ${paymentMethodsHtml}
                                </div>
                                <!-- لا توجد حقول هنا، ستظهر في المودال الجديد -->
                            </div>

                            <!-- تبويب السحب -->
                            <div class="tab-pane hidden" id="tab-withdraw">
                                <p class="text-sm text-gray-300 mb-3">اختر طريقة السحب:</p>
                                <div class="payment-methods-list mb-4" id="withdrawMethodsList">
                                    ${withdrawMethodsHtml}
                                </div>
                            </div>

                            <!-- تبويب التحويل -->
                            <div class="tab-pane hidden" id="tab-transfer">
                                <p class="text-sm text-gray-300 mb-2">تحويل إلى مستخدم آخر:</p>
                                <input type="text" id="transferUserId" placeholder="معرف المستخدم" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 mb-2 text-white">
                                <div class="flex gap-2">
                                    <input type="number" id="transferAmount" placeholder="المبلغ" class="flex-1 bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                                    <button id="transferBtn" class="bg-green-600 px-4 rounded-lg font-bold">تحويل</button>
                                </div>
                            </div>

                            <!-- تبويب السجل -->
                            <div class="tab-pane hidden" id="tab-history">
                                <div class="max-h-64 overflow-y-auto">
                                    ${transactionsHtml}
                                </div>
                            </div>
                        </div>
                    `;
                }

                bindWalletModalEvents() {
                    const modalOverlay = document.getElementById('walletModalOverlay');
                    document.getElementById('closeWalletModal').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });
                    modalOverlay.addEventListener('click', (e) => {
                        if (e.target === modalOverlay) modalOverlay.classList.remove('open');
                    });

                    // تبديل التبويبات
                    const tabs = document.querySelectorAll('.wallet-tab');
                    tabs.forEach(tab => {
                        tab.addEventListener('click', () => {
                            tabs.forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');
                            const tabId = tab.dataset.tab;
                            document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.add('hidden'));
                            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
                        });
                    });

                    // أحداث النقر على طرق الشحن (فتح مودال التفاصيل)
                    document.querySelectorAll('.payment-methods-list .payment-method[data-context="deposit"]').forEach(method => {
                        method.addEventListener('click', (e) => {
                            e.preventDefault();
                            const methodId = method.dataset.methodId;
                            this.openPaymentMethodDetailModal(methodId, 'deposit');
                        });
                    });

                    // أحداث النقر على طرق السحب (فتح مودال التفاصيل)
                    document.querySelectorAll('#withdrawMethodsList .payment-method[data-context="withdraw"]').forEach(method => {
                        method.addEventListener('click', (e) => {
                            e.preventDefault();
                            const methodId = method.dataset.methodId;
                            this.openPaymentMethodDetailModal(methodId, 'withdraw');
                        });
                    });

                    // تحويل
                    document.getElementById('transferBtn')?.addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('transferAmount').value);
                        const targetId = document.getElementById('transferUserId').value.trim();
                        if (isNaN(amount) || amount <= 0) {
                            this.toast.error('أدخل مبلغ صحيح');
                            return;
                        }
                        if (!targetId) {
                            this.toast.error('أدخل معرف المستخدم');
                            return;
                        }
                        if (amount > this.state.balance) {
                            this.toast.error('الرصيد غير كافٍ');
                            return;
                        }
                        this.state.balance -= amount;
                        this.data.addTransaction('transfer', -amount, `تحويل إلى المستخدم ${targetId}`);
                        this.data.saveWallet();
                        this.toast.success('تم التحويل بنجاح');
                        document.getElementById('transferAmount').value = '';
                        document.getElementById('transferUserId').value = '';
                        this.updateBalanceDisplay();
                        this.openWalletModal(); // تحديث
                    });
                }

                // فتح مودال تفاصيل طريقة الدفع (الشحن أو السحب)
                openPaymentMethodDetailModal(methodId, context) {
                    const method = this.state.paymentMethods.find(m => m.id === methodId);
                    if (!method) return;

                    const modalOverlay = document.getElementById('paymentMethodDetailOverlay');
                    const modalContent = document.getElementById('paymentMethodDetailContent');

                    const actionText = context === 'deposit' ? 'شحن' : 'سحب';
                    const detailsText = context === 'deposit' ? method.depositDetails : method.withdrawDetails;
                    const placeholderText = context === 'deposit' ? 'أدخل رقم العملية (TXID)' : 'أدخل التفاصيل المطلوبة (عنوان المحفظة، رقم الحساب...)';
                    const buttonColor = context === 'deposit' ? 'bg-blue-600' : 'bg-red-600';

                    modalContent.innerHTML = `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">${method.name} - ${actionText}</h2>
                            <button id="closePaymentMethodDetail" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="flex flex-col items-center mb-4">
                            <div class="w-24 h-24 rounded-2xl overflow-hidden bg-white/10 flex items-center justify-center mb-3 detail-payment-icon">
                                ${method.imageUrl ? 
                                    `<img src="${method.imageUrl}" alt="${method.name}" style="width:100%; height:100%; object-fit:contain;">` : 
                                    `<i class="${method.icon} text-4xl"></i>`
                                }
                            </div>
                            <p class="text-center text-gray-300 text-sm">${method.description || ''}</p>
                        </div>

                        <div class="glass-card p-4 rounded-2xl mb-4 text-sm">
                            <div class="font-bold mb-2">تفاصيل ${actionText}:</div>
                            <div class="text-gray-300 whitespace-pre-line">${detailsText || 'لا توجد تفاصيل متاحة'}</div>
                        </div>

                        <div class="space-y-3">
                            ${context === 'deposit' ? `
                                <div>
                                    <label class="text-sm text-gray-400">رقم العملية (TXID):</label>
                                    <input type="text" id="detailTransactionId" placeholder="أدخل رقم العملية" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                                </div>
                            ` : ''}

                            <div>
                                <label class="text-sm text-gray-400">المبلغ:</label>
                                <input type="number" id="detailAmount" placeholder="أدخل المبلغ" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                            </div>

                            ${context === 'withdraw' ? `
                                <div>
                                    <label class="text-sm text-gray-400">التفاصيل (عنوان المحفظة، رقم الحساب):</label>
                                    <input type="text" id="detailWithdrawInfo" placeholder="${placeholderText}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                                </div>
                            ` : ''}
                        </div>

                        <div class="flex gap-2 mt-6">
                            <button id="detailSubmitBtn" class="flex-1 ${buttonColor} py-3 rounded-lg font-bold">تقديم طلب ${actionText}</button>
                            <button id="detailCancelBtn" class="flex-1 bg-gray-600 py-3 rounded-lg font-bold">إلغاء</button>
                        </div>
                    `;

                    modalOverlay.classList.add('open');

                    // ربط أحداث الإغلاق
                    document.getElementById('closePaymentMethodDetail').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });
                    document.getElementById('detailCancelBtn').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });
                    modalOverlay.addEventListener('click', (e) => {
                        if (e.target === modalOverlay) modalOverlay.classList.remove('open');
                    });

                    // ربط حدث تقديم الطلب
                    document.getElementById('detailSubmitBtn').addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('detailAmount').value);
                        if (isNaN(amount) || amount <= 0) {
                            this.toast.error('أدخل مبلغ صحيح');
                            return;
                        }

                        if (context === 'deposit') {
                            const transactionId = document.getElementById('detailTransactionId')?.value.trim();
                            if (!transactionId) {
                                this.toast.error('يرجى إدخال رقم العملية');
                                return;
                            }
                            const requestId = this.data.addDepositRequest(amount, methodId, transactionId, this.state.user);
                            this.toast.success(`تم تقديم طلب الشحن بنجاح (رقم: ${requestId})`);
                        } else {
                            const details = document.getElementById('detailWithdrawInfo')?.value.trim();
                            if (!details) {
                                this.toast.error('يرجى إدخال التفاصيل المطلوبة');
                                return;
                            }
                            const result = this.data.addWithdrawalRequest(amount, methodId, details, this.state.user);
                            if (result.success) {
                                this.toast.success(`تم تقديم طلب السحب بنجاح (رقم: ${result.id})`);
                            } else {
                                this.toast.error(result.message);
                            }
                        }

                        modalOverlay.classList.remove('open');
                    });
                }

                // لوحة المشرف
                openAdminPanel() {
                    const modalOverlay = document.getElementById('adminPanelOverlay');
                    const modalContent = document.getElementById('adminPanelContent');
                    modalContent.innerHTML = this.renderAdminPanel();
                    modalOverlay.classList.add('open');
                    this.bindAdminPanelEvents();
                }

                renderAdminPanel() {
                    const pendingDeposits = this.data.getPendingDeposits();
                    const pendingWithdrawals = this.data.getPendingWithdrawals();

                    const depositsHtml = pendingDeposits.length === 0 
                        ? '<p class="text-gray-400 text-center py-2">لا توجد طلبات شحن معلقة</p>'
                        : pendingDeposits.map(req => `
                            <div class="request-item" data-id="${req.id}" data-type="deposit">
                                <div class="request-header">
                                    <span class="font-bold">${req.userName}</span>
                                    <span class="badge-pending">قيد الانتظار</span>
                                </div>
                                <div class="text-sm">المبلغ: <span class="text-blue-400">${req.amount.toLocaleString('ar-EG')}</span></div>
                                <div class="text-xs text-gray-400">الطريقة: ${req.method}</div>
                                <div class="text-xs text-gray-400">رقم العملية: <span class="text-yellow-400">${req.transactionId || 'غير محدد'}</span></div>
                                <div class="text-xs text-gray-400">التاريخ: ${DateUtils.formatDateTime(req.date)}</div>
                                <div class="request-actions">
                                    <button class="btn-accept accept-request" data-id="${req.id}" data-type="deposit">قبول</button>
                                    <button class="btn-reject reject-request" data-id="${req.id}" data-type="deposit">رفض</button>
                                </div>
                            </div>
                        `).join('');

                    const withdrawalsHtml = pendingWithdrawals.length === 0 
                        ? '<p class="text-gray-400 text-center py-2">لا توجد طلبات سحب معلقة</p>'
                        : pendingWithdrawals.map(req => `
                            <div class="request-item" data-id="${req.id}" data-type="withdrawal">
                                <div class="request-header">
                                    <span class="font-bold">${req.userName}</span>
                                    <span class="badge-pending">قيد الانتظار</span>
                                </div>
                                <div class="text-sm">المبلغ: <span class="text-red-400">${req.amount.toLocaleString('ar-EG')}</span></div>
                                <div class="text-xs text-gray-400">الطريقة: ${req.method}</div>
                                <div class="text-xs text-gray-400">التفاصيل: ${req.details || 'غير محدد'}</div>
                                <div class="text-xs text-gray-400">التاريخ: ${DateUtils.formatDateTime(req.date)}</div>
                                <div class="request-actions">
                                    <button class="btn-accept accept-request" data-id="${req.id}" data-type="withdrawal">قبول</button>
                                    <button class="btn-reject reject-request" data-id="${req.id}" data-type="withdrawal">رفض</button>
                                </div>
                            </div>
                        `).join('');

                    const paymentMethodsHtml = this.state.paymentMethods.map(m => `
                        <div class="payment-method-admin">
                            <div class="flex items-center gap-3">
                                <div class="payment-icon">
                                    ${m.imageUrl ? 
                                        `<img src="${m.imageUrl}" alt="${m.name}" style="width:100%; height:100%; object-fit:contain; background:white; border-radius:8px;">` : 
                                        `<i class="${m.icon}"></i>`
                                    }
                                </div>
                                <div>
                                    <div class="font-bold">${m.name}</div>
                                    <div class="text-xs text-gray-400">${m.description || ''}</div>
                                </div>
                            </div>
                            <div class="actions">
                                <button class="edit-payment-method" data-id="${m.id}" title="تعديل"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button class="delete-payment-method" data-id="${m.id}" title="حذف"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                    `).join('');

                    return `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">لوحة الإدارة</h2>
                            <button id="closeAdminPanel" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="wallet-tabs mb-3">
                            <button class="wallet-tab active" data-admin-tab="requests">الطلبات</button>
                            <button class="wallet-tab" data-admin-tab="payment-methods">طرق الدفع</button>
                        </div>

                        <div id="adminRequestsTab" class="admin-tab-content">
                            <div class="space-y-6">
                                <div>
                                    <h3 class="text-lg font-bold mb-2 flex items-center gap-2">
                                        <i class="fa-solid fa-arrow-down text-green-400"></i>
                                        طلبات الشحن المعلقة
                                        <span class="bg-blue-600 text-white text-xs px-2 py-1 rounded-full">${pendingDeposits.length}</span>
                                    </h3>
                                    <div class="admin-requests-panel">${depositsHtml}</div>
                                </div>
                                <div>
                                    <h3 class="text-lg font-bold mb-2 flex items-center gap-2">
                                        <i class="fa-solid fa-arrow-up text-red-400"></i>
                                        طلبات السحب المعلقة
                                        <span class="bg-blue-600 text-white text-xs px-2 py-1 rounded-full">${pendingWithdrawals.length}</span>
                                    </h3>
                                    <div class="admin-requests-panel">${withdrawalsHtml}</div>
                                </div>
                            </div>
                        </div>

                        <div id="adminPaymentMethodsTab" class="admin-tab-content hidden">
                            <div class="flex justify-between items-center mb-3">
                                <h3 class="text-lg font-bold">طرق الدفع المتاحة</h3>
                                <button id="addPaymentMethodBtn" class="bg-blue-600 px-3 py-1 rounded-lg text-sm"><i class="fa-solid fa-plus"></i> إضافة</button>
                            </div>
                            <div class="space-y-2 max-h-96 overflow-y-auto">
                                ${paymentMethodsHtml}
                            </div>
                        </div>
                    `;
                }

                bindAdminPanelEvents() {
                    const modalOverlay = document.getElementById('adminPanelOverlay');
                    document.getElementById('closeAdminPanel').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });
                    modalOverlay.addEventListener('click', (e) => {
                        if (e.target === modalOverlay) modalOverlay.classList.remove('open');
                    });

                    // تبديل التبويبات
                    const adminTabs = document.querySelectorAll('[data-admin-tab]');
                    adminTabs.forEach(tab => {
                        tab.addEventListener('click', () => {
                            adminTabs.forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');
                            const tabName = tab.dataset.adminTab;
                            if (tabName === 'requests') {
                                document.getElementById('adminRequestsTab').classList.remove('hidden');
                                document.getElementById('adminPaymentMethodsTab').classList.add('hidden');
                            } else {
                                document.getElementById('adminRequestsTab').classList.add('hidden');
                                document.getElementById('adminPaymentMethodsTab').classList.remove('hidden');
                            }
                        });
                    });

                    // قبول الطلبات
                    document.querySelectorAll('.accept-request').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            const type = btn.dataset.type;
                            const request = type === 'deposit' 
                                ? this.state.depositRequests.find(r => r.id === id)
                                : this.state.withdrawalRequests.find(r => r.id === id);
                            if (request) {
                                const success = this.data.acceptRequest(request, type);
                                if (success) {
                                    this.toast.success(`تم قبول الطلب ${id}`);
                                    this.openAdminPanel(); // إعادة فتح اللوحة
                                } else {
                                    this.toast.error('حدث خطأ (قد يكون الرصيد غير كافٍ)');
                                }
                            }
                        });
                    });

                    // رفض الطلبات
                    document.querySelectorAll('.reject-request').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            const type = btn.dataset.type;
                            const request = type === 'deposit' 
                                ? this.state.depositRequests.find(r => r.id === id)
                                : this.state.withdrawalRequests.find(r => r.id === id);
                            if (request) {
                                this.data.rejectRequest(request, type);
                                this.toast.info(`تم رفض الطلب ${id}`);
                                this.openAdminPanel();
                            }
                        });
                    });

                    // إضافة طريقة دفع
                    document.getElementById('addPaymentMethodBtn')?.addEventListener('click', () => {
                        this.openPaymentMethodModal();
                    });

                    // تعديل وحذف
                    document.querySelectorAll('.edit-payment-method').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            this.openPaymentMethodModal(id);
                        });
                    });

                    document.querySelectorAll('.delete-payment-method').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            if (confirm('هل أنت متأكد من حذف طريقة الدفع هذه؟')) {
                                this.data.deletePaymentMethod(id);
                                this.toast.success('تم الحذف بنجاح');
                                this.openAdminPanel();
                            }
                        });
                    });
                }

                // مودال إضافة/تعديل طريقة دفع (مع إضافة حقل الصورة)
                openPaymentMethodModal(editingId = null) {
                    const modalOverlay = document.getElementById('paymentMethodModalOverlay');
                    const modalContent = document.getElementById('paymentMethodModalContent');
                    const method = editingId ? this.state.paymentMethods.find(m => m.id === editingId) : null;
                    
                    modalContent.innerHTML = `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">${method ? 'تعديل طريقة دفع' : 'إضافة طريقة دفع جديدة'}</h2>
                            <button id="closePaymentMethodModal" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                        <form id="paymentMethodForm" class="space-y-3">
                            <input type="hidden" id="methodId" value="${method?.id || ''}">
                            <div>
                                <label class="text-sm text-gray-400">اسم الطريقة</label>
                                <input type="text" id="methodName" required value="${method?.name || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                            </div>
                            <div>
                                <label class="text-sm text-gray-400">الأيقونة (class FontAwesome, اختياري)</label>
                                <input type="text" id="methodIcon" value="${method?.icon || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                            </div>
                            <div>
                                <label class="text-sm text-gray-400">رابط الصورة (URL)</label>
                                <input type="url" id="methodImageUrl" value="${method?.imageUrl || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                            </div>
                            <div>
                                <label class="text-sm text-gray-400">وصف مختصر</label>
                                <input type="text" id="methodDescription" value="${method?.description || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                            </div>
                            <div>
                                <label class="text-sm text-gray-400">تفاصيل الإيداع</label>
                                <textarea id="methodDepositDetails" rows="2" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">${method?.depositDetails || ''}</textarea>
                            </div>
                            <div>
                                <label class="text-sm text-gray-400">تفاصيل السحب (placeholder)</label>
                                <input type="text" id="methodWithdrawDetails" value="${method?.withdrawDetails || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                            </div>
                            <div class="flex gap-2 pt-2">
                                <button type="submit" class="flex-1 bg-blue-600 py-2 rounded-lg font-bold">حفظ</button>
                                <button type="button" id="cancelPaymentMethod" class="flex-1 bg-gray-600 py-2 rounded-lg font-bold">إلغاء</button>
                            </div>
                        </form>
                    `;
                    
                    modalOverlay.classList.add('open');
                    this.bindPaymentMethodModalEvents();
                }

                bindPaymentMethodModalEvents() {
                    const modalOverlay = document.getElementById('paymentMethodModalOverlay');
                    document.getElementById('closePaymentMethodModal').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });
                    document.getElementById('cancelPaymentMethod').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });
                    modalOverlay.addEventListener('click', (e) => {
                        if (e.target === modalOverlay) modalOverlay.classList.remove('open');
                    });

                    document.getElementById('paymentMethodForm').addEventListener('submit', (e) => {
                        e.preventDefault();
                        const formData = {
                            name: document.getElementById('methodName').value,
                            icon: document.getElementById('methodIcon').value,
                            imageUrl: document.getElementById('methodImageUrl').value,
                            description: document.getElementById('methodDescription').value,
                            depositDetails: document.getElementById('methodDepositDetails').value,
                            withdrawDetails: document.getElementById('methodWithdrawDetails').value
                        };
                        const id = document.getElementById('methodId').value;
                        
                        if (id) {
                            this.data.updatePaymentMethod(id, formData);
                            this.toast.success('تم التحديث بنجاح');
                        } else {
                            this.data.addPaymentMethod(formData);
                            this.toast.success('تمت الإضافة بنجاح');
                        }
                        
                        modalOverlay.classList.remove('open');
                        this.openAdminPanel(); // إعادة فتح لوحة المشرف
                    });
                }
            }

            // ======================== التطبيق الرئيسي ========================
            class App {
                constructor() {
                    this.state = new AppState();
                    this.telegram = new TelegramService();
                    this.toast = new ToastManager('toastContainer');
                    this.data = new DataService(this.state);
                    this.ui = new UIManager(this.state, this.data, this.telegram, this.toast);
                    
                    this.init();
                }

                async init() {
                    // التحقق من بيئة تيليجرام
                    if (!this.telegram.isAvailable) {
                        this.state.telegramMissing = true;
                        this.state.loading = false;
                        this.ui.render();
                        return;
                    }

                    this.telegram.init();

                    // التحقق من صحة البيانات
                    if (!this.telegram.isValid() || !this.telegram.getUser()) {
                        this.state.accessDenied = true;
                        this.state.loading = false;
                        this.ui.render();
                        return;
                    }

                    const user = this.telegram.getUser();
                    this.state.user = user;
                    this.state.isAdmin = (user.id === CONFIG.ADMIN_ID);

                    // تسجيل المستخدم
                    this.data.registerUser(user.id);

                    // تحميل الثيم
                    const savedTheme = this.data.loadTheme();
                    this.applyTheme(savedTheme);

                    // محاكاة تحميل البيانات
                    this.state.loading = true;
                    this.ui.render();

                    try {
                        await new Promise(resolve => setTimeout(resolve, 1000));
                        this.data.loadStats();
                        this.state.loading = false;
                        this.ui.render();

                        // إعداد زر MainButton
                        this.telegram.setMainButton(
                            this.state.isAdmin ? "لوحة التحكم" : "تحديث البيانات",
                            '#3b82f6',
                            '#ffffff',
                            true,
                            () => {
                                this.telegram.showPopup({
                                    title: this.state.isAdmin ? 'مرحباً أيها المدير' : 'نظام آمن',
                                    message: this.state.isAdmin 
                                        ? `لديك صلاحيات كاملة. الطلبات المعلقة: ${this.data.getPendingDeposits().length + this.data.getPendingWithdrawals().length}`
                                        : `أهلاً ${user.first_name}، اتصالك آمن.`,
                                    buttons: [{ type: 'ok', text: 'حسناً' }]
                                });
                            }
                        );

                        this.toast.success(`مرحباً ${user.first_name}، أهلاً بك في المحفظة المتطورة`);
                    } catch (error) {
                        console.error('Initialization error:', error);
                        this.toast.error('حدث خطأ أثناء تحميل البيانات');
                        this.state.loading = false;
                        this.ui.render();
                    }
                }

                applyTheme(theme) {
                    const root = document.documentElement;
                    const themeIcon = document.getElementById('themeIcon');
                    
                    if (theme === 'light') {
                        root.style.setProperty('--tg-theme-bg-color', '#f8fafc');
                        root.style.setProperty('--tg-theme-text-color', '#0f172a');
                        root.style.setProperty('--tg-theme-button-color', '#3b82f6');
                        root.style.setProperty('--tg-theme-button-text-color', '#ffffff');
                        themeIcon.className = 'fa-solid fa-sun';
                    } else {
                        root.style.setProperty('--tg-theme-bg-color', '#0f172a');
                        root.style.setProperty('--tg-theme-text-color', '#ffffff');
                        root.style.setProperty('--tg-theme-button-color', '#3b82f6');
                        root.style.setProperty('--tg-theme-button-text-color', '#ffffff');
                        themeIcon.className = 'fa-solid fa-moon';
                    }
                }
            }

            // ======================== بدء التطبيق ========================
            const app = new App();

            // أحداث عامة (السمة والإعدادات)
            document.getElementById('themeToggle').addEventListener('click', () => {
                const newTheme = app.state.theme === 'dark' ? 'light' : 'dark';
                app.state.theme = newTheme;
                app.data.saveTheme(newTheme);
                app.applyTheme(newTheme);
                app.toast.info(`تم تغيير السمة إلى ${newTheme === 'dark' ? 'الداكنة' : 'الفاتحة'}`);
            });

            // إعدادات
            const settingsOverlay = document.getElementById('settingsOverlay');
            const settingsPanel = document.getElementById('settingsPanel');
            
            document.getElementById('closeSettings').addEventListener('click', () => {
                settingsOverlay.classList.remove('open');
                settingsPanel.classList.remove('open');
            });

            settingsOverlay.addEventListener('click', () => {
                settingsOverlay.classList.remove('open');
                settingsPanel.classList.remove('open');
            });

            document.getElementById('languageSelect').addEventListener('change', (e) => {
                app.state.settings.language = e.target.value;
                app.data.saveSettings();
                app.toast.success(`تم تغيير اللغة إلى ${e.target.value === 'ar' ? 'العربية' : 'الإنجليزية'}`);
            });

            document.getElementById('notificationsToggle').addEventListener('change', (e) => {
                app.state.settings.notifications = e.target.checked;
                app.data.saveSettings();
                app.toast.success(e.target.checked ? 'تم تفعيل الإشعارات' : 'تم إيقاف الإشعارات');
            });
        })();
    </script>
</body>
</html>
