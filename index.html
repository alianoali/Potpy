    <style>
        /* Performance Optimizations */
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #000000;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
            touch-action: manipulation; /* Prevents double-tap zoom delay */
            will-change: scroll-position; /* Hint for browser */
        }

        /* Hardware Accelerated Layers */
        .hw-accel {
            transform: translateZ(0);
            backface-visibility: hidden;
            perspective: 1000px;
        }

        /* Optimized Glassmorphism - Reduced Blur for Performance */
        .glass-card {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(12px); /* Reduced from 24px for speed */
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4); /* Lighter shadow */
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94), border-color 0.2s;
            will-change: transform, border-color;
            border-radius: 1rem;
        }

        .glass-card:active {
            transform: scale(0.98);
        }

        .glass-card:hover {
            border-color: rgba(38, 161, 123, 0.5);
            transform: translateY(-2px);
        }

        /* Text Effects */
        .text-glow {
            text-shadow: 0 0 10px rgba(38, 161, 123, 0.5);
        }
        
        .text-gold-glow {
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }

        /* Background Optimization - Using CSS Gradients instead of heavy DOM elements */
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 15% 50%, rgba(38, 161, 123, 0.15) 0%, transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(212, 175, 55, 0.1) 0%, transparent 25%),
                radial-gradient(circle at 50% 80%, rgba(38, 161, 123, 0.1) 0%, transparent 30%),
                #000000;
            will-change: background-position;
        }

        /* Loader */
        .loader-ring {
            width: 60px;
            height: 60px;
            border: 2px solid rgba(38, 161, 123, 0.1);
            border-top: 3px solid #26A17B;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* Toast */
        .toast {
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid rgba(38, 161, 123, 0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-right: 3px solid #26A17B;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 10px;
            min-width: 260px;
            pointer-events: auto;
            transform: translateZ(0); /* Force GPU */
        }

        .hidden-view { display: none !important; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Disable animations for users who prefer reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>

    <script>
        const tg = window.Telegram.WebApp;
        
        // State
        const views = {
            loading: document.getElementById('loadingView'),
            denied: document.getElementById('accessDeniedView'),
            dashboard: document.getElementById('dashboardView')
        };

        const els = {
            userName: document.getElementById('userName'),
            headerName: document.getElementById('headerUserName'),
            userId: document.getElementById('userId'),
            photo: document.getElementById('userPhoto'),
            defaultAvatar: document.getElementById('defaultAvatar'),
            initials: document.getElementById('avatarInitials'),
            balance: document.getElementById('userBalance'),
            date: document.getElementById('currentDate'),
        };

        function init() {
            tg.expand();
            tg.ready();
            
            const now = new Date();
            els.date.textContent = now.toLocaleDateString('ar-EG', { weekday: 'long', day: 'numeric', month: 'long' });

            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                onAuthSuccess(tg.initDataUnsafe.user);
            } else {
                tg.onEvent('ready', () => {
                    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                        onAuthSuccess(tg.initDataUnsafe.user);
                    } else {
                        setTimeout(() => {
                            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                                onAuthSuccess(tg.initDataUnsafe.user);
                            } else {
                                onAuthFailed();
                            }
                        }, 400);
                    }
                });
                setTimeout(() => {
                    if (!views.dashboard.classList.contains('hidden-view') && !views.denied.classList.contains('hidden-view')) {
                        if (!(tg.initDataUnsafe && tg.initDataUnsafe.user)) {
                            onAuthFailed();
                        }
                    }
                }, 3000);
            }
        }

        function onAuthSuccess(user) {
            loadUserData(user);
            switchView('dashboard');
            setupMainButton();
            try { tg.setHeaderColor('#000000'); } catch(e){}
        }

        function onAuthFailed() {
            switchView('denied');
            try { tg.setHeaderColor('#000000'); } catch(e){}
        }

        function switchView(viewName) {
            Object.values(views).forEach(el => el.classList.add('hidden-view'));
            views[viewName].classList.remove('hidden-view');
            
            if(viewName !== 'loading') {
                views.loading.style.opacity = '0';
                setTimeout(() => views.loading.classList.add('hidden-view'), 300);
            }
        }

        function loadUserData(user) {
            const fullName = `${user.first_name} ${user.last_name || ''}`.trim();
            els.userName.textContent = fullName;
            els.headerName.textContent = user.first_name;
            els.userId.textContent = `ID: ${user.id}`;
            
            if (user.photo_url) {
                els.photo.src = user.photo_url;
                els.photo.classList.remove('hidden');
                els.defaultAvatar.classList.add('hidden');
            } else {
                els.photo.classList.add('hidden');
                els.defaultAvatar.classList.remove('hidden');
                const initials = (user.first_name.charAt(0) + (user.last_name ? user.last_name.charAt(0) : '')).toUpperCase();
                els.initials.textContent = initials || "U";
            }

            // Smooth counter animation using requestAnimationFrame
            animateValue(els.balance, 0, 2500.50, 1500);
        }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                // Simple easeOutQuad for performance
                const ease = 1 - (1 - progress) * (1 - progress);
                
                const currentVal = ease * (end - start) + start;
                obj.innerHTML = currentVal.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        function setupMainButton() {
            tg.MainButton.setText("زيادة الرصيد (USDT)");
            tg.MainButton.setTextColor("#000000");
            tg.MainButton.setColor("#26A17B");
            tg.MainButton.show();
            
            tg.MainButton.onClick(() => {
                tg.HapticFeedback.notificationOccurred('success');
                showToast('تمت إضافة مكافأة USDT!', 'success');
                const current = parseFloat(els.balance.innerText.replace(/,/g,''));
                animateValue(els.balance, current, current + 50.00, 800);
            });
        }

        function copyId() {
            const id = els.userId.textContent.replace('ID: ', '');
            navigator.clipboard.writeText(id).then(() => {
                tg.HapticFeedback.selectionChanged();
                showToast('تم نسخ المعرف', 'info');
            });
        }

        function handleAction(type) {
            tg.HapticFeedback.impactOccurred('light');
            if (type === 'refresh') {
                showToast('جاري التحديث...', 'info');
                setTimeout(() => {
                    showToast('تم التحديث بنجاح', 'success');
                    const current = parseFloat(els.balance.innerText.replace(/,/g,''));
                    animateValue(els.balance, current, current + 0.50, 600);
                }, 800);
            } else if (type === 'support') {
                showToast('جاري الاتصال...', 'info');
                setTimeout(() => tg.openLink('https://telegram.org'), 600);
            } else if (type === 'withdraw') {
                showToast('جارٍ المعالجة...', 'info');
                setTimeout(() => showToast('تم إرسال الطلب', 'success'), 1000);
            }
        }

        function confirmLogout() {
            tg.HapticFeedback.notificationOccurred('warning');
            tg.showConfirm("هل تريد الخروج؟", (confirmed) => {
                if (confirmed) tg.close();
            });
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast pointer-events-auto';
            
            let icon = '<i class="fa-solid fa-circle-info text-usdt-green"></i>';
            if (type === 'success') icon = '<i class="fa-solid fa-check-circle text-green-500"></i>';
            if (type === 'error') icon = '<i class="fa-solid fa-triangle-exclamation text-red-500"></i>';

            toast.innerHTML = `${icon}<span class="text-sm font-medium flex-1 text-gray-200">${message}</span>`;
            
            container.appendChild(toast);
            tg.HapticFeedback.impactOccurred('light');

            // Cleanup
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px)';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        init();
    </script>
</body>
</html>
