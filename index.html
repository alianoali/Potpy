                bindNotificationsModalEvents() {
                    const overlay = document.getElementById('walletModalOverlay');
                    
                    document.getElementById('closeNotificationsModal').addEventListener('click', () => {
                        overlay.classList.remove('open');
                    });
                    
                    document.getElementById('markAllRead')?.addEventListener('click', () => {
                        this.data.markAllAsRead(this.state.user.id);
                        this.toast.success('تم تحديد الكل كمقروء');
                        this.openNotificationsModal();
                    });
                    
                    document.querySelectorAll('.mark-read').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const id = btn.dataset.id;
                            this.data.markNotificationAsRead(id);
                            this.openNotificationsModal();
                        });
                    });
                    
                    overlay.addEventListener('click', (e) => {
                        if (e.target === overlay) overlay.classList.remove('open');
                    });
                }
            }

            // ==================== App Class ====================
            class App {
                constructor() {
                    this.state = {
                        user: null,
                        isAdmin: false,
                        loading: true,
                        accessDenied: false,
                        telegramMissing: false,
                        theme: 'dark',
                        users: {},
                        currentUser: null,
                        depositRequests: [],
                        withdrawalRequests: [],
                        paymentMethods: [],
                        notifications: [],
                        settings: {
                            language: 'ar',
                            notifications: true,
                            sound: true,
                            vibrate: true,
                            autoRefresh: true
                        },
                        stats: {
                            users: 0,
                            dailyOps: 0
                        },
                        
                        set(key, value) {
                            const oldValue = this[key];
                            this[key] = value;
                            window.dispatchEvent(new CustomEvent('stateChanged', { 
                                detail: { key, value, oldValue } 
                            }));
                        }
                    };
                    
                    this.telegram = new TelegramService();
                    this.toast = new ToastManager();
                    this.data = new DataService(this.state);
                    this.ui = new UIManager(this.state, this.data, this.telegram, this.toast);
                    
                    this.init();
                }

                async init() {
                    if (!this.telegram.isAvailable) {
                        this.state.telegramMissing = true;
                        this.state.loading = false;
                        this.ui.render();
                        return;
                    }

                    this.telegram.init();

                    if (!this.telegram.isValid() || !this.telegram.getUser()) {
                        this.state.accessDenied = true;
                        this.state.loading = false;
                        this.ui.render();
                        return;
                    }

                    const user = this.telegram.getUser();
                    this.state.user = user;
                    this.state.isAdmin = (user.id === CONFIG.ADMIN_ID);

                    const userData = this.data.getUserData(user.id);
                    this.state.currentUser = userData;

                    if (!userData.name) {
                        userData.name = `${user.first_name} ${user.last_name || ''}`.trim();
                        this.data.updateUser(user.id, userData);
                    }

                    const savedTheme = this.data.loadTheme();
                    this.applyTheme(savedTheme);
                    this.loadSettings();

                    this.state.loading = true;
                    this.ui.render();

                    try {
                        await new Promise(resolve => setTimeout(resolve, 1000));
                        this.state.loading = false;
                        this.ui.render();

                        this.telegram.setMainButton(
                            this.state.isAdmin ? "لوحة التحكم" : "تحديث البيانات",
                            '#3b82f6',
                            '#ffffff',
                            true,
                            () => {
                                this.telegram.showPopup({
                                    title: this.state.isAdmin ? 'مرحباً أيها المدير' : 'نظام آمن',
                                    message: this.state.isAdmin 
                                        ? `لديك صلاحيات كاملة. الطلبات المعلقة: ${this.data.getPendingRequestsCount()}`
                                        : `أهلاً ${user.first_name}، اتصالك آمن.`,
                                    buttons: [{ type: 'ok', text: 'حسناً' }]
                                });
                            }
                        );

                        this.toast.success(`مرحباً ${user.first_name}، أهلاً بك في المحفظة المتطورة`);
                        
                        // Auto refresh
                        this.data.startAutoRefresh(() => this.refreshData());
                    } catch (error) {
                        console.error('Initialization error:', error);
                        this.toast.error('حدث خطأ أثناء تحميل البيانات');
                        this.state.loading = false;
                        this.ui.render();
                    }
                }

                refreshData() {
                    if (this.state.user) {
                        const userData = this.data.getUserData(this.state.user.id);
                        if (userData.balance !== this.state.currentUser?.balance) {
                            this.state.set('currentUser', userData);
                            this.showAutoUpdateIndicator('تم تحديث الرصيد تلقائياً');
                        }
                    }
                }

                showAutoUpdateIndicator(message) {
                    const indicator = document.getElementById('autoUpdateIndicator');
                    if (indicator) {
                        indicator.classList.remove('hidden');
                        indicator.querySelector('span').textContent = message;
                        
                        setTimeout(() => {
                            indicator.classList.add('hidden');
                        }, 2000);
                    }
                }

                loadSettings() {
                    const settings = this.state.settings;
                    this.toast.soundEnabled = settings.sound;
                    this.toast.vibrateEnabled = settings.vibrate;
                    
                    const soundToggle = document.getElementById('soundToggle');
                    const vibrateToggle = document.getElementById('vibrateToggle');
                    const autoRefreshToggle = document.getElementById('autoRefreshToggle');
                    
                    if (soundToggle) soundToggle.checked = settings.sound;
                    if (vibrateToggle) vibrateToggle.checked = settings.vibrate;
                    if (autoRefreshToggle) autoRefreshToggle.checked = settings.autoRefresh;
                }

                applyTheme(theme) {
                    const root = document.documentElement;
                    const themeIcon = document.getElementById('themeIcon');
                    
                    if (theme === 'light') {
                        root.style.setProperty('--tg-theme-bg-color', '#f8fafc');
                        root.style.setProperty('--tg-theme-text-color', '#0f172a');
                        if (themeIcon) themeIcon.className = 'fa-solid fa-sun';
                    } else {
                        root.style.setProperty('--tg-theme-bg-color', '#0f172a');
                        root.style.setProperty('--tg-theme-text-color', '#ffffff');
                        if (themeIcon) themeIcon.className = 'fa-solid fa-moon';
                    }
                }
            }

            // ==================== Initialize App ====================
            const app = new App();

            // ==================== Global Event Listeners ====================
            document.getElementById('themeToggle').addEventListener('click', () => {
                const newTheme = app.state.theme === 'dark' ? 'light' : 'dark';
                app.state.theme = newTheme;
                app.data.saveTheme(newTheme);
                app.applyTheme(newTheme);
                app.toast.info(`تم تغيير السمة إلى ${newTheme === 'dark' ? 'الداكنة' : 'الفاتحة'}`);
            });

            // Settings panel
            const settingsOverlay = document.getElementById('settingsOverlay');
            const settingsPanel = document.getElementById('settingsPanel');
            
            document.getElementById('closeSettings').addEventListener('click', () => {
                settingsOverlay.classList.remove('open');
                settingsPanel.classList.remove('open');
            });

            settingsOverlay.addEventListener('click', () => {
                settingsOverlay.classList.remove('open');
                settingsPanel.classList.remove('open');
            });

            // Settings controls
            document.getElementById('languageSelect').addEventListener('change', (e) => {
                app.state.settings.language = e.target.value;
                app.data.saveSettings();
                app.toast.success(`تم تغيير اللغة إلى ${e.target.value === 'ar' ? 'العربية' : 'الإنجليزية'}`);
            });

            document.getElementById('notificationsToggle').addEventListener('change', (e) => {
                app.state.settings.notifications = e.target.checked;
                app.data.saveSettings();
                app.toast.success(e.target.checked ? 'تم تفعيل الإشعارات' : 'تم إيقاف الإشعارات');
            });

            document.getElementById('soundToggle').addEventListener('change', (e) => {
                app.state.settings.sound = e.target.checked;
                app.data.saveSettings();
                app.toast.soundEnabled = e.target.checked;
                app.toast.success(e.target.checked ? 'تم تفعيل التنبيه الصوتي' : 'تم إيقاف التنبيه الصوتي');
            });

            document.getElementById('vibrateToggle').addEventListener('change', (e) => {
                app.state.settings.vibrate = e.target.checked;
                app.data.saveSettings();
                app.toast.vibrateEnabled = e.target.checked;
                app.toast.success(e.target.checked ? 'تم تفعيل الاهتزاز' : 'تم إيقاف الاهتزاز');
            });

            document.getElementById('autoRefreshToggle').addEventListener('change', (e) => {
                app.state.settings.autoRefresh = e.target.checked;
                app.data.saveSettings();
                if (e.target.checked) {
                    app.data.startAutoRefresh(() => app.refreshData());
                    app.toast.success('تم تفعيل التحديث التلقائي');
                } else {
                    app.data.stopAutoRefresh();
                    app.toast.info('تم إيقاف التحديث التلقائي');
                }
            });

            // Open settings panel on gear icon click (you can add a settings button in the UI if needed)
            // For now, we'll add a hidden trigger - you can add a settings button in the UI later
            console.log('✅ App initialized successfully');
        })();
    </script>
</body>
</html>
