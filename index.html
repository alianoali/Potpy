<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المحفظة الذكية - بوت تيليجرام</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts - Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        /* ========== المتغيرات الأساسية ========== */
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --secondary: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark-bg: #0f172a;
            --light-bg: #f8fafc;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ========== الأنماط الأساسية ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--tg-theme-bg-color, var(--dark-bg));
            color: var(--tg-theme-text-color, #ffffff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease;
            overflow-x: hidden;
        }

        /* ========== العناصر المتحركة ========== */
        .ambient-light {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 10s infinite ease-in-out;
        }

        .orb-1 {
            top: -10%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: var(--primary);
            animation-delay: 0s;
        }

        .orb-2 {
            bottom: -10%;
            left: -10%;
            width: 250px;
            height: 250px;
            background: var(--secondary);
            animation-delay: 5s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(20px, 40px) scale(1.1); }
        }

        /* ========== تأثير الزجاج ========== */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            transition: var(--transition);
        }

        .glass:hover {
            background: rgba(40, 51, 69, 0.8);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .glass-card {
            @apply glass rounded-2xl;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* ========== الأنيمشن ========== */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-slide-up {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .animate-pulse-slow {
            animation: pulse 2s infinite ease-in-out;
        }

        /* ========== المحفظة ========== */
        .wallet-icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(145deg, var(--primary), var(--secondary));
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.5),
                        0 0 0 2px rgba(255, 255, 255, 0.1) inset;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            animation: floatWallet 3s infinite ease-in-out;
            position: relative;
        }

        .wallet-icon::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.4), transparent 70%);
            opacity: 0.6;
            border-radius: inherit;
        }

        .wallet-icon i {
            font-size: 40px;
            color: white;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
            position: relative;
            z-index: 2;
        }

        @keyframes floatWallet {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }

        /* ========== الشارات ========== */
        .badge {
            @apply px-2 py-1 rounded-full text-xs font-bold;
        }

        .badge-primary {
            @apply badge;
            background: rgba(59, 130, 246, 0.2);
            color: var(--primary);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .badge-success {
            @apply badge;
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge-warning {
            @apply badge;
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .badge-danger {
            @apply badge;
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.2);
            animation: pulseBadge 1.5s infinite;
        }

        @keyframes pulseBadge {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        /* ========== التبويبات ========== */
        .tab {
            @apply flex-1 py-2 px-1 text-center rounded-xl text-sm font-semibold transition-all;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
        }

        .tab.active {
            background: rgba(59, 130, 246, 0.2);
            color: var(--primary);
        }

        /* ========== طرق الدفع ========== */
        .payment-method {
            @apply flex items-center gap-3 p-3 rounded-xl cursor-pointer transition-all;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .payment-method:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .payment-method.selected {
            background: rgba(59, 130, 246, 0.2);
            border-color: var(--primary);
        }

        .payment-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            background: #334155;
            color: white;
            flex-shrink: 0;
        }

        /* ========== المتجر ========== */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        .product-card {
            @apply glass rounded-xl p-3 cursor-pointer transition-all;
        }

        .product-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .product-image {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
            background: #334155;
        }

        .discount-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--danger);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 12px;
            font-weight: bold;
        }

        .category-tab {
            @apply px-4 py-1.5 rounded-full text-sm whitespace-nowrap transition-all;
            background: rgba(255, 255, 255, 0.1);
        }

        .category-tab.active {
            background: var(--primary);
        }

        /* ========== سلة التسوق ========== */
        .cart-item {
            @apply flex gap-3 p-3 rounded-xl;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .cart-item-image {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
            background: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ========== المودال ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 24px;
            width: 100%;
            max-width: 450px;
            max-height: 85vh;
            overflow-y: auto;
            transform: scale(0.9) translateY(20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-overlay.open .modal-content {
            transform: scale(1) translateY(0);
        }

        /* ========== إعدادات ========== */
        .settings-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 24px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            border-radius: 30px 30px 0 0;
        }

        .settings-panel.open {
            transform: translateY(0);
        }

        .settings-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .settings-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .theme-toggle {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: var(--transition);
        }

        .theme-toggle:hover {
            background: rgba(40, 51, 69, 0.8);
        }

        /* ========== التبويغات (Toast) ========== */
        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 90%;
            max-width: 350px;
            pointer-events: none;
        }

        .toast {
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 14px 20px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: toastSlideUp 0.3s ease, toastFadeOut 0.3s ease 4.7s forwards;
            pointer-events: auto;
            direction: rtl;
            line-height: 1.6;
            border-right: 4px solid transparent;
        }

        .toast.success { border-right-color: var(--success); }
        .toast.error { border-right-color: var(--danger); }
        .toast.warning { border-right-color: var(--warning); }
        .toast.info { border-right-color: var(--primary); }

        .toast-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .toast.success .toast-icon { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .toast.error .toast-icon { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .toast.warning .toast-icon { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .toast.info .toast-icon { background: rgba(59, 130, 246, 0.2); color: var(--primary); }

        @keyframes toastSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastFadeOut {
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* ========== التمرير ========== */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* ========== الأدوات المساعدة ========== */
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .default-avatar {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            font-weight: bold;
        }

        .balance-badge {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 8px 18px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: 700;
        }

        /* ========== تجاوب ========== */
        @media (max-width: 380px) {
            .product-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .wallet-icon {
                width: 80px;
                height: 80px;
            }
            
            .wallet-icon i {
                font-size: 35px;
            }
        }
    </style>
</head>
<body>
    <!-- الخلفية المتحركة -->
    <div class="ambient-light">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- زر تغيير السمة -->
    <div class="theme-toggle" id="themeToggle">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
        <span class="text-sm">السمة</span>
    </div>

    <!-- الحاوية الرئيسية -->
    <div id="app" class="w-full max-w-md p-4 relative"></div>

    <!-- لوحة الإعدادات -->
    <div class="settings-overlay" id="settingsOverlay"></div>
    <div class="settings-panel" id="settingsPanel">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold">الإعدادات</h3>
            <button id="closeSettings" class="w-9 h-9 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
        <div class="space-y-5">
            <div class="flex items-center justify-between">
                <span class="text-gray-300">اللغة</span>
                <select class="bg-white/10 rounded-xl p-2.5 text-white border border-white/10 focus:border-blue-500 outline-none" id="languageSelect">
                    <option value="ar" class="bg-slate-800">العربية</option>
                    <option value="en" class="bg-slate-800">English</option>
                </select>
            </div>
            <div class="flex items-center justify-between">
                <span class="text-gray-300">الإشعارات</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" id="notificationsToggle" checked>
                    <div class="w-11 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600 transition-colors"></div>
                </label>
            </div>
            <div class="flex items-center justify-between">
                <span class="text-gray-300">التنبيه الصوتي</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" id="soundToggle" checked>
                    <div class="w-11 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600 transition-colors"></div>
                </label>
            </div>
            <div class="flex items-center justify-between">
                <span class="text-gray-300">الاهتزاز</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" id="vibrateToggle" checked>
                    <div class="w-11 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600 transition-colors"></div>
                </label>
            </div>
        </div>
    </div>

    <!-- حاوية التبويغات -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- المودال العام -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        (function() {
            'use strict';

            // ==================== الإعدادات الثابتة ====================
            const CONFIG = {
                ADMIN_ID: 7609492965, // ضع معرف المشرف هنا
                DEFAULT_BALANCE: 1000,
                MAX_TRANSACTIONS: 50,
                STORAGE_KEYS: {
                    WALLET: 'wallet_data',
                    PAYMENT_METHODS: 'payment_methods',
                    DEPOSIT_REQUESTS: 'deposit_requests',
                    WITHDRAWAL_REQUESTS: 'withdrawal_requests',
                    CATEGORIES: 'store_categories',
                    PRODUCTS: 'store_products',
                    ORDERS: 'store_orders',
                    CART: 'store_cart',
                    USERS: 'app_users',
                    SETTINGS: 'settings',
                    THEME: 'theme',
                    NOTIFICATIONS: 'notifications'
                }
            };

            // ==================== فائدة: معرف فريد ====================
            const generateId = (prefix = '') => 
                prefix + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

            // ==================== فائدة: التاريخ ====================
            const DateUtils = {
                today: () => new Date().toISOString().split('T')[0],
                format: (iso) => new Date(iso).toLocaleString('ar-EG')
            };

            // ==================== خدمة التخزين المحلي ====================
            class Storage {
                static get(key, defaultValue = null) {
                    try {
                        const item = localStorage.getItem(key);
                        return item ? JSON.parse(item) : defaultValue;
                    } catch {
                        return defaultValue;
                    }
                }

                static set(key, value) {
                    try {
                        localStorage.setItem(key, JSON.stringify(value));
                        return true;
                    } catch {
                        return false;
                    }
                }

                static remove(key) {
                    try {
                        localStorage.removeItem(key);
                        return true;
                    } catch {
                        return false;
                    }
                }
            }

            // ==================== نظام التبويغات ====================
            class Toast {
                constructor() {
                    this.container = document.getElementById('toastContainer') || this.createContainer();
                    this.soundEnabled = true;
                    this.vibrateEnabled = true;
                }

                createContainer() {
                    const div = document.createElement('div');
                    div.id = 'toastContainer';
                    div.className = 'toast-container';
                    document.body.appendChild(div);
                    return div;
                }

                show(message, type = 'info', duration = 5000) {
                    const toast = document.createElement('div');
                    toast.className = `toast ${type}`;
                    
                    const icons = {
                        success: 'fa-check-circle',
                        error: 'fa-exclamation-circle',
                        warning: 'fa-exclamation-triangle',
                        info: 'fa-info-circle'
                    };

                    toast.innerHTML = `
                        <div class="toast-icon"><i class="fa-solid ${icons[type] || icons.info}"></i></div>
                        <div class="toast-message">${message}</div>
                    `;

                    this.container.appendChild(toast);

                    if (this.soundEnabled && ['success', 'warning', 'info'].includes(type)) {
                        this.playSound(type);
                    }

                    if (this.vibrateEnabled && navigator.vibrate) {
                        navigator.vibrate(200);
                    }

                    setTimeout(() => toast.remove(), duration);
                }

                playSound(type) {
                    try {
                        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        const oscillator = audioCtx.createOscillator();
                        const gainNode = audioCtx.createGain();
                        
                        oscillator.connect(gainNode);
                        gainNode.connect(audioCtx.destination);
                        
                        oscillator.type = 'sine';
                        oscillator.frequency.value = type === 'success' ? 800 : (type === 'warning' ? 600 : 400);
                        gainNode.gain.value = 0.1;
                        
                        oscillator.start();
                        oscillator.stop(audioCtx.currentTime + 0.2);
                    } catch (e) {
                        console.warn('Audio not supported');
                    }
                }

                success(message) { this.show(message, 'success'); }
                error(message) { this.show(message, 'error'); }
                warning(message) { this.show(message, 'warning'); }
                info(message) { this.show(message, 'info'); }
            }

            // ==================== خدمة تيليجرام ====================
            class TelegramService {
                constructor() {
                    this.tg = window.Telegram?.WebApp || null;
                }

                get isAvailable() {
                    return !!this.tg;
                }

                init() {
                    if (!this.isAvailable) return false;
                    this.tg.expand();
                    this.tg.ready();
                    return true;
                }

                getUser() {
                    return this.tg?.initDataUnsafe?.user || null;
                }

                isValid() {
                    return this.isAvailable && !!this.tg?.initData;
                }

                close() {
                    this.tg?.close();
                }

                showPopup(params) {
                    this.tg?.showPopup(params);
                }

                setMainButton(text, color = '#3b82f6', textColor = '#ffffff', visible = true, callback = null) {
                    if (!this.tg) return;
                    const btn = this.tg.MainButton;
                    btn.setText(text);
                    btn.setColor(color);
                    btn.setTextColor(textColor);
                    visible ? btn.show() : btn.hide();
                    if (callback) btn.onClick(callback);
                }

                hideMainButton() {
                    this.tg?.MainButton.hide();
                }
            }

            class NotificationManager {
                constructor() {

                }

                add(userId, title, message, type = 'info') {
                    const notif = {
                        id: generateId('notif_'),
                        userId,
                        title,
                        message,
                        type,
                        read: false,
                        date: new Date().toISOString()
                    };
                    this.notifications.push(notif);
                    this.save();
                    window.dispatchEvent(new CustomEvent('newNotification', { detail: notif }));
                    return notif;
                }

                markAsRead(id) {
                    const notif = this.notifications.find(n => n.id === id);
                    if (notif) notif.read = true;
                    this.save();
                }

                markAllAsRead(userId) {
                    this.notifications.forEach(n => {
                        if (n.userId === userId && !n.read) n.read = true;
                    });
                    this.save();
                }

                getUserNotifications(userId) {
                    return this.notifications
                        .filter(n => n.userId === userId)
                        .sort((a, b) => new Date(b.date) - new Date(a.date));
                }

                getUnreadCount(userId) {
                    return this.notifications.filter(n => n.userId === userId && !n.read).length;
                }

                save() {
                    Storage.set(CONFIG.STORAGE_KEYS.NOTIFICATIONS, this.notifications);
                }
            }

                    this.cart = [];
                    
                    this.settings = { language: 'ar', notifications: true, sound: true, vibrate: true };
                    this.theme = 'dark';
                    
                    this._listeners = new Map();
                }

                set(key, value) {
                    if (this[key] !== undefined) {
                        this[key] = value;
                        this.emit(key, value);
                    }
                }

                on(event, callback) {
                    if (!this._listeners.has(event)) {
                        this._listeners.set(event, []);
                    }
                    this._listeners.get(event).push(callback);
                }

                emit(event, data) {
                    if (this._listeners.has(event)) {
                        this._listeners.get(event).forEach(cb => cb(data));
                    }
                }
            }

                // المحفظة
                saveWallet() {
                    Storage.set(CONFIG.STORAGE_KEYS.WALLET, {
                        balance: this.state.balance,
                        transactions: this.state.transactions
                    });
                }

                addTransaction(type, amount, note = '') {
                    const tx = {
                        id: generateId('tx_'),
                        type,
                        amount,
                        note,
                        date: new Date().toISOString()
                    };
                    this.state.transactions.unshift(tx);
                    if (this.state.transactions.length > CONFIG.MAX_TRANSACTIONS) {
                        this.state.transactions.pop();
                    }
                    this.saveWallet();
                    return tx;
                }

                // طلبات الشحن
                addDepositRequest(amount, methodId, transactionId, user) {
                    const method = this.state.paymentMethods.find(m => m.id === methodId);
                    const request = {
                        id: generateId('dep_'),
                        userId: user.id,
                        userName: `${user.first_name} ${user.last_name || ''}`.trim(),
                        amount,
                        method: method?.name || methodId,
                        methodId,
                        transactionId,
                        status: 'pending',
                        date: new Date().toISOString()
                    };
                    this.state.depositRequests.push(request);
                    this.saveDepositRequests();
                    
                    this.notifications.add(
                        CONFIG.ADMIN_ID,
                        '💰 طلب شحن جديد',
                        `من: ${request.userName}\nالمبلغ: ${amount}\nالطريقة: ${request.method}\nرقم العملية: ${transactionId}`,
                        'info'
                    );
                    
                    return request;
                }

                saveDepositRequests() {
                    Storage.set(CONFIG.STORAGE_KEYS.DEPOSIT_REQUESTS, this.state.depositRequests);
                }

                // طلبات السحب
                addWithdrawalRequest(amount, methodId, details, user) {
                    if (amount > this.state.balance) {
                        return { success: false, message: 'الرصيد غير كافٍ' };
                    }

                    const method = this.state.paymentMethods.find(m => m.id === methodId);
                    const request = {
                        id: generateId('with_'),
                        userId: user.id,
                        userName: `${user.first_name} ${user.last_name || ''}`.trim(),
                        amount,
                        method: method?.name || methodId,
                        methodId,
                        details,
                        status: 'pending',
                        date: new Date().toISOString()
                    };
                    this.state.withdrawalRequests.push(request);
                    this.saveWithdrawalRequests();

                    this.notifications.add(
                        CONFIG.ADMIN_ID,
                        '💸 طلب سحب جديد',
                        `من: ${request.userName}\nالمبلغ: ${amount}\nالطريقة: ${request.method}\nالتفاصيل: ${details}`,
                        'warning'
                    );

                    return { success: true, request };
                }

                saveWithdrawalRequests() {
                    Storage.set(CONFIG.STORAGE_KEYS.WITHDRAWAL_REQUESTS, this.state.withdrawalRequests);
                }

                // قبول/رفض الطلبات
                acceptRequest(request, type) {
                    if (type === 'deposit') {
                        const req = this.state.depositRequests.find(r => r.id === request.id);
                        if (req?.status === 'pending') {
                            req.status = 'approved';
                            this.state.balance += req.amount;
                            this.addTransaction('deposit', req.amount, `شحن عبر ${req.method}`);
                            this.saveWallet();
                            this.saveDepositRequests();
                            
                            this.notifications.add(
                                req.userId,
                                '✅ تم قبول الشحن',
                                `تم شحن ${req.amount} إلى محفظتك`,
                                'success'
                            );
                            return true;
                        }
                    } else if (type === 'withdrawal') {
                        const req = this.state.withdrawalRequests.find(r => r.id === request.id);
                        if (req?.status === 'pending' && this.state.balance >= req.amount) {
                            req.status = 'approved';
                            this.state.balance -= req.amount;
                            this.addTransaction('withdraw', -req.amount, `سحب عبر ${req.method}`);
                            this.saveWallet();
                            this.saveWithdrawalRequests();
                            
                            this.notifications.add(
                                req.userId,
                                '✅ تم قبول السحب',
                                `تم سحب ${req.amount} من محفظتك`,
                                'success'
                            );
                            return true;
                        }
                    }
                    return false;
                }

                rejectRequest(request, type) {
                    if (type === 'deposit') {
                        const req = this.state.depositRequests.find(r => r.id === request.id);
                        if (req) {
                            req.status = 'rejected';
                            this.saveDepositRequests();
                            this.notifications.add(req.userId, '❌ رفض الشحن', `تم رفض طلب الشحن بمبلغ ${req.amount}`, 'error');
                            return true;
                        }
                    } else if (type === 'withdrawal') {
                        const req = this.state.withdrawalRequests.find(r => r.id === request.id);
                        if (req) {
                            req.status = 'rejected';
                            this.saveWithdrawalRequests();
                            this.notifications.add(req.userId, '❌ رفض السحب', `تم رفض طلب السحب بمبلغ ${req.amount}`, 'error');
                            return true;
                        }
                    }
                    return false;
                }

                getPendingCount() {
                    return this.state.depositRequests.filter(r => r.status === 'pending').length +
                           this.state.withdrawalRequests.filter(r => r.status === 'pending').length;
                }

                // طرق الدفع
                addPaymentMethod(data) {
                    const method = { id: generateId('pm_'), ...data };
                    this.state.paymentMethods.push(method);
                    Storage.set(CONFIG.STORAGE_KEYS.PAYMENT_METHODS, this.state.paymentMethods);
                    return method;
                }

                updatePaymentMethod(id, data) {
                    const index = this.state.paymentMethods.findIndex(m => m.id === id);
                    if (index !== -1) {
                        this.state.paymentMethods[index] = { ...this.state.paymentMethods[index], ...data };
                        Storage.set(CONFIG.STORAGE_KEYS.PAYMENT_METHODS, this.state.paymentMethods);
                        return true;
                    }
                    return false;
                }

                deletePaymentMethod(id) {
                    this.state.paymentMethods = this.state.paymentMethods.filter(m => m.id !== id);
                    Storage.set(CONFIG.STORAGE_KEYS.PAYMENT_METHODS, this.state.paymentMethods);
                }

                // المتجر
                saveCart(userId) {
                    if (!userId) return;
                    Storage.set(`${CONFIG.STORAGE_KEYS.CART}_${userId}`, this.state.cart);
                }

                loadCart(userId) {
                    if (!userId) return;
                    this.state.cart = Storage.get(`${CONFIG.STORAGE_KEYS.CART}_${userId}`, []);
                }

                addToCart(product, inputData = {}, quantity = 1) {
                    if (product.stock !== -1 && product.stock < quantity) {
                        return { success: false, message: 'الكمية غير متوفرة' };
                    }
                    const item = {
                        id: generateId('cart_'),
                        productId: product.id,
                        name: product.name,
                        price: product.price,
                        discount: product.discount || 0,
                        quantity,
                        inputData,
                        addedAt: new Date().toISOString()
                    };
                    this.state.cart.push(item);
                    this.saveCart(this.state.user?.id);
                    return { success: true, item };
                }

                removeFromCart(itemId) {
                    this.state.cart = this.state.cart.filter(i => i.id !== itemId);
                    this.saveCart(this.state.user?.id);
                }

                updateCartItem(itemId, quantity) {
                    const item = this.state.cart.find(i => i.id === itemId);
                    if (!item) return { success: false };
                    
                    const product = this.state.products.find(p => p.id === item.productId);
                    if (product?.stock !== -1 && product?.stock < quantity) {
                        return { success: false, message: 'الكمية غير متوفرة' };
                    }
                    
                    item.quantity = quantity;
                    this.saveCart(this.state.user?.id);
                    return { success: true };
                }

                clearCart() {
                    this.state.cart = [];
                    this.saveCart(this.state.user?.id);
                }

                createOrder(product, inputData, userId, quantity = 1) {
                    const order = {
                        id: generateId('ord_'),
                        userId,
                        productId: product.id,
                        productName: product.name,
                        price: product.price,
                        quantity,
                        total: product.price * quantity * (1 - (product.discount || 0) / 100),
                        status: product.fulfillmentData?.type === 'manual' ? 'pending' : 'confirmed',
                        inputData,
                        fulfillment: product.fulfillmentData,
                        createdAt: new Date().toISOString()
                    };
                    this.state.orders.push(order);
                    Storage.set(CONFIG.STORAGE_KEYS.ORDERS, this.state.orders);

                    if (product.stock !== -1) {
                        product.stock -= quantity;
                        this.saveProducts();
                    }

                    this.notifications.add(
                        CONFIG.ADMIN_ID,
                        '🛒 طلب متجر جديد',
                        `منتج: ${product.name}\nالكمية: ${quantity}\nالمستخدم: ${userId}`,
                        'info'
                    );

                    return order;
                }

                saveProducts() {
                    Storage.set(CONFIG.STORAGE_KEYS.PRODUCTS, this.state.products);
                }

                updateOrderStatus(orderId, status) {
                    const order = this.state.orders.find(o => o.id === orderId);
                    if (order) {
                        order.status = status;
                        Storage.set(CONFIG.STORAGE_KEYS.ORDERS, this.state.orders);
                        
                        this.notifications.add(
                            order.userId,
                            '🔄 تحديث الطلب',
                            `تم تحديث حالة طلب "${order.productName}" إلى ${status}`,
                            'info'
                        );
                        return true;
                    }
                    return false;
                }

                getUserOrders(userId) {
                    return this.state.orders
                        .filter(o => o.userId === userId)
                        .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                }

                // الإعدادات
                saveSettings() {
                    Storage.set(CONFIG.STORAGE_KEYS.SETTINGS, this.state.settings);
                }

                saveTheme() {
                    Storage.set(CONFIG.STORAGE_KEYS.THEME, this.state.theme);
                }
            }

                    const initials = (user.first_name[0] + (user.last_name?.[0] || '')).toUpperCase();
                    const unread = this.notifications.getUnreadCount(user.id);
                    const pending = this.data.getPendingCount();

                    this.app.innerHTML = `
                        <div class="space-y-5 animate-slide-up">
                            <!-- بطاقة المدير -->
                            <div class="glass-card p-5 relative overflow-hidden border-2 border-yellow-500/30">
                                <div class="absolute top-0 right-0 w-32 h-32 bg-yellow-500/10 rounded-full blur-2xl -mr-10 -mt-10"></div>
                                <div class="flex items-center gap-4 relative">
                                    <div class="w-16 h-16 rounded-2xl border border-white/10 overflow-hidden bg-slate-800 shadow-lg flex-shrink-0">
                                        ${user.photo_url ? 
                                            `<img src="${user.photo_url}" alt="Admin" class="w-full h-full object-cover">` : 
                                            `<div class="w-full h-full default-avatar">${initials}</div>`
                                        }
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <div class="flex items-center justify-between">
                                            <h2 class="text-lg font-bold truncate" title="${fullName}">${fullName}</h2>
                                            <div class="relative cursor-pointer" id="notificationBell">
                                                <i class="fa-regular fa-bell text-xl"></i>
                                                ${unread ? `<span class="notification-badge">${unread > 9 ? '9+' : unread}</span>` : ''}
                                            </div>
                                        </div>
                                        <p class="text-xs text-gray-400 font-mono mt-0.5">ID: ${user.id}</p>
                                        <div class="inline-flex items-center gap-1.5 mt-2 px-2 py-0.5 rounded-md bg-yellow-500/20 border border-yellow-500/30">
                                            <i class="fa-solid fa-crown text-yellow-400 text-[10px]"></i>
                                            <span class="text-[10px] font-bold text-yellow-300">مدير النظام</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- أيقونة المحفظة مع العداد -->
                            <div class="flex justify-center">
                                <div class="wallet-icon" id="walletIcon">
                                    <i class="fa-solid fa-wallet"></i>
                                    ${pending ? `<span class="notification-badge">${pending > 9 ? '9+' : pending}</span>` : ''}
                                </div>
                            </div>

                            <!-- الرصيد -->
                            <div class="flex justify-center">
                                <div class="balance-badge" id="balanceBadge">
                                    <i class="fa-solid fa-coins text-yellow-400"></i>
                                    <span>${this.state.balance.toLocaleString('ar-EG')}</span>
                                </div>
                            </div>

                            <!-- أزرار الإدارة -->
                            <div class="grid grid-cols-2 gap-3 mt-4">
                                <button id="openStoreBtn" class="glass-card p-4 flex flex-col items-center gap-2 hover:bg-white/5 transition-colors">
                                    <i class="fa-solid fa-store text-green-400 text-xl"></i>
                                    <span class="text-sm font-bold">المتجر</span>
                                </button>
                                <button id="openAdminPanelBtn" class="glass-card p-4 flex flex-col items-center gap-2 hover:bg-white/5 transition-colors relative">
                                    <i class="fa-solid fa-gears text-yellow-400 text-xl"></i>
                                    <span class="text-sm font-bold">الإدارة</span>
                                    ${pending ? `<span class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">${pending > 9 ? '9+' : pending}</span>` : ''}
                                </button>
                            </div>

                            <!-- إحصائيات سريعة -->
                            <div class="grid grid-cols-3 gap-2 mt-2">
                                <div class="glass-card p-3 text-center">
                                    <span class="text-gray-400 text-xs">شحن</span>
                                    <span class="text-white font-bold text-sm">${this.state.depositRequests.filter(r => r.status === 'pending').length}</span>
                                </div>
                                <div class="glass-card p-3 text-center">
                                    <span class="text-gray-400 text-xs">سحب</span>
                                    <span class="text-white font-bold text-sm">${this.state.withdrawalRequests.filter(r => r.status === 'pending').length}</span>
                                </div>
                                <div class="glass-card p-3 text-center">
                                    <span class="text-gray-400 text-xs">طلبات</span>
                                    <span class="text-white font-bold text-sm">${this.state.orders.length}</span>
                                </div>
                            </div>

                            <!-- زر الخروج -->
                            <button id="logoutBtn" class="w-full py-4 rounded-xl font-bold text-red-400 hover:bg-red-500/10 transition-all border border-transparent hover:border-red-500/20 flex items-center justify-center gap-2">
                                <i class="fa-solid fa-arrow-right-from-bracket"></i>
                                تسجيل الخروج
                            </button>
                        </div>
                    `;

                    this.bindEvents();
                    this.updateNotificationBadge();
                }

                updateBalanceDisplay() {
                    const span = document.querySelector('#balanceBadge span');
                    if (span) span.textContent = this.state.balance.toLocaleString('ar-EG');
                }

                updateNotificationBadge() {
                    const bell = document.getElementById('notificationBell');
                    if (!bell || !this.state.user) return;
                    
                    const count = this.notifications.getUnreadCount(this.state.user.id);
                    let badge = bell.querySelector('.notification-badge');
                    
                    if (count) {
                        if (!badge) {
                            badge = document.createElement('span');
                            badge.className = 'notification-badge';
                            bell.style.position = 'relative';
                            bell.appendChild(badge);
                        }
                        badge.textContent = count > 9 ? '9+' : count;
                    } else if (badge) {
                        badge.remove();
                    }
                }

                bindEvents() {
                    document.getElementById('logoutBtn')?.addEventListener('click', () => {
                        this.telegram.close();
                        this.toast.info('تم تسجيل الخروج');
                    });

                    document.getElementById('walletIcon')?.addEventListener('click', () => this.openWalletModal());
                    
                    document.getElementById('notificationBell')?.addEventListener('click', () => this.openNotificationsModal());
                    
                    document.getElementById('openStoreBtn')?.addEventListener('click', () => this.openStoreModal());
                    
                    document.getElementById('openOrdersBtn')?.addEventListener('click', () => this.openOrdersModal());
                    
                    document.getElementById('openAdminPanelBtn')?.addEventListener('click', () => this.openAdminModal());
                }

                // ========== المودالات ==========
                openModal(content) {
                    this.modalContent.innerHTML = content;
                    this.modal.classList.add('open');
                }

                closeModal() {
                    this.modal.classList.remove('open');
                }

                openWalletModal() {
                    const balance = this.state.balance;
                    const transactions = this.state.transactions;
                    
                    const txHtml = transactions.length ? transactions.map(tx => `
                        <div class="flex justify-between items-center p-3 border-b border-white/5">
                            <div>
                                <div class="font-medium">${tx.note || tx.type}</div>
                                <div class="text-xs text-gray-400">${DateUtils.format(tx.date)}</div>
                            </div>
                            <span class="${tx.amount > 0 ? 'text-green-400' : 'text-red-400'} font-bold">
                                ${tx.amount > 0 ? '+' : ''}${tx.amount}
                            </span>
                        </div>
                    `).join('') : '<p class="text-center text-gray-400 py-4">لا توجد معاملات</p>';

                    const methodsHtml = this.state.paymentMethods.map(m => `
                        <div class="payment-method" data-id="${m.id}">
                            <div class="payment-icon"><i class="${m.icon}"></i></div>
                            <div class="flex-1">
                                <div class="font-bold">${m.name}</div>
                                <div class="text-xs text-gray-400">${m.description || ''}</div>
                            </div>
                        </div>
                    `).join('');

                    this.openModal(`
                        <div class="flex justify-between items-center mb-5">
                            <h2 class="text-2xl font-bold">محفظتي</h2>
                            <button id="closeModalBtn" class="w-9 h-9 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="glass p-6 rounded-2xl text-center mb-4">
                            <div class="text-gray-400 text-sm mb-1">الرصيد الحالي</div>
                            <div class="text-3xl font-bold">${balance.toLocaleString('ar-EG')}</div>
                        </div>

                        <div class="flex gap-2 mb-4">
                            <button class="tab active" data-tab="deposit">إيداع</button>
                            <button class="tab" data-tab="withdraw">سحب</button>
                            <button class="tab" data-tab="history">السجل</button>
                        </div>

                        <div id="tab-deposit" class="tab-content">
                            <p class="text-sm text-gray-300 mb-3">اختر طريقة الدفع:</p>
                            <div class="space-y-2 mb-4">${methodsHtml}</div>
                            <div id="depositDetails" class="hidden glass p-3 rounded-xl mb-3 text-sm"></div>
                            <input type="text" id="depositTxId" placeholder="رقم العملية" class="w-full bg-slate-800 border border-white/10 rounded-xl p-3 mb-3 text-white">
                            <div class="flex gap-2">
                                <input type="number" id="depositAmount" placeholder="المبلغ" class="flex-1 bg-slate-800 border border-white/10 rounded-xl p-3 text-white">
                                <button id="depositBtn" class="bg-blue-600 px-5 rounded-xl font-bold">طلب</button>
                            </div>
                        </div>

                        <div id="tab-withdraw" class="tab-content hidden">
                            <p class="text-sm text-gray-300 mb-3">اختر طريقة السحب:</p>
                            <div class="space-y-2 mb-4" id="withdrawMethods">${methodsHtml}</div>
                            <input type="text" id="withdrawDetails" placeholder="التفاصيل" class="w-full bg-slate-800 border border-white/10 rounded-xl p-3 mb-3 text-white">
                            <div class="flex gap-2">
                                <input type="number" id="withdrawAmount" placeholder="المبلغ" class="flex-1 bg-slate-800 border border-white/10 rounded-xl p-3 text-white">
                                <button id="withdrawBtn" class="bg-red-600 px-5 rounded-xl font-bold">طلب</button>
                            </div>
                        </div>

                        <div id="tab-history" class="tab-content hidden">
                            <div class="max-h-80 overflow-y-auto">${txHtml}</div>
                        </div>
                    `);

                    document.getElementById('closeModalBtn').addEventListener('click', () => this.closeModal());
                    this.modal.addEventListener('click', (e) => {
                        if (e.target === this.modal) this.closeModal();
                    });

                    // تبويبات
                    const tabs = document.querySelectorAll('.tab');
                    tabs.forEach(tab => {
                        tab.addEventListener('click', () => {
                            tabs.forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');
                            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                            document.getElementById(`tab-${tab.dataset.tab}`).classList.remove('hidden');
                        });
                    });

                    // اختيار طريقة دفع للإيداع
                    let selectedMethod = null;
                    document.querySelectorAll('#tab-deposit .payment-method').forEach(m => {
                        m.addEventListener('click', () => {
                            document.querySelectorAll('#tab-deposit .payment-method').forEach(mm => mm.classList.remove('selected'));
                            m.classList.add('selected');
                            selectedMethod = m.dataset.id;
                            
                            const method = this.state.paymentMethods.find(p => p.id === selectedMethod);
                            const details = document.getElementById('depositDetails');
                            if (method?.depositDetails) {
                                details.innerHTML = method.depositDetails.replace(/\n/g, '<br>');
                                details.classList.remove('hidden');
                            } else {
                                details.classList.add('hidden');
                            }
                        });
                    });

                    document.getElementById('depositBtn').addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('depositAmount').value);
                        const txId = document.getElementById('depositTxId').value.trim();
                        
                        if (!amount || amount <= 0) return this.toast.error('أدخل مبلغ صحيح');
                        if (!selectedMethod) return this.toast.error('اختر طريقة دفع');
                        if (!txId) return this.toast.error('أدخل رقم العملية');
                        
                        this.data.addDepositRequest(amount, selectedMethod, txId, this.state.user);
                        this.toast.success('تم تقديم طلب الشحن');
                        this.closeModal();
                    });

                    // اختيار طريقة سحب
                    let selectedWithdrawMethod = null;
                    document.querySelectorAll('#withdrawMethods .payment-method').forEach(m => {
                        m.addEventListener('click', () => {
                            document.querySelectorAll('#withdrawMethods .payment-method').forEach(mm => mm.classList.remove('selected'));
                            m.classList.add('selected');
                            selectedWithdrawMethod = m.dataset.id;
                            
                            const method = this.state.paymentMethods.find(p => p.id === selectedWithdrawMethod);
                            const input = document.getElementById('withdrawDetails');
                            if (method?.withdrawDetails) {
                                input.placeholder = method.withdrawDetails;
                            }
                        });
                    });

                    document.getElementById('withdrawBtn').addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('withdrawAmount').value);
                        const details = document.getElementById('withdrawDetails').value.trim();
                        
                        if (!amount || amount <= 0) return this.toast.error('أدخل مبلغ صحيح');
                        if (!selectedWithdrawMethod) return this.toast.error('اختر طريقة سحب');
                        if (!details) return this.toast.error('أدخل التفاصيل');
                        
                        const result = this.data.addWithdrawalRequest(amount, selectedWithdrawMethod, details, this.state.user);
                        if (result.success) {
                            this.toast.success('تم تقديم طلب السحب');
                            this.closeModal();
                        } else {
                            this.toast.error(result.message);
                        }
                    });
                }

                openStoreModal() {
                    const categories = this.state.categories;
                    const products = this.state.products;
                    const cart = this.state.cart;

                    const catsHtml = categories.map(c => `
                        <button class="category-tab" data-cat="${c.id}">${c.name}</button>
                    `).join('');

                    const productsHtml = products.map(p => {
                        const inCart = cart.some(i => i.productId === p.id);
                        const finalPrice = p.price * (1 - (p.discount || 0) / 100);
                        return `
                            <div class="product-card relative" data-id="${p.id}">
                                ${p.discount ? `<span class="discount-badge">-${p.discount}%</span>` : ''}
                                <div class="w-full h-24 bg-gradient-to-br from-blue-500/20 to-purple-500/20 rounded-xl flex items-center justify-center mb-2">
                                    <i class="${p.icon} text-3xl text-blue-400"></i>
                                </div>
                                <h3 class="font-bold text-sm mb-1">${p.name}</h3>
                                <div class="flex items-center gap-1 text-xs mb-2">
                                    <i class="fa-solid fa-star text-yellow-400"></i>
                                    <span>${p.rating || '0'}</span>
                                    <span class="text-gray-400">(${p.reviewCount || '0'})</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <div>
                                        ${p.discount ? `<span class="text-xs text-gray-400 line-through ml-1">${p.price}</span>` : ''}
                                        <span class="text-blue-400 font-bold">${finalPrice}</span>
                                    </div>
                                    <button class="cart-btn ${inCart ? 'bg-green-600' : 'bg-blue-600'} text-white px-2 py-1 rounded-lg text-xs" data-id="${p.id}">
                                        ${inCart ? '✓' : '➕'}
                                    </button>
                                </div>
                            </div>
                        `;
                    }).join('') || '<p class="col-span-2 text-center text-gray-400 py-8">لا توجد منتجات</p>';

                    const cartHtml = cart.map(item => {
                        const total = item.price * item.quantity * (1 - (item.discount || 0)/100);
                        return `
                            <div class="cart-item" data-id="${item.id}">
                                <div class="cart-item-image">
                                    <i class="fa-solid fa-box text-blue-400 text-xl"></i>
                                </div>
                                <div class="flex-1">
                                    <div class="flex justify-between">
                                        <span class="font-bold text-sm">${item.name}</span>
                                        <button class="remove-cart text-red-400 text-xs"><i class="fa-solid fa-trash"></i></button>
                                    </div>
                                    <div class="text-xs text-gray-400">الكمية: ${item.quantity}</div>
                                    <div class="flex justify-between items-center mt-1">
                                        <span class="text-blue-400">${total.toFixed(2)}</span>
                                        <div class="flex gap-1">
                                            <button class="qty-down bg-white/10 px-2 rounded text-xs">-</button>
                                            <span class="text-xs">${item.quantity}</span>
                                            <button class="qty-up bg-white/10 px-2 rounded text-xs">+</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('') || '<p class="text-center text-gray-400 py-4">السلة فارغة</p>';

                    const cartTotal = cart.reduce((s, i) => s + i.price * i.quantity * (1 - (i.discount || 0)/100), 0);

                    this.openModal(`
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-2xl font-bold">المتجر</h2>
                            <button id="closeModalBtn" class="w-9 h-9 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="flex gap-2 mb-4 overflow-x-auto pb-2">
                            <button class="category-tab active" data-cat="all">الكل</button>
                            ${catsHtml}
                        </div>

                        <input type="text" id="searchProducts" placeholder="🔍 بحث..." class="w-full bg-slate-800 border border-white/10 rounded-xl p-3 mb-4 text-white">

                        <div class="product-grid max-h-64 overflow-y-auto p-1 mb-4" id="productsGrid">
                            ${productsHtml}
                        </div>

                        <div class="glass p-4 rounded-2xl">
                            <h3 class="font-bold mb-2 flex items-center gap-2">
                                <i class="fa-solid fa-cart-shopping"></i> سلة التسوق
                                <span class="bg-blue-600 text-xs px-2 py-0.5 rounded-full">${cart.length}</span>
                            </h3>
                            <div id="cartItems" class="max-h-48 overflow-y-auto mb-2">
                                ${cartHtml}
                            </div>
                            <div class="flex justify-between items-center pt-2 border-t border-white/10">
                                <span>المجموع:</span>
                                <span class="font-bold text-blue-400" id="cartTotal">${cartTotal.toFixed(2)}</span>
                            </div>
                            <button id="checkoutBtn" class="w-full mt-3 bg-green-600 py-3 rounded-xl font-bold ${!cart.length ? 'opacity-50' : ''}" ${!cart.length ? 'disabled' : ''}>
                                إتمام الشراء
                            </button>
                        </div>
                    `);

                    document.getElementById('closeModalBtn').addEventListener('click', () => this.closeModal());
                    this.modal.addEventListener('click', (e) => {
                        if (e.target === this.modal) this.closeModal();
                    });

                    // فلترة
                    const filterProducts = () => {
                        const cat = document.querySelector('.category-tab.active')?.dataset.cat || 'all';
                        const search = document.getElementById('searchProducts')?.value.toLowerCase() || '';
                        
                        const filtered = products.filter(p => 
                            (cat === 'all' || p.categoryId === cat) &&
                            (p.name.toLowerCase().includes(search) || p.description?.toLowerCase().includes(search))
                        );

                        const html = filtered.map(p => {
                            const inCart = cart.some(i => i.productId === p.id);
                            const finalPrice = p.price * (1 - (p.discount || 0) / 100);
                            return `
                                <div class="product-card relative" data-id="${p.id}">
                                    ${p.discount ? `<span class="discount-badge">-${p.discount}%</span>` : ''}
                                    <div class="w-full h-24 bg-gradient-to-br from-blue-500/20 to-purple-500/20 rounded-xl flex items-center justify-center mb-2">
                                        <i class="${p.icon} text-3xl text-blue-400"></i>
                                    </div>
                                    <h3 class="font-bold text-sm mb-1">${p.name}</h3>
                                    <div class="flex items-center gap-1 text-xs mb-2">
                                        <i class="fa-solid fa-star text-yellow-400"></i>
                                        <span>${p.rating || '0'}</span>
                                        <span class="text-gray-400">(${p.reviewCount || '0'})</span>
                                    </div>
                                    <div class="flex justify-between items-center">
                                        <div>
                                            ${p.discount ? `<span class="text-xs text-gray-400 line-through ml-1">${p.price}</span>` : ''}
                                            <span class="text-blue-400 font-bold">${finalPrice}</span>
                                        </div>
                                        <button class="cart-btn ${inCart ? 'bg-green-600' : 'bg-blue-600'} text-white px-2 py-1 rounded-lg text-xs" data-id="${p.id}">
                                            ${inCart ? '✓' : '➕'}
                                        </button>
                                    </div>
                                </div>
                            `;
                        }).join('') || '<p class="col-span-2 text-center text-gray-400 py-8">لا توجد منتجات</p>';
                        
                        document.getElementById('productsGrid').innerHTML = html;
                        bindProductEvents();
                    };

                    const bindProductEvents = () => {
                        document.querySelectorAll('.product-card').forEach(card => {
                            card.addEventListener('click', (e) => {
                                if (e.target.classList.contains('cart-btn')) return;
                                this.showProductDetails(card.dataset.id);
                            });
                        });

                        document.querySelectorAll('.cart-btn').forEach(btn => {
                            btn.addEventListener('click', (e) => {
                                e.stopPropagation();
                                const id = btn.dataset.id;
                                const product = products.find(p => p.id === id);
                                if (!product) return;

                                const existing = cart.find(i => i.productId === id);
                                if (existing) {
                                    this.data.removeFromCart(existing.id);
                                    this.toast.info('تمت الإزالة من السلة');
                                } else {
                                    this.data.addToCart(product, {}, 1);
                                    this.toast.success('تمت الإضافة للسلة');
                                }
                                filterProducts();
                                this.updateCartDisplay();
                            });
                        });
                    };

                    document.querySelectorAll('.category-tab').forEach(tab => {
                        tab.addEventListener('click', () => {
                            document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');
                            filterProducts();
                        });
                    });

                    document.getElementById('searchProducts').addEventListener('input', filterProducts);

                    const updateCartDisplay = () => {
                        const newCart = this.state.cart;
                        const html = newCart.map(item => {
                            const total = item.price * item.quantity * (1 - (item.discount || 0)/100);
                            return `
                                <div class="cart-item" data-id="${item.id}">
                                    <div class="cart-item-image">
                                        <i class="fa-solid fa-box text-blue-400 text-xl"></i>
                                    </div>
                                    <div class="flex-1">
                                        <div class="flex justify-between">
                                            <span class="font-bold text-sm">${item.name}</span>
                                            <button class="remove-cart text-red-400 text-xs"><i class="fa-solid fa-trash"></i></button>
                                        </div>
                                        <div class="text-xs text-gray-400">الكمية: ${item.quantity}</div>
                                        <div class="flex justify-between items-center mt-1">
                                            <span class="text-blue-400">${total.toFixed(2)}</span>
                                            <div class="flex gap-1">
                                                <button class="qty-down bg-white/10 px-2 rounded text-xs">-</button>
                                                <span class="text-xs">${item.quantity}</span>
                                                <button class="qty-up bg-white/10 px-2 rounded text-xs">+</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            `;
                        }).join('') || '<p class="text-center text-gray-400 py-4">السلة فارغة</p>';
                        
                        const newTotal = newCart.reduce((s, i) => s + i.price * i.quantity * (1 - (i.discount || 0)/100), 0);
                        
                        document.getElementById('cartItems').innerHTML = html;
                        document.getElementById('cartTotal').textContent = newTotal.toFixed(2);
                        
                        const btn = document.getElementById('checkoutBtn');
                        if (newCart.length) {
                            btn.disabled = false;
                            btn.classList.remove('opacity-50');
                        } else {
                            btn.disabled = true;
                            btn.classList.add('opacity-50');
                        }

                        bindCartEvents();
                    };

                    const bindCartEvents = () => {
                        document.querySelectorAll('.remove-cart').forEach(btn => {
                            btn.addEventListener('click', () => {
                                const id = btn.closest('.cart-item').dataset.id;
                                this.data.removeFromCart(id);
                                filterProducts();
                                updateCartDisplay();
                                this.toast.info('تمت الإزالة');
                            });
                        });

                        document.querySelectorAll('.qty-up').forEach(btn => {
                            btn.addEventListener('click', () => {
                                const id = btn.closest('.cart-item').dataset.id;
                                const item = cart.find(i => i.id === id);
                                if (item) {
                                    this.data.updateCartItem(id, item.quantity + 1);
                                    filterProducts();
                                    updateCartDisplay();
                                }
                            });
                        });

                        document.querySelectorAll('.qty-down').forEach(btn => {
                            btn.addEventListener('click', () => {
                                const id = btn.closest('.cart-item').dataset.id;
                                const item = cart.find(i => i.id === id);
                                if (item && item.quantity > 1) {
                                    this.data.updateCartItem(id, item.quantity - 1);
                                } else if (item && item.quantity === 1) {
                                    this.data.removeFromCart(id);
                                }
                                filterProducts();
                                updateCartDisplay();
                            });
                        });
                    };

                    document.getElementById('checkoutBtn').addEventListener('click', () => {
                        if (!cart.length) return;
                        
                        const total = cart.reduce((s, i) => s + i.price * i.quantity * (1 - (i.discount || 0)/100), 0);
                        
                        if (total > this.state.balance) {
                            return this.toast.error('الرصيد غير كافٍ');
                        }

                        for (const item of cart) {
                            const product = products.find(p => p.id === item.productId);
                            if (product?.stock !== -1 && product?.stock < item.quantity) {
                                return this.toast.error(`${product.name} غير متوفر`);
                            }
                        }

                        this.state.balance -= total;
                        this.data.saveWallet();

                        cart.forEach(item => {
                            const product = products.find(p => p.id === item.productId);
                            this.data.createOrder(product, item.inputData || {}, this.state.user.id, item.quantity);
                        });

                        this.data.clearCart();
                        this.toast.success('تم الشراء بنجاح');
                        this.closeModal();
                        this.updateBalanceDisplay();
                    });

                    bindProductEvents();
                    bindCartEvents();
                }

                showProductDetails(productId) {

                    const fieldsHtml = (product.inputFields || []).map(f => `

                    const finalPrice = product.price * (1 - (product.discount || 0)/100);

                    this.openModal(`
