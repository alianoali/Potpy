<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Catcher Pro</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #3b82f6;
            --accent: #8b5cf6;
            --bg-dark: #0f172a;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--tg-theme-bg-color, var(--bg-dark));
            color: var(--tg-theme-text-color, #ffffff);
            overflow: hidden; /* منع التمرير أثناء اللعب */
            touch-action: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* خلفية متحركة احترافية */
        .cyber-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            perspective: 500px;
            transform-style: preserve-3d;
            z-index: -2;
            opacity: 0.3;
        }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.5;
            animation: floatOrb 10s infinite ease-in-out alternate;
        }
        @keyframes floatOrb {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 50px); }
        }

        /* تأثيرات الزجاج */
        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* Canvas Styling */
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 16px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }

        .neon-text {
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.8), 0 0 20px rgba(59, 130, 246, 0.4);
        }
        
        .hidden-content { display: none !important; }
        
        /* Animations */
        .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="h-screen w-full flex flex-col relative">

    <!-- Background Effects -->
    <div class="cyber-grid"></div>
    <div class="orb" style="top: -10%; right: -10%; width: 300px; height: 300px; background: #3b82f6;"></div>
    <div class="orb" style="bottom: -10%; left: -10%; width: 250px; height: 250px; background: #8b5cf6; animation-delay: -5s;"></div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard" class="flex-1 flex flex-col items-center justify-center p-6 z-10 transition-opacity duration-500">
        <div class="glass-panel p-8 rounded-3xl w-full max-w-md text-center pop-in">
            <div class="w-24 h-24 mx-auto bg-gradient-to-tr from-blue-600 to-purple-600 rounded-full flex items-center justify-center shadow-lg shadow-blue-500/30 mb-6 animate-pulse">
                <i class="fa-solid fa-gamepad text-4xl text-white"></i>
            </div>
            
            <h1 class="text-3xl font-black text-white mb-2 neon-text">سايبر كاتشر</h1>
            <p class="text-gray-400 text-sm mb-8 leading-relaxed">
                مهمة لجمع البيانات المشفرة.<br>تجنب الفيروسات الحمراء واجمع الماس الأزرق!
            </p>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-slate-800/50 p-4 rounded-2xl border border-white/5">
                    <span class="block text-xs text-gray-500 mb-1">أعلى نتيجة</span>
                    <span id="highScoreDisplay" class="text-xl font-bold text-yellow-400">0</span>
                </div>
                <div class="bg-slate-800/50 p-4 rounded-2xl border border-white/5">
                    <span class="block text-xs text-gray-500 mb-1">الحالة</span>
                    <span class="text-xl font-bold text-green-400">متصل</span>
                </div>
            </div>

            <button onclick="openGame()" class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white rounded-xl font-bold text-lg shadow-lg shadow-blue-600/30 transform transition-all active:scale-95 flex items-center justify-center gap-3 group">
                <span>ابدأ المهمة</span>
                <i class="fa-solid fa-rocket group-hover:-translate-y-1 transition-transform"></i>
            </button>
        </div>
    </div>

    <!-- GAME OVERLAY -->
    <div id="gameOverlay" class="fixed inset-0 z-50 bg-[#0f172a] hidden-content flex flex-col">
        <!-- HUD -->
        <div class="absolute top-0 left-0 w-full p-4 flex justify-between items-start z-20 pointer-events-none">
            <div class="flex flex-col">
                <span class="text-[10px] text-gray-400 uppercase tracking-widest">النقاط</span>
                <span id="scoreEl" class="text-4xl font-black text-white neon-text">0</span>
            </div>
            
            <!-- Health Bar -->
            <div class="w-32 mt-2">
                <div class="flex justify-between text-[10px] text-gray-400 mb-1">
                    <span>الدرع</span>
                    <span id="healthText">100%</span>
                </div>
                <div class="h-2 bg-slate-800 rounded-full overflow-hidden border border-slate-700">
                    <div id="healthBar" class="h-full bg-gradient-to-l from-green-400 to-emerald-500 w-full transition-all duration-200"></div>
                </div>
            </div>

            <button onclick="closeGame()" class="pointer-events-auto w-10 h-10 rounded-full bg-white/10 backdrop-blur flex items-center justify-center hover:bg-white/20 transition-colors border border-white/10">
                <i class="fa-solid fa-pause text-white"></i>
            </button>
        </div>

        <!-- Game Area -->
        <div class="flex-1 relative overflow-hidden p-4 flex items-center justify-center">
            <canvas id="gameCanvas"></canvas>

            <!-- Start Screen inside Canvas -->
            <div id="startScreen" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/80 backdrop-blur-sm z-30">
                <div class="text-center pop-in">
                    <i class="fa-solid fa-shield-halved text-6xl text-blue-500 mb-4 drop-shadow-[0_0_15px_rgba(59,130,246,0.5)]"></i>
                    <h2 class="text-2xl font-bold text-white mb-6">هل أنت جاهز؟</h2>
                    <button onclick="startGame()" class="px-10 py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-full font-bold shadow-[0_0_20px_rgba(37,99,235,0.5)] transition-all transform hover:scale-105 active:scale-95">
                        اضغط للبدء
                    </button>
                </div>
            </div>

            <!-- Game Over Screen -->
            <div id="gameOverScreen" class="hidden-content absolute inset-0 flex flex-col items-center justify-center bg-slate-900/95 backdrop-blur-md z-40">
                <div class="text-center pop-in">
                    <div class="text-6xl mb-4 animate-bounce">💀</div>
                    <h2 class="text-3xl font-black text-white mb-2">فشلت المهمة</h2>
                    <div class="my-6 bg-slate-800/50 p-4 rounded-2xl border border-white/5">
                        <p class="text-gray-400 text-xs uppercase tracking-wider">النتيجة النهائية</p>
                        <p id="finalScore" class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 mt-2">0</p>
                    </div>
                    <div class="flex gap-3 justify-center mt-6">
                        <button onclick="closeGame()" class="px-6 py-3 bg-slate-700 text-white rounded-xl font-bold hover:bg-slate-600 transition-colors">خروج</button>
                        <button onclick="startGame()" class="px-8 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg hover:bg-blue-500 transition-colors">إعادة</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        // --- INITIALIZATION ---
        function init() {
            tg.expand();
            tg.ready();
            // Load High Score
            const savedScore = localStorage.getItem('cyberCatcher_highScore');
            if(savedScore) document.getElementById('highScoreDisplay').innerText = savedScore;
        }
        init();

        // --- AUDIO SYSTEM (Procedural Sound Synthesis) ---
        // لا يحتاج لملفات خارجية، يولد الصوت باستخدام المتصفح
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            if (type === 'coin') {
                // صوت عملة معدنية نقي
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, now);
                osc.frequency.exponentialRampToValueAtTime(1800, now + 0.1);
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'hit') {
                // صوت ضرر خشن
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'over') {
                // صوت نهاية اللعبة
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.linearRampToValueAtTime(50, now + 0.6);
                gainNode.gain.setValueAtTime(0.4, now);
                gainNode.gain.linearRampToValueAtTime(0.01, now + 0.6);
                osc.start(now);
                osc.stop(now + 0.6);
            }
        }

        // --- GAME ENGINE ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreEl');
        const finalScoreEl = document.getElementById('finalScore');
        const healthBar = document.getElementById('healthBar');
        const healthText = document.getElementById('healthText');
        
        let gameState = {
            isPlaying: false,
            score: 0,
            health: 100,
            frames: 0,
            difficulty: 1,
            width: 0,
            height: 0
        };

        let player = { x: 0, y: 0, width: 70, targetX: 0 };
        let items = [];
        let particles = [];
        let animationId;

        // Resize Handling
        function resize() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            gameState.width = canvas.width;
            gameState.height = canvas.height;
            player.y = canvas.height - 60;
            player.x = canvas.width / 2;
            player.targetX = canvas.width / 2;
        }
        window.addEventListener('resize', resize);

        // Input Handling
        function handleInput(clientX) {
            const rect = canvas.getBoundingClientRect();
            player.targetX = clientX - rect.left;
        }
        canvas.addEventListener('mousemove', e => handleInput(e.clientX));
        canvas.addEventListener('touchmove', e => {
            e.preventDefault(); // Prevent scrolling
            handleInput(e.touches[0].clientX);
        }, { passive: false });

        // --- CLASSES ---
        class Particle {
            constructor(x, y, color, speed) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * speed;
                this.vx = Math.cos(angle) * velocity;
                this.vy = Math.sin(angle) * velocity;
                this.life = 1.0;
                this.decay = Math.random() * 0.03 + 0.02;
                this.size = Math.random() * 3 + 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                this.size *= 0.95;
            }
            draw(ctx) {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        class Item {
            constructor() {
                this.radius = 15;
                this.x = Math.random() * (gameState.width - 40) + 20;
                this.y = -30;
                // Physics with randomness
                this.speedY = (Math.random() * 2 + 3) + (gameState.difficulty * 0.4);
                this.rotation = 0;
                this.rotSpeed = (Math.random() - 0.5) * 0.1;
                
                // 25% chance for bomb, increases with difficulty
                this.isBomb = Math.random() < Math.min(0.25 + (gameState.difficulty * 0.02), 0.45);
            }

            update() {
                this.y += this.speedY;
                this.rotation += this.rotSpeed;
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // Glow Effect
                ctx.shadowBlur = 15;
                
                if (this.isBomb) {
                    // Draw Bomb (Red Triangle)
                    ctx.shadowColor = '#ef4444';
                    ctx.fillStyle = '#ef4444';
                    ctx.beginPath();
                    ctx.moveTo(0, -12);
                    ctx.lineTo(10, 8);
                    ctx.lineTo(-10, 8);
                    ctx.closePath();
                    ctx.fill();
                    
                    // Inner Detail
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(0, 2, 3, 0, Math.PI*2);
                    ctx.fill();
                } else {
                    // Draw Diamond (Blue Gem)
                    ctx.shadowColor = '#3b82f6';
                    ctx.fillStyle = '#3b82f6';
                    ctx.beginPath();
                    ctx.moveTo(0, -14);
                    ctx.lineTo(12, 0);
                    ctx.lineTo(0, 14);
                    ctx.lineTo(-12, 0);
                    ctx.closePath();
                    ctx.fill();
                    
                    // Shine
                    ctx.fillStyle = '#bfdbfe';
                    ctx.beginPath();
                    ctx.moveTo(0, -14);
                    ctx.lineTo(4, -6);
                    ctx.lineTo(0, -2);
                    ctx.lineTo(-4, -6);
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        // --- CORE FUNCTIONS ---
        function createExplosion(x, y, color) {
            for(let i=0; i<15; i++) {
                particles.push(new Particle(x, y, color, 4));
            }
        }

        function shakeScreen() {
            canvas.style.transform = `translate(${Math.random()*10-5}px, ${Math.random()*10-5}px)`;
            setTimeout(() => canvas.style.transform = 'none', 50);
        }

        function startGame() {
            resize();
            gameState.isPlaying = true;
            gameState.score = 0;
            gameState.health = 100;
            gameState.difficulty = 1;
            gameState.frames = 0;
            items = [];
            particles = [];
            
            scoreEl.innerText = '0';
            updateHealthUI();
            
            document.getElementById('startScreen').classList.add('hidden-content');
            document.getElementById('gameOverScreen').classList.add('hidden-content');
            
            // Haptic Start
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            
            loop();
        }

        function endGame() {
            gameState.isPlaying = false;
            cancelAnimationFrame(animationId);
            playSound('over');
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            
            finalScoreEl.innerText = gameState.score;
            
            // Save High Score
            const currentHigh = localStorage.getItem('cyberCatcher_highScore') || 0;
            if(gameState.score > currentHigh) {
                localStorage.setItem('cyberCatcher_highScore', gameState.score);
                document.getElementById('highScoreDisplay').innerText = gameState.score;
            }

            document.getElementById('gameOverScreen').classList.remove('hidden-content');
        }

        function updateHealthUI() {
            healthBar.style.width = Math.max(0, gameState.health) + '%';
            healthText.innerText = Math.max(0, gameState.health) + '%';
            
            if(gameState.health > 50) healthBar.className = "h-full w-full transition-all duration-200 bg-gradient-to-l from-green-400 to-emerald-500";
            else if(gameState.health > 25) healthBar.className = "h-full w-full transition-all duration-200 bg-gradient-to-l from-yellow-400 to-orange-500";
            else healthBar.className = "h-full w-full transition-all duration-200 bg-red-600 animate-pulse";
        }

        function openGame() {
            document.getElementById('gameOverlay').classList.remove('hidden-content');
            document.getElementById('gameOverlay').style.display = 'flex';
            resize();
        }

        function closeGame() {
            gameState.isPlaying = false;
            cancelAnimationFrame(animationId);
            document.getElementById('gameOverlay').classList.add('hidden-content');
            document.getElementById('gameOverlay').style.display = 'none';
        }

        function loop() {
            if (!gameState.isPlaying) return;

            // Clear Canvas with Trail Effect
            ctx.fillStyle = 'rgba(15, 23, 42, 0.2)'; // Creates trails
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update Player (Smooth Movement)
            player.x += (player.targetX - player.x) * 0.15;
            
            // Draw Player (Futuristic Paddle)
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#6366f1';
            ctx.fillStyle = '#6366f1';
            ctx.beginPath();
            ctx.roundRect(player.x - 35, player.y, 70, 12, 6);
            ctx.fill();
            
            // Engine Glow
            ctx.fillStyle = '#a5b4fc';
            ctx.fillRect(player.x - 25, player.y + 12, 50, 4);
            ctx.shadowBlur = 0;

            // Spawn Items
            if (gameState.frames % Math.max(20, 60 - gameState.difficulty * 2) === 0) {
                items.push(new Item());
            }

            // Update & Draw Items
            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                item.update();
                item.draw(ctx);

                // Collision Detection
                let dx = item.x - player.x;
                let dy = item.y - (player.y + 5);
                let distance = Math.sqrt(dx*dx + dy*dy);

                if (distance < item.radius + 30 && item.y > player.y - 10 && item.y < player.y + 20) {
                    // Hit!
                    if (item.isBomb) {
                        gameState.health -= 25;
                        playSound('hit');
                        shakeScreen();
                        createExplosion(item.x, item.y, '#ef4444');
                        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
                        
                        updateHealthUI();
                        if (gameState.health <= 0) { endGame(); return; }
                    } else {
                        gameState.score += 10;
                        scoreEl.innerText = gameState.score;
                        playSound('coin');
                        createExplosion(item.x, item.y, '#3b82f6');
                        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                        
                        // Increase Difficulty every 50 points
                        if (gameState.score % 50 === 0) gameState.difficulty++;
                    }
                    items.splice(i, 1);
                    continue;
                }

                // Remove if out of screen
                if (item.y > canvas.height) {
                    items.splice(i, 1);
                }
            }

            // Update & Draw Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update();
                p.draw(ctx);
                if (p.life <= 0) particles.splice(i, 1);
            }

            gameState.frames++;
            animationId = requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
