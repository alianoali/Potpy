<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>البوابة الملكية | Royal Gateway</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                        amiri: ['Amiri', 'serif'],
                    },
                    colors: {
                        // Ultra Luxury Palette
                        royal: {
                            black: '#030303',
                            charcoal: '#0a0a0a',
                            gold: {
                                light: '#FDF6D6',
                                DEFAULT: '#D4AF37',
                                dark: '#AA8820',
                                metallic: '#BF953F',
                            }
                        }
                    },
                    animation: {
                        'float': 'float 12s ease-in-out infinite',
                        'pulse-slow': 'pulse 6s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'shimmer': 'shimmer 3s linear infinite',
                        'fade-in-up': 'fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                            '50%': { transform: 'translateY(-20px) rotate(2deg)' },
                        },
                        shimmer: {
                            '0%': { backgroundPosition: '-200% center' },
                            '100%': { backgroundPosition: '200% center' }
                        },
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(40px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    },
                    backgroundImage: {
                        'gold-metallic': 'linear-gradient(135deg, #BF953F 0%, #FCF6BA 25%, #B38728 50%, #FBF5B7 75%, #AA771C 100%)',
                        'aurora-glow': 'conic-gradient(from 180deg at 50% 50%, #000000 0deg, #1a1a1a 180deg, #000000 360deg)',
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --glass-surface: rgba(20, 20, 20, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --gold-glow: 0 0 40px rgba(212, 175, 55, 0.15);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #000000;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Premium Gold Text */
        .text-gold-premium {
            background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200% auto;
            animation: shimmer 5s linear infinite;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        /* Ultra Glassmorphism Card */
        .luxury-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .luxury-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.5), transparent);
            opacity: 0.5;
        }

        .luxury-card:hover {
            transform: translateY(-5px);
            border-color: rgba(212, 175, 55, 0.3);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 20px rgba(212, 175, 55, 0.1);
        }

        /* Ambient Background Mesh */
        .ambient-mesh {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #111111 0%, #000000 100%);
            overflow: hidden;
        }
        
        .mesh-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 15s infinite ease-in-out;
        }
        .orb-1 { top: -10%; right: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, #D4AF37, transparent 70%); animation-delay: 0s; }
        .orb-2 { bottom: -10%; left: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, #5c4d18, transparent 70%); animation-delay: -5s; }
        .orb-3 { top: 40%; left: 50%; transform: translateX(-50%); width: 40vw; height: 40vw; background: radial-gradient(circle, #2a2a2a, transparent 70%); opacity: 0.2; animation-delay: -10s; }

        /* Loader */
        .loader-container {
            perspective: 1000px;
        }
        .loader-ring {
            width: 80px;
            height: 80px;
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-top: 2px solid #D4AF37;
            border-radius: 50%;
            animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        /* Toast Notification */
        .toast {
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid rgba(212, 175, 55, 0.3);
            backdrop-filter: blur(16px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border-right: 3px solid #D4AF37;
            animation: slideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .hidden-view { display: none !important; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #D4AF37; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col items-center justify-start p-6 relative selection:bg-yellow-900 selection:text-white">

    <!-- Ambient Background -->
    <div class="ambient-mesh">
        <div class="mesh-orb orb-1"></div>
        <div class="mesh-orb orb-2"></div>
        <div class="mesh-orb orb-3"></div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] w-full max-w-xs pointer-events-none"></div>

    <!-- VIEW 1: LOADING (Cinematic) -->
    <div id="loadingView" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black transition-opacity duration-1000">
        <div class="loader-container mb-8">
            <div class="loader-ring"></div>
            <div class="absolute inset-0 flex items-center justify-center">
                <i class="fa-solid fa-crown text-gold-400 text-xl animate-pulse"></i>
            </div>
        </div>
        <h2 class="text-2xl font-amiri font-bold text-gold-premium tracking-[0.2em] uppercase mb-2">
            البوابة الملكية
        </h2>
        <p class="text-[10px] text-gray-500 font-mono tracking-[0.3em] opacity-70">SECURE CONNECTION ESTABLISHED</p>
        <div class="w-24 h-[1px] bg-gradient-to-r from-transparent via-gold-500 to-transparent mt-8"></div>
    </div>

    <!-- VIEW 2: ACCESS DENIED -->
    <div id="accessDeniedView" class="hidden-view w-full max-w-md flex flex-col items-center justify-center min-h-[80vh] fade-in-up">
        <div class="luxury-card p-10 rounded-[2.5rem] text-center w-full border-red-900/20 shadow-2xl relative">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-red-600 to-transparent"></div>
            <div class="w-24 h-24 bg-red-900/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-8 text-4xl shadow-inner border border-red-500/10">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h2 class="text-3xl font-amiri font-bold mb-4 text-white">دخول مرفوض</h2>
            <p class="text-gray-400 mb-10 text-sm leading-relaxed px-4 font-light">
                يجب تشغيل هذا التطبيق حصراً من داخل عميل تيليجرام الرسمي لضمان الخصوصية والأمان العالي.
            </p>
            <button onclick="window.location.href='https://telegram.org'" class="w-full py-4 rounded-2xl font-bold text-black bg-gold-metallic hover:shadow-[0_0_40px_rgba(212,175,55,0.4)] transition-all transform hover:-translate-y-1 active:scale-95 flex items-center justify-center gap-3">
                <i class="fa-brands fa-telegram text-lg"></i>
                فتح تيليجرام
            </button>
        </div>
    </div>

    <!-- VIEW 3: DASHBOARD -->
    <div id="dashboardView" class="hidden-view w-full max-w-md space-y-8 pb-24 fade-in-up">
        
        <!-- Header Section -->
        <header class="flex items-center justify-between mb-4 pt-2">
            <div>
                <p class="text-[10px] text-gray-500 font-medium mb-1 tracking-widest uppercase">مرحباً بك في</p>
                <h1 class="text-3xl font-amiri font-bold text-white tracking-wide drop-shadow-lg">
                    <span id="headerUserName" class="text-gold-premium">...</span>
                </h1>
                <div class="flex items-center gap-2 mt-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]"></span>
                    <p class="text-[10px] text-gray-600 font-mono tracking-widest uppercase" id="currentDate">...</p>
                </div>
            </div>
            <div class="relative group cursor-pointer" onclick="showToast('لا توجد إشعارات جديدة', 'info')">
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-gray-900 to-black border border-gray-800 flex items-center justify-center shadow-lg group-hover:border-gold-400/50 transition-all duration-500 group-hover:shadow-[0_0_20px_rgba(212,175,55,0.2)]">
                    <i class="fa-solid fa-bell text-gold-400 text-lg"></i>
                </div>
                <span class="absolute top-0 right-0 w-3 h-3 bg-red-600 border-2 border-black rounded-full animate-pulse shadow-[0_0_10px_red]"></span>
            </div>
        </header>

        <!-- Main Profile Card (Hero) -->
        <div class="luxury-card p-1 rounded-[2.5rem] relative overflow-hidden group border-gold-500/10">
            <!-- Internal Glow -->
            <div class="absolute top-0 right-0 w-64 h-64 bg-gold-500/5 rounded-full blur-3xl -mr-20 -mt-20 pointer-events-none"></div>
            
            <div class="luxury-card p-8 rounded-[2.2rem] relative z-10 h-full border-none bg-transparent shadow-none">
                <div class="flex items-center gap-6">
                    <!-- Avatar with Metallic Ring -->
                    <div class="relative shrink-0">
                        <div class="absolute inset-0 bg-gold-metallic rounded-2xl blur opacity-30 group-hover:opacity-60 transition-opacity duration-700"></div>
                        <div id="avatarContainer" class="w-24 h-24 rounded-2xl border-[1.5px] border-gold-400/40 overflow-hidden bg-black relative z-10 shadow-2xl">
                            <img id="userPhoto" src="" alt="User" class="w-full h-full object-cover hidden">
                            <div id="defaultAvatar" class="w-full h-full flex items-center justify-center text-3xl font-bold text-gold-300 bg-gray-900 font-amiri">
                                <span id="avatarInitials">U</span>
                            </div>
                        </div>
                        <div class="absolute -bottom-1 -right-1 w-6 h-6 bg-green-500 border-4 border-black rounded-full z-20 shadow-[0_0_15px_#22c55e]"></div>
                    </div>

                    <!-- Info -->
                    <div class="flex-1 min-w-0">
                        <h2 class="text-xl font-bold text-white truncate mb-1 drop-shadow-md" id="userName">مستخدم</h2>
                        <div class="flex items-center gap-2 mt-3">
                            <div class="bg-black/60 backdrop-blur-md px-3 py-1.5 rounded-xl border border-white/5 flex items-center gap-2 group/copy cursor-pointer" onclick="copyId()">
                                <span class="text-[10px] text-gray-400 font-mono tracking-wider select-all" id="userId">ID: 00000</span>
                                <i class="fa-regular fa-copy text-gray-600 text-[10px] group-hover/copy:text-gold-400 transition-colors"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Balance Mini Card -->
                    <div class="bg-gradient-to-br from-gray-900 to-black backdrop-blur-xl px-5 py-4 rounded-2xl border border-gold-500/20 flex flex-col items-center min-w-[110px] shadow-2xl relative overflow-hidden group/balance">
                        <div class="absolute inset-0 bg-gold-metallic opacity-5 group-hover/balance:opacity-10 transition-opacity"></div>
                        <span class="text-[9px] text-gray-400 mb-1 font-medium uppercase tracking-[0.15em] relative z-10">الرصيد</span>
                        <div class="flex items-center gap-2 text-gold-400 drop-shadow-md relative z-10">
                            <i class="fa-solid fa-coins text-sm animate-pulse-slow"></i>
                            <span class="font-bold text-white text-xl tracking-tight font-mono" id="userBalance">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-2 gap-4">
            <div class="luxury-card p-5 rounded-2xl flex flex-col items-center justify-center text-center active:scale-95 transition-transform cursor-default border-t border-white/5 group">
                <div class="w-14 h-14 rounded-full bg-gray-900/50 text-gold-400 flex items-center justify-center mb-3 border border-gold-500/10 shadow-inner group-hover:border-gold-500/30 transition-colors group-hover:shadow-[0_0_15px_rgba(212,175,55,0.2)]">
                    <i class="fa-solid fa-chart-line text-xl"></i>
                </div>
                <span class="text-gray-500 text-xs mb-1 font-medium tracking-wide">الأداء العام</span>
                <span class="text-white font-bold text-lg font-amiri drop-shadow-sm">ممتاز</span>
            </div>
            <div class="luxury-card p-5 rounded-2xl flex flex-col items-center justify-center text-center active:scale-95 transition-transform cursor-default border-t border-white/5 group">
                <div class="w-14 h-14 rounded-full bg-gray-900/50 text-gold-400 flex items-center justify-center mb-3 border border-gold-500/10 shadow-inner group-hover:border-gold-500/30 transition-colors group-hover:shadow-[0_0_15px_rgba(212,175,55,0.2)]">
                    <i class="fa-solid fa-crown text-xl"></i>
                </div>
                <span class="text-gray-500 text-xs mb-1 font-medium tracking-wide">المستوى الحالي</span>
                <span class="text-gold-300 font-bold text-lg font-amiri drop-shadow-sm">بلاتيني</span>
            </div>
        </div>

        <!-- Actions Menu -->
        <div class="luxury-card p-6 rounded-[2.5rem]">
            <div class="flex items-center justify-between mb-6 px-1">
                <h3 class="font-amiri font-bold text-white text-xl">القائمة الرئيسية</h3>
                <span class="text-[9px] text-gold-500/70 bg-gold-900/10 px-3 py-1 rounded-full border border-gold-500/10 font-mono tracking-wider">v4.0 GOLD</span>
            </div>
            
            <div class="space-y-3">
                <!-- Action Item 1 -->
                <button onclick="handleAction('refresh')" class="w-full p-4 rounded-2xl flex items-center justify-between luxury-card hover:bg-white/5 group border border-transparent hover:border-gold-500/20 bg-transparent shadow-none">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-xl bg-gray-900 text-gold-400 flex items-center justify-center group-hover:bg-gold-metallic group-hover:text-black transition-all duration-500 shadow-lg group-hover:shadow-[0_0_25px_rgba(212,175,55,0.4)]">
                            <i class="fa-solid fa-sync group-hover:animate-spin"></i>
                        </div>
                        <span class="text-gray-200 text-sm font-medium group-hover:text-white transition-colors">تحديث البيانات</span>
                    </div>
                    <i class="fa-solid fa-chevron-left text-gray-600 text-xs group-hover:translate-x-[-4px] group-hover:text-gold-400 transition-all duration-300"></i>
                </button>

                <!-- Action Item 2 -->
                <button onclick="handleAction('support')" class="w-full p-4 rounded-2xl flex items-center justify-between luxury-card hover:bg-white/5 group border border-transparent hover:border-gold-500/20 bg-transparent shadow-none">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-xl bg-gray-900 text-gold-400 flex items-center justify-center group-hover:bg-gold-metallic group-hover:text-black transition-all duration-500 shadow-lg group-hover:shadow-[0_0_25px_rgba(212,175,55,0.4)]">
                            <i class="fa-solid fa-headset"></i>
                        </div>
                        <span class="text-gray-200 text-sm font-medium group-hover:text-white transition-colors">الدعم الفني</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse shadow-[0_0_8px_red]"></span>
                        <i class="fa-solid fa-chevron-left text-gray-600 text-xs group-hover:translate-x-[-4px] group-hover:text-gold-400 transition-all duration-300"></i>
                    </div>
                </button>

                <!-- Action Item 3 (Locked) -->
                <button disabled class="w-full p-4 rounded-2xl flex items-center justify-between opacity-40 cursor-not-allowed border border-dashed border-gray-800 bg-transparent grayscale">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-xl bg-gray-900/50 text-gray-600 flex items-center justify-center border border-gray-800">
                            <i class="fa-solid fa-lock"></i>
                        </div>
                        <span class="text-gray-500 text-sm font-medium">الميزات الحصرية (قريباً)</span>
                    </div>
                </button>
            </div>
        </div>

        <!-- Footer / Logout -->
        <button onclick="confirmLogout()" class="w-full py-4 rounded-2xl font-bold text-red-400/80 hover:text-red-400 hover:bg-red-900/10 transition-all duration-300 border border-transparent hover:border-red-900/30 flex items-center justify-center gap-3 group mt-6 backdrop-blur-sm">
            <i class="fa-solid fa-arrow-right-from-bracket group-hover:-translate-x-1 transition-transform"></i>
            إنهاء الجلسة
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        // State Management
        const views = {
            loading: document.getElementById('loadingView'),
            denied: document.getElementById('accessDeniedView'),
            dashboard: document.getElementById('dashboardView')
        };

        // Elements
        const els = {
            userName: document.getElementById('userName'),
            headerName: document.getElementById('headerUserName'),
            userId: document.getElementById('userId'),
            photo: document.getElementById('userPhoto'),
            defaultAvatar: document.getElementById('defaultAvatar'),
            initials: document.getElementById('avatarInitials'),
            balance: document.getElementById('userBalance'),
            date: document.getElementById('currentDate'),
        };

        // Initialize with Robust Error Handling
        function init() {
            tg.expand();
            tg.ready();
            
            // Set Date
            const now = new Date();
            els.date.textContent = now.toLocaleDateString('ar-EG', { weekday: 'long', day: 'numeric', month: 'long' });

            // Wait for initData
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                onAuthSuccess(tg.initDataUnsafe.user);
            } else {
                tg.onEvent('ready', () => {
                    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                        onAuthSuccess(tg.initDataUnsafe.user);
                    } else {
                        setTimeout(() => {
                            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                                onAuthSuccess(tg.initDataUnsafe.user);
                            } else {
                                onAuthFailed();
                            }
                        }, 500);
                    }
                });

                // Safety timeout
                setTimeout(() => {
                    if (!views.dashboard.classList.contains('hidden-view') && !views.denied.classList.contains('hidden-view')) {
                        if (!(tg.initDataUnsafe && tg.initDataUnsafe.user)) {
                            onAuthFailed();
                        }
                    }
                }, 4000);
            }
        }

        function onAuthSuccess(user) {
            loadUserData(user);
            switchView('dashboard');
            setupMainButton();
            try { tg.setHeaderColor('#000000'); } catch(e){}
        }

        function onAuthFailed() {
            switchView('denied');
            try { tg.setHeaderColor('#000000'); } catch(e){}
        }

        function switchView(viewName) {
            Object.values(views).forEach(el => el.classList.add('hidden-view'));
            views[viewName].classList.remove('hidden-view');
            
            if(viewName === 'loading') {
                views.loading.classList.remove('hidden-view');
                views.loading.style.opacity = '1';
            } else {
                views.loading.style.opacity = '0';
                setTimeout(() => views.loading.classList.add('hidden-view'), 1000);
            }
        }

        function loadUserData(user) {
            const fullName = `${user.first_name} ${user.last_name || ''}`.trim();
            els.userName.textContent = fullName;
            els.headerName.textContent = user.first_name;
            els.userId.textContent = `ID: ${user.id}`;
            
            // Avatar Logic
            if (user.photo_url) {
                els.photo.src = user.photo_url;
                els.photo.classList.remove('hidden');
                els.defaultAvatar.classList.add('hidden');
            } else {
                els.photo.classList.add('hidden');
                els.defaultAvatar.classList.remove('hidden');
                const initials = (user.first_name.charAt(0) + (user.last_name ? user.last_name.charAt(0) : '')).toUpperCase();
                els.initials.textContent = initials || "U";
            }

            // Animate Balance with Gold Counter
            animateValue(els.balance, 0, 2500, 2000);
        }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const easeOutQuart = 1 - Math.pow(1 - progress, 4);
                obj.innerHTML = Math.floor(easeOutQuart * (end - start) + start).toLocaleString('en-US');
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        function setupMainButton() {
            tg.MainButton.setText("تحديث الرصيد");
            tg.MainButton.setTextColor("#000000");
            tg.MainButton.setColor("#D4AF37");
            tg.MainButton.show();
            
            tg.MainButton.onClick(() => {
                tg.HapticFeedback.notificationOccurred('success');
                showToast('تم مزامنة البيانات بنجاح', 'success');
                animateValue(els.balance, parseInt(els.balance.innerText.replace(/,/g,'')), parseInt(els.balance.innerText.replace(/,/g,'')) + 100, 1000);
            });
        }

        // Utilities
        function copyId() {
            const id = els.userId.textContent.replace('ID: ', '');
            navigator.clipboard.writeText(id).then(() => {
                tg.HapticFeedback.selectionChanged();
                showToast('تم نسخ المعرف ID', 'info');
            });
        }

        function handleAction(type) {
            tg.HapticFeedback.impactOccurred('light');
            if (type === 'refresh') {
                showToast('جارٍ تحديث البيانات...', 'info');
                setTimeout(() => showToast('تم التحديث بنجاح', 'success'), 1000);
            } else if (type === 'support') {
                showToast('جارٍ فتح الدعم...', 'info');
                setTimeout(() => tg.openLink('https://telegram.org'), 800);
            }
        }

        function confirmLogout() {
            tg.HapticFeedback.notificationOccurred('warning');
            tg.showConfirm("هل أنت متأكد من رغبتك في إنهاء الجلسة؟", (confirmed) => {
                if (confirmed) {
                    tg.close();
                }
            });
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast rounded-xl p-4 mb-3 flex items-center gap-3 pointer-events-auto';
            
            let icon = '<i class="fa-solid fa-circle-info text-gold-400 text-lg"></i>';
            if (type === 'success') icon = '<i class="fa-solid fa-check-circle text-green-500 text-lg"></i>';
            if (type === 'error') icon = '<i class="fa-solid fa-triangle-exclamation text-red-500 text-lg"></i>';

            toast.innerHTML = `${icon}<span class="text-sm font-medium flex-1 text-gray-200">${message}</span>`;
            
            container.appendChild(toast);
            tg.HapticFeedback.impactOccurred('light');

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Start the app
        init();
    </script>
</body>
</html>
