<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة تيليجرام المتطورة - الإصدار الاحترافي</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts (Cairo + Tajawal) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

    <style>
        /* Reset و متغيرات متقدمة */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --primary-light: #60a5fa;
            --secondary: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --dark: #0f172a;
            --light: #f8fafc;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Tajawal', 'Cairo', sans-serif;
            background-color: var(--tg-theme-bg-color, var(--dark));
            color: var(--tg-theme-text-color, #ffffff);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease, color 0.3s ease;
            position: relative;
        }

        /* خلفية متحركة متطورة */
        .ambient-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -2;
            pointer-events: none;
        }
        
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            animation: float 20s infinite ease-in-out;
        }
        
        .orb-1 { 
            top: -20%; 
            right: -20%; 
            width: 500px; 
            height: 500px; 
            background: var(--primary); 
            animation-delay: 0s; 
        }
        
        .orb-2 { 
            bottom: -20%; 
            left: -20%; 
            width: 450px; 
            height: 450px; 
            background: var(--secondary); 
            animation-delay: -5s; 
        }
        
        .orb-3 { 
            top: 30%; 
            left: 20%; 
            width: 300px; 
            height: 300px; 
            background: var(--success); 
            opacity: 0.2;
            animation: float 15s infinite ease-in-out reverse; 
        }

        /* جسيمات متحركة */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            background: radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.1) 0%, transparent 30%),
                        radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.1) 0%, transparent 30%);
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.1); }
            50% { transform: translate(60px, 40px) scale(1); }
            75% { transform: translate(-30px, 20px) scale(0.9); }
        }

        /* Glassmorphism متطور */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .glass-card:hover::before {
            opacity: 1;
        }

        .glass-card:hover {
            background: rgba(40, 51, 69, 0.8);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        /* تأثيرات حركة متقدمة */
        @keyframes slideUpFade {
            from { 
                opacity: 0; 
                transform: translateY(30px) scale(0.95); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }

        .animate-enter {
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Loader متطور */
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--tg-theme-button-color, var(--primary));
            border-right-color: var(--tg-theme-button-color, var(--primary));
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }
        
        .pulse-loader {
            width: 60px;
            height: 60px;
            background: rgba(59, 130, 246, 0.2);
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 0.2; }
        }

        /* Avatar متطور */
        .avatar-container {
            position: relative;
            width: 70px;
            height: 70px;
        }
        
        .avatar-ring {
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            animation: rotate 3s linear infinite;
            opacity: 0.5;
        }
        
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.2);
            position: relative;
            z-index: 1;
        }
        
        .default-avatar {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            font-weight: bold;
            border-radius: 50%;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* نظام Toast متطور */
        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 90%;
            max-width: 380px;
            pointer-events: none;
        }

        .toast {
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 16px 20px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: toastSlideUp 0.3s ease, toastFadeOut 0.3s ease 5.7s forwards;
            pointer-events: auto;
            direction: rtl;
            white-space: pre-line;
            line-height: 1.6;
            position: relative;
            overflow: hidden;
        }

        .toast::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            pointer-events: none;
        }

        .toast.success { border-right: 4px solid var(--success); }
        .toast.error { border-right: 4px solid var(--danger); }
        .toast.warning { border-right: 4px solid var(--warning); }
        .toast.info { border-right: 4px solid var(--info); }

        .toast-icon {
            width: 28px;
            height: 28px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .toast.success .toast-icon { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .toast.error .toast-icon { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .toast.warning .toast-icon { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .toast.info .toast-icon { background: rgba(59, 130, 246, 0.2); color: var(--info); }

        .toast-message {
            flex: 1;
            font-family: 'Tajawal', sans-serif;
        }

        .toast-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            animation: progress 5s linear forwards;
        }

        @keyframes toastSlideUp {
            from { 
                opacity: 0; 
                transform: translateY(20px) scale(0.9); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }

        @keyframes toastFadeOut {
            to { 
                opacity: 0; 
                transform: translateY(-10px) scale(0.9); 
            }
        }

        @keyframes progress {
            from { width: 100%; }
            to { width: 0%; }
        }

        /* Theme toggle متطور */
        .theme-toggle {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: var(--transition-smooth);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .theme-toggle:hover {
            background: rgba(40, 51, 69, 0.9);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .theme-toggle i {
            font-size: 18px;
            transition: transform 0.3s ease;
        }

        .theme-toggle:hover i {
            transform: rotate(15deg);
        }

        /* Settings panel متطور */
        .settings-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(20, 30, 40, 0.98);
            backdrop-filter: blur(20px) saturate(180%);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 24px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
            border-radius: 30px 30px 0 0;
            box-shadow: 0 -20px 40px rgba(0,0,0,0.4);
        }

        .settings-panel.open {
            transform: translateY(0);
        }

        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .settings-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        /* Wallet Modal متطور */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: rgba(20, 30, 40, 0.98);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            padding: 24px;
            width: 100%;
            max-width: 450px;
            max-height: 85vh;
            overflow-y: auto;
            transform: scale(0.9) translateY(20px);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.5);
        }

        .modal-overlay.open .modal-content {
            transform: scale(1) translateY(0);
        }

        /* Wallet Tabs متطورة */
        .wallet-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 16px;
            flex-wrap: wrap;
        }

        .wallet-tab {
            flex: 1;
            min-width: 70px;
            padding: 10px 5px;
            text-align: center;
            border-radius: 16px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.5);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .wallet-tab i {
            font-size: 16px;
        }

        .wallet-tab.active {
            background: rgba(59, 130, 246, 0.15);
            color: var(--primary);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }

        .wallet-tab:hover:not(.active) {
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.8);
        }

        /* Transaction Items متطورة */
        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
            border-radius: 12px;
        }

        .transaction-item:hover {
            background: rgba(255,255,255,0.03);
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .transaction-amount.positive { 
            color: var(--success);
            background: rgba(16, 185, 129, 0.1);
            padding: 4px 12px;
            border-radius: 30px;
        }
        
        .transaction-amount.negative { 
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
            padding: 4px 12px;
            border-radius: 30px;
        }

        /* أيقونة المحفظة المتطورة */
        .wallet-icon-large {
            width: 100px;
            height: 100px;
            background: linear-gradient(145deg, var(--primary), var(--secondary));
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.5), 
                        0 0 0 3px rgba(255,255,255,0.1) inset;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: floatWallet 4s infinite ease-in-out;
            position: relative;
            overflow: hidden;
            margin: 0 auto;
        }

        .wallet-icon-large::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.5), transparent 70%);
            opacity: 0.6;
        }

        .wallet-icon-large::after {
            content: '';
            position: absolute;
            inset: 2px;
            border-radius: inherit;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .wallet-icon-large i {
            font-size: 42px;
            color: white;
            filter: drop-shadow(0 6px 8px rgba(0,0,0,0.4));
            animation: pulseIcon 2.5s infinite ease-in-out;
            position: relative;
            z-index: 2;
        }

        .wallet-icon-large:hover {
            transform: scale(1.15) rotate(8deg);
            box-shadow: 0 20px 50px rgba(59, 130, 246, 0.8), 
                        0 0 0 5px rgba(255,255,255,0.2) inset;
        }

        @keyframes floatWallet {
            0% { transform: translateY(0px) rotate(0deg); }
            25% { transform: translateY(-10px) rotate(2deg); }
            50% { transform: translateY(0px) rotate(0deg); }
            75% { transform: translateY(5px) rotate(-2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes pulseIcon {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* بطاقة الرصيد المتطورة */
        .balance-card {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(139, 92, 246, 0.2));
            border-radius: 40px;
            padding: 16px 24px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            margin: 20px auto 0;
        }

        .balance-card i {
            color: #fbbf24;
            font-size: 24px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .balance-card span {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #e2e8f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* شارة الإشعارات المتطورة */
        .notification-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: linear-gradient(135deg, var(--danger), #dc2626);
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            box-shadow: 0 0 0 3px rgba(0,0,0,0.2);
            animation: pulse-badge 2s infinite;
            border: 1px solid rgba(255,255,255,0.3);
        }

        @keyframes pulse-badge {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* طرق الدفع المتطورة */
        .payment-method {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            border-radius: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
        }

        .payment-method:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
            transform: translateX(-5px);
        }

        .payment-method.selected {
            background: rgba(59, 130, 246, 0.15);
            border-color: var(--primary);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.2);
        }

        .payment-icon {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: linear-gradient(135deg, #334155, #1e293b);
            color: white;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .payment-icon img {
            width: 100%;
            height: 100%;
            border-radius: 16px;
            object-fit: cover;
        }

        /* تفاصيل طريقة الدفع المتطورة */
        .payment-details {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 16px;
            margin: 15px 0 20px 0;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 14px;
            line-height: 1.8;
            position: relative;
            overflow: hidden;
        }

        .payment-details::before {
            content: '🔒';
            position: absolute;
            top: 8px;
            right: 8px;
            opacity: 0.3;
            font-size: 20px;
        }

        .payment-details strong {
            color: var(--primary);
        }

        /* لوحة المشرف المتطورة */
        .admin-requests-panel {
            background: rgba(0,0,0,0.2);
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
        }

        .request-item {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
        }

        .request-item:hover {
            background: rgba(255,255,255,0.05);
            transform: translateY(-2px);
            border-color: rgba(59, 130, 246, 0.2);
        }

        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .request-id {
            font-size: 11px;
            color: #94a3b8;
            font-family: 'Courier New', monospace;
            background: rgba(0,0,0,0.2);
            padding: 2px 8px;
            border-radius: 30px;
        }

        .request-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-accept {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }

        .btn-accept:hover {
            background: rgba(16, 185, 129, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        .btn-reject {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }

        .btn-reject:hover {
            background: rgba(239, 68, 68, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
        }

        /* شارات الحالة المتطورة */
        .badge {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        .badge-pending {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .badge-completed {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .badge-warning {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* أزرار تحرير طرق الدفع المتطورة */
        .payment-method-admin {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);

            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
        }
        
        .payment-method-admin:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(59, 130, 246, 0.2);
        }
        
        .payment-method-admin .actions button {
            background: transparent;
            border: none;
            color: #94a3b8;
            margin: 0 6px;
            cursor: pointer;
            transition: all 0.2s;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        
        .payment-method-admin .actions button:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        .payment-method-admin .actions button.delete:hover { 
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger); 
        }
        
        .payment-method-admin .actions button.edit:hover { 
            background: rgba(59, 130, 246, 0.2);

        }

        /* بطاقات الإعلانات المتطورة */
        .ad-card {
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }

        .ad-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(30px, -30px);
        }

        .ad-card:hover {
            background: rgba(255,255,255,0.05);
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: 0 12px 30px rgba(59, 130, 246, 0.2);
        }

        .ad-card.watched {
            opacity: 0.6;
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.05);
            cursor: not-allowed;
        }

        .ad-reward {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #000;
            font-weight: 900;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3);
        }

        /* بطاقات المهام المتطورة */
        .task-card {
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
            margin-bottom: 16px;
            position: relative;
        }

        .task-card.completed {
            opacity: 0.6;
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.05);
        }

        .task-card.pending-verification {
            border-color: var(--warning);
            background: rgba(245, 158, 11, 0.05);
            animation: pulse-warning 2s infinite;
        }

        @keyframes pulse-warning {
            0%, 100% { border-color: var(--warning); }
            50% { border-color: rgba(245, 158, 11, 0.3); }
        }

        .task-reward {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
            font-weight: 900;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
        }

        /* أزرار متطورة */
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 30px;
            padding: 12px 24px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);

            border-radius: 30px;
            padding: 12px 24px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;

        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);

        /* عداد الأيام المتطور */
        .daily-counter {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 16px;
            margin: 15px 0;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }

        /* إحصائيات الإعلانات المتطورة */
        .ad-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .ad-stat-card {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 15px 8px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
        }

        .ad-stat-card:hover {
            background: rgba(255,255,255,0.05);
            transform: translateY(-2px);
        }

        .ad-stat-value {
            font-size: 24px;
            font-weight: 900;
            color: var(--primary);
            line-height: 1.2;
        }

        .ad-stat-label {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 5px;
        }

        /* Inputs متطورة */
        .input-field {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 14px 16px;
            color: white;
            font-size: 14px;
            transition: all 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: rgba(0,0,0,0.4);
        }

        .input-field::placeholder {
            color: rgba(255,255,255,0.3);
        }

        /* Checkbox متطور */
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .checkbox-container input[type="checkbox"] {
            display: none;
        }

        .checkbox-custom {
            width: 22px;
            height: 22px;
            border-radius: 8px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .checkbox-container input[type="checkbox"]:checked + .checkbox-custom {
            background: var(--primary);
            border-color: var(--primary);
        }

        .checkbox-custom i {
            color: white;
            font-size: 12px;
            opacity: 0;
            transform: scale(0);
            transition: all 0.2s;
        }

        .checkbox-container input[type="checkbox"]:checked + .checkbox-custom i {
            opacity: 1;
            transform: scale(1);
        }

        /* Scrollbar مخصص */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.3);
        }

        /* تأثيرات إضافية */
        .glow {
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
            50% { box-shadow: 0 0 40px rgba(59, 130, 246, 0.6); }
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* تنسيقات للشاشات الصغيرة */
        @media (max-width: 380px) {
            .ad-stats {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .wallet-tabs {
                gap: 4px;
            }
            
            .wallet-tab {
                font-size: 11px;
                padding: 8px 4px;
            }
            
            .wallet-tab i {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- Toast Container المتطور -->

    <!-- Modal Overlays المتطورة -->

    </div>

        <div class="modal-content" id="adModalContent" style="max-width: 500px;"></div>

    <div class="modal-overlay" id="taskVerificationModalOverlay">
        <div class="modal-content" id="taskVerificationModalContent" style="max-width: 500px;"></div>
    </div>

    <script>
        (function() {
            'use strict';

            // ======================== الإعدادات المتقدمة ========================
            const CONFIG = {
                ADMIN_ID: 7609492965, // غيّر هذا إلى معرف المشرف الخاص بك
                DEFAULT_BALANCE: 1000,
                MAX_TRANSACTIONS: 100,
                TOAST_DURATION: 5000,
                ANIMATION_DURATION: 300,
                STORAGE_KEYS: {
                    USERS: 'app_users',
                    BOTS: 'app_bots',
                    DAILY_OPS: 'daily_ops',
                    WALLET: 'wallet_data',
                    PAYMENT_METHODS: 'payment_methods',
                    DEPOSIT_REQUESTS: 'deposit_requests',
                    WITHDRAWAL_REQUESTS: 'withdrawal_requests',
                    THEME: 'theme',
                    SETTINGS: 'settings',
                    NOTIFICATIONS: 'notifications',
                    ADS: 'ads_data',
                    TASKS: 'tasks_data',
                    USER_TASKS: 'user_tasks',
                    USER_ADS: 'user_ads'
                }
            };

            // ======================== خدمات مساعدة متطورة ========================
            class StorageService {
                static get(key, defaultValue = null) {
                    try {
                        const value = localStorage.getItem(key);
                        return value !== null ? JSON.parse(value) : defaultValue;
                    } catch (e) {
                        console.warn(`Storage read error for key ${key}:`, e);
                        return defaultValue;
                    }
                }

                static set(key, value) {
                    try {
                        localStorage.setItem(key, JSON.stringify(value));
                        return true;
                    } catch (e) {
                        console.warn(`Storage write error for key ${key}:`, e);
                        return false;
                    }
                }

                static remove(key) {
                    try {
                        localStorage.removeItem(key);
                        return true;
                    } catch (e) {
                        console.warn(`Storage remove error for key ${key}:`, e);
                        return false;
                    }
                }
            }

            class DateUtils {
                static getTodayDate() {
                    return new Date().toISOString().split('T')[0];
                }

                static formatDateTime(isoString) {
                    if (!isoString) return 'غير محدد';
                    return new Date(isoString).toLocaleString('ar-EG', {
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                }

                static formatDate(isoString) {
                    if (!isoString) return 'غير محدد';
                    return new Date(isoString).toLocaleDateString('ar-EG', {
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric'
                    });
                }
                
                static isToday(dateString) {
                    return dateString === this.getTodayDate();
                }

                static getTimeAgo(isoString) {
                    const now = new Date();
                    const date = new Date(isoString);
                    const diffInSeconds = Math.floor((now - date) / 1000);
                    
                    if (diffInSeconds < 60) return 'الآن';
                    if (diffInSeconds < 3600) return `منذ ${Math.floor(diffInSeconds / 60)} دقيقة`;
                    if (diffInSeconds < 86400) return `منذ ${Math.floor(diffInSeconds / 3600)} ساعة`;
                    return `منذ ${Math.floor(diffInSeconds / 86400)} يوم`;
                }
            }

            class IdGenerator {
                static generate(prefix = '') {
                    return prefix + Date.now() + '_' + Math.random().toString(36).substr(2, 12);
                }
            }

            class ValidationUtils {
                static isValidAmount(amount) {
                    return !isNaN(amount) && amount > 0 && amount <= 1000000;
                }

                static isValidUserId(userId) {
                    return userId && /^\d+$/.test(String(userId));
                }

                static sanitizeInput(input) {
                    if (!input) return '';
                    return String(input).replace(/[<>]/g, '').trim();
                }
            }

            // ======================== نظام التنبيهات المتطور ========================
            class ToastManager {
                constructor(containerId) {
                    this.container = document.getElementById(containerId);
                    if (!this.container) {
                        this.container = document.createElement('div');
                        this.container.id = containerId;
                        this.container.className = 'toast-container';
                        document.body.appendChild(this.container);
                    }
                    this.activeToasts = [];
                    this.soundEnabled = true;
                    this.vibrateEnabled = true;
                }

                show(message, type = 'info', duration = CONFIG.TOAST_DURATION) {
                    const toast = document.createElement('div');
                    toast.className = `toast ${type} animate__animated animate__fadeInUp`;
                    
                    const iconMap = {
                        success: 'fa-solid fa-circle-check',
                        error: 'fa-solid fa-circle-exclamation',
                        warning: 'fa-solid fa-triangle-exclamation',
                        info: 'fa-solid fa-circle-info'
                    };
                    
                    toast.innerHTML = `
                        <div class="toast-icon"><i class="${iconMap[type] || iconMap.info}"></i></div>
                        <div class="toast-message">${message}</div>
                        <div class="toast-progress" style="animation: progress ${duration}ms linear forwards;"></div>
                    `;
                    
                    this.container.appendChild(toast);
                    this.activeToasts.push(toast);
                    
                    // تشغيل صوت إذا كان مفعلاً
                    if (this.soundEnabled) {
                        this.playSound(type);
                    }
                    
                    // اهتزاز إذا كان مفعلاً (للموبايل)
                    if (this.vibrateEnabled && navigator.vibrate) {
                        navigator.vibrate(type === 'error' ? 300 : 200);
                    }
                    
                    setTimeout(() => {
                        toast.classList.add('animate__fadeOutDown');
                        setTimeout(() => {
                            toast.remove();
                            this.activeToasts = this.activeToasts.filter(t => t !== toast);
                        }, 300);
                    }, duration);
                }

                playSound(type) {
                    try {
                        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        const oscillator = audioCtx.createOscillator();
                        const gainNode = audioCtx.createGain();
                        
                        oscillator.connect(gainNode);
                        gainNode.connect(audioCtx.destination);
                        
                        oscillator.type = 'sine';
                        
                        switch(type) {
                            case 'success':
                                oscillator.frequency.value = 800;
                                break;
                            case 'warning':
                                oscillator.frequency.value = 600;
                                break;
                            case 'error':
                                oscillator.frequency.value = 400;
                                break;
                            default:
                                oscillator.frequency.value = 500;
                        }
                        
                        gainNode.gain.value = 0.1;
                        
                        oscillator.start();
                        oscillator.stop(audioCtx.currentTime + 0.2);
                    } catch (e) {
                        console.log('Web Audio not supported');
                    }
                }

                success(message) { this.show(message, 'success'); }
                error(message) { this.show(message, 'error'); }
                warning(message) { this.show(message, 'warning'); }
                info(message) { this.show(message, 'info'); }
            }

            // ======================== خدمة تيليجرام المتطورة ========================
            class TelegramService {
                constructor() {
                    this.tg = window.Telegram?.WebApp || null;
                    this.isAvailable = !!this.tg;
                }

                init() {
                    if (!this.isAvailable) return false;
                    this.tg.expand();
                    this.tg.ready();
                    this.tg.disableVerticalSwipes();
                    return true;
                }

                getUser() {
                    return this.tg?.initDataUnsafe?.user || null;
                }

                isValid() {
                    return this.isAvailable && this.tg?.initData;
                }

                close() {
                    this.tg?.close();
                }

                showPopup(params) {
                    this.tg?.showPopup(params);
                }

                setMainButton(text, color = '#3b82f6', textColor = '#ffffff', isVisible = true, callback = null) {
                    if (!this.tg) return;
                    const btn = this.tg.MainButton;
                    btn.setText(text);
                    btn.setColor(color);
                    btn.setTextColor(textColor);
                    if (isVisible) btn.show(); else btn.hide();
                    if (callback) btn.onClick(callback);
                }

                hideMainButton() {
                    this.tg?.MainButton.hide();
                }
                
                openLink(url) {
                    if (!url) return;
                    this.tg?.openLink(url);
                }

                showAlert(message) {
                    this.tg?.showAlert(message);
                }

                showConfirm(message, callback) {
                    this.tg?.showConfirm(message, callback);
                }
            }

            // ======================== نظام الإشعارات المتطور ========================
            class NotificationService {
                constructor(state) {
                    this.state = state;
                    this.STORAGE_KEY = CONFIG.STORAGE_KEYS.NOTIFICATIONS;
                }

                loadNotifications() {
                    const saved = StorageService.get(this.STORAGE_KEY, []);
                    this.state.notifications = saved;
                }

                saveNotifications() {
                    StorageService.set(this.STORAGE_KEY, this.state.notifications);
                }

                addNotification(userId, title, message, type = 'info') {
                    const notification = {
                        id: IdGenerator.generate('notif_'),
                        userId,
                        title,
                        message,
                        type,
                        read: false,
                        date: new Date().toISOString()
                    };
                    this.state.notifications.push(notification);
                    this.saveNotifications();
                    
                    window.dispatchEvent(new CustomEvent('newNotification', { detail: notification }));
                    
                    return notification;
                }

                    }
                    return false;
                }

                deleteTask(id) {
                    this.state.tasks = this.state.tasks.filter(task => task.id !== id);
                    this.saveTasks();
                }

                getUserTasks(userId) {
                    const userTasks = StorageService.get(this.USER_TASKS_KEY, {});
                    if (!userTasks[userId]) {
                        userTasks[userId] = [];
                    }
                    return userTasks[userId];
                }

                saveUserTasks(userId, tasks) {
                    const userTasks = StorageService.get(this.USER_TASKS_KEY, {});
                    userTasks[userId] = tasks;
                    StorageService.set(this.USER_TASKS_KEY, userTasks);
                }

                startTask(userId, taskId) {
                    const task = this.state.tasks.find(t => t.id === taskId);
                    if (!task || !task.active) {
                        return { success: false, message: 'المهمة غير متاحة' };
                    }

                    const userTasks = this.getUserTasks(userId);
                    
                    const existingTask = userTasks.find(t => t.taskId === taskId);
                    if (existingTask) {
                        if (existingTask.status === 'completed') {
                            return { success: false, message: 'لقد أكملت هذه المهمة بالفعل' };
                        }
                        if (existingTask.status === 'pending') {
                            return { success: false, message: 'المهمة قيد المراجعة بالفعل' };
                        }
                    }

                    const newUserTask = {
                        taskId,
                        status: 'started',
                        startedAt: new Date().toISOString(),
                        verificationData: null
                    };
                    
                    userTasks.push(newUserTask);
                    this.saveUserTasks(userId, userTasks);

                    return { success: true, task };
                }

                requestVerification(userId, taskId, verificationData) {
                    const task = this.state.tasks.find(t => t.id === taskId);
                    if (!task) {
                        return { success: false, message: 'المهمة غير موجودة' };
                    }

                    const userTasks = this.getUserTasks(userId);
                    const userTaskIndex = userTasks.findIndex(t => t.taskId === taskId);
                    
                    if (userTaskIndex === -1) {
                        return { success: false, message: 'لم تبدأ هذه المهمة بعد' };
                    }

                    if (userTasks[userTaskIndex].status === 'completed') {
                        return { success: false, message: 'لقد أكملت هذه المهمة بالفعل' };
                    }

                    if (userTasks[userTaskIndex].status === 'pending') {
                        return { success: false, message: 'المهمة قيد المراجعة بالفعل' };
                    }

                    userTasks[userTaskIndex].status = 'pending';
                    userTasks[userTaskIndex].verificationData = verificationData;
                    userTasks[userTaskIndex].submittedAt = new Date().toISOString();
                    
                    this.saveUserTasks(userId, userTasks);

                    if (this.state.isAdmin) {
                        this.notificationService.addNotification(
                            CONFIG.ADMIN_ID,
                            '✅ طلب تحقق جديد',
                            `المستخدم: ${this.state.user?.first_name}\nالمهمة: ${task.title}`,
                            'info'
                        );
                    } else {
                        window.dispatchEvent(new CustomEvent('newTaskVerification', { 
                            detail: { 
                                userId, 
                                taskId,
                                taskTitle: task.title,
                                verificationData 
                            } 
                        }));
                    }

                    return { success: true, message: 'تم إرسال طلب التحقق بنجاح' };
                }

                verifyTask(userId, taskId, approved) {
                    const task = this.state.tasks.find(t => t.id === taskId);
                    if (!task) return false;

                    const userTasks = this.getUserTasks(userId);
                    const userTaskIndex = userTasks.findIndex(t => t.taskId === taskId);
                    
                    if (userTaskIndex === -1) return false;
                    if (userTasks[userTaskIndex].status !== 'pending') return false;

                    if (approved) {
                        userTasks[userTaskIndex].status = 'completed';
                        userTasks[userTaskIndex].completedAt = new Date().toISOString();
                        
                        this.state.balance += task.reward;
                        
                        this.dataService.addTransaction('task_reward', task.reward, `مكافأة مهمة: ${task.title}`);
                        
                        this.notificationService.addNotification(
                            userId,
                            '✅ تم قبول المهمة',
                            `تم قبول مهمة "${task.title}" وأضيفت مكافأة ${task.reward} إلى رصيدك`,
                            'success'
                        );

                        // تحديث عداد الإنجاز للمهمة
                        task.completedCount = (task.completedCount || 0) + 1;
                        this.saveTasks();
                    } else {
                        userTasks[userTaskIndex].status = 'started';
                        userTasks[userTaskIndex].verificationData = null;
                        
                        this.notificationService.addNotification(
                            userId,
                            '❌ تم رفض المهمة',
                            `تم رفض مهمة "${task.title}"، يرجى مراجعة التعليمات وإعادة المحاولة`,
                            'error'
                        );
                    }

                    this.saveUserTasks(userId, userTasks);
                    return true;
                }

                getAvailableTasks(userId) {
                    const userTasks = this.getUserTasks(userId);
                    
                    return this.state.tasks.filter(task => {
                        if (!task.active) return false;
                        
                        const userTask = userTasks.find(t => t.taskId === task.id);
                        if (!userTask) return true;
                        
                        return userTask.status !== 'completed';
                    });
                }

                getUserTaskStatus(userId) {
                    const userTasks = this.getUserTasks(userId);
                    const tasks = this.state.tasks;
                    
                    const completed = userTasks.filter(t => t.status === 'completed').length;
                    const pending = userTasks.filter(t => t.status === 'pending').length;
                    const started = userTasks.filter(t => t.status === 'started').length;
                    
                    return { completed, pending, started, total: tasks.length };
                }

                getPendingVerifications() {
                    const allUserTasks = StorageService.get(this.USER_TASKS_KEY, {});
                    const pendingVerifications = [];
                    
                    Object.entries(allUserTasks).forEach(([userId, tasks]) => {
                        tasks.forEach(task => {
                            if (task.status === 'pending') {
                                const taskDetails = this.state.tasks.find(t => t.id === task.taskId);
                                if (taskDetails) {
                                    pendingVerifications.push({
                                        userId,
                                        taskId: task.taskId,
                                        taskTitle: taskDetails.title,
                                        verificationData: task.verificationData,
                                        submittedAt: task.submittedAt,
                                        taskDetails
                                    });
                                }
                            }
                        });
                    });
                    
                    return pendingVerifications;
                }
            }

                                req.userId,
                                '✅ تم قبول طلب الشحن',
                                `تم قبول طلب الشحن بمبلغ ${req.amount} عبر ${req.method}. رقم العملية: ${req.transactionId || 'غير محدد'}`,
                                'success'
                            );
                            
                            return true;
                        }
                    } else if (type === 'withdrawal') {
                        const req = this.state.withdrawalRequests.find(r => r.id === request.id);
                        if (req && req.status === 'pending' && this.state.balance >= req.amount) {
                            req.status = 'approved';
                            this.state.balance -= req.amount;
                            this.addTransaction('withdraw', -req.amount, `سحب عبر ${req.method} إلى ${req.details || 'محفظة'}`);
                            this.saveWallet();
                            this.saveRequests();
                            
                            this.notificationService.addNotification(
                                req.userId,
                                '✅ تم قبول طلب السحب',
                                `تم قبول طلب السحب بمبلغ ${req.amount} عبر ${req.method}. التفاصيل: ${req.details}`,
                                'success'
                            );
                            
                            return true;
                        }
                    }
                    return false;
                }

                rejectRequest(request, type) {
                    if (type === 'deposit') {
                        const req = this.state.depositRequests.find(r => r.id === request.id);
                        if (req) {
                            req.status = 'rejected';
                            this.saveRequests();
                            
                            this.notificationService.addNotification(
                                req.userId,
                                '❌ تم رفض طلب الشحن',
                                `تم رفض طلب الشحن بمبلغ ${req.amount} عبر ${req.method}.`,
                                'error'
                            );
                            
                            return true;
                        }
                    } else if (type === 'withdrawal') {
                        const req = this.state.withdrawalRequests.find(r => r.id === request.id);
                        if (req) {
                            req.status = 'rejected';
                            this.saveRequests();
                            
                            this.notificationService.addNotification(
                                req.userId,
                                '❌ تم رفض طلب السحب',
                                `تم رفض طلب السحب بمبلغ ${req.amount} عبر ${req.method}.`,
                                'error'
                            );
                            
                            return true;
                        }
                    }
                    return false;
                }

                getPendingDeposits() {
                    return this.state.depositRequests.filter(r => r.status === 'pending');
                }

                getPendingWithdrawals() {
                    return this.state.withdrawalRequests.filter(r => r.status === 'pending');
                }

                getPendingRequestsCount() {
                    return this.getPendingDeposits().length + this.getPendingWithdrawals().length;
                }

                addTransaction(type, amount, note = '', status = 'مكتمل') {
                    const tx = {
                        id: IdGenerator.generate('tx_'),
                        type,
                        amount,
                        note,
                        status,
                        date: new Date().toISOString()
                    };
                    this.state.wallet.transactions.unshift(tx);
                    if (this.state.wallet.transactions.length > CONFIG.MAX_TRANSACTIONS) {
                        this.state.wallet.transactions.pop();
                    }
                    this.saveWallet();
                }

                loadStats() {
                    const users = StorageService.get(CONFIG.STORAGE_KEYS.USERS, []);
                    const bots = StorageService.get(CONFIG.STORAGE_KEYS.BOTS, [{ id: 123456, name: 'البوت الرسمي' }]);
                    const dailyOpsData = StorageService.get(CONFIG.STORAGE_KEYS.DAILY_OPS, {});
                    const today = DateUtils.getTodayDate();
                    
                    this.state.stats = {
                        users: users.length,
                        bots: bots.length,
                        dailyOps: dailyOpsData[today] || 0
                    };
                }

                incrementDailyOps() {
                    const today = DateUtils.getTodayDate();
                    const dailyOpsData = StorageService.get(CONFIG.STORAGE_KEYS.DAILY_OPS, {});
                    dailyOpsData[today] = (dailyOpsData[today] || 0) + 1;
                    StorageService.set(CONFIG.STORAGE_KEYS.DAILY_OPS, dailyOpsData);
                    this.loadStats();
                }

                registerUser(userId) {
                    const users = StorageService.get(CONFIG.STORAGE_KEYS.USERS, []);
                    if (!users.includes(userId)) {
                        users.push(userId);
                        StorageService.set(CONFIG.STORAGE_KEYS.USERS, users);
                        this.loadStats();
                    }
                }

                loadSettings() {
                    const settings = StorageService.get(CONFIG.STORAGE_KEYS.SETTINGS, null);
                    if (settings) {
                        this.state.settings = settings;
                    }
                }

                saveSettings() {
                    StorageService.set(CONFIG.STORAGE_KEYS.SETTINGS, this.state.settings);
                }

                loadTheme() {
                    const theme = StorageService.get(CONFIG.STORAGE_KEYS.THEME, 'dark');
                    this.state.theme = theme;
                    return theme;
                }

                saveTheme(theme) {
                    StorageService.set(CONFIG.STORAGE_KEYS.THEME, theme);
                    this.state.theme = theme;
                }
            }

                constructor(state, dataService, telegramService, toast) {
                    this.state = state;
                    this.data = dataService;
                    this.tg = telegramService;

                    this.state.addEventListener('balanceUpdated', () => this.updateBalanceDisplay());
                    this.state.addEventListener('statsUpdated', () => this.updateStatsDisplay());
                    
                    window.addEventListener('newDepositRequest', (e) => this.handleNewRequest(e.detail, 'شحن'));
                    window.addEventListener('newWithdrawalRequest', (e) => this.handleNewRequest(e.detail, 'سحب'));
                    window.addEventListener('newNotification', (e) => this.handleNewNotification(e.detail));
                    window.addEventListener('newTaskVerification', (e) => this.handleNewTaskVerification(e.detail));
                }

                handleNewRequest(request, type) {
                    if (this.state.isAdmin) {
                        this.toast.success(`🔔 طلب ${type} جديد
                            • المستخدم: ${request.userName}
                            • المبلغ: ${request.amount}
                            • الطريقة: ${request.method}
                            ${type === 'شحن' ? `• رقم العملية: ${request.transactionId}` : `• التفاصيل: ${request.details}`}`);
                        
                        this.updatePendingBadge();
                    }
                }

                handleNewNotification(notification) {
                    if (this.state.user && this.state.user.id === notification.userId) {
                        this.toast.show(notification.message, notification.type);
                        this.updateNotificationBadge();
                        if (!this.state.isAdmin) {
                            this.render();
                        }
                    }
                }

                handleNewTaskVerification(detail) {
                    if (this.state.isAdmin) {
                        this.toast.info(`🔔 طلب تحقق مهمة جديد
                            • المستخدم: ${this.state.user?.first_name}
                            • المهمة: ${detail.taskTitle}`);
                        
                        this.updatePendingBadge();
                    }
                }

                updatePendingBadge() {
                    const walletIcon = document.getElementById('walletIconLarge');
                    if (!walletIcon) return;
                    
                    const requestsCount = this.data.getPendingRequestsCount();
                    const pendingVerifications = this.taskSystem.getPendingVerifications().length;
                    const totalPending = requestsCount + pendingVerifications;
                    
                    let badge = walletIcon.querySelector('.notification-badge');
                    
                    if (totalPending > 0) {
                        if (!badge) {
                            badge = document.createElement('span');
                            badge.className = 'notification-badge';
                            walletIcon.style.position = 'relative';
                            walletIcon.appendChild(badge);
                        }
                        badge.textContent = totalPending > 9 ? '9+' : totalPending;
                    } else {
                        if (badge) badge.remove();
                    }
                    
                    document.title = totalPending > 0 ? `(${totalPending}) بوابة تيليجرام` : 'بوابة تيليجرام المتطورة';
                }

                updateNotificationBadge() {
                    const bell = document.getElementById('notificationBell');
                    if (!bell) return;
                    
                    const userId = this.state.user?.id;
                    if (!userId) return;
                    
                    const unreadCount = this.data.notificationService.getUnreadCount(userId);
                    let badge = bell.querySelector('.notification-badge');
                    
                    if (unreadCount > 0) {
                        if (!badge) {
                            badge = document.createElement('span');
                            badge.className = 'notification-badge';
                            bell.style.position = 'relative';
                            bell.appendChild(badge);
                        }
                        badge.textContent = unreadCount > 9 ? '9+' : unreadCount;
                    } else {
                        if (badge) badge.remove();
                    }
                }

                    if (this.state.telegramMissing) {
                        this.appContainer.innerHTML = this.renderTelegramMissing();
                    } else if (this.state.loading) {
                        this.appContainer.innerHTML = this.renderLoading();
                    } else if (this.state.accessDenied) {

                    } else if (this.state.isAdmin) {
                        this.appContainer.innerHTML = this.renderAdminDashboard();
