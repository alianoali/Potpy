<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>بوابة تيليجرام الآمنة</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App Script (Must be loaded early) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts (Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                    },
                    colors: {
                        tg: {
                            bg: 'var(--tg-theme-bg-color, #0f172a)',
                            secondary: 'var(--tg-theme-secondary-bg-color, #1e293b)',
                            text: 'var(--tg-theme-text-color, #ffffff)',
                            hint: 'var(--tg-theme-hint-color, #94a3b8)',
                            button: 'var(--tg-theme-button-color, #3b82f6)',
                            buttonText: 'var(--tg-theme-button-text-color, #ffffff)',
                        }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'scale-in': 'scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'dots': 'dots 1.5s infinite steps(4)',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        scaleIn: {
                            '0%': { opacity: '0', transform: 'scale(0.95)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        },
                        dots: {
                            '0%, 20%': { content: '"."' },
                            '40%': { content: '".."' },
                            '60%': { content: '"..."' },
                            '80%, 100%': { content: '""' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --glass-bg: rgba(30, 41, 59, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--tg-theme-bg-color, #0f172a);
            color: var(--tg-theme-text-color, #ffffff);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease, color 0.3s ease;
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
            margin: 0;
        }

        /* Glassmorphism Enhanced */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .glass-card:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.08);
        }

        /* Ambient Background */
        .ambient-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 10s infinite ease-in-out;
        }
        .glow-1 { top: -10%; right: -10%; width: 300px; height: 300px; background: var(--tg-theme-button-color, #3b82f6); }
        .glow-2 { bottom: -10%; left: -10%; width: 250px; height: 250px; background: #8b5cf6; animation-delay: -5s; }

        /* Advanced Loader */
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--tg-theme-button-color, #3b82f6);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .status-text::after {
            content: "";
            animation: dots 1.5s infinite steps(4);
        }

        /* Toast Notification */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: 90%;
            max-width: 350px;
            pointer-events: none;
        }
        .toast {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 14px 16px;
            border-radius: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            pointer-events: auto;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .toast.hide {
            animation: slideUp 0.3s ease forwards;
        }
        @keyframes slideUp {
            to { opacity: 0; transform: translateY(-20px); }
        }

        .hidden-view { display: none !important; }
        .fade-in { animation: scale-in 0.4s ease-out forwards; }
        
        .text-gradient {
            background: linear-gradient(to right, var(--tg-theme-button-color), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-start p-4 relative selection:bg-blue-500/30">

    <!-- Background -->
    <div class="ambient-glow">
        <div class="glow-orb glow-1"></div>
        <div class="glow-orb glow-2"></div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- VIEW 1: LOADING (Improved with dynamic status) -->
    <div id="loadingView" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[var(--tg-theme-bg-color)] transition-opacity duration-500">
        <div class="loader-container">
            <div class="spinner"></div>
            <h2 class="text-lg font-bold text-white tracking-wide">
                جاري تأمين الاتصال<span class="status-text"></span>
            </h2>
            <p class="text-xs text-gray-500 mt-2 font-mono opacity-70" id="loadingSubtext">مزامنة مع خوادم تيليجرام...</p>
        </div>
    </div>

    <!-- VIEW 2: ACCESS DENIED -->
    <div id="accessDeniedView" class="hidden-view w-full max-w-md flex flex-col items-center justify-center min-h-[80vh] fade-in">
        <div class="glass-panel p-8 rounded-3xl text-center w-full border-red-500/20 shadow-2xl shadow-red-900/20">
            <div class="w-24 h-24 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl shadow-inner animate-bounce">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h2 class="text-2xl font-bold mb-3 text-white">دخول غير مصرح به</h2>
            <p class="text-gray-400 mb-8 text-sm leading-relaxed px-4">
                لم نتمكن من التحقق من هويتك. يرجى التأكد من فتح التطبيق عبر بوت تيليجرام الرسمي فقط.
            </p>
            <button onclick="window.location.href='https://telegram.org'" class="w-full py-4 rounded-xl font-bold text-white bg-gradient-to-r from-red-600 to-red-500 hover:shadow-lg hover:shadow-red-500/30 transition-all transform hover:-translate-y-1 active:scale-95">
                <i class="fa-brands fa-telegram ml-2"></i>
                فتح تيليجرام
            </button>
            <button onclick="location.reload()" class="mt-4 text-xs text-gray-500 hover:text-white underline">
                إعادة المحاولة
            </button>
        </div>
    </div>

    <!-- VIEW 3: DASHBOARD -->
    <div id="dashboardView" class="hidden-view w-full max-w-md space-y-5 pb-24 fade-in">
        
        <!-- Header Section -->
        <header class="flex items-center justify-between mb-4 pt-2">
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight">مرحباً، <span id="headerUserName" class="text-gradient">...</span></h1>
                <p class="text-xs text-gray-400 mt-1 font-medium" id="currentDate">...</p>
            </div>
            <div class="relative group cursor-pointer" onclick="showToast('لا توجد إشعارات جديدة', 'info')">
                <div class="w-11 h-11 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex items-center justify-center shadow-lg shadow-blue-500/20 transition-transform group-hover:scale-110">
                    <i class="fa-solid fa-bell text-white text-sm"></i>
                </div>
                <span class="absolute top-0 right-0 w-3 h-3 bg-red-500 border-2 border-[var(--tg-theme-bg-color)] rounded-full animate-pulse"></span>
            </div>
        </header>

        <!-- Main Profile Card -->
        <div class="glass-panel p-5 rounded-3xl relative overflow-hidden group">
            <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500/10 rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none"></div>
            
            <div class="flex items-center gap-4 relative z-10">
                <!-- Avatar with Ring -->
                <div class="relative">
                    <div class="absolute inset-0 bg-gradient-to-tr from-blue-500 to-purple-500 rounded-2xl blur opacity-40 group-hover:opacity-70 transition-opacity duration-500"></div>
                    <div id="avatarContainer" class="w-20 h-20 rounded-2xl border border-white/10 overflow-hidden bg-slate-800 relative z-10 shadow-lg">
                        <img id="userPhoto" src="" alt="User" class="w-full h-full object-cover hidden">
                        <div id="defaultAvatar" class="w-full h-full flex items-center justify-center text-2xl font-bold text-white bg-slate-700">
                            <span id="avatarInitials">U</span>
                        </div>
                    </div>
                    <div class="absolute -bottom-1 -right-1 w-5 h-5 bg-green-500 border-2 border-[var(--tg-theme-bg-color)] rounded-full z-20 shadow-sm"></div>
                </div>

                <!-- Info -->
                <div class="flex-1 min-w-0">
                    <h2 class="text-lg font-bold text-white truncate" id="userName">مستخدم</h2>
                    <div class="flex items-center gap-2 mt-1.5">
                        <span class="text-xs text-gray-400 font-mono bg-white/5 px-2.5 py-1 rounded-lg select-all border border-white/5" id="userId">ID: 00000</span>
                        <button onclick="copyId()" class="text-gray-400 hover:text-white hover:bg-white/10 p-1.5 rounded-lg transition-colors" title="نسخ المعرف">
                            <i class="fa-regular fa-copy text-xs"></i>
                        </button>
                    </div>
                </div>

                <!-- Balance Mini Card -->
                <div class="bg-slate-900/60 backdrop-blur-md px-4 py-3 rounded-2xl border border-white/5 flex flex-col items-center min-w-[80px] shadow-lg">
                    <span class="text-[10px] text-gray-400 mb-1 font-medium">الرصيد</span>
                    <div class="flex items-center gap-1.5 text-yellow-400 drop-shadow-md">
                        <i class="fa-solid fa-coins text-xs"></i>
                        <span class="font-bold text-white text-base tracking-tight" id="userBalance">0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-2 gap-3">
            <div class="glass-card p-4 rounded-2xl flex flex-col items-center justify-center text-center active:scale-95 transition-transform cursor-default">
                <div class="w-10 h-10 rounded-full bg-blue-500/10 text-blue-400 flex items-center justify-center mb-2.5">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
                <span class="text-gray-400 text-xs mb-1 font-medium">الأداء العام</span>
                <span class="text-white font-bold text-lg">ممتاز</span>
            </div>
            <div class="glass-card p-4 rounded-2xl flex flex-col items-center justify-center text-center active:scale-95 transition-transform cursor-default">
                <div class="w-10 h-10 rounded-full bg-purple-500/10 text-purple-400 flex items-center justify-center mb-2.5">
                    <i class="fa-solid fa-medal"></i>
                </div>
                <span class="text-gray-400 text-xs mb-1 font-medium">المستوى الحالي</span>
                <span class="text-white font-bold text-lg">ذهبي</span>
            </div>
        </div>

        <!-- Actions Menu -->
        <div class="glass-panel p-5 rounded-3xl">
            <div class="flex items-center justify-between mb-5">
                <h3 class="font-bold text-white text-base">القائمة السريعة</h3>
                <span class="text-[10px] text-gray-500 bg-white/5 px-2 py-1 rounded-md border border-white/5">v3.2 Stable</span>
            </div>
            
            <div class="space-y-2.5">
                <!-- Action Item 1 -->
                <button onclick="handleAction('refresh')" class="w-full p-3.5 rounded-xl flex items-center justify-between glass-card hover:bg-white/5 group">
                    <div class="flex items-center gap-3.5">
                        <div class="w-10 h-10 rounded-lg bg-blue-500/10 text-blue-400 flex items-center justify-center group-hover:bg-blue-500 group-hover:text-white transition-all duration-300">
                            <i class="fa-solid fa-sync"></i>
                        </div>
                        <span class="text-gray-200 text-sm font-medium">تحديث البيانات</span>
                    </div>
                    <i class="fa-solid fa-chevron-left text-gray-600 text-xs group-hover:translate-x-[-4px] transition-transform duration-300"></i>
                </button>

                <!-- Action Item 2 -->
                <button onclick="handleAction('support')" class="w-full p-3.5 rounded-xl flex items-center justify-between glass-card hover:bg-white/5 group">
                    <div class="flex items-center gap-3.5">
                        <div class="w-10 h-10 rounded-lg bg-purple-500/10 text-purple-400 flex items-center justify-center group-hover:bg-purple-500 group-hover:text-white transition-all duration-300">
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                        <span class="text-gray-200 text-sm font-medium">رسائل الدعم</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse shadow-[0_0_8px_rgba(239,68,68,0.6)]"></span>
                        <i class="fa-solid fa-chevron-left text-gray-600 text-xs group-hover:translate-x-[-4px] transition-transform duration-300"></i>
                    </div>
                </button>

                <!-- Action Item 3 (Locked) -->
                <button disabled class="w-full p-3.5 rounded-xl flex items-center justify-between opacity-60 cursor-not-allowed border border-dashed border-gray-700 bg-transparent">
                    <div class="flex items-center gap-3.5">
                        <div class="w-10 h-10 rounded-lg bg-gray-700/30 text-gray-500 flex items-center justify-center">
                            <i class="fa-solid fa-lock"></i>
                        </div>
                        <span class="text-gray-500 text-sm font-medium">الميزات المتقدمة (قريباً)</span>
                    </div>
                </button>
            </div>
        </div>

        <!-- Footer / Logout -->
        <button onclick="confirmLogout()" class="w-full py-4 rounded-xl font-bold text-red-400 hover:bg-red-500/10 hover:text-red-300 transition-all duration-300 border border-transparent hover:border-red-500/20 flex items-center justify-center gap-2.5 group mt-2">
            <i class="fa-solid fa-arrow-right-from-bracket group-hover:-translate-x-1 transition-transform"></i>
            إنهاء الجلسة الآمنة
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        // State Management
        const views = {
            loading: document.getElementById('loadingView'),
            denied: document.getElementById('accessDeniedView'),
            dashboard: document.getElementById('dashboardView')
        };

        // Elements
        const els = {
            userName: document.getElementById('userName'),
            headerName: document.getElementById('headerUserName'),
            userId: document.getElementById('userId'),
            photo: document.getElementById('userPhoto'),
            defaultAvatar: document.getElementById('defaultAvatar'),
            initials: document.getElementById('avatarInitials'),
            balance: document.getElementById('userBalance'),
            date: document.getElementById('currentDate'),
            subtext: document.getElementById('loadingSubtext')
        };

        // Initialize with Robust Error Handling
        function init() {
            // Expand immediately
            tg.expand();
            
            // Set Date
            const now = new Date();
            els.date.textContent = now.toLocaleDateString('ar-EG', { weekday: 'long', day: 'numeric', month: 'long' });

            // Crucial Step: Tell Telegram we are ready and wait for confirmation
            tg.ready();
            
            // Update loading text dynamically to show activity
            setTimeout(() => { if(els.subtext) els.subtext.textContent = "جارِ التحقق من الهوية..."; }, 800);
            setTimeout(() => { if(els.subtext) els.subtext.textContent = "تشفير البيانات..."; }, 1600);

            // Wait for the 'ready' event or a safe timeout to ensure initData is populated
            // This solves the issue where code runs before TG script finishes loading
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                onAuthSuccess(tg.initDataUnsafe.user);
            } else {
                // Fallback: Wait for the event listener if data isn't ready yet
                tg.onEvent('ready', () => {
                    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                        onAuthSuccess(tg.initDataUnsafe.user);
                    } else {
                        // If still no data after 'ready', check one last time with a small delay
                        setTimeout(() => {
                            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                                onAuthSuccess(tg.initDataUnsafe.user);
                            } else {
                                onAuthFailed();
                            }
                        }, 500);
                    }
                });

                // Safety timeout: If TG doesn't respond in 4 seconds, assume failure
                setTimeout(() => {
                    if (!views.dashboard.classList.contains('hidden-view') && !views.denied.classList.contains('hidden-view')) {
                        // Still loading, check again
                        if (!(tg.initDataUnsafe && tg.initDataUnsafe.user)) {
                            onAuthFailed();
                        }
                    }
                }, 4000);
            }
        }

        function onAuthSuccess(user) {
            loadUserData(user);
            switchView('dashboard');
            setupMainButton();
            tg.setHeaderColor('transparent');
        }

        function onAuthFailed() {
            switchView('denied');
            try { tg.setHeaderColor('#ef4444'); } catch(e){}
        }

        function switchView(viewName) {
            Object.values(views).forEach(el => el.classList.add('hidden-view'));
            views[viewName].classList.remove('hidden-view');
            
            if(viewName === 'loading') {
                views.loading.classList.remove('hidden-view');
                views.loading.style.opacity = '1';
            } else {
                views.loading.style.opacity = '0';
                setTimeout(() => views.loading.classList.add('hidden-view'), 500);
            }
        }

        function loadUserData(user) {
            const fullName = `${user.first_name} ${user.last_name || ''}`.trim();
            els.userName.textContent = fullName;
            els.headerName.textContent = user.first_name;
            els.userId.textContent = `ID: ${user.id}`;
            
            // Avatar Logic
            if (user.photo_url) {
                els.photo.src = user.photo_url;
                els.photo.classList.remove('hidden');
                els.defaultAvatar.classList.add('hidden');
            } else {
                els.photo.classList.add('hidden');
                els.defaultAvatar.classList.remove('hidden');
                const initials = (user.first_name.charAt(0) + (user.last_name ? user.last_name.charAt(0) : '')).toUpperCase();
                els.initials.textContent = initials || "U";
            }

            // Animate Balance
            animateValue(els.balance, 0, 1250, 1500);
        }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start).toLocaleString('en-US');
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        function setupMainButton() {
            tg.MainButton.setText("تحديث الحالة");
            tg.MainButton.setTextColor("#ffffff");
            tg.MainButton.setColor(getComputedStyle(document.documentElement).getPropertyValue('--tg-theme-button-color').trim() || "#3b82f6");
            tg.MainButton.show();
            
            tg.MainButton.onClick(() => {
                tg.HapticFeedback.notificationOccurred('success');
                showToast('تم مزامنة البيانات مع الخادم بنجاح', 'success');
                animateValue(els.balance, parseInt(els.balance.innerText.replace(/,/g,'')), parseInt(els.balance.innerText.replace(/,/g,'')) + 50, 1000);
            });
        }

        // Utilities
        function copyId() {
            const id = els.userId.textContent.replace('ID: ', '');
            navigator.clipboard.writeText(id).then(() => {
                tg.HapticFeedback.selectionChanged();
                showToast('تم نسخ المعرف ID للحافظة', 'info');
            });
        }

        function handleAction(type) {
            tg.HapticFeedback.impactOccurred('light');
            if (type === 'refresh') {
                showToast('جارٍ تحديث البيانات...', 'info');
                setTimeout(() => showToast('تم التحديث بنجاح', 'success'), 1000);
            } else if (type === 'support') {
                showToast('جارٍ فتح قناة الدعم...', 'info');
                setTimeout(() => tg.openLink('https://telegram.org'), 800);
            }
        }

        function confirmLogout() {
            tg.HapticFeedback.notificationOccurred('warning');
            tg.showConfirm("هل أنت متأكد من رغبتك في إنهاء الجلسة؟", (confirmed) => {
                if (confirmed) {
                    tg.close();
                }
            });
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            
            let icon = '<i class="fa-solid fa-circle-info text-blue-400 text-lg"></i>';
            if (type === 'success') icon = '<i class="fa-solid fa-check-circle text-green-400 text-lg"></i>';
            if (type === 'error') icon = '<i class="fa-solid fa-triangle-exclamation text-red-400 text-lg"></i>';

            toast.innerHTML = `${icon}<span class="text-sm font-medium flex-1">${message}</span>`;
            
            container.appendChild(toast);
            tg.HapticFeedback.impactOccurred('light');

            setTimeout(() => {
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Start the app
        init();
    </script>
</body>
</html>
