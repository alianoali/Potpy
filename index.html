                            <!-- زر المتجر -->
                            <button id="openStoreBtn" class="btn btn-primary w-full py-4">
                                <i class="fa-solid fa-store ml-2"></i>
                                المتجر الإلكتروني
                            </button>

                            <!-- زر تسجيل الخروج -->
                            <button id="logoutBtn" class="w-full py-4 rounded-xl text-red-400 hover:bg-red-500/10 transition-all">
                                <i class="fa-solid fa-arrow-right-from-bracket ml-2"></i>
                                تسجيل الخروج
                            </button>
                        </div>
                    `;
                }

                renderRecentOrders(userId) {
                    const orders = this.app.store.getOrders(userId, 5);
                    
                    if (orders.length === 0) {
                        return '<p class="text-gray-400 text-sm text-center py-2">لا توجد طلبات سابقة</p>';
                    }
                    
                    return orders.map(order => `
                        <div class="transaction-item cursor-pointer" onclick="app.ui.showOrderDetails('${order.id}')">
                            <div class="flex-1">
                                <div class="flex justify-between items-center">
                                    <span class="font-bold text-sm">${order.productName}</span>
                                    <span class="text-xs ${order.status === 'completed' ? 'text-green-400' : 'text-yellow-400'}">
                                        ${order.status === 'completed' ? 'مكتمل' : 'قيد الانتظار'}
                                    </span>
                                </div>
                                <div class="flex justify-between items-center mt-1">
                                    <span class="text-xs text-gray-400">${DateUtils.timeAgo(order.createdAt)}</span>
                                    <span class="text-sm font-bold text-blue-400">${order.price}</span>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }

                renderPendingOrders() {
                    const orders = this.app.store.getPendingOrders().slice(0, 5);
                    
                    if (orders.length === 0) {
                        return '<p class="text-gray-400 text-sm text-center py-2">لا توجد طلبات معلقة</p>';
                    }
                    
                    return orders.map(order => `
                        <div class="transaction-item cursor-pointer hover:bg-white/5" onclick="app.ui.showOrderDetails('${order.id}')">
                            <div class="flex-1">
                                <div class="flex justify-between items-center">
                                    <span class="font-bold text-sm">${order.productName}</span>
                                    <span class="text-xs text-yellow-400">معلق</span>
                                </div>
                                <div class="flex justify-between items-center mt-1">
                                    <span class="text-xs text-gray-400">المستخدم: ${order.userId}</span>
                                    <span class="text-sm font-bold text-blue-400">${order.price}</span>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }

                // ========== المتجر ==========
                openStore(categoryId = 'all') {
                    this.modalContent.innerHTML = this.renderStore(categoryId);
                    this.modal.classList.add('open');
                    this.bindStoreEvents();
                }

                renderStore(selectedCategory = 'all') {
                    const categories = this.app.store.getCategories();
                    const products = selectedCategory === 'all' 
                        ? this.app.store.getProducts()
                        : this.app.store.getProductsByCategory(selectedCategory);
                    const featured = this.app.store.getFeaturedProducts();
                    
                    return `
                        <div class="modal-header">
                            <h2 class="modal-title">🛍️ المتجر</h2>
                            <button class="modal-close" id="closeModalBtn">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <!-- شريط البحث -->
                        <div class="mb-4">
                            <div class="relative">
                                <i class="fa-solid fa-magnifying-glass absolute right-3 top-3.5 text-gray-400"></i>
                                <input type="text" id="searchInput" placeholder="ابحث عن منتج..." 
                                       class="input-field pr-10">
                            </div>
                        </div>

                        <!-- التصنيفات -->
                        <div class="mb-4">
                            <h3 class="font-bold mb-2">التصنيفات</h3>
                            <div class="flex gap-2 overflow-x-auto pb-2 custom-scroll">
                                <button class="category-chip ${selectedCategory === 'all' ? 'active' : ''}" data-cat="all">
                                    الكل
                                </button>
                                ${categories.map(cat => `
                                    <button class="category-chip ${selectedCategory === cat.id ? 'active' : ''}" 
                                            data-cat="${cat.id}" style="border-color: ${cat.color}">
                                        <i class="${cat.icon} ml-1"></i>
                                        ${cat.name}
                                    </button>
                                `).join('')}
                            </div>
                        </div>

                        <!-- المنتجات المميزة -->
                        ${featured.length > 0 && selectedCategory === 'all' ? `
                            <div class="mb-4">
                                <h3 class="font-bold mb-2 flex items-center gap-2">
                                    <i class="fa-solid fa-crown text-yellow-400"></i>
                                    مميزة
                                </h3>
                                <div class="slider-container">
                                    ${featured.map(prod => this.renderProductCard(prod, true)).join('')}
                                </div>
                            </div>
                        ` : ''}

                        <!-- جميع المنتجات -->
                        <div>
                            <h3 class="font-bold mb-2">
                                ${selectedCategory === 'all' ? 'جميع المنتجات' : categories.find(c => c.id === selectedCategory)?.name}
                            </h3>
                            <div class="grid grid-cols-2 gap-3" id="productsGrid">
                                ${products.map(prod => this.renderProductCard(prod)).join('')}
                            </div>
                            ${products.length === 0 ? `
                                <p class="text-center text-gray-400 py-8">لا توجد منتجات في هذا التصنيف</p>
                            ` : ''}
                        </div>
                    `;
                }

                renderProductCard(product, isSlider = false) {
                    const imageUrl = product.imageId ? this.app.images.getUrl(product.imageId) : null;
                    
                    return `
                        <div class="product-card ${isSlider ? 'slider-item' : ''}" data-prod-id="${product.id}">
                            <div class="relative">
                                ${imageUrl ? 
                                    `<img src="${imageUrl}" class="product-image" alt="${product.name}">` : 
                                    `<div class="product-image flex items-center justify-center">
                                        <i class="${product.icon} text-4xl text-blue-400"></i>
                                    </div>`
                                }
                                ${product.oldPrice ? `
                                    <span class="product-badge">
                                        خصم ${Math.round((1 - product.price/product.oldPrice) * 100)}%
                                    </span>
                                ` : ''}
                                ${product.featured ? `
                                    <span class="product-featured">
                                        <i class="fa-regular fa-star"></i>
                                    </span>
                                ` : ''}
                                <button class="quick-view" onclick="event.stopPropagation(); app.ui.showProductDetails('${product.id}')">
                                    <i class="fa-regular fa-eye"></i>
                                </button>
                            </div>
                            <div class="p-3 flex-1 flex flex-col">
                                <h4 class="font-bold text-sm mb-1">${product.name}</h4>
                                <p class="text-xs text-gray-400 mb-2 line-clamp-2">${product.description}</p>
                                <div class="flex items-center gap-2 text-xs text-gray-400 mb-2">
                                    <span><i class="fa-regular fa-star text-yellow-400"></i> ${product.rating}</span>
                                    <span><i class="fa-regular fa-heart"></i> ${product.totalSold}</span>
                                </div>
                                <div class="flex items-center justify-between mt-auto">
                                    <span class="product-price">${product.price}</span>
                                    <button class="add-to-cart-btn text-sm" data-prod-id="${product.id}">
                                        <i class="fa-solid fa-cart-plus"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }

                showProductDetails(productId) {
                    const product = this.app.store.getProduct(productId);
                    if (!product) return;
                    
                    const imageUrl = product.imageId ? this.app.images.getUrl(product.imageId) : null;
                    
                    this.modalContent.innerHTML = `
                        <div class="modal-header">
                            <h2 class="modal-title">${product.name}</h2>
                            <button class="modal-close" id="closeModalBtn">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="space-y-4">
                            <!-- الصورة -->
                            <div class="relative">
                                ${imageUrl ? 
                                    `<img src="${imageUrl}" class="w-full h-48 object-cover rounded-2xl" alt="${product.name}">` : 
                                    `<div class="w-full h-48 rounded-2xl bg-gradient-to-br from-blue-500/20 to-purple-500/20 flex items-center justify-center">
                                        <i class="${product.icon} text-6xl text-blue-400"></i>
                                    </div>`
                                }
                            </div>

                            <!-- التقييم -->
                            <div class="flex items-center gap-4 text-sm">
                                <span><i class="fa-regular fa-star text-yellow-400"></i> ${product.rating}</span>
                                <span><i class="fa-regular fa-heart"></i> ${product.totalSold} مبيع</span>
                                <span class="${product.stock > 0 ? 'text-green-400' : 'text-red-400'}">
                                    ${product.stock > 0 ? 'متوفر' : product.stock === -1 ? 'غير محدود' : 'نفذ'}
                                </span>
                            </div>

                            <!-- السعر -->
                            <div class="flex items-center gap-3">
                                <span class="text-3xl font-bold text-blue-400">${product.price}</span>
                                ${product.oldPrice ? `
                                    <span class="text-lg text-gray-400 line-through">${product.oldPrice}</span>
                                ` : ''}
                            </div>

                            <!-- الوصف -->
                            <div class="glass-card p-4 rounded-xl">
                                <h3 class="font-bold mb-2">الوصف</h3>
                                <p class="text-gray-300 text-sm">${product.longDescription || product.description}</p>
                            </div>

                            <!-- المواصفات -->
                            ${product.specifications ? `
                                <div class="glass-card p-4 rounded-xl">
                                    <h3 class="font-bold mb-2">المواصفات</h3>
                                    <div class="space-y-2">
                                        ${Object.entries(product.specifications).map(([key, value]) => `
                                            <div class="flex justify-between text-sm">
                                                <span class="text-gray-400">${key}</span>
                                                <span>${value}</span>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            ` : ''}

                            <!-- حقول الإدخال -->
                            ${product.fields && product.fields.length > 0 ? `
                                <div class="glass-card p-4 rounded-xl">
                                    <h3 class="font-bold mb-2">بيانات الطلب</h3>
                                    <form id="productFieldsForm" class="space-y-3">
                                        ${product.fields.map(field => this.renderInputField(field)).join('')}
                                    </form>
                                </div>
                            ` : ''}

                            <!-- أزرار الإجراء -->
                            <div class="flex gap-3 pt-4">
                                <button id="addToCartBtn" class="btn btn-primary flex-1" data-prod-id="${product.id}">
                                    <i class="fa-solid fa-cart-plus ml-2"></i>
                                    أضف للسلة
                                </button>
                                <button id="buyNowBtn" class="btn btn-success flex-1" data-prod-id="${product.id}">
                                    <i class="fa-regular fa-credit-card ml-2"></i>
                                    شراء الآن
                                </button>
                            </div>
                        </div>
                    `;

                    this.modal.classList.add('open');
                    this.bindProductEvents(product);
                }

                renderInputField(field) {
                    if (field.type === 'select') {
                        return `
                            <div>
                                <label class="input-label">${field.label} ${field.required ? '<span class="text-red-400">*</span>' : ''}</label>
                                <select id="field_${field.name}" class="input-field" ${field.required ? 'required' : ''}>
                                    ${field.options.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
                                </select>
                            </div>
                        `;
                    }
                    
                    return `
                        <div>
                            <label class="input-label">${field.label} ${field.required ? '<span class="text-red-400">*</span>' : ''}</label>
                            <input type="${field.type}" id="field_${field.name}" 
                                   placeholder="${field.placeholder || ''}" 
                                   class="input-field" 
                                   ${field.required ? 'required' : ''}>
                        </div>
                    `;
                }

                // ========== المحفظة والمعاملات ==========
                openWallet() {
                    const transactions = this.app.wallet.getTransactions(20);
                    
                    this.modalContent.innerHTML = `
                        <div class="modal-header">
                            <h2 class="modal-title">💰 المحفظة</h2>
                            <button class="modal-close" id="closeModalBtn">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="text-center mb-6">
                            <div class="wallet-icon-large mx-auto">
                                <i class="fa-solid fa-wallet"></i>
                            </div>
                            <div class="text-3xl font-bold mt-4 bg-gradient-to-r from-yellow-400 to-orange-400 bg-clip-text text-transparent">
                                ${this.app.wallet.getBalance().toLocaleString('ar-EG')}
                            </div>
                            <div class="text-sm text-gray-400">الرصيد الحالي</div>
                        </div>

                        <div class="grid grid-cols-2 gap-3 mb-4">
                            <button id="depositBtn" class="btn btn-success">
                                <i class="fa-solid fa-arrow-down ml-2"></i>
                                شحن
                            </button>
                            <button id="withdrawBtn" class="btn btn-danger">
                                <i class="fa-solid fa-arrow-up ml-2"></i>
                                سحب
                            </button>
                        </div>

                        <h3 class="font-bold mb-2 flex items-center gap-2">
                            <i class="fa-regular fa-clock text-blue-400"></i>
                            آخر المعاملات
                        </h3>
                        <div class="space-y-2 max-h-80 overflow-y-auto custom-scroll">
                            ${transactions.length === 0 ? `
                                <p class="text-gray-400 text-center py-4">لا توجد معاملات</p>
                            ` : transactions.map(tx => `
                                <div class="transaction-item">
                                    <div class="transaction-icon ${tx.amount > 0 ? 'deposit' : 'withdraw'}">
                                        <i class="fa-solid ${tx.amount > 0 ? 'fa-arrow-down' : 'fa-arrow-up'}"></i>
                                    </div>
                                    <div class="flex-1">
                                        <div class="flex justify-between">
                                            <span class="font-bold ${tx.amount > 0 ? 'text-green-400' : 'text-red-400'}">
                                                ${tx.amount > 0 ? '+' : ''}${tx.amount}
                                            </span>
                                            <span class="text-xs text-gray-400">${DateUtils.timeAgo(tx.createdAt)}</span>
                                        </div>
                                        <p class="text-xs text-gray-400">${tx.note || 'معاملة'}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <div class="mt-4">
                            <p class="text-xs text-gray-400 text-center">
                                عنوان المحفظة: ${this.app.wallet.getAddress()}
                            </p>
                        </div>
                    `;

                    this.modal.classList.add('open');
                    
                    document.getElementById('closeModalBtn').addEventListener('click', () => {
                        this.modal.classList.remove('open');
                    });
                    
                    document.getElementById('depositBtn').addEventListener('click', () => {
                        this.openDeposit();
                    });
                    
                    document.getElementById('withdrawBtn').addEventListener('click', () => {
                        this.openWithdraw();
                    });
                }

                openDeposit() {
                    const methods = this.app.paymentMethods.getAll();
                    
                    this.modalContent.innerHTML = `
                        <div class="modal-header">
                            <h2 class="modal-title">💳 شحن الرصيد</h2>
                            <button class="modal-close" id="closeModalBtn">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="mb-4">
                            <label class="input-label">المبلغ</label>
                            <input type="number" id="depositAmount" class="input-field" placeholder="أدخل المبلغ" min="1">
                        </div>

                        <h3 class="font-bold mb-2">طريقة الدفع</h3>
                        <div class="space-y-2 mb-4" id="paymentMethodsList">
                            ${methods.map(method => `
                                <div class="payment-method-card" data-method-id="${method.id}">
                                    <div class="payment-method-icon">
                                        <i class="${method.icon}"></i>
                                    </div>
                                    <div class="flex-1">
                                        <div class="font-bold">${method.name}</div>
                                        <div class="text-xs text-gray-400">${method.description}</div>
                                        ${method.fee > 0 ? `
                                            <div class="text-xs text-yellow-400">رسوم: ${method.fee}%</div>
                                        ` : ''}
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <button id="submitDepositBtn" class="btn btn-primary w-full" disabled>
                            تأكيد الشحن
                        </button>
                    `;

                    this.modal.classList.add('open');
                    
                    let selectedMethod = null;
                    
                    document.getElementById('closeModalBtn').addEventListener('click', () => {
                        this.modal.classList.remove('open');
                    });
                    
                    document.querySelectorAll('.payment-method-card').forEach(card => {
                        card.addEventListener('click', () => {
                            document.querySelectorAll('.payment-method-card').forEach(c => c.classList.remove('selected'));
                            card.classList.add('selected');
                            selectedMethod = card.dataset.methodId;
                            
                            const amount = document.getElementById('depositAmount').value;
                            document.getElementById('submitDepositBtn').disabled = !amount || amount <= 0;
                        });
                    });
                    
                    document.getElementById('depositAmount').addEventListener('input', (e) => {
                        const amount = e.target.value;
                        document.getElementById('submitDepositBtn').disabled = !amount || amount <= 0 || !selectedMethod;
                    });
                    
                    document.getElementById('submitDepositBtn').addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('depositAmount').value);
                        const method = this.app.paymentMethods.get(selectedMethod);
                        
                        if (amount && method) {
                            this.app.createDeposit(amount, method);
                        }
                    });
                }

                openWithdraw() {
                    const balance = this.app.wallet.getBalance();
                    
                    this.modalContent.innerHTML = `
                        <div class="modal-header">
                            <h2 class="modal-title">💸 سحب الرصيد</h2>
                            <button class="modal-close" id="closeModalBtn">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="mb-4">
                            <label class="input-label">المبلغ</label>
                            <input type="number" id="withdrawAmount" class="input-field" placeholder="أدخل المبلغ" min="10" max="${balance}">
                            <p class="text-xs text-gray-400 mt-1">الحد الأدنى: 10 | الحد الأقصى: ${balance}</p>
                        </div>

                        <div class="mb-4">
                            <label class="input-label">عنوان المحفظة</label>
                            <input type="text" id="withdrawAddress" class="input-field" value="${this.app.wallet.getAddress()}">
                        </div>

                        <button id="submitWithdrawBtn" class="btn btn-danger w-full" disabled>
                            تأكيد السحب
                        </button>
                    `;

                    this.modal.classList.add('open');
                    
                    document.getElementById('closeModalBtn').addEventListener('click', () => {
                        this.modal.classList.remove('open');
                    });
                    
                    document.getElementById('withdrawAmount').addEventListener('input', (e) => {
                        const amount = e.target.value;
                        const address = document.getElementById('withdrawAddress').value;
                        document.getElementById('submitWithdrawBtn').disabled = !amount || amount < 10 || amount > balance || !address;
                    });
                    
                    document.getElementById('withdrawAddress').addEventListener('input', () => {
                        const amount = document.getElementById('withdrawAmount').value;
                        const address = document.getElementById('withdrawAddress').value;
                        document.getElementById('submitWithdrawBtn').disabled = !amount || amount < 10 || amount > balance || !address;
                    });
                    
                    document.getElementById('submitWithdrawBtn').addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('withdrawAmount').value);
                        const address = document.getElementById('withdrawAddress').value;
                        
                        if (amount && address) {
                            this.app.createWithdrawal(amount, address);
                        }
                    });
                }

                openTransactions() {
                    const transactions = this.app.wallet.getTransactions(50);
                    
                    this.modalContent.innerHTML = `
                        <div class="modal-header">
                            <h2 class="modal-title">📊 جميع المعاملات</h2>
                            <button class="modal-close" id="closeModalBtn">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="space-y-2 max-h-[70vh] overflow-y-auto custom-scroll">
                            ${transactions.length === 0 ? `
                                <p class="text-gray-400 text-center py-8">لا توجد معاملات</p>
                            ` : transactions.map(tx => `
                                <div class="transaction-item">
                                    <div class="transaction-icon ${tx.amount > 0 ? 'deposit' : 'withdraw'}">
                                        <i class="fa-solid ${tx.amount > 0 ? 'fa-arrow-down' : 'fa-arrow-up'}"></i>
                                    </div>
                                    <div class="flex-1">
                                        <div class="flex justify-between items-center">
                                            <span class="font-bold ${tx.amount > 0 ? 'text-green-400' : 'text-red-400'}">
                                                ${tx.amount > 0 ? '+' : ''}${tx.amount}
                                            </span>
                                            <span class="text-xs text-gray-400">${DateUtils.format(tx.createdAt)}</span>
                                        </div>
                                        <p class="text-xs text-gray-400">${tx.note || 'معاملة'}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;

                    this.modal.classList.add('open');
                    
                    document.getElementById('closeModalBtn').addEventListener('click', () => {
                        this.modal.classList.remove('open');
                    });
                }

                // ========== السلة ==========
                openCart() {
                    const cartItems = this.app.cart.getAll();
                    const total = this.app.cart.getTotal();
                    
                    this.modalContent.innerHTML = `
                        <div class="modal-header">
                            <h2 class="modal-title">🛒 سلة التسوق</h2>
                            <button class="modal-close" id="closeModalBtn">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        ${cartItems.length === 0 ? `
                            <div class="text-center py-8">
                                <i class="fa-solid fa-cart-shopping text-5xl text-gray-600 mb-3"></i>
                                <p class="text-gray-400">السلة فارغة</p>
                            </div>
                        ` : `
                            <div class="space-y-2 mb-4 max-h-96 overflow-y-auto custom-scroll">
                                ${cartItems.map(item => `
                                    <div class="cart-item">
                                        <div class="cart-item-image">
                                            <i class="${item.icon || 'fa-box'} text-white text-xl"></i>
                                        </div>
                                        <div class="flex-1">
                                            <div class="flex justify-between">
                                                <span class="font-bold">${item.name}</span>
                                                <button class="remove-from-cart text-red-400" data-cart-id="${item.id}">
                                                    <i class="fa-solid fa-trash-can"></i>
                                                </button>
                                            </div>
                                            <div class="flex justify-between items-center mt-1">
                                                <span class="text-sm text-blue-400">${item.price}</span>
                                                <span class="text-xs text-gray-400">${Object.keys(item.fields || {}).length} حقول</span>
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>

                            <div class="glass-card p-4 rounded-xl mb-4">
                                <div class="flex justify-between items-center">
                                    <span class="font-bold">الإجمالي:</span>
                                    <span class="text-xl font-bold text-blue-400">${total}</span>
                                </div>
                            </div>

                            <div class="flex gap-3">
                                <button id="clearCartBtn" class="btn btn-outline flex-1">
                                    <i class="fa-regular fa-trash-can ml-2"></i>
                                    تفريغ
                                </button>
                                <button id="checkoutBtn" class="btn btn-success flex-1">
                                    <i class="fa-regular fa-credit-card ml-2"></i>
                                    شراء الكل
                                </button>
                            </div>
                        `}
                    `;

                    this.modal.classList.add('open');
                    
                    document.getElementById('closeModalBtn').addEventListener('click', () => {
                        this.modal.classList.remove('open');
                    });
                    
                    document.querySelectorAll('.remove-from-cart').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const cartId = btn.dataset.cartId;
                            this.app.removeFromCart(cartId);
                            this.openCart();
                        });
                    });
                    
                    document.getElementById('clearCartBtn')?.addEventListener('click', () => {
                        this.app.clearCart();
                        this.openCart();
                    });
                    
                    document.getElementById('checkoutBtn')?.addEventListener('click', () => {
                        this.openCheckout();
                    });
                }

                openCheckout() {
                    const cartItems = this.app.cart.getAll();
                    const total = this.app.cart.getTotal();
                    const methods = this.app.paymentMethods.getAll();
                    
                    this.modalContent.innerHTML = `
                        <div class="modal-header">
                            <h2 class="modal-title">💳 إتمام الشراء</h2>
                            <button class="modal-close" id="closeModalBtn">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="invoice mb-4">
                            <h3 class="font-bold text-lg mb-2">فاتورة الشراء</h3>
                            <div class="space-y-1 text-sm">
                                ${cartItems.map(item => `
                                    <div class="flex justify-between">
                                        <span>${item.name}</span>
                                        <span>${item.price}</span>
                                    </div>
                                `).join('')}
                                <div class="border-t border-white/20 my-2 pt-2 flex justify-between font-bold">
                                    <span>الإجمالي</span>
                                    <span>${total}</span>
                                </div>
                            </div>
                        </div>

                        <h3 class="font-bold mb-2">طريقة الدفع</h3>
                        <div class="space-y-2 mb-4" id="paymentMethodsList">
                            ${methods.map(method => `
                                <div class="payment-method-card" data-method-id="${method.id}">
                                    <div class="payment-method-icon">
                                        <i class="${method.icon}"></i>
                                    </div>
                                    <div class="flex-1">
                                        <div class="font-bold">${method.name}</div>
                                        <div class="text-xs text-gray-400">${method.description}</div>
                                        ${method.fee > 0 ? `
                                            <div class="text-xs text-yellow-400">رسوم: ${method.fee}%</div>
                                        ` : ''}
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <button id="confirmCheckoutBtn" class="btn btn-success w-full" disabled>
                            تأكيد الشراء
                        </button>
                    `;

                    this.modal.classList.add('open');
                    
                    let selectedMethod = null;
                    
                    document.getElementById('closeModalBtn').addEventListener('click', () => {
                        this.modal.classList.remove('open');
                    });
                    
                    document.querySelectorAll('.payment-method-card').forEach(card => {
                        card.addEventListener('click', () => {
                            document.querySelectorAll('.payment-method-card').forEach(c => c.classList.remove('selected'));
                            card.classList.add('selected');
                            selectedMethod = card.dataset.methodId;
                            document.getElementById('confirmCheckoutBtn').disabled = false;
                        });
                    });
                    
                    document.getElementById('confirmCheckoutBtn').addEventListener('click', () => {
                        const method = this.app.paymentMethods.get(selectedMethod);
                        if (method) {
                            this.app.checkout(method);
                        }
                    });
                }

                    this.bindAdminPanelEvents();

                renderDepositRequests() {
                    const requests = this.app.depositRequests.getPending();

                        return '<p class="text-gray-400 text-center py-4">لا توجد طلبات سحب معلقة</p>';

                    return requests.map(req => `

                                <div class="font-bold">${req.userName}</div>
                                <div class="text-sm">المبلغ: ${req.amount}</div>
                                <div class="text-xs text-gray-400">العنوان: ${req.address}</div>
                                <div class="text-xs text-gray-400">${DateUtils.format(req.createdAt)}</div>
                            </div>
                            <div class="actions">
                                <button class="approve-withdrawal" data-id="${req.id}" title="قبول">
                                    <i class="fa-solid fa-check text-green-400"></i>
                                </button>
                                <button class="reject-withdrawal" data-id="${req.id}" title="رفض">
                                    <i class="fa-solid fa-times text-red-400"></i>
                                </button>

                    `).join('');

                // ========== إدارة طرق الدفع ==========
                openPaymentMethodsManagement() {
                    const methods = this.app.paymentMethods.getAll();
                    
                    this.modalContent.innerHTML = `
                        <div class="modal-header">
                            <h2 class="modal-title">💳 إدارة طرق الدفع</h2>
                            <button class="modal-close" id="closeModalBtn">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="space-y-2 mb-4">
                            ${methods.map(method => `
                                <div class="admin-item">
                                    <div class="flex items-center gap-3">
                                        <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-blue-500/20 to-purple-500/20 flex items-center justify-center">
                                            <i class="${method.icon}"></i>
                                        </div>
                                        <div>
                                            <div class="font-bold">${method.name}</div>
                                            <div class="text-xs text-gray-400">${method.type}</div>
                                        </div>
                                    </div>
                                    <div class="actions">
                                        <button class="toggle-payment-method" data-id="${method.id}" title="${method.enabled ? 'تعطيل' : 'تفعيل'}">
                                            <i class="fa-solid ${method.enabled ? 'fa-toggle-on text-green-400' : 'fa-toggle-off text-gray-400'}"></i>
                                        </button>
                                        <button class="edit-payment-method" data-id="${method.id}" title="تعديل">
                                            <i class="fa-solid fa-pen-to-square"></i>
                                        </button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <button id="addPaymentMethodBtn" class="btn btn-primary w-full">
                            <i class="fa-solid fa-plus ml-2"></i>
                            إضافة طريقة دفع جديدة
                        </button>
                    `;

                    this.modal.classList.add('open');
                    
                    document.getElementById('closeModalBtn').addEventListener('click', () => {
                        this.modal.classList.remove('open');
                    });
                    
                    document.querySelectorAll('.toggle-payment-method').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            this.app.togglePaymentMethod(id);
                        });
                    });
                    
                    document.querySelectorAll('.edit-payment-method').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            this.openPaymentMethodModal(id);
                        });
                    });
                    
                    document.getElementById('addPaymentMethodBtn').addEventListener('click', () => {
                        this.openPaymentMethodModal();
                    });
                }

                openPaymentMethodModal(id = null) {
                    const method = id ? this.app.paymentMethods.get(id) : null;
                    
                    this.modalContent.innerHTML = `
                        <div class="modal-header">
                            <h2 class="modal-title">${method ? 'تعديل' : 'إضافة'} طريقة دفع</h2>
                            <button class="modal-close" id="closeModalBtn">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <form id="paymentMethodForm" class="space-y-4">
                            <input type="hidden" id="paymentMethodId" value="${method?.id || ''}">
                            
                            <div>
                                <label class="input-label">اسم الطريقة</label>
                                <input type="text" id="methodName" value="${method?.name || ''}" class="input-field" required>
                            </div>

                            <div>
                                <label class="input-label">الأيقونة</label>
                                <input type="text" id="methodIcon" value="${method?.icon || 'fa-credit-card'}" class="input-field" required>
                            </div>

                            <div>
                                <label class="input-label">النوع</label>
                                <select id="methodType" class="input-field">
                                    <option value="crypto" ${method?.type === 'crypto' ? 'selected' : ''}>عملة رقمية</option>
                                    <option value="card" ${method?.type === 'card' ? 'selected' : ''}>بطاقة ائتمان</option>
                                    <option value="bank" ${method?.type === 'bank' ? 'selected' : ''}}>تحويل بنكي</option>
                                    <option value="wallet" ${method?.type === 'wallet' ? 'selected' : ''}}>محفظة</option>
                                </select>
                            </div>

                            <div>
                                <label class="input-label">الوصف</label>
                                <input type="text" id="methodDescription" value="${method?.description || ''}" class="input-field">
                            </div>

                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="input-label">الحد الأدنى</label>
                                    <input type="number" id="methodMinAmount" value="${method?.minAmount || 1}" class="input-field">
                                </div>
                                <div>
                                    <label class="input-label">الحد الأقصى</label>
                                    <input type="number" id="methodMaxAmount" value="${method?.maxAmount || 10000}" class="input-field">
                                </div>
                            </div>

                            <div>
                                <label class="input-label">الرسوم (%)</label>
                                <input type="number" id="methodFee" value="${method?.fee || 0}" class="input-field" step="0.1">
                            </div>

                            <div>
                                <label class="input-label">التعليمات</label>
                                <textarea id="methodInstructions" class="input-field" rows="2">${method?.instructions || ''}</textarea>
                            </div>

                            <div>
                                <label class="input-label">التفاصيل (JSON)</label>
                                <textarea id="methodDetails" class="input-field" rows="3">${JSON.stringify(method?.details || {}, null, 2)}</textarea>
                            </div>

                            <div class="flex gap-3 pt-4">
                                <button type="submit" class="btn btn-primary flex-1">حفظ</button>
                                <button type="button" id="cancelBtn" class="btn btn-outline flex-1">إلغاء</button>
                            </div>
                        </form>
                    `;

                    this.modal.classList.add('open');
                    
                    document.getElementById('closeModalBtn').addEventListener('click', () => {
                        this.modal.classList.remove('open');
                    });
                    
                    document.getElementById('cancelBtn').addEventListener('click', () => {
                        this.modal.classList.remove('open');
                    });
                    
                    document.getElementById('paymentMethodForm').addEventListener('submit', (e) => {
                        e.preventDefault();
                        
                        try {
                            const formData = {
                                name: document.getElementById('methodName').value,
                                icon: document.getElementById('methodIcon').value,
                                type: document.getElementById('methodType').value,
                                description: document.getElementById('methodDescription').value,
                                minAmount: parseFloat(document.getElementById('methodMinAmount').value) || 1,
                                maxAmount: parseFloat(document.getElementById('methodMaxAmount').value) || 10000,
                                fee: parseFloat(document.getElementById('methodFee').value) || 0,
                                instructions: document.getElementById('methodInstructions').value,
                                details: JSON.parse(document.getElementById('methodDetails').value || '{}')
                            };
                            
                            const id = document.getElementById('paymentMethodId').value;
                            
                            if (id) {
                                this.app.updatePaymentMethod(id, formData);
                            } else {
                                this.app.addPaymentMethod(formData);
                            }
                        } catch (error) {
                            this.app.toast.error('خطأ في صيغة JSON');
                        }
                    });
                }

                openStoreManagement() {

                    this.modal.classList.add('open');
                    this.bindStoreManagementEvents();

                renderStoreManagement() {
                    const categories = this.app.store.getCategories();
                    const products = this.app.store.getProducts();
                    
                    return `
                        <div class="modal-header">

                                    إضافة
                                </button>

                            <div class="space-y-2 max-h-96 overflow-y-auto custom-scroll">

                                                <i class="fa-solid fa-pen-to-square"></i>
                                            </button>
                                            <button class="delete-category" data-id="${cat.id}" title="حذف">
                                                <i class="fa-solid fa-trash"></i>
                                            </button>

                                    </div>

                            </div>

                        <!-- المنتجات -->
                        <div id="productsTab" class="tab-content hidden">

                                <h3 class="font-bold">المنتجات</h3>
                                <button id="addProductBtn" class="btn btn-primary btn-sm">

                                    إضافة
                                </button>
                            </div>
                            <div class="mb-3">
                                <input type="text" id="productSearch" placeholder="بحث..." class="input-field">
                            </div>
                            <div class="space-y-2 max-h-80 overflow-y-auto custom-scroll" id="productsList">
                                ${products.map(prod => `
                                    <div class="admin-item">
                                        <div>
                                            <div class="font-bold">${prod.name}</div>
                                            <div class="text-sm">${prod.price}</div>
                                        </div>
                                        <div class="actions">
                                            <button class="edit-product" data-id="${prod.id}" title="تعديل">
                                                <i class="fa-solid fa-pen-to-square"></i>
                                            </button>
                                            <button class="delete-product" data-id="${prod.id}" title="حذف">
                                                <i class="fa-solid fa-trash"></i>
                                            </button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <!-- الطلبات -->
                        <div id="ordersTab" class="tab-content hidden">
                            <h3 class="font-bold mb-3">الطلبات</h3>
                            <div class="space-y-2 max-h-96 overflow-y-auto custom-scroll">
                                ${this.renderAllOrders()}
                            </div>
                        </div>
                    `;
                }

                renderAllOrders() {
                    const orders = this.app.store.getOrders();
                    
                    if (orders.length === 0) {
                        return '<p class="text-gray-400 text-center py-4">لا توجد طلبات</p>';
                    }
                    
                    return orders.map(order => `
                        <div class="admin-item cursor-pointer" onclick="app.ui.showOrderDetails('${order.id}')">
                            <div>
                                <div class="font-bold">${order.productName}</div>
                                <div class="text-sm">المستخدم: ${order.userId}</div>
                                <div class="text-xs text-gray-400">${DateUtils.format(order.createdAt)}</div>
                            </div>
                            <div class="text-left">
                                <div class="font-bold text-blue-400">${order.price}</div>
                                <span class="badge ${order.status === 'completed' ? 'badge-success' : 'badge-warning'}">
                                    ${order.status === 'completed' ? 'مكتمل' : 'معلق'}
                                </span>
                            </div>
                        </div>
                    `).join('');
                }

                showOrderDetails(orderId) {
                    const order = this.app.store.getOrder(orderId);
                    if (!order) return;
                    
                    this.modalContent.innerHTML = `
                        <div class="modal-header">
                            <h2 class="modal-title">تفاصيل الطلب</h2>
                            <button class="modal-close" id="closeModalBtn">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="space-y-4">
                            <div class="glass-card p-4 rounded-xl">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="font-bold">رقم الطلب</span>
                                    <span class="font-mono text-sm">${order.id}</span>
                                </div>
                                <div class="flex justify-between items-center mb-2">
                                    <span class="font-bold">المنتج</span>
                                    <span>${order.productName}</span>
                                </div>
                                <div class="flex justify-between items-center mb-2">
                                    <span class="font-bold">المبلغ</span>
                                    <span class="text-blue-400 font-bold">${order.price}</span>
                                </div>
                                <div class="flex justify-between items-center mb-2">
                                    <span class="font-bold">الحالة</span>
                                    <span class="badge ${order.status === 'completed' ? 'badge-success' : 'badge-warning'}">
                                        ${order.status === 'completed' ? 'مكتمل' : 'معلق'}
                                    </span>
                                </div>
                                <div class="flex justify-between items-center mb-2">
                                    <span class="font-bold">طريقة الدفع</span>
                                    <span>${order.paymentMethod?.name || 'غير محدد'}</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="font-bold">التاريخ</span>
                                    <span class="text-sm">${DateUtils.format(order.createdAt)}</span>

                                </button>
                            ` : ''}
                        </div>

                    document.getElementById('closeModalBtn').addEventListener('click', () => {
                        this.modal.classList.remove('open');
                    });
                    
                    const completeBtn = document.getElementById('completeOrderBtn');
                    if (completeBtn) {
                        completeBtn.addEventListener('click', () => {
                            this.app.completeOrder(order.id);
                        });
                    }
                }

                            <h2 class="modal-title">${category ? 'تعديل' : 'إضافة'} تصنيف</h2>
                            <button class="modal-close" id="closeModalBtn">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                                <input type="text" id="categoryName" value="${category?.name || ''}"

                            </div>

                            <div>
                                <label class="input-label">الأيقونة</label>
                                <input type="text" id="categoryIcon" value="${category?.icon || 'fa-folder'}" 
                                       class="input-field" required>

                            </div>

                            <div>
                                <label class="input-label">الوصف</label>
                                <textarea id="categoryDescription" class="input-field" rows="2">${category?.description || ''}</textarea>
                            </div>

                            <div>
                                <label class="input-label">اللون</label>
                                <input type="color" id="categoryColor" value="${category?.color || '#3b82f6'}" 
                                       class="w-full h-10 rounded-lg bg-slate-800 border border-white/10">
                            </div>

                            <div class="flex items-center gap-3">
                                <label class="input-label mb-0">تصنيف مميز</label>
                                <input type="checkbox" id="categoryFeatured" ${category?.featured ? 'checked' : ''}>
                            </div>

                            <div>
                                <label class="input-label">الترتيب</label>
                                <input type="number" id="categoryOrder" value="${category?.order || 0}" 
                                       class="input-field">
                            </div>

                            <div>
                                <label class="input-label">صورة التصنيف</label>
                                <div class="upload-area" id="categoryImageUpload">
                                    <i class="fa-solid fa-cloud-upload-alt text-3xl text-blue-400 mb-2"></i>
                                    <p class="text-sm">اضغط لرفع صورة</p>
                                    <input type="file" id="categoryImageFile" accept="image/*" class="hidden">
                                </div>
                                <div id="categoryImagePreview" class="mt-3 ${category?.imageId ? '' : 'hidden'}">
                                    <img src="${category?.imageId ? this.app.images.getUrl(category.imageId) : ''}" 
                                         class="image-preview mx-auto" id="categoryPreviewImg">
                                </div>
