<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المحفظة الذكية - بوابة تيليجرام</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts (Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        /* Glassmorphism محسن */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(59, 130, 246, 0.3);
        }

        /* Animations محسنة */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-slide {
            animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* Loader محسن */
        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: #3b82f6;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast Notifications محسنة */
        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: 90%;
            max-width: 350px;
        }

        .toast {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 10px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
        }

        .toast.success { border-right: 4px solid #10b981; }
        .toast.error { border-right: 4px solid #ef4444; }
        .toast.warning { border-right: 4px solid #f59e0b; }
        .toast.info { border-right: 4px solid #3b82f6; }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastOut {
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* Badge متحرك */
        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.2);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Wallet Icon محسن */
        .wallet-icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(145deg, #3b82f6, #8b5cf6);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: float 3s infinite ease-in-out;
            position: relative;
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.3);
        }

        .wallet-icon i {
            font-size: 40px;
            color: white;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

        .wallet-icon:hover {
            transform: scale(1.05) rotate(5deg);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Modal محسن */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: rgba(30, 41, 59, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            padding: 24px;
            width: 100%;
            max-width: 450px;
            max-height: 85vh;
            overflow-y: auto;
            transform: scale(0.9) translateY(20px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }

        /* Tabs محسنة */
        .modal-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 12px;
            background: transparent;
            border: none;
            color: #94a3b8;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-tab.active {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        /* Payment Methods محسنة */
        .payment-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            border-radius: 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
        }

        .payment-item:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: #3b82f6;
        }

        .payment-item.selected {
            background: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }

        .payment-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
        }

        /* Inputs محسنة */
        .custom-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            transition: all 0.2s;
        }

        .custom-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .custom-input::placeholder {
            color: #64748b;
        }

        /* Buttons محسنة */
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            font-size: 16px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 14px 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            font-size: 16px;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
        }

        /* Scrollbar محسنة */
        .scroll-custom::-webkit-scrollbar {
            width: 6px;
        }

        .scroll-custom::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        .scroll-custom::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.5);
            border-radius: 10px;
        }

        .scroll-custom::-webkit-scrollbar-thumb:hover {
            background: #3b82f6;
        }

        /* Product Card محسن */
        .product-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-4px);
            border-color: #3b82f6;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.2);
        }

        .discount-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 20px;
            z-index: 10;
        }

        /* Status Badges */
        .status-badge {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-pending { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .status-approved { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .status-rejected { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    </style>
</head>
<body>
    <div id="app" class="w-full max-w-md p-4"></div>

    <!-- Modal Container -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        (function() {
            // ======================== إعدادات ثابتة محسنة ========================
            const CONFIG = {
                ADMIN_ID: 7609492965,
                DEFAULT_BALANCE: 1000,
                APP_NAME: 'المحفظة الذكية',
                STORAGE_KEYS: {
                    USERS: 'smart_wallet_users',
                    WALLET: 'smart_wallet_data',
                    PAYMENT_METHODS: 'smart_wallet_payments',
                    DEPOSITS: 'smart_wallet_deposits',
                    WITHDRAWALS: 'smart_wallet_withdrawals',
                    PRODUCTS: 'smart_wallet_products',
                    CATEGORIES: 'smart_wallet_categories',
                    ORDERS: 'smart_wallet_orders',
                    CART: 'smart_wallet_cart',
                    NOTIFICATIONS: 'smart_wallet_notifications',
                    STATS: 'smart_wallet_stats'
                }
            };

            // ======================== Toast System محسن ========================
            class Toast {
                constructor() {
                    this.container = document.getElementById('toastContainer');
                }

                show(message, type = 'info', duration = 3000) {
                    const toast = document.createElement('div');
                    toast.className = `toast ${type}`;
                    
                    const icons = {
                        success: 'fa-check-circle',
                        error: 'fa-exclamation-circle',
                        warning: 'fa-exclamation-triangle',
                        info: 'fa-info-circle'
                    };
                    
                    toast.innerHTML = `
                        <i class="fas ${icons[type]} text-${type === 'success' ? 'green' : type === 'error' ? 'red' : type === 'warning' ? 'yellow' : 'blue'}-400 text-xl"></i>
                        <div>${message}</div>
                    `;
                    
                    this.container.appendChild(toast);
                    
                    setTimeout(() => {
                        toast.remove();
                    }, duration);
                }

                success(message) { this.show(message, 'success'); }
                error(message) { this.show(message, 'error'); }
                warning(message) { this.show(message, 'warning'); }
                info(message) { this.show(message, 'info'); }
            }

            // ======================== Storage Service محسن ========================
            class Storage {
                static get(key, defaultValue = null) {
                    try {
                        const data = localStorage.getItem(key);
                        return data ? JSON.parse(data) : defaultValue;
                    } catch {
                        return defaultValue;
                    }
                }

                static set(key, value) {
                    try {
                        localStorage.setItem(key, JSON.stringify(value));
                        return true;
                    } catch {
                        return false;
                    }
                }

                static remove(key) {
                    try {
                        localStorage.removeItem(key);
                        return true;
                    } catch {
                        return false;
                    }
                }
            }

            // ======================== ID Generator محسن ========================
            const generateId = (prefix = '') => {
                return prefix + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            };

            // ======================== Date Utils محسنة ========================
            const formatDate = (isoString) => {
                return new Date(isoString).toLocaleString('ar-EG', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            };

            // ======================== Telegram Service محسن ========================
            class TelegramService {
                constructor() {
                    this.tg = window.Telegram?.WebApp || null;
                    this.isAvailable = !!this.tg;
                }

                init() {
                    if (!this.isAvailable) return false;
                    this.tg.expand();
                    this.tg.ready();
                    this.tg.disableVerticalSwipes();
                    return true;
                }

                getUser() {
                    return this.tg?.initDataUnsafe?.user || null;
                }

                close() {
                    this.tg?.close();
                }

                showAlert(message, title = 'تنبيه') {
                    this.tg?.showPopup({ title, message, buttons: [{ type: 'ok', text: 'حسناً' }] });
                }

                setMainButton(text, callback) {
                    if (!this.tg) return;
                    const btn = this.tg.MainButton;
                    btn.setText(text);
                    btn.setColor('#3b82f6');
                    btn.setTextColor('#ffffff');
                    btn.show();
                    btn.onClick(callback);
                }

                hideMainButton() {
                    this.tg?.MainButton.hide();
                }
            }

            // ======================== Data Service محسن ========================
            class DataService {
                constructor() {
                    this.user = null;
                    this.balance = CONFIG.DEFAULT_BALANCE;
                    this.transactions = [];
                    this.paymentMethods = [];
                    this.deposits = [];
                    this.withdrawals = [];
                    this.categories = [];
                    this.products = [];
                    this.orders = [];
                    this.cart = [];
                    this.notifications = [];
                    this.stats = { users: 0, dailyOps: 0 };
                    
                    this.loadAll();
                }

                loadAll() {
                    // Load user data
                    const wallet = Storage.get(CONFIG.STORAGE_KEYS.WALLET);
                    if (wallet) {
                        this.balance = wallet.balance || CONFIG.DEFAULT_BALANCE;
                        this.transactions = wallet.transactions || [];
                    }

                    // Load payment methods
                    this.paymentMethods = Storage.get(CONFIG.STORAGE_KEYS.PAYMENT_METHODS, [
                        { 
                            id: generateId('pm_'), 
                            name: 'USDT (TRC20)', 
                            icon: 'fa-brands fa-tether',
                            description: 'عملة رقمية مستقرة',
                            depositDetails: 'العنوان: T9eK3zX8qLp2mN5rV7bA1cD4fG6hJ8kQ\nالشبكة: TRC20',
                            withdrawDetails: 'أدخل عنوان USDT الخاص بك'
                        },
                        { 
                            id: generateId('pm_'), 
                            name: 'بطاقة فيزا', 
                            icon: 'fa-regular fa-credit-card',
                            description: 'بطاقات ائتمانية',
                            depositDetails: 'رقم البطاقة: **** **** **** 1234',
                            withdrawDetails: 'أدخل بيانات بطاقتك'
                        },
                        { 
                            id: generateId('pm_'), 
                            name: 'تحويل بنكي', 
                            icon: 'fa-solid fa-building-columns',
                            description: 'حوالة بنكية',
                            depositDetails: 'IBAN: SA0380000000608010167519',
                            withdrawDetails: 'أدخل رقم IBAN'
                        }
                    ]);

                    // Load requests
                    this.deposits = Storage.get(CONFIG.STORAGE_KEYS.DEPOSITS, []);
                    this.withdrawals = Storage.get(CONFIG.STORAGE_KEYS.WITHDRAWALS, []);

                    // Load categories
                    this.categories = Storage.get(CONFIG.STORAGE_KEYS.CATEGORIES, [
                        { id: generateId('cat_'), name: '🎮 ألعاب', icon: 'fa-gamepad', order: 1 },
                        { id: generateId('cat_'), name: '📺 اشتراكات', icon: 'fa-tv', order: 2 },
                        { id: generateId('cat_'), name: '💳 بطاقات', icon: 'fa-gift', order: 3 }
                    ]);

                    // Load products
                    this.products = Storage.get(CONFIG.STORAGE_KEYS.PRODUCTS, [
                        {
                            id: generateId('prod_'),
                            name: 'شحن 100 UC',
                            price: 50,
                            categoryId: this.categories[0].id,
                            description: 'شحن UC للعبة PUBG',
                            stock: -1,
                            discount: 0,
                            image: '',
                            icon: 'fa-gamepad',
                            rating: 4.5,
                            inputFields: [
                                { name: 'userId', label: 'معرف اللعبة', type: 'text', required: true }
                            ],
                            fulfillment: { type: 'manual', instructions: 'سيتم الشحن خلال 24 ساعة' }
                        },
                        {
                            id: generateId('prod_'),
                            name: 'نتفلكس شهر',
                            price: 30,
                            categoryId: this.categories[1].id,
                            description: 'اشتراك نتفلكس لمدة شهر',
                            stock: 50,
                            discount: 10,
                            image: '',
                            icon: 'fa-film',
                            rating: 4.8,
                            inputFields: [
                                { name: 'email', label: 'البريد الإلكتروني', type: 'email', required: true }
                            ],
                            fulfillment: { type: 'account', value: 'user@example.com / pass123' }
                        }
                    ]);

                    // Load orders and cart
                    this.orders = Storage.get(CONFIG.STORAGE_KEYS.ORDERS, []);
                    this.cart = Storage.get(CONFIG.STORAGE_KEYS.CART, []);
                    
                    // Load notifications
                    this.notifications = Storage.get(CONFIG.STORAGE_KEYS.NOTIFICATIONS, []);

                    // Load stats
                    this.stats = Storage.get(CONFIG.STORAGE_KEYS.STATS, { users: 0, dailyOps: 0 });
                }

                // ========== Wallet Methods ==========
                saveWallet() {
                    Storage.set(CONFIG.STORAGE_KEYS.WALLET, {
                        balance: this.balance,
                        transactions: this.transactions
                    });
                }

                addTransaction(type, amount, description) {
                    const tx = {
                        id: generateId('tx_'),
                        type,
                        amount,
                        description,
                        date: new Date().toISOString()
                    };
                    this.transactions.unshift(tx);
                    if (this.transactions.length > 50) this.transactions.pop();
                    this.saveWallet();
                    return tx;
                }

                // ========== Payment Methods ==========
                savePaymentMethods() {
                    Storage.set(CONFIG.STORAGE_KEYS.PAYMENT_METHODS, this.paymentMethods);
                }

                addPaymentMethod(data) {
                    const method = { id: generateId('pm_'), ...data };
                    this.paymentMethods.push(method);
                    this.savePaymentMethods();
                    return method;
                }

                updatePaymentMethod(id, data) {
                    const index = this.paymentMethods.findIndex(m => m.id === id);
                    if (index !== -1) {
                        this.paymentMethods[index] = { ...this.paymentMethods[index], ...data };
                        this.savePaymentMethods();
                        return true;
                    }
                    return false;
                }

                deletePaymentMethod(id) {
                    this.paymentMethods = this.paymentMethods.filter(m => m.id !== id);
                    this.savePaymentMethods();
                }

                // ========== Deposit/Withdrawal Requests ==========
                saveRequests() {
                    Storage.set(CONFIG.STORAGE_KEYS.DEPOSITS, this.deposits);
                    Storage.set(CONFIG.STORAGE_KEYS.WITHDRAWALS, this.withdrawals);
                }

                addDeposit(amount, methodId, txId, user) {
                    const method = this.paymentMethods.find(m => m.id === methodId);
                    const deposit = {
                        id: generateId('dep_'),
                        userId: user.id,
                        userName: `${user.first_name} ${user.last_name || ''}`.trim(),
                        amount,
                        method: method ? method.name : 'غير معروف',
                        methodId,
                        txId,
                        status: 'pending',
                        date: new Date().toISOString()
                    };
                    this.deposits.push(deposit);
                    this.saveRequests();
                    
                    // Add notification for admin
                    this.addNotification(CONFIG.ADMIN_ID, 'طلب شحن جديد', `مبلغ: ${amount} من ${deposit.userName}`, 'info');
                    
                    return deposit;
                }

                addWithdrawal(amount, methodId, details, user) {
                    if (amount > this.balance) {
                        return { success: false, message: 'الرصيد غير كافٍ' };
                    }
                    
                    const method = this.paymentMethods.find(m => m.id === methodId);
                    const withdrawal = {
                        id: generateId('with_'),
                        userId: user.id,
                        userName: `${user.first_name} ${user.last_name || ''}`.trim(),
                        amount,
                        method: method ? method.name : 'غير معروف',
                        methodId,
                        details,
                        status: 'pending',
                        date: new Date().toISOString()
                    };
                    this.withdrawals.push(withdrawal);
                    this.saveRequests();
                    
                    // Add notification for admin
                    this.addNotification(CONFIG.ADMIN_ID, 'طلب سحب جديد', `مبلغ: ${amount} من ${withdrawal.userName}`, 'info');
                    
                    return { success: true, withdrawal };
                }

                approveDeposit(id) {
                    const deposit = this.deposits.find(d => d.id === id);
                    if (deposit && deposit.status === 'pending') {
                        deposit.status = 'approved';
                        this.balance += deposit.amount;
                        this.addTransaction('deposit', deposit.amount, `شحن عبر ${deposit.method}`);
                        this.saveWallet();
                        this.saveRequests();
                        
                        // Notify user
                        this.addNotification(deposit.userId, '✅ تم قبول طلب الشحن', `تم شحن مبلغ ${deposit.amount} إلى محفظتك`, 'success');
                        
                        return true;
                    }
                    return false;
                }

                rejectDeposit(id) {
                    const deposit = this.deposits.find(d => d.id === id);
                    if (deposit) {
                        deposit.status = 'rejected';
                        this.saveRequests();
                        
                        // Notify user
                        this.addNotification(deposit.userId, '❌ تم رفض طلب الشحن', `تم رفض طلب الشحن بمبلغ ${deposit.amount}`, 'error');
                        
                        return true;
                    }
                    return false;
                }

                approveWithdrawal(id) {
                    const withdrawal = this.withdrawals.find(w => w.id === id);
                    if (withdrawal && withdrawal.status === 'pending' && this.balance >= withdrawal.amount) {
                        withdrawal.status = 'approved';
                        this.balance -= withdrawal.amount;
                        this.addTransaction('withdraw', -withdrawal.amount, `سحب عبر ${withdrawal.method}`);
                        this.saveWallet();
                        this.saveRequests();
                        
                        // Notify user
                        this.addNotification(withdrawal.userId, '✅ تم قبول طلب السحب', `تم سحب مبلغ ${withdrawal.amount} من محفظتك`, 'success');
                        
                        return true;
                    }
                    return false;
                }

                rejectWithdrawal(id) {
                    const withdrawal = this.withdrawals.find(w => w.id === id);
                    if (withdrawal) {
                        withdrawal.status = 'rejected';
                        this.saveRequests();
                        
                        // Notify user
                        this.addNotification(withdrawal.userId, '❌ تم رفض طلب السحب', `تم رفض طلب السحب بمبلغ ${withdrawal.amount}`, 'error');
                        
                        return true;
                    }
                    return false;
                }

                getPendingDeposits() {
                    return this.deposits.filter(d => d.status === 'pending');
                }

                getPendingWithdrawals() {
                    return this.withdrawals.filter(w => w.status === 'pending');
                }

                // ========== Categories ==========
                saveCategories() {
                    Storage.set(CONFIG.STORAGE_KEYS.CATEGORIES, this.categories);
                }

                addCategory(data) {
                    const category = { id: generateId('cat_'), ...data };
                    this.categories.push(category);
                    this.saveCategories();
                    return category;
                }

                updateCategory(id, data) {
                    const index = this.categories.findIndex(c => c.id === id);
                    if (index !== -1) {
                        this.categories[index] = { ...this.categories[index], ...data };
                        this.saveCategories();
                        return true;
                    }
                    return false;
                }

                deleteCategory(id) {
                    this.categories = this.categories.filter(c => c.id !== id);
                    this.saveCategories();
                }

                // ========== Products ==========
                saveProducts() {
                    Storage.set(CONFIG.STORAGE_KEYS.PRODUCTS, this.products);
                }

                addProduct(data) {
                    const product = { id: generateId('prod_'), ...data };
                    this.products.push(product);
                    this.saveProducts();
                    return product;
                }

                updateProduct(id, data) {
                    const index = this.products.findIndex(p => p.id === id);
                    if (index !== -1) {
                        this.products[index] = { ...this.products[index], ...data };
                        this.saveProducts();
                        return true;
                    }
                    return false;
                }

                deleteProduct(id) {
                    this.products = this.products.filter(p => p.id !== id);
                    this.saveProducts();
                }

                // ========== Cart ==========
                saveCart() {
                    Storage.set(CONFIG.STORAGE_KEYS.CART, this.cart);
                }

                addToCart(product, inputData = {}, quantity = 1) {
                    if (product.stock !== -1 && product.stock < quantity) {
                        return { success: false, message: 'الكمية غير متوفرة' };
                    }
                    
                    const item = {
                        id: generateId('cart_'),
                        productId: product.id,
                        name: product.name,
                        price: product.price,
                        discount: product.discount || 0,
                        quantity,
                        inputData,
                        image: product.image,
                        icon: product.icon
                    };
                    
                    this.cart.push(item);
                    this.saveCart();
                    return { success: true, item };
                }

                removeFromCart(id) {
                    this.cart = this.cart.filter(item => item.id !== id);
                    this.saveCart();
                }

                updateCartQuantity(id, quantity) {
                    const item = this.cart.find(i => i.id === id);
                    if (item) {
                        item.quantity = quantity;
                        this.saveCart();
                        return true;
                    }
                    return false;
                }

                clearCart() {
                    this.cart = [];
                    this.saveCart();
                }

                getCartTotal() {
                    return this.cart.reduce((sum, item) => {
                        const price = item.price * (1 - (item.discount || 0) / 100);
                        return sum + (price * item.quantity);
                    }, 0);
                }

                // ========== Orders ==========
                saveOrders() {
                    Storage.set(CONFIG.STORAGE_KEYS.ORDERS, this.orders);
                }

                createOrder(product, inputData, quantity = 1) {
                    const total = product.price * quantity * (1 - (product.discount || 0) / 100);
                    
                    const order = {
                        id: generateId('ord_'),
                        userId: this.user?.id,
                        productId: product.id,
                        productName: product.name,
                        price: product.price,
                        quantity,
                        total,
                        inputData,
                        status: product.fulfillment.type === 'manual' ? 'pending' : 'confirmed',
                        fulfillment: product.fulfillment,
                        date: new Date().toISOString()
                    };
                    
                    this.orders.push(order);
                    this.saveOrders();
                    
                    // Update stock
                    if (product.stock !== -1) {
                        product.stock -= quantity;
                        this.saveProducts();
                    }
                    
                    return order;
                }

                checkout() {
                    const total = this.getCartTotal();
                    
                    if (total > this.balance) {
                        return { success: false, message: 'الرصيد غير كافٍ' };
                    }
                    
                    // Check stock for all items
                    for (const item of this.cart) {
                        const product = this.products.find(p => p.id === item.productId);
                        if (product && product.stock !== -1 && product.stock < item.quantity) {
                            return { success: false, message: `المنتج ${product.name} غير متوفر بالكمية المطلوبة` };
                        }
                    }
                    
                    // Create orders
                    const orders = [];
                    for (const item of this.cart) {
                        const product = this.products.find(p => p.id === item.productId);
                        const order = this.createOrder(product, item.inputData, item.quantity);
                        orders.push(order);
                        
                        // Add notification
                        this.addNotification(this.user.id, '✅ تم الطلب بنجاح', `تم طلب ${product.name} بنجاح`, 'success');
                    }
                    
                    // Update balance
                    this.balance -= total;
                    this.addTransaction('purchase', -total, `شراء من المتجر`);
                    this.saveWallet();
                    
                    // Clear cart
                    this.clearCart();
                    
                    return { success: true, orders };
                }

                getUserOrders() {
                    return this.orders
                        .filter(o => o.userId === this.user?.id)
                        .sort((a, b) => new Date(b.date) - new Date(a.date));
                }

                updateOrderStatus(id, status) {
                    const order = this.orders.find(o => o.id === id);
                    if (order) {
                        order.status = status;
                        this.saveOrders();
                        
                        // Notify user
                        this.addNotification(order.userId, '🔄 تحديث حالة الطلب', `تم تحديث حالة طلب ${order.productName} إلى ${status}`, 'info');
                        
                        return true;
                    }
                    return false;
                }

                // ========== Notifications ==========
                saveNotifications() {
                    Storage.set(CONFIG.STORAGE_KEYS.NOTIFICATIONS, this.notifications);
                }

                addNotification(userId, title, message, type = 'info') {
                    const notification = {
                        id: generateId('notif_'),
                        userId,
                        title,
                        message,
                        type,
                        read: false,
                        date: new Date().toISOString()
                    };
                    this.notifications.push(notification);
                    this.saveNotifications();
                    return notification;
                }

                getUserNotifications() {
                    return this.notifications
                        .filter(n => n.userId === this.user?.id)
                        .sort((a, b) => new Date(b.date) - new Date(a.date));
                }

                getUnreadCount() {
                    return this.notifications.filter(n => n.userId === this.user?.id && !n.read).length;
                }

                markNotificationAsRead(id) {
                    const notif = this.notifications.find(n => n.id === id);
                    if (notif) {
                        notif.read = true;
                        this.saveNotifications();
                    }
                }

                markAllAsRead() {
                    this.notifications.forEach(n => {
                        if (n.userId === this.user?.id) n.read = true;
                    });
                    this.saveNotifications();
                }

                // ========== Stats ==========
                saveStats() {
                    Storage.set(CONFIG.STORAGE_KEYS.STATS, this.stats);
                }

                registerUser(userId) {
                    // This would be handled by backend in real app
                    this.stats.users++;
                    this.saveStats();
                }

                incrementDailyOps() {
                    this.stats.dailyOps++;
                    this.saveStats();
                }
            }

                bindWalletModalEvents() {
                    const closeBtn = this.modalContent.querySelector('.close-modal');
                    closeBtn?.addEventListener('click', () => this.modalOverlay.classList.remove('active'));
                    
                    // Tab switching
                    const tabs = this.modalContent.querySelectorAll('.modal-tab');
                    tabs.forEach(tab => {
                        tab.addEventListener('click', () => {
                            tabs.forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');
                            
                            const tabName = tab.dataset.tab;
                            this.modalContent.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                            this.modalContent.getElementById(`${tabName}Tab`).classList.remove('hidden');
                        });
                    });
                    
                    // Deposit method selection
                    let selectedMethod = null;
                    const methodItems = this.modalContent.querySelectorAll('.payment-item[data-method-id]');
                    const detailsDiv = this.modalContent.getElementById('depositDetails');
                    const detailsText = this.modalContent.getElementById('depositDetailsText');
                    
                    methodItems.forEach(item => {
                        item.addEventListener('click', () => {
                            methodItems.forEach(i => i.classList.remove('selected'));
                            item.classList.add('selected');
                            
                            const methodId = item.dataset.methodId;
                            selectedMethod = methodId;
                            
                            const method = this.data.paymentMethods.find(m => m.id === methodId);
                            if (method?.depositDetails) {
                                detailsText.textContent = method.depositDetails;
                                detailsDiv.classList.remove('hidden');
                            } else {
                                detailsDiv.classList.add('hidden');
                            }
                        });
                    });
                    
                    // Submit deposit
                    this.modalContent.getElementById('submitDeposit')?.addEventListener('click', () => {
                        const amount = parseFloat(this.modalContent.getElementById('depositAmount').value);
                        const txId = this.modalContent.getElementById('depositTxId').value.trim();
                        
                        if (isNaN(amount) || amount < 10) {
                            this.toast.error('أدخل مبلغ صحيح (10 فأكثر)');
                            return;
                        }
                        
                        if (!selectedMethod) {
                            this.toast.error('اختر طريقة دفع أولاً');
                            return;
                        }
                        
                        if (!txId) {
                            this.toast.error('أدخل رقم العملية');
                            return;
                        }
                        
                        const deposit = this.data.addDeposit(amount, selectedMethod, txId, this.data.user);
                        this.toast.success(`✅ تم تقديم طلب الشحن رقم ${deposit.id.slice(-6)}`);
                        
                        this.modalOverlay.classList.remove('active');
                    });
                    
                    // Withdraw method selection
                    let selectedWithdrawMethod = null;
                    const withdrawItems = this.modalContent.querySelectorAll('[data-withdraw-method]');
                    withdrawItems.forEach(item => {
                        item.addEventListener('click', () => {
                            withdrawItems.forEach(i => i.classList.remove('selected'));
                            item.classList.add('selected');
                            selectedWithdrawMethod = item.dataset.withdrawMethod;
                        });
                    });
                    
                    // Submit withdrawal
                    this.modalContent.getElementById('submitWithdraw')?.addEventListener('click', () => {
                        const amount = parseFloat(this.modalContent.getElementById('withdrawAmount').value);
                        const details = this.modalContent.getElementById('withdrawDetails').value.trim();
                        
                        if (isNaN(amount) || amount < 10) {
                            this.toast.error('أدخل مبلغ صحيح (10 فأكثر)');
                            return;
                        }
                        
                        if (!selectedWithdrawMethod) {
                            this.toast.error('اختر طريقة سحب أولاً');
                            return;
                        }
                        
                        if (!details) {
                            this.toast.error('أدخل التفاصيل المطلوبة');
                            return;
                        }
                        
                        const result = this.data.addWithdrawal(amount, selectedWithdrawMethod, details, this.data.user);
                        
                        if (result.success) {
                            this.toast.success(`✅ تم تقديم طلب السحب رقم ${result.withdrawal.id.slice(-6)}`);
                            this.modalOverlay.classList.remove('active');
                        } else {
                            this.toast.error(result.message);
                        }
                    });
                }

                // ========== Store Modal ==========

                                    <button class="add-to-cart ${inCart ? 'bg-green-600' : 'bg-blue-600'} text-white px-3 py-1 rounded-lg text-sm" data-product-id="${p.id}">

                    const cartHtml = cart.length === 0 
                        ? '<p class="text-center text-gray-400 py-4">السلة فارغة</p>'
                        : cart.map(item => {
                            const itemTotal = item.price * item.quantity * (1 - (item.discount || 0) / 100);
                            return `
                                <div class="flex items-center gap-3 p-3 border-b border-white/5">
                                    <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-blue-500/20 to-purple-500/20 flex items-center justify-center">
                                        <i class="${item.icon} text-xl text-blue-400"></i>
                                    </div>
                                    <div class="flex-1">
                                        <div class="font-bold text-sm">${item.name}</div>

                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </div>

                        }).join('');
                    
                    this.modalContent.innerHTML = `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">المتجر الإلكتروني</h2>
                            <button class="close-modal w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 transition">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                        
                        <!-- Search -->
                        <div class="mb-4">
                            <input type="text" id="storeSearch" class="custom-input" placeholder="🔍 ابحث عن منتج...">
                        </div>
                        
                        <!-- Categories -->
                        <div class="flex gap-2 mb-4 overflow-x-auto pb-2 scroll-custom">
                            <button class="category-tab px-4 py-2 rounded-full text-sm bg-blue-600" data-cat="all">الكل</button>
                            ${categoriesHtml}
                        </div>
                        
                        <!-- Products Grid -->
                        <div class="grid grid-cols-2 gap-3 mb-4 max-h-96 overflow-y-auto scroll-custom p-1" id="productsGrid">
                            ${productsHtml}
                        </div>
                        
                        <!-- Cart -->
                        <div class="glass-card p-4 rounded-2xl">
                            <h3 class="font-bold mb-3 flex items-center gap-2">
                                <i class="fa-solid fa-cart-shopping"></i>
                                سلة التسوق
                                <span class="text-xs bg-blue-600 px-2 py-0.5 rounded-full">${cart.length}</span>
                            </h3>
                            
                            <div class="max-h-48 overflow-y-auto scroll-custom mb-3" id="cartItems">
                                ${cartHtml}
                            </div>
                            
                            <div class="flex items-center justify-between pt-3 border-t border-white/10">
                                <span>المجموع:</span>
                                <span class="text-xl font-bold text-blue-400">${cartTotal.toFixed(2)}</span>
                            </div>
                            
                            <button class="btn-primary mt-3 ${cart.length === 0 ? 'opacity-50' : ''}" id="checkoutBtn" ${cart.length === 0 ? 'disabled' : ''}>
                                إتمام الشراء
                            </button>
                        </div>
                    `;
                    
                    this.modalOverlay.classList.add('active');
                    this.bindStoreEvents();
                }

                bindStoreEvents() {
                    const closeBtn = this.modalContent.querySelector('.close-modal');
                    closeBtn?.addEventListener('click', () => this.modalOverlay.classList.remove('active'));
                    
                    // Category filter
                    const categoryTabs = this.modalContent.querySelectorAll('.category-tab');
                    categoryTabs.forEach(tab => {
                        tab.addEventListener('click', () => {
                            categoryTabs.forEach(t => t.classList.remove('bg-blue-600'));
                            tab.classList.add('bg-blue-600');
                            this.filterProducts();
                        });
                    });
                    
                    // Search
                    this.modalContent.getElementById('storeSearch')?.addEventListener('input', () => {
                        this.filterProducts();
                    });
                    
                    // Add to cart buttons
                    this.modalContent.querySelectorAll('.add-to-cart').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const productId = btn.dataset.productId;
                            const product = this.data.products.find(p => p.id === productId);
                            
                            if (product) {
                                const existing = this.data.cart.find(item => item.productId === productId);
                                
                                if (existing) {
                                    this.data.removeFromCart(existing.id);
                                    this.toast.info('تمت الإزالة من السلة');
                                } else {
                                    const result = this.data.addToCart(product, {}, 1);
                                    if (result.success) {
                                        this.toast.success('تمت الإضافة للسلة');
                                    }
                                }
                                
                                this.openStoreModal();
                            }
                        });
                    });
                    
                    // Product click for details
                    this.modalContent.querySelectorAll('.product-card').forEach(card => {
                        card.addEventListener('click', (e) => {
                            if (e.target.classList.contains('add-to-cart')) return;
                            const productId = card.dataset.productId;
                            this.openProductDetails(productId);
                        });
                    });
                    
                    // Remove from cart
                    this.modalContent.querySelectorAll('.remove-cart').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const cartId = btn.dataset.cartId;
                            this.data.removeFromCart(cartId);
                            this.toast.info('تمت الإزالة من السلة');
                            this.openStoreModal();
                        });
                    });
                    
                    // Checkout
                    this.modalContent.getElementById('checkoutBtn')?.addEventListener('click', () => {
                        const result = this.data.checkout();
                        
                        if (result.success) {
                            this.toast.success('✅ تمت عملية الشراء بنجاح');
                            this.modalOverlay.classList.remove('active');
                            this.render();
                        } else {
                            this.toast.error(result.message);
                        }
                    });
                }

                filterProducts() {
                    const searchTerm = this.modalContent.getElementById('storeSearch').value.toLowerCase();
                    const activeCat = this.modalContent.querySelector('.category-tab.bg-blue-600')?.dataset.cat || 'all';
                    
                    const filtered = this.data.products.filter(p => {
                        const matchesSearch = p.name.toLowerCase().includes(searchTerm) || 
                                             (p.description && p.description.toLowerCase().includes(searchTerm));
                        const matchesCat = activeCat === 'all' || p.categoryId === activeCat;
                        return matchesSearch && matchesCat;
                    });
                    
                    const cart = this.data.cart;
                    
                    const html = filtered.map(p => {
                        const inCart = cart.some(item => item.productId === p.id);
                        const finalPrice = p.price * (1 - (p.discount || 0) / 100);
                        
                        return `
                            <div class="product-card" data-product-id="${p.id}">
                                ${p.discount ? `<span class="discount-badge">-${p.discount}%</span>` : ''}
                                <div class="w-full h-32 bg-gradient-to-br from-blue-500/20 to-purple-500/20 rounded-xl flex items-center justify-center mb-3">
                                    <i class="${p.icon} text-4xl text-blue-400"></i>
                                </div>
                                <h3 class="font-bold mb-1">${p.name}</h3>
                                <div class="flex items-center gap-1 mb-2">
                                    <i class="fa-solid fa-star text-yellow-400 text-xs"></i>
                                    <span class="text-xs">${p.rating || '0'}</span>
                                </div>
                                <div class="flex items-center justify-between">
                                    <div>
                                        ${p.discount ? `
                                            <span class="text-xs text-gray-400 line-through ml-1">${p.price}</span>
                                        ` : ''}
                                        <span class="text-blue-400 font-bold">${finalPrice}</span>
                                    </div>
                                    <button class="add-to-cart ${inCart ? 'bg-green-600' : 'bg-blue-600'} text-white px-3 py-1 rounded-lg text-sm" data-product-id="${p.id}">
                                        ${inCart ? '✓ في السلة' : '➕'}
                                    </button>
                                </div>
                            </div>
                        `;
                    }).join('');
                    
                    this.modalContent.getElementById('productsGrid').innerHTML = html || '<p class="text-center text-gray-400 py-8 col-span-2">لا توجد منتجات</p>';
                    
                    // Rebind events
                    this.modalContent.querySelectorAll('.add-to-cart').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const productId = btn.dataset.productId;
                            const product = this.data.products.find(p => p.id === productId);
                            
                            if (product) {
                                const existing = this.data.cart.find(item => item.productId === productId);
                                
                                if (existing) {
                                    this.data.removeFromCart(existing.id);
                                    this.toast.info('تمت الإزالة من السلة');
                                } else {
                                    const result = this.data.addToCart(product, {}, 1);
                                    if (result.success) {
                                        this.toast.success('تمت الإضافة للسلة');
                                    }
                                }
                                
                                this.filterProducts();
                                this.updateCartDisplay();
                            }
                        });
                    });
                    
                    this.modalContent.querySelectorAll('.product-card').forEach(card => {
                        card.addEventListener('click', (e) => {
                            if (e.target.classList.contains('add-to-cart')) return;
                            const productId = card.dataset.productId;
                            this.openProductDetails(productId);
                        });
                    });
                }

                updateCartDisplay() {
                    const cart = this.data.cart;
                    const cartTotal = this.data.getCartTotal();
                    
                    const cartHtml = cart.length === 0 
                        ? '<p class="text-center text-gray-400 py-4">السلة فارغة</p>'
                        : cart.map(item => {
                            const itemTotal = item.price * item.quantity * (1 - (item.discount || 0) / 100);
                            return `
                                <div class="flex items-center gap-3 p-3 border-b border-white/5">
                                    <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-blue-500/20 to-purple-500/20 flex items-center justify-center">
                                        <i class="${item.icon} text-xl text-blue-400"></i>
                                    </div>
                                    <div class="flex-1">
                                        <div class="font-bold text-sm">${item.name}</div>
                                        <div class="text-xs text-gray-400">الكمية: ${item.quantity}</div>
                                    </div>
                                    <div class="text-blue-400 font-bold">${itemTotal.toFixed(2)}</div>
                                    <button class="remove-cart text-red-400 hover:text-red-300" data-cart-id="${item.id}">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </div>
                            `;
                        }).join('');
                    
                    this.modalContent.getElementById('cartItems').innerHTML = cartHtml;
                    
                    const totalEl = this.modalContent.querySelector('.text-xl.font-bold.text-blue-400');
                    if (totalEl) totalEl.textContent = cartTotal.toFixed(2);
                    
                    const cartCount = this.modalContent.querySelector('.bg-blue-600.px-2.py-0.5');
                    if (cartCount) cartCount.textContent = cart.length;
                    
                    const checkoutBtn = this.modalContent.getElementById('checkoutBtn');
                    if (checkoutBtn) {
                        if (cart.length === 0) {
                            checkoutBtn.disabled = true;
                            checkoutBtn.classList.add('opacity-50');
                        } else {
                            checkoutBtn.disabled = false;
                            checkoutBtn.classList.remove('opacity-50');
                        }
                    }
                    
                    // Rebind remove events
                    this.modalContent.querySelectorAll('.remove-cart').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const cartId = btn.dataset.cartId;
                            this.data.removeFromCart(cartId);
                            this.toast.info('تمت الإزالة من السلة');
                            this.updateCartDisplay();
                        });
                    });
                }

                openProductDetails(productId) {
                    const product = this.data.products.find(p => p.id === productId);
                    if (!product) return;
                    
                    const inputFieldsHtml = product.inputFields.map(field => `
                        <div class="mb-3">
                            <label class="block text-sm text-gray-400 mb-1">${field.label}</label>
                            <input type="${field.type}" id="field_${field.name}" class="custom-input" placeholder="${field.placeholder || ''}" ${field.required ? 'required' : ''}>
                        </div>
                    `).join('');
                    
                    const finalPrice = product.price * (1 - (product.discount || 0) / 100);
                    
                    this.modalContent.innerHTML = `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">${product.name}</h2>
                            <button class="close-modal w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 transition">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                        
                        <div class="flex justify-center mb-4">
                            <div class="w-32 h-32 rounded-2xl bg-gradient-to-br from-blue-500/20 to-purple-500/20 flex items-center justify-center">
                                <i class="${product.icon} text-5xl text-blue-400"></i>
                            </div>
                        </div>
                        
                        <p class="text-gray-300 text-sm mb-4 text-center">${product.description || ''}</p>
                        
                        <div class="glass-card p-4 rounded-2xl mb-4">
                            <div class="text-center mb-4">
                                ${product.discount ? `
                                    <span class="text-gray-400 line-through ml-2">${product.price}</span>
                                ` : ''}
                                <span class="text-3xl font-bold text-blue-400">${finalPrice}</span>
                            </div>
                            
                            <form id="productForm">
                                ${inputFieldsHtml}
                                
                                <div class="mb-3">
                                    <label class="block text-sm text-gray-400 mb-1">الكمية</label>
                                    <input type="number" id="productQuantity" value="1" min="1" max="${product.stock === -1 ? 100 : product.stock}" class="custom-input">
                                </div>
                                
                                <div class="flex gap-2">
                                    <button type="button" id="addToCartBtn" class="btn-secondary flex-1">
                                        <i class="fa-solid fa-cart-plus ml-1"></i>
                                        أضف للسلة
                                    </button>
                                    <button type="submit" id="buyNowBtn" class="btn-primary flex-1">
                                        <i class="fa-solid fa-bolt ml-1"></i>
                                        شراء الآن
                                    </button>
                                </div>
                            </form>
                        </div>
                    `;
                    
                    this.modalOverlay.classList.add('active');
                    
                    const closeBtn = this.modalContent.querySelector('.close-modal');
                    closeBtn?.addEventListener('click', () => this.modalOverlay.classList.remove('active'));
                    
                    // Add to cart
                    this.modalContent.getElementById('addToCartBtn')?.addEventListener('click', () => {
                        const quantity = parseInt(this.modalContent.getElementById('productQuantity').value) || 1;
                        const inputData = {};
                        
                        product.inputFields.forEach(field => {
                            const input = this.modalContent.getElementById(`field_${field.name}`);
                            if (input) inputData[field.name] = input.value;
                        });
                        
                        const result = this.data.addToCart(product, inputData, quantity);
                        
                        if (result.success) {
                            this.toast.success('تمت الإضافة للسلة');
                            this.modalOverlay.classList.remove('active');
                        } else {
                            this.toast.error(result.message);
                        }
                    });
                    
                    // Buy now
                    this.modalContent.getElementById('productForm')?.addEventListener('submit', (e) => {
                        e.preventDefault();
                        
                        const quantity = parseInt(this.modalContent.getElementById('productQuantity').value) || 1;
                        const total = finalPrice * quantity;
                        
                        if (total > this.data.balance) {
                            this.toast.error('الرصيد غير كافٍ');
                            return;
                        }
                        
                        const inputData = {};
                        product.inputFields.forEach(field => {
                            const input = this.modalContent.getElementById(`field_${field.name}`);
                            if (input) inputData[field.name] = input.value;
                        });
                        
                        // Create order
                        const order = this.data.createOrder(product, inputData, quantity);
                        
                        // Update balance
                        this.data.balance -= total;
                        this.data.addTransaction('purchase', -total, `شراء ${product.name}`);
                        this.data.saveWallet();
                        
                        // Add notification
                        this.data.addNotification(this.data.user.id, '✅ تم الشراء بنجاح', `تم شراء ${product.name}`, 'success');
