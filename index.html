<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>البوابة الذهبية | Telegram Web App</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts (Cairo & Playfair Display for Luxury feel) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                        luxury: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        gold: {
                            50: '#fdfbf7',
                            100: '#f9f4e6',
                            200: '#f0e3c2',
                            300: '#e5cda0',
                            400: '#d4b076',
                            500: '#c59a57', // Base Gold
                            600: '#b08246',
                            700: '#91683a',
                            800: '#765432',
                            900: '#61462d',
                            glow: '#ffd700',
                        },
                        black: {
                            900: '#050505',
                            800: '#0a0a0a',
                            700: '#121212',
                            card: '#1a1a1a',
                        }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'shine': 'shine 2s linear infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'scale-in': 'scaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'dots': 'dots 1.5s infinite steps(4)',
                    },
                    keyframes: {
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
                        shine: { '0%': { backgroundPosition: '-200% center' }, '100%': { backgroundPosition: '200% center' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(30px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        scaleIn: { '0%': { opacity: '0', transform: 'scale(0.9)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
                        dots: { '0%, 20%': { content: '"."' }, '40%': { content: '".."' }, '60%': { content: '"..."' }, '80%, 100%': { content: '""' } }
                    },
                    backgroundImage: {
                        'gold-gradient': 'linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c)',
                        'gold-gradient-text': 'linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c)',
                        'dark-gradient': 'linear-gradient(to bottom, #0a0a0a, #121212)',
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --gold-primary: #d4af37;
            --gold-light: #f3e5ab;
            --black-deep: #050505;
            --glass-bg: rgba(20, 20, 20, 0.7);
            --glass-border: rgba(212, 175, 55, 0.2);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--black-deep);
            color: #ffffff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
            margin: 0;
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #050505 100%);
        }

        /* Luxury Glassmorphism */
        .luxury-card {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }

        .luxury-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.5), transparent);
            opacity: 0.5;
        }

        .luxury-btn {
            background: linear-gradient(135deg, #b88a44 0%, #eebb55 50%, #b88a44 100%);
            background-size: 200% auto;
            color: #000;
            font-weight: 700;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(184, 138, 68, 0.3);
        }

        .luxury-btn:hover {
            background-position: right center;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(184, 138, 68, 0.5);
        }

        .luxury-btn:active {
            transform: scale(0.98);
        }

        .text-gold-gradient {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 2px 10px rgba(179, 135, 40, 0.3);
        }

        .icon-gold {
            color: #d4af37;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }

        /* Ambient Glow */
        .ambient-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 10s infinite ease-in-out;
            background: radial-gradient(circle, #d4af37 0%, transparent 70%);
        }
        .glow-1 { top: -10%; right: -10%; width: 300px; height: 300px; }
        .glow-2 { bottom: -10%; left: -10%; width: 250px; height: 250px; animation-delay: -5s; }

        /* Loader */
        .loader-ring {
            width: 60px; height: 60px;
            border: 2px solid rgba(212, 175, 55, 0.1);
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .status-text::after { content: ""; animation: dots 1.5s infinite steps(4); }

        /* Toast */
        .toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 90%; max-width: 350px; pointer-events: none; }
        .toast {
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #fff;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            pointer-events: auto;
            backdrop-filter: blur(10px);
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .toast.hide { animation: slideUp 0.3s ease forwards; }
        @keyframes slideUp { to { opacity: 0; transform: translateY(-20px); } }

        .hidden-view { display: none !important; }
        .fade-in { animation: scale-in 0.5s ease-out forwards; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #d4af37; }
    </style>
</head>
<body class="flex flex-col items-center justify-start p-4 relative selection:bg-yellow-500/30">

    <!-- Background -->
    <div class="ambient-glow">
        <div class="glow-orb glow-1"></div>
        <div class="glow-orb glow-2"></div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- VIEW 1: LOADING -->
    <div id="loadingView" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#050505] transition-opacity duration-500">
        <div class="flex flex-col items-center justify-center">
            <div class="loader-ring mb-6"></div>
            <h2 class="text-xl font-bold text-white tracking-widest uppercase font-luxury">
                <span class="text-gold-gradient">ROYAL</span> GATE<span class="status-text"></span>
            </h2>
            <p class="text-xs text-gray-500 mt-3 font-mono opacity-60" id="loadingSubtext">مزامنة مع الخادم...</p>
        </div>
    </div>

    <!-- VIEW 2: ACCESS DENIED -->
    <div id="accessDeniedView" class="hidden-view w-full max-w-md flex flex-col items-center justify-center min-h-[80vh] fade-in">
        <div class="luxury-card p-8 rounded-3xl text-center w-full border-red-900/30 shadow-2xl shadow-red-900/10">
            <div class="w-24 h-24 bg-red-900/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl shadow-inner animate-bounce border border-red-900/20">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h2 class="text-2xl font-bold mb-3 text-white font-luxury">دخول مرفوض</h2>
            <p class="text-gray-400 mb-8 text-sm leading-relaxed px-4">
                يجب فتح هذه البوابة حصراً عبر تطبيق تيليجرام الرسمي لضمان الأمان الملكي للبيانات.
            </p>
            <button onclick="window.location.href='https://telegram.org'" class="w-full py-4 rounded-xl font-bold text-black bg-gradient-to-r from-yellow-600 via-yellow-400 to-yellow-600 hover:shadow-lg hover:shadow-yellow-500/20 transition-all transform hover:-translate-y-1 active:scale-95">
                <i class="fa-brands fa-telegram ml-2"></i> فتح تيليجرام
            </button>
            <button onclick="location.reload()" class="mt-4 text-xs text-gray-500 hover:text-yellow-500 underline transition-colors">إعادة المحاولة</button>
        </div>
    </div>

    <!-- VIEW 3: DASHBOARD -->
    <div id="dashboardView" class="hidden-view w-full max-w-md space-y-6 pb-24 fade-in">
        
        <!-- Header Section -->
        <header class="flex items-center justify-between mb-6 pt-4">
            <div>
                <p class="text-xs text-gray-400 mb-1 tracking-wider uppercase">مرحباً بك في</p>
                <h1 class="text-3xl font-bold text-white tracking-tight font-luxury">
                    البوابة <span class="text-gold-gradient">الملكية</span>
                </h1>
                <p class="text-xs text-gray-500 mt-2 font-mono" id="currentDate">...</p>
            </div>
            <div class="relative group cursor-pointer" onclick="showToast('لا توجد إشعارات جديدة', 'info')">
                <div class="w-12 h-12 rounded-full bg-gradient-to-br from-yellow-600 to-yellow-300 flex items-center justify-center shadow-lg shadow-yellow-600/20 transition-transform group-hover:scale-110 border border-yellow-200/20">
                    <i class="fa-solid fa-bell text-black text-lg"></i>
                </div>
                <span class="absolute top-0 right-0 w-3 h-3 bg-red-500 border-2 border-[#050505] rounded-full animate-pulse shadow-[0_0_10px_rgba(239,68,68,0.8)]"></span>
            </div>
        </header>

        <!-- Main Profile Card -->
        <div class="luxury-card p-6 rounded-3xl relative group">
            <!-- Decorative Glow -->
            <div class="absolute top-0 right-0 w-40 h-40 bg-yellow-600/10 rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none"></div>
            
            <div class="flex items-center gap-5 relative z-10">
                <!-- Avatar with Gold Ring -->
                <div class="relative">
                    <div class="absolute inset-0 bg-gradient-to-tr from-yellow-600 to-yellow-300 rounded-2xl blur opacity-50 group-hover:opacity-80 transition-opacity duration-500"></div>
                    <div id="avatarContainer" class="w-20 h-20 rounded-2xl border-2 border-yellow-500/30 overflow-hidden bg-black relative z-10 shadow-xl">
                        <img id="userPhoto" src="" alt="User" class="w-full h-full object-cover hidden">
                        <div id="defaultAvatar" class="w-full h-full flex items-center justify-center text-2xl font-bold text-yellow-500 bg-neutral-900">
                            <span id="avatarInitials">U</span>
                        </div>
                    </div>
                    <div class="absolute -bottom-1 -right-1 w-5 h-5 bg-green-500 border-2 border-[#050505] rounded-full z-20 shadow-[0_0_10px_rgba(34,197,94,0.6)]"></div>
                </div>

                <!-- Info -->
                <div class="flex-1 min-w-0">
                    <h2 class="text-lg font-bold text-white truncate" id="userName">مستخدم</h2>
                    <div class="flex items-center gap-2 mt-2">
                        <span class="text-xs text-gray-400 font-mono bg-white/5 px-2.5 py-1 rounded-lg select-all border border-white/5" id="userId">ID: 00000</span>
                        <button onclick="copyId()" class="text-gray-400 hover:text-yellow-400 hover:bg-white/10 p-1.5 rounded-lg transition-colors" title="نسخ المعرف">
                            <i class="fa-regular fa-copy text-xs"></i>
                        </button>
                    </div>
                    <div class="mt-2 inline-flex items-center gap-1.5 px-2 py-0.5 rounded-md bg-yellow-500/10 border border-yellow-500/20">
                        <span class="w-1.5 h-1.5 rounded-full bg-yellow-500 animate-pulse"></span>
                        <span class="text-[10px] font-bold text-yellow-500 uppercase tracking-wide">عضو مميز</span>
                    </div>
                </div>

                <!-- Balance Mini Card -->
                <div class="bg-gradient-to-br from-neutral-900 to-black px-4 py-3 rounded-2xl border border-yellow-500/20 flex flex-col items-center min-w-[90px] shadow-lg relative overflow-hidden">
                    <div class="absolute inset-0 bg-yellow-500/5 blur-xl"></div>
                    <span class="text-[10px] text-gray-400 mb-1 font-medium relative z-10">الرصيد الذهبي</span>
                    <div class="flex items-center gap-1.5 text-yellow-400 drop-shadow-md relative z-10">
                        <i class="fa-solid fa-coins text-sm"></i>
                        <span class="font-bold text-white text-base tracking-tight font-luxury" id="userBalance">0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-2 gap-4">
            <div class="luxury-card p-4 rounded-2xl flex flex-col items-center justify-center text-center active:scale-95 transition-transform cursor-default border-yellow-500/10">
                <div class="w-10 h-10 rounded-full bg-yellow-500/10 text-yellow-400 flex items-center justify-center mb-2.5 border border-yellow-500/20">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
                <span class="text-gray-400 text-xs mb-1 font-medium">الأداء العام</span>
                <span class="text-white font-bold text-lg text-gold-gradient">ممتاز</span>
            </div>
            <div class="luxury-card p-4 rounded-2xl flex flex-col items-center justify-center text-center active:scale-95 transition-transform cursor-default border-yellow-500/10">
                <div class="w-10 h-10 rounded-full bg-yellow-500/10 text-yellow-400 flex items-center justify-center mb-2.5 border border-yellow-500/20">
                    <i class="fa-solid fa-crown"></i>
                </div>
                <span class="text-gray-400 text-xs mb-1 font-medium">الرتبة الحالية</span>
                <span class="text-white font-bold text-lg text-gold-gradient">ملكي</span>
            </div>
        </div>

        <!-- Actions Menu -->
        <div class="luxury-card p-5 rounded-3xl border-yellow-500/10">
            <div class="flex items-center justify-between mb-5">
                <h3 class="font-bold text-white text-base font-luxury">القائمة الرئيسية</h3>
                <span class="text-[10px] text-yellow-600 bg-yellow-500/10 px-2 py-1 rounded-md border border-yellow-500/20">v4.0 Gold</span>
            </div>
            
            <div class="space-y-3">
                <!-- Action Item 1 -->
                <button onclick="handleAction('refresh')" class="w-full p-4 rounded-xl flex items-center justify-between luxury-card hover:bg-white/5 group border-yellow-500/5">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-yellow-600 to-yellow-400 text-black flex items-center justify-center group-hover:scale-110 transition-all duration-300 shadow-lg shadow-yellow-500/20">
                            <i class="fa-solid fa-sync"></i>
                        </div>
                        <span class="text-gray-200 text-sm font-medium">تحديث البيانات</span>
                    </div>
                    <i class="fa-solid fa-chevron-left text-gray-600 text-xs group-hover:translate-x-[-4px] transition-transform duration-300"></i>
                </button>

                <!-- Action Item 2 -->
                <button onclick="handleAction('support')" class="w-full p-4 rounded-xl flex items-center justify-between luxury-card hover:bg-white/5 group border-yellow-500/5">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-lg bg-neutral-800 text-yellow-500 flex items-center justify-center group-hover:bg-yellow-500 group-hover:text-black transition-all duration-300 border border-yellow-500/20">
                            <i class="fa-solid fa-headset"></i>
                        </div>
                        <span class="text-gray-200 text-sm font-medium">الدعم الفني</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse shadow-[0_0_8px_rgba(239,68,68,0.8)]"></span>
                        <i class="fa-solid fa-chevron-left text-gray-600 text-xs group-hover:translate-x-[-4px] transition-transform duration-300"></i>
                    </div>
                </button>

                <!-- Action Item 3 (Locked) -->
                <button disabled class="w-full p-4 rounded-xl flex items-center justify-between opacity-50 cursor-not-allowed border border-dashed border-gray-800 bg-transparent">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-lg bg-gray-900 text-gray-600 flex items-center justify-center border border-gray-800">
                            <i class="fa-solid fa-lock"></i>
                        </div>
                        <span class="text-gray-500 text-sm font-medium">الميزات الحصرية (قريباً)</span>
                    </div>
                </button>
            </div>
        </div>

        <!-- Footer / Logout -->
        <button onclick="confirmLogout()" class="w-full py-4 rounded-xl font-bold text-red-400 hover:bg-red-900/10 hover:text-red-300 hover:border-red-900/30 transition-all duration-300 border border-transparent flex items-center justify-center gap-2.5 group mt-4">
            <i class="fa-solid fa-arrow-right-from-bracket group-hover:-translate-x-1 transition-transform"></i>
            إنهاء الجلسة الآمنة
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        // State Management
        const views = {
            loading: document.getElementById('loadingView'),
            denied: document.getElementById('accessDeniedView'),
            dashboard: document.getElementById('dashboardView')
        };

        const els = {
            userName: document.getElementById('userName'),
            headerName: document.getElementById('headerUserName'),
            userId: document.getElementById('userId'),
            photo: document.getElementById('userPhoto'),
            defaultAvatar: document.getElementById('defaultAvatar'),
            initials: document.getElementById('avatarInitials'),
            balance: document.getElementById('userBalance'),
            date: document.getElementById('currentDate'),
            subtext: document.getElementById('loadingSubtext')
        };

        // Initialize with Robust Smart Wait Logic
        function init() {
            tg.expand();
            tg.ready();
            
            const now = new Date();
            els.date.textContent = now.toLocaleDateString('ar-EG', { weekday: 'long', day: 'numeric', month: 'long' });

            let step = 0;
            const steps = ["جارِ التحقق من الهوية...", "تشفير البيانات...", "إنشاء الجلسة الملكية..."];
            const intervalText = setInterval(() => {
                step = (step + 1) % steps.length;
                if(els.subtext) els.subtext.textContent = steps[step];
            }, 800);

            const attemptLogin = () => {
                if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                    clearInterval(intervalText);
                    clearInterval(pollInterval);
                    clearTimeout(timeoutId);
                    onAuthSuccess(tg.initDataUnsafe.user);
                    return true;
                }
                return false;
            };

            if (attemptLogin()) return;

            tg.onEvent('ready', () => {
                if (!attemptLogin()) startPolling();
            });

            let pollCount = 0;
            const maxPolls = 50;
            const pollInterval = setInterval(() => {
                pollCount++;
                if (attemptLogin()) return;
                if (pollCount >= maxPolls) {
                    clearInterval(pollInterval);
                    onAuthFailed();
                }
            }, 100);

            const timeoutId = setTimeout(() => {
                if (!views.dashboard.classList.contains('hidden-view')) return;
                clearInterval(pollInterval);
                clearInterval(intervalText);
                onAuthFailed();
            }, 6000);
        }

        function startPolling() {}

        function onAuthSuccess(user) {
            loadUserData(user);
            switchView('dashboard');
            setupMainButton();
            tg.setHeaderColor('#050505');
        }

        function onAuthFailed() {
            switchView('denied');
            try { tg.setHeaderColor('#050505'); } catch(e){}
        }

        function switchView(viewName) {
            Object.values(views).forEach(el => el.classList.add('hidden-view'));
            views[viewName].classList.remove('hidden-view');
            
            if(viewName === 'loading') {
                views.loading.classList.remove('hidden-view');
                views.loading.style.opacity = '1';
            } else {
                views.loading.style.opacity = '0';
                setTimeout(() => views.loading.classList.add('hidden-view'), 500);
            }
        }

        function loadUserData(user) {
            const fullName = `${user.first_name} ${user.last_name || ''}`.trim();
            els.userName.textContent = fullName;
            els.userId.textContent = `ID: ${user.id}`;
            
            if (user.photo_url) {
                els.photo.src = user.photo_url;
                els.photo.classList.remove('hidden');
                els.defaultAvatar.classList.add('hidden');
            } else {
                els.photo.classList.add('hidden');
                els.defaultAvatar.classList.remove('hidden');
                const initials = (user.first_name.charAt(0) + (user.last_name ? user.last_name.charAt(0) : '')).toUpperCase();
                els.initials.textContent = initials || "U";
            }
            animateValue(els.balance, 0, 2500, 2000);
        }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start).toLocaleString('en-US');
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        function setupMainButton() {
            tg.MainButton.setText("تحديث الرصيد");
            tg.MainButton.setTextColor("#000000");
            tg.MainButton.setColor("#d4af37"); // Gold Color
            tg.MainButton.show();
            
            tg.MainButton.onClick(() => {
                tg.HapticFeedback.notificationOccurred('success');
                showToast('تم مزامنة البيانات بنجاح', 'success');
                animateValue(els.balance, parseInt(els.balance.innerText.replace(/,/g,'')), parseInt(els.balance.innerText.replace(/,/g,'')) + 100, 1000);
            });
        }

        function copyId() {
            const id = els.userId.textContent.replace('ID: ', '');
            navigator.clipboard.writeText(id).then(() => {
                tg.HapticFeedback.selectionChanged();
                showToast('تم نسخ المعرف ID', 'info');
            });
        }

        function handleAction(type) {
            tg.HapticFeedback.impactOccurred('light');
            if (type === 'refresh') {
                showToast('جارٍ تحديث البيانات...', 'info');
                setTimeout(() => showToast('تم التحديث بنجاح', 'success'), 1000);
            } else if (type === 'support') {
                showToast('جارٍ فتح الدعم...', 'info');
                setTimeout(() => tg.openLink('https://telegram.org'), 800);
            }
        }

        function confirmLogout() {
            tg.HapticFeedback.notificationOccurred('warning');
            tg.showConfirm("هل ترغب في إنهاء الجلسة؟", (confirmed) => {
                if (confirmed) tg.close();
            });
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            let icon = '<i class="fa-solid fa-circle-info text-yellow-500 text-lg"></i>';
            if (type === 'success') icon = '<i class="fa-solid fa-check-circle text-green-500 text-lg"></i>';
            if (type === 'error') icon = '<i class="fa-solid fa-triangle-exclamation text-red-500 text-lg"></i>';
            toast.innerHTML = `${icon}<span class="text-sm font-medium flex-1">${message}</span>`;
            container.appendChild(toast);
            tg.HapticFeedback.impactOccurred('light');
            setTimeout(() => {
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        init();
    </script>
</body>
</html>
