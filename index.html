<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة تيليجرام المتطورة - متجر رقمي</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts (Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        /* الأنماط كما هي دون تغيير */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--tg-theme-bg-color, #0f172a);
            color: var(--tg-theme-text-color, #ffffff);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* الخلفية المتحركة */
        .ambient-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }
        
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 10s infinite ease-in-out;
        }
        
        .orb-1 { top: -10%; right: -10%; width: 300px; height: 300px; background: #3b82f6; animation-delay: 0s; }
        .orb-2 { bottom: -10%; left: -10%; width: 250px; height: 250px; background: #8b5cf6; animation-delay: 5s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, 40px); }
        }

        /* Glassmorphism */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(40, 51, 69, 0.8);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Animations */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-enter {
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Loader */
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--tg-theme-button-color, #3b82f6);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Avatar */
        .default-avatar {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            font-weight: bold;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 90%;
            max-width: 350px;
            pointer-events: none;
        }

        .toast {
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 12px 20px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: toastSlideUp 0.3s ease, toastFadeOut 0.3s ease 5.7s forwards;
            pointer-events: auto;
            direction: rtl;
            white-space: pre-line;
            line-height: 1.6;
        }

        .toast.success { border-right: 4px solid #10b981; }
        .toast.error { border-right: 4px solid #ef4444; }
        .toast.warning { border-right: 4px solid #f59e0b; }
        .toast.info { border-right: 4px solid #3b82f6; }

        .toast-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .toast.success .toast-icon { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .toast.error .toast-icon { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .toast.warning .toast-icon { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .toast.info .toast-icon { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }

        .toast-message { flex: 1; }

        @keyframes toastSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastFadeOut {
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* Theme toggle */
        .theme-toggle {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: rgba(40, 51, 69, 0.8);
        }

        /* Settings panel */
        .settings-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 1000;
            border-radius: 30px 30px 0 0;
        }

        .settings-panel.open { transform: translateY(0); }

        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .settings-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        /* Wallet Modal */
        .wallet-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .wallet-modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .wallet-modal {
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .wallet-modal-overlay.open .wallet-modal {
            transform: scale(1);
        }

        .wallet-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 12px;
            flex-wrap: wrap;
        }

        .wallet-tab {
            flex: 1;
            min-width: 70px;
            padding: 8px 5px;
            text-align: center;
            border-radius: 12px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.5);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
        }

        .wallet-tab.active {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .transaction-amount.positive { color: #10b981; }
        .transaction-amount.negative { color: #ef4444; }

        /* أيقونة المحفظة الكبيرة */
        .wallet-icon-large {
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, #3b82f6, #8b5cf6);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.5), 0 0 0 2px rgba(255,255,255,0.1) inset;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: floatWallet 3s infinite ease-in-out;
            position: relative;
            overflow: hidden;
        }

        .wallet-icon-large::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), transparent 70%);
            opacity: 0.6;
        }

        .wallet-icon-large i {
            font-size: 36px;
            color: white;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            animation: pulseIcon 2s infinite ease-in-out;
            position: relative;
            z-index: 2;
        }

        @keyframes floatWallet {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        @keyframes pulseIcon {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .balance-badge {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 6px 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 12px;
        }

        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.2);
            animation: pulse-badge 1.5s infinite;
        }

        @keyframes pulse-badge {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* طرق الدفع - صور وأيقونات */
        .payment-method {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
        }

        .payment-method:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .payment-method.selected {
            background: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
        }

        .payment-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: #334155;
            color: white;
            flex-shrink: 0;
        }

        .payment-details {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 12px;
            margin: 10px 0 15px 0;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 13px;
            line-height: 1.6;
        }

        /* لوحة المشرف */
        .admin-requests-panel {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 16px;
            margin-top: 16px;
        }

        .request-item {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .request-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-accept {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-reject {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .badge-pending {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 600;
        }

        /* أزرار تحرير طرق الدفع */
        .payment-method-admin {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .payment-method-admin .actions button {
            background: transparent;
            border: none;
            color: #94a3b8;
            margin: 0 4px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .payment-method-admin .actions button.delete:hover { color: #ef4444; }
        .payment-method-admin .actions button.edit:hover { color: #3b82f6; }

        /* أنماط المتجر المحسّنة */
        .product-card {
            cursor: pointer;
            transition: all 0.2s;
        }
        .product-card:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
        }
        .category-tab {
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            white-space: nowrap;
            transition: 0.2s;
        }
        .category-tab.active {
            background: #3b82f6;
        }
        #categoryTabs::-webkit-scrollbar {
            display: none;
        }
        .store-search:focus {
            outline: none;
            border-color: #3b82f6;
        }
        /* منتجات الشبكة */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }
        /* صورة المنتج */
        .product-image {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
            background: #334155;
        }
        .discount-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ef4444;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 12px;
            font-weight: bold;
        }
        .stock-badge {
            background: #334155;
            color: #94a3b8;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 12px;
        }
        /* سلة التسوق */
        .cart-item {
            display: flex;
            gap: 10px;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .cart-item-image {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }

        /* أنماط إضافية لمعاينة الصورة */
        .image-preview {
            width: 100px;
            height: 100px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.2);
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <!-- نفس عناصر HTML السابقة بدون تغيير -->
    <div class="ambient-light">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="theme-toggle" id="themeToggle">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
        <span class="text-sm">السمة</span>
    </div>

    <div id="app" class="w-full max-w-md p-5 relative"></div>

    <div class="settings-overlay" id="settingsOverlay"></div>
    <div class="settings-panel" id="settingsPanel">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-bold">الإعدادات</h3>
            <button id="closeSettings" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
        <div class="space-y-4">
            <div class="flex items-center justify-between">
                <span>اللغة</span>
                <select class="bg-white/10 rounded-lg p-2" id="languageSelect">
                    <option value="ar">العربية</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div class="flex items-center justify-between">
                <span>الإشعارات</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" id="notificationsToggle">
                    <div class="w-11 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600"></div>
                </label>
            </div>
            <div class="flex items-center justify-between">
                <span>تنبيه صوتي</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" id="soundToggle" checked>
                    <div class="w-11 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600"></div>
                </label>
            </div>
            <div class="flex items-center justify-between">
                <span>اهتزاز</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" id="vibrateToggle" checked>
                    <div class="w-11 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600"></div>
                </label>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="wallet-modal-overlay" id="walletModalOverlay">
        <div class="wallet-modal" id="walletModalContent"></div>
    </div>

    <div class="wallet-modal-overlay" id="adminPanelOverlay">
        <div class="wallet-modal" id="adminPanelContent" style="max-width: 500px;"></div>
    </div>

    <div class="wallet-modal-overlay" id="paymentMethodModalOverlay">
        <div class="wallet-modal" id="paymentMethodModalContent" style="max-width: 450px;"></div>
    </div>

    <script>
        (function() {
            // ======================== الإعدادات الثابتة ========================
            const CONFIG = {
                ADMIN_ID: 7609492965,
                DEFAULT_BALANCE: 1000,
                MAX_TRANSACTIONS: 50,
                STORAGE_KEYS: {
                    USERS: 'app_users',
                    BOTS: 'app_bots',
                    DAILY_OPS: 'daily_ops',
                    WALLET: 'wallet_data',
                    PAYMENT_METHODS: 'payment_methods',
                    DEPOSIT_REQUESTS: 'deposit_requests',
                    WITHDRAWAL_REQUESTS: 'withdrawal_requests',
                    THEME: 'theme',
                    SETTINGS: 'settings',
                    NOTIFICATIONS: 'notifications',
                    STORE_CATEGORIES: 'store_categories',
                    STORE_PRODUCTS: 'store_products',
                    STORE_ORDERS: 'store_orders',
                    STORE_CART: 'store_cart'
                }
            };

            // ======================== خدمات مساعدة ========================
            class StorageService {
                static get(key, defaultValue = null) {
                    try {
                        const value = localStorage.getItem(key);
                        return value !== null ? JSON.parse(value) : defaultValue;
                    } catch (e) {
                        console.warn(`Storage read error for key ${key}:`, e);
                        return defaultValue;
                    }
                }

                static set(key, value) {
                    try {
                        localStorage.setItem(key, JSON.stringify(value));
                        return true;
                    } catch (e) {
                        console.warn(`Storage write error for key ${key}:`, e);
                        return false;
                    }
                }

                static remove(key) {
                    try {
                        localStorage.removeItem(key);
                        return true;
                    } catch (e) {
                        console.warn(`Storage remove error for key ${key}:`, e);
                        return false;
                    }
                }
            }

            class DateUtils {
                static getTodayDate() {
                    return new Date().toISOString().split('T')[0];
                }

                static formatDateTime(isoString) {
                    return new Date(isoString).toLocaleString('ar-EG');
                }

                static formatDate(isoString) {
                    return new Date(isoString).toLocaleDateString('ar-EG');
                }
            }

            class IdGenerator {
                static generate(prefix = '') {
                    return prefix + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                }
            }

            // ======================== نظام التنبيهات المتطور ========================
            class ToastManager {
                constructor(containerId) {
                    this.container = document.getElementById(containerId);
                    if (!this.container) {
                        this.container = document.createElement('div');
                        this.container.id = containerId;
                        this.container.className = 'toast-container';
                        document.body.appendChild(this.container);
                    }
                    this.activeToasts = [];
                    this.soundEnabled = true;
                    this.vibrateEnabled = true;
                }

                show(message, type = 'info', duration = 5000) {
                    const toast = document.createElement('div');
                    toast.className = `toast ${type}`;
                    
                    const iconMap = {
                        success: 'fa-solid fa-check',
                        error: 'fa-solid fa-exclamation',
                        warning: 'fa-solid fa-triangle-exclamation',
                        info: 'fa-solid fa-info'
                    };
                    
                    toast.innerHTML = `
                        <div class="toast-icon"><i class="${iconMap[type] || iconMap.info}"></i></div>
                        <div class="toast-message">${message}</div>
                    `;
                    
                    this.container.appendChild(toast);
                    this.activeToasts.push(toast);
                    
                    if (this.soundEnabled && (type === 'success' || type === 'warning' || type === 'info')) {
                        this.playSound(type);
                    }
                    
                    if (this.vibrateEnabled && navigator.vibrate) {
                        navigator.vibrate(200);
                    }
                    
                    setTimeout(() => {
                        toast.remove();
                        this.activeToasts = this.activeToasts.filter(t => t !== toast);
                    }, duration);
                }

                playSound(type) {
                    try {
                        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        const oscillator = audioCtx.createOscillator();
                        const gainNode = audioCtx.createGain();
                        
                        oscillator.connect(gainNode);
                        gainNode.connect(audioCtx.destination);
                        
                        oscillator.type = 'sine';
                        oscillator.frequency.value = type === 'success' ? 800 : (type === 'warning' ? 600 : 400);
                        gainNode.gain.value = 0.1;
                        
                        oscillator.start();
                        oscillator.stop(audioCtx.currentTime + 0.2);
                    } catch (e) {
                        console.log('Web Audio not supported');
                    }
                }

                success(message) { this.show(message, 'success'); }
                error(message) { this.show(message, 'error'); }
                warning(message) { this.show(message, 'warning'); }
                info(message) { this.show(message, 'info'); }
            }

                addDepositRequest(amount, methodId, transactionId, user) {
                    const method = this.state.paymentMethods.find(m => m.id === methodId);
                    const request = {
                        id: IdGenerator.generate('dep_'),
                        userId: user.id,
                        userName: `${user.first_name} ${user.last_name || ''}`.trim(),
                        amount,

                        transactionId,

                    };

                    this.saveRequests();
                    this.incrementDailyOps();
                    window.dispatchEvent(new CustomEvent('newDepositRequest', { detail: request }));
                    return request;
                }

                addWithdrawalRequest(amount, methodId, details, user) {
                    if (amount > this.state.balance) {
                        return { success: false, message: 'الرصيد غير كافٍ', request: null };
                    }
                    const method = this.state.paymentMethods.find(m => m.id === methodId);
                    const request = {
                        id: IdGenerator.generate('with_'),
                        userId: user.id,
                        userName: `${user.first_name} ${user.last_name || ''}`.trim(),
                        amount,
                        method: method ? method.name : methodId,
                        methodId,
                        details,
                        status: 'pending',
                        date: new Date().toISOString()
                    };
                    this.state.withdrawalRequests.push(request);
                    this.saveRequests();
                    this.incrementDailyOps();
                    window.dispatchEvent(new CustomEvent('newWithdrawalRequest', { detail: request }));
                    return { success: true, id: request.id, request };
                }

                acceptRequest(request, type) {
                    if (type === 'deposit') {
                        const req = this.state.depositRequests.find(r => r.id === request.id);
                        if (req && req.status === 'pending') {
                            req.status = 'approved';
                            this.state.balance += req.amount;
                            this.addTransaction('deposit', req.amount, `شحن عبر ${req.method} (رقم العملية: ${req.transactionId || 'غير محدد'})`);
                            this.saveWallet();
                            this.saveRequests();
                            
                            this.notificationService.addNotification(
                                req.userId,
                                '✅ تم قبول طلب الشحن',
                                `تم قبول طلب الشحن بمبلغ ${req.amount} عبر ${req.method}. رقم العملية: ${req.transactionId || 'غير محدد'}`,
                                'success'
                            );
                            
                            return true;
                        }
                    } else if (type === 'withdrawal') {
                        const req = this.state.withdrawalRequests.find(r => r.id === request.id);
                        if (req && req.status === 'pending' && this.state.balance >= req.amount) {
                            req.status = 'approved';
                            this.state.balance -= req.amount;
                            this.addTransaction('withdraw', -req.amount, `سحب عبر ${req.method} إلى ${req.details || 'محفظة'}`);
                            this.saveWallet();
                            this.saveRequests();
                            
                            this.notificationService.addNotification(
                                req.userId,
                                '✅ تم قبول طلب السحب',
                                `تم قبول طلب السحب بمبلغ ${req.amount} عبر ${req.method}. التفاصيل: ${req.details}`,
                                'success'
                            );
                            
                            return true;
                        }
                    }
                    return false;
                }

                rejectRequest(request, type) {
                    if (type === 'deposit') {
                        const req = this.state.depositRequests.find(r => r.id === request.id);
                        if (req) {
                            req.status = 'rejected';
                            this.saveRequests();
                            
                            this.notificationService.addNotification(
                                req.userId,
                                '❌ تم رفض طلب الشحن',
                                `تم رفض طلب الشحن بمبلغ ${req.amount} عبر ${req.method}.`,
                                'error'
                            );
                            
                            return true;
                        }
                    } else if (type === 'withdrawal') {
                        const req = this.state.withdrawalRequests.find(r => r.id === request.id);
                        if (req) {
                            req.status = 'rejected';
                            this.saveRequests();

                        }
                    }
                    return false;
                }

                    this.saveOrders();
                    return order;
                }

                updateOrderStatus(orderId, newStatus) {
                    const order = this.state.orders.find(o => o.id === orderId);
                    if (order) {
                        order.status = newStatus;
                        order.updatedAt = new Date().toISOString();
                        this.saveOrders();
                        this.notificationService.addNotification(
                            order.userId,
                            `🔄 تحديث حالة الطلب`,
                            `تم تحديث حالة طلبك "${order.productName}" إلى: ${newStatus}`,
                            'info'
                        );
                        return true;
                    }
                    return false;
                }

                getUserOrders(userId) {
                    return this.state.orders
                        .filter(o => o.userId === userId)
                        .sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
                }

                // سلة التسوق
                loadCart() {
                    if (!this.state.user) return;
                    const key = `${CONFIG.STORAGE_KEYS.STORE_CART}_${this.state.user.id}`;
                    const saved = StorageService.get(key, []);
                    this.state.cart = saved;
                }

                saveCart() {
                    if (!this.state.user) return;
                    const key = `${CONFIG.STORAGE_KEYS.STORE_CART}_${this.state.user.id}`;
                    StorageService.set(key, this.state.cart);
                }

                addToCart(product, inputData = {}, quantity = 1) {
                    if (product.stock !== -1 && product.stock < quantity) {
                        return { success: false, message: 'الكمية المطلوبة غير متوفرة' };
                    }
                    const cartItem = {
                        id: IdGenerator.generate('cart_'),
                        productId: product.id,
                        name: product.name,
                        price: product.price,
                        discount: product.discount || 0,
                        image: product.image || '',
                        quantity,
                        inputData,
                        addedAt: new Date().toISOString()
                    };
                    this.state.cart.push(cartItem);
                    this.saveCart();
                    return { success: true, cartItem };
                }

                removeFromCart(cartItemId) {
                    this.state.cart = this.state.cart.filter(item => item.id !== cartItemId);
                    this.saveCart();
                }

                updateCartItemQuantity(cartItemId, newQuantity) {
                    const item = this.state.cart.find(i => i.id === cartItemId);
                    if (item) {
                        const product = this.state.products.find(p => p.id === item.productId);
                        if (product && product.stock !== -1 && product.stock < newQuantity) {
                            return { success: false, message: 'الكمية غير متوفرة' };
                        }
                        item.quantity = newQuantity;
                        this.saveCart();
                        return { success: true };
                    }
                    return { success: false, message: 'العنصر غير موجود' };
                }

                clearCart() {
                    this.state.cart = [];
                    this.saveCart();
                }
            }

                    this.state.addEventListener('statsUpdated', () => this.updateStatsDisplay());
                    
                    window.addEventListener('newDepositRequest', (e) => this.handleNewRequest(e.detail, 'شحن'));
                    window.addEventListener('newWithdrawalRequest', (e) => this.handleNewRequest(e.detail, 'سحب'));
                    window.addEventListener('newNotification', (e) => this.handleNewNotification(e.detail));
                }

                handleNewRequest(request, type) {
                    if (this.state.isAdmin) {
                        this.toast.success(`🔔 طلب ${type} جديد
                            • المستخدم: ${request.userName}
                            • المبلغ: ${request.amount}
                            • الطريقة: ${request.method}
                            ${type === 'شحن' ? `• رقم العملية: ${request.transactionId}` : `• التفاصيل: ${request.details}`}`);
                        this.updatePendingBadge();
                    }
                }

                handleNewNotification(notification) {
                    if (this.state.user && this.state.user.id === notification.userId) {
                        this.toast.show(notification.message, notification.type);
                        this.updateNotificationBadge();
                        if (!this.state.isAdmin) {
                            this.render();
                        }
                    }
                }

                updatePendingBadge() {
                    const walletIcon = document.getElementById('walletIconLarge');
                    if (!walletIcon) return;
                    
                    const count = this.data.getPendingRequestsCount();
                    let badge = walletIcon.querySelector('.notification-badge');
                    
                    if (count > 0) {
                        if (!badge) {
                            badge = document.createElement('span');
                            badge.className = 'notification-badge';
                            walletIcon.style.position = 'relative';
                            walletIcon.appendChild(badge);
                        }
                        badge.textContent = count > 9 ? '9+' : count;
                    } else {
                        if (badge) badge.remove();
                    }
                    
                    document.title = count > 0 ? `(${count}) بوابة تيليجرام` : 'بوابة تيليجرام المتطورة';
                }

                updateNotificationBadge() {
                    const bell = document.getElementById('notificationBell');
                    if (!bell) return;
                    
                    const userId = this.state.user?.id;
                    if (!userId) return;
                    
                    const unreadCount = this.data.notificationService.getUnreadCount(userId);
                    let badge = bell.querySelector('.notification-badge');
                    
                    if (unreadCount > 0) {
                        if (!badge) {
                            badge = document.createElement('span');
                            badge.className = 'notification-badge';
                            bell.style.position = 'relative';
                            bell.appendChild(badge);
                        }
                        badge.textContent = unreadCount > 9 ? '9+' : unreadCount;
                    } else {
                        if (badge) badge.remove();
                    }
                }

                        <div class="payment-method" data-method-id="${m.id}">
                            <div class="payment-icon"><i class="${m.icon}"></i></div>
                            <div class="flex-1"><div class="font-bold">${m.name}</div></div>
                        </div>
                    `).join('');

                    return `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">محفظتي</h2>
                            <button id="closeWalletModal" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                        <div class="glass-card p-6 rounded-2xl text-center mb-4">
                            <div class="text-gray-400 text-sm mb-1">الرصيد الحالي</div>
                            <div class="text-3xl font-bold text-white">${balance.toLocaleString('ar-EG')}</div>
                            <div class="text-xs text-gray-400 mt-1">عملة البوت</div>
                        </div>
                        <div class="wallet-tabs">
                            <button class="wallet-tab active" data-tab="deposit"><i class="fa-solid fa-arrow-down"></i> شحن</button>
                            <button class="wallet-tab" data-tab="withdraw"><i class="fa-solid fa-arrow-up"></i> سحب</button>
                            <button class="wallet-tab" data-tab="transfer"><i class="fa-solid fa-exchange-alt"></i> تحويل</button>
                            <button class="wallet-tab" data-tab="history"><i class="fa-solid fa-history"></i> السجل</button>
                        </div>
                        <div id="walletTabContent">
                            <div class="tab-pane active" id="tab-deposit">
                                <p class="text-sm text-gray-300 mb-3">اختر طريقة الدفع:</p>
                                <div class="payment-methods-list mb-4">${paymentMethodsHtml}</div>
                                <div id="depositDetailsDisplay" class="payment-details hidden">
                                    <strong>تفاصيل الإيداع:</strong>
                                    <div id="depositDetailsText"></div>
                                </div>
                                <div class="mb-3">
                                    <label class="text-sm text-gray-400">رقم العملية (TXID):</label>
                                    <input type="text" id="depositTransactionId" placeholder="أدخل رقم العملية" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                                </div>
                                <div class="flex gap-2">
                                    <input type="number" id="depositAmount" placeholder="المبلغ" class="flex-1 bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                                    <button id="depositBtn" class="bg-blue-600 px-4 rounded-lg font-bold">تقديم طلب</button>
                                </div>
                                <p class="text-xs text-gray-400 mt-2">سيتم مراجعة طلبك من قبل الإدارة.</p>
                            </div>
                            <div class="tab-pane hidden" id="tab-withdraw">
                                <p class="text-sm text-gray-300 mb-3">اختر طريقة السحب:</p>
                                <div class="payment-methods-list mb-4" id="withdrawMethodsList">${withdrawMethodsHtml}</div>
                                <div id="withdrawDetailsContainer" class="mb-3">
                                    <input type="text" id="withdrawDetails" placeholder="أدخل التفاصيل" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 mb-2 text-white">
                                </div>
                                <div class="flex gap-2">
                                    <input type="number" id="withdrawAmount" placeholder="المبلغ" class="flex-1 bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                                    <button id="withdrawBtn" class="bg-red-600 px-4 rounded-lg font-bold">طلب سحب</button>
                                </div>
                                <p class="text-xs text-gray-400 mt-2">سيتم مراجعة طلب السحب من قبل الإدارة.</p>
                            </div>
                            <div class="tab-pane hidden" id="tab-transfer">
                                <p class="text-sm text-gray-300 mb-2">تحويل إلى مستخدم آخر:</p>
                                <input type="text" id="transferUserId" placeholder="معرف المستخدم" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 mb-2 text-white">
                                <div class="flex gap-2">
                                    <input type="number" id="transferAmount" placeholder="المبلغ" class="flex-1 bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                                    <button id="transferBtn" class="bg-green-600 px-4 rounded-lg font-bold">تحويل</button>
                                </div>
                            </div>
                            <div class="tab-pane hidden" id="tab-history">
                                <div class="max-h-64 overflow-y-auto">${transactionsHtml}</div>
                            </div>
                        </div>
                    `;
                }

                bindWalletModalEvents() {
                    const modalOverlay = document.getElementById('walletModalOverlay');
                    document.getElementById('closeWalletModal').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });
                    modalOverlay.addEventListener('click', (e) => {
                        if (e.target === modalOverlay) modalOverlay.classList.remove('open');
                    });

                    const tabs = document.querySelectorAll('.wallet-tab');
                    tabs.forEach(tab => {
                        tab.addEventListener('click', () => {
                            tabs.forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');
                            const tabId = tab.dataset.tab;
                            document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.add('hidden'));
                            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
                        });
                    });

                    // شحن
                    let selectedMethod = null;
                    const paymentMethods = document.querySelectorAll('.payment-methods-list .payment-method');
                    const detailsDisplay = document.getElementById('depositDetailsDisplay');
                    const detailsText = document.getElementById('depositDetailsText');
                    
                    paymentMethods.forEach(method => {
                        method.addEventListener('click', () => {
                            paymentMethods.forEach(m => m.classList.remove('selected'));
                            method.classList.add('selected');
                            selectedMethod = method.dataset.methodId;
                            
                            const methodObj = this.state.paymentMethods.find(m => m.id === selectedMethod);
                            if (methodObj && methodObj.depositDetails) {
                                detailsText.innerHTML = methodObj.depositDetails.replace(/\n/g, '<br>');
                                detailsDisplay.classList.remove('hidden');
                            } else {
                                detailsDisplay.classList.add('hidden');
                            }
                        });
                    });

                    document.getElementById('depositBtn')?.addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('depositAmount').value);
                        const transactionId = document.getElementById('depositTransactionId').value.trim();
                        
                        if (isNaN(amount) || amount <= 0) {
                            this.toast.error('أدخل مبلغ صحيح');
                            return;
                        }
                        if (!selectedMethod) {
                            this.toast.error('اختر طريقة دفع أولاً');
                            return;
                        }
                        if (!transactionId) {
                            this.toast.error('يرجى إدخال رقم العملية');
                            return;
                        }
                        
                        const request = this.data.addDepositRequest(amount, selectedMethod, transactionId, this.state.user);
                        this.toast.success(`✅ تم تقديم طلب الشحن بنجاح
                            • المستخدم: ${this.state.user.first_name} ${this.state.user.last_name || ''}
                            • المبلغ: ${amount}
                            • الطريقة: ${request.method}
                            • رقم العملية: ${transactionId}
                            • رقم الطلب: ${request.id}`);
                        
                        document.getElementById('depositAmount').value = '';
                        document.getElementById('depositTransactionId').value = '';
                        paymentMethods.forEach(m => m.classList.remove('selected'));
                        selectedMethod = null;
                        detailsDisplay.classList.add('hidden');
                    });

                    // سحب
                    let selectedWithdrawMethod = null;
                    const withdrawMethods = document.querySelectorAll('#withdrawMethodsList .payment-method');
                    withdrawMethods.forEach(method => {
                        method.addEventListener('click', () => {
                            withdrawMethods.forEach(m => m.classList.remove('selected'));
                            method.classList.add('selected');
                            selectedWithdrawMethod = method.dataset.methodId;
                            
                            const methodObj = this.state.paymentMethods.find(m => m.id === selectedWithdrawMethod);
                            const detailsInput = document.getElementById('withdrawDetails');
                            if (methodObj) {
                                detailsInput.placeholder = methodObj.withdrawDetails || 'أدخل التفاصيل';
                            }
                        });
                    });

                    document.getElementById('withdrawBtn')?.addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('withdrawAmount').value);
                        const details = document.getElementById('withdrawDetails').value.trim();
                        if (isNaN(amount) || amount <= 0) {
                            this.toast.error('أدخل مبلغ صحيح');
                            return;
                        }
                        if (!selectedWithdrawMethod) {
                            this.toast.error('اختر طريقة سحب أولاً');
                            return;
                        }
                        if (!details) {
                            this.toast.error('أدخل التفاصيل المطلوبة');
                            return;
                        }
                        const result = this.data.addWithdrawalRequest(amount, selectedWithdrawMethod, details, this.state.user);
                        if (result.success) {
                            this.toast.success(`✅ تم تقديم طلب السحب بنجاح
                                • المبلغ: ${amount}
                                • الطريقة: ${result.request.method}
                                • التفاصيل: ${details}
                                • رقم الطلب: ${result.request.id}`);
                            
                            document.getElementById('withdrawAmount').value = '';
                            document.getElementById('withdrawDetails').value = '';
                            withdrawMethods.forEach(m => m.classList.remove('selected'));
                            selectedWithdrawMethod = null;
                        } else {
                            this.toast.error(result.message);
                        }
                    });

                    // تحويل
                    document.getElementById('transferBtn')?.addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('transferAmount').value);
                        const targetId = document.getElementById('transferUserId').value.trim();
                        if (isNaN(amount) || amount <= 0) {
                            this.toast.error('أدخل مبلغ صحيح');
                            return;
                        }
                        if (!targetId) {
                            this.toast.error('أدخل معرف المستخدم');
                            return;
                        }
                        if (amount > this.state.balance) {
                            this.toast.error('الرصيد غير كافٍ');
                            return;
                        }
                        this.state.balance -= amount;
                        this.data.addTransaction('transfer', -amount, `تحويل إلى المستخدم ${targetId}`);
                        this.data.saveWallet();
                        this.toast.success('تم التحويل بنجاح');
                        document.getElementById('transferAmount').value = '';
                        document.getElementById('transferUserId').value = '';
                        this.updateBalanceDisplay();
                        this.openWalletModal(); // تحديث
                    });
                }

                // ========== المتجر المحسّن ==========
                openStore() {
                    const modalOverlay = document.getElementById('walletModalOverlay');
                    const modalContent = document.getElementById('walletModalContent');
                    modalContent.innerHTML = this.renderStoreModal();
                    modalOverlay.classList.add('open');
                    this.bindStoreEvents();
                }

                renderStoreModal() {
                    const categories = this.state.categories || [];
                    const products = this.state.products || [];
                    const cart = this.state.cart || [];

                    // تبويبات الأقسام مع إظهار الصورة إن وجدت
                    const categoriesTabs = categories.map(cat => `
                        <button class="category-tab px-3 py-1 rounded-full text-sm bg-white/10 hover:bg-white/20 flex items-center gap-1" data-cat-id="${cat.id}">
                            ${cat.image ? `<img src="${cat.image}" class="w-5 h-5 rounded-full object-cover">` : `<i class="${cat.icon} ml-1"></i>`}
                            ${cat.name}
                        </button>
                    `).join('');

                    // شبكة المنتجات
                    const productsGrid = products.map(prod => {
                        const inCart = cart.some(item => item.productId === prod.id);
                        const finalPrice = prod.price * (1 - (prod.discount || 0) / 100);
                        return `
                            <div class="product-card glass-card p-3 rounded-2xl relative" data-prod-id="${prod.id}">
                                ${prod.discount ? `<span class="discount-badge">-${prod.discount}%</span>` : ''}
                                <div class="w-full h-24 bg-gradient-to-br from-blue-500/20 to-purple-500/20 rounded-xl flex items-center justify-center mb-2 overflow-hidden">
                                    ${prod.image ? `<img src="${prod.image}" class="product-image" alt="${prod.name}">` : `<i class="${prod.icon} text-3xl text-blue-400"></i>`}
                                </div>
                                <h3 class="font-bold text-sm">${prod.name}</h3>
                                <div class="flex items-center gap-1 mt-1">
                                    <span class="text-xs text-yellow-400"><i class="fa-solid fa-star"></i> ${prod.rating || '0'}</span>
                                    <span class="text-xs text-gray-400">(${prod.reviewCount || '0'})</span>
                                </div>
                                <div class="flex justify-between items-center mt-2">
                                    <div>
                                        ${prod.discount ? 
                                            `<span class="text-xs text-gray-400 line-through ml-1">${prod.price}</span>` : ''
                                        }
                                        <span class="text-blue-400 font-bold">${finalPrice.toFixed(2)}</span>
                                    </div>
                                    <button class="add-to-cart-btn ${inCart ? 'bg-green-600' : 'bg-blue-600'} text-white px-2 py-1 rounded-lg text-xs" data-prod-id="${prod.id}">
                                        ${inCart ? '✓ في السلة' : '➕'}
                                    </button>
                                </div>
                                ${prod.stock !== -1 ? `<span class="stock-badge text-xs">متبقي ${prod.stock}</span>` : ''}
                            </div>
                        `;
                    }).join('') || '<p class="text-center text-gray-400 py-8">لا توجد منتجات</p>';

                    // عناصر السلة
                    const cartItems = cart.map(item => {
                        const itemTotal = item.price * item.quantity * (1 - (item.discount || 0)/100);
                        return `
                            <div class="cart-item" data-cart-id="${item.id}">
                                <div class="cart-item-image bg-gradient-to-br from-blue-500/20 to-purple-500/20 flex items-center justify-center">
                                    ${item.image ? `<img src="${item.image}" class="w-full h-full object-cover">` : `<i class="${this.state.products.find(p=>p.id===item.productId)?.icon || 'fa-box'} text-xl text-blue-400"></i>`}
                                </div>
                                <div class="flex-1">
                                    <div class="flex justify-between">
                                        <span class="font-bold text-sm">${item.name}</span>
                                        <button class="remove-cart-item text-red-400 text-xs"><i class="fa-solid fa-trash"></i></button>
                                    </div>
                                    <div class="text-xs text-gray-400">الكمية: ${item.quantity}</div>
                                    <div class="flex justify-between items-center mt-1">
                                        <span class="text-blue-400 text-sm">${itemTotal.toFixed(2)}</span>
                                        <div class="flex gap-1">
                                            <button class="decrease-qty bg-white/10 px-2 rounded text-xs">-</button>
                                            <span class="text-xs">${item.quantity}</span>
                                            <button class="increase-qty bg-white/10 px-2 rounded text-xs">+</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('') || '<p class="text-center text-gray-400 py-4">السلة فارغة</p>';
                    
                    const cartTotal = cart.reduce((sum, item) => 
                        sum + (item.price * item.quantity * (1 - (item.discount || 0)/100)), 0);

                    return `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">🛍️ المتجر الإلكتروني</h2>
                            <button id="closeStoreModal" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <!-- شريط البحث والفلترة -->
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="storeSearch" placeholder="🔍 ابحث عن منتج..." class="flex-1 bg-slate-800 border border-white/10 rounded-lg p-2 text-white text-sm store-search">
                            <select id="storeCategoryFilter" class="bg-slate-800 border border-white/10 rounded-lg p-2 text-white text-sm">
                                <option value="all">جميع الأقسام</option>
                                ${categories.map(cat => `<option value="${cat.id}">${cat.name}</option>`).join('')}
                            </select>
                        </div>

                        <!-- تبويبات الأقسام -->
                        <div class="flex gap-2 mb-4 overflow-x-auto pb-2" id="categoryTabs">
                            <button class="category-tab px-3 py-1 rounded-full text-sm bg-blue-600" data-cat-id="all">الكل</button>
                            ${categoriesTabs}
                        </div>

                        <!-- قائمة المنتجات -->
                        <div class="grid grid-cols-2 gap-3 max-h-80 overflow-y-auto p-1" id="productsGrid">
                            ${productsGrid}
                        </div>

                        <!-- السلة المحسّنة -->
                        <div class="mt-4 glass-card p-3 rounded-2xl">
                            <h3 class="font-bold mb-2 flex items-center gap-2">
                                <i class="fa-solid fa-cart-shopping"></i> سلة التسوق
                                <span class="text-xs bg-blue-600 px-2 py-0.5 rounded-full">${cart.length}</span>
                            </h3>
                            <div id="cartItems" class="max-h-48 overflow-y-auto">
                                ${cartItems}
                            </div>
                            <div class="flex justify-between items-center mt-2 pt-2 border-t border-white/10">
                                <span>المجموع:</span>
                                <span class="font-bold text-blue-400" id="cartTotal">${cartTotal.toFixed(2)}</span>
                            </div>
                            <button id="checkoutBtn" class="w-full mt-3 bg-green-600 py-2 rounded-xl font-bold ${cart.length === 0 ? 'opacity-50' : ''}" ${cart.length === 0 ? 'disabled' : ''}>
                                إتمام الشراء
                            </button>
                        </div>
                    `;
                }

                bindStoreEvents() {
                    const modalOverlay = document.getElementById('walletModalOverlay');
                    document.getElementById('closeStoreModal').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });

                    // فتح تفاصيل المنتج عند النقر على البطاقة
                    document.querySelectorAll('.product-card').forEach(card => {
                        card.addEventListener('click', (e) => {
                            if (e.target.classList.contains('add-to-cart-btn')) return; // لا تفتح التفاصيل إذا ضغط على زر السلة
                            const prodId = card.dataset.prodId;
                            this.showProductDetails(prodId);
                        });
                    });

                    // زر الإضافة على البطاقة: يفتح التفاصيل بدلاً من الإضافة المباشرة
                    document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const prodId = btn.dataset.prodId;
                            this.showProductDetails(prodId);
                        });
                    });

                    // فلترة حسب القسم
                    document.getElementById('storeCategoryFilter').addEventListener('change', (e) => {
                        this.currentCategoryFilter = e.target.value;
                        this.filterStoreProducts(this.currentCategoryFilter, document.getElementById('storeSearch').value);
                    });

                    document.querySelectorAll('.category-tab').forEach(tab => {
                        tab.addEventListener('click', () => {
                            const catId = tab.dataset.catId;
                            this.currentCategoryFilter = catId;
                            document.getElementById('storeCategoryFilter').value = catId;
                            this.filterStoreProducts(catId, document.getElementById('storeSearch').value);
                            document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('bg-blue-600'));
                            tab.classList.add('bg-blue-600');
                        });
                    });

                    // بحث
                    document.getElementById('storeSearch').addEventListener('input', (e) => {
                        this.currentSearchTerm = e.target.value.toLowerCase();
                        this.filterStoreProducts(this.currentCategoryFilter, this.currentSearchTerm);
                    });

                    // أحداث السلة: زيادة الكمية، نقصان، إزالة
                    document.querySelectorAll('.increase-qty').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const cartItem = btn.closest('.cart-item');
                            const cartId = cartItem.dataset.cartId;
                            const item = this.state.cart.find(i => i.id === cartId);
                            if (item) {
                                const result = this.data.updateCartItemQuantity(cartId, item.quantity + 1);
                                if (result.success) {
                                    this.updateCartDisplay();
                                    this.toast.info('تم تحديث الكمية');
                                } else {
                                    this.toast.error(result.message);
                                }
                            }
                        });
                    });

                    document.querySelectorAll('.decrease-qty').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const cartItem = btn.closest('.cart-item');
                            const cartId = cartItem.dataset.cartId;
                            const item = this.state.cart.find(i => i.id === cartId);
                            if (item && item.quantity > 1) {
                                this.data.updateCartItemQuantity(cartId, item.quantity - 1);
                                this.updateCartDisplay();
                                this.toast.info('تم تحديث الكمية');
                            } else if (item && item.quantity === 1) {
                                this.data.removeFromCart(cartId);
                                this.updateCartDisplay();
                                this.toast.info('تمت الإزالة من السلة');
                            }
                        });
                    });

                    document.querySelectorAll('.remove-cart-item').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const cartItem = btn.closest('.cart-item');
                            const cartId = cartItem.dataset.cartId;
                            this.data.removeFromCart(cartId);
                            this.updateCartDisplay();
                            this.toast.info('تمت الإزالة من السلة');
                        });
                    });

                    // إتمام الشراء
                    document.getElementById('checkoutBtn').addEventListener('click', () => {
                        this.checkout();
                    });
                }

                filterStoreProducts(catId, searchTerm = '') {
                    // تحديث المتغيرات الحالية
                    this.currentCategoryFilter = catId;
                    this.currentSearchTerm = searchTerm;

                    let filtered = this.state.products || [];
                    if (catId !== 'all') {
                        filtered = filtered.filter(p => p.categoryId === catId);
                    }
                    if (searchTerm) {
                        filtered = filtered.filter(p => p.name.toLowerCase().includes(searchTerm) || (p.description && p.description.toLowerCase().includes(searchTerm)));
                    }
                    const cart = this.state.cart || [];
                    const productsGrid = filtered.map(prod => {
                        const inCart = cart.some(item => item.productId === prod.id);
                        const finalPrice = prod.price * (1 - (prod.discount || 0) / 100);
                        return `
                            <div class="product-card glass-card p-3 rounded-2xl relative" data-prod-id="${prod.id}">
                                ${prod.discount ? `<span class="discount-badge">-${prod.discount}%</span>` : ''}
                                <div class="w-full h-24 bg-gradient-to-br from-blue-500/20 to-purple-500/20 rounded-xl flex items-center justify-center mb-2 overflow-hidden">
                                    ${prod.image ? `<img src="${prod.image}" class="product-image" alt="${prod.name}">` : `<i class="${prod.icon} text-3xl text-blue-400"></i>`}
                                </div>
                                <h3 class="font-bold text-sm">${prod.name}</h3>
                                <div class="flex items-center gap-1 mt-1">
                                    <span class="text-xs text-yellow-400"><i class="fa-solid fa-star"></i> ${prod.rating || '0'}</span>
                                    <span class="text-xs text-gray-400">(${prod.reviewCount || '0'})</span>
                                </div>
                                <div class="flex justify-between items-center mt-2">
                                    <div>
                                        ${prod.discount ? 
                                            `<span class="text-xs text-gray-400 line-through ml-1">${prod.price}</span>` : ''
                                        }
                                        <span class="text-blue-400 font-bold">${finalPrice.toFixed(2)}</span>
                                    </div>
                                    <button class="add-to-cart-btn ${inCart ? 'bg-green-600' : 'bg-blue-600'} text-white px-2 py-1 rounded-lg text-xs" data-prod-id="${prod.id}">
                                        ${inCart ? '✓ في السلة' : '➕'}
                                    </button>
                                </div>
                                ${prod.stock !== -1 ? `<span class="stock-badge text-xs">متبقي ${prod.stock}</span>` : ''}
                            </div>
                        `;
                    }).join('') || '<p class="text-center text-gray-400 py-8">لا توجد منتجات</p>';
                    
                    document.getElementById('productsGrid').innerHTML = productsGrid;

                    // إعادة ربط أحداث الأزرار
                    document.querySelectorAll('.product-card').forEach(card => {
                        card.addEventListener('click', (e) => {
                            if (e.target.classList.contains('add-to-cart-btn')) return;
                            const prodId = card.dataset.prodId;
                            this.showProductDetails(prodId);
                        });
                    });

                    document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const prodId = btn.dataset.prodId;
                            this.showProductDetails(prodId);
                        });
                    });
                }

                updateCartDisplay() {
                    const cart = this.state.cart || [];
                    const cartItems = cart.map(item => {
                        const itemTotal = item.price * item.quantity * (1 - (item.discount || 0)/100);
                        return `
                            <div class="cart-item" data-cart-id="${item.id}">
                                <div class="cart-item-image bg-gradient-to-br from-blue-500/20 to-purple-500/20 flex items-center justify-center">
                                    ${item.image ? `<img src="${item.image}" class="w-full h-full object-cover">` : `<i class="${this.state.products.find(p=>p.id===item.productId)?.icon || 'fa-box'} text-xl text-blue-400"></i>`}
                                </div>
                                <div class="flex-1">
                                    <div class="flex justify-between">
                                        <span class="font-bold text-sm">${item.name}</span>
                                        <button class="remove-cart-item text-red-400 text-xs"><i class="fa-solid fa-trash"></i></button>
                                    </div>
                                    <div class="text-xs text-gray-400">الكمية: ${item.quantity}</div>
                                    <div class="flex justify-between items-center mt-1">
                                        <span class="text-blue-400 text-sm">${itemTotal.toFixed(2)}</span>
                                        <div class="flex gap-1">
                                            <button class="decrease-qty bg-white/10 px-2 rounded text-xs">-</button>
                                            <span class="text-xs">${item.quantity}</span>
                                            <button class="increase-qty bg-white/10 px-2 rounded text-xs">+</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('') || '<p class="text-center text-gray-400 py-4">السلة فارغة</p>';
                    
                    const cartTotal = cart.reduce((sum, item) => 
                        sum + (item.price * item.quantity * (1 - (item.discount || 0)/100)), 0);
                    
                    document.getElementById('cartItems').innerHTML = cartItems;
                    document.getElementById('cartTotal').textContent = cartTotal.toFixed(2);
                    
                    const checkoutBtn = document.getElementById('checkoutBtn');
                    if (cart.length === 0) {
                        checkoutBtn.disabled = true;
                        checkoutBtn.classList.add('opacity-50');
                    } else {
                        checkoutBtn.disabled = false;
                        checkoutBtn.classList.remove('opacity-50');
                    }

                    // إعادة ربط أحداث السلة
                    document.querySelectorAll('.increase-qty').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const cartItem = btn.closest('.cart-item');
                            const cartId = cartItem.dataset.cartId;
                            const item = this.state.cart.find(i => i.id === cartId);
                            if (item) {
                                const result = this.data.updateCartItemQuantity(cartId, item.quantity + 1);
                                if (result.success) {
                                    this.updateCartDisplay();
                                } else {
                                    this.toast.error(result.message);
                                }
                            }
                        });
                    });

                    document.querySelectorAll('.decrease-qty').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const cartItem = btn.closest('.cart-item');
                            const cartId = cartItem.dataset.cartId;
                            const item = this.state.cart.find(i => i.id === cartId);
                            if (item && item.quantity > 1) {
                                this.data.updateCartItemQuantity(cartId, item.quantity - 1);
                                this.updateCartDisplay();
                            } else if (item && item.quantity === 1) {
                                this.data.removeFromCart(cartId);
                                this.updateCartDisplay();
                            }
                        });
                    });

                    document.querySelectorAll('.remove-cart-item').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const cartItem = btn.closest('.cart-item');
                            const cartId = cartItem.dataset.cartId;
                            this.data.removeFromCart(cartId);
                            this.updateCartDisplay();
                        });
                    });
                }

                showProductDetails(prodId) {
                    const product = this.state.products.find(p => p.id === prodId);
                    if (!product) return;

                    const inputFieldsHtml = product.inputFields.map(field => {
                        if (field.type === 'select') {
                            const options = field.options.map(opt => `<option value="${opt}">${opt}</option>`).join('');
                            return `
                                <div class="mb-3">
                                    <label class="text-sm text-gray-400">${field.label} ${field.required ? '*' : ''}</label>
                                    <select id="field_${field.name}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white" ${field.required ? 'required' : ''}>
                                        ${options}
                                    </select>
                                </div>
                            `;
                        } else {
                            return `
                                <div class="mb-3">
                                    <label class="text-sm text-gray-400">${field.label} ${field.required ? '*' : ''}</label>
                                    <input type="${field.type}" id="field_${field.name}" placeholder="${field.placeholder || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white" ${field.required ? 'required' : ''}>
                                </div>
                            `;
                        }
                    }).join('');

                    const finalPrice = product.price * (1 - (product.discount || 0) / 100);
