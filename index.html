                    const modalOverlay = document.getElementById('walletModalOverlay');
                    const modalContent = document.getElementById('walletModalContent');
                    modalContent.innerHTML = `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">${product.name}</h2>
                            <button id="closeProductModal" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                        <div class="flex justify-center mb-4">
                            <div class="w-32 h-32 rounded-2xl bg-gradient-to-br from-blue-500/20 to-purple-500/20 flex items-center justify-center overflow-hidden">
                                ${product.image ? `<img src="${product.image}" class="w-full h-full object-cover">` : `<i class="${product.icon} text-5xl text-blue-400"></i>`}
                            </div>
                        </div>
                        <div class="flex items-center justify-center gap-2 mb-2">
                            <span class="text-yellow-400"><i class="fa-solid fa-star"></i> ${product.rating || '0'}</span>
                            <span class="text-gray-400">(${product.reviewCount || '0'} تقييم)</span>
                        </div>
                        <p class="text-gray-300 text-sm mb-4 text-center">${product.description || 'لا يوجد وصف'}</p>
                        <div class="glass-card p-4 rounded-2xl mb-4">
                            <div class="text-center mb-2">
                                <span class="text-gray-400">السعر:</span>
                                ${product.discount ? 
                                    `<span class="text-gray-400 line-through ml-2">${product.price}</span>` : ''
                                }
                                <span class="text-2xl font-bold text-blue-400">${finalPrice.toFixed(2)}</span>
                            </div>
                            <form id="productPurchaseForm" class="space-y-2">
                                ${inputFieldsHtml}
                                <div class="mb-3">
                                    <label class="text-sm text-gray-400">الكمية:</label>
                                    <input type="number" id="productQuantity" value="1" min="1" max="${product.stock === -1 ? '100' : product.stock}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                                </div>
                                <div class="flex gap-2 mt-4">
                                    <button type="button" id="addToCartFromDetails" class="flex-1 bg-blue-600 py-2 rounded-lg font-bold">➕ أضف للسلة</button>
                                    <button type="submit" id="buyNowBtn" class="flex-1 bg-green-600 py-2 rounded-lg font-bold">💳 شراء الآن</button>
                                </div>
                            </form>
                        </div>
                    `;
                    modalOverlay.classList.add('open');

                    document.getElementById('closeProductModal').addEventListener('click', () => modalOverlay.classList.remove('open'));
                    
                    document.getElementById('addToCartFromDetails').addEventListener('click', () => {
                        const quantity = parseInt(document.getElementById('productQuantity').value) || 1;
                        const inputData = this.collectInputFields(product.inputFields);
                        const result = this.data.addToCart(product, inputData, quantity);
                        if (result.success) {
                            this.toast.success('تمت الإضافة للسلة');
                            // تحديث عرض المتجر بعد الإضافة
                            this.filterStoreProducts(this.currentCategoryFilter, this.currentSearchTerm);
                            this.updateCartDisplay();
                        } else {
                            this.toast.error(result.message);
                        }
                        modalOverlay.classList.remove('open');
                    });

                    document.getElementById('productPurchaseForm').addEventListener('submit', (e) => {
                        e.preventDefault();
                        const quantity = parseInt(document.getElementById('productQuantity').value) || 1;
                        const inputData = this.collectInputFields(product.inputFields);
                        this.buyNow(product, inputData, quantity);
                        modalOverlay.classList.remove('open');
                    });
                }

                collectInputFields(fields) {
                    const data = {};
                    fields.forEach(field => {
                        const input = document.getElementById(`field_${field.name}`);
                        if (input) data[field.name] = input.value;
                    });
                    return data;
                }

                buyNow(product, inputData, quantity = 1) {
                    const total = product.price * quantity * (1 - (product.discount || 0) / 100);
                    if (total > this.state.balance) {
                        this.toast.error('الرصيد غير كافٍ');
                        return;
                    }
                    // التحقق من المخزون
                    if (product.stock !== -1 && product.stock < quantity) {
                        this.toast.error('الكمية المطلوبة غير متوفرة');
                        return;
                    }
                    this.state.balance -= total;
                    this.data.saveWallet();

                    const order = this.data.createOrder(product, inputData, this.state.user.id, quantity);
                    
                    // تحديث المخزون
                    if (product.stock !== -1) {
                        product.stock -= quantity;
                        this.data.saveProducts();
                    }

                    if (product.fulfillmentData.type !== 'manual') {
                        this.data.updateOrderStatus(order.id, 'confirmed');
                        this.toast.success(`✅ تم الشراء بنجاح!\nالتفاصيل: ${JSON.stringify(product.fulfillmentData)}`);
                    } else {
                        this.data.updateOrderStatus(order.id, 'pending');
                        this.toast.success('✅ تم تقديم الطلب، سيتم المعالجة يدويًا');
                    }

                    this.data.notificationService.addNotification(
                        this.state.user.id,
                        '✅ طلب جديد',
                        `تم شراء "${product.name}" (الكمية: ${quantity}) بنجاح.`,
                        'success'
                    );
                    
                    // تحديث المتجر
                    this.filterStoreProducts(this.currentCategoryFilter, this.currentSearchTerm);
                    this.updateBalanceDisplay();
                }

                checkout() {
                    const cart = this.state.cart || [];
                    if (cart.length === 0) {
                        this.toast.error('السلة فارغة');
                        return;
                    }

                    // حساب المجموع
                    const total = cart.reduce((sum, item) => 
                        sum + (item.price * item.quantity * (1 - (item.discount || 0)/100)), 0);

                    if (total > this.state.balance) {
                        this.toast.error('الرصيد غير كافٍ');
                        return;
                    }

                    // التحقق من المخزون لكل عنصر
                    for (const item of cart) {
                        const product = this.state.products.find(p => p.id === item.productId);
                        if (product && product.stock !== -1 && product.stock < item.quantity) {
                            this.toast.error(`المنتج ${product.name} غير متوفر بالكمية المطلوبة`);
                            return;
                        }
                    }

                    // خصم الرصيد وإنشاء الطلبات
                    this.state.balance -= total;
                    this.data.saveWallet();

                    cart.forEach(item => {
                        const product = this.state.products.find(p => p.id === item.productId);
                        const order = this.data.createOrder(product, item.inputData || {}, this.state.user.id, item.quantity);
                        if (product.fulfillmentData.type !== 'manual') {
                            this.data.updateOrderStatus(order.id, 'confirmed');
                        }
                        // تحديث المخزون
                        if (product.stock !== -1) {
                            product.stock -= item.quantity;
                        }
                    });

                    this.data.saveProducts();
                    this.data.clearCart();
                    
                    this.toast.success('✅ تمت عملية الشراء بنجاح! تفقد الإشعارات للحصول على التفاصيل.');
                    
                    const modalOverlay = document.getElementById('walletModalOverlay');
                    modalOverlay.classList.remove('open');
                    this.updateBalanceDisplay();
                }

                // ========== عرض طلبات المستخدم ==========
                openOrdersModal() {
                    const modalOverlay = document.getElementById('walletModalOverlay');
                    const modalContent = document.getElementById('walletModalContent');
                    modalContent.innerHTML = this.renderOrdersModal();
                    modalOverlay.classList.add('open');
                    this.bindOrdersModalEvents();
                }

                renderOrdersModal() {
                    const userId = this.state.user.id;
                    const orders = this.data.getUserOrders(userId);
                    
                    const ordersHtml = orders.length === 0 
                        ? '<p class="text-center text-gray-400 py-8">لا توجد طلبات بعد</p>'
                        : orders.map(order => `
                            <div class="transaction-item">
                                <div class="flex-1">
                                    <div class="font-bold">${order.productName} (x${order.quantity})</div>
                                    <div class="text-sm text-gray-400">${DateUtils.formatDateTime(order.createdAt)}</div>
                                    <div class="text-sm">
                                        الحالة: 
                                        <span class="
                                            ${order.status === 'pending' ? 'text-yellow-400' : 
                                              order.status === 'confirmed' ? 'text-blue-400' :
                                              order.status === 'shipped' ? 'text-purple-400' :
                                              order.status === 'delivered' ? 'text-green-400' : 'text-red-400'}">
                                            ${order.status === 'pending' ? 'قيد الانتظار' :
                                              order.status === 'confirmed' ? 'مؤكد' :
                                              order.status === 'shipped' ? 'تم الشحن' :
                                              order.status === 'delivered' ? 'تم التسليم' : 'ملغي'}
                                        </span>
                                    </div>
                                    <div class="text-xs text-gray-400">المجموع: ${order.totalPrice.toFixed(2)}</div>
                                </div>
                            </div>
                        `).join('');
                    
                    return `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">طلباتي</h2>
                            <button id="closeOrdersModal" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                        <div class="max-h-96 overflow-y-auto">
                            ${ordersHtml}
                        </div>
                    `;
                }

                bindOrdersModalEvents() {
                    const modalOverlay = document.getElementById('walletModalOverlay');
                    document.getElementById('closeOrdersModal').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });
                    modalOverlay.addEventListener('click', (e) => {
                        if (e.target === modalOverlay) modalOverlay.classList.remove('open');
                    });
                }

                // ========== لوحة المشرف المحسّنة (مع التأكد من وجود المصفوفات) ==========
                openAdminPanel() {
                    try {
                        const modalOverlay = document.getElementById('adminPanelOverlay');
                        const modalContent = document.getElementById('adminPanelContent');
                        if (!modalOverlay || !modalContent) {
                            this.toast.error('عناصر لوحة الإدارة غير موجودة');
                            return;
                        }
                        modalContent.innerHTML = this.renderAdminPanel();
                        modalOverlay.classList.add('open');
                        this.bindAdminPanelEvents();
                    } catch (e) {
                        console.error('خطأ في فتح لوحة الإدارة:', e);
                        this.toast.error('حدث خطأ أثناء فتح لوحة الإدارة: ' + e.message);
                    }
                }

                renderAdminPanel() {
                    // التأكد من أن المصفوفات موجودة (حتى لا نستخدم map على undefined)
                    const paymentMethods = Array.isArray(this.state.paymentMethods) ? this.state.paymentMethods : [];
                    const categories = Array.isArray(this.state.categories) ? this.state.categories : [];
                    const products = Array.isArray(this.state.products) ? this.state.products : [];
                    const orders = Array.isArray(this.state.orders) ? this.state.orders : [];
                    
                    const pendingDeposits = this.data.getPendingDeposits() || [];
                    const pendingWithdrawals = this.data.getPendingWithdrawals() || [];

                    const depositsHtml = pendingDeposits.length === 0 
                        ? '<p class="text-gray-400 text-center py-2">لا توجد طلبات شحن معلقة</p>'
                        : pendingDeposits.map(req => `
                            <div class="request-item" data-id="${req.id}" data-type="deposit">
                                <div class="request-header"><span class="font-bold">${req.userName}</span><span class="badge-pending">قيد الانتظار</span></div>
                                <div class="text-sm">المبلغ: <span class="text-blue-400">${req.amount.toLocaleString('ar-EG')}</span></div>
                                <div class="text-xs text-gray-400">الطريقة: ${req.method}</div>
                                <div class="text-xs text-gray-400">رقم العملية: <span class="text-yellow-400">${req.transactionId || 'غير محدد'}</span></div>
                                <div class="text-xs text-gray-400">التاريخ: ${DateUtils.formatDateTime(req.date)}</div>
                                <div class="request-actions">
                                    <button class="btn-accept accept-request" data-id="${req.id}" data-type="deposit">قبول</button>
                                    <button class="btn-reject reject-request" data-id="${req.id}" data-type="deposit">رفض</button>
                                </div>
                            </div>
                        `).join('');

                    const withdrawalsHtml = pendingWithdrawals.length === 0 
                        ? '<p class="text-gray-400 text-center py-2">لا توجد طلبات سحب معلقة</p>'
                        : pendingWithdrawals.map(req => `
                            <div class="request-item" data-id="${req.id}" data-type="withdrawal">
                                <div class="request-header"><span class="font-bold">${req.userName}</span><span class="badge-pending">قيد الانتظار</span></div>
                                <div class="text-sm">المبلغ: <span class="text-red-400">${req.amount.toLocaleString('ar-EG')}</span></div>
                                <div class="text-xs text-gray-400">الطريقة: ${req.method}</div>
                                <div class="text-xs text-gray-400">التفاصيل: ${req.details || 'غير محدد'}</div>
                                <div class="text-xs text-gray-400">التاريخ: ${DateUtils.formatDateTime(req.date)}</div>
                                <div class="request-actions">
                                    <button class="btn-accept accept-request" data-id="${req.id}" data-type="withdrawal">قبول</button>
                                    <button class="btn-reject reject-request" data-id="${req.id}" data-type="withdrawal">رفض</button>
                                </div>
                            </div>
                        `).join('');

                    // طلبات المتجر
                    const ordersHtml = orders.length === 0 
                        ? '<p class="text-gray-400 text-center py-2">لا توجد طلبات متجر</p>'
                        : orders.map(order => `
                            <div class="request-item" data-order-id="${order.id}">
                                <div class="flex justify-between">
                                    <span class="font-bold">${order.productName}</span>
                                    <span class="text-xs text-gray-400">${DateUtils.formatDateTime(order.createdAt)}</span>
                                </div>
                                <div class="text-sm">المستخدم: ${order.userId}</div>
                                <div class="text-sm">الكمية: ${order.quantity} | الإجمالي: ${order.totalPrice.toFixed(2)}</div>
                                <div class="text-sm">
                                    الحالة: 
                                    <select class="order-status bg-slate-700 text-white text-xs rounded p-1" data-order-id="${order.id}">
                                        <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>قيد الانتظار</option>
                                        <option value="confirmed" ${order.status === 'confirmed' ? 'selected' : ''}>مؤكد</option>
                                        <option value="shipped" ${order.status === 'shipped' ? 'selected' : ''}>تم الشحن</option>
                                        <option value="delivered" ${order.status === 'delivered' ? 'selected' : ''}>تم التسليم</option>
                                        <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>ملغي</option>
                                    </select>
                                </div>
                            </div>
                        `).join('');

                    const paymentMethodsHtml = paymentMethods.map(m => `
                        <div class="payment-method-admin">
                            <div class="flex items-center gap-3">
                                <div class="payment-icon"><i class="${m.icon}"></i></div>
                                <div><div class="font-bold">${m.name}</div><div class="text-xs text-gray-400">${m.description || ''}</div></div>
                            </div>
                            <div class="actions">
                                <button class="edit-payment-method" data-id="${m.id}" title="تعديل"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button class="delete-payment-method" data-id="${m.id}" title="حذف"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                    `).join('');

                    const categoriesHtml = categories.map(cat => `
                        <div class="payment-method-admin">
                            <div class="flex items-center gap-3">
                                <div class="payment-icon">
                                    ${cat.image ? `<img src="${cat.image}" class="w-full h-full object-cover">` : `<i class="${cat.icon}"></i>`}
                                </div>
                                <div><div class="font-bold">${cat.name}</div><div class="text-xs text-gray-400">${cat.description || ''}</div></div>
                            </div>
                            <div class="actions">
                                <button class="edit-category" data-id="${cat.id}" title="تعديل"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button class="delete-category" data-id="${cat.id}" title="حذف"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                    `).join('');

                    const productsHtml = products.map(prod => `
                        <div class="payment-method-admin">
                            <div class="flex items-center gap-3">
                                <div class="payment-icon">
                                    ${prod.image ? `<img src="${prod.image}" class="w-full h-full object-cover">` : `<i class="${prod.icon}"></i>`}
                                </div>
                                <div><div class="font-bold">${prod.name}</div><div class="text-xs text-gray-400">${prod.price} - ${prod.description?.substring(0,20)}...</div></div>
                            </div>
                            <div class="actions">
                                <button class="edit-product" data-id="${prod.id}" title="تعديل"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button class="delete-product" data-id="${prod.id}" title="حذف"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                    `).join('');

                    return `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">لوحة الإدارة</h2>
                            <button id="closeAdminPanel" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                        <div class="wallet-tabs mb-3">
                            <button class="wallet-tab active" data-admin-tab="requests">الطلبات المالية</button>
                            <button class="wallet-tab" data-admin-tab="store-orders">طلبات المتجر</button>
                            <button class="wallet-tab" data-admin-tab="payment-methods">طرق الدفع</button>
                            <button class="wallet-tab" data-admin-tab="store">المتجر</button>
                        </div>
                        <div id="adminRequestsTab" class="admin-tab-content">
                            <div class="space-y-6">
                                <div><h3 class="text-lg font-bold mb-2">طلبات الشحن المعلقة <span class="bg-blue-600 text-white text-xs px-2 py-1 rounded-full">${pendingDeposits.length}</span></h3><div class="admin-requests-panel">${depositsHtml}</div></div>
                                <div><h3 class="text-lg font-bold mb-2">طلبات السحب المعلقة <span class="bg-blue-600 text-white text-xs px-2 py-1 rounded-full">${pendingWithdrawals.length}</span></h3><div class="admin-requests-panel">${withdrawalsHtml}</div></div>
                            </div>
                        </div>
                        <div id="adminStoreOrdersTab" class="admin-tab-content hidden">
                            <h3 class="text-lg font-bold mb-2">جميع طلبات المتجر</h3>
                            <div class="admin-requests-panel max-h-80 overflow-y-auto">${ordersHtml}</div>
                        </div>
                        <div id="adminPaymentMethodsTab" class="admin-tab-content hidden">
                            <div class="flex justify-between items-center mb-3"><h3 class="text-lg font-bold">طرق الدفع</h3><button id="addPaymentMethodBtn" class="bg-blue-600 px-3 py-1 rounded-lg text-sm"><i class="fa-solid fa-plus"></i> إضافة</button></div>
                            <div class="space-y-2 max-h-96 overflow-y-auto">${paymentMethodsHtml}</div>
                        </div>
                        <div id="adminStoreTab" class="admin-tab-content hidden">
                            <div class="flex justify-between items-center mb-3"><h3 class="text-lg font-bold">الأقسام</h3><button id="addCategoryBtn" class="bg-blue-600 px-3 py-1 rounded-lg text-sm"><i class="fa-solid fa-plus"></i> إضافة قسم</button></div>
                            <div class="space-y-2 mb-6 max-h-60 overflow-y-auto">${categoriesHtml}</div>
                            <div class="flex justify-between items-center mb-3"><h3 class="text-lg font-bold">المنتجات</h3><button id="addProductBtn" class="bg-green-600 px-3 py-1 rounded-lg text-sm"><i class="fa-solid fa-plus"></i> إضافة منتج</button></div>
                            <div class="space-y-2 max-h-60 overflow-y-auto">${productsHtml}</div>
                        </div>
                    `;
                }

                bindAdminPanelEvents() {
                    const modalOverlay = document.getElementById('adminPanelOverlay');
                    document.getElementById('closeAdminPanel').addEventListener('click', () => modalOverlay.classList.remove('open'));
                    modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) modalOverlay.classList.remove('open'); });

                    const adminTabs = document.querySelectorAll('[data-admin-tab]');
                    adminTabs.forEach(tab => {
                        tab.addEventListener('click', () => {
                            adminTabs.forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');
                            const tabName = tab.dataset.adminTab;
                            document.getElementById('adminRequestsTab').classList.add('hidden');
                            document.getElementById('adminStoreOrdersTab').classList.add('hidden');
                            document.getElementById('adminPaymentMethodsTab').classList.add('hidden');
                            document.getElementById('adminStoreTab').classList.add('hidden');
                            if (tabName === 'requests') document.getElementById('adminRequestsTab').classList.remove('hidden');
                            else if (tabName === 'store-orders') document.getElementById('adminStoreOrdersTab').classList.remove('hidden');
                            else if (tabName === 'payment-methods') document.getElementById('adminPaymentMethodsTab').classList.remove('hidden');
                            else document.getElementById('adminStoreTab').classList.remove('hidden');
                        });
                    });

                    // قبول/رفض الطلبات المالية
                    document.querySelectorAll('.accept-request').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            const type = btn.dataset.type;
                            const request = type === 'deposit' ? this.state.depositRequests.find(r => r.id === id) : this.state.withdrawalRequests.find(r => r.id === id);
                            if (request) {
                                const success = this.data.acceptRequest(request, type);
                                if (success) this.toast.success(`تم قبول الطلب`);
                                else this.toast.error('فشل القبول');
                                this.openAdminPanel();
                            }
                        });
                    });

                    document.querySelectorAll('.reject-request').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            const type = btn.dataset.type;
                            const request = type === 'deposit' ? this.state.depositRequests.find(r => r.id === id) : this.state.withdrawalRequests.find(r => r.id === id);
                            if (request) {
                                this.data.rejectRequest(request, type);
                                this.toast.info('تم رفض الطلب');
                                this.openAdminPanel();
                            }
                        });
                    });

                    // تحديث حالة طلبات المتجر
                    document.querySelectorAll('.order-status').forEach(select => {
                        select.addEventListener('change', (e) => {
                            const orderId = select.dataset.orderId;
                            const newStatus = e.target.value;
                            this.data.updateOrderStatus(orderId, newStatus);
                            this.toast.success('تم تحديث حالة الطلب');
                        });
                    });

                    // طرق الدفع
                    document.getElementById('addPaymentMethodBtn')?.addEventListener('click', () => this.openPaymentMethodModal());
                    document.querySelectorAll('.edit-payment-method').forEach(btn => {
                        btn.addEventListener('click', () => this.openPaymentMethodModal(btn.dataset.id));
                    });
                    document.querySelectorAll('.delete-payment-method').forEach(btn => {
                        btn.addEventListener('click', () => {
                            if (confirm('حذف طريقة الدفع؟')) {
                                this.data.deletePaymentMethod(btn.dataset.id);
                                this.toast.success('تم الحذف');
                                this.openAdminPanel();
                            }
                        });
                    });

                    // إدارة الأقسام
                    document.getElementById('addCategoryBtn')?.addEventListener('click', () => this.openCategoryModal());
                    document.querySelectorAll('.edit-category').forEach(btn => {
                        btn.addEventListener('click', () => this.openCategoryModal(btn.dataset.id));
                    });
                    document.querySelectorAll('.delete-category').forEach(btn => {
                        btn.addEventListener('click', () => {
                            if (confirm('حذف القسم؟')) {
                                this.data.deleteCategory(btn.dataset.id);
                                this.toast.success('تم الحذف');
                                this.openAdminPanel();
                            }
                        });
                    });

                    // إدارة المنتجات
                    document.getElementById('addProductBtn')?.addEventListener('click', () => this.openProductModal());
                    document.querySelectorAll('.edit-product').forEach(btn => {
                        btn.addEventListener('click', () => this.openProductModal(btn.dataset.id));
                    });
                    document.querySelectorAll('.delete-product').forEach(btn => {
                        btn.addEventListener('click', () => {
                            if (confirm('حذف المنتج؟')) {
                                this.data.deleteProduct(btn.dataset.id);
                                this.toast.success('تم الحذف');
                                this.openAdminPanel();
                            }
                        });
                    });
                }

                // نماذج الإضافة/التعديل المحسّنة مع رفع الصور
                openPaymentMethodModal(editingId = null) {
                    const modalOverlay = document.getElementById('paymentMethodModalOverlay');
                    const modalContent = document.getElementById('paymentMethodModalContent');
                    const method = editingId ? this.state.paymentMethods.find(m => m.id === editingId) : null;
                    modalContent.innerHTML = `
                        <div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold">${method ? 'تعديل' : 'إضافة'} طريقة دفع</h2><button id="closePaymentMethodModal" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center"><i class="fa-solid fa-times"></i></button></div>
                        <form id="paymentMethodForm" class="space-y-3">
                            <input type="hidden" id="methodId" value="${method?.id || ''}">
                            <div><label class="text-sm text-gray-400">الاسم</label><input type="text" id="methodName" required value="${method?.name || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white"></div>
                            <div><label class="text-sm text-gray-400">الأيقونة</label><input type="text" id="methodIcon" value="${method?.icon || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white"></div>
                            <div><label class="text-sm text-gray-400">الوصف</label><input type="text" id="methodDescription" value="${method?.description || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white"></div>
                            <div><label class="text-sm text-gray-400">تفاصيل الإيداع</label><textarea id="methodDepositDetails" rows="2" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">${method?.depositDetails || ''}</textarea></div>
                            <div><label class="text-sm text-gray-400">تفاصيل السحب</label><input type="text" id="methodWithdrawDetails" value="${method?.withdrawDetails || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white"></div>
                            <div class="flex gap-2 pt-2"><button type="submit" class="flex-1 bg-blue-600 py-2 rounded-lg font-bold">حفظ</button><button type="button" id="cancelPaymentMethod" class="flex-1 bg-gray-600 py-2 rounded-lg font-bold">إلغاء</button></div>
                        </form>
                    `;
                    modalOverlay.classList.add('open');
                    document.getElementById('closePaymentMethodModal').addEventListener('click', () => modalOverlay.classList.remove('open'));
                    document.getElementById('cancelPaymentMethod').addEventListener('click', () => modalOverlay.classList.remove('open'));
                    modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) modalOverlay.classList.remove('open'); });
                    document.getElementById('paymentMethodForm').addEventListener('submit', (e) => {
                        e.preventDefault();
                        const formData = {
                            name: document.getElementById('methodName').value,
                            icon: document.getElementById('methodIcon').value,
                            description: document.getElementById('methodDescription').value,
                            depositDetails: document.getElementById('methodDepositDetails').value,
                            withdrawDetails: document.getElementById('methodWithdrawDetails').value
                        };
                        const id = document.getElementById('methodId').value;
                        if (id) {
                            this.data.updatePaymentMethod(id, formData);
                            this.toast.success('تم التحديث');
                        } else {
                            this.data.addPaymentMethod(formData);
                            this.toast.success('تمت الإضافة');
                        }
                        modalOverlay.classList.remove('open');
                        this.openAdminPanel();
                    });
                }

                // نموذج القسم مع رفع الصورة
                openCategoryModal(editingId = null) {
                    const modalOverlay = document.getElementById('paymentMethodModalOverlay');
                    const modalContent = document.getElementById('paymentMethodModalContent');
                    const cat = editingId ? this.state.categories.find(c => c.id === editingId) : null;
                    
                    // إنشاء عنصر وهمي لمعاينة الصورة
                    let imagePreviewHtml = '';
                    if (cat?.image) {
                        imagePreviewHtml = `<img src="${cat.image}" class="image-preview" id="categoryImagePreview">`;
                    } else {
                        imagePreviewHtml = `<div class="image-preview hidden" id="categoryImagePreview"></div>`;
                    }

                    modalContent.innerHTML = `
                        <div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold">${cat ? 'تعديل' : 'إضافة'} قسم</h2><button id="closeCategoryModal" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center"><i class="fa-solid fa-times"></i></button></div>
                        <form id="categoryForm" class="space-y-3">
                            <input type="hidden" id="categoryId" value="${cat?.id || ''}">
                            <div><label class="text-sm text-gray-400">اسم القسم</label><input type="text" id="categoryName" required value="${cat?.name || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white"></div>
                            <div><label class="text-sm text-gray-400">الأيقونة (مثل fa-gamepad) - اختياري إذا وجدت صورة</label><input type="text" id="categoryIcon" value="${cat?.icon || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white"></div>
                            <div><label class="text-sm text-gray-400">الوصف</label><input type="text" id="categoryDescription" value="${cat?.description || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white"></div>
                            <div><label class="text-sm text-gray-400">الترتيب</label><input type="number" id="categoryOrder" value="${cat?.order || 0}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white"></div>
                            <div>
                                <label class="text-sm text-gray-400">صورة القسم (اختياري)</label>
                                <input type="file" id="categoryImageFile" accept="image/*" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                                ${imagePreviewHtml}
                            </div>
                            <div class="flex gap-2 pt-2"><button type="submit" class="flex-1 bg-blue-600 py-2 rounded-lg font-bold">حفظ</button><button type="button" id="cancelCategoryModal" class="flex-1 bg-gray-600 py-2 rounded-lg font-bold">إلغاء</button></div>
                        </form>
                    `;
                    modalOverlay.classList.add('open');
                    
                    // معاينة الصورة عند الاختيار
                    const fileInput = document.getElementById('categoryImageFile');
                    const preview = document.getElementById('categoryImagePreview');
                    if (fileInput) {
                        fileInput.addEventListener('change', (e) => {
                            const file = e.target.files[0];
                            if (file) {
                                const reader = new FileReader();
                                reader.onload = (e) => {
                                    preview.src = e.target.result;
                                    preview.classList.remove('hidden');
                                };
                                reader.readAsDataURL(file);
                            } else {
                                preview.classList.add('hidden');
                            }
                        });
                    }

                    document.getElementById('closeCategoryModal').addEventListener('click', () => modalOverlay.classList.remove('open'));
                    document.getElementById('cancelCategoryModal').addEventListener('click', () => modalOverlay.classList.remove('open'));
                    modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) modalOverlay.classList.remove('open'); });
                    
                    document.getElementById('categoryForm').addEventListener('submit', (e) => {
                        e.preventDefault();
                        
                        // قراءة الصورة إن وجدت
                        const file = fileInput?.files[0];
                        const processForm = (imageBase64) => {
                            const formData = {
                                name: document.getElementById('categoryName').value,
                                icon: document.getElementById('categoryIcon').value,
                                description: document.getElementById('categoryDescription').value,
                                order: parseInt(document.getElementById('categoryOrder').value) || 0,
                                image: imageBase64 || cat?.image || ''
                            };
                            const id = document.getElementById('categoryId').value;
                            if (id) {
                                this.data.updateCategory(id, formData);
                                this.toast.success('تم التحديث');
                            } else {
                                this.data.addCategory(formData);
                                this.toast.success('تمت الإضافة');
                            }
                            modalOverlay.classList.remove('open');
                            this.openAdminPanel();
                        };

                        if (file) {
                            const reader = new FileReader();
                            reader.onload = (e) => processForm(e.target.result);
                            reader.readAsDataURL(file);
                        } else {
                            processForm(null);
                        }
                    });
                }

                // نموذج المنتج مع رفع الصورة وتحسين حقول JSON
                openProductModal(editingId = null) {
                    const modalOverlay = document.getElementById('paymentMethodModalOverlay');
                    const modalContent = document.getElementById('paymentMethodModalContent');
                    const prod = editingId ? this.state.products.find(p => p.id === editingId) : null;
                    const categoryOptions = (this.state.categories || []).map(c => `<option value="${c.id}" ${prod?.categoryId === c.id ? 'selected' : ''}>${c.name}</option>`).join('');

                    let imagePreviewHtml = '';
                    if (prod?.image) {
                        imagePreviewHtml = `<img src="${prod.image}" class="image-preview" id="productImagePreview">`;
                    } else {
                        imagePreviewHtml = `<div class="image-preview hidden" id="productImagePreview"></div>`;
                    }

                    modalContent.innerHTML = `
                        <div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold">${prod ? 'تعديل' : 'إضافة'} منتج</h2><button id="closeProductModal" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center"><i class="fa-solid fa-times"></i></button></div>
                        <form id="productForm" class="space-y-3 max-h-96 overflow-y-auto p-1">
                            <input type="hidden" id="productId" value="${prod?.id || ''}">
                            <div><label class="text-sm text-gray-400">الاسم</label><input type="text" id="productName" required value="${prod?.name || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white"></div>
                            <div><label class="text-sm text-gray-400">الوصف</label><textarea id="productDescription" rows="2" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">${prod?.description || ''}</textarea></div>
                            <div><label class="text-sm text-gray-400">السعر</label><input type="number" id="productPrice" required value="${prod?.price || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white"></div>
                            <div><label class="text-sm text-gray-400">القسم</label>
                                <select id="productCategoryId" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                                    ${categoryOptions}
                                </select>
                            </div>
                            <div><label class="text-sm text-gray-400">الأيقونة (اختياري إذا وجدت صورة)</label><input type="text" id="productIcon" value="${prod?.icon || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white"></div>
                            <div><label class="text-sm text-gray-400">المخزون (-1 لغير محدود)</label><input type="number" id="productStock" value="${prod?.stock ?? -1}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white"></div>
                            <div><label class="text-sm text-gray-400">الخصم (%)</label><input type="number" id="productDiscount" value="${prod?.discount || 0}" min="0" max="100" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white"></div>
                            <div><label class="text-sm text-gray-400">صورة المنتج</label>
                                <input type="file" id="productImageFile" accept="image/*" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                                ${imagePreviewHtml}
                            </div>
                            <div><label class="text-sm text-gray-400">التقييم (اختياري)</label><input type="number" id="productRating" value="${prod?.rating || 0}" step="0.1" min="0" max="5" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white"></div>
                            <div><label class="text-sm text-gray-400">عدد التقييمات</label><input type="number" id="productReviewCount" value="${prod?.reviewCount || 0}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white"></div>
                            <div><label class="text-sm text-gray-400">الحقول المطلوبة (JSON)</label>
                                <textarea id="productInputFields" rows="3" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white font-mono text-xs">${JSON.stringify(prod?.inputFields || [], null, 2)}</textarea>
                                <p class="text-xs text-gray-400 mt-1">مثال: [{"name":"userId","label":"معرف المستخدم","type":"text","required":true,"placeholder":"أدخل الـ ID"}]</p>
                            </div>
                            <div><label class="text-sm text-gray-400">بيانات التسليم (JSON)</label>
                                <textarea id="productFulfillment" rows="3" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white font-mono text-xs">${JSON.stringify(prod?.fulfillmentData || { type: 'manual' }, null, 2)}</textarea>
                                <p class="text-xs text-gray-400 mt-1">مثال: {"type":"manual","instructions":"سيتم الشحن خلال 24 ساعة"}</p>
                            </div>
                            <div class="flex gap-2 pt-2"><button type="submit" class="flex-1 bg-blue-600 py-2 rounded-lg font-bold">حفظ</button><button type="button" id="cancelProductModal" class="flex-1 bg-gray-600 py-2 rounded-lg font-bold">إلغاء</button></div>
                        </form>
                    `;
                    modalOverlay.classList.add('open');

                    // معاينة الصورة
                    const fileInput = document.getElementById('productImageFile');
                    const preview = document.getElementById('productImagePreview');
                    if (fileInput) {
                        fileInput.addEventListener('change', (e) => {
                            const file = e.target.files[0];
                            if (file) {
                                const reader = new FileReader();
                                reader.onload = (e) => {
                                    preview.src = e.target.result;
                                    preview.classList.remove('hidden');
                                };
                                reader.readAsDataURL(file);
                            } else {
                                preview.classList.add('hidden');
                            }
                        });
                    }

                    document.getElementById('closeProductModal').addEventListener('click', () => modalOverlay.classList.remove('open'));
                    document.getElementById('cancelProductModal').addEventListener('click', () => modalOverlay.classList.remove('open'));
                    modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) modalOverlay.classList.remove('open'); });

                    document.getElementById('productForm').addEventListener('submit', (e) => {
                        e.preventDefault();
                        
                        const file = fileInput?.files[0];
                        const processForm = (imageBase64) => {
                            try {
                                const formData = {
                                    name: document.getElementById('productName').value,
                                    description: document.getElementById('productDescription').value,
                                    price: parseFloat(document.getElementById('productPrice').value),
                                    categoryId: document.getElementById('productCategoryId').value,
                                    icon: document.getElementById('productIcon').value,
                                    stock: parseInt(document.getElementById('productStock').value),
                                    discount: parseFloat(document.getElementById('productDiscount').value) || 0,
                                    image: imageBase64 || prod?.image || '',
                                    rating: parseFloat(document.getElementById('productRating').value) || 0,
                                    reviewCount: parseInt(document.getElementById('productReviewCount').value) || 0,
                                    inputFields: JSON.parse(document.getElementById('productInputFields').value),
                                    fulfillmentData: JSON.parse(document.getElementById('productFulfillment').value)
                                };
                                const id = document.getElementById('productId').value;
                                if (id) {
                                    this.data.updateProduct(id, formData);
                                    this.toast.success('تم التحديث');
                                } else {
                                    this.data.addProduct(formData);
                                    this.toast.success('تمت الإضافة');
                                }
                                modalOverlay.classList.remove('open');
                                this.openAdminPanel();
                            } catch (err) {
                                this.toast.error('خطأ في صيغة JSON: ' + err.message);
                            }
                        };

                        if (file) {
                            const reader = new FileReader();
                            reader.onload = (e) => processForm(e.target.result);
                            reader.readAsDataURL(file);
                        } else {
                            processForm(null);
                        }
                    });
                }

                // ========== الإشعارات ==========
                openNotificationsModal() {
                    const modalOverlay = document.getElementById('walletModalOverlay');
                    const modalContent = document.getElementById('walletModalContent');
                    modalContent.innerHTML = this.renderNotificationsModal();
                    modalOverlay.classList.add('open');
                    this.bindNotificationsModalEvents();
                }

                renderNotificationsModal() {
                    const userId = this.state.user.id;
                    const notifications = this.data.notificationService.getUserNotifications(userId);
                    
                    const notificationsHtml = notifications.length === 0 
                        ? '<p class="text-center text-gray-400 py-8">لا توجد إشعارات</p>'
                        : notifications.map(n => `
                            <div class="transaction-item ${n.read ? 'opacity-60' : ''}" data-id="${n.id}">
                                <div class="flex-1">
                                    <div class="font-bold flex items-center gap-2">${!n.read ? '<span class="w-2 h-2 bg-blue-500 rounded-full"></span>' : ''}${n.title}</div>
                                    <div class="text-sm">${n.message}</div>
                                    <div class="text-xs text-gray-400 mt-1">${DateUtils.formatDateTime(n.date)}</div>
                                </div>
                                ${!n.read ? `<button class="mark-read text-xs text-blue-400 hover:text-blue-300" data-id="${n.id}"><i class="fa-regular fa-circle-check"></i></button>` : ''}
                            </div>
                        `).join('');
                    
                    return `
                        <div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold">الإشعارات</h2><button id="closeNotificationsModal" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center"><i class="fa-solid fa-times"></i></button></div>
                        <div class="flex justify-end mb-3"><button id="markAllRead" class="text-sm bg-blue-600 px-3 py-1 rounded-lg"><i class="fa-regular fa-bell-slash ml-1"></i> تحديد الكل كمقروء</button></div>
                        <div class="max-h-96 overflow-y-auto space-y-2">${notificationsHtml}</div>
                    `;
                }

                bindNotificationsModalEvents() {
                    const modalOverlay = document.getElementById('walletModalOverlay');
                    document.getElementById('closeNotificationsModal').addEventListener('click', () => modalOverlay.classList.remove('open'));
                    
                    document.getElementById('markAllRead')?.addEventListener('click', () => {
                        this.data.notificationService.markAllAsRead(this.state.user.id);
                        this.toast.success('تم تحديد الكل كمقروء');
                        this.openNotificationsModal();
                        this.updateNotificationBadge();
                    });
                    
                    document.querySelectorAll('.mark-read').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const id = btn.dataset.id;
                            this.data.notificationService.markAsRead(id);
                            this.openNotificationsModal();
                            this.updateNotificationBadge();
                        });
                    });
                    
                    modalOverlay.addEventListener('click', (e) => {
                        if (e.target === modalOverlay) modalOverlay.classList.remove('open');
                    });
                }
            }

            // ======================== التطبيق الرئيسي ========================
            class App {
                constructor() {
                    this.state = new AppState();
                    this.telegram = new TelegramService();
                    this.toast = new ToastManager('toastContainer');
                    this.data = new DataService(this.state);
                    this.ui = new UIManager(this.state, this.data, this.telegram, this.toast);
                    
                    this.init();
                }

                async init() {
                    if (!this.telegram.isAvailable) {
                        this.state.telegramMissing = true;
                        this.state.loading = false;
                        this.ui.render();
                        return;
                    }

                    this.telegram.init();

                    if (!this.telegram.isValid() || !this.telegram.getUser()) {
                        this.state.accessDenied = true;
                        this.state.loading = false;
                        this.ui.render();
                        return;
                    }

                    const user = this.telegram.getUser();
                    this.state.user = user;
                    this.state.isAdmin = (user.id === CONFIG.ADMIN_ID);

                    this.data.registerUser(user.id);

                    // تحميل سلة المستخدم بعد معرفة user
                    this.data.loadCart();

                    const savedTheme = this.data.loadTheme();
                    this.applyTheme(savedTheme);

                    this.loadSettings();

                    this.state.loading = true;
                    this.ui.render();

                    try {
                        await new Promise(resolve => setTimeout(resolve, 1000));
                        this.data.loadStats();
                        this.state.loading = false;
                        this.ui.render();

                        this.telegram.setMainButton(
                            this.state.isAdmin ? "لوحة التحكم" : "تحديث البيانات",
                            '#3b82f6',
                            '#ffffff',
                            true,
                            () => {
                                this.telegram.showPopup({
                                    title: this.state.isAdmin ? 'مرحباً أيها المدير' : 'نظام آمن',
                                    message: this.state.isAdmin 
                                        ? `لديك صلاحيات كاملة. الطلبات المعلقة: ${this.data.getPendingRequestsCount()}`
                                        : `أهلاً ${user.first_name}، اتصالك آمن.`,
                                    buttons: [{ type: 'ok', text: 'حسناً' }]
                                });
                            }
                        );

                        this.toast.success(`مرحباً ${user.first_name}، أهلاً بك في المحفظة المتطورة`);
                    } catch (error) {
                        console.error('Initialization error:', error);
                        this.toast.error('حدث خطأ أثناء تحميل البيانات');
                        this.state.loading = false;
                        this.ui.render();
                    }
                }

                loadSettings() {
                    const settings = this.state.settings;
                    this.toast.soundEnabled = settings.sound;
                    this.toast.vibrateEnabled = settings.vibrate;
                    
                    document.getElementById('soundToggle').checked = settings.sound;
                    document.getElementById('vibrateToggle').checked = settings.vibrate;
                }

                applyTheme(theme) {
                    const root = document.documentElement;
                    const themeIcon = document.getElementById('themeIcon');
                    
                    if (theme === 'light') {
                        root.style.setProperty('--tg-theme-bg-color', '#f8fafc');
                        root.style.setProperty('--tg-theme-text-color', '#0f172a');
                        root.style.setProperty('--tg-theme-button-color', '#3b82f6');
                        themeIcon.className = 'fa-solid fa-sun';
                    } else {
                        root.style.setProperty('--tg-theme-bg-color', '#0f172a');
                        root.style.setProperty('--tg-theme-text-color', '#ffffff');
                        root.style.setProperty('--tg-theme-button-color', '#3b82f6');
                        themeIcon.className = 'fa-solid fa-moon';
                    }
                }
            }

            // ======================== بدء التطبيق ========================
            const app = new App();

            // أحداث عامة
            document.getElementById('themeToggle').addEventListener('click', () => {
                const newTheme = app.state.theme === 'dark' ? 'light' : 'dark';
                app.state.theme = newTheme;
                app.data.saveTheme(newTheme);
                app.applyTheme(newTheme);
                app.toast.info(`تم تغيير السمة إلى ${newTheme === 'dark' ? 'الداكنة' : 'الفاتحة'}`);
            });

            const settingsOverlay = document.getElementById('settingsOverlay');
            const settingsPanel = document.getElementById('settingsPanel');
            
            document.getElementById('closeSettings').addEventListener('click', () => {
                settingsOverlay.classList.remove('open');
                settingsPanel.classList.remove('open');
            });

            settingsOverlay.addEventListener('click', () => {
                settingsOverlay.classList.remove('open');
                settingsPanel.classList.remove('open');
            });

            document.getElementById('languageSelect').addEventListener('change', (e) => {
                app.state.settings.language = e.target.value;
                app.data.saveSettings();
                app.toast.success(`تم تغيير اللغة إلى ${e.target.value === 'ar' ? 'العربية' : 'الإنجليزية'}`);
            });

            document.getElementById('notificationsToggle').addEventListener('change', (e) => {
                app.state.settings.notifications = e.target.checked;
                app.data.saveSettings();
                app.toast.success(e.target.checked ? 'تم تفعيل الإشعارات' : 'تم إيقاف الإشعارات');
            });

            document.getElementById('soundToggle').addEventListener('change', (e) => {
                app.state.settings.sound = e.target.checked;
                app.data.saveSettings();
                app.toast.soundEnabled = e.target.checked;
                app.toast.success(e.target.checked ? 'تم تفعيل التنبيه الصوتي' : 'تم إيقاف التنبيه الصوتي');
            });

            document.getElementById('vibrateToggle').addEventListener('change', (e) => {
                app.state.settings.vibrate = e.target.checked;
                app.data.saveSettings();
                app.toast.vibrateEnabled = e.target.checked;
                app.toast.success(e.target.checked ? 'تم تفعيل الاهتزاز' : 'تم إيقاف الاهتزاز');
            });
        })();
    </script>
</body>
</html>
