<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>محفظة تيليجرام المتطورة - السحب فقط</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts (Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--tg-theme-bg-color, #0a0c15);
            color: var(--tg-theme-text-color, #ffffff);
            overflow-x: hidden;
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* خلفية متحركة متطورة */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #0a0c15 0%, #1a1f2e 50%, #0f172a 100%);
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.5;
            animation: floatOrb 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(59,130,246,0.4), rgba(139,92,246,0.2));
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139,92,246,0.3), rgba(236,72,153,0.1));
            bottom: -150px;
            left: -150px;
            animation-delay: 5s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(16,185,129,0.3), rgba(59,130,246,0.1));
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 10s;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* بطاقات زجاجية متطورة */
        .glass-card-modern {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card-modern:hover {
            transform: translateY(-5px);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        /* أيقونة المحفظة ثلاثية الأبعاد */
        .wallet-3d {
            width: 100px;
            height: 100px;
            background: linear-gradient(145deg, #3b82f6, #8b5cf6);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.4), 0 0 0 2px rgba(255,255,255,0.1) inset;
            position: relative;
            animation: float3D 3s infinite ease-in-out;
        }

        .wallet-3d::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), transparent 70%);
            opacity: 0.6;
        }

        .wallet-3d i {
            font-size: 48px;
            color: white;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
            animation: pulseIcon 2s infinite ease-in-out;
            position: relative;
            z-index: 2;
        }

        @keyframes float3D {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes pulseIcon {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* أزرار متحركة */
        .btn-glow {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .btn-glow::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-glow:hover::before {
            width: 300px;
            height: 300px;
        }

        /* بطاقات الإحصائيات */
        .stat-card {
            background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(139,92,246,0.05));
            border: 1px solid rgba(59,130,246,0.3);
            border-radius: 20px;
            padding: 16px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(59,130,246,0.1), transparent 70%);
            opacity: 0;
            transition: opacity 0.5s;
        }

        .stat-card:hover::after {
            opacity: 1;
        }

        /* قائمة المهام */
        .task-item {
            background: linear-gradient(95deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 16px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .task-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #3b82f6, #8b5cf6);
            transform: scaleY(0);
            transition: transform 0.3s;
        }

        .task-item:hover::before {
            transform: scaleY(1);
        }

        .task-item.completed {
            opacity: 0.6;
            filter: grayscale(0.3);
        }

        /* شارات */
        .badge-premium {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: bold;
            color: #000;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .badge-vip {
            background: linear-gradient(135deg, #ec489a, #8b5cf6);
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: bold;
            color: white;
        }

        /* توست متطور */
        .toast-modern {
            background: rgba(20, 30, 45, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 14px 24px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            animation: slideInRight 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* مودال متطور */
        .modal-glass {
            background: rgba(10, 15, 25, 0.95);
            backdrop-filter: blur(25px);
            border-radius: 48px;
            border: 1px solid rgba(255,255,255,0.1);
            animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* أزرار رقمية */
        .action-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 40px;
            padding: 14px 24px;
            font-weight: bold;
            color: white;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .action-btn-secondary {
            background: linear-gradient(135deg, #475569, #334155);
        }

        .action-btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .action-btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        /* مؤشر تقدم */
        .progress-ring {
            width: 80px;
            height: 80px;
        }

        /* شريط جانبي */
        .sidebar-mini {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .float-btn {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(59,130,246,0.4);
            transition: all 0.3s;
        }

        .float-btn:hover {
            transform: scale(1.1);
        }

        /* تنسيقات إضافية */
        .scrollbar-custom::-webkit-scrollbar {
            width: 6px;
        }

        .scrollbar-custom::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        .scrollbar-custom::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #3b82f6, #8b5cf6);
            border-radius: 10px;
        }

        .gradient-text {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec489a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .spinner-modern {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(59,130,246,0.2);
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <div class="animated-bg">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
    </div>

    <div class="sidebar-mini">
        <div class="float-btn" id="themeToggle">
            <i class="fa-solid fa-moon" id="themeIcon"></i>
        </div>
        <div class="float-btn" id="settingsBtn">
            <i class="fa-solid fa-gear"></i>
        </div>
    </div>

    <div id="app" class="w-full max-w-md mx-auto p-5 relative z-10"></div>

    <!-- مودال الإعدادات المتطور -->
    <div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden transition-all duration-300" id="settingsOverlay">
        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-slate-900 to-slate-800 rounded-t-3xl p-6 transform transition-transform duration-300" id="settingsPanel">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold gradient-text">الإعدادات المتقدمة</h3>
                <button id="closeSettings" class="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 transition-all">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            <div class="space-y-5">
                <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-language text-2xl text-blue-500"></i>
                        <span class="font-medium">اللغة</span>
                    </div>
                    <select class="bg-slate-700 rounded-xl px-4 py-2 border border-white/10" id="languageSelect">
                        <option value="ar">العربية</option>
                        <option value="en">English</option>
                    </select>
                </div>
                <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl">
                    <div class="flex items-center gap-3">
                        <i class="fa-regular fa-bell text-2xl text-yellow-500"></i>
                        <span class="font-medium">الإشعارات</span>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" class="sr-only peer" id="notificationsToggle">
                        <div class="w-11 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600 peer-checked:after:translate-x-full after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
                    </label>
                </div>
                <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-volume-high text-2xl text-green-500"></i>
                        <span class="font-medium">تنبيه صوتي</span>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" class="sr-only peer" id="soundToggle" checked>
                        <div class="w-11 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600 peer-checked:after:translate-x-full after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
                    </label>
                </div>
                <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-mobile-screen-button text-2xl text-purple-500"></i>
                        <span class="font-medium">اهتزاز</span>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" class="sr-only peer" id="vibrateToggle" checked>
                        <div class="w-11 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600 peer-checked:after:translate-x-full after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- توست كونتينر -->
    <div class="fixed bottom-5 left-1/2 transform -translate-x-1/2 z-[9999] flex flex-col gap-3 w-full max-w-md px-4" id="toastContainer"></div>

    <!-- مودالات -->
    <div class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 hidden items-center justify-center p-4 transition-all" id="walletModalOverlay">
        <div class="modal-glass w-full max-w-md max-h-[85vh] overflow-y-auto p-6 scrollbar-custom" id="walletModalContent"></div>
    </div>

    <div class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 hidden items-center justify-center p-4" id="adminPanelOverlay">
        <div class="modal-glass w-full max-w-2xl max-h-[85vh] overflow-y-auto p-6 scrollbar-custom" id="adminPanelContent"></div>
    </div>

    <div class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 hidden items-center justify-center p-4" id="paymentMethodModalOverlay">
        <div class="modal-glass w-full max-w-md p-6" id="paymentMethodModalContent"></div>
    </div>

    <div class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 hidden items-center justify-center p-4" id="adsModalOverlay">
        <div class="modal-glass w-full max-w-md max-h-[85vh] overflow-y-auto p-6 scrollbar-custom" id="adsModalContent"></div>
    </div>

    <div class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 hidden items-center justify-center p-4" id="countdownModalOverlay">
        <div class="modal-glass w-full max-w-sm p-6 text-center" id="countdownModalContent"></div>
    </div>

    <script>
        (function() {
            // ======================== الإعدادات الثابتة ========================
            const CONFIG = {
                ADMIN_ID: 7609492965,
                SECRET_KEY: "v3ryS3cr3tK3y!@#2025",
                DEFAULT_BALANCE: 0,
                MAX_TRANSACTIONS: 50,
                DAILY_BONUS_AMOUNT: 10,
                REFERRAL_BONUS_PERCENT: 10,
                STORAGE_KEYS: {
                    USERS: 'app_users',
                    BOTS: 'app_bots',
                    DAILY_OPS: 'daily_ops',
                    WALLET_PREFIX: 'wallet_',
                    PAYMENT_METHODS: 'payment_methods',
                    WITHDRAWAL_REQUESTS: 'withdrawal_requests',
                    THEME: 'theme',
                    SETTINGS_PREFIX: 'settings_',
                    NOTIFICATIONS_PREFIX: 'notifications_',
                    ADS: 'ads_list',
                    USER_AD_VIEWS_PREFIX: 'user_ads_views_',
                    REFERRAL_PREFIX: 'ref_',
                    DAILY_BONUS_PREFIX: 'daily_bonus_'
                }
            };

            // ======================== خدمات الأمان ========================
            class Security {
                static async hmacSign(data, secret) {
                    const encoder = new TextEncoder();
                    const keyData = encoder.encode(secret);
                    const messageData = encoder.encode(JSON.stringify(data));
                    const cryptoKey = await crypto.subtle.importKey("raw", keyData, { name: "HMAC", hash: "SHA-256" }, false, ["sign"]);
                    const signature = await crypto.subtle.sign("HMAC", cryptoKey, messageData);
                    return Array.from(new Uint8Array(signature)).map(b => b.toString(16).padStart(2, '0')).join('');
                }
                static async verify(data, signature, secret) {
                    const computed = await this.hmacSign(data, secret);
                    return computed === signature;
                }
            }

            // ======================== تخزين البيانات ========================
            class StorageService {
                static get(key, defaultValue = null) {
                    try {
                        const value = localStorage.getItem(key);
                        return value !== null ? JSON.parse(value) : defaultValue;
                    } catch (e) { return defaultValue; }
                }
                static set(key, value) {
                    try { localStorage.setItem(key, JSON.stringify(value)); return true; }
                    catch (e) { return false; }
                }
                static remove(key) {
                    try { localStorage.removeItem(key); return true; }
                    catch (e) { return false; }
                }
            }

            class DateUtils {
                static getTodayDate() { return new Date().toISOString().split('T')[0]; }
                static formatDateTime(isoString) { return new Date(isoString).toLocaleString('ar-EG'); }
                static formatDate(isoString) { return new Date(isoString).toLocaleDateString('ar-EG'); }
            }

            class IdGenerator {
                static generate(prefix = '') { return prefix + Date.now() + '_' + Math.random().toString(36).substr(2, 9); }
            }

            // ======================== توست متطور ========================
            class ToastManager {
                constructor(containerId) {
                    this.container = document.getElementById(containerId);
                    if (!this.container) {
                        this.container = document.createElement('div');
                        this.container.id = containerId;
                        this.container.className = 'fixed bottom-5 left-1/2 transform -translate-x-1/2 z-[9999] flex flex-col gap-3 w-full max-w-md px-4';
                        document.body.appendChild(this.container);
                    }
                    this.soundEnabled = true;
                    this.vibrateEnabled = true;
                }

                show(message, type = 'info', duration = 5000) {
                    const toast = document.createElement('div');
                    const icons = {
                        success: '<i class="fa-solid fa-circle-check text-green-500 text-xl"></i>',
                        error: '<i class="fa-solid fa-circle-exclamation text-red-500 text-xl"></i>',
                        warning: '<i class="fa-solid fa-triangle-exclamation text-yellow-500 text-xl"></i>',
                        info: '<i class="fa-solid fa-circle-info text-blue-500 text-xl"></i>'
                    };
                    toast.className = 'toast-modern flex items-center gap-3';
                    toast.innerHTML = `
                        ${icons[type] || icons.info}
                        <div class="flex-1 text-sm font-medium">${message}</div>
                        <button class="opacity-50 hover:opacity-100 transition"><i class="fa-solid fa-xmark"></i></button>
                    `;
                    this.container.appendChild(toast);
                    
                    const closeBtn = toast.querySelector('button');
                    closeBtn.addEventListener('click', () => toast.remove());
                    
                    if (this.soundEnabled) this.playSound(type);
                    if (this.vibrateEnabled && navigator.vibrate) navigator.vibrate(100);
                    
                    setTimeout(() => {
                        if (toast.parentNode) toast.remove();
                    }, duration);
                }

                playSound(type) {
                    try {
                        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        const oscillator = audioCtx.createOscillator();
                        const gainNode = audioCtx.createGain();
                        oscillator.connect(gainNode);
                        gainNode.connect(audioCtx.destination);
                        oscillator.type = 'sine';
                        oscillator.frequency.value = type === 'success' ? 800 : (type === 'warning' ? 600 : 400);
                        gainNode.gain.value = 0.1;
                        oscillator.start();
                        oscillator.stop(audioCtx.currentTime + 0.2);
                    } catch (e) {}
                }

                success(message) { this.show(message, 'success'); }
                error(message) { this.show(message, 'error'); }
                warning(message) { this.show(message, 'warning'); }
                info(message) { this.show(message, 'info'); }
            }

            // ======================== خدمة تيليجرام ========================
            class TelegramService {
                constructor() {
                    this.tg = window.Telegram?.WebApp || null;
                    this.isAvailable = !!this.tg;
                }
                init() { if (!this.isAvailable) return false; this.tg.expand(); this.tg.ready(); return true; }
                getUser() { return this.tg?.initDataUnsafe?.user || null; }
                isValid() { return this.isAvailable && this.tg?.initData; }
                close() { this.tg?.close(); }
            }

            // ======================== إدارة البيانات ========================
            class DataService {
                constructor(state) {
                    this.state = state;
                    this.loadInitialData();
                }

                getWalletKey() { return CONFIG.STORAGE_KEYS.WALLET_PREFIX + this.state.userId; }
                getSettingsKey() { return CONFIG.STORAGE_KEYS.SETTINGS_PREFIX + this.state.userId; }
                getUserAdViewsKey() { return CONFIG.STORAGE_KEYS.USER_AD_VIEWS_PREFIX + this.state.userId; }
                getReferralKey() { return CONFIG.STORAGE_KEYS.REFERRAL_PREFIX + this.state.userId; }
                getDailyBonusKey() { return CONFIG.STORAGE_KEYS.DAILY_BONUS_PREFIX + this.state.userId; }

                async loadInitialData() {
                    await this.loadWallet();
                    await this.loadRequests();
                    this.loadPaymentMethods();
                    this.loadSettings();
                    this.loadStats();
                    await this.loadNotifications();
                    this.loadAds();
                    await this.loadReferralData();
                    await this.loadDailyBonus();
                }

                async loadWallet() {
                    const data = StorageService.get(this.getWalletKey(), null);
                    if (data && data.balance !== undefined && data.signature) {
                        const isValid = await Security.verify(data.data, data.signature, CONFIG.SECRET_KEY);
                        if (isValid) {
                            this.state.balance = data.data.balance;
                            this.state.wallet.transactions = data.data.transactions || [];
                            this.state.wallet.address = data.data.address || this.state.wallet.address;
                            return;
                        }
                    }
                    this.state.balance = CONFIG.DEFAULT_BALANCE;
                    this.state.wallet.transactions = [];
                    await this.saveWallet();
                }

                async saveWallet() {
                    const dataToSign = {
                        balance: this.state.balance,
                        transactions: this.state.wallet.transactions,
                        address: this.state.wallet.address
                    };
                    const signature = await Security.hmacSign(dataToSign, CONFIG.SECRET_KEY);
                    StorageService.set(this.getWalletKey(), { data: dataToSign, signature });
                }

                loadPaymentMethods() {
                    const saved = StorageService.get(CONFIG.STORAGE_KEYS.PAYMENT_METHODS, null);
                    if (saved && Array.isArray(saved) && saved.length > 0) {
                        this.state.paymentMethods = saved;
                    } else {
                        this.state.paymentMethods = [
                            { id: IdGenerator.generate('usdt_'), name: 'USDT (TRC20)', icon: 'fa-brands fa-tether', description: 'عملة رقمية مستقرة', withdrawDetails: 'أدخل عنوان USDT الخاص بك' },
                            { id: IdGenerator.generate('visa_'), name: 'Visa / Mastercard', icon: 'fa-regular fa-credit-card', description: 'بطاقات ائتمانية', withdrawDetails: 'أدخل بيانات بطاقتك' },
                            { id: IdGenerator.generate('bank_'), name: 'تحويل بنكي', icon: 'fa-solid fa-building-columns', description: 'حوالة بنكية محلية', withdrawDetails: 'أدخل رقم IBAN الخاص بك' }
                        ];
                    }
                }

                savePaymentMethods() { StorageService.set(CONFIG.STORAGE_KEYS.PAYMENT_METHODS, this.state.paymentMethods); }
                addPaymentMethod(methodData) { const newMethod = { id: IdGenerator.generate('pm_'), ...methodData }; this.state.paymentMethods.push(newMethod); this.savePaymentMethods(); return newMethod; }
                updatePaymentMethod(id, newData) { const index = this.state.paymentMethods.findIndex(m => m.id === id); if (index !== -1) { this.state.paymentMethods[index] = { ...this.state.paymentMethods[index], ...newData }; this.savePaymentMethods(); return true; } return false; }
                deletePaymentMethod(id) { this.state.paymentMethods = this.state.paymentMethods.filter(m => m.id !== id); this.savePaymentMethods(); }

                async loadRequests() { this.state.withdrawalRequests = StorageService.get(CONFIG.STORAGE_KEYS.WITHDRAWAL_REQUESTS, []); }
                saveRequests() { StorageService.set(CONFIG.STORAGE_KEYS.WITHDRAWAL_REQUESTS, this.state.withdrawalRequests); }

                async addWithdrawalRequest(amount, methodId, details, user) {
                    if (amount > this.state.balance) return { success: false, message: 'الرصيد غير كافٍ' };
                    const method = this.state.paymentMethods.find(m => m.id === methodId);
                    const request = {
                        id: IdGenerator.generate('with_'),
                        userId: user.id,
                        userName: `${user.first_name} ${user.last_name || ''}`.trim(),
                        amount, method: method ? method.name : methodId, methodId, details,
                        status: 'pending', date: new Date().toISOString()
                    };
                    this.state.withdrawalRequests.push(request);
                    this.saveRequests();
                    await this.incrementDailyOps();
                    window.dispatchEvent(new CustomEvent('newWithdrawalRequest', { detail: request }));
                    return { success: true, request };
                }

                async acceptWithdrawal(request) {
                    const req = this.state.withdrawalRequests.find(r => r.id === request.id);
                    if (req && req.status === 'pending') {
                        req.status = 'approved';
                        await this.subtractBalanceFromUser(req.userId, req.amount, `سحب عبر ${req.method}`);
                        this.saveRequests();
                        return true;
                    }
                    return false;
                }

                async rejectWithdrawal(request) {
                    const req = this.state.withdrawalRequests.find(r => r.id === request.id);
                    if (req) { req.status = 'rejected'; this.saveRequests(); return true; }
                    return false;
                }

                async subtractBalanceFromUser(userId, amount, note) {
                    const walletKey = CONFIG.STORAGE_KEYS.WALLET_PREFIX + userId;
                    const wallet = StorageService.get(walletKey, null);
                    if (wallet && wallet.data && wallet.signature) {
                        const isValid = await Security.verify(wallet.data, wallet.signature, CONFIG.SECRET_KEY);
                        if (isValid && wallet.data.balance >= amount) {
                            wallet.data.balance -= amount;
                            wallet.data.transactions.unshift({ id: IdGenerator.generate('tx_'), type: 'withdraw', amount: -amount, note, status: 'مكتمل', date: new Date().toISOString() });
                            const newSignature = await Security.hmacSign(wallet.data, CONFIG.SECRET_KEY);
                            StorageService.set(walletKey, { data: wallet.data, signature: newSignature });
                        }
                    }
                }

                getPendingWithdrawals() { return this.state.withdrawalRequests.filter(r => r.status === 'pending'); }
                getPendingRequestsCount() { return this.getPendingWithdrawals().length; }

                async loadStats() {
                    const users = StorageService.get(CONFIG.STORAGE_KEYS.USERS, []);
                    const bots = StorageService.get(CONFIG.STORAGE_KEYS.BOTS, [{ id: 123456, name: 'البوت الرسمي' }]);
                    const dailyOpsData = StorageService.get(CONFIG.STORAGE_KEYS.DAILY_OPS, {});
                    const today = DateUtils.getTodayDate();
                    this.state.stats = { users: users.length, bots: bots.length, dailyOps: dailyOpsData[today] || 0 };
                }

                async incrementDailyOps() {
                    const today = DateUtils.getTodayDate();
                    const dailyOpsData = StorageService.get(CONFIG.STORAGE_KEYS.DAILY_OPS, {});
                    dailyOpsData[today] = (dailyOpsData[today] || 0) + 1;
                    StorageService.set(CONFIG.STORAGE_KEYS.DAILY_OPS, dailyOpsData);
                    await this.loadStats();
                }

                async registerUser(userId, referredBy = null) {
                    let users = StorageService.get(CONFIG.STORAGE_KEYS.USERS, []);
                    if (!users.includes(userId)) {
                        users.push(userId);
                        StorageService.set(CONFIG.STORAGE_KEYS.USERS, users);
                        if (referredBy && referredBy !== userId) {
                            const refData = StorageService.get(CONFIG.STORAGE_KEYS.REFERRAL_PREFIX + referredBy, { count: 0, totalEarned: 0 });
                            refData.count = (refData.count || 0) + 1;
                            StorageService.set(CONFIG.STORAGE_KEYS.REFERRAL_PREFIX + referredBy, refData);
                        }
                        await this.loadStats();
                    }
                }

                loadSettings() { const settings = StorageService.get(this.getSettingsKey(), null); if (settings) this.state.settings = settings; }
                saveSettings() { StorageService.set(this.getSettingsKey(), this.state.settings); }
                loadTheme() { const theme = StorageService.get(CONFIG.STORAGE_KEYS.THEME, 'dark'); this.state.theme = theme; return theme; }
                saveTheme(theme) { StorageService.set(CONFIG.STORAGE_KEYS.THEME, theme); this.state.theme = theme; }

                loadAds() { this.state.ads = StorageService.get(CONFIG.STORAGE_KEYS.ADS, []); }
                saveAds() { StorageService.set(CONFIG.STORAGE_KEYS.ADS, this.state.ads); }
                addAd(adData) { const newAd = { id: IdGenerator.generate('ad_'), ...adData, createdAt: new Date().toISOString() }; this.state.ads.push(newAd); this.saveAds(); return newAd; }
                updateAd(id, adData) { const index = this.state.ads.findIndex(ad => ad.id === id); if (index !== -1) { this.state.ads[index] = { ...this.state.ads[index], ...adData }; this.saveAds(); return true; } return false; }
                deleteAd(id) { this.state.ads = this.state.ads.filter(ad => ad.id !== id); this.saveAds(); }
                hasUserViewedAd(adId) { const viewedAds = StorageService.get(this.getUserAdViewsKey(), []); return viewedAds.includes(adId); }
                markAdViewed(adId) { const viewedAds = StorageService.get(this.getUserAdViewsKey(), []); if (!viewedAds.includes(adId)) { viewedAds.push(adId); StorageService.set(this.getUserAdViewsKey(), viewedAds); } }
                getAvailableAdsForUser() { return this.state.ads.filter(ad => !this.hasUserViewedAd(ad.id)); }

                async addBalance(amount, note) {
                    this.state.balance += amount;
                    await this.saveWallet();
                    this.state.addTransaction({ id: IdGenerator.generate('tx_'), type: 'earning', amount, note, status: 'مكتمل', date: new Date().toISOString() });
                }

                async loadReferralData() {
                    const data = StorageService.get(this.getReferralKey(), null);
                    if (data) this.state.referrals = data;
                    else { this.state.referrals = { code: this.state.userId.toString(), referredBy: null, count: 0, totalEarned: 0 }; await this.saveReferralData(); }
                }
                async saveReferralData() { StorageService.set(this.getReferralKey(), this.state.referrals); }
                async setReferredBy(referrerId) { if (!this.state.referrals.referredBy && referrerId !== this.state.userId) { this.state.referrals.referredBy = referrerId; await this.saveReferralData(); } }

                async loadDailyBonus() {
                    const data = StorageService.get(this.getDailyBonusKey(), null);
                    if (data && data.lastClaim === DateUtils.getTodayDate()) this.state.dailyBonus = { lastClaim: data.lastClaim, claimed: true };
                    else this.state.dailyBonus = { lastClaim: null, claimed: false };
                }
                async claimDailyBonus() {
                    if (this.state.dailyBonus.claimed) return false;
                    await this.addBalance(CONFIG.DAILY_BONUS_AMOUNT, `المكافأة اليومية`);
                    this.state.dailyBonus = { lastClaim: DateUtils.getTodayDate(), claimed: true };
                    StorageService.set(this.getDailyBonusKey(), this.state.dailyBonus);
                    return true;
                }

                async loadNotifications() {
                    const notifKey = CONFIG.STORAGE_KEYS.NOTIFICATIONS_PREFIX + this.state.userId;
                    this.state.notifications = StorageService.get(notifKey, []);
                }
                async saveNotifications() {
                    const notifKey = CONFIG.STORAGE_KEYS.NOTIFICATIONS_PREFIX + this.state.userId;
                    StorageService.set(notifKey, this.state.notifications);
                }
                addNotification(title, message, type = 'info') {
                    const notification = { id: IdGenerator.generate('notif_'), title, message, type, read: false, date: new Date().toISOString() };
                    this.state.notifications.push(notification);
                    this.saveNotifications();
                    window.dispatchEvent(new CustomEvent('newNotification', { detail: notification }));
                }
                markAsRead(notificationId) { const notif = this.state.notifications.find(n => n.id === notificationId); if (notif) { notif.read = true; this.saveNotifications(); } }
                markAllAsRead() { this.state.notifications.forEach(n => n.read = true); this.saveNotifications(); }
                getUserNotifications() { return [...this.state.notifications].sort((a, b) => new Date(b.date) - new Date(a.date)); }
                getUnreadCount() { return this.state.notifications.filter(n => !n.read).length; }
                getAllUsersData() {
                    const users = StorageService.get(CONFIG.STORAGE_KEYS.USERS, []);
                    return users.map(uid => {
                        const walletKey = CONFIG.STORAGE_KEYS.WALLET_PREFIX + uid;
                        const wallet = StorageService.get(walletKey, { data: { balance: 0 } });
                        return { id: uid, balance: wallet.data?.balance || 0 };
                    });
                }
            }

                    document.getElementById('walletIconLarge')?.addEventListener('click', () => this.openWalletModal());
                    document.getElementById('openAdminPanelBtn')?.addEventListener('click', () => this.openAdminPanel());
                    document.getElementById('earnBtn')?.addEventListener('click', () => this.openAdsModal());
                    document.getElementById('dailyBonusBtn')?.addEventListener('click', async () => {
                        const claimed = await this.data.claimDailyBonus();
                        if (claimed) {
                            this.toast.success(`🎉 حصلت على ${CONFIG.DAILY_BONUS_AMOUNT} ر.س مكافأة يومية!`);
                            this.render();
                        } else {
                            this.toast.info('لقد حصلت على المكافأة اليومية بالفعل');
                        }
                    });
                    document.getElementById('copyReferralCode')?.addEventListener('click', () => {
                        const code = document.getElementById('copyReferralCode').dataset.code;
                        navigator.clipboard.writeText(code);
                        this.toast.success('تم نسخ كود الإحالة');
                    });
                    document.getElementById('applyReferralBtn')?.addEventListener('click', async () => {
                        const input = document.getElementById('referralInput').value.trim();
                        if (input && !this.state.referrals.referredBy) {
                            await this.data.setReferredBy(input);
                            this.toast.success('تم تطبيق كود الإحالة');
                            this.render();
                        } else {
                            this.toast.warning('لا يمكن تطبيق الكود');
                        }
                    });
                }

                openWalletModal() {
                    const modal = document.getElementById('walletModalOverlay');
                    document.getElementById('walletModalContent').innerHTML = this.renderWalletModal();
                    modal.classList.remove('hidden');
                    modal.style.display = 'flex';
                    this.bindWalletModalEvents();
                }

                closeWalletModal() {
                    const modal = document.getElementById('walletModalOverlay');
                    modal.classList.add('hidden');
                    modal.style.display = 'none';
                }

                renderWalletModal() {
                    const transactions = this.state.wallet.transactions;
                    const transactionsHtml = transactions.length === 0 ? '<div class="text-center text-gray-400 py-8">لا توجد معاملات بعد</div>' : 
                        transactions.map(tx => `<div class="flex justify-between items-center p-3 border-b border-white/5"><div><div class="font-medium">${tx.note || tx.type}</div><div class="text-xs text-gray-400">${DateUtils.formatDateTime(tx.date)}</div></div><div class="font-bold ${tx.amount > 0 ? 'text-green-500' : 'text-red-500'}">${tx.amount > 0 ? '+' : ''}${tx.amount.toLocaleString('ar-EG')}</div></div>`).join('');
                    
                    return `
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-bold gradient-text">محفظتي</h2>
                            <button id="closeWalletModal" class="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 transition"><i class="fa-solid fa-times"></i></button>
                        </div>
                        <div class="text-center mb-6">
                            <div class="text-4xl font-bold gradient-text">${this.state.balance.toLocaleString('ar-EG')}</div>
                            <div class="text-gray-400 text-sm mt-1">ر.س</div>
                        </div>
                        <div class="flex gap-2 mb-6 border-b border-white/10 pb-3">
                            <button class="tab-btn flex-1 py-2 rounded-xl font-bold transition-all" data-tab="withdraw">سحب</button>
                            <button class="tab-btn flex-1 py-2 rounded-xl font-bold transition-all text-gray-400" data-tab="history">السجل</button>
                        </div>
                        <div id="tab-withdraw" class="tab-content">
                            <div class="space-y-3">
                                ${this.state.paymentMethods.map(m => `
                                    <div class="payment-method p-3 rounded-xl bg-white/5 border border-white/10 cursor-pointer transition hover:border-blue-500" data-method-id="${m.id}">
                                        <div class="flex items-center gap-3">
                                            <i class="${m.icon} text-2xl text-blue-500"></i>
                                            <div><div class="font-bold">${m.name}</div><div class="text-xs text-gray-400">${m.description || ''}</div></div>
                                        </div>
                                    </div>
                                `).join('')}
                                <input type="text" id="withdrawDetails" placeholder="أدخل التفاصيل المطلوبة" class="w-full bg-white/5 border border-white/10 rounded-xl p-3">
                                <div class="flex gap-2">
                                    <input type="number" id="withdrawAmount" placeholder="المبلغ" class="flex-1 bg-white/5 border border-white/10 rounded-xl p-3">
                                    <button id="withdrawBtn" class="action-btn-danger px-6">طلب سحب</button>
                                </div>
                            </div>
                        </div>
                        <div id="tab-history" class="tab-content hidden">
                            <div class="max-h-96 overflow-y-auto scrollbar-custom">${transactionsHtml}</div>
                        </div>
                    `;
                }

                bindWalletModalEvents() {
                    const modal = document.getElementById('walletModalOverlay');
                    document.getElementById('closeWalletModal').addEventListener('click', () => this.closeWalletModal());
                    modal.addEventListener('click', (e) => { if (e.target === modal) this.closeWalletModal(); });
                    
                    let selectedMethod = null;
                    document.querySelectorAll('.payment-method').forEach(m => {
                        m.addEventListener('click', () => {
                            document.querySelectorAll('.payment-method').forEach(p => p.classList.remove('border-blue-500'));
                            m.classList.add('border-blue-500');
                            selectedMethod = m.dataset.methodId;
                        });
                    });
                    
                    document.getElementById('withdrawBtn')?.addEventListener('click', async () => {
                        const amount = parseFloat(document.getElementById('withdrawAmount').value);
                        const details = document.getElementById('withdrawDetails').value.trim();
                        if (isNaN(amount) || amount <= 0) { this.toast.error('أدخل مبلغ صحيح'); return; }
                        if (!selectedMethod) { this.toast.error('اختر طريقة سحب'); return; }
                        if (!details) { this.toast.error('أدخل التفاصيل'); return; }
                        const result = await this.data.addWithdrawalRequest(amount, selectedMethod, details, this.state.user);
                        if (result.success) {
                            this.toast.success(`✅ تم تقديم طلب سحب بمبلغ ${amount} ر.س بنجاح`);
                            this.closeWalletModal();
                            this.render();
                        } else {
                            this.toast.error(result.message);
                        }
                    });
                    
                    document.querySelectorAll('.tab-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const tab = btn.dataset.tab;
                            document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('gradient-text', 'bg-white/10'); b.classList.add('text-gray-400'); });
                            btn.classList.add('gradient-text', 'bg-white/10');
                            btn.classList.remove('text-gray-400');
                            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                            document.getElementById(`tab-${tab}`).classList.remove('hidden');
                        });
                    });
                }

                openAdminPanel() {
                    const modal = document.getElementById('adminPanelOverlay');
                    document.getElementById('adminPanelContent').innerHTML = this.renderAdminPanel();
                    modal.classList.remove('hidden');
                    modal.style.display = 'flex';
                    this.bindAdminPanelEvents();
                }

                closeAdminPanel() {
                    const modal = document.getElementById('adminPanelOverlay');
                    modal.classList.add('hidden');
                    modal.style.display = 'none';
                }

                renderAdminPanel() {
                    const pending = this.data.getPendingWithdrawals();
                    const withdrawalsHtml = pending.length === 0 ? '<div class="text-center text-gray-400 py-8">لا توجد طلبات معلقة</div>' :
                        pending.map(req => `
                            <div class="bg-white/5 rounded-xl p-4 mb-3">
                                <div class="flex justify-between items-start mb-2">
                                    <div><div class="font-bold">${req.userName}</div><div class="text-xs text-gray-400">${DateUtils.formatDateTime(req.date)}</div></div>
                                    <span class="badge-pending bg-yellow-500/20 text-yellow-500 px-3 py-1 rounded-full text-xs">قيد الانتظار</span>
                                </div>
                                <div class="text-sm">المبلغ: <span class="text-red-400 font-bold">${req.amount.toLocaleString()} ر.س</span></div>
                                <div class="text-sm">الطريقة: ${req.method}</div>
                                <div class="text-sm">التفاصيل: ${req.details}</div>
                                <div class="flex gap-2 mt-3">
                                    <button class="accept-request flex-1 bg-green-600/20 text-green-500 py-2 rounded-lg text-sm font-bold" data-id="${req.id}">قبول</button>
                                    <button class="reject-request flex-1 bg-red-600/20 text-red-500 py-2 rounded-lg text-sm font-bold" data-id="${req.id}">رفض</button>
                                </div>
                            </div>
                        `).join('');
                    
                    return `
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-bold gradient-text">لوحة الإدارة</h2>
                            <button id="closeAdminPanel" class="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 transition"><i class="fa-solid fa-times"></i></button>
                        </div>
                        <h3 class="text-lg font-bold mb-3">طلبات السحب المعلقة</h3>
                        <div class="max-h-96 overflow-y-auto scrollbar-custom">${withdrawalsHtml}</div>
                    `;
                }

                bindAdminPanelEvents() {
                    const modal = document.getElementById('adminPanelOverlay');
                    document.getElementById('closeAdminPanel').addEventListener('click', () => this.closeAdminPanel());
                    modal.addEventListener('click', (e) => { if (e.target === modal) this.closeAdminPanel(); });
                    
                    document.querySelectorAll('.accept-request').forEach(btn => {
                        btn.addEventListener('click', async () => {
                            const id = btn.dataset.id;
                            const req = this.state.withdrawalRequests.find(r => r.id === id);
                            if (req && await this.data.acceptWithdrawal(req)) {
                                this.toast.success(`✅ تم قبول طلب ${req.userName}`);
                                this.closeAdminPanel();
                                this.render();
                            }
                        });
                    });
                    
                    document.querySelectorAll('.reject-request').forEach(btn => {
                        btn.addEventListener('click', async () => {
                            const id = btn.dataset.id;
                            const req = this.state.withdrawalRequests.find(r => r.id === id);
                            if (req && await this.data.rejectWithdrawal(req)) {
                                this.toast.info(`❌ تم رفض طلب ${req.userName}`);
                                this.closeAdminPanel();
                                this.render();
                            }
                        });
                    });
                }

                openAdsModal() {
                    const ads = this.data.getAvailableAdsForUser();
                    if (ads.length === 0) {
                        this.toast.info('لا توجد إعلانات متاحة حالياً');
                        return;
                    }
                    const modal = document.getElementById('adsModalOverlay');
                    document.getElementById('adsModalContent').innerHTML = `
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-bold gradient-text">كسب المال</h2>
                            <button id="closeAdsModal" class="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 transition"><i class="fa-solid fa-times"></i></button>
                        </div>
                        <div class="space-y-3 max-h-96 overflow-y-auto scrollbar-custom">
                            ${ads.map(ad => `
                                <div class="task-item p-4 cursor-pointer" data-ad-id="${ad.id}">
                                    <div class="flex items-center gap-3">
                                        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white">
                                            <i class="fa-solid fa-ad"></i>
                                        </div>
                                        <div class="flex-1">
                                            <div class="font-bold">${ad.title}</div>
                                            <div class="text-sm text-gray-400">${ad.description || 'شاهد الإعلان واحصل على المكافأة'}</div>
                                            <div class="flex items-center gap-3 mt-1 text-xs">
                                                <span class="text-green-500"><i class="fa-solid fa-coins"></i> ${ad.reward} ر.س</span>
                                                <span class="text-blue-500"><i class="fa-regular fa-clock"></i> ${ad.duration} ثانية</span>
                                            </div>
                                        </div>
                                        <i class="fa-solid fa-chevron-left text-gray-500"></i>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                    modal.classList.remove('hidden');
                    modal.style.display = 'flex';
                    this.bindAdsModalEvents();
                }

                bindAdsModalEvents() {
                    const modal = document.getElementById('adsModalOverlay');
                    document.getElementById('closeAdsModal').addEventListener('click', () => {
                        modal.classList.add('hidden');
                        modal.style.display = 'none';
                    });
                    modal.addEventListener('click', (e) => { if (e.target === modal) { modal.classList.add('hidden'); modal.style.display = 'none'; } });
                    
                    document.querySelectorAll('.task-item').forEach(item => {
                        item.addEventListener('click', () => {
                            const adId = item.dataset.adId;
                            const ad = this.state.ads.find(a => a.id === adId);
                            if (ad && !this.data.hasUserViewedAd(adId)) {
                                modal.classList.add('hidden');
                                modal.style.display = 'none';
                                this.startAdCountdown(ad);
                            } else {
                                this.toast.warning('لقد شاهدت هذا الإعلان بالفعل');
                            }
                        });
                    });
                }

                startAdCountdown(ad) {
                    const modal = document.getElementById('countdownModalOverlay');
                    let remaining = ad.duration;
                    const updateContent = () => {
                        document.getElementById('countdownModalContent').innerHTML = `
                            <div class="text-center">
                                <div class="w-24 h-24 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full flex items-center justify-center text-4xl mx-auto mb-4 animate-pulse">
                                    <i class="fa-solid fa-eye"></i>
                                </div>
                                <h3 class="text-xl font-bold mb-2">${ad.title}</h3>
                                <p class="text-gray-400 mb-4 text-sm">شاهد الإعلان لمدة ${ad.duration} ثانية</p>
                                <a href="${ad.link}" target="_blank" class="action-btn-success inline-block px-6 py-3 rounded-xl mb-4 text-sm" rel="noopener noreferrer">فتح الإعلان</a>
                                <div class="text-5xl font-bold gradient-text mb-2" id="countdownTimer">${remaining}</div>
                                <button id="cancelCountdown" class="text-gray-400 text-sm mt-3 hover:text-white">إلغاء</button>
                            </div>
                        `;
                        const timerDiv = document.getElementById('countdownTimer');
                        const interval = setInterval(() => {
                            remaining--;
                            if (timerDiv) timerDiv.innerText = remaining;
                            if (remaining <= 0) {
                                clearInterval(interval);
                                this.completeAdView(ad);
                                modal.classList.add('hidden');
                                modal.style.display = 'none';
                            }
                        }, 1000);
                        document.getElementById('cancelCountdown').addEventListener('click', () => {
                            clearInterval(interval);
                            modal.classList.add('hidden');
                            modal.style.display = 'none';
                            this.toast.info('تم إلغاء مشاهدة الإعلان');
                        });
                    };
                    modal.classList.remove('hidden');
                    modal.style.display = 'flex';
                    updateContent();
                    modal.addEventListener('click', (e) => { if (e.target === modal) { modal.classList.add('hidden'); modal.style.display = 'none'; } });
                }

                async completeAdView(ad) {
                    if (this.data.hasUserViewedAd(ad.id)) return;
                    this.data.markAdViewed(ad.id);
                    await this.data.addBalance(ad.reward, `مشاهدة إعلان: ${ad.title}`);
                    this.toast.success(`🎉 تمت إضافة ${ad.reward} ر.س إلى رصيدك`);
                    this.updateBalanceDisplay();
                    this.data.addNotification('تم إضافة رصيد', `حصلت على ${ad.reward} ر.س من مشاهدة إعلان`, 'success');
                }
            }

            // ======================== تهيئة التطبيق ========================
            class App {
                constructor() {
                    this.telegram = new TelegramService();
                    this.toast = new ToastManager('toastContainer');
                    this.init();
                }

                async init() {
                    if (!this.telegram.isAvailable) {
                        const state = new AppState(null);
                        state.telegramMissing = true;
                        state.loading = false;
                        this.ui = new UIManager(state, null, this.telegram, this.toast);
                        this.ui.render();
                        return;
                    }
                    this.telegram.init();
                    if (!this.telegram.isValid() || !this.telegram.getUser()) {
                        const state = new AppState(null);
                        state.accessDenied = true;
                        state.loading = false;
                        this.ui = new UIManager(state, null, this.telegram, this.toast);
                        this.ui.render();
                        return;
                    }
                    const user = this.telegram.getUser();
                    const state = new AppState(user.id);
                    state.user = user;
                    state.isAdmin = (user.id === CONFIG.ADMIN_ID);
                    this.data = new DataService(state);
                    this.ui = new UIManager(state, this.data, this.telegram, this.toast);
                    
                    const startParam = this.telegram.tg?.initDataUnsafe?.start_param;
                    if (startParam && !state.referrals.referredBy) await this.data.setReferredBy(startParam);
                    await this.data.registerUser(user.id, state.referrals.referredBy);
                    
                    const savedTheme = this.data.loadTheme();
                    this.applyTheme(savedTheme);
                    
                    state.loading = false;
                    this.ui.render();
                    this.toast.success(`مرحباً ${user.first_name}، أهلاً بك في المحفظة المتطورة`);
                }

                applyTheme(theme) {
                    const root = document.documentElement;
                    const icon = document.getElementById('themeIcon');
                    if (theme === 'light') {
                        root.style.setProperty('--tg-theme-bg-color', '#f8fafc');
                        root.style.setProperty('--tg-theme-text-color', '#0f172a');
                        if (icon) icon.className = 'fa-solid fa-sun';
                    } else {
                        root.style.setProperty('--tg-theme-bg-color', '#0a0c15');
                        root.style.setProperty('--tg-theme-text-color', '#ffffff');
                        if (icon) icon.className = 'fa-solid fa-moon';
                    }
                }
            }

            const app = new App();
            
            // أحداث الواجهة
            document.getElementById('themeToggle').addEventListener('click', () => {
                if (app.ui && app.ui.data) {
                    const newTheme = app.ui.state.theme === 'dark' ? 'light' : 'dark';
                    app.ui.state.theme = newTheme;
                    app.ui.data.saveTheme(newTheme);
                    app.applyTheme(newTheme);
                    app.toast.info(`تم تغيير السمة إلى ${newTheme === 'dark' ? 'الداكنة' : 'الفاتحة'}`);
                }
            });
            
            const settingsOverlay = document.getElementById('settingsOverlay');
            const settingsPanel = document.getElementById('settingsPanel');
            document.getElementById('settingsBtn').addEventListener('click', () => {
                settingsOverlay.classList.remove('hidden');
                settingsPanel.style.transform = 'translateY(0)';
            });
            document.getElementById('closeSettings').addEventListener('click', () => {
                settingsOverlay.classList.add('hidden');
                settingsPanel.style.transform = 'translateY(100%)';
            });
            settingsOverlay.addEventListener('click', (e) => {
                if (e.target === settingsOverlay) {
                    settingsOverlay.classList.add('hidden');
                    settingsPanel.style.transform = 'translateY(100%)';
                }
            });
            
            document.getElementById('languageSelect').addEventListener('change', (e) => {
                if (app.ui && app.ui.data) {
                    app.ui.state.settings.language = e.target.value;
                    app.ui.data.saveSettings();
                    app.toast.success(`تم تغيير اللغة إلى ${e.target.value === 'ar' ? 'العربية' : 'الإنجليزية'}`);
                }
            });
            document.getElementById('notificationsToggle').addEventListener('change', (e) => {
                if (app.ui && app.ui.data) {
                    app.ui.state.settings.notifications = e.target.checked;
                    app.ui.data.saveSettings();
                }
            });
            document.getElementById('soundToggle').addEventListener('change', (e) => {
                if (app.ui && app.ui.data) {
                    app.ui.state.settings.sound = e.target.checked;
                    app.ui.data.saveSettings();
                    app.toast.soundEnabled = e.target.checked;
                }
            });
            document.getElementById('vibrateToggle').addEventListener('change', (e) => {
                if (app.ui && app.ui.data) {
                    app.ui.state.settings.vibrate = e.target.checked;
                    app.ui.data.saveSettings();
                    app.toast.vibrateEnabled = e.target.checked;
                }
            });
        })();
    </script>
</body>
</html>
