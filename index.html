                    this.isAdsModalOpen = false;
                    this.activeCountdown = null;

                    this.state.addEventListener('balanceUpdated', () => this.updateBalanceDisplay());
                    this.state.addEventListener('statsUpdated', () => this.updateStatsDisplay());
                    window.addEventListener('newWithdrawalRequest', (e) => this.handleNewRequest(e.detail));
                    window.addEventListener('newNotification', (e) => this.handleNewNotification(e.detail));
                }

                handleNewRequest(request) {
                    if (this.state.isAdmin) {
                        this.toast.success(`🔔 طلب سحب جديد\nالمستخدم: ${request.userName}\nالمبلغ: ${request.amount}\nالطريقة: ${request.method}\nالتفاصيل: ${request.details}\nالرجاء مراجعة الطلب في لوحة الإدارة`);
                        this.updatePendingBadge();
                    }
                }

                handleNewNotification(notification) {
                    this.updateNotificationBadge();
                    if (!this.state.isAdmin) this.render();
                }

                updatePendingBadge() {
                    const walletIcon = document.getElementById('walletIconLarge');
                    if (!walletIcon) return;
                    const count = this.data.getPendingRequestsCount();
                    let badge = walletIcon.querySelector('.notification-badge');
                    if (count > 0) {
                        if (!badge) {
                            badge = document.createElement('span');
                            badge.className = 'notification-badge';
                            walletIcon.style.position = 'relative';
                            walletIcon.appendChild(badge);
                        }
                        badge.textContent = count > 9 ? '9+' : count;
                    } else {
                        if (badge) badge.remove();
                    }
                    document.title = count > 0 ? `(${count}) محفظة تيليجرام` : 'محفظة تيليجرام المتطورة';
                }

                updateNotificationBadge() {
                    const bell = document.getElementById('notificationBell');
                    if (!bell) return;
                    const unreadCount = this.data.getUnreadCount();
                    let badge = bell.querySelector('.notification-badge');
                    if (unreadCount > 0) {
                        if (!badge) {
                            badge = document.createElement('span');
                            badge.className = 'notification-badge';
                            bell.style.position = 'relative';
                            bell.appendChild(badge);
                        }
                        badge.textContent = unreadCount > 9 ? '9+' : unreadCount;
                    } else {
                        if (badge) badge.remove();
                    }
                }

                render() {
                    if (this.state.telegramMissing) {
                        this.appContainer.innerHTML = this.renderTelegramMissing();
                    } else if (this.state.loading) {
                        this.appContainer.innerHTML = this.renderLoading();
                    } else if (this.state.accessDenied) {
                        this.appContainer.innerHTML = this.renderAccessDenied();
                    } else if (this.state.isAdmin) {
                        this.appContainer.innerHTML = this.renderAdminDashboard();
                    } else {
                        this.appContainer.innerHTML = this.renderUserDashboard();
                    }
                    this.bindEvents();
                    this.updatePendingBadge();
                    this.updateNotificationBadge();
                }

                renderLoading() { return `<div class="flex flex-col items-center justify-center text-center space-y-6 animate-enter"><div class="spinner"></div><div><h2 class="text-xl font-bold mb-1">جاري التحقق...</h2><p class="text-sm text-gray-400">نحن نتأكد من هويتك عبر تيليجرام</p></div></div>`; }
                renderAccessDenied() { return `<div class="glass-card p-8 rounded-3xl shadow-2xl text-center max-w-md w-full animate-enter border-red-500/20"><div class="w-20 h-20 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl"><i class="fa-solid fa-shield-halved"></i></div><h2 class="text-2xl font-bold mb-2">دخول محظور</h2><p class="text-gray-400 mb-8">يجب فتح هذا التطبيق من خلال بوت تيليجرام الرسمي.</p><a href="https://telegram.org" target="_blank" class="block w-full py-3.5 rounded-xl font-bold text-white bg-gradient-to-r from-blue-600 to-blue-500"><i class="fa-brands fa-telegram ml-2"></i> فتح تيليجرام</a></div>`; }
                renderTelegramMissing() { return `<div class="glass-card p-8 rounded-3xl shadow-2xl text-center max-w-md w-full animate-enter"><div class="w-20 h-20 bg-orange-500/10 text-orange-500 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl"><i class="fa-solid fa-exclamation-triangle"></i></div><h2 class="text-2xl font-bold mb-2">بيئة غير مدعومة</h2><p class="text-gray-400 mb-8">يرجى فتح هذا الرابط من داخل تطبيق تيليجرام.</p><a href="https://t.me/your_bot_username" target="_blank" class="block w-full py-3.5 rounded-xl font-bold text-white bg-gradient-to-r from-orange-600 to-orange-500"><i class="fa-brands fa-telegram ml-2"></i> فتح البوت</a></div>`; }

                renderUserDashboard() {
                    const user = this.state.user;
                    const fullName = `${user.first_name} ${user.last_name || ''}`.trim();
                    const initials = (user.first_name.charAt(0) + (user.last_name ? user.last_name.charAt(0) : '')).toUpperCase();
                    const dailyBonusAvailable = !this.state.dailyBonus.claimed;
                    const referralLink = `https://t.me/your_bot?start=${this.state.referrals.code}`;
                    return `
                        <div class="space-y-5 animate-enter pb-10">
                            <div class="glass-card p-5 rounded-3xl relative overflow-hidden">
                                <div class="flex items-center gap-4">
                                    <div class="w-16 h-16 rounded-2xl border border-white/10 overflow-hidden bg-slate-800 shadow-lg flex-shrink-0">${user.photo_url ? `<img src="${user.photo_url}" class="w-full h-full object-cover">` : `<div class="w-full h-full default-avatar"><span>${initials}</span></div>`}</div>
                                    <div class="flex-1 min-w-0">
                                        <div class="flex items-center justify-between"><h2 class="text-lg font-bold truncate">${fullName}</h2>${this.renderNotificationBell()}</div>
                                        <p class="text-xs text-gray-400 font-mono mt-0.5">ID: ${user.id}</p>
                                        <div class="inline-flex items-center gap-1.5 mt-2 px-2 py-0.5 rounded-md bg-green-500/10 border border-green-500/20"><span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span><span class="text-[10px] font-bold text-green-400">نشط الآن</span></div>
                                    </div>
                                </div>
                            </div>
                            <div class="flex justify-center my-4"><div class="wallet-icon-large" id="walletIconLarge"><i class="fa-solid fa-wallet"></i></div></div>
                            <div class="flex justify-center"><div class="balance-badge" id="balanceBadge"><i class="fa-solid fa-coins"></i><span>${this.state.balance.toLocaleString('ar-EG')}</span></div></div>
                            <div class="grid grid-cols-2 gap-4 mt-4">
                                <button id="earnBtn" class="glass-card p-4 rounded-2xl text-center hover:bg-blue-500/10 transition-all"><div class="w-10 h-10 rounded-full bg-green-500/10 text-green-400 flex items-center justify-center mx-auto mb-2"><i class="fa-solid fa-dollar-sign"></i></div><span class="text-gray-400 text-xs">كسب المال</span><span class="text-white font-bold text-lg">إعلانات</span></button>
                                <button id="dailyBonusBtn" class="glass-card p-4 rounded-2xl text-center hover:bg-yellow-500/10 transition-all ${dailyBonusAvailable ? 'border-yellow-500/50' : 'opacity-60'}" ${!dailyBonusAvailable ? 'disabled' : ''}><div class="w-10 h-10 rounded-full bg-yellow-500/10 text-yellow-400 flex items-center justify-center mx-auto mb-2"><i class="fa-solid fa-gift"></i></div><span class="text-gray-400 text-xs">المكافأة اليومية</span><span class="text-white font-bold text-lg">${CONFIG.DAILY_BONUS_AMOUNT} ر.س</span></button>
                            </div>
                            <div class="glass-card p-4 rounded-2xl text-center mt-2">
                                <div class="flex justify-between items-center mb-2"><span class="text-gray-400 text-sm">كود الإحالة</span><i class="fa-regular fa-copy cursor-pointer" id="copyReferralCode" data-code="${this.state.referrals.code}"></i></div>
                                <div class="font-mono text-sm bg-black/20 p-2 rounded-lg">${this.state.referrals.code}</div>
                                <div class="flex justify-between mt-2 text-xs"><span>المُحالين: ${this.state.referrals.count}</span><span>أرباح الإحالة: ${this.state.referrals.totalEarned.toLocaleString()} ر.س</span></div>
                                <div class="mt-2"><input type="text" id="referralInput" placeholder="كود المُحيل" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-sm"><button id="applyReferralBtn" class="mt-2 bg-blue-600 px-4 py-1 rounded-lg text-sm w-full">تطبيق</button></div>
                            </div>
                            <button id="logoutBtn" class="w-full py-4 rounded-xl font-bold text-red-400 hover:bg-red-500/10 transition-all flex items-center justify-center gap-2"><i class="fa-solid fa-arrow-right-from-bracket"></i> تسجيل الخروج</button>
                        </div>
                    `;
                }

                renderAdminDashboard() {
                    const user = this.state.user;
                    const fullName = `${user.first_name} ${user.last_name || ''}`.trim();
                    const initials = (user.first_name.charAt(0) + (user.last_name ? user.last_name.charAt(0) : '')).toUpperCase();
                    const stats = this.state.stats;
                    const pendingCount = this.data.getPendingRequestsCount();
                    return `
                        <div class="space-y-5 animate-enter pb-10">
                            <div class="glass-card p-5 rounded-3xl border-2 border-yellow-500/30">
                                <div class="flex items-center gap-4">
                                    <div class="w-16 h-16 rounded-2xl border border-white/10 overflow-hidden bg-slate-800">${user.photo_url ? `<img src="${user.photo_url}" class="w-full h-full object-cover">` : `<div class="w-full h-full default-avatar"><span>${initials}</span></div>`}</div>
                                    <div class="flex-1"><div class="flex justify-between"><h2 class="text-lg font-bold">${fullName}</h2>${this.renderNotificationBell()}</div><p class="text-xs text-gray-400">ID: ${user.id}</p><div class="inline-flex mt-2 px-2 py-0.5 rounded-md bg-yellow-500/20"><i class="fa-solid fa-crown text-yellow-400 text-[10px] ml-1"></i><span class="text-[10px] font-bold text-yellow-300">مدير النظام</span></div></div>
                                </div>
                            </div>
                            <div class="flex justify-center my-4"><div class="wallet-icon-large" id="walletIconLarge"><i class="fa-solid fa-wallet"></i>${pendingCount > 0 ? `<span class="notification-badge">${pendingCount > 9 ? '9+' : pendingCount}</span>` : ''}</div></div>
                            <div class="flex justify-center"><div class="balance-badge" id="balanceBadge"><i class="fa-solid fa-coins"></i><span>${this.state.balance.toLocaleString('ar-EG')}</span></div></div>
                            <div class="grid grid-cols-3 gap-2"><div class="glass-card p-3 text-center"><div class="w-8 h-8 rounded-full bg-blue-500/10 text-blue-400 mx-auto mb-1"><i class="fa-solid fa-users text-sm"></i></div><span class="text-gray-400 text-[10px]">المستخدمين</span><span class="text-white font-bold text-base" id="statsUsers">${stats.users}</span></div><div class="glass-card p-3 text-center"><div class="w-8 h-8 rounded-full bg-green-500/10 text-green-400 mx-auto mb-1"><i class="fa-solid fa-robot text-sm"></i></div><span class="text-gray-400 text-[10px]">البوتات</span><span class="text-white font-bold text-base" id="statsBots">${stats.bots}</span></div><div class="glass-card p-3 text-center"><div class="w-8 h-8 rounded-full bg-purple-500/10 text-purple-400 mx-auto mb-1"><i class="fa-solid fa-chart-line text-sm"></i></div><span class="text-gray-400 text-[10px]">عمليات اليوم</span><span class="text-white font-bold text-base" id="statsDailyOps">${stats.dailyOps}</span></div></div>
                            <button id="openAdminPanelBtn" class="w-full py-4 rounded-xl font-bold text-white bg-gradient-to-r from-yellow-600 to-yellow-500 flex items-center justify-center gap-2"><i class="fa-solid fa-gears"></i> لوحة الإدارة (طلبات السحب) ${pendingCount > 0 ? `<span class="bg-red-500 text-white text-xs px-2 py-1 rounded-full mr-2">${pendingCount}</span>` : ''}</button>
                            <button id="earnBtn" class="w-full py-4 rounded-xl font-bold text-white bg-gradient-to-r from-green-600 to-green-500 flex items-center justify-center gap-2"><i class="fa-solid fa-dollar-sign"></i> كسب المال (إعلانات)</button>
                            <button id="logoutBtn" class="w-full py-4 rounded-xl font-bold text-red-400 hover:bg-red-500/10 transition-all"><i class="fa-solid fa-arrow-right-from-bracket"></i> تسجيل الخروج</button>
                        </div>
                    `;
                }

                renderNotificationBell() {
                    const unreadCount = this.data.getUnreadCount();
                    return `<div class="relative cursor-pointer" id="notificationBell"><i class="fa-regular fa-bell text-xl"></i>${unreadCount > 0 ? `<span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] rounded-full w-4 h-4 flex items-center justify-center">${unreadCount > 9 ? '9+' : unreadCount}</span>` : ''}</div>`;
                }

                updateBalanceDisplay() { const span = document.querySelector('#balanceBadge span'); if(span) span.textContent = this.state.balance.toLocaleString('ar-EG'); }
                updateStatsDisplay() { const s = this.state.stats; if(document.getElementById('statsUsers')) document.getElementById('statsUsers').textContent = s.users; if(document.getElementById('statsBots')) document.getElementById('statsBots').textContent = s.bots; if(document.getElementById('statsDailyOps')) document.getElementById('statsDailyOps').textContent = s.dailyOps; }

                bindEvents() {
                    document.getElementById('logoutBtn')?.addEventListener('click', () => { this.tg.close(); this.toast.info('تم تسجيل الخروج'); });
                    document.getElementById('walletIconLarge')?.addEventListener('click', () => this.openWalletModal());
                    document.getElementById('openAdminPanelBtn')?.addEventListener('click', () => this.openAdminPanel());
                    document.getElementById('notificationBell')?.addEventListener('click', () => this.openNotificationsModal());
                    document.getElementById('earnBtn')?.addEventListener('click', () => this.openAdsModal());
                    document.getElementById('dailyBonusBtn')?.addEventListener('click', async () => {
                        const claimed = await this.data.claimDailyBonus();
                        if(claimed) {
                            this.toast.success(`🎉 تم الحصول على ${CONFIG.DAILY_BONUS_AMOUNT} ر.س مكافأة يومية!`);
                            this.render();
                        } else {
                            this.toast.info('لقد حصلت على المكافأة اليومية بالفعل');
                        }
                    });
                    document.getElementById('copyReferralCode')?.addEventListener('click', () => {
                        const code = document.getElementById('copyReferralCode').dataset.code;
                        navigator.clipboard.writeText(code);
                        this.toast.success('تم نسخ كود الإحالة');
                    });
                    document.getElementById('applyReferralBtn')?.addEventListener('click', async () => {
                        const input = document.getElementById('referralInput').value.trim();
                        if(input && !this.state.referrals.referredBy) {
                            await this.data.setReferredBy(input);
                            this.toast.success('تم تطبيق كود الإحالة');
                            this.render();
                        } else {
                            this.toast.warning('لا يمكن تطبيق الكود');
                        }
                    });
                }

                openWalletModal() {
                    this.isWalletModalOpen = true;
                    const modal = document.getElementById('walletModalOverlay');
                    document.getElementById('walletModalContent').innerHTML = this.renderWalletModal();
                    modal.classList.add('open');
                    this.bindWalletModalEvents();
                }

                closeWalletModal() { this.isWalletModalOpen = false; document.getElementById('walletModalOverlay').classList.remove('open'); }

                renderWalletModal() {
                    const transactions = this.state.wallet.transactions;
                    const paymentMethods = this.state.paymentMethods;
                    const withdrawMethodsHtml = paymentMethods.map(m => `<div class="payment-method" data-method-id="${m.id}"><div class="payment-icon"><i class="${m.icon}"></i></div><div class="flex-1"><div class="font-bold">${m.name}</div><div class="text-xs text-gray-400">${m.description || ''}</div></div></div>`).join('');
                    const transactionsHtml = transactions.length === 0 ? '<p class="text-center text-gray-400 py-4">لا توجد معاملات بعد</p>' : transactions.map(tx => `<div class="transaction-item"><div><div class="font-medium">${tx.note || tx.type}</div><div class="text-xs text-gray-400">${DateUtils.formatDateTime(tx.date)}</div></div><div class="transaction-amount ${tx.amount > 0 ? 'positive' : 'negative'} font-bold">${tx.amount > 0 ? '+' : ''}${tx.amount.toLocaleString('ar-EG')}</div></div>`).join('');
                    return `
                        <div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold">محفظتي</h2><button id="closeWalletModal" class="w-8 h-8 rounded-full bg-white/10"><i class="fa-solid fa-times"></i></button></div>
                        <div class="glass-card p-6 rounded-2xl text-center mb-4"><div class="text-gray-400 text-sm mb-1">الرصيد الحالي</div><div class="text-3xl font-bold">${this.state.balance.toLocaleString('ar-EG')}</div></div>
                        <div class="wallet-tabs"><button class="wallet-tab active" data-tab="withdraw"><i class="fa-solid fa-arrow-up"></i> سحب</button><button class="wallet-tab" data-tab="transfer"><i class="fa-solid fa-exchange-alt"></i> تحويل</button><button class="wallet-tab" data-tab="history"><i class="fa-solid fa-history"></i> السجل</button></div>
                        <div id="walletTabContent">
                            <div class="tab-pane active" id="tab-withdraw"><p class="text-sm text-gray-300 mb-3">اختر طريقة السحب:</p><div class="payment-methods-list mb-4" id="withdrawMethodsList">${withdrawMethodsHtml}</div><div id="withdrawDetailsContainer"><input type="text" id="withdrawDetails" placeholder="أدخل التفاصيل" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 mb-2 text-white"></div><div class="flex gap-2"><input type="number" id="withdrawAmount" placeholder="المبلغ" class="flex-1 bg-slate-800 border border-white/10 rounded-lg p-2 text-white"><button id="withdrawBtn" class="bg-red-600 px-4 rounded-lg font-bold">طلب سحب</button></div><p class="text-xs text-gray-400 mt-2">سيتم مراجعة طلب السحب من قبل الإدارة.</p></div>
                            <div class="tab-pane hidden" id="tab-transfer"><p class="text-sm text-gray-300 mb-2">تحويل إلى مستخدم آخر:</p><input type="text" id="transferUserId" placeholder="معرف المستخدم" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 mb-2"><div class="flex gap-2"><input type="number" id="transferAmount" placeholder="المبلغ" class="flex-1 bg-slate-800 border border-white/10 rounded-lg p-2"><button id="transferBtn" class="bg-green-600 px-4 rounded-lg font-bold">تحويل</button></div></div>
                            <div class="tab-pane hidden" id="tab-history"><div class="max-h-64 overflow-y-auto">${transactionsHtml}</div></div>
                        </div>
                    `;
                }

                bindWalletModalEvents() {
                    const modal = document.getElementById('walletModalOverlay');
                    document.getElementById('closeWalletModal').addEventListener('click', () => this.closeWalletModal());
                    modal.addEventListener('click', (e) => { if(e.target === modal) this.closeWalletModal(); });
                    document.querySelectorAll('.wallet-tab').forEach(tab => {
                        tab.addEventListener('click', () => {
                            document.querySelectorAll('.wallet-tab').forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');
                            const tabId = tab.dataset.tab;
                            document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));
                            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
                        });
                    });
                    const withdrawMethods = document.querySelectorAll('#withdrawMethodsList .payment-method');
                    let selectedMethod = null;
                    withdrawMethods.forEach(m => {
                        m.addEventListener('click', () => {
                            withdrawMethods.forEach(m2 => m2.classList.remove('selected'));
                            m.classList.add('selected');
                            selectedMethod = m.dataset.methodId;
                            const method = this.state.paymentMethods.find(p => p.id === selectedMethod);
                            const detailsInput = document.getElementById('withdrawDetails');
                            if(method) detailsInput.placeholder = method.withdrawDetails || 'أدخل التفاصيل';
                        });
                    });
                    document.getElementById('withdrawBtn')?.addEventListener('click', async () => {
                        const amount = parseFloat(document.getElementById('withdrawAmount').value);
                        const details = document.getElementById('withdrawDetails').value.trim();
                        if(isNaN(amount) || amount <= 0) { this.toast.error('أدخل مبلغ صحيح'); return; }
                        if(!selectedMethod) { this.toast.error('اختر طريقة سحب أولاً'); return; }
                        if(!details) { this.toast.error('أدخل التفاصيل المطلوبة'); return; }
                        const result = await this.data.addWithdrawalRequest(amount, selectedMethod, details, this.state.user);
                        if(result.success) {
                            this.toast.success(`✅ تم تقديم طلب السحب بنجاح\nالمبلغ: ${amount}\nالطريقة: ${result.request.method}\nالتفاصيل: ${details}\nسيتم خصم المبلغ بعد الموافقة.`);
                            document.getElementById('withdrawAmount').value = '';
                            document.getElementById('withdrawDetails').value = '';
                            withdrawMethods.forEach(m => m.classList.remove('selected'));
                            selectedMethod = null;
                        } else this.toast.error(result.message);
                    });
                    document.getElementById('transferBtn')?.addEventListener('click', async () => {
                        const amount = parseFloat(document.getElementById('transferAmount').value);
                        const targetId = document.getElementById('transferUserId').value.trim();
                        if(isNaN(amount) || amount <= 0) { this.toast.error('أدخل مبلغ صحيح'); return; }
                        if(!targetId) { this.toast.error('أدخل معرف المستخدم'); return; }
                        if(amount > this.state.balance) { this.toast.error('الرصيد غير كافٍ'); return; }
                        this.state.balance -= amount;
                        this.state.addTransaction({ id: IdGenerator.generate('tx_'), type: 'transfer', amount: -amount, note: `تحويل إلى المستخدم ${targetId}`, status: 'مكتمل', date: new Date().toISOString() });
                        await this.data.saveWallet();
                        this.toast.success('تم التحويل بنجاح');
                        document.getElementById('transferAmount').value = '';
                        document.getElementById('transferUserId').value = '';
                        this.updateBalanceDisplay();
                        this.openWalletModal();
                    });
                }

                openAdminPanel() {
                    this.isAdminPanelOpen = true;
                    const modal = document.getElementById('adminPanelOverlay');
                    document.getElementById('adminPanelContent').innerHTML = this.renderAdminPanel();
                    modal.classList.add('open');
                    this.bindAdminPanelEvents();
                }

                closeAdminPanel() { this.isAdminPanelOpen = false; document.getElementById('adminPanelOverlay').classList.remove('open'); }

                renderAdminPanel() {
                    const pending = this.data.getPendingWithdrawals();
                    const withdrawalsHtml = pending.length === 0 ? '<p class="text-gray-400 text-center py-2">لا توجد طلبات سحب معلقة</p>' : pending.map(req => `<div class="request-item" data-id="${req.id}" data-type="withdrawal"><div class="request-header"><span class="font-bold">${req.userName}</span><span class="badge-pending">قيد الانتظار</span></div><div class="text-sm">المبلغ: <span class="text-red-400">${req.amount.toLocaleString('ar-EG')}</span></div><div class="text-xs text-gray-400">الطريقة: ${req.method}</div><div class="text-xs text-gray-400">التفاصيل: ${req.details || 'غير محدد'}</div><div class="text-xs text-gray-400">التاريخ: ${DateUtils.formatDateTime(req.date)}</div><div class="request-actions"><button class="btn-accept accept-request" data-id="${req.id}">قبول</button><button class="btn-reject reject-request" data-id="${req.id}">رفض</button></div></div>`).join('');
                    const paymentMethodsHtml = this.state.paymentMethods.map(m => `<div class="payment-method-admin"><div class="flex items-center gap-3"><div class="payment-icon"><i class="${m.icon}"></i></div><div><div class="font-bold">${m.name}</div><div class="text-xs text-gray-400">${m.description || ''}</div></div></div><div class="actions"><button class="edit-payment-method" data-id="${m.id}" title="تعديل"><i class="fa-solid fa-pen-to-square"></i></button><button class="delete-payment-method" data-id="${m.id}" title="حذف"><i class="fa-solid fa-trash"></i></button></div></div>`).join('');
                    const ads = this.state.ads;
                    const adsHtml = ads.length === 0 ? '<p class="text-gray-400 text-center py-2">لا توجد إعلانات مضافة</p>' : ads.map(ad => `<div class="payment-method-admin"><div class="flex items-center gap-3">${ad.imageUrl ? `<img src="${ad.imageUrl}" class="w-10 h-10 rounded-lg object-cover">` : '<div class="w-10 h-10 rounded-lg bg-gray-700 flex items-center justify-center"><i class="fa-solid fa-image"></i></div>'}<div><div class="font-bold">${ad.title}</div><div class="text-xs text-gray-400">${ad.reward} ر.س | ${ad.duration} ث</div><div class="text-xs truncate max-w-[150px]">${ad.link}</div></div></div><div class="actions"><button class="edit-ad" data-id="${ad.id}" title="تعديل"><i class="fa-solid fa-pen-to-square"></i></button><button class="delete-ad" data-id="${ad.id}" title="حذف"><i class="fa-solid fa-trash"></i></button></div></div>`).join('');
                    const users = this.data.getAllUsersData();
                    const usersHtml = users.map(u => `<div class="user-card"><div class="flex justify-between"><div><span class="font-mono text-sm">${u.id}</span><div class="text-xs">الرصيد: ${u.balance.toLocaleString()} ر.س</div><div class="text-xs">المُحالين: ${u.referrals} | أرباح إحالة: ${u.referralEarned.toLocaleString()}</div></div><div class="flex gap-1"><button class="add-balance text-green-400" data-id="${u.id}"><i class="fa-solid fa-plus-circle"></i></button><button class="toggle-block ${u.blocked ? 'text-red-400' : 'text-yellow-400'}" data-id="${u.id}"><i class="fa-solid ${u.blocked ? 'fa-lock' : 'fa-unlock-alt'}"></i></button></div></div></div>`).join('');
                    return `
                        <div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold">لوحة الإدارة</h2><button id="closeAdminPanel" class="w-8 h-8 rounded-full bg-white/10"><i class="fa-solid fa-times"></i></button></div>
                        <div class="wallet-tabs"><button class="wallet-tab active" data-admin-tab="requests">طلبات السحب</button><button class="wallet-tab" data-admin-tab="payment-methods">طرق الدفع</button><button class="wallet-tab" data-admin-tab="ads">الإعلانات</button><button class="wallet-tab" data-admin-tab="users">المستخدمين</button></div>
                        <div id="adminRequestsTab" class="admin-tab-content"><div><h3 class="text-lg font-bold mb-2">طلبات السحب المعلقة <span class="bg-blue-600 text-white text-xs px-2 py-1 rounded-full">${pending.length}</span></h3><div class="admin-requests-panel">${withdrawalsHtml}</div></div></div>
                        <div id="adminPaymentMethodsTab" class="admin-tab-content hidden"><div class="flex justify-between items-center mb-3"><h3 class="text-lg font-bold">طرق الدفع المتاحة</h3><button id="addPaymentMethodBtn" class="bg-blue-600 px-3 py-1 rounded-lg text-sm"><i class="fa-solid fa-plus"></i> إضافة</button></div><div class="space-y-2">${paymentMethodsHtml}</div></div>
                        <div id="adminAdsTab" class="admin-tab-content hidden"><div class="flex justify-between items-center mb-3"><h3 class="text-lg font-bold">الإعلانات المتاحة</h3><button id="addAdBtn" class="bg-blue-600 px-3 py-1 rounded-lg text-sm"><i class="fa-solid fa-plus"></i> إضافة إعلان</button></div><div class="space-y-2">${adsHtml}</div></div>
                        <div id="adminUsersTab" class="admin-tab-content hidden"><div class="flex justify-between items-center mb-3"><h3 class="text-lg font-bold">إدارة المستخدمين</h3><button id="refreshUsersBtn" class="bg-blue-600 px-3 py-1 rounded-lg text-sm"><i class="fa-solid fa-sync"></i> تحديث</button></div><div class="max-h-96 overflow-y-auto">${usersHtml}</div></div>
                    `;
                }

                bindAdminPanelEvents() {
                    const modal = document.getElementById('adminPanelOverlay');
                    document.getElementById('closeAdminPanel').addEventListener('click', () => this.closeAdminPanel());
                    modal.addEventListener('click', (e) => { if(e.target === modal) this.closeAdminPanel(); });
                    document.querySelectorAll('[data-admin-tab]').forEach(tab => {
                        tab.addEventListener('click', () => {
                            document.querySelectorAll('[data-admin-tab]').forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');
                            const tabName = tab.dataset.adminTab;
                            document.getElementById('adminRequestsTab').classList.toggle('hidden', tabName !== 'requests');
                            document.getElementById('adminPaymentMethodsTab').classList.toggle('hidden', tabName !== 'payment-methods');
                            document.getElementById('adminAdsTab').classList.toggle('hidden', tabName !== 'ads');
                            document.getElementById('adminUsersTab').classList.toggle('hidden', tabName !== 'users');
                        });
                    });
                    document.querySelectorAll('.accept-request').forEach(btn => {
                        btn.addEventListener('click', async () => {
                            const id = btn.dataset.id;
                            const req = this.state.withdrawalRequests.find(r => r.id === id);
                            if(req && await this.data.acceptWithdrawal(req)) {
                                this.toast.success(`✅ تم قبول طلب السحب\nالمستخدم: ${req.userName}\nالمبلغ: ${req.amount}`);
                                this.openAdminPanel();
                            } else this.toast.error('حدث خطأ');
                        });
                    });
                    document.querySelectorAll('.reject-request').forEach(btn => {
                        btn.addEventListener('click', async () => {
                            const id = btn.dataset.id;
                            const req = this.state.withdrawalRequests.find(r => r.id === id);
                            if(req && await this.data.rejectWithdrawal(req)) {
                                this.toast.info(`❌ تم رفض طلب السحب\nالمستخدم: ${req.userName}\nالمبلغ: ${req.amount}`);
                                this.openAdminPanel();
                            }
                        });
                    });
                    document.getElementById('addPaymentMethodBtn')?.addEventListener('click', () => this.openPaymentMethodModal());
                    document.querySelectorAll('.edit-payment-method').forEach(btn => btn.addEventListener('click', () => this.openPaymentMethodModal(btn.dataset.id)));
                    document.querySelectorAll('.delete-payment-method').forEach(btn => btn.addEventListener('click', () => { if(confirm('حذف طريقة الدفع؟')) { this.data.deletePaymentMethod(btn.dataset.id); this.toast.success('تم الحذف'); this.openAdminPanel(); } }));
                    document.getElementById('addAdBtn')?.addEventListener('click', () => this.openAdFormModal());
                    document.querySelectorAll('.edit-ad').forEach(btn => btn.addEventListener('click', () => this.openAdFormModal(btn.dataset.id)));
                    document.querySelectorAll('.delete-ad').forEach(btn => btn.addEventListener('click', () => { if(confirm('حذف الإعلان نهائياً؟')) { this.data.deleteAd(btn.dataset.id); this.toast.success('تم الحذف'); this.openAdminPanel(); } }));
                    document.getElementById('refreshUsersBtn')?.addEventListener('click', () => this.openAdminPanel());
                    document.querySelectorAll('.add-balance').forEach(btn => {
                        btn.addEventListener('click', async () => {
                            const userId = btn.dataset.id;
                            const amount = prompt('أدخل المبلغ (ر.س):');
                            if(amount && !isNaN(parseFloat(amount))) {
                                await this.data.addBalanceToUser(userId, parseFloat(amount), 'إضافة رصيد من قبل المدير');
                                this.toast.success(`تمت إضافة ${amount} ر.س للمستخدم ${userId}`);
                                this.openAdminPanel();
                            }
                        });
                    });
                    document.querySelectorAll('.toggle-block').forEach(btn => {
                        btn.addEventListener('click', async () => {
                            const userId = btn.dataset.id;
                            const newState = await this.data.toggleBlockUser(userId);
                            this.toast.info(`المستخدم ${userId} ${newState ? 'محظور' : 'تم إلغاء حظره'}`);
                            this.openAdminPanel();
                        });
                    });
                }

                openAdFormModal(adId = null) {
                    const ad = adId ? this.state.ads.find(a => a.id === adId) : null;
                    const modal = document.getElementById('paymentMethodModalOverlay');
                    document.getElementById('paymentMethodModalContent').innerHTML = `
                        <div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold">${ad ? 'تعديل إعلان' : 'إضافة إعلان جديد'}</h2><button id="closeAdForm" class="w-8 h-8 rounded-full bg-white/10"><i class="fa-solid fa-times"></i></button></div>
                        <form id="adForm" class="space-y-3"><input type="hidden" id="adId" value="${ad?.id || ''}"><div><label class="text-sm text-gray-400">العنوان</label><input type="text" id="adTitle" required value="${ad?.title || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2"></div><div><label class="text-sm text-gray-400">الوصف</label><textarea id="adDescription" rows="2" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2">${ad?.description || ''}</textarea></div><div><label class="text-sm text-gray-400">رابط الصورة (URL)</label><input type="url" id="adImageUrl" value="${ad?.imageUrl || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2"></div><div><label class="text-sm text-gray-400">رابط الإعلان</label><input type="url" id="adLink" required value="${ad?.link || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2"></div><div><label class="text-sm text-gray-400">المكافأة (ر.س)</label><input type="number" id="adReward" required value="${ad?.reward || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2"></div><div><label class="text-sm text-gray-400">مدة المشاهدة (ثانية)</label><input type="number" id="adDuration" required value="${ad?.duration || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2"></div><div class="flex gap-2 pt-2"><button type="submit" class="flex-1 bg-blue-600 py-2 rounded-lg font-bold">حفظ</button><button type="button" id="cancelAdForm" class="flex-1 bg-gray-600 py-2 rounded-lg font-bold">إلغاء</button></div></form>
                    `;
                    modal.classList.add('open');
                    this.bindAdFormEvents(modal);
                }

                bindAdFormEvents(modal) {
                    document.getElementById('closeAdForm').addEventListener('click', () => modal.classList.remove('open'));
                    document.getElementById('cancelAdForm').addEventListener('click', () => modal.classList.remove('open'));
                    document.getElementById('adForm').addEventListener('submit', (e) => {
                        e.preventDefault();
                        const adId = document.getElementById('adId').value;
                        const adData = {
                            title: document.getElementById('adTitle').value,
                            description: document.getElementById('adDescription').value,
                            imageUrl: document.getElementById('adImageUrl').value,
                            link: document.getElementById('adLink').value,
                            reward: parseFloat(document.getElementById('adReward').value),
                            duration: parseInt(document.getElementById('adDuration').value)
                        };
                        if (adId) {
                            this.data.updateAd(adId, adData);
                            this.toast.success('تم تحديث الإعلان');
                        } else {
                            this.data.addAd(adData);
                            this.toast.success('تمت إضافة الإعلان');
                        }
                        modal.classList.remove('open');
                        this.openAdminPanel(); // refresh admin panel
                    });
                }

                openAdsModal() {
                    const ads = this.data.getAvailableAdsForUser();
                    if (ads.length === 0) {
                        this.toast.info('لا توجد إعلانات متاحة حالياً، يرجى العودة لاحقاً.');
                        return;
                    }
                    this.isAdsModalOpen = true;
                    const modal = document.getElementById('adsModalOverlay');
                    document.getElementById('adsModalContent').innerHTML = this.renderAdsModal(ads);
                    modal.classList.add('open');
                    this.bindAdsModalEvents();
                }

                renderAdsModal(ads) {
                    return `
                        <div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold">كسب المال عبر الإعلانات</h2><button id="closeAdsModal" class="w-8 h-8 rounded-full bg-white/10"><i class="fa-solid fa-times"></i></button></div>
                        <div class="space-y-3 max-h-96 overflow-y-auto">
                            ${ads.map(ad => `
                                <div class="ad-item" data-ad-id="${ad.id}">
                                    <img src="${ad.imageUrl || 'https://via.placeholder.com/60?text=Ad'}" class="ad-image" onerror="this.src='https://via.placeholder.com/60?text=Ad'">
                                    <div class="ad-info">
                                        <div class="ad-title">${ad.title}</div>
                                        <div class="ad-description">${ad.description || ''}</div>
                                        <div class="ad-reward"><i class="fa-solid fa-coins"></i> ${ad.reward} ر.س</div>
                                        <div class="ad-duration"><i class="fa-regular fa-clock"></i> ${ad.duration} ثانية</div>
                                    </div>
                                    <button class="ad-go-btn" data-ad-id="${ad.id}">Go <i class="fa-solid fa-arrow-left"></i></button>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }

                bindAdsModalEvents() {
                    const modal = document.getElementById('adsModalOverlay');
                    document.getElementById('closeAdsModal').addEventListener('click', () => modal.classList.remove('open'));
                    modal.addEventListener('click', (e) => { if(e.target === modal) modal.classList.remove('open'); });
                    document.querySelectorAll('.ad-go-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const adId = btn.dataset.adId;
                            const ad = this.state.ads.find(a => a.id === adId);
                            if (ad && !this.data.hasUserViewedAd(adId)) {
                                modal.classList.remove('open');
                                this.startAdCountdown(ad);
                            } else {
                                this.toast.warning('لقد شاهدت هذا الإعلان بالفعل');
                                this.openAdsModal(); // refresh
                            }
                        });
                    });
                }

                startAdCountdown(ad) {
                    const modal = document.getElementById('countdownModalOverlay');
                    let remaining = ad.duration;
                    const updateContent = () => {
                        document.getElementById('countdownModalContent').innerHTML = `
                            <div class="countdown-modal">
                                <h3 class="text-xl font-bold mb-2">مشاهدة الإعلان</h3>
                                <p class="text-gray-300 mb-3">${ad.title}</p>
                                <a href="${ad.link}" target="_blank" class="ad-link-btn" rel="noopener noreferrer"><i class="fa-solid fa-eye"></i> اضغط لفتح الإعلان</a>
                                <div class="countdown-timer" id="countdownTimer">${remaining}</div>
                                <p class="text-sm text-gray-400">انتظر حتى انتهاء العداد للحصول على المكافأة</p>
                                <button id="cancelCountdown" class="mt-4 bg-red-600 px-4 py-2 rounded-lg text-sm">إلغاء</button>
                            </div>
                        `;
                        const timerDiv = document.getElementById('countdownTimer');
                        const interval = setInterval(() => {
                            remaining--;
                            if (timerDiv) timerDiv.innerText = remaining;
                            if (remaining <= 0) {
                                clearInterval(interval);
                                this.completeAdView(ad);
                                modal.classList.remove('open');
                            }
                        }, 1000);
                        document.getElementById('cancelCountdown').addEventListener('click', () => {
                            clearInterval(interval);
                            modal.classList.remove('open');
                            this.toast.info('تم إلغاء مشاهدة الإعلان');
                        });
                    };
                    modal.classList.add('open');
                    updateContent();
                    modal.addEventListener('click', (e) => { if(e.target === modal) modal.classList.remove('open'); });
                }

                async completeAdView(ad) {
                    if (this.data.hasUserViewedAd(ad.id)) {
                        this.toast.warning('لقد حصلت على مكافأة هذا الإعلان مسبقاً');
                        return;
                    }
                    this.data.markAdViewed(ad.id);
                    await this.data.addBalance(ad.reward, `مشاهدة إعلان: ${ad.title}`);
                    this.toast.success(`🎉 تمت إضافة ${ad.reward} ر.س إلى رصيدك لمشاهدة الإعلان!`);
                    this.updateBalanceDisplay();
                    // إرسال إشعار للمستخدم
                    this.data.addNotification('تم إضافة رصيد', `حصلت على ${ad.reward} ر.س من مشاهدة إعلان "${ad.title}"`, 'success');
                    // تحديث القائمة إذا كانت مفتوحة
                    if (this.isAdsModalOpen) this.openAdsModal();
                }

                openNotificationsModal() {
                    const modal = document.getElementById('walletModalOverlay');
                    document.getElementById('walletModalContent').innerHTML = this.renderNotificationsModal();
                    modal.classList.add('open');
                    this.bindNotificationsModalEvents();
                }

                renderNotificationsModal() {
                    const notifs = this.data.getUserNotifications();
                    const html = notifs.length === 0 ? '<p class="text-center text-gray-400 py-8">لا توجد إشعارات</p>' : notifs.map(n => `<div class="transaction-item ${n.read ? 'opacity-60' : ''}" data-id="${n.id}"><div class="flex-1"><div class="font-bold flex items-center gap-2">${!n.read ? '<span class="w-2 h-2 bg-blue-500 rounded-full"></span>' : ''}${n.title}</div><div class="text-sm">${n.message}</div><div class="text-xs text-gray-400 mt-1">${DateUtils.formatDateTime(n.date)}</div></div>${!n.read ? `<button class="mark-read text-xs text-blue-400" data-id="${n.id}"><i class="fa-regular fa-circle-check"></i></button>` : ''}</div>`).join('');
                    return `<div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold">الإشعارات</h2><button id="closeNotificationsModal" class="w-8 h-8 rounded-full bg-white/10"><i class="fa-solid fa-times"></i></button></div><div class="flex justify-end mb-3"><button id="markAllRead" class="text-sm bg-blue-600 px-3 py-1 rounded-lg"><i class="fa-regular fa-bell-slash ml-1"></i> تحديد الكل كمقروء</button></div><div class="max-h-96 overflow-y-auto space-y-2">${html}</div>`;
                }

                bindNotificationsModalEvents() {
                    const modal = document.getElementById('walletModalOverlay');
                    document.getElementById('closeNotificationsModal').addEventListener('click', () => modal.classList.remove('open'));
                    document.getElementById('markAllRead')?.addEventListener('click', () => { this.data.markAllAsRead(); this.toast.success('تم تحديد الكل كمقروء'); this.openNotificationsModal(); this.updateNotificationBadge(); });
                    document.querySelectorAll('.mark-read').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); this.data.markAsRead(btn.dataset.id); this.openNotificationsModal(); this.updateNotificationBadge(); }));
                    modal.addEventListener('click', (e) => { if(e.target === modal) modal.classList.remove('open'); });
                }

                openPaymentMethodModal(editingId = null) {
                    this.isPaymentMethodModalOpen = true;
                    const modal = document.getElementById('paymentMethodModalOverlay');
                    const method = editingId ? this.state.paymentMethods.find(m => m.id === editingId) : null;
                    document.getElementById('paymentMethodModalContent').innerHTML = `
                        <div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold">${method ? 'تعديل طريقة دفع' : 'إضافة طريقة دفع جديدة'}</h2><button id="closePaymentMethodModal" class="w-8 h-8 rounded-full bg-white/10"><i class="fa-solid fa-times"></i></button></div>
                        <form id="paymentMethodForm" class="space-y-3"><input type="hidden" id="methodId" value="${method?.id || ''}"><div><label class="text-sm text-gray-400">اسم الطريقة</label><input type="text" id="methodName" required value="${method?.name || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2"></div><div><label class="text-sm text-gray-400">الأيقونة (class FontAwesome)</label><input type="text" id="methodIcon" value="${method?.icon || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2"></div><div><label class="text-sm text-gray-400">وصف مختصر</label><input type="text" id="methodDescription" value="${method?.description || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2"></div><div><label class="text-sm text-gray-400">تفاصيل السحب (placeholder)</label><input type="text" id="methodWithdrawDetails" value="${method?.withdrawDetails || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2"></div><div class="flex gap-2 pt-2"><button type="submit" class="flex-1 bg-blue-600 py-2 rounded-lg font-bold">حفظ</button><button type="button" id="cancelPaymentMethod" class="flex-1 bg-gray-600 py-2 rounded-lg font-bold">إلغاء</button></div></form>
                    `;
                    modal.classList.add('open');
                    this.bindPaymentMethodModalEvents();
                }

                closePaymentMethodModal() { this.isPaymentMethodModalOpen = false; document.getElementById('paymentMethodModalOverlay').classList.remove('open'); }

                bindPaymentMethodModalEvents() {
                    const modal = document.getElementById('paymentMethodModalOverlay');
                    document.getElementById('closePaymentMethodModal').addEventListener('click', () => this.closePaymentMethodModal());
                    document.getElementById('cancelPaymentMethod').addEventListener('click', () => this.closePaymentMethodModal());
                    modal.addEventListener('click', (e) => { if(e.target === modal) this.closePaymentMethodModal(); });
                    document.getElementById('paymentMethodForm').addEventListener('submit', (e) => {
                        e.preventDefault();
                        const formData = { name: document.getElementById('methodName').value, icon: document.getElementById('methodIcon').value, description: document.getElementById('methodDescription').value, withdrawDetails: document.getElementById('methodWithdrawDetails').value };
                        const id = document.getElementById('methodId').value;
                        if(id) this.data.updatePaymentMethod(id, formData);
                        else this.data.addPaymentMethod(formData);
                        this.toast.success(id ? 'تم التحديث' : 'تمت الإضافة');
                        this.closePaymentMethodModal();
                        this.openAdminPanel();
                    });
                }

                startAutoRefresh(interval = 5000) { this.refreshInterval = setInterval(() => this.refreshData(), interval); }
                stopAutoRefresh() { if(this.refreshInterval) clearInterval(this.refreshInterval); }
                refreshData() { this.data.loadWallet(); this.data.loadRequests(); this.data.loadStats(); this.data.loadNotifications(); this.data.loadAds(); this.updateBalanceDisplay(); this.updateStatsDisplay(); this.updatePendingBadge(); this.updateNotificationBadge(); if(this.isWalletModalOpen) this.openWalletModal(); if(this.isAdminPanelOpen) this.openAdminPanel(); if(this.isAdsModalOpen) this.openAdsModal(); }
            }

            class App {
                constructor() {
                    this.telegram = new TelegramService();
                    this.toast = new ToastManager('toastContainer');
                    this.state = null;
                    this.data = null;
                    this.ui = null;
                    this.init();
                }

                async init() {
                    if (!this.telegram.isAvailable) {
                        this.state = new AppState(null);
                        this.state.telegramMissing = true;
                        this.state.loading = false;
                        this.ui = new UIManager(this.state, null, this.telegram, this.toast);
                        this.ui.render();
                        return;
                    }
                    this.telegram.init();
                    if (!this.telegram.isValid() || !this.telegram.getUser()) {
                        this.state = new AppState(null);
                        this.state.accessDenied = true;
                        this.state.loading = false;
                        this.ui = new UIManager(this.state, null, this.telegram, this.toast);
                        this.ui.render();
                        return;
                    }
                    const user = this.telegram.getUser();
                    this.state = new AppState(user.id);
                    this.state.user = user;
                    this.state.isAdmin = (user.id === CONFIG.ADMIN_ID);
                    this.data = new DataService(this.state);
                    this.ui = new UIManager(this.state, this.data, this.telegram, this.toast);
                    const startParam = this.telegram.tg?.initDataUnsafe?.start_param;
                    if (startParam && !this.state.referrals.referredBy) {
                        await this.data.setReferredBy(startParam);
                    }
                    await this.data.registerUser(user.id, this.state.referrals.referredBy);
                    const savedTheme = this.data.loadTheme();
                    this.applyTheme(savedTheme);
                    this.loadSettings();
                    this.state.loading = true;
                    this.ui.render();
                    await new Promise(resolve => setTimeout(resolve, 800));
                    await this.data.loadStats();
                    this.state.loading = false;
                    this.ui.render();
                    this.telegram.setMainButton(this.state.isAdmin ? "لوحة التحكم" : "تحديث البيانات", '#3b82f6', '#ffffff', true, () => { this.telegram.showPopup({ title: this.state.isAdmin ? 'مرحباً أيها المدير' : 'نظام آمن', message: this.state.isAdmin ? `الطلبات المعلقة: ${this.data.getPendingRequestsCount()}` : `أهلاً ${user.first_name}`, buttons: [{ type: 'ok', text: 'حسناً' }] }); });
                    this.toast.success(`مرحباً ${user.first_name}، أهلاً بك في المحفظة المتطورة`);
                    this.ui.startAutoRefresh(5000);
                }

                loadSettings() {
                    const s = this.state.settings;
                    this.toast.soundEnabled = s.sound;
                    this.toast.vibrateEnabled = s.vibrate;
                    if(document.getElementById('soundToggle')) document.getElementById('soundToggle').checked = s.sound;
                    if(document.getElementById('vibrateToggle')) document.getElementById('vibrateToggle').checked = s.vibrate;
                }

                applyTheme(theme) {
                    const root = document.documentElement;
                    const icon = document.getElementById('themeIcon');
                    if(theme === 'light') {
                        root.style.setProperty('--tg-theme-bg-color', '#f8fafc');
                        root.style.setProperty('--tg-theme-text-color', '#0f172a');
                        icon.className = 'fa-solid fa-sun';
                    } else {
                        root.style.setProperty('--tg-theme-bg-color', '#0f172a');
                        root.style.setProperty('--tg-theme-text-color', '#ffffff');
                        icon.className = 'fa-solid fa-moon';
                    }
                }
            }

            const app = new App();
            document.getElementById('themeToggle').addEventListener('click', () => {
                const newTheme = app.state.theme === 'dark' ? 'light' : 'dark';
                app.state.theme = newTheme;
                app.data.saveTheme(newTheme);
                app.applyTheme(newTheme);
                app.toast.info(`تم تغيير السمة إلى ${newTheme === 'dark' ? 'الداكنة' : 'الفاتحة'}`);
            });
            const settingsOverlay = document.getElementById('settingsOverlay'), settingsPanel = document.getElementById('settingsPanel');
            document.getElementById('closeSettings').addEventListener('click', () => { settingsOverlay.classList.remove('open'); settingsPanel.classList.remove('open'); });
            settingsOverlay.addEventListener('click', () => { settingsOverlay.classList.remove('open'); settingsPanel.classList.remove('open'); });
            document.getElementById('languageSelect').addEventListener('change', (e) => { app.state.settings.language = e.target.value; app.data.saveSettings(); app.toast.success(`تم تغيير اللغة إلى ${e.target.value === 'ar' ? 'العربية' : 'الإنجليزية'}`); });
            document.getElementById('notificationsToggle').addEventListener('change', (e) => { app.state.settings.notifications = e.target.checked; app.data.saveSettings(); app.toast.success(e.target.checked ? 'تم تفعيل الإشعارات' : 'تم إيقاف الإشعارات'); });
            document.getElementById('soundToggle').addEventListener('change', (e) => { app.state.settings.sound = e.target.checked; app.data.saveSettings(); app.toast.soundEnabled = e.target.checked; app.toast.success(e.target.checked ? 'تم تفعيل التنبيه الصوتي' : 'تم إيقاف التنبيه الصوتي'); });
            document.getElementById('vibrateToggle').addEventListener('change', (e) => { app.state.settings.vibrate = e.target.checked; app.data.saveSettings(); app.toast.vibrateEnabled = e.target.checked; app.toast.success(e.target.checked ? 'تم تفعيل الاهتزاز' : 'تم إيقاف الاهتزاز'); });
        })();
    </script>
</body>
</html>
