<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>محفظة تيليجرام المتطورة</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts (Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--tg-theme-bg-color, #0f172a);
            color: var(--tg-theme-text-color, #ffffff);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* الخلفية المتحركة */
        .ambient-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }
        
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 10s infinite ease-in-out;
        }
        
        .orb-1 { top: -10%; right: -10%; width: 300px; height: 300px; background: #3b82f6; animation-delay: 0s; }
        .orb-2 { bottom: -10%; left: -10%; width: 250px; height: 250px; background: #8b5cf6; animation-delay: 5s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, 40px); }
        }

        /* Glassmorphism */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(40, 51, 69, 0.8);
            border-color: rgba(255, 255, 255, 0.15);
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-enter {
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--tg-theme-button-color, #3b82f6);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        .default-avatar {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            font-weight: bold;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 90%;
            max-width: 350px;
            pointer-events: none;
        }

        .toast {
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 12px 20px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: toastSlideUp 0.3s ease, toastFadeOut 0.3s ease 5.7s forwards;
            pointer-events: auto;
            direction: rtl;
            white-space: pre-line;
            line-height: 1.6;
        }

        .toast.success { border-right: 4px solid #10b981; }
        .toast.error { border-right: 4px solid #ef4444; }
        .toast.warning { border-right: 4px solid #f59e0b; }
        .toast.info { border-right: 4px solid #3b82f6; }

        .toast-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .toast.success .toast-icon { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .toast.error .toast-icon { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .toast.warning .toast-icon { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .toast.info .toast-icon { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }

        .toast-message { flex: 1; }

        @keyframes toastSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastFadeOut {
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* Theme toggle */
        .theme-toggle {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover { background: rgba(40, 51, 69, 0.8); }

        .settings-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 1000;
            border-radius: 30px 30px 0 0;
        }

        .settings-panel.open { transform: translateY(0); }

        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .settings-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        /* Wallet Modal */
        .wallet-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .wallet-modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .wallet-modal {
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .wallet-modal-overlay.open .wallet-modal { transform: scale(1); }

        .wallet-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 12px;
            flex-wrap: wrap;
        }

        .wallet-tab {
            flex: 1;
            min-width: 70px;
            padding: 8px 5px;
            text-align: center;
            border-radius: 12px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.5);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
        }

        .wallet-tab.active {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .wallet-tab i { margin-left: 6px; font-size: 14px; }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .transaction-item:last-child { border-bottom: none; }
        .transaction-amount.positive { color: #10b981; }
        .transaction-amount.negative { color: #ef4444; }

        .wallet-icon-large {
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, #3b82f6, #8b5cf6);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.5), 0 0 0 2px rgba(255,255,255,0.1) inset;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: floatWallet 3s infinite ease-in-out;
            position: relative;
            overflow: hidden;
        }

        .wallet-icon-large::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), transparent 70%);
            opacity: 0.6;
        }

        .wallet-icon-large i {
            font-size: 36px;
            color: white;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            animation: pulseIcon 2s infinite ease-in-out;
            position: relative;
            z-index: 2;
        }

        .wallet-icon-large:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.8), 0 0 0 4px rgba(255,255,255,0.2) inset;
        }

        @keyframes floatWallet {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        @keyframes pulseIcon {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .balance-badge {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 6px 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 12px;
        }

        .balance-badge i { color: #fbbf24; }

        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.2);
            animation: pulse-badge 1.5s infinite;
        }

        @keyframes pulse-badge {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .payment-method {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
        }

        .payment-method:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .payment-method.selected {
            background: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
        }

        .payment-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: #334155;
            color: white;
            flex-shrink: 0;
        }

        .payment-details {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 12px;
            margin: 10px 0 15px 0;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 13px;
            line-height: 1.6;
        }

        .admin-requests-panel {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 16px;
            margin-top: 16px;
        }

        .request-item {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .request-id { font-size: 10px; color: #94a3b8; font-family: monospace; }
        .request-actions { display: flex; gap: 8px; margin-top: 10px; }

        .btn-accept {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-accept:hover { background: rgba(16, 185, 129, 0.3); }

        .btn-reject {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-reject:hover { background: rgba(239, 68, 68, 0.3); }

        .badge-pending {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 600;
        }

        .payment-method-admin {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .payment-method-admin .actions button {
            background: transparent;
            border: none;
            color: #94a3b8;
            margin: 0 4px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .payment-method-admin .actions button:hover { color: white; }
        .payment-method-admin .actions button.delete:hover { color: #ef4444; }
        .payment-method-admin .actions button.edit:hover { color: #3b82f6; }
    </style>
</head>
<body>
    <div class="ambient-light">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="theme-toggle" id="themeToggle">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
        <span class="text-sm">السمة</span>
    </div>

    <div id="app" class="w-full max-w-md p-5 relative"></div>

    <div class="settings-overlay" id="settingsOverlay"></div>
    <div class="settings-panel" id="settingsPanel">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-bold">الإعدادات</h3>
            <button id="closeSettings" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
        <div class="space-y-4">
            <div class="flex items-center justify-between">
                <span>اللغة</span>
                <select class="bg-white/10 rounded-lg p-2" id="languageSelect">
                    <option value="ar">العربية</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div class="flex items-center justify-between">
                <span>الإشعارات</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" id="notificationsToggle">
                    <div class="w-11 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600"></div>
                </label>
            </div>
            <div class="flex items-center justify-between">
                <span>تنبيه صوتي</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" id="soundToggle" checked>
                    <div class="w-11 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600"></div>
                </label>
            </div>
            <div class="flex items-center justify-between">
                <span>اهتزاز</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" id="vibrateToggle" checked>
                    <div class="w-11 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600"></div>
                </label>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <div class="wallet-modal-overlay" id="walletModalOverlay">
        <div class="wallet-modal" id="walletModalContent"></div>
    </div>
    <div class="wallet-modal-overlay" id="adminPanelOverlay">
        <div class="wallet-modal" id="adminPanelContent" style="max-width: 500px;"></div>
    </div>
    <div class="wallet-modal-overlay" id="paymentMethodModalOverlay">
        <div class="wallet-modal" id="paymentMethodModalContent" style="max-width: 450px;"></div>
    </div>

    <script>
        (function() {
            // ======================== الإعدادات الثابتة ========================
            const CONFIG = {
                ADMIN_ID: 7609492965, // <--- غيّر هذا إلى معرف حسابك على تيليجرام
                DEFAULT_BALANCE: 0,    // لا رصيد افتراضي، يبدأ من الصفر
                MAX_TRANSACTIONS: 50,
                STORAGE_KEYS: {
                    USERS: 'app_users',
                    BOTS: 'app_bots',
                    DAILY_OPS: 'daily_ops',
                    WALLET_PREFIX: 'wallet_',    // لكل مستخدم: wallet_<user_id>
                    PAYMENT_METHODS: 'payment_methods',
                    DEPOSIT_REQUESTS: 'deposit_requests',
                    WITHDRAWAL_REQUESTS: 'withdrawal_requests',
                    THEME: 'theme',
                    SETTINGS_PREFIX: 'settings_', // لكل مستخدم: settings_<user_id>
                    NOTIFICATIONS_PREFIX: 'notifications_' // لكل مستخدم: notifications_<user_id>
                }
            };

            // ======================== خدمات مساعدة ========================
            class StorageService {
                static get(key, defaultValue = null) {
                    try {
                        const value = localStorage.getItem(key);
                        return value !== null ? JSON.parse(value) : defaultValue;
                    } catch (e) {
                        console.warn(`Storage read error for key ${key}:`, e);
                        return defaultValue;
                    }
                }

                static set(key, value) {
                    try {
                        localStorage.setItem(key, JSON.stringify(value));
                        return true;
                    } catch (e) {
                        console.warn(`Storage write error for key ${key}:`, e);
                        return false;
                    }
                }

                static remove(key) {
                    try {
                        localStorage.removeItem(key);
                        return true;
                    } catch (e) {
                        console.warn(`Storage remove error for key ${key}:`, e);
                        return false;
                    }
                }
            }

            class DateUtils {
                static getTodayDate() { return new Date().toISOString().split('T')[0]; }
                static formatDateTime(isoString) { return new Date(isoString).toLocaleString('ar-EG'); }
                static formatDate(isoString) { return new Date(isoString).toLocaleDateString('ar-EG'); }
            }

            class IdGenerator {
                static generate(prefix = '') { return prefix + Date.now() + '_' + Math.random().toString(36).substr(2, 9); }
            }

            // ======================== نظام التنبيهات المتطور ========================
            class ToastManager {
                constructor(containerId) {
                    this.container = document.getElementById(containerId);
                    if (!this.container) {
                        this.container = document.createElement('div');
                        this.container.id = containerId;
                        this.container.className = 'toast-container';
                        document.body.appendChild(this.container);
                    }
                    this.activeToasts = [];
                    this.soundEnabled = true;
                    this.vibrateEnabled = true;
                }

                show(message, type = 'info', duration = 5000) {
                    const toast = document.createElement('div');
                    toast.className = `toast ${type}`;
                    const iconMap = {
                        success: 'fa-solid fa-check',
                        error: 'fa-solid fa-exclamation',
                        warning: 'fa-solid fa-triangle-exclamation',
                        info: 'fa-solid fa-info'
                    };
                    toast.innerHTML = `
                        <div class="toast-icon"><i class="${iconMap[type] || iconMap.info}"></i></div>
                        <div class="toast-message">${message}</div>
                    `;
                    this.container.appendChild(toast);
                    this.activeToasts.push(toast);

                    if (this.soundEnabled && (type === 'success' || type === 'warning' || type === 'info')) {
                        this.playSound(type);
                    }
                    if (this.vibrateEnabled && navigator.vibrate) navigator.vibrate(200);

                    setTimeout(() => {
                        toast.remove();
                        this.activeToasts = this.activeToasts.filter(t => t !== toast);
                    }, duration);
                }

                playSound(type) {
                    try {
                        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        const oscillator = audioCtx.createOscillator();
                        const gainNode = audioCtx.createGain();
                        oscillator.connect(gainNode);
                        gainNode.connect(audioCtx.destination);
                        oscillator.type = 'sine';
                        oscillator.frequency.value = type === 'success' ? 800 : (type === 'warning' ? 600 : 400);
                        gainNode.gain.value = 0.1;
                        oscillator.start();
                        oscillator.stop(audioCtx.currentTime + 0.2);
                    } catch (e) { console.log('Web Audio not supported'); }
                }

                success(message) { this.show(message, 'success'); }
                error(message) { this.show(message, 'error'); }
                warning(message) { this.show(message, 'warning'); }
                info(message) { this.show(message, 'info'); }
            }

            // ======================== خدمة تيليجرام ========================
            class TelegramService {
                constructor() {
                    this.tg = window.Telegram?.WebApp || null;
                    this.isAvailable = !!this.tg;
                }

                init() {
                    if (!this.isAvailable) return false;
                    this.tg.expand();
                    this.tg.ready();
                    return true;
                }

                getUser() { return this.tg?.initDataUnsafe?.user || null; }
                isValid() { return this.isAvailable && this.tg?.initData; }
                close() { this.tg?.close(); }
                showPopup(params) { this.tg?.showPopup(params); }
                setMainButton(text, color = '#3b82f6', textColor = '#ffffff', isVisible = true, callback = null) {
                    if (!this.tg) return;
                    const btn = this.tg.MainButton;

                        read: false,
                        date: new Date().toISOString()
                    };

                    if (notif) { notif.read = true; this.saveNotifications(); }

                    this.state.notifications.forEach(n => n.read = true);
                    this.saveNotifications();
                }

                getUserNotifications() {
                    return [...this.state.notifications].sort((a, b) => new Date(b.date) - new Date(a.date));

                getUnreadCount() {
                    return this.state.notifications.filter(n => !n.read).length;
                }

                            { id: IdGenerator.generate('bank_'), name: 'تحويل بنكي', icon: 'fa-solid fa-building-columns', description: 'حوالة بنكية محلية', depositDetails: 'IBAN: SA0380000000608010167519\nاسم المستفيد: شركة المدفوعات\nالبنك: الأهلي السعودي', withdrawDetails: 'أدخل رقم IBAN الخاص بك' },
                            { id: IdGenerator.generate('telegram_'), name: 'محفظة تيليجرام', icon: 'fa-brands fa-telegram', description: '@wallet_bot', depositDetails: '@wallet_bot\nأرسل المبلغ إلى بوت المحفظة', withdrawDetails: 'أدخل معرف تيليجرام للمحفظة' }

                    }
                }

                savePaymentMethods() {
                    StorageService.set(CONFIG.STORAGE_KEYS.PAYMENT_METHODS, this.state.paymentMethods);
                }

                addPaymentMethod(methodData) {
                    const newMethod = { id: IdGenerator.generate('pm_'), ...methodData };
                    this.state.paymentMethods.push(newMethod);
                    this.savePaymentMethods();
                    return newMethod;
                }

                updatePaymentMethod(id, newData) {
                    const index = this.state.paymentMethods.findIndex(m => m.id === id);
                    if (index !== -1) {
                        this.state.paymentMethods[index] = { ...this.state.paymentMethods[index], ...newData };
                        this.savePaymentMethods();
                        return true;
                    }
                    return false;
                }

                deletePaymentMethod(id) {
                    this.state.paymentMethods = this.state.paymentMethods.filter(m => m.id !== id);
                    this.savePaymentMethods();
                }

                // الطلبات (عامة)
                loadRequests() {
                    this.state.depositRequests = StorageService.get(CONFIG.STORAGE_KEYS.DEPOSIT_REQUESTS, []);
                    this.state.withdrawalRequests = StorageService.get(CONFIG.STORAGE_KEYS.WITHDRAWAL_REQUESTS, []);
                }

                saveRequests() {
                    StorageService.set(CONFIG.STORAGE_KEYS.DEPOSIT_REQUESTS, this.state.depositRequests);
                    StorageService.set(CONFIG.STORAGE_KEYS.WITHDRAWAL_REQUESTS, this.state.withdrawalRequests);
                }

                addDepositRequest(amount, methodId, transactionId, user) {
                    const method = this.state.paymentMethods.find(m => m.id === methodId);
                    const request = {
                        id: IdGenerator.generate('dep_'),
                        userId: user.id,
                        userName: `${user.first_name} ${user.last_name || ''}`.trim(),
                        amount,
                        method: method ? method.name : methodId,
                        methodId,
                        transactionId,
                        status: 'pending',
                        date: new Date().toISOString()
                    };
                    this.state.depositRequests.push(request);
                    this.saveRequests();
                    this.incrementDailyOps();
                    window.dispatchEvent(new CustomEvent('newDepositRequest', { detail: request }));
                    return request;
                }

                addWithdrawalRequest(amount, methodId, details, user) {
                    if (amount > this.state.balance) {
                        return { success: false, message: 'الرصيد غير كافٍ', request: null };
                    }
                    const method = this.state.paymentMethods.find(m => m.id === methodId);
                    const request = {
                        id: IdGenerator.generate('with_'),
                        userId: user.id,
                        userName: `${user.first_name} ${user.last_name || ''}`.trim(),
                        amount,
                        method: method ? method.name : methodId,
                        methodId,
                        details,
                        status: 'pending',
                        date: new Date().toISOString()
                    };
                    this.state.withdrawalRequests.push(request);
                    this.saveRequests();
                    this.incrementDailyOps();
                    window.dispatchEvent(new CustomEvent('newWithdrawalRequest', { detail: request }));
                    return { success: true, id: request.id, request };
                }

                acceptRequest(request, type) {
                    if (type === 'deposit') {
                        const req = this.state.depositRequests.find(r => r.id === request.id);
                        if (req && req.status === 'pending') {
                            req.status = 'approved';
                            // هنا يجب إضافة الرصيد للمستخدم صاحب الطلب (وليس للمشرف)
                            // لكننا لا نملك كائن state للمستخدم المستهدف. سنقوم بتحديث رصيده مباشرة في localStorage.
                            this.addBalanceToUser(req.userId, req.amount, `شحن عبر ${req.method} (رقم العملية: ${req.transactionId || 'غير محدد'})`);
                            this.saveRequests();
                            // إضافة إشعار للمستخدم
                            this.notificationServiceForUser(req.userId)?.addNotification(
                                '✅ تم قبول طلب الشحن',
                                `تم قبول طلب الشحن بمبلغ ${req.amount} عبر ${req.method}. رقم العملية: ${req.transactionId || 'غير محدد'}`,
                                'success'
                            );
                            return true;
                        }
                    } else if (type === 'withdrawal') {
                        const req = this.state.withdrawalRequests.find(r => r.id === request.id);
                        if (req && req.status === 'pending') {
                            req.status = 'approved';
                            // هنا يجب خصم الرصيد من المستخدم صاحب الطلب
                            this.subtractBalanceFromUser(req.userId, req.amount, `سحب عبر ${req.method} إلى ${req.details || 'محفظة'}`);
                            this.saveRequests();
                            this.notificationServiceForUser(req.userId)?.addNotification(
                                '✅ تم قبول طلب السحب',
                                `تم قبول طلب السحب بمبلغ ${req.amount} عبر ${req.method}. التفاصيل: ${req.details}`,
                                'success'
                            );
                            return true;
                        }
                    }
                    return false;
                }

                rejectRequest(request, type) {
                    if (type === 'deposit') {
                        const req = this.state.depositRequests.find(r => r.id === request.id);
                        if (req) {
                            req.status = 'rejected';
                            this.saveRequests();
                            this.notificationServiceForUser(req.userId)?.addNotification(
                                '❌ تم رفض طلب الشحن',
                                `تم رفض طلب الشحن بمبلغ ${req.amount} عبر ${req.method}.`,
                                'error'
                            );
                            return true;
                        }
                    } else if (type === 'withdrawal') {
                        const req = this.state.withdrawalRequests.find(r => r.id === request.id);
                        if (req) {
                            req.status = 'rejected';
                            this.saveRequests();
                            this.notificationServiceForUser(req.userId)?.addNotification(
                                '❌ تم رفض طلب السحب',
                                `تم رفض طلب السحب بمبلغ ${req.amount} عبر ${req.method}.`,
                                'error'
                            );
                            return true;
                        }
                    }
                    return false;
                }

                // دالة مساعدة لتعديل رصيد مستخدم آخر (للمشرف)
                addBalanceToUser(userId, amount, note) {
                    const walletKey = CONFIG.STORAGE_KEYS.WALLET_PREFIX + userId;
                    const wallet = StorageService.get(walletKey, { balance: 0, transactions: [] });
                    wallet.balance = (wallet.balance || 0) + amount;
                    wallet.transactions.unshift({
                        id: IdGenerator.generate('tx_'),
                        type: 'deposit',
                        amount: amount,
                        note: note,
                        status: 'مكتمل',
                        date: new Date().toISOString()
                    });
                    if (wallet.transactions.length > CONFIG.MAX_TRANSACTIONS) wallet.transactions.pop();
                    StorageService.set(walletKey, wallet);
                }

                subtractBalanceFromUser(userId, amount, note) {
                    const walletKey = CONFIG.STORAGE_KEYS.WALLET_PREFIX + userId;
                    const wallet = StorageService.get(walletKey, { balance: 0, transactions: [] });
                    if (wallet.balance >= amount) {
                        wallet.balance -= amount;
                        wallet.transactions.unshift({
                            id: IdGenerator.generate('tx_'),
                            type: 'withdraw',
                            amount: -amount,
                            note: note,
                            status: 'مكتمل',
                            date: new Date().toISOString()
                        });
                        if (wallet.transactions.length > CONFIG.MAX_TRANSACTIONS) wallet.transactions.pop();
                        StorageService.set(walletKey, wallet);
                    }
                }

                // الحصول على خدمة الإشعارات لمستخدم معين (لإرسال إشعار)
                notificationServiceForUser(userId) {
                    // هذه دالة مساعدة، لكننا لا نخزن كل خدمات الإشعارات. سنقوم بإنشاء كائن مؤقت.
                    const notifKey = CONFIG.STORAGE_KEYS.NOTIFICATIONS_PREFIX + userId;

                                date: new Date().toISOString()
                            };
                            notifications.push(notif);
                            StorageService.set(notifKey, notifications);
                        }
                    };
                    return tempService;
                }

                getPendingDeposits() {
                    return this.state.depositRequests.filter(r => r.status === 'pending');
                }

                getPendingWithdrawals() {
                    return this.state.withdrawalRequests.filter(r => r.status === 'pending');

                getPendingRequestsCount() {
                    return this.getPendingDeposits().length + this.getPendingWithdrawals().length;

                loadStats() {

                    const bots = StorageService.get(CONFIG.STORAGE_KEYS.BOTS, [{ id: 123456, name: 'البوت الرسمي' }]);
                    const dailyOpsData = StorageService.get(CONFIG.STORAGE_KEYS.DAILY_OPS, {});
                    const today = DateUtils.getTodayDate();
                    this.state.stats = {
                        users: users.length,
                        bots: bots.length,
                        dailyOps: dailyOpsData[today] || 0
                    };
                }

                incrementDailyOps() {
                    const today = DateUtils.getTodayDate();
                    const dailyOpsData = StorageService.get(CONFIG.STORAGE_KEYS.DAILY_OPS, {});
                    dailyOpsData[today] = (dailyOpsData[today] || 0) + 1;
                    StorageService.set(CONFIG.STORAGE_KEYS.DAILY_OPS, dailyOpsData);
                    this.loadStats();
                }

                registerUser(userId) {
                    const users = StorageService.get(CONFIG.STORAGE_KEYS.USERS, []);

                        users.push(userId);
                        StorageService.set(CONFIG.STORAGE_KEYS.USERS, users);
                        this.loadStats();
                    }

                loadSettings() {

                    if (settings) {
                        this.state.settings = settings;
                    }
                }

                    StorageService.set(this.getSettingsKey(), this.state.settings);

                // الثيم
                loadTheme() {
                    const theme = StorageService.get(CONFIG.STORAGE_KEYS.THEME, 'dark');

                    return theme;

                saveTheme(theme) {
                    StorageService.set(CONFIG.STORAGE_KEYS.THEME, theme);
                    this.state.theme = theme;
                }

                bindEvents() {
                    const logoutBtn = document.getElementById('logoutBtn');
                    if (logoutBtn) logoutBtn.addEventListener('click', () => { this.tg.close(); this.toast.info('تم تسجيل الخروج بنجاح'); });

                    const walletIcon = document.getElementById('walletIconLarge');
                    if (walletIcon) walletIcon.addEventListener('click', () => this.openWalletModal());

                    const adminPanelBtn = document.getElementById('openAdminPanelBtn');
                    if (adminPanelBtn) adminPanelBtn.addEventListener('click', () => this.openAdminPanel());

                    if (notificationBell) notificationBell.addEventListener('click', () => this.openNotificationsModal());
