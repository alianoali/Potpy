<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة تيليجرام المتطورة</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts (Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                    },
                    colors: {
                        tg: {
                            bg: 'var(--tg-theme-bg-color, #0f172a)',
                            text: 'var(--tg-theme-text-color, #ffffff)',
                            button: 'var(--tg-theme-button-color, #3b82f6)',
                            buttonText: 'var(--tg-theme-button-text-color, #ffffff)',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--tg-theme-bg-color, #0f172a);
            color: var(--tg-theme-text-color, #ffffff);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* الخلفية المتحركة */
        .ambient-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }
        
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 10s infinite ease-in-out;
        }
        
        .orb-1 { top: -10%; right: -10%; width: 300px; height: 300px; background: #3b82f6; animation-delay: 0s; }
        .orb-2 { bottom: -10%; left: -10%; width: 250px; height: 250px; background: #8b5cf6; animation-delay: 5s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, 40px); }
        }

        /* Glassmorphism */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(40, 51, 69, 0.8);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Animations */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-enter {
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Loader */
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--tg-theme-button-color, #3b82f6);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Avatar */
        .default-avatar {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            font-weight: bold;
        }

        /* Toast Notifications */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            z-index: 1000;
            animation: toastIn 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translate(-50%, 20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        /* Theme toggle */
        .theme-toggle {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: rgba(40, 51, 69, 0.8);
        }

        /* Settings panel */
        .settings-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 1000;
            border-radius: 30px 30px 0 0;
        }

        .settings-panel.open {
            transform: translateY(0);
        }

        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .settings-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        /* Hidden class */
        .hidden-content { display: none !important; }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="ambient-light">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Theme Toggle -->
    <div class="theme-toggle" id="themeToggle">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
        <span class="text-sm">السمة</span>
    </div>

    <!-- Main Container -->
    <div id="app" class="w-full max-w-md p-5 relative"></div>

    <!-- Settings Panel -->
    <div class="settings-overlay" id="settingsOverlay"></div>
    <div class="settings-panel" id="settingsPanel">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-bold">الإعدادات</h3>
            <button id="closeSettings" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
        <div class="space-y-4">
            <div class="flex items-center justify-between">
                <span>اللغة</span>
                <select class="bg-white/10 rounded-lg p-2" id="languageSelect">
                    <option value="ar">العربية</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div class="flex items-center justify-between">
                <span>الإشعارات</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" id="notificationsToggle">
                    <div class="w-11 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600"></div>
                </label>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // -----------------------------------------------
            // إعدادات ثابتة
            // -----------------------------------------------
            const ADMIN_ID = 7609492965; // غيّر هذا إلى معرف المشرف الخاص بك
            
            // عنوان الـ API الخاص بالبوت (غيّره إلى رابط خادمك الفعلي)
            const BASE_API_URL = 'https://your-bot-domain.com/api'; // مثال: 'https://mybot.com/api'

            // -----------------------------------------------
            // الحالة المركزية (State)
            // -----------------------------------------------
            const state = {
                user: null,
                isAdmin: false,
                loading: true,
                accessDenied: false,
                telegramMissing: false,
                balance: 0,
                stats: {
                    users: 0,
                    bots: 0,
                    dailyOps: 0
                },
                theme: 'dark',
                settings: {
                    language: 'ar',
                    notifications: true
                }
            };

            // -----------------------------------------------
            // المتغيرات العامة
            // -----------------------------------------------
            let tg = null;
            try {
                tg = window.Telegram?.WebApp;
            } catch (e) {
                tg = null;
            }

            const appContainer = document.getElementById('app');
            
            // مراجع العناصر
            const settingsOverlay = document.getElementById('settingsOverlay');
            const settingsPanel = document.getElementById('settingsPanel');
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');

            // -----------------------------------------------
            // دوال مساعدة (مع معالجة أخطاء localStorage)
            // -----------------------------------------------
            function safeLocalStorageGet(key, defaultValue) {
                try {
                    const value = localStorage.getItem(key);
                    return value !== null ? value : defaultValue;
                } catch (e) {
                    return defaultValue;
                }
            }

            function safeLocalStorageSet(key, value) {
                try {
                    localStorage.setItem(key, value);
                } catch (e) {
                    // تجاهل الخطأ
                }
            }

            function showToast(message, type = 'info') {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => {
                    toast.remove();
                }, 3000);
            }

            function updateTheme(theme) {
                if (theme === 'light') {
                    document.documentElement.style.setProperty('--tg-theme-bg-color', '#f8fafc');
                    document.documentElement.style.setProperty('--tg-theme-text-color', '#0f172a');
                    document.documentElement.style.setProperty('--tg-theme-button-color', '#3b82f6');
                    document.documentElement.style.setProperty('--tg-theme-button-text-color', '#ffffff');
                    themeIcon.className = 'fa-solid fa-sun';
                } else {
                    document.documentElement.style.setProperty('--tg-theme-bg-color', '#0f172a');
                    document.documentElement.style.setProperty('--tg-theme-text-color', '#ffffff');
                    document.documentElement.style.setProperty('--tg-theme-button-color', '#3b82f6');
                    document.documentElement.style.setProperty('--tg-theme-button-text-color', '#ffffff');
                    themeIcon.className = 'fa-solid fa-moon';
                }
                safeLocalStorageSet('theme', theme);
            }

            // دوال الإحصائيات الحقيقية (مع أمان localStorage)
            function getTodayDate() {
                return new Date().toISOString().split('T')[0];
            }

            function updateStats() {
                try {
                    // قراءة المستخدمين المخزنين
                    let usersSet = new Set(JSON.parse(safeLocalStorageGet('app_users', '[]')));
                    state.stats.users = usersSet.size;

                    // عدد البوتات (يمكن تعديلها يدوياً أو جلبها من API)
                    let bots = JSON.parse(safeLocalStorageGet('app_bots', '[{"id":123456,"name":"البوت الرسمي"}]'));
                    state.stats.bots = bots.length;

                    // العمليات اليومية
                    const today = getTodayDate();
                    let dailyOpsData = JSON.parse(safeLocalStorageGet('daily_ops', '{}'));
                    state.stats.dailyOps = dailyOpsData[today] || 0;
                } catch (e) {
                    // في حال خطأ في JSON، نترك القيم الافتراضية
                    state.stats.users = 0;
                    state.stats.bots = 1;
                    state.stats.dailyOps = 0;
                }
            }

            function incrementDailyOps() {
                try {
                    const today = getTodayDate();
                    let dailyOpsData = JSON.parse(safeLocalStorageGet('daily_ops', '{}'));
                    dailyOpsData[today] = (dailyOpsData[today] || 0) + 1;
                    safeLocalStorageSet('daily_ops', JSON.stringify(dailyOpsData));
                    updateStats();
                } catch (e) {}
            }

            function registerUser(userId) {
                try {
                    let usersSet = new Set(JSON.parse(safeLocalStorageGet('app_users', '[]')));
                    if (!usersSet.has(userId)) {
                        usersSet.add(userId);
                        safeLocalStorageSet('app_users', JSON.stringify([...usersSet]));
                        updateStats();
                    }
                } catch (e) {}
            }

            // -----------------------------------------------
            // دوال جلب الرصيد من API البوت
            // -----------------------------------------------
            async function fetchBalance(userId) {
                // إذا لم يكن هناك tg أو initData، نعود للقيمة الافتراضية (يمكن تعديلها)
                if (!tg || !tg.initData) {
                    console.warn('لا يوجد initData، استخدم القيمة الافتراضية');
                    return null;
                }

                try {
                    const initData = tg.initData; // سلسلة بيانات التحقق الكاملة

                    const response = await fetch(`${BASE_API_URL}/getBalance`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            user_id: userId,
                            init_data: initData  // يرسل للتحقق من صحة الطلب من تيليجرام
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`فشل الاتصال بالخادم: ${response.status}`);
                    }

                    const data = await response.json();
                    if (data.balance === undefined) {
                        throw new Error('استجابة غير صالحة من الخادم');
                    }
                    return data.balance;
                } catch (error) {
                    console.error('خطأ في جلب الرصيد:', error);
                    showToast('تعذر جلب الرصيد، يرجى المحاولة لاحقاً', 'error');
                    return null; // يفشل بهدوء
                }
            }

            // -----------------------------------------------
            // مكونات واجهة المستخدم (UI Components)
            // -----------------------------------------------
            const components = {
                loading: () => {
                    return `
                        <div class="flex flex-col items-center justify-center text-center space-y-6 animate-enter">
                            <div class="spinner"></div>
                            <div>
                                <h2 class="text-xl font-bold mb-1">جاري التحقق...</h2>
                                <p class="text-sm text-gray-400">نحن نتأكد من هويتك عبر تيليجرام</p>
                            </div>
                        </div>
                    `;
                },

                accessDenied: () => {
                    return `
                        <div class="glass-card p-8 rounded-3xl shadow-2xl text-center max-w-md w-full animate-enter border-red-500/20">
                            <div class="w-20 h-20 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl shadow-inner">
                                <i class="fa-solid fa-shield-halved"></i>
                            </div>
                            <h2 class="text-2xl font-bold mb-2">دخول محظور</h2>
                            <p class="text-gray-400 mb-8 leading-relaxed text-sm">
                                يجب فتح هذا التطبيق حصراً من خلال بوت تيليجرام الرسمي لضمان الأمان.
                            </p>
                            <a href="https://telegram.org" target="_blank" class="block w-full py-3.5 rounded-xl font-bold text-white bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 transition-all shadow-lg shadow-blue-500/20">
                                <i class="fa-brands fa-telegram ml-2"></i>
                                فتح تيليجرام
                            </a>
                        </div>
                    `;
                },

                telegramMissing: () => {
                    return `
                        <div class="glass-card p-8 rounded-3xl shadow-2xl text-center max-w-md w-full animate-enter border-orange-500/20">
                            <div class="w-20 h-20 bg-orange-500/10 text-orange-500 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl shadow-inner">
                                <i class="fa-solid fa-exclamation-triangle"></i>
                            </div>
                            <h2 class="text-2xl font-bold mb-2">بيئة غير مدعومة</h2>
                            <p class="text-gray-400 mb-8 leading-relaxed text-sm">
                                لم يتم العثور على بيئة تيليجرام. يرجى فتح هذا الرابط من داخل تطبيق تيليجرام على هاتفك.
                            </p>
                            <a href="https://t.me/your_bot_username" target="_blank" class="block w-full py-3.5 rounded-xl font-bold text-white bg-gradient-to-r from-orange-600 to-orange-500 hover:from-orange-500 hover:to-orange-400 transition-all shadow-lg shadow-orange-500/20">
                                <i class="fa-brands fa-telegram ml-2"></i>
                                فتح البوت في تيليجرام
                            </a>
                        </div>
                    `;
                },

                userDashboard: (user, balance) => {
                    const fullName = `${user.first_name} ${user.last_name || ''}`.trim();
                    const initials = (user.first_name.charAt(0) + (user.last_name ? user.last_name.charAt(0) : '')).toUpperCase();
                    const photoUrl = user.photo_url;

                    return `
                        <div class="space-y-5 animate-enter pb-10">
                            <!-- Header Profile Card -->
                            <div class="glass-card p-5 rounded-3xl relative overflow-hidden group">
                                <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500/10 rounded-full blur-2xl -mr-10 -mt-10 pointer-events-none"></div>

                                <div class="flex items-center gap-4 relative z-10">
                                    <!-- Avatar -->
                                    <div class="w-16 h-16 rounded-2xl border border-white/10 overflow-hidden bg-slate-800 shadow-lg flex-shrink-0">
                                        ${photoUrl ? 
                                            `<img src="${photoUrl}" alt="User" class="w-full h-full object-cover">` : 
                                            `<div class="w-full h-full default-avatar"><span>${initials}</span></div>`
                                        }
                                    </div>

                                    <!-- User Info -->
                                    <div class="flex-1 min-w-0">
                                        <h2 class="text-lg font-bold truncate" title="${fullName}">${fullName}</h2>
                                        <p class="text-xs text-gray-400 font-mono mt-0.5">ID: ${user.id}</p>
                                        
                                        <!-- Status Badge -->
                                        <div class="inline-flex items-center gap-1.5 mt-2 px-2 py-0.5 rounded-md bg-green-500/10 border border-green-500/20">
                                            <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                                            <span class="text-[10px] font-bold text-green-400 uppercase tracking-wide">نشط الآن</span>
                                        </div>
                                    </div>

                                    <!-- Balance Card -->
                                    <div class="flex flex-col items-end justify-center bg-slate-900/50 backdrop-blur-md px-4 py-2.5 rounded-2xl border border-white/5 shadow-lg">
                                        <span class="text-[10px] text-gray-400 font-medium mb-0.5">الرصيد الحالي</span>
                                        <div class="flex items-center gap-1.5">
                                            <i class="fa-solid fa-coins text-yellow-400 text-sm drop-shadow-md"></i>
                                            <span class="font-bold text-white text-base tracking-tight">${balance.toLocaleString('ar-EG')}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Stats Grid -->
                            <div class="grid grid-cols-2 gap-4">
                                <div class="glass-card p-4 rounded-2xl flex flex-col items-center justify-center text-center hover:bg-white/5 transition-colors cursor-default">
                                    <div class="w-10 h-10 rounded-full bg-blue-500/10 text-blue-400 flex items-center justify-center mb-2">
                                        <i class="fa-solid fa-chart-pie"></i>
                                    </div>
                                    <span class="text-gray-400 text-xs mb-1">الإحصائيات</span>
                                    <span class="text-white font-bold text-lg">100%</span>
                                </div>
                                <div class="glass-card p-4 rounded-2xl flex flex-col items-center justify-center text-center hover:bg-white/5 transition-colors cursor-default">
                                    <div class="w-10 h-10 rounded-full bg-purple-500/10 text-purple-400 flex items-center justify-center mb-2">
                                        <i class="fa-solid fa-crown"></i>
                                    </div>
                                    <span class="text-gray-400 text-xs mb-1">الرتبة</span>
                                    <span class="text-white font-bold text-lg">مميز</span>
                                </div>
                            </div>

                            <!-- Main Actions Area -->
                            <div class="glass-card p-5 rounded-3xl">
                                <div class="flex items-center justify-between mb-4">
                                    <h3 class="font-bold text-lg">القائمة الرئيسية</h3>
                                    <span class="text-xs text-gray-500 bg-white/5 px-2 py-1 rounded-lg">v2.0</span>
                                </div>
                                
                                <div class="space-y-3">
                                    <!-- رسالة ترحيبية -->
                                    <div class="bg-blue-500/5 border border-blue-500/10 rounded-xl p-4 flex items-start gap-3">
                                        <i class="fa-solid fa-circle-info text-blue-400 mt-1"></i>
                                        <div>
                                            <p class="text-sm text-blue-100 font-medium">مرحباً بك في البوابة الآمنة</p>
                                            <p class="text-xs text-blue-200/60 mt-1 leading-relaxed">
                                                جميع خدماتك متاحة الآن. يمكنك متابعة آخر التحديثات من خلال القناة الرسمية.
                                            </p>
                                        </div>
                                    </div>

                                    <!-- زر تحديث الرصيد -->
                                    <button id="updateBalanceBtn" class="w-full p-4 rounded-xl flex items-center justify-between bg-green-600/20 hover:bg-green-600/30 border border-green-500/30 transition-all group">
                                        <span class="flex items-center gap-3 text-green-200">
                                            <div class="w-8 h-8 rounded-lg bg-green-500/20 flex items-center justify-center">
                                                <i class="fa-solid fa-rotate"></i>
                                            </div>
                                            تحديث الرصيد
                                        </span>
                                        <i class="fa-solid fa-arrow-left text-green-400 group-hover:-translate-x-1 transition-transform"></i>
                                    </button>

                                    <!-- زر الإعدادات -->
                                    <button id="openSettingsBtn" class="w-full p-4 rounded-xl flex items-center justify-between bg-gray-600/20 hover:bg-gray-600/30 border border-gray-500/30 transition-all group">
                                        <span class="flex items-center gap-3 text-gray-200">
                                            <div class="w-8 h-8 rounded-lg bg-gray-500/20 flex items-center justify-center">
                                                <i class="fa-solid fa-sliders"></i>
                                            </div>
                                            الإعدادات
                                        </span>
                                        <i class="fa-solid fa-arrow-left text-gray-400 group-hover:-translate-x-1 transition-transform"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Logout Button -->
                            <button id="logoutBtn" class="w-full py-4 rounded-xl font-bold text-red-400 hover:bg-red-500/10 hover:text-red-300 transition-all duration-300 border border-transparent hover:border-red-500/20 flex items-center justify-center gap-2 group">
                                <i class="fa-solid fa-arrow-right-from-bracket group-hover:-translate-x-1 transition-transform"></i>
                                تسجيل الخروج
                            </button>
                        </div>
                    `;
                },

                adminDashboard: (user, balance, stats) => {
                    const fullName = `${user.first_name} ${user.last_name || ''}`.trim();
                    const initials = (user.first_name.charAt(0) + (user.last_name ? user.last_name.charAt(0) : '')).toUpperCase();
                    const photoUrl = user.photo_url;

                    return `
                        <div class="space-y-5 animate-enter pb-10">
                            <!-- Header Profile Card (مع شارة المشرف) -->
                            <div class="glass-card p-5 rounded-3xl relative overflow-hidden border-2 border-yellow-500/30">
                                <div class="absolute top-0 right-0 w-32 h-32 bg-yellow-500/10 rounded-full blur-2xl -mr-10 -mt-10 pointer-events-none"></div>

                                <div class="flex items-center gap-4 relative z-10">
                                    <!-- Avatar -->
                                    <div class="w-16 h-16 rounded-2xl border border-white/10 overflow-hidden bg-slate-800 shadow-lg flex-shrink-0">
                                        ${photoUrl ? 
                                            `<img src="${photoUrl}" alt="Admin" class="w-full h-full object-cover">` : 
                                            `<div class="w-full h-full default-avatar"><span>${initials}</span></div>`
                                        }
                                    </div>

                                    <!-- Admin Info -->
                                    <div class="flex-1 min-w-0">
                                        <h2 class="text-lg font-bold truncate" title="${fullName}">${fullName}</h2>
                                        <p class="text-xs text-gray-400 font-mono mt-0.5">ID: ${user.id}</p>
                                        
                                        <!-- شارة المشرف -->
                                        <div class="inline-flex items-center gap-1.5 mt-2 px-2 py-0.5 rounded-md bg-yellow-500/20 border border-yellow-500/30">
                                            <i class="fa-solid fa-crown text-yellow-400 text-[10px]"></i>
                                            <span class="text-[10px] font-bold text-yellow-300 uppercase tracking-wide">مدير النظام</span>
                                        </div>
                                    </div>

                                    <!-- Balance Card -->
                                    <div class="flex flex-col items-end justify-center bg-slate-900/50 backdrop-blur-md px-4 py-2.5 rounded-2xl border border-white/5 shadow-lg">
                                        <span class="text-[10px] text-gray-400 font-medium mb-0.5">رصيد البوت</span>
                                        <div class="flex items-center gap-1.5">
                                            <i class="fa-solid fa-coins text-yellow-400 text-sm drop-shadow-md"></i>
                                            <span class="font-bold text-white text-base tracking-tight">${balance.toLocaleString('ar-EG')}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- إحصائيات خاصة بالمشرف (ديناميكية وحقيقية) -->
                            <div class="grid grid-cols-3 gap-2">
                                <div class="glass-card p-3 rounded-2xl text-center hover:bg-white/5 transition-colors cursor-default">
                                    <div class="w-8 h-8 rounded-full bg-blue-500/10 text-blue-400 flex items-center justify-center mx-auto mb-1">
                                        <i class="fa-solid fa-users text-sm"></i>
                                    </div>
                                    <span class="text-gray-400 text-[10px]">المستخدمين</span>
                                    <span class="text-white font-bold text-base block" id="statsUsers">${stats.users.toLocaleString('ar-EG')}</span>
                                </div>
                                <div class="glass-card p-3 rounded-2xl text-center hover:bg-white/5 transition-colors cursor-default">
                                    <div class="w-8 h-8 rounded-full bg-green-500/10 text-green-400 flex items-center justify-center mx-auto mb-1">
                                        <i class="fa-solid fa-robot text-sm"></i>
                                    </div>
                                    <span class="text-gray-400 text-[10px]">البوتات</span>
                                    <span class="text-white font-bold text-base block" id="statsBots">${stats.bots}</span>
                                </div>
                                <div class="glass-card p-3 rounded-2xl text-center hover:bg-white/5 transition-colors cursor-default">
                                    <div class="w-8 h-8 rounded-full bg-purple-500/10 text-purple-400 flex items-center justify-center mx-auto mb-1">
                                        <i class="fa-solid fa-chart-line text-sm"></i>
                                    </div>
                                    <span class="text-gray-400 text-[10px]">عمليات اليوم</span>
                                    <span class="text-white font-bold text-base block" id="statsDailyOps">${stats.dailyOps}</span>
                                </div>
                            </div>

                            <!-- أدوات التحكم الإدارية -->
                            <div class="glass-card p-5 rounded-3xl">
                                <div class="flex items-center justify-between mb-4">
                                    <h3 class="font-bold text-lg">لوحة التحكم</h3>
                                    <span class="text-xs text-yellow-400 bg-yellow-500/10 px-2 py-1 rounded-lg">مدير</span>
                                </div>
                                
                                <div class="space-y-3">
                                    <!-- زر إرسال إشعار -->
                                    <button id="notifyUsersBtn" class="w-full p-4 rounded-xl flex items-center justify-between bg-blue-600/20 hover:bg-blue-600/30 border border-blue-500/30 transition-all group">
                                        <span class="flex items-center gap-3 text-blue-200">
                                            <div class="w-8 h-8 rounded-lg bg-blue-500/20 flex items-center justify-center">
                                                <i class="fa-solid fa-bell"></i>
                                            </div>
                                            إرسال إشعار للمستخدمين
                                        </span>
                                        <i class="fa-solid fa-arrow-left text-blue-400 group-hover:-translate-x-1 transition-transform"></i>
                                    </button>

                                    <!-- زر عرض التقارير -->
                                    <button id="reportsBtn" class="w-full p-4 rounded-xl flex items-center justify-between bg-purple-600/20 hover:bg-purple-600/30 border border-purple-500/30 transition-all group">
                                        <span class="flex items-center gap-3 text-purple-200">
                                            <div class="w-8 h-8 rounded-lg bg-purple-500/20 flex items-center justify-center">
                                                <i class="fa-solid fa-file-alt"></i>
                                            </div>
                                            عرض التقارير المتقدمة
                                        </span>
                                        <i class="fa-solid fa-arrow-left text-purple-400 group-hover:-translate-x-1 transition-transform"></i>
                                    </button>

                                    <!-- زر إعدادات البوت -->
                                    <button id="botSettingsBtn" class="w-full p-4 rounded-xl flex items-center justify-between bg-gray-600/20 hover:bg-gray-600/30 border border-gray-500/30 transition-all group">
                                        <span class="flex items-center gap-3 text-gray-200">
                                            <div class="w-8 h-8 rounded-lg bg-gray-500/20 flex items-center justify-center">
                                                <i class="fa-solid fa-sliders"></i>
                                            </div>
                                            إعدادات البوت العامة
                                        </span>
                                        <i class="fa-solid fa-arrow-left text-gray-400 group-hover:-translate-x-1 transition-transform"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Logout Button -->
                            <button id="logoutBtn" class="w-full py-4 rounded-xl font-bold text-red-400 hover:bg-red-500/10 hover:text-red-300 transition-all duration-300 border border-transparent hover:border-red-500/20 flex items-center justify-center gap-2 group">
                                <i class="fa-solid fa-arrow-right-from-bracket group-hover:-translate-x-1 transition-transform"></i>
                                تسجيل الخروج
                            </button>
                        </div>
                    `;
                }
            };

            // -----------------------------------------------
            // دالة التصيير (Render)
            // -----------------------------------------------
            function render() {
                if (state.telegramMissing) {
                    appContainer.innerHTML = components.telegramMissing();
                } else if (state.loading) {
                    appContainer.innerHTML = components.loading();
                } else if (state.accessDenied) {
                    appContainer.innerHTML = components.accessDenied();
                } else if (state.isAdmin) {
                    appContainer.innerHTML = components.adminDashboard(state.user, state.balance, state.stats);
                } else {
                    appContainer.innerHTML = components.userDashboard(state.user, state.balance);
                }

                // إعادة ربط الأحداث بعد التصيير
                bindEvents();
            }

            // -----------------------------------------------
            // ربط الأحداث (Event Binding)
            // -----------------------------------------------
            function bindEvents() {
                // زر تسجيل الخروج
                const logoutBtn = document.getElementById('logoutBtn');
                if (logoutBtn) {
                    logoutBtn.addEventListener('click', () => {
                        if (tg) tg.close();
                    });
                }

                // زر تحديث الرصيد (للمستخدم العادي)
                const updateBalanceBtn = document.getElementById('updateBalanceBtn');
                if (updateBalanceBtn) {
                    updateBalanceBtn.addEventListener('click', async () => {
                        // زيادة العمليات اليومية
                        incrementDailyOps();
                        
                        // إظهار حالة التحميل
                        state.loading = true;
                        render();
                        
                        // جلب الرصيد الجديد من API
                        const newBalance = await fetchBalance(state.user.id);
                        if (newBalance !== null) {
                            state.balance = newBalance;
                            showToast('تم تحديث الرصيد بنجاح', 'success');
                        } else {
                            // في حال الفشل، نترك الرصيد القديم
                            showToast('تعذر تحديث الرصيد، يرجى المحاولة لاحقاً', 'error');
                        }
                        
                        state.loading = false;
                        render();
                    });
                }

                // زر فتح الإعدادات
                const openSettingsBtn = document.getElementById('openSettingsBtn');
                if (openSettingsBtn) {
                    openSettingsBtn.addEventListener('click', () => {
                        // زيادة العمليات اليومية
                        incrementDailyOps();
                        
                        settingsOverlay.classList.add('open');
                        settingsPanel.classList.add('open');
                    });
                }

                // أزرار المشرف
                const notifyUsersBtn = document.getElementById('notifyUsersBtn');
                if (notifyUsersBtn) {
                    notifyUsersBtn.addEventListener('click', () => {
                        // زيادة العمليات اليومية
                        incrementDailyOps();
                        
                        if (tg) {
                            tg.showPopup({
                                title: 'إرسال إشعار',
                                message: 'هل تريد إرسال إشعار لجميع المستخدمين؟',
                                buttons: [
                                    {type: 'ok', text: 'نعم'},
                                    {type: 'cancel', text: 'إلغاء'}
                                ]
                            });
                        } else {
                            showToast('هذه الميزة متاحة فقط داخل تيليجرام', 'warning');
                        }
                    });
                }

                const reportsBtn = document.getElementById('reportsBtn');
                if (reportsBtn) {
                    reportsBtn.addEventListener('click', () => {
                        // زيادة العمليات اليومية
                        incrementDailyOps();
                        
                        showToast('جاري تحميل التقارير...', 'info');
                    });
                }

                const botSettingsBtn = document.getElementById('botSettingsBtn');
                if (botSettingsBtn) {
                    botSettingsBtn.addEventListener('click', () => {
                        // زيادة العمليات اليومية
                        incrementDailyOps();
                        
                        showToast('سيتم فتح إعدادات البوت قريباً', 'info');
                    });
                }
            }

            // -----------------------------------------------
            // تهيئة التطبيق
            // -----------------------------------------------
            async function initApp() {
                if (!tg) {
                    state.telegramMissing = true;
                    state.loading = false;
                    render();
                    return;
                }

                tg.expand();
                tg.ready();

                // استعادة السمة من localStorage
                const savedTheme = safeLocalStorageGet('theme', 'dark');
                state.theme = savedTheme;
                updateTheme(savedTheme);

                // التحقق من الأمان
                if (!tg.initData || !tg.initDataUnsafe.user) {
                    state.loading = false;
                    state.accessDenied = true;
                    render();
                    return;
                }

                const user = tg.initDataUnsafe.user;
                state.user = user;
                state.isAdmin = (user.id === ADMIN_ID);

                // تسجيل المستخدم الفريد
                registerUser(user.id);

                // محاكاة تأخير الشبكة (يمكن إزالته)
                await new Promise(resolve => setTimeout(resolve, 1000));

                // جلب الرصيد الحقيقي من API البوت
                const realBalance = await fetchBalance(user.id);
                state.balance = realBalance !== null ? realBalance : (state.isAdmin ? 12345 : 1234); // قيمة افتراضية إذا فشل

                // تحديث الإحصائيات الحقيقية
                updateStats();

                state.loading = false;
                render();

                // إعداد زر MainButton
                tg.MainButton.setText(state.isAdmin ? "لوحة التحكم" : "تحديث البيانات");
                tg.MainButton.setTextColor("#ffffff");
                tg.MainButton.setColor("#3b82f6");
                tg.MainButton.show();

                tg.MainButton.onClick(() => {
                    tg.showPopup({
                        title: state.isAdmin ? 'مرحباً أيها المدير' : 'نظام آمن',
                        message: state.isAdmin ? 
                            `لديك صلاحيات كاملة في النظام.` : 
                            `أهلاً ${user.first_name}، اتصالك مشفر ومحمي بالكامل.`,
                        buttons: [{type: 'ok', text: 'حسناً'}]
                    });
                });
            }

            // -----------------------------------------------
            // أحداث عامة
            // -----------------------------------------------
            themeToggle.addEventListener('click', () => {
                state.theme = state.theme === 'dark' ? 'light' : 'dark';
                updateTheme(state.theme);
            });

            // إغلاق الإعدادات
            document.getElementById('closeSettings').addEventListener('click', () => {
                settingsOverlay.classList.remove('open');
                settingsPanel.classList.remove('open');
            });

            settingsOverlay.addEventListener('click', () => {
                settingsOverlay.classList.remove('open');
                settingsPanel.classList.remove('open');
            });

            // حفظ الإعدادات
            document.getElementById('languageSelect').addEventListener('change', (e) => {
                state.settings.language = e.target.value;
                showToast(`تم تغيير اللغة إلى ${e.target.value === 'ar' ? 'العربية' : 'الإنجليزية'}`);
            });

            document.getElementById('notificationsToggle').addEventListener('change', (e) => {
                state.settings.notifications = e.target.checked;
                showToast(e.target.checked ? 'تم تفعيل الإشعارات' : 'تم إيقاف الإشعارات');
            });

            // بدء التطبيق
            initApp();
        })();
    </script>
</body>
</html>
