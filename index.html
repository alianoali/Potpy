                                <i class="${product.icon} text-5xl text-blue-400"></i>
                            </div>
                        </div>

                        <p class="text-gray-300 text-center mb-4">${product.description || ''}</p>

                        <div class="flex items-center justify-center gap-2 mb-4">

                            <span>${product.rating || '0'}</span>

                        </div>

                        <div class="glass p-5 rounded-2xl mb-4">

                            </div>

                            <form id="productForm">
                                ${fieldsHtml}
                                <div class="mb-3">
                                    <label class="text-sm text-gray-400">الكمية:</label>
                                    <input type="number" id="productQty" value="1" min="1" max="${product.stock === -1 ? 100 : product.stock}" class="w-full bg-slate-800 border border-white/10 rounded-xl p-3 text-white">
                                </div>
                                <div class="flex gap-3 mt-4">
                                    <button type="button" id="addToCartBtn" class="flex-1 bg-blue-600 py-3 rounded-xl font-bold">➕ أضف للسلة</button>
                                    <button type="submit" id="buyNowBtn" class="flex-1 bg-green-600 py-3 rounded-xl font-bold">💳 شراء</button>
                                </div>
                            </form>
                        </div>
                    `);

                    document.getElementById('closeModalBtn').addEventListener('click', () => this.closeModal());
                    this.modal.addEventListener('click', (e) => {
                        if (e.target === this.modal) this.closeModal();
                    });

                    document.getElementById('addToCartBtn').addEventListener('click', () => {
                        const qty = parseInt(document.getElementById('productQty').value) || 1;
                        const inputData = {};
                        (product.inputFields || []).forEach(f => {
                            const el = document.getElementById(`field_${f.name}`);
                            if (el) inputData[f.name] = el.value;
                        });

                        const result = this.data.addToCart(product, inputData, qty);
                        if (result.success) {
                            this.toast.success('تمت الإضافة للسلة');
                            this.closeModal();
                        } else {
                            this.toast.error(result.message);
                        }
                    });

                    document.getElementById('productForm').addEventListener('submit', (e) => {
                        e.preventDefault();
                        
                        const qty = parseInt(document.getElementById('productQty').value) || 1;
                        const total = finalPrice * qty;
                        
                        if (total > this.state.balance) {
                            return this.toast.error('الرصيد غير كافٍ');
                        }

                        const inputData = {};
                        (product.inputFields || []).forEach(f => {
                            const el = document.getElementById(`field_${f.name}`);
                            if (el) inputData[f.name] = el.value;
                        });

                        this.state.balance -= total;
                        this.data.saveWallet();
                        
                        this.data.createOrder(product, inputData, this.state.user.id, qty);
                        this.toast.success('تم الشراء بنجاح');
                        this.closeModal();
                        this.updateBalanceDisplay();
                    });
                }

                            </div>

                            <div class="flex gap-3 pt-3">
                                <button type="submit" class="flex-1 bg-blue-600 py-3 rounded-xl font-bold">حفظ</button>
                                <button type="button" id="cancelBtn" class="flex-1 bg-gray-600 py-3 rounded-xl font-bold">إلغاء</button>
                            </div>
                        </form>
                    `);

                    document.getElementById('closeModalBtn').addEventListener('click', () => this.closeModal());
                    document.getElementById('cancelBtn').addEventListener('click', () => this.closeModal());
                    this.modal.addEventListener('click', (e) => {
                        if (e.target === this.modal) this.closeModal();
                    });

                    document.getElementById('methodForm').addEventListener('submit', (e) => {
                        e.preventDefault();
                        
                        const data = {
                            name: document.getElementById('methodName').value,
                            icon: document.getElementById('methodIcon').value,
                            description: document.getElementById('methodDesc').value,
                            depositDetails: document.getElementById('methodDeposit').value,
                            withdrawDetails: document.getElementById('methodWithdraw').value
                        };

                        const id = document.getElementById('methodId').value;
                        
                        if (id) {
                            this.data.updatePaymentMethod(id, data);
                            this.toast.success('تم التحديث');
                        } else {
                            this.data.addPaymentMethod(data);
                            this.toast.success('تمت الإضافة');
                        }
                        
                        this.closeModal();
                    });
                }
            }

            // ==================== تهيئة التطبيق ====================
            document.addEventListener('DOMContentLoaded', () => {
                const state = new State();
                const telegram = new TelegramService();
                const toast = new Toast();
                const notifications = new NotificationManager();
                const data = new DataService(state, notifications);
                const ui = new UIManager(state, data, telegram, toast, notifications);

                // التحقق من تيليجرام
                if (!telegram.isAvailable) {
                    state.telegramMissing = true;
                    state.loading = false;
                    ui.render();
                    return;
                }

                telegram.init();

                if (!telegram.isValid() || !telegram.getUser()) {
                    state.accessDenied = true;
                    state.loading = false;
                    ui.render();
                    return;
                }

                const user = telegram.getUser();
                state.user = user;
                state.isAdmin = user.id === CONFIG.ADMIN_ID;
                
                data.loadCart(user.id);

                // تطبيق السمة المحفوظة
                if (state.theme === 'light') {
                    document.documentElement.style.setProperty('--tg-theme-bg-color', '#f8fafc');
                    document.documentElement.style.setProperty('--tg-theme-text-color', '#0f172a');
                    document.getElementById('themeIcon').className = 'fa-solid fa-sun';
                }

                state.loading = false;
                ui.render();

                telegram.setMainButton(
                    state.isAdmin ? 'لوحة الإدارة' : 'المحفظة',
                    '#3b82f6',
                    '#ffffff',
                    true,
                    () => {
                        telegram.showPopup({
                            title: state.isAdmin ? 'مرحباً أيها المدير' : 'نظام آمن',
                            message: state.isAdmin 
                                ? `لديك ${data.getPendingCount()} طلب معلق`
                                : `أهلاً ${user.first_name}`,
                            buttons: [{ type: 'ok', text: 'حسناً' }]
                        });
                    }
                );

                toast.success(`مرحباً ${user.first_name}`);

                // إعدادات
                document.getElementById('themeToggle').addEventListener('click', () => {
                    state.theme = state.theme === 'dark' ? 'light' : 'dark';
                    const root = document.documentElement;
                    const icon = document.getElementById('themeIcon');
                    
                    if (state.theme === 'light') {
                        root.style.setProperty('--tg-theme-bg-color', '#f8fafc');
                        root.style.setProperty('--tg-theme-text-color', '#0f172a');
                        icon.className = 'fa-solid fa-sun';
                    } else {
                        root.style.setProperty('--tg-theme-bg-color', '#0f172a');
                        root.style.setProperty('--tg-theme-text-color', '#ffffff');
                        icon.className = 'fa-solid fa-moon';
                    }
                    
                    data.saveTheme();
                    toast.info(`تم تغيير السمة إلى ${state.theme === 'dark' ? 'الداكنة' : 'الفاتحة'}`);
                });

                // لوحة الإعدادات
                const settingsOverlay = document.getElementById('settingsOverlay');
                const settingsPanel = document.getElementById('settingsPanel');
                
                document.getElementById('closeSettings').addEventListener('click', () => {
                    settingsOverlay.classList.remove('open');
                    settingsPanel.classList.remove('open');
                });

                settingsOverlay.addEventListener('click', () => {
                    settingsOverlay.classList.remove('open');
                    settingsPanel.classList.remove('open');
                });

                document.getElementById('languageSelect').value = state.settings.language;
                document.getElementById('languageSelect').addEventListener('change', (e) => {
                    state.settings.language = e.target.value;
                    data.saveSettings();
                    toast.success(`تم تغيير اللغة إلى ${e.target.value === 'ar' ? 'العربية' : 'الإنجليزية'}`);
                });

                document.getElementById('notificationsToggle').checked = state.settings.notifications;
                document.getElementById('notificationsToggle').addEventListener('change', (e) => {
                    state.settings.notifications = e.target.checked;
                    data.saveSettings();
                    toast.success(e.target.checked ? 'تم تفعيل الإشعارات' : 'تم إيقاف الإشعارات');
                });

                document.getElementById('soundToggle').checked = state.settings.sound;
                document.getElementById('soundToggle').addEventListener('change', (e) => {
                    state.settings.sound = e.target.checked;
                    data.saveSettings();
                    toast.soundEnabled = e.target.checked;
                });

                document.getElementById('vibrateToggle').checked = state.settings.vibrate;
                document.getElementById('vibrateToggle').addEventListener('change', (e) => {
                    state.settings.vibrate = e.target.checked;
                    data.saveSettings();
                    toast.vibrateEnabled = e.target.checked;
                });
            });
        })();
    </script>
</body>
</html>
