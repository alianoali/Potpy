<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر تيليجرام الاحترافي | النسخة 2.0</title>
    
    <!-- Tailwind CSS مع تحسينات الأداء -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome 6 مع تحميل محسن -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts (Cairo) مع تحميل ذكي -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        /* ========== المتغيرات الأساسية ========== */
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --primary-light: #60a5fa;
            --secondary: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark-bg: #0f172a;
            --light-bg: #f8fafc;
            --dark-card: #1e293b;
            --light-card: #ffffff;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --shadow-xl: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        /* ========== إعادة التعيين والتحسينات الأساسية ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--tg-theme-bg-color, var(--dark-bg));
            color: var(--tg-theme-text-color, #ffffff);
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
            line-height: 1.6;
        }

        /* ========== تأثيرات الخلفية المتحركة ========== */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 {
            top: -20%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle at 30% 30%, var(--primary), transparent 70%);
        }

        .orb-2 {
            bottom: -20%;
            left: -10%;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle at 70% 70%, var(--secondary), transparent 70%);
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(20px, -20px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* ========== تصميم الزجاج المحسن ========== */
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: var(--transition-smooth);
        }

        .glass:hover {
            background: rgba(40, 51, 69, 0.8);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .glass-card {
            composes: glass;
            border-radius: 1.5rem;
        }

        /* ========== الأنيميشن المتقدم ========== */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        .animate-enter {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-scale {
            animation: scaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* ========== تحميل متطور ========== */
        .loader {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(59, 130, 246, 0.1);
            border-left-color: var(--primary);
            border-right-color: var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loader-pulse {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        /* ========== الصورة الرمزية ========== */
        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 1rem;
            overflow: hidden;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .avatar-sm {
            width: 40px;
            height: 40px;
            font-size: 16px;
        }

        /* ========== الإشعارات المحسنة ========== */
        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: 90%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 14px 20px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            box-shadow: var(--shadow-lg);
            border-right: 4px solid;
            animation: toastSlide 0.3s ease, toastFade 0.3s ease 4.7s forwards;
            pointer-events: auto;
            direction: rtl;
            line-height: 1.5;
        }

        .toast.success { border-right-color: var(--success); }
        .toast.error { border-right-color: var(--danger); }
        .toast.warning { border-right-color: var(--warning); }
        .toast.info { border-right-color: var(--primary); }

        .toast-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .toast.success .toast-icon { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .toast.error .toast-icon { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .toast.warning .toast-icon { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .toast.info .toast-icon { background: rgba(59, 130, 246, 0.2); color: var(--primary); }

        @keyframes toastSlide {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastFade {
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* ========== زر السمة المحسن ========== */
        .theme-toggle {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: var(--transition-smooth);
            color: white;
        }

        .theme-toggle:hover {
            background: rgba(40, 51, 69, 0.9);
            transform: scale(1.05);
        }

        /* ========== لوحة الإعدادات ========== */
        .settings-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(20, 30, 40, 0.98);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px 30px 0 0;
            padding: 24px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            max-height: 80vh;
            overflow-y: auto;
        }

        .settings-panel.open {
            transform: translateY(0);
        }

        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .settings-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        /* ========== المودالات المحسنة ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: rgba(20, 30, 40, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 24px;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            transform: scale(0.9) translateY(20px);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-xl);
        }

        .modal-overlay.open .modal {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }

        /* ========== شارات الحالة ========== */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .badge-warning {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .badge-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .badge-primary {
            background: rgba(59, 130, 246, 0.1);
            color: var(--primary);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        /* ========== ترويسة المتجر ========== */
        .store-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 24px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .store-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        .store-header::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 0, 0, 0.1) 0%, transparent 70%);
            animation: rotate 15s linear infinite reverse;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ========== بطاقات التصنيفات ========== */
        .category-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 12px;
            cursor: pointer;
            transition: var(--transition-smooth);
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .category-card:hover {
            background: rgba(59, 130, 246, 0.05);
            border-color: var(--primary);
            transform: translateX(-4px);
        }

        .category-card.active {
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--primary);
        }

        .category-image {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            flex-shrink: 0;
        }

        /* ========== بطاقات المنتجات ========== */
        .product-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            overflow: hidden;
            transition: var(--transition-smooth);
            border: 1px solid rgba(255, 255, 255, 0.05);
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 20px 30px -10px rgba(59, 130, 246, 0.3);
        }

        .product-image {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: linear-gradient(45deg, #1e293b, #334155);
            position: relative;
        }

        .product-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(239, 68, 68, 0.9);
            backdrop-filter: blur(4px);
            color: white;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            z-index: 2;
        }

        .product-featured {
            position: absolute;
            top: 12px;
            left: 12px;
            background: linear-gradient(135deg, var(--warning), var(--danger));
            color: white;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 600;
            z-index: 2;
        }

        .product-price {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 4px 12px;
            border-radius: 50px;
            color: white;
            font-weight: 700;
            font-size: 14px;
        }

        .quick-view {
            position: absolute;
            top: 12px;
            right: 50%;
            transform: translateX(50%);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: var(--transition-smooth);
            z-index: 3;
        }

        .product-card:hover .quick-view {
            opacity: 1;
        }

        .quick-view:hover {
            background: var(--primary);
            transform: translateX(50%) scale(1.1);
        }

        /* ========== السلايدر ========== */
        .slider-container {
            position: relative;
            width: 100%;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            white-space: nowrap;
            padding: 10px 0;
        }

        .slider-container::-webkit-scrollbar {
            display: none;
        }

        .slider-item {
            display: inline-block;
            scroll-snap-align: start;
            width: 200px;
            margin-left: 12px;
        }

        /* ========== رفع الصور ========== */
        .upload-area {
            border: 2px dashed var(--primary);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition-smooth);
            background: rgba(59, 130, 246, 0.05);
        }

        .upload-area:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--secondary);
            transform: scale(1.02);
        }

        .upload-area.dragover {
            background: rgba(59, 130, 246, 0.2);
            border-color: var(--success);
            transform: scale(1.05);
        }

        .image-preview {
            width: 100px;
            height: 100px;
            border-radius: 12px;
            object-fit: cover;
            border: 3px solid var(--primary);
            transition: var(--transition-smooth);
        }

        .image-preview:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        /* ========== حقول الإدخال ========== */
        .input-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            transition: var(--transition-smooth);
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: rgba(255, 255, 255, 0.1);
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .input-label {
            display: block;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 6px;
        }

        /* ========== الأزرار ========== */
        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            transition: var(--transition-smooth);
            cursor: pointer;
            border: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #dc2626);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.1);
            color: white;
        }

        .btn-outline:hover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.1);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 12px;
        }

        /* ========== التبويبات ========== */
        .tabs {
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.03);
            padding: 4px;
            border-radius: 50px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .tab.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        /* ========== المحفظة ========== */
        .wallet-icon-large {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .wallet-icon-large:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: white;
            font-size: 12px;
            font-weight: 600;
            min-width: 24px;
            height: 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            border: 2px solid var(--dark-bg);
        }

        .balance-badge {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            padding: 12px 24px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 18px;
            color: white;
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3);
        }

        /* ========== قائمة المنتجات الإدارية ========== */
        .admin-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            transition: var(--transition-smooth);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .admin-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--primary);
            transform: translateX(-4px);
        }

        .admin-item .actions {
            display: flex;
            gap: 8px;
        }

        .admin-item .actions button {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: white;

<body>

    <!-- سكريبت التطبيق المحسن -->
    <script>
        (function() {
            'use strict';

            // ======================== الثوابت الأساسية ========================
            const CONFIG = {
                ADMIN_ID: 7609492965,
                DEFAULT_BALANCE: 1000,
                MAX_TRANSACTIONS: 100,
                STORAGE_KEYS: {
                    USERS: 'app_users_v2',
                    WALLET: 'wallet_data_v2',
                    PAYMENT_METHODS: 'payment_methods_v2',
                    DEPOSITS: 'deposit_requests_v2',
                    WITHDRAWALS: 'withdrawal_requests_v2',
                    THEME: 'theme_v2',
                    SETTINGS: 'settings_v2',
                    NOTIFICATIONS: 'notifications_v2',
                    CATEGORIES: 'store_categories_v2',
                    PRODUCTS: 'store_products_v2',
                    ORDERS: 'store_orders_v2',
                    IMAGES: 'store_images_v2',
                    CACHE: 'app_cache_v2',
                    CART: 'cart_v2'
                },
                CACHE_DURATION: 1000 * 60 * 60, // ساعة واحدة
                API_TIMEOUT: 10000,
                MAX_IMAGE_SIZE: 5 * 1024 * 1024, // 5 ميجابايت
                SUPPORTED_IMAGE_TYPES: ['image/jpeg', 'image/png', 'image/webp', 'image/gif']
            };

            // ======================== فائدة: المعرفات الفريدة ========================
            const IdGenerator = {
                generate: (prefix = '') => `${prefix}_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                generateNumeric: () => Math.floor(Math.random() * 1000000) + Date.now()
            };

            // ======================== فائدة: التاريخ والوقت ========================
            const DateUtils = {
                getToday: () => new Date().toISOString().split('T')[0],
                format: (date, locale = 'ar-EG') => new Date(date).toLocaleString(locale),
                formatDate: (date, locale = 'ar-EG') => new Date(date).toLocaleDateString(locale),
                formatTime: (date, locale = 'ar-EG') => new Date(date).toLocaleTimeString(locale),
                isToday: (date) => new Date(date).toDateString() === new Date().toDateString(),
                timeAgo: (date) => {
                    const seconds = Math.floor((new Date() - new Date(date)) / 1000);
                    const intervals = {
                        سنة: 31536000,
                        شهر: 2592000,
                        أسبوع: 604800,
                        يوم: 86400,
                        ساعة: 3600,
                        دقيقة: 60,
                        ثانية: 1
                    };
                    
                    for (const [unit, secondsInUnit] of Object.entries(intervals)) {
                        const interval = Math.floor(seconds / secondsInUnit);
                        if (interval >= 1) {
                            return `منذ ${interval} ${unit}${interval === 1 ? '' : 'ًا'}`;
                        }
                    }
                    return 'الآن';
                }
            };

            // ======================== خدمة التخزين المحسن ========================
            class StorageService {
                static get(key, defaultValue = null) {
                    try {
                        const item = localStorage.getItem(key);
                        if (!item) return defaultValue;
                        
                        const parsed = JSON.parse(item);
                        
                        // التحقق من انتهاء الصلاحية
                        if (parsed.expiry && Date.now() > parsed.expiry) {
                            this.remove(key);
                            return defaultValue;
                        }
                        
                        return parsed.value ?? defaultValue;
                    } catch (error) {
                        console.warn(`StorageService.get error for ${key}:`, error);
                        return defaultValue;
                    }
                }

                static set(key, value, ttl = null) {
                    try {
                        const item = {
                            value,
                            timestamp: Date.now()
                        };
                        
                        if (ttl) {
                            item.expiry = Date.now() + ttl;
                        }
                        
                        localStorage.setItem(key, JSON.stringify(item));
                        return true;
                    } catch (error) {
                        console.warn(`StorageService.set error for ${key}:`, error);
                        
                        // محاولة تنظيف المساحة إذا كان الخطأ بسبب الامتلاء
                        if (error.name === 'QuotaExceededError') {
                            this.cleanup();
                            try {
                                localStorage.setItem(key, JSON.stringify({ value }));
                                return true;
                            } catch (e) {
                                return false;
                            }
                        }
                        
                        return false;
                    }
                }

                static remove(key) {
                    try {
                        localStorage.removeItem(key);
                        return true;
                    } catch (error) {
                        console.warn(`StorageService.remove error for ${key}:`, error);
                        return false;
                    }
                }

                static clear() {
                    try {
                        localStorage.clear();
                        return true;
                    } catch (error) {
                        console.warn('StorageService.clear error:', error);
                        return false;
                    }
                }

                static cleanup() {
                    try {
                        const keys = Object.keys(localStorage);
                        const items = keys.map(key => ({
                            key,
                            ...JSON.parse(localStorage.getItem(key))
                        })).filter(item => item.timestamp);
                        
                        // ترتيب حسب الأقدمية
                        items.sort((a, b) => a.timestamp - b.timestamp);
                        
                        // حذف أقدم 20% من العناصر
                        const toDelete = Math.floor(items.length * 0.2);
                        items.slice(0, toDelete).forEach(item => this.remove(item.key));
                    } catch (error) {
                        console.warn('StorageService.cleanup error:', error);
                    }
                }

                static get size() {
                    let total = 0;
                    for (let key in localStorage) {
                        if (localStorage.hasOwnProperty(key)) {
                            total += localStorage[key].length;
                        }
                    }
                    return total;
                }
            }

            // ======================== خدمة التخزين المؤقت ========================
            class CacheService {
                constructor() {
                    this.prefix = 'cache_';
                    this.defaultTTL = CONFIG.CACHE_DURATION;
                }

                get(key) {
                    return StorageService.get(this.prefix + key);
                }

                set(key, value, ttl = this.defaultTTL) {
                    return StorageService.set(this.prefix + key, value, ttl);
                }

                remove(key) {
                    return StorageService.remove(this.prefix + key);
                }

                clear() {
                    const keys = Object.keys(localStorage).filter(k => k.startsWith(this.prefix));
                    keys.forEach(k => StorageService.remove(k));
                }

                async remember(key, callback, ttl = this.defaultTTL) {
                    let value = this.get(key);
                    
                    if (value === null) {
                        value = await callback();
                        this.set(key, value, ttl);
                    }
                    
                    return value;
                }
            }

            // ======================== خدمة تيليجرام المحسنة ========================
            class TelegramService {
                constructor() {
                    this.tg = window.Telegram?.WebApp || null;
                    this.isAvailable = !!this.tg;
                    this.ready = false;
                }

                init() {
                    if (!this.isAvailable) return false;
                    
                    try {
                        this.tg.expand();
                        this.tg.ready();
                        this.tg.disableVerticalSwipes();
                        this.ready = true;
                        
                        // تكوين الألوان تلقائياً
                        this.applyTheme();
                        
                        return true;
                    } catch (error) {
                        console.error('Telegram init error:', error);
                        return false;
                    }
                }

                getUser() {
                    return this.tg?.initDataUnsafe?.user || null;
                }

                getStartParam() {
                    return this.tg?.initDataUnsafe?.start_param || null;
                }

                isValid() {
                    return this.isAvailable && !!this.tg?.initData;
                }

                close() {
                    this.tg?.close();
                }

                showPopup(params) {
                    return new Promise((resolve) => {
                        this.tg?.showPopup(params, (buttonId) => resolve(buttonId));
                    });
                }

                showAlert(message) {
                    return this.showPopup({
                        title: 'تنبيه',
                        message,
                        buttons: [{ type: 'ok', text: 'حسناً' }]
                    });
                }

                showConfirm(message) {
                    return this.showPopup({
                        title: 'تأكيد',
                        message,
                        buttons: [
                            { type: 'ok', text: 'نعم', id: 'yes' },
                            { type: 'cancel', text: 'لا', id: 'no' }
                        ]
                    });
                }

                setMainButton(text, options = {}) {
                    if (!this.tg) return;
                    
                    const btn = this.tg.MainButton;
                    btn.setText(text);
                    
                    if (options.color) btn.setColor(options.color);
                    if (options.textColor) btn.setTextColor(options.textColor);
                    if (options.isVisible) btn.show(); else btn.hide();
                    if (options.isActive) btn.enable(); else btn.disable();
                    if (options.callback) btn.onClick(options.callback);
                    
                    return btn;
                }

                hideMainButton() {
                    this.tg?.MainButton.hide();
                }

                setBackButton(callback) {
                    if (!this.tg) return;
                    
                    const btn = this.tg.BackButton;
                    btn.show();
                    btn.onClick(callback);
                    
                    return btn;
                }

                hideBackButton() {
                    this.tg?.BackButton.hide();
                }

                hapticFeedback(type = 'impact', style = 'medium') {
                    try {
                        if (!this.tg?.HapticFeedback) return;
                        
                        const haptic = this.tg.HapticFeedback;
                        
                        switch (type) {
                            case 'impact':
                                haptic.impactOccurred(style);
                                break;
                            case 'notification':
                                haptic.notificationOccurred(style);
                                break;
                            case 'selection':
                                haptic.selectionChanged();
                                break;
                        }
                    } catch (error) {
                        console.warn('Haptic feedback error:', error);
                    }
                }

                applyTheme() {
                    if (!this.tg) return;
                    
                    const theme = this.tg.themeParams;
                    document.documentElement.style.setProperty('--tg-theme-bg-color', theme.bg_color || '#0f172a');
                    document.documentElement.style.setProperty('--tg-theme-text-color', theme.text_color || '#ffffff');
                    document.documentElement.style.setProperty('--tg-theme-button-color', theme.button_color || '#3b82f6');
                    document.documentElement.style.setProperty('--tg-theme-button-text-color', theme.button_text_color || '#ffffff');
                }
            }

            // ======================== مدير الإشعارات المحسن ========================
            class ToastManager {
                constructor(containerId) {
                    this.container = document.getElementById(containerId);
                    
                    if (!this.container) {
                        this.container = document.createElement('div');
                        this.container.id = containerId;
                        this.container.className = 'toast-container';
                        document.body.appendChild(this.container);
                    }
                    
                    this.soundEnabled = true;
                    this.vibrateEnabled = true;
                    this.maxToasts = 5;
                    this.activeToasts = [];
                    
                    // تحميل الإعدادات
                    this.loadSettings();
                }

                loadSettings() {
                    const settings = StorageService.get(CONFIG.STORAGE_KEYS.SETTINGS, {});
                    this.soundEnabled = settings.sound ?? true;
                    this.vibrateEnabled = settings.vibrate ?? true;
                }

                show(message, type = 'info', duration = 5000) {
                    // إزالة الإشعارات الزائدة
                    while (this.activeToasts.length >= this.maxToasts) {
                        const oldest = this.activeToasts.shift();
                        oldest.remove();
                    }

                    const toast = document.createElement('div');
                    toast.className = `toast ${type} animate-scale`;
                    
                    const icons = {
                        success: 'fa-solid fa-circle-check',
                        error: 'fa-solid fa-circle-exclamation',
                        warning: 'fa-solid fa-triangle-exclamation',
                        info: 'fa-solid fa-circle-info'
                    };
                    
                    toast.innerHTML = `
                        <div class="toast-icon"><i class="${icons[type] || icons.info}"></i></div>
                        <div class="toast-message">${message}</div>
                    `;
                    
                    this.container.appendChild(toast);
                    this.activeToasts.push(toast);
                    
                    // التأثيرات الحسية
                    this.triggerFeedback(type);
                    
                    // إزالة تلقائية
                    setTimeout(() => {
                        toast.style.opacity = '0';
                        setTimeout(() => {
                            toast.remove();
                            this.activeToasts = this.activeToasts.filter(t => t !== toast);
                        }, 300);
                    }, duration);
                }

                triggerFeedback(type) {
                    // الصوت
                    if (this.soundEnabled) {
                        this.playSound(type);
                    }
                    
                    // الاهتزاز
                    if (this.vibrateEnabled && navigator.vibrate) {
                        navigator.vibrate(type === 'error' ? 300 : 200);
                    }
                }

                playSound(type) {
                    try {
                        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        const oscillator = audioContext.createOscillator();
                        const gainNode = audioContext.createGain();
                        
                        oscillator.connect(gainNode);
                        gainNode.connect(audioContext.destination);
                        
                        oscillator.type = 'sine';
                        
                        switch (type) {
                            case 'success':
                                oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                                oscillator.frequency.exponentialRampToValueAtTime(1200, audioContext.currentTime + 0.1);
                                break;
                            case 'error':
                                oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
                                oscillator.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + 0.2);
                                break;
                            case 'warning':
                                oscillator.frequency.setValueAtTime(600, audioContext.currentTime);
                                oscillator.frequency.setValueAtTime(600, audioContext.currentTime + 0.1);
                                oscillator.frequency.setValueAtTime(600, audioContext.currentTime + 0.2);
                                break;
                            default:
                                oscillator.frequency.value = 500;
                        }
                        
                        gainNode.gain.value = 0.1;
                        oscillator.start();
                        oscillator.stop(audioContext.currentTime + 0.3);
                    } catch (error) {
                        console.log('Audio not supported:', error);
                    }
                }

                success(message) { this.show(message, 'success'); }
                error(message) { this.show(message, 'error'); }
                warning(message) { this.show(message, 'warning'); }
                info(message) { this.show(message, 'info'); }
            }

            // ======================== مدير الإشعارات الداخلية ========================
            class NotificationService {
                constructor() {
                    this.STORAGE_KEY = CONFIG.STORAGE_KEYS.NOTIFICATIONS;
                    this.notifications = this.load();
                    this.listeners = new Set();
                }

                load() {
                    return StorageService.get(this.STORAGE_KEY, []);
                }

                save() {
                    StorageService.set(this.STORAGE_KEY, this.notifications);
                }

                add(userId, title, message, type = 'info', data = {}) {
                    const notification = {
                        id: IdGenerator.generate('notif'),
                        userId,
                        title,
                        message,
                        type,
                        data,
                        read: false,
                        createdAt: new Date().toISOString()
                    };
                    
                    this.notifications.unshift(notification);
                    
                    // الحد الأقصى 100 إشعار
                    if (this.notifications.length > 100) {
                        this.notifications.pop();
                    }
                    
                    this.save();
                    this.notifyListeners('add', notification);
                    
                    return notification;
                }

                markAsRead(id) {
                    const notification = this.notifications.find(n => n.id === id);
                    if (notification && !notification.read) {
                        notification.read = true;
                        this.save();
                        this.notifyListeners('update', notification);
                    }
                }

                markAllAsRead(userId) {
                    let count = 0;
                    this.notifications.forEach(n => {
                        if (n.userId === userId && !n.read) {
                            n.read = true;
                            count++;
                        }
                    });
                    
                    if (count > 0) {
                        this.save();
                        this.notifyListeners('markAll', { userId, count });
                    }
                    
                    return count;
                }

                getForUser(userId, limit = 50) {
                    return this.notifications
                        .filter(n => n.userId === userId)
                        .slice(0, limit);
                }

                getUnreadCount(userId) {
                    return this.notifications.filter(n => n.userId === userId && !n.read).length;
                }

                delete(id) {
                    const index = this.notifications.findIndex(n => n.id === id);
                    if (index !== -1) {
                        const [deleted] = this.notifications.splice(index, 1);
                        this.save();
                        this.notifyListeners('delete', deleted);
                        return true;

            class ImageService {
                constructor() {
                    this.STORAGE_KEY = CONFIG.STORAGE_KEYS.IMAGES;
                    this.images = this.load();
                    this.maxSize = CONFIG.MAX_IMAGE_SIZE;
                }

                load() {
                    return StorageService.get(this.STORAGE_KEY, {});
                }

                save() {
                    StorageService.set(this.STORAGE_KEY, this.images);
                }

                async upload(file, options = {}) {
                    return new Promise((resolve, reject) => {
                        // التحقق من النوع
                        if (!CONFIG.SUPPORTED_IMAGE_TYPES.includes(file.type)) {
                            reject(new Error('نوع الملف غير مدعوم'));
                            return;
                        }
                        
                        // التحقق من الحجم
                        if (file.size > this.maxSize) {
                            reject(new Error(`حجم الملف كبير جداً (الحد الأقصى ${this.maxSize / 1024 / 1024} ميجابايت)`));
                            return;
                        }
                        
                        const reader = new FileReader();
                        
                        reader.onload = (e) => {
                            const imageId = options.id || IdGenerator.generate('img');
                            
                            this.images[imageId] = {
                                data: e.target.result,
                                name: file.name,
                                type: file.type,
                                size: file.size,
                                uploadedAt: new Date().toISOString(),
                                ...options.metadata
                            };
                            
                            this.save();
                            
                            // تنظيف الصور القديمة إذا لزم الأمر
                            this.cleanup();
                            
                            resolve(imageId);
                        };
                        
                        reader.onerror = () => reject(new Error('فشل قراءة الملف'));
                        reader.readAsDataURL(file);
                    });
                }

                get(id) {
                    return this.images[id];
                }

                getUrl(id) {
                    return this.images[id]?.data || null;
                }

                delete(id) {
                    delete this.images[id];
                    this.save();
                }

                deleteMultiple(ids) {
                    ids.forEach(id => delete this.images[id]);
                    this.save();
                }

                cleanup(maxImages = 100) {
                    const ids = Object.keys(this.images);
                    
                    if (ids.length > maxImages) {
                        // ترتيب حسب تاريخ الرفع
                        const sorted = ids
                            .map(id => ({ id, ...this.images[id] }))
                            .sort((a, b) => new Date(b.uploadedAt) - new Date(a.uploadedAt));
                        
                        // الاحتفاظ بأحدث maxImages صورة فقط
                        const toDelete = sorted.slice(maxImages).map(item => item.id);
                        this.deleteMultiple(toDelete);
                    }
                }

                clear() {
                    this.images = {};
                    this.save();
                }

                getSize() {
                    return Object.keys(this.images).length;
                }

                async compress(imageId, quality = 0.8) {
                    const image = this.get(imageId);
                    if (!image) return null;
                    
                    return new Promise((resolve) => {
                        const img = new Image();
                        img.src = image.data;
                        
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            
                            canvas.width = img.width;
                            canvas.height = img.height;
                            ctx.drawImage(img, 0, 0);
                            
                            const compressed = canvas.toDataURL(image.type, quality);
                            
                            image.data = compressed;
                            image.compressed = true;
                            this.save();
                            
                            resolve(compressed);
                        };
                    });
                }
            }

                    this.saveProducts();
                    this.saveCategories(); // تحديث عدد المنتجات
                    
                    return product;
                }

                updateProduct(id, data) {
                    const index = this.products.findIndex(p => p.id === id);
                    if (index !== -1) {
                        this.products[index] = { ...this.products[index], ...data };
                        this.saveProducts();
                        this.saveCategories(); // تحديث عدد المنتجات
                        return true;
                    }
                    return false;
                }

                deleteProduct(id) {
                    // حذف الصور المرتبطة
                    const product = this.getProduct(id);
                    if (product) {
                        if (product.imageId) {
                            this.imageService.delete(product.imageId);
                        }
                        if (product.images && product.images.length) {
                            this.imageService.deleteMultiple(product.images);
                        }
                    }
                    
                    this.products = this.products.filter(p => p.id !== id);
                    this.saveProducts();
                    this.saveCategories(); // تحديث عدد المنتجات
                }

                incrementSold(id) {
                    const product = this.getProduct(id);
                    if (product) {
                        product.totalSold = (product.totalSold || 0) + 1;
                        this.saveProducts();
                    }
                }

                // ========== الطلبات ==========
                loadOrders() {
                    return StorageService.get(this.ORDERS_KEY, []);
                }

                saveOrders() {
                    StorageService.set(this.ORDERS_KEY, this.orders);
                }

                createOrder(product, fields, userId, userData = {}, paymentMethod = null) {
                    const order = {
                        id: IdGenerator.generate('ord'),
                        userId,
                        userName: userData.name || '',
                        productId: product.id,
                        productName: product.name,
                        price: product.price,
                        fields,
                        paymentMethod: paymentMethod ? {
                            id: paymentMethod.id,
                            name: paymentMethod.name,
                            type: paymentMethod.type
                        } : null,
                        status: product.fulfillment.type === 'auto' ? 'completed' : 'pending',
                        fulfillment: product.fulfillment,
                        createdAt: new Date().toISOString(),
                        updatedAt: new Date().toISOString()
                    };
                    
                    this.orders.unshift(order);
                    
                    // تحديث إحصائيات المنتج
                    this.incrementSold(product.id);
                    
                    // حفظ الطلبات
                    this.saveOrders();
                    
                    return order;
                }

                getOrders(userId = null, limit = 100) {
                    let orders = this.orders;
                    
                    if (userId) {
                        orders = orders.filter(o => o.userId === userId);
                    }
                    
                    return orders.slice(0, limit);
                }

                getOrder(id) {
                    return this.orders.find(o => o.id === id);
                }

                updateOrderStatus(id, status, metadata = {}) {
                    const order = this.getOrder(id);
                    if (order) {
                        order.status = status;
                        order.updatedAt = new Date().toISOString();
                        order.metadata = { ...order.metadata, ...metadata };
                        this.saveOrders();
                        return true;
                    }
                    return false;
                }

                completeOrder(id, fulfillmentData = {}) {
                    return this.updateOrderStatus(id, 'completed', { fulfillmentData });
                }

                getPendingOrders() {
                    return this.orders.filter(o => o.status === 'pending');
                }

                getStats() {
                    const total = this.orders.length;
                    const completed = this.orders.filter(o => o.status === 'completed').length;
                    const pending = this.orders.filter(o => o.status === 'pending').length;
                    const cancelled = this.orders.filter(o => o.status === 'cancelled').length;
                    
                    const totalRevenue = this.orders
                        .filter(o => o.status === 'completed')
                        .reduce((sum, o) => sum + o.price, 0);
                    
                    return {
                        total,
                        completed,
                        pending,
                        cancelled,
                        totalRevenue
                    };
                }
            }

            // ======================== مدير الإحصائيات ========================
            class StatsService {
                constructor() {
                    this.STORAGE_KEY = 'app_stats_v2';
                    this.stats = this.load();
                }

                load() {
                    return StorageService.get(this.STORAGE_KEY, {
                        users: 0,
                        products: 0,
                        orders: 0,
                        revenue: 0,
                        daily: {},
                        monthly: {}
                    });
                }

                save() {
                    StorageService.set(this.STORAGE_KEY, this.stats);
                }

                increment(key, value = 1) {
                    if (this.stats.hasOwnProperty(key)) {
                        this.stats[key] += value;
                    }
                    
                    // تحديث الإحصائيات اليومية
                    const today = DateUtils.getToday();
                    this.stats.daily[today] = this.stats.daily[today] || { orders: 0, revenue: 0 };
                    
                    if (key === 'orders') {
                        this.stats.daily[today].orders += value;
                    } else if (key === 'revenue') {
                        this.stats.daily[today].revenue += value;
                    }
                    
                    this.save();
                }

                set(key, value) {
                    this.stats[key] = value;
                    this.save();
                }

                get(key) {
                    return this.stats[key];
                }

                getAll() {
                    return { ...this.stats };
                }

                getDaily(date = null) {
                    const day = date || DateUtils.getToday();
                    return this.stats.daily[day] || { orders: 0, revenue: 0 };
                }

                getWeekly() {
                    const result = { orders: 0, revenue: 0 };
                    const today = new Date();
                    
                    for (let i = 0; i < 7; i++) {
                        const date = new Date(today);
                        date.setDate(date.getDate() - i);
                        const dayKey = date.toISOString().split('T')[0];
                        const dayStats = this.stats.daily[dayKey] || { orders: 0, revenue: 0 };
                        
                        result.orders += dayStats.orders;
                        result.revenue += dayStats.revenue;
                    }
                    
                    return result;
                }

                getMonthly() {
                    const result = { orders: 0, revenue: 0 };
                    const today = new Date();
                    const currentMonth = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
                    
                    Object.entries(this.stats.daily).forEach(([date, stats]) => {
                        if (date.startsWith(currentMonth)) {
                            result.orders += stats.orders;
                            result.revenue += stats.revenue;
                        }
                    });
                    
                    return result;
                }

                reset() {
                    this.stats = {
                        users: 0,
                        products: 0,
                        orders: 0,
                        revenue: 0,
                        daily: {},
                        monthly: {}
                    };
                    this.save();
                }
            }
