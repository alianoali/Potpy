<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة تيليجرام المتطورة - ألعاب وروليت</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts (Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--tg-theme-bg-color, #0f172a);
            color: var(--tg-theme-text-color, #ffffff);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* الخلفية المتحركة */
        .ambient-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }
        
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 10s infinite ease-in-out;
        }
        
        .orb-1 { top: -10%; right: -10%; width: 300px; height: 300px; background: #3b82f6; animation-delay: 0s; }
        .orb-2 { bottom: -10%; left: -10%; width: 250px; height: 250px; background: #8b5cf6; animation-delay: 5s; }
        .orb-3 { top: 50%; left: 50%; width: 200px; height: 200px; background: #ef4444; animation-delay: 2.5s; opacity: 0.2; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, 40px); }
        }

        /* Glassmorphism */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(40, 51, 69, 0.8);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Animations */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-enter {
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Loader */
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--tg-theme-button-color, #3b82f6);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Avatar */
        .default-avatar {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            font-weight: bold;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 90%;
            max-width: 350px;
            pointer-events: none;
        }

        .toast {
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 12px 20px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: toastSlideUp 0.3s ease, toastFadeOut 0.3s ease 5.7s forwards;
            pointer-events: auto;
            direction: rtl;
            white-space: pre-line;
            line-height: 1.6;
        }

        .toast.success { border-right: 4px solid #10b981; }
        .toast.error { border-right: 4px solid #ef4444; }
        .toast.warning { border-right: 4px solid #f59e0b; }
        .toast.info { border-right: 4px solid #3b82f6; }

        .toast-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .toast.success .toast-icon { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .toast.error .toast-icon { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .toast.warning .toast-icon { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .toast.info .toast-icon { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }

        .toast-message {
            flex: 1;
        }

        @keyframes toastSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastFadeOut {
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* Theme toggle */
        .theme-toggle {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: rgba(40, 51, 69, 0.8);
        }

        /* Settings panel */
        .settings-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 1000;
            border-radius: 30px 30px 0 0;
        }

        .settings-panel.open {
            transform: translateY(0);
        }

        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .settings-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        /* Wallet Modal */
        .wallet-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .wallet-modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .wallet-modal {
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .wallet-modal-overlay.open .wallet-modal {
            transform: scale(1);
        }

        .wallet-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 12px;
            flex-wrap: wrap;
        }

        .wallet-tab {
            flex: 1;
            min-width: 70px;
            padding: 8px 5px;
            text-align: center;
            border-radius: 12px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.5);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
        }

        .wallet-tab.active {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .wallet-tab i {
            margin-left: 6px;
            font-size: 14px;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .transaction-amount.positive { color: #10b981; }
        .transaction-amount.negative { color: #ef4444; }

        /* أيقونة المحفظة الكبيرة والمتطورة */
        .wallet-icon-large {
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, #3b82f6, #8b5cf6);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.5), 0 0 0 2px rgba(255,255,255,0.1) inset;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: floatWallet 3s infinite ease-in-out;
            position: relative;
            overflow: hidden;
        }

        .wallet-icon-large::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), transparent 70%);
            opacity: 0.6;
        }

        .wallet-icon-large i {
            font-size: 36px;
            color: white;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            animation: pulseIcon 2s infinite ease-in-out;
            position: relative;
            z-index: 2;
        }

        .wallet-icon-large:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.8), 0 0 0 4px rgba(255,255,255,0.2) inset;
        }

        @keyframes floatWallet {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        @keyframes pulseIcon {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* بطاقة الرصيد الصغيرة */
        .balance-badge {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 6px 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 12px;
        }

        .balance-badge i {
            color: #fbbf24;
        }

        /* شارة الإشعارات */
        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.2);
            animation: pulse-badge 1.5s infinite;
        }

        @keyframes pulse-badge {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* طرق الدفع - صور وأيقونات */
        .payment-method {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
        }

        .payment-method:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .payment-method.selected {
            background: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
        }

        .payment-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: #334155;
            color: white;
            flex-shrink: 0;
        }
        
        .payment-icon img {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            object-fit: cover;
        }

        /* تفاصيل طريقة الدفع عند الاختيار */
        .payment-details {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 12px;
            margin: 10px 0 15px 0;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 13px;
            line-height: 1.6;
        }

        .payment-details strong {
            color: #3b82f6;
        }

        /* لوحة المشرف */
        .admin-requests-panel {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 16px;
            margin-top: 16px;
        }

        .request-item {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .request-id {
            font-size: 10px;
            color: #94a3b8;
            font-family: monospace;
        }

        .request-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-accept {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-accept:hover {
            background: rgba(16, 185, 129, 0.3);
        }

        .btn-reject {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-reject:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .badge-pending {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 600;
        }

        /* أزرار تحرير طرق الدفع */
        .payment-method-admin {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .payment-method-admin .actions button {
            background: transparent;
            border: none;
            color: #94a3b8;
            margin: 0 4px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .payment-method-admin .actions button:hover {
            color: white;
        }
        .payment-method-admin .actions button.delete:hover { color: #ef4444; }
        .payment-method-admin .actions button.edit:hover { color: #3b82f6; }

        /* ========== أنماط الألعاب ========== */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 16px;
        }

        .game-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 20px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .game-card:hover::before {
            opacity: 1;
        }

        .game-icon {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 24px;
            color: white;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .game-title {
            font-weight: bold;
            margin-bottom: 4px;
        }

        .game-players {
            font-size: 12px;
            color: #94a3b8;
        }

        .game-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ef4444;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* لعبة الروليت الروسية */
        .roulette-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            padding: 20px;
            margin-top: 16px;
        }

        .gun-model {
            width: 100%;
            height: 60px;
            background: linear-gradient(90deg, #475569, #334155);
            border-radius: 30px;
            position: relative;
            margin: 30px 0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .chamber {
            position: absolute;
            width: 50px;
            height: 50px;
            background: #1e293b;
            border-radius: 50%;
            top: 5px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: inset 0 -2px 5px rgba(0,0,0,0.5), 0 2px 5px rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            border: 2px solid #64748b;
        }

        .chamber.loaded {
            background: #991b1b;
            box-shadow: 0 0 20px #ef4444;
            animation: pulseRed 1s infinite;
        }

        @keyframes pulseRed {
            0% { box-shadow: 0 0 20px #ef4444; }
            50% { box-shadow: 0 0 40px #ef4444; }
            100% { box-shadow: 0 0 20px #ef4444; }
        }

        .chamber.current {
            border: 3px solid #fbbf24;
            transform: scale(1.1);
        }

        .chamber.shot {
            background: #450a0a;
            transform: scale(0.9);
        }

        .bullet-indicator {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin: 20px 0;
        }

        .bullet-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #475569;
            transition: all 0.3s ease;
        }

        .bullet-dot.loaded {
            background: #ef4444;
            box-shadow: 0 0 10px #ef4444;
        }

        .bullet-dot.used {
            background: #1e293b;
            opacity: 0.3;
        }

        .player-avatar {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            position: relative;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .player-avatar.current-turn {
            border-color: #fbbf24;
            transform: scale(1.1);
            box-shadow: 0 0 20px #fbbf24;
        }

        .player-avatar.loser {
            border-color: #ef4444;
            filter: grayscale(0.5);
        }

        .player-avatar.winner {
            border-color: #10b981;
            box-shadow: 0 0 20px #10b981;
        }

        .player-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .bet-slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #334155;
            outline: none;
            -webkit-appearance: none;
        }

        .bet-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            box-shadow: 0 0 10px #3b82f6;
        }

        .challenge-item {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .challenge-creator {
            font-weight: bold;
            font-size: 14px;
        }

        .challenge-bet {
            color: #fbbf24;
            font-weight: bold;
        }

        .join-challenge-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .join-challenge-btn:hover {
            background: #2563eb;
        }

        .join-challenge-btn:disabled {
            background: #475569;
            cursor: not-allowed;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="ambient-light">

    <script>
        (function() {
            // ======================== الإعدادات الثابتة ========================
            const CONFIG = {
                ADMIN_ID: 7609492965, // غير هذا إلى معرف المشرف الخاص بك
                DEFAULT_BALANCE: 1000,
                MAX_TRANSACTIONS: 50,
                STORAGE_KEYS: {
                    USERS: 'app_users',
                    BOTS: 'app_bots',
                    DAILY_OPS: 'daily_ops',
                    WALLET: 'wallet_data',
                    PAYMENT_METHODS: 'payment_methods',
                    DEPOSIT_REQUESTS: 'deposit_requests',
                    WITHDRAWAL_REQUESTS: 'withdrawal_requests',
                    THEME: 'theme',
                    SETTINGS: 'settings',
                    NOTIFICATIONS: 'notifications',
                    GAMES: 'games_data',
                    CHALLENGES: 'active_challenges'
                }
            };

            // ======================== خدمات مساعدة ========================
            class StorageService {
                static get(key, defaultValue = null) {
                    try {
                        const value = localStorage.getItem(key);
                        return value !== null ? JSON.parse(value) : defaultValue;
                    } catch (e) {
                        console.warn(`Storage read error for key ${key}:`, e);
                        return defaultValue;
                    }
                }

                static set(key, value) {
                    try {
                        localStorage.setItem(key, JSON.stringify(value));
                        return true;
                    } catch (e) {
                        console.warn(`Storage write error for key ${key}:`, e);
                        return false;
                    }
                }

                static remove(key) {
                    try {
                        localStorage.removeItem(key);
                        return true;
                    } catch (e) {
                        console.warn(`Storage remove error for key ${key}:`, e);
                        return false;
                    }
                }
            }

            class DateUtils {
                static getTodayDate() {
                    return new Date().toISOString().split('T')[0];
                }

                static formatDateTime(isoString) {
                    return new Date(isoString).toLocaleString('ar-EG');
                }

                static formatDate(isoString) {
                    return new Date(isoString).toLocaleDateString('ar-EG');
                }
            }

            class IdGenerator {
                static generate(prefix = '') {
                    return prefix + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                }
            }

            // ======================== نظام التنبيهات المتطور ========================
            class ToastManager {
                constructor(containerId) {
                    this.container = document.getElementById(containerId);
                    if (!this.container) {
                        this.container = document.createElement('div');
                        this.container.id = containerId;
                        this.container.className = 'toast-container';
                        document.body.appendChild(this.container);
                    }
                    this.activeToasts = [];
                    this.soundEnabled = true;
                    this.vibrateEnabled = true;
                }

                show(message, type = 'info', duration = 5000) {
                    const toast = document.createElement('div');
                    toast.className = `toast ${type}`;
                    
                    const iconMap = {
                        success: 'fa-solid fa-check',
                        error: 'fa-solid fa-exclamation',
                        warning: 'fa-solid fa-triangle-exclamation',
                        info: 'fa-solid fa-info'
                    };
                    
                    toast.innerHTML = `
                        <div class="toast-icon"><i class="${iconMap[type] || iconMap.info}"></i></div>
                        <div class="toast-message">${message}</div>
                    `;
                    
                    this.container.appendChild(toast);
                    this.activeToasts.push(toast);
                    
                    // تشغيل صوت إذا كان مفعلاً
                    if (this.soundEnabled && (type === 'success' || type === 'warning' || type === 'info')) {
                        this.playSound(type);
                    }
                    
                    // اهتزاز إذا كان مفعلاً (للموبايل)
                    if (this.vibrateEnabled && navigator.vibrate) {
                        navigator.vibrate(200);
                    }
                    
                    setTimeout(() => {
                        toast.remove();
                        this.activeToasts = this.activeToasts.filter(t => t !== toast);
                    }, duration);
                }

                playSound(type) {
                    try {
                        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        const oscillator = audioCtx.createOscillator();
                        const gainNode = audioCtx.createGain();
                        
                        oscillator.connect(gainNode);
                        gainNode.connect(audioCtx.destination);
                        
                        oscillator.type = 'sine';
                        oscillator.frequency.value = type === 'success' ? 800 : (type === 'warning' ? 600 : 400);
                        gainNode.gain.value = 0.1;
                        
                        oscillator.start();
                        oscillator.stop(audioCtx.currentTime + 0.2);
                    } catch (e) {
                        console.log('Web Audio not supported');
                    }
                }

                success(message) { this.show(message, 'success'); }
                error(message) { this.show(message, 'error'); }
                warning(message) { this.show(message, 'warning'); }
                info(message) { this.show(message, 'info'); }
            }

            // ======================== خدمة تيليجرام ========================
            class TelegramService {
                constructor() {
                    this.tg = window.Telegram?.WebApp || null;
                    this.isAvailable = !!this.tg;
                }

                init() {
                    if (!this.isAvailable) return false;
                    this.tg.expand();
                    this.tg.ready();
                    return true;
                }

                getUser() {
                    return this.tg?.initDataUnsafe?.user || null;
                }

                isValid() {
                    return this.isAvailable && this.tg?.initData;
                }

                close() {
                    this.tg?.close();
                }

                showPopup(params) {
                    this.tg?.showPopup(params);
                }

                setMainButton(text, color = '#3b82f6', textColor = '#ffffff', isVisible = true, callback = null) {
                    if (!this.tg) return;
                    const btn = this.tg.MainButton;
                    btn.setText(text);
                    btn.setColor(color);
                    btn.setTextColor(textColor);
                    if (isVisible) btn.show(); else btn.hide();
                    if (callback) btn.onClick(callback);
                }

                hideMainButton() {
                    this.tg?.MainButton.hide();
                }
            }

            // ======================== نظام الإشعارات الجديد ========================
            class NotificationService {
                constructor(state) {
                    this.state = state;
                    this.STORAGE_KEY = CONFIG.STORAGE_KEYS.NOTIFICATIONS;
                }

                loadNotifications() {
                    const saved = StorageService.get(this.STORAGE_KEY, []);
                    this.state.notifications = saved;
                }

                saveNotifications() {
                    StorageService.set(this.STORAGE_KEY, this.state.notifications);
                }

                addNotification(userId, title, message, type = 'info') {
                    const notification = {
                        id: IdGenerator.generate('notif_'),
                        userId,
                        title,
                        message,
                        type,
                        read: false,
                        date: new Date().toISOString()
                    };
                    this.state.notifications.push(notification);
                    this.saveNotifications();
                    
                    window.dispatchEvent(new CustomEvent('newNotification', { detail: notification }));
                    
                    return notification;
                }

                markAsRead(notificationId) {
                    const notif = this.state.notifications.find(n => n.id === notificationId);
                    if (notif) {
                        notif.read = true;
                        this.saveNotifications();
                    }
                }

                markAllAsRead(userId) {
                    this.state.notifications.forEach(n => {
                        if (n.userId === userId && !n.read) n.read = true;
                    });
                    this.saveNotifications();
                }

                getUserNotifications(userId) {
                    return this.state.notifications
                        .filter(n => n.userId === userId)
                        .sort((a, b) => new Date(b.date) - new Date(a.date));
                }

                getUnreadCount(userId) {
                    return this.state.notifications.filter(n => n.userId === userId && !n.read).length;
                }
            }

            // ======================== نظام الألعاب ========================
            class GamesService {
                constructor(state, dataService, toast, notificationService) {
                    this.state = state;
                    this.data = dataService;
                    this.toast = toast;
                    this.notifications = notificationService;
                    this.STORAGE_KEY = CONFIG.STORAGE_KEYS.CHALLENGES;
                    this.activeChallenges = [];
                    this.loadChallenges();
                }

                loadChallenges() {
                    const saved = StorageService.get(this.STORAGE_KEY, []);
                    this.activeChallenges = saved.filter(c => c.status === 'waiting' || c.status === 'active');
                }

                saveChallenges() {
                    StorageService.set(this.STORAGE_KEY, this.activeChallenges);
                }

                createRouletteChallenge(creatorId, creatorName, betAmount, isPublic = true) {
                    // التحقق من الرصيد
                    if (this.state.balance < betAmount) {
                        return { success: false, message: 'رصيدك غير كافٍ لإنشاء التحدي' };
                    }

                    const challenge = {
                        id: IdGenerator.generate('roulette_'),
                        gameType: 'russian-roulette',
                        creatorId,
                        creatorName,
                        betAmount,
                        isPublic,
                        status: 'waiting',
                        createdAt: new Date().toISOString(),
                        players: [{
                            id: creatorId,
                            name: creatorName,
                            accepted: true,
                            ready: true
                        }],
                        maxPlayers: 2,
                        settings: {
                            chambers: 6,
                            bullets: 1,
                            currentChamber: 0,
                            bulletPosition: Math.floor(Math.random() * 6),
                            turn: creatorId,
                            gameState: 'waiting',
                            results: []
                        }
                    };

                    // تجميد الرصيد مؤقتاً
                    this.state.balance -= betAmount;
                    this.data.saveWallet();
                    
                    this.activeChallenges.push(challenge);
                    this.saveChallenges();
                    
                    return { success: true, challenge };
                }

                joinRouletteChallenge(challengeId, userId, userName) {
                    const challenge = this.activeChallenges.find(c => c.id === challengeId);
                    
                    if (!challenge) {
                        return { success: false, message: 'التحدي غير موجود' };
                    }
                    
                    if (challenge.status !== 'waiting') {
                        return { success: false, message: 'لا يمكن الانضمام لهذا التحدي الآن' };
                    }
                    
                    if (challenge.players.length >= challenge.maxPlayers) {
                        return { success: false, message: 'اكتمل عدد اللاعبين' };
                    }
                    
                    // التحقق من رصيد اللاعب
                    if (this.state.balance < challenge.betAmount) {
                        return { success: false, message: 'رصيدك غير كافٍ للانضمام لهذا التحدي' };
                    }
                    
                    // تجميد رصيد اللاعب
                    this.state.balance -= challenge.betAmount;
                    this.data.saveWallet();
                    
                    challenge.players.push({
                        id: userId,
                        name: userName,
                        accepted: true,
                        ready: true
                    });
                    
                    // إذا اكتمل العدد، ابدأ اللعبة
                    if (challenge.players.length === challenge.maxPlayers) {
                        challenge.status = 'active';
                        challenge.settings.gameState = 'active';
                        
                        // اختيار من يبدأ عشوائياً
                        const randomIndex = Math.floor(Math.random() * 2);
                        challenge.settings.turn = challenge.players[randomIndex].id;
                        
                        // إشعار اللاعبين ببدء اللعبة
                        challenge.players.forEach(player => {
                            if (player.id !== userId) {
                                this.notifications.addNotification(
                                    player.id,
                                    '🎮 بدء تحدي الروليت',
                                    `انضم ${userName} إلى تحدي الروليت بمبلغ ${challenge.betAmount}. حظاً موفقاً!`,
                                    'info'
                                );
                            }
                        });
                        
                        this.notifications.addNotification(
                            userId,
                            '🎮 انضممت إلى التحدي',
                            `انضممت إلى تحدي الروليت بمبلغ ${challenge.betAmount}. دورك ${challenge.settings.turn === userId ? 'الآن' : 'قادم'}`,
                            'success'
                        );
                    }
                    
                    this.saveChallenges();
                    
                    return { success: true, challenge };
                }

                takeRouletteTurn(challengeId, userId) {
                    const challenge = this.activeChallenges.find(c => c.id === challengeId);
                    
                    if (!challenge) {
                        return { success: false, message: 'التحدي غير موجود' };
                    }
                    
                    if (challenge.status !== 'active') {
                        return { success: false, message: 'اللعبة غير نشطة' };
                    }
                    
                    if (challenge.settings.turn !== userId) {
                        return { success: false, message: 'ليس دورك الآن' };
                    }
                    
                    const settings = challenge.settings;
                    const currentChamber = settings.currentChamber;
                    const bulletPosition = settings.bulletPosition;
                    
                    // تحديد نتيجة الطلقة
                    const isShot = currentChamber === bulletPosition;
                    
                    // تسجيل النتيجة
                    const result = {
                        playerId: userId,
                        chamber: currentChamber,
                        isShot,
                        timestamp: new Date().toISOString()
                    };
                    
                    settings.results.push(result);
                    
                    // إذا أصيب اللاعب
                    if (isShot) {
                        // تحديد الخاسر (اللاعب الحالي)
                        const loser = challenge.players.find(p => p.id === userId);
                        const winner = challenge.players.find(p => p.id !== userId);
                        
                        // تحويل الرهان إلى الفائز
                        const totalBet = challenge.betAmount * 2;
                        this.state.balance += totalBet;
                        this.data.saveWallet();
                        
                        // تسجيل النتيجة النهائية
                        challenge.status = 'finished';
                        settings.gameState = 'finished';
                        settings.winner = winner.id;
                        
                        // إضافة معاملة للفائز
                        this.data.addTransaction('game_win', totalBet, `فوز في تحدي الروليت ضد ${loser.name}`);
                        
                        // إشعارات
                        this.notifications.addNotification(
                            winner.id,
                            '🏆 فوز في تحدي الروليت!',
                            `تهانينا! لقد فزت في تحدي الروليت ضد ${loser.name} وربحت ${totalBet}`,
                            'success'
                        );
                        
                        this.notifications.addNotification(
                            loser.id,
                            '💥 خسارة في تحدي الروليت',
                            `للأسف، لقد خسرت في تحدي الروليت ضد ${winner.name} وخسرت ${challenge.betAmount}`,
                            'error'
                        );
                        
                        this.toast.success(`🔫 انفجرت الطلقة! ${loser.name} خسر التحدي!`);
                    } else {
                        // الانتقال إلى الغرفة التالية
                        settings.currentChamber++;
                        
                        // تبديل الدور
                        const nextPlayer = challenge.players.find(p => p.id !== userId);
                        settings.turn = nextPlayer.id;
                        
                        this.toast.info(`💨 طلقة فارغة... دور ${nextPlayer.name} الآن`);
                        
                        this.notifications.addNotification(
                            nextPlayer.id,
                            '🔫 دورك في تحدي الروليت',
                            `حان دورك في تحدي الروليت! الرهان: ${challenge.betAmount}`,
                            'info'
                        );
                    }
                    
                    this.saveChallenges();
                    
                    return { success: true, challenge, isShot };
                }

                cancelChallenge(challengeId, userId) {
                    const challenge = this.activeChallenges.find(c => c.id === challengeId);
                    
                    if (!challenge) {
                        return { success: false, message: 'التحدي غير موجود' };
                    }
                    
                    if (challenge.creatorId !== userId) {
                        return { success: false, message: 'لست منشئ هذا التحدي' };
                    }
                    
                    if (challenge.status !== 'waiting') {
                        return { success: false, message: 'لا يمكن إلغاء التحدي بعد بدئه' };
                    }
                    
                    // استرجاع الرصيد
                    this.state.balance += challenge.betAmount;
                    this.data.saveWallet();
                    
                    // إزالة التحدي
                    this.activeChallenges = this.activeChallenges.filter(c => c.id !== challengeId);
                    this.saveChallenges();
                    
                    return { success: true };
                }

                getActiveChallenges() {
                    return this.activeChallenges.filter(c => c.status === 'waiting');
                }

                getUserActiveGame(userId) {
                    return this.activeChallenges.find(c => 
                        (c.status === 'waiting' && c.creatorId === userId) ||
                        (c.status === 'active' && c.players.some(p => p.id === userId))
                    );
                }
            }

            // ======================== إدارة الحالة المركزية (State) ========================
            class AppState extends EventTarget {
                constructor() {
                    super();
                    this.user = null;
                    this.isAdmin = false;
                    this.loading = true;
                    this.accessDenied = false;
                    this.telegramMissing = false;
                    this.balance = CONFIG.DEFAULT_BALANCE;
                    this.stats = { users: 0, bots: 0, dailyOps: 0 };
                    this.theme = 'dark';
                    this.settings = { language: 'ar', notifications: true, sound: true, vibrate: true };
                    this.wallet = { transactions: [], address: 'T9eK3zX8qLp2mN5rV7bA1cD4fG6hJ8kQ' };
                    this.depositRequests = [];
                    this.withdrawalRequests = [];
                    this.paymentMethods = [];
                    this.notifications = [];
                    this.games = { stats: { totalPlayed: 0, totalWon: 0 } };
                }

                set(key, value) {
                    if (this[key] !== undefined) {
                        this[key] = value;
                        this.dispatchEvent(new CustomEvent('stateChanged', { detail: { key, value } }));
                    }
                }

                updateStats(stats) {
                    this.stats = { ...this.stats, ...stats };
                    this.dispatchEvent(new CustomEvent('statsUpdated', { detail: this.stats }));
                }

                updateBalance(amount) {
                    this.balance = amount;
                    this.dispatchEvent(new CustomEvent('balanceUpdated', { detail: amount }));
                }

                addTransaction(tx) {
                    this.wallet.transactions.unshift(tx);
                    if (this.wallet.transactions.length > CONFIG.MAX_TRANSACTIONS) {
                        this.wallet.transactions.pop();
                    }
                    this.dispatchEvent(new CustomEvent('transactionsUpdated', { detail: this.wallet.transactions }));
                }
            }

            // ======================== إدارة البيانات (Data Layer) ========================
            class DataService {
                constructor(state) {
                    this.state = state;
                    this.notificationService = new NotificationService(state);
                    this.loadInitialData();
                }

                loadInitialData() {
                    this.loadWallet();
                    this.loadRequests();
                    this.loadPaymentMethods();
                    this.loadSettings();
                    this.loadStats();
                    this.loadGamesStats();
                    this.notificationService.loadNotifications();
                }

                loadWallet() {
                    const data = StorageService.get(CONFIG.STORAGE_KEYS.WALLET, null);
                    if (data) {
                        this.state.balance = data.balance || CONFIG.DEFAULT_BALANCE;
                        this.state.wallet.transactions = data.transactions || [];
                        this.state.wallet.address = data.address || this.state.wallet.address;
                    } else {
                        this.state.balance = CONFIG.DEFAULT_BALANCE;
                        this.state.wallet.transactions = [];
                    }
                }

                saveWallet() {
                    StorageService.set(CONFIG.STORAGE_KEYS.WALLET, {
                        balance: this.state.balance,
                        transactions: this.state.wallet.transactions,
                        address: this.state.wallet.address
                    });
                }

                loadGamesStats() {
                    const gamesData = StorageService.get(CONFIG.STORAGE_KEYS.GAMES, null);
                    if (gamesData) {
                        this.state.games = gamesData;
                    }
                }

                saveGamesStats() {
                    StorageService.set(CONFIG.STORAGE_KEYS.GAMES, this.state.games);
                }

                loadPaymentMethods() {
                    const saved = StorageService.get(CONFIG.STORAGE_KEYS.PAYMENT_METHODS, null);
                    if (saved && Array.isArray(saved) && saved.length > 0) {
                        this.state.paymentMethods = saved;
                    } else {
                        this.state.paymentMethods = [
                            { id: IdGenerator.generate('usdt_'), name: 'USDT (TRC20)', icon: 'fa-brands fa-tether', description: 'عملة رقمية مستقرة', depositDetails: 'عنوان المحفظة: T9eK3zX8qLp2mN5rV7bA1cD4fG6hJ8kQ\nشبكة: TRC20', withdrawDetails: 'أدخل عنوان USDT الخاص بك' },
                            { id: IdGenerator.generate('visa_'), name: 'Visa / Mastercard', icon: 'fa-regular fa-credit-card', description: 'بطاقات ائتمانية', depositDetails: 'رقم البطاقة: **** **** **** 1234\nتاريخ الانتهاء: 12/25\nCVV: ***', withdrawDetails: 'أدخل بيانات بطاقتك' },
                            { id: IdGenerator.generate('bank_'), name: 'تحويل بنكي', icon: 'fa-solid fa-building-columns', description: 'حوالة بنكية محلية', depositDetails: 'IBAN: SA0380000000608010167519\nاسم المستفيد: شركة المدفوعات\nالبنك: الأهلي السعودي', withdrawDetails: 'أدخل رقم IBAN الخاص بك' },
                            { id: IdGenerator.generate('telegram_'), name: 'محفظة تيليجرام', icon: 'fa-brands fa-telegram', description: '@wallet_bot', depositDetails: '@wallet_bot\nأرسل المبلغ إلى بوت المحفظة', withdrawDetails: 'أدخل معرف تيليجرام للمحفظة' }
                        ];
                    }
                }

                savePaymentMethods() {
                    StorageService.set(CONFIG.STORAGE_KEYS.PAYMENT_METHODS, this.state.paymentMethods);
                }

                addPaymentMethod(methodData) {
                    const newMethod = { id: IdGenerator.generate('pm_'), ...methodData };
                    this.state.paymentMethods.push(newMethod);
                    this.savePaymentMethods();
                    return newMethod;
                }

                updatePaymentMethod(id, newData) {
                    const index = this.state.paymentMethods.findIndex(m => m.id === id);
                    if (index !== -1) {
                        this.state.paymentMethods[index] = { ...this.state.paymentMethods[index], ...newData };
                        this.savePaymentMethods();
                        return true;
                    }
                    return false;
                }

                deletePaymentMethod(id) {
                    this.state.paymentMethods = this.state.paymentMethods.filter(m => m.id !== id);
                    this.savePaymentMethods();
                }

                loadRequests() {
                    this.state.depositRequests = StorageService.get(CONFIG.STORAGE_KEYS.DEPOSIT_REQUESTS, []);
                    this.state.withdrawalRequests = StorageService.get(CONFIG.STORAGE_KEYS.WITHDRAWAL_REQUESTS, []);
                }

                saveRequests() {
                    StorageService.set(CONFIG.STORAGE_KEYS.DEPOSIT_REQUESTS, this.state.depositRequests);
                    StorageService.set(CONFIG.STORAGE_KEYS.WITHDRAWAL_REQUESTS, this.state.withdrawalRequests);
                }

                addDepositRequest(amount, methodId, transactionId, user) {
                    const method = this.state.paymentMethods.find(m => m.id === methodId);
                    const request = {
                        id: IdGenerator.generate('dep_'),
                        userId: user.id,
                        userName: `${user.first_name} ${user.last_name || ''}`.trim(),
                        amount,
                        method: method ? method.name : methodId,
                        methodId,
                        transactionId,
                        status: 'pending',
                        date: new Date().toISOString()
                    };
                    this.state.depositRequests.push(request);
                    this.saveRequests();
                    this.incrementDailyOps();
                    
                    window.dispatchEvent(new CustomEvent('newDepositRequest', { detail: request }));
                    
                    return request;
                }

                addWithdrawalRequest(amount, methodId, details, user) {
                    if (amount > this.state.balance) {
                        return { success: false, message: 'الرصيد غير كافٍ', request: null };
                    }
                    const method = this.state.paymentMethods.find(m => m.id === methodId);
                    const request = {
                        id: IdGenerator.generate('with_'),
                        userId: user.id,
                        userName: `${user.first_name} ${user.last_name || ''}`.trim(),
                        amount,
                        method: method ? method.name : methodId,
                        methodId,
                        details,
                        status: 'pending',
                        date: new Date().toISOString()
                    };
                    this.state.withdrawalRequests.push(request);
                    this.saveRequests();
                    this.incrementDailyOps();
                    
                    window.dispatchEvent(new CustomEvent('newWithdrawalRequest', { detail: request }));
                    
                    return { success: true, id: request.id, request };
                }

                acceptRequest(request, type) {
                    if (type === 'deposit') {
                        const req = this.state.depositRequests.find(r => r.id === request.id);
                        if (req && req.status === 'pending') {
                            req.status = 'approved';
                            this.state.balance += req.amount;
                            this.addTransaction('deposit', req.amount, `شحن عبر ${req.method} (رقم العملية: ${req.transactionId || 'غير محدد'})`);
                            this.saveWallet();
                            this.saveRequests();
                            
                            this.notificationService.addNotification(
                                req.userId,
                                '✅ تم قبول طلب الشحن',
                                `تم قبول طلب الشحن بمبلغ ${req.amount} عبر ${req.method}. رقم العملية: ${req.transactionId || 'غير محدد'}`,
                                'success'
                            );
                            
                            return true;
                        }
                    } else if (type === 'withdrawal') {
                        const req = this.state.withdrawalRequests.find(r => r.id === request.id);
                        if (req && req.status === 'pending' && this.state.balance >= req.amount) {
                            req.status = 'approved';
                            this.state.balance -= req.amount;
                            this.addTransaction('withdraw', -req.amount, `سحب عبر ${req.method} إلى ${req.details || 'محفظة'}`);
                            this.saveWallet();
                            this.saveRequests();
                            
                            this.notificationService.addNotification(
                                req.userId,
                                '✅ تم قبول طلب السحب',
                                `تم قبول طلب السحب بمبلغ ${req.amount} عبر ${req.method}. التفاصيل: ${req.details}`,
                                'success'
                            );
                            
                            return true;
                        }
                    }
                    return false;
                }

                rejectRequest(request, type) {
                    if (type === 'deposit') {
                        const req = this.state.depositRequests.find(r => r.id === request.id);
                        if (req) {
                            req.status = 'rejected';
                            this.saveRequests();
                            
                            this.notificationService.addNotification(
                                req.userId,
                                '❌ تم رفض طلب الشحن',
                                `تم رفض طلب الشحن بمبلغ ${req.amount} عبر ${req.method}.`,
                                'error'
                            );
                            
                            return true;
                        }
                    } else if (type === 'withdrawal') {
                        const req = this.state.withdrawalRequests.find(r => r.id === request.id);
                        if (req) {
                            req.status = 'rejected';
                            this.saveRequests();
                            
                            this.notificationService.addNotification(
                                req.userId,
                                '❌ تم رفض طلب السحب',
                                `تم رفض طلب السحب بمبلغ ${req.amount} عبر ${req.method}.`,
                                'error'
                            );
                            
                            return true;
                        }
                    }
                    return false;
                }

                getPendingDeposits() {
                    return this.state.depositRequests.filter(r => r.status === 'pending');
                }

                getPendingWithdrawals() {
                    return this.state.withdrawalRequests.filter(r => r.status === 'pending');
                }

                getPendingRequestsCount() {
                    return this.getPendingDeposits().length + this.getPendingWithdrawals().length;
                }

                addTransaction(type, amount, note = '', status = 'مكتمل') {
                    const tx = {
                        id: IdGenerator.generate('tx_'),
                        type,
                        amount,
                        note,
                        status,
                        date: new Date().toISOString()
                    };
                    this.state.wallet.transactions.unshift(tx);
                    if (this.state.wallet.transactions.length > CONFIG.MAX_TRANSACTIONS) {
                        this.state.wallet.transactions.pop();
                    }
                    this.saveWallet();
                }

                loadStats() {
                    const users = StorageService.get(CONFIG.STORAGE_KEYS.USERS, []);
                    const bots = StorageService.get(CONFIG.STORAGE_KEYS.BOTS, [{ id: 123456, name: 'البوت الرسمي' }]);
                    const dailyOpsData = StorageService.get(CONFIG.STORAGE_KEYS.DAILY_OPS, {});
                    const today = DateUtils.getTodayDate();
                    
                    this.state.stats = {
                        users: users.length,
                        bots: bots.length,
                        dailyOps: dailyOpsData[today] || 0
                    };
                }

                incrementDailyOps() {
                    const today = DateUtils.getTodayDate();
                    const dailyOpsData = StorageService.get(CONFIG.STORAGE_KEYS.DAILY_OPS, {});
                    dailyOpsData[today] = (dailyOpsData[today] || 0) + 1;
                    StorageService.set(CONFIG.STORAGE_KEYS.DAILY_OPS, dailyOpsData);
                    this.loadStats();
                }

                registerUser(userId) {
                    const users = StorageService.get(CONFIG.STORAGE_KEYS.USERS, []);
                    if (!users.includes(userId)) {
                        users.push(userId);
                        StorageService.set(CONFIG.STORAGE_KEYS.USERS, users);
                        this.loadStats();
                    }
                }

                loadSettings() {
                    const settings = StorageService.get(CONFIG.STORAGE_KEYS.SETTINGS, null);
                    if (settings) {
                        this.state.settings = settings;
                    }
                }

                saveSettings() {
                    StorageService.set(CONFIG.STORAGE_KEYS.SETTINGS, this.state.settings);
                }

                loadTheme() {
                    const theme = StorageService.get(CONFIG.STORAGE_KEYS.THEME, 'dark');
                    this.state.theme = theme;
                    return theme;
                }

                saveTheme(theme) {
                    StorageService.set(CONFIG.STORAGE_KEYS.THEME, theme);
                    this.state.theme = theme;
                }
            }

                    const walletIcon = document.getElementById('walletIconLarge');

                    const count = this.data.getPendingRequestsCount();
                    let badge = walletIcon.querySelector('.notification-badge');
                    
                    if (count > 0) {
                        if (!badge) {
                            badge = document.createElement('span');
                            badge.className = 'notification-badge';
                            walletIcon.style.position = 'relative';
                            walletIcon.appendChild(badge);
                        }
                        badge.textContent = count > 9 ? '9+' : count;
                    } else {
                        if (badge) badge.remove();
                    }
                    
                    document.title = count > 0 ? `(${count}) بوابة تيليجرام` : 'بوابة تيليجرام المتطورة';
                }

                updateNotificationBadge() {

                    const unreadCount = this.data.notificationService.getUnreadCount(userId);
