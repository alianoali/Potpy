<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>البوابة الذهبية | Telegram Gateway</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts (Amiri for Luxury, Cairo for UI) -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                        amiri: ['Amiri', 'serif'],
                    },
                    colors: {
                        gold: {
                            100: '#F9F1D8',
                            300: '#EAD692',
                            400: '#D4AF37', /* Classic Gold */
                            500: '#C5A028',
                            600: '#AA8820',
                            700: '#8A6D18',
                            900: '#4B3B0A',
                        },
                        black: {
                            900: '#050505',
                            800: '#0a0a0a',
                            700: '#121212',
                            card: '#1a1a1a',
                        }
                    },
                    animation: {
                        'float': 'float 8s ease-in-out infinite',
                        'shine': 'shine 3s linear infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'scale-in': 'scaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-15px)' },
                        },
                        shine: {
                            '0%': { backgroundPosition: '-200% center' },
                            '100%': { backgroundPosition: '200% center' }
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        scaleIn: {
                            '0%': { opacity: '0', transform: 'scale(0.9)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        }
                    },
                    backgroundImage: {
                        'gold-gradient': 'linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C)',
                        'gold-text': 'linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C)',
                        'dark-gradient': 'linear-gradient(to bottom, #000000, #1a1a1a)',
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --glass-bg: rgba(20, 20, 20, 0.7);
            --glass-border: rgba(212, 175, 55, 0.2);
            --gold-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Gold Text Effect */
        .text-gold {
            background: var(--gold-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200% auto;
            animation: shine 5s linear infinite;
        }

        /* Gold Border & Glow */
        .border-gold {
            border-color: rgba(212, 175, 55, 0.3);
        }
        
        .shadow-gold {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), 0 0 10px rgba(212, 175, 55, 0.1);
        }

        /* Glassmorphism Luxury */
        .glass-panel {
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        .glass-card {
            background: linear-gradient(145deg, rgba(30,30,30,0.4) 0%, rgba(10,10,10,0.4) 100%);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .glass-card:hover {
            border-color: rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(212, 175, 55, 0.15);
        }

        .glass-card:active {
            transform: scale(0.98);
        }

        /* Ambient Background Particles */
        .ambient-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000000 100%);
        }
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 12s infinite ease-in-out;
            background: radial-gradient(circle, #D4AF37 0%, transparent 70%);
        }
        .glow-1 { top: -10%; right: -10%; width: 400px; height: 400px; animation-delay: 0s; }
        .glow-2 { bottom: -10%; left: -10%; width: 300px; height: 300px; animation-delay: -6s; }
        .glow-3 { top: 40%; left: 40%; width: 200px; height: 200px; animation-delay: -3s; opacity: 0.08; }

        /* Loader */
        .loader-ring {
            width: 60px;
            height: 60px;
            border: 2px solid rgba(212, 175, 55, 0.1);
            border-top-color: #D4AF37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: 90%;
            max-width: 350px;
            pointer-events: none;
        }
        .toast {
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #F9F1D8;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            pointer-events: auto;
            backdrop-filter: blur(10px);
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .toast.hide { animation: slideUp 0.3s ease forwards; }
        @keyframes slideUp { to { opacity: 0; transform: translateY(-20px); } }

        .hidden-view { display: none !important; }
        .fade-in { animation: scale-in 0.5s ease-out forwards; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #D4AF37; }
    </style>
</head>
<body class="flex flex-col items-center justify-start p-4 relative selection:bg-yellow-900 selection:text-white">

    <!-- Background -->
    <div class="ambient-glow">
        <div class="glow-orb glow-1"></div>
        <div class="glow-orb glow-2"></div>
        <div class="glow-orb glow-3"></div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- VIEW 1: LOADING -->
    <div id="loadingView" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black transition-opacity duration-700">
        <div class="loader-ring mb-6 shadow-[0_0_20px_rgba(212,175,55,0.3)]"></div>
        <h2 class="text-xl font-amiri font-bold text-gold tracking-widest uppercase">
            جاري الدخول<span class="status-text"></span>
        </h2>
        <p class="text-xs text-gray-500 mt-3 font-mono opacity-60">SECURE CONNECTION ESTABLISHED</p>
    </div>

    <!-- VIEW 2: ACCESS DENIED -->
    <div id="accessDeniedView" class="hidden-view w-full max-w-md flex flex-col items-center justify-center min-h-[80vh] fade-in">
        <div class="glass-panel p-8 rounded-3xl text-center w-full border-red-900/30 shadow-2xl">
            <div class="w-24 h-24 bg-red-900/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl shadow-inner animate-pulse">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h2 class="text-2xl font-amiri font-bold mb-3 text-white">دخول مرفوض</h2>
            <p class="text-gray-400 mb-8 text-sm leading-relaxed px-4">
                يجب تشغيل هذا التطبيق حصراً من داخل عميل تيليجرام الرسمي لضمان الخصوصية والأمان.
            </p>
            <button onclick="window.location.href='https://telegram.org'" class="w-full py-4 rounded-xl font-bold text-black bg-gold-gradient hover:shadow-[0_0_20px_rgba(212,175,55,0.4)] transition-all transform hover:-translate-y-1 active:scale-95">
                <i class="fa-brands fa-telegram ml-2"></i>
                فتح تيليجرام
            </button>
            <button onclick="location.reload()" class="mt-4 text-xs text-gray-600 hover:text-gold-400 underline transition-colors">
                إعادة المحاولة
            </button>
        </div>
    </div>

    <!-- VIEW 3: DASHBOARD -->
    <div id="dashboardView" class="hidden-view w-full max-w-md space-y-6 pb-24 fade-in">
        
        <!-- Header Section -->
        <header class="flex items-center justify-between mb-6 pt-4">
            <div>
                <h1 class="text-3xl font-amiri font-bold text-white tracking-wide">مرحباً، <span id="headerUserName" class="text-gold">...</span></h1>
                <p class="text-xs text-gray-500 mt-1 font-mono tracking-wider" id="currentDate">...</p>
            </div>
            <div class="relative group cursor-pointer" onclick="showToast('لا توجد إشعارات جديدة', 'info')">
                <div class="w-12 h-12 rounded-full bg-gradient-to-br from-gray-800 to-black border border-gray-700 flex items-center justify-center shadow-lg group-hover:border-gold-400 transition-all duration-300">
                    <i class="fa-solid fa-bell text-gold-400 text-lg"></i>
                </div>
                <span class="absolute top-0 right-0 w-3 h-3 bg-red-600 border-2 border-black rounded-full animate-pulse shadow-[0_0_10px_red]"></span>
            </div>
        </header>

        <!-- Main Profile Card -->
        <div class="glass-panel p-6 rounded-3xl relative overflow-hidden group">
            <!-- Decorative Gold Glow -->
            <div class="absolute top-0 right-0 w-40 h-40 bg-gold-500/5 rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none"></div>
            
            <div class="flex items-center gap-5 relative z-10">
                <!-- Avatar with Gold Ring -->
                <div class="relative">
                    <div class="absolute inset-0 bg-gold-gradient rounded-2xl blur opacity-30 group-hover:opacity-60 transition-opacity duration-500"></div>
                    <div id="avatarContainer" class="w-20 h-20 rounded-2xl border-2 border-gold-400/50 overflow-hidden bg-black relative z-10 shadow-lg">
                        <img id="userPhoto" src="" alt="User" class="w-full h-full object-cover hidden">
                        <div id="defaultAvatar" class="w-full h-full flex items-center justify-center text-2xl font-bold text-gold-300 bg-gray-900 font-amiri">
                            <span id="avatarInitials">U</span>
                        </div>
                    </div>
                    <div class="absolute -bottom-1 -right-1 w-5 h-5 bg-green-500 border-2 border-black rounded-full z-20 shadow-[0_0_10px_#22c55e]"></div>
                </div>

                <!-- Info -->
                <div class="flex-1 min-w-0">
                    <h2 class="text-lg font-bold text-white truncate" id="userName">مستخدم</h2>
                    <div class="flex items-center gap-2 mt-2">
                        <span class="text-xs text-gray-400 font-mono bg-white/5 px-2.5 py-1 rounded border border-white/5 select-all" id="userId">ID: 00000</span>
                        <button onclick="copyId()" class="text-gray-500 hover:text-gold-400 hover:bg-white/5 p-1.5 rounded transition-all" title="نسخ المعرف">
                            <i class="fa-regular fa-copy text-xs"></i>
                        </button>
                    </div>
                </div>

                <!-- Balance Mini Card -->
                <div class="bg-gradient-to-br from-gray-900 to-black backdrop-blur-md px-4 py-3 rounded-2xl border border-gold-500/20 flex flex-col items-center min-w-[90px] shadow-lg relative overflow-hidden">
                    <div class="absolute inset-0 bg-gold-gradient opacity-5"></div>
                    <span class="text-[10px] text-gray-400 mb-1 font-medium uppercase tracking-wider relative z-10">الرصيد</span>
                    <div class="flex items-center gap-1.5 text-gold-400 drop-shadow-md relative z-10">
                        <i class="fa-solid fa-coins text-xs"></i>
                        <span class="font-bold text-white text-base tracking-tight font-mono" id="userBalance">0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-2 gap-4">
            <div class="glass-card p-5 rounded-2xl flex flex-col items-center justify-center text-center active:scale-95 transition-transform cursor-default border-t border-white/5">
                <div class="w-12 h-12 rounded-full bg-gray-900/50 text-gold-400 flex items-center justify-center mb-3 border border-gold-500/10 shadow-inner">
                    <i class="fa-solid fa-chart-line text-lg"></i>
                </div>
                <span class="text-gray-500 text-xs mb-1 font-medium">الأداء العام</span>
                <span class="text-white font-bold text-lg font-amiri">ممتاز</span>
            </div>
            <div class="glass-card p-5 rounded-2xl flex flex-col items-center justify-center text-center active:scale-95 transition-transform cursor-default border-t border-white/5">
                <div class="w-12 h-12 rounded-full bg-gray-900/50 text-gold-400 flex items-center justify-center mb-3 border border-gold-500/10 shadow-inner">
                    <i class="fa-solid fa-crown text-lg"></i>
                </div>
                <span class="text-gray-500 text-xs mb-1 font-medium">المستوى الحالي</span>
                <span class="text-gold-300 font-bold text-lg font-amiri">بلاتيني</span>
            </div>
        </div>

        <!-- Actions Menu -->
        <div class="glass-panel p-6 rounded-3xl">
            <div class="flex items-center justify-between mb-6">
                <h3 class="font-amiri font-bold text-white text-lg">القائمة الرئيسية</h3>
                <span class="text-[10px] text-gold-500/70 bg-gold-900/10 px-2 py-1 rounded border border-gold-500/10">v4.0 Gold</span>
            </div>
            
            <div class="space-y-3">
                <!-- Action Item 1 -->
                <button onclick="handleAction('refresh')" class="w-full p-4 rounded-xl flex items-center justify-between glass-card hover:bg-white/5 group">
                    <div class="flex items-center gap-4">
                        <div class="w-11 h-11 rounded-lg bg-gray-900 text-gold-400 flex items-center justify-center group-hover:bg-gold-gradient group-hover:text-black transition-all duration-300 shadow-lg">
                            <i class="fa-solid fa-sync"></i>
                        </div>
                        <span class="text-gray-200 text-sm font-medium">تحديث البيانات</span>
                    </div>
                    <i class="fa-solid fa-chevron-left text-gray-600 text-xs group-hover:translate-x-[-4px] group-hover:text-gold-400 transition-all duration-300"></i>
                </button>

                <!-- Action Item 2 -->
                <button onclick="handleAction('support')" class="w-full p-4 rounded-xl flex items-center justify-between glass-card hover:bg-white/5 group">
                    <div class="flex items-center gap-4">
                        <div class="w-11 h-11 rounded-lg bg-gray-900 text-gold-400 flex items-center justify-center group-hover:bg-gold-gradient group-hover:text-black transition-all duration-300 shadow-lg">
                            <i class="fa-solid fa-headset"></i>
                        </div>
                        <span class="text-gray-200 text-sm font-medium">الدعم الفني</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse shadow-[0_0_8px_red]"></span>
                        <i class="fa-solid fa-chevron-left text-gray-600 text-xs group-hover:translate-x-[-4px] group-hover:text-gold-400 transition-all duration-300"></i>
                    </div>
                </button>

                <!-- Action Item 3 (Locked) -->
                <button disabled class="w-full p-4 rounded-xl flex items-center justify-between opacity-50 cursor-not-allowed border border-dashed border-gray-800 bg-transparent">
                    <div class="flex items-center gap-4">
                        <div class="w-11 h-11 rounded-lg bg-gray-900/50 text-gray-600 flex items-center justify-center">
                            <i class="fa-solid fa-lock"></i>
                        </div>

                </button>

        <!-- Footer / Logout -->
        <button onclick="confirmLogout()" class="w-full py-4 rounded-xl font-bold text-red-400/80 hover:text-red-400 hover:bg-red-900/10 transition-all duration-300 border border-transparent hover:border-red-900/30 flex items-center justify-center gap-2.5 group mt-4">
            <i class="fa-solid fa-arrow-right-from-bracket group-hover:-translate-x-1 transition-transform"></i>
            إنهاء الجلسة
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        // State Management
        const views = {
            loading: document.getElementById('loadingView'),
            denied: document.getElementById('accessDeniedView'),
            dashboard: document.getElementById('dashboardView')
        };

        // Elements
        const els = {
            userName: document.getElementById('userName'),
            headerName: document.getElementById('headerUserName'),
            userId: document.getElementById('userId'),
            photo: document.getElementById('userPhoto'),
            defaultAvatar: document.getElementById('defaultAvatar'),
            initials: document.getElementById('avatarInitials'),
            balance: document.getElementById('userBalance'),
            date: document.getElementById('currentDate'),
            subtext: document.getElementById('loadingSubtext')
        };

        // Initialize with Robust Error Handling
        function init() {
            tg.expand();
            tg.ready();
            
            // Set Date
            const now = new Date();
            els.date.textContent = now.toLocaleDateString('ar-EG', { weekday: 'long', day: 'numeric', month: 'long' });

            // Update loading text dynamically
            setTimeout(() => { if(document.querySelector('.status-text')) document.querySelector('.status-text').textContent = "..."; }, 800);

            // Wait for initData
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                onAuthSuccess(tg.initDataUnsafe.user);
            } else {
                tg.onEvent('ready', () => {
                    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                        onAuthSuccess(tg.initDataUnsafe.user);
                    } else {
                        setTimeout(() => {
                            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                                onAuthSuccess(tg.initDataUnsafe.user);
                            } else {
                                onAuthFailed();
                            }
                        }, 500);
                    }
                });

                // Safety timeout
                setTimeout(() => {
                    if (!views.dashboard.classList.contains('hidden-view') && !views.denied.classList.contains('hidden-view')) {
                        if (!(tg.initDataUnsafe && tg.initDataUnsafe.user)) {
                            onAuthFailed();
                        }
                    }
                }, 4000);
            }
        }

        function onAuthSuccess(user) {
            loadUserData(user);
            switchView('dashboard');
            setupMainButton();
            // Force dark header for luxury feel even if TG theme is light
            try { tg.setHeaderColor('#050505'); } catch(e){}
        }

        function onAuthFailed() {
            switchView('denied');
            try { tg.setHeaderColor('#000000'); } catch(e){}
        }

        function switchView(viewName) {
            Object.values(views).forEach(el => el.classList.add('hidden-view'));
            views[viewName].classList.remove('hidden-view');
            
            if(viewName === 'loading') {
                views.loading.classList.remove('hidden-view');
                views.loading.style.opacity = '1';
            } else {
                views.loading.style.opacity = '0';
                setTimeout(() => views.loading.classList.add('hidden-view'), 700);
            }
        }

        function loadUserData(user) {
            const fullName = `${user.first_name} ${user.last_name || ''}`.trim();
            els.userName.textContent = fullName;
            els.headerName.textContent = user.first_name;
            els.userId.textContent = `ID: ${user.id}`;
            
            // Avatar Logic
            if (user.photo_url) {
                els.photo.src = user.photo_url;
                els.photo.classList.remove('hidden');
                els.defaultAvatar.classList.add('hidden');
            } else {
                els.photo.classList.add('hidden');
                els.defaultAvatar.classList.remove('hidden');
                const initials = (user.first_name.charAt(0) + (user.last_name ? user.last_name.charAt(0) : '')).toUpperCase();
                els.initials.textContent = initials || "U";
            }

            // Animate Balance with Gold Counter
            animateValue(els.balance, 0, 2500, 2000);
        }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                // Easing function for smooth finish
                const easeOutQuart = 1 - Math.pow(1 - progress, 4);
                obj.innerHTML = Math.floor(easeOutQuart * (end - start) + start).toLocaleString('en-US');
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        function setupMainButton() {
            tg.MainButton.setText("تحديث الرصيد");
            tg.MainButton.setTextColor("#000000");
            tg.MainButton.setColor("#D4AF37"); // Gold Color
            tg.MainButton.show();
            
            tg.MainButton.onClick(() => {
                tg.HapticFeedback.notificationOccurred('success');
                showToast('تم مزامنة البيانات بنجاح', 'success');
                animateValue(els.balance, parseInt(els.balance.innerText.replace(/,/g,'')), parseInt(els.balance.innerText.replace(/,/g,'')) + 100, 1000);
            });
        }

        // Utilities
        function copyId() {
            const id = els.userId.textContent.replace('ID: ', '');
            navigator.clipboard.writeText(id).then(() => {
                tg.HapticFeedback.selectionChanged();
                showToast('تم نسخ المعرف ID', 'info');
            });
        }

        function handleAction(type) {
            tg.HapticFeedback.impactOccurred('light');
            if (type === 'refresh') {
                showToast('جارٍ تحديث البيانات...', 'info');
                setTimeout(() => showToast('تم التحديث بنجاح', 'success'), 1000);
            } else if (type === 'support') {
                showToast('جارٍ فتح الدعم...', 'info');
                setTimeout(() => tg.openLink('https://telegram.org'), 800);
            }
        }

        function confirmLogout() {
            tg.HapticFeedback.notificationOccurred('warning');
            tg.showConfirm("هل أنت متأكد من رغبتك في إنهاء الجلسة؟", (confirmed) => {
                if (confirmed) {
                    tg.close();
                }
            });
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            
            let icon = '<i class="fa-solid fa-circle-info text-gold-400 text-lg"></i>';
            if (type === 'success') icon = '<i class="fa-solid fa-check-circle text-green-500 text-lg"></i>';
            if (type === 'error') icon = '<i class="fa-solid fa-triangle-exclamation text-red-500 text-lg"></i>';

            toast.innerHTML = `${icon}<span class="text-sm font-medium flex-1">${message}</span>`;
            
            container.appendChild(toast);
            tg.HapticFeedback.impactOccurred('light');

            setTimeout(() => {
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Start the app
        init();
    </script>
</body>
</html>
