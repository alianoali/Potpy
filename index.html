<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICHANCY BLACK BOT | منصة متكاملة</title>
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js">
    </script>
    <style>
        :root {
            --bg: #050a15;
            --surface: rgba(16, 23, 45, 0.85);
            --border: rgba(255, 255, 255, 0.06);
            --gold: #ffc840;
            --gold-dark: #e8a020;
            --accent: #2AABEE;
            --danger: #ff4d4d;
            --success: #4ADE80;
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --radius: 24px;
            --radius-sm: 14px;
            --shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            --transition: 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', 'Tajawal', system-ui, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Background Scene */
        .scene {
            position: relative;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 50% 30%, #0a1a3a 0%, #050a15 70%);
            overflow: hidden;
            transition: filter 0.8s;
        }
        .scene.blurred {
            filter: blur(12px);
        }
        canvas {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        /* Glass Gate */
        .login-gate {
            position: absolute;
            inset: 0;
            z-index: 100;
            background: rgba(5, 10, 25, 0.82);
            backdrop-filter: blur(25px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s, visibility 0.5s;
        }
        .login-gate.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .login-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.015));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 34px;
            padding: 40px 32px;
            text-align: center;
            max-width: 420px;
            width: 92%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
        }
        .login-bot-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 18px;
            background: radial-gradient(circle at 30% 30%, #444, #111);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            box-shadow: 0 0 28px rgba(255, 180, 0, 0.25);
        }
        .login-bot-icon .eye {
            width: 10px;
            height: 17px;
            background: var(--gold);
            border-radius: 6px;
            box-shadow: 0 0 10px var(--gold);
        }
        .login-title {
            color: #fff;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .login-sub {
            color: var(--text-dim);
            font-size: 13px;
            margin-bottom: 28px;
            line-height: 1.6;
        }
        #telegram-login-container {
            min-height: 48px;
            margin-bottom: 8px;
        }
        .error-msg {
            background: rgba(255, 77, 77, 0.12);
            border: 1px solid rgba(255, 77, 77, 0.35);
            color: #ff6b6b;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 12px;
            margin-top: 14px;
            display: none;
        }
        .error-msg.show {
            display: block;
            animation: shake 0.4s;
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-5px);
            }
            75% {
                transform: translateX(5px);
            }
        }
        .login-note {
            color: rgba(255, 255, 255, 0.25);
            font-size: 10px;
            margin-top: 14px;
        }

        /* App Shell */
        .app-shell {
            position: absolute;
            inset: 0;
            z-index: 50;
            display: none;
            flex-direction: column;
            pointer-events: none;
        }
        .app-shell.active {
            display: flex;
        }
        .app-shell>* {
            pointer-events: auto;
        }

        /* Top Bar */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(10, 18, 35, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .brand svg {
            width: 22px;
            height: 22px;
        }
        .brand span {
            color: #fff;
            font-weight: 700;
            font-size: 17px;
            letter-spacing: 0.5px;
        }
        .user-pill {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 40px;
            padding: 5px 16px 5px 5px;
            cursor: pointer;
            transition: all var(--transition);
        }
        .user-pill:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 215, 0, 0.5);
        }
        .user-pill img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #FFD700;
        }
        .user-pill .uname {
            color: #fff;
            font-weight: 600;
            font-size: 13px;
            max-width: 110px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .logout-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 77, 77, 0.2);
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 14px;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 4px;
        }
        .logout-icon:hover {
            background: rgba(255, 77, 77, 0.4);
            color: #fff;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            -webkit-overflow-scrolling: touch;
        }
        .main-content::-webkit-scrollbar {
            width: 4px;
        }
        .main-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* Navigation */
        .nav-tabs {
            display: flex;
            gap: 6px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 34px;
            padding: 5px;
            width: fit-content;
            margin: 0 auto;
            flex-wrap: wrap;
        }
        .nav-tab {
            padding: 9px 20px;
            border-radius: 28px;
            background: transparent;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all var(--transition);
            font-family: inherit;
            white-space: nowrap;
        }
        .nav-tab.active {
            background: rgba(255, 200, 0, 0.2);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 200, 0, 0.2);
        }
        .nav-tab:hover:not(.active) {
            color: #fff;
            background: rgba(255, 255, 255, 0.06);
        }

        /* Panels */
        .panel {
            display: none;
            flex-direction: column;
            gap: 18px;
        }
        .panel.active {
            display: flex;
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px 20px;
            backdrop-filter: blur(12px);
            transition: all var(--transition);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        .card:hover {
            border-color: rgba(255, 255, 255, 0.12);
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .card-icon {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .card-icon.gold {
            background: rgba(255, 200, 0, 0.12);
            color: var(--gold);
        }
        .card-icon.blue {
            background: rgba(42, 171, 238, 0.12);
            color: var(--accent);
        }
        .card-title {
            color: #fff;
            font-weight: 700;
            font-size: 16px;
        }
        .card-subtitle {
            color: var(--text-dim);
            font-size: 11px;
        }

        /* Welcome Hero */
        .welcome-hero {
            background: linear-gradient(135deg, rgba(255, 200, 0, 0.08), rgba(42, 171, 238, 0.05));
            border: 1px solid rgba(255, 200, 0, 0.15);
            padding: 28px 22px;
            text-align: center;
            border-radius: var(--radius);
            animation: fadeSlideIn 0.6s ease;
        }
        .welcome-hero h2 {
            color: #fff;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 6px;
        }
        .welcome-hero p {
            color: var(--text-dim);
            font-size: 14px;
        }
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 12px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: var(--radius-sm);
            padding: 18px 12px;
            text-align: center;
            transition: all var(--transition);
        }
        .stat-card:hover {
            border-color: rgba(255, 215, 0, 0.3);
            background: rgba(255, 255, 255, 0.04);
        }
        .stat-value {
            color: #fff;
            font-size: 28px;
            font-weight: 800;
        }
        .stat-value.gold {
            color: var(--gold);
        }
        .stat-label {
            color: var(--text-dim);
            font-size: 10px;
            margin-top: 6px;
        }

        /* Data Table */
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .admin-table th {
            text-align: right;
            color: var(--text-dim);
            padding: 10px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-weight: 500;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .admin-table td {
            padding: 10px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            color: #ddd;
        }
        .admin-table tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }
        .admin-actions {
            display: flex;
            gap: 6px;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all var(--transition);
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #FFD700, #f0a000);
            color: #000;
            box-shadow: 0 4px 15px rgba(240, 160, 0, 0.3);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
        }
        .btn-danger {
            background: rgba(255, 77, 77, 0.15);
            border: 1px solid var(--danger);
            color: var(--danger);
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 10px;
        }
        .btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.1);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            z-index: 300;
            background: rgba(20, 30, 50, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 14px 28px;
            border-radius: 34px;
            font-size: 13px;
            font-weight: 600;
            backdrop-filter: blur(10px);
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Bot Area (Background) */
        .bot-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -55%);
            z-index: 8;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        .bot-area.dimmed {
            opacity: 0.15;
        }
        .ring-wrap {
            width: 200px;
            height: 200px;
            position: relative;
        }
        .head {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 30%, #2a2a2a, #111 65%, #050505);
            box-shadow: 0 0 40px rgba(240, 180, 0, 0.08), inset 0 -20px 40px rgba(0, 0, 0, 0.9);
        }
        .eye {
            position: absolute;
            width: 18px;
            height: 32px;
            background: radial-gradient(ellipse at 45% 40%, #fff5d0, #ffc840, #f0a020);
            border-radius: 10px;
            top: 50%;
            transform: translateY(-50%);
            box-shadow: 0 0 12px rgba(255, 200, 50, 0.8);
        }
        .eye-l {
            left: 24px;
        }
        .eye-r {
            right: 24px;
        }
        .title-area {
            margin-top: 12px;
            text-align: center;
            color: #fff;
            font-weight: 900;
            font-size: 32px;
            letter-spacing: 3px;
        }
        .footer-credits {
            position: absolute;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9;
            color: rgba(255, 255, 255, 0.3);
            font-size: 9px;
            transition: opacity 0.5s;
        }
        .footer-credits.dimmed {
            opacity: 0.2;
        }

        @media (max-width: 480px) {
            .nav-tabs {
                gap: 4px;
            }
            .nav-tab {
                padding: 7px 14px;
                font-size: 11px;
            }
            .card {
                padding: 16px 14px;
            }
            .welcome-hero h2 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <div class="scene blurred" id="mainScene">
        <canvas id="c"></canvas>
        <div class="bot-area" id="botArea">
            <div class="ring-wrap">
                <div class="head">
                    <div class="eye eye-l"></div><div class="eye eye-r"></div>
                </div>
            </div>
            <div class="title-area">ICHANCY</div>
        </div>
        <div class="footer-credits" id="footerCredits">www.ichancy.com</div>
    </div>

    <!-- Login Gate -->
    <div class="login-gate" id="loginGate">
        <div class="login-card">
            <div class="login-bot-icon"><div class="eye"></div><div class="eye"></div></div>
            <div class="login-title">ICHANCY BLACK BOT</div>
            <div class="login-sub">سجل دخولك عبر تلغرام للوصول إلى لوحة التحكم الشخصية</div>
            <div id="telegram-login-container"></div>
            <div class="error-msg" id="errorMsg"></div>
            <div class="login-note">🔒 بيانات مشفرة في قاعدة بيانات محلية متطورة</div>
        </div>
    </div>

    <!-- App Shell -->
    <div class="app-shell" id="appShell">
        <div class="topbar">
            <div class="brand">
                <svg viewBox="0 0 24 24" fill="none"><path d="M13 2L3 14h9l-1 10 10-12h-9l1-10z" fill="#ffd000"/></svg>
                <span>ICHANCY</span>
            </div>
            <div class="user-pill" id="userPill">
                <span class="uname" id="pillName">مستخدم</span>
                <img src="" id="pillImg" alt="">
                <button class="logout-icon" onclick="event.stopPropagation(); logout()">⏻</button>
            </div>
        </div>
        <div class="main-content" id="mainContent">
            <div class="nav-tabs" id="navTabs"></div>
            <div class="panel active" id="panelDashboard"></div>
            <div class="panel" id="panelProfile"></div>
            <div class="panel" id="panelNotes"></div>
            <div class="panel" id="panelSettings"></div>
            <div class="panel" id="panelAdmin"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://telegram.org/js/telegram-web-app.js">
    </script>
    <script>
        // ==================== CONFIG ====================
        const CONFIG = {
            BOT_USERNAME: 'ICHANCY_BOT',
            VERIFY_API_URL: '',
            SESSION_KEY: 'ichancy_session',
            SESSION_DURATION: 24 * 60 * 60 * 1000,
            ADMIN_TELEGRAM_ID: '7609492965',
            APP_VERSION: '4.0.0',
        };

        // ==================== DATABASE ====================
        const db = new Dexie('IchancyDB');
        db.version(2).stores({
            users: '++id, telegramId, username, firstName, createdAt, updatedAt',
            sessions: '++id, userId, loginTime',
            notes: '++id, userId, title, content, createdAt',
            activityLog: '++id, userId, action, timestamp',
            settings: 'userId, notifications, language',
        });

        // ==================== CANVAS ====================
        const C = document.getElementById('c'),
            X = C.getContext('2d');
        let W, H;

        function resize() {
            W = C.width = innerWidth;
            H = C.height = innerHeight;
            draw();
        }

        function draw() {
            X.fillStyle = '#050a15';
            X.fillRect(0, 0, W, H);
            const g = X.createRadialGradient(W / 2, H * 0.7, 0, W / 2, H * 0.7, W * 0.6);
            g.addColorStop(0, 'rgba(0,80,200,0.06)');
            g.addColorStop(1, 'transparent');
            X.fillStyle = g;
            X.fillRect(0, 0, W, H);
        }
        window.addEventListener('resize', resize);
        resize();

        // ==================== GLOBAL STATE ====================
        let currentUserId = null;
        let currentTelegramUser = null;
        let isAdmin = false;

        // ==================== DOM REFS ====================
        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);

        const gate = $('#loginGate');
        const scene = $('#mainScene');
        const appShell = $('#appShell');
        const botArea = $('#botArea');
        const footer = $('#footerCredits');
        const errorMsg = $('#errorMsg');
        const loginContainer = $('#telegram-login-container');
        const toast = $('#toast');
        const pillName = $('#pillName');
        const pillImg = $('#pillImg');
        const navTabsContainer = $('#navTabs');
        const panels = {
            dashboard: $('#panelDashboard'),
            profile: $('#panelProfile'),
            notes: $('#panelNotes'),
            settings: $('#panelSettings'),
            admin: $('#panelAdmin'),
        };

        // ==================== TOAST ====================
        let toastTimer;

        function showToast(msg) {
            clearTimeout(toastTimer);
            toast.textContent = msg;
            toast.classList.add('show');
            toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
            setTimeout(() => errorMsg.classList.remove('show'), 5000);
        }

        // ==================== DATABASE OPERATIONS ====================
        async function findOrCreateUser(tgUser) {
            const existing = await db.users.where('telegramId').equals(tgUser.id).first();
            if (existing) {
                await db.users.update(existing.id, {
                    firstName: tgUser.first_name || existing.firstName,
                    lastName: tgUser.last_name || existing.lastName,
                    username: tgUser.username || existing.username,
                    photoUrl: tgUser.photo_url || existing.photoUrl,
                    updatedAt: Date.now(),
                });
                return existing.id;
            } else {
                const id = await db.users.add({
                    telegramId: tgUser.id,
                    firstName: tgUser.first_name || '',
                    lastName: tgUser.last_name || '',
                    username: tgUser.username || '',
                    photoUrl: tgUser.photo_url || '',
                    createdAt: Date.now(),
                    updatedAt: Date.now(),
                });
                await db.settings.put({ userId: id, notifications: true, language: 'ar' });
                return id;
            }
        }

        async function logActivity(userId, action, details = '') {
            await db.activityLog.add({ userId, action, timestamp: Date.now(), details });
        }

        async function getSettings(userId) {
            const s = await db.settings.where('userId').equals(userId).first();
            return s || { notifications: true, language: 'ar' };
        }

        async function updateSettings(userId, updates) {
            const exist = await db.settings.where('userId').equals(userId).first();
            if (exist) await db.settings.update(exist.id, updates);
            else await db.settings.put({ userId, ...updates });
            await logActivity(userId, 'settings_changed', JSON.stringify(updates));
        }

        async function deleteUserAccount(userId) {
            const user = await db.users.get(userId);
            if (!user) return false;
            if (user.telegramId.toString() === CONFIG.ADMIN_TELEGRAM_ID) {
                showToast('لا يمكن حذف حساب المشرف');
                return false;
            }
            await db.transaction('rw', db.users, db.sessions, db.notes, db.activityLog, db.settings, async () => {
                await db.users.delete(userId);
                await db.sessions.where('userId').equals(userId).delete();
                await db.notes.where('userId').equals(userId).delete();
                await db.activityLog.where('userId').equals(userId).delete();
                await db.settings.where('userId').equals(userId).delete();
            });
            await logActivity(currentUserId, 'admin_deleted_user', `حذف المستخدم ${user.telegramId}`);
            return true;
        }

        async function getAllUsers() {
            return await db.users.orderBy('createdAt').reverse().toArray();
        }

        // ==================== SESSION ====================
        function getSession() {
            const raw = localStorage.getItem(CONFIG.SESSION_KEY);
            if (!raw) return null;
            try {
                const s = JSON.parse(raw);
                if (s.expiresAt && Date.now() < s.expiresAt) return s;
                localStorage.removeItem(CONFIG.SESSION_KEY);
            } catch (e) { localStorage.removeItem(CONFIG.SESSION_KEY); }
            return null;
        }

        function setSession(userId, tgUser) {
            localStorage.setItem(CONFIG.SESSION_KEY, JSON.stringify({
                userId,
                telegramUser: tgUser,
                expiresAt: Date.now() + CONFIG.SESSION_DURATION,
            }));
        }

        function clearSession() {
            localStorage.removeItem(CONFIG.SESSION_KEY);
        }

        // ==================== RENDER FUNCTIONS ====================
        function buildNavigationTabs() {
            const tabs = [
                { id: 'dashboard', icon: '📊', text: 'لوحة التحكم' },
                { id: 'profile', icon: '👤', text: 'الملف الشخصي' },
                { id: 'notes', icon: '📝', text: 'ملاحظاتي' },
                { id: 'settings', icon: '⚙️', text: 'الإعدادات' },
            ];
            if (isAdmin) {
                tabs.push({ id: 'admin', icon: '🛡️', text: 'إدارة المستخدمين' });
            }
            navTabsContainer.innerHTML = tabs.map(t =>
                `<button class="nav-tab${t.id === 'dashboard' ? ' active' : ''}" data-panel="${t.id}">${t.icon} ${t.text}</button>`
            ).join('');
        }

        async function switchPanel(panelName) {
            $$('.nav-tab').forEach(b => b.classList.remove('active'));
            const activeTab = $(`.nav-tab[data-panel="${panelName}"]`);
            if (activeTab) activeTab.classList.add('active');
            Object.values(panels).forEach(p => p.classList.remove('active'));
            const panel = panels[panelName];
            if (panel) panel.classList.add('active');
            if (panelName === 'dashboard') await renderDashboard();
            if (panelName === 'profile') await renderProfile();
            if (panelName === 'notes') await renderNotes();
            if (panelName === 'settings') await renderSettings();
            if (panelName === 'admin') await renderAdminPanel();
        }

        navTabsContainer.addEventListener('click', (e) => {
            if (e.target.classList.contains('nav-tab')) {
                switchPanel(e.target.dataset.panel);
            }
        });

        async function renderDashboard() {
            const userId = currentUserId;
            const user = await db.users.get(userId);
            if (!user) return;
            const activity = await db.activityLog.where('userId').equals(userId).reverse().limit(5).toArray();
            const notesCount = await db.notes.where('userId').equals(userId).count();
            const totalActions = await db.activityLog.where('userId').equals(userId).count();
            const settings = await getSettings(userId);

            const fullName = [user.firstName, user.lastName].filter(Boolean).join(' ') || 'مستخدم';

            panels.dashboard.innerHTML = `
                <div class="welcome-hero">
                    <h2>👋 أهلاً بك، ${escapeHTML(fullName)}!</h2>
                    <p>مرحباً بعودتك إلى لوحة التحكم الخاصة بك. نتمنى لك تجربة مميزة.</p>
                </div>
                <div class="card">
                    <div class="card-header"><div class="card-icon gold">📊</div><div><div class="card-title">إحصائيات الحساب</div></div></div>
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-value gold">${notesCount}</div><div class="stat-label">ملاحظة</div></div>
                        <div class="stat-card"><div class="stat-value">${totalActions}</div><div class="stat-label">إجراء</div></div>
                        <div class="stat-card"><div class="stat-value">${settings.language === 'ar' ? '🇸🇦' : '🇺🇸'}</div><div class="stat-label">اللغة</div></div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header"><div class="card-icon blue">🕒</div><div><div class="card-title">آخر النشاطات</div></div></div>
                    ${activity.length === 0 ? '<div style="color:var(--text-dim);text-align:center;padding:20px;">لا توجد نشاطات بعد</div>' :
                    activity.map(a => `
                        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:12px;color:#ddd;">
                            <span>${a.action}</span>
                            <span style="color:var(--text-dim);">${new Date(a.timestamp).toLocaleString('ar-EG',{hour:'2-digit',minute:'2-digit',day:'numeric',month:'numeric'})}</span>
                        </div>`).join('')}
                </div>
            `;
        }

        async function renderProfile() {
            const user = await db.users.get(currentUserId);
            if (!user) return;
            const settings = await getSettings(currentUserId);
            const sessionsCount = await db.sessions.where('userId').equals(currentUserId).count();
            const notesCount = await db.notes.where('userId').equals(currentUserId).count();

            panels.profile.innerHTML = `
                <div class="card">
                    <div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap;">
                        <div style="position:relative;width:85px;height:85px;">
                            <img src="${user.photoUrl || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.firstName||'U')}&background=FFD700&color=000&size=256`}" style="width:100%;height:100%;border-radius:50%;border:3px solid #FFD700;object-fit:cover;" onerror="this.src='https://ui-avatars.com/api/?name=U&background=555&color=fff&size=256'">
                            <button onclick="openEditProfileModal()" style="position:absolute;bottom:0;right:0;background:var(--gold-dark);border:none;width:28px;height:28px;border-radius:50%;color:#000;font-weight:bold;cursor:pointer;">✎</button>
                        </div>
                        <div>
                            <div style="color:#fff;font-size:22px;font-weight:800;">${escapeHTML(user.firstName||'')} ${escapeHTML(user.lastName||'')}</div>
                            <div style="color:var(--accent);">@${escapeHTML(user.username||'unknown')}</div>
                            <div style="color:var(--text-dim);font-size:11px;">Telegram ID: ${user.telegramId}</div>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <table style="width:100%;border-collapse:collapse;font-size:12px;">
                        <tr><td style="color:var(--text-dim);padding:8px;">📅 تاريخ الإنشاء</td><td style="color:#fff;text-align:left;">${new Date(user.createdAt).toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'})}</td></tr>
                        <tr><td style="color:var(--text-dim);padding:8px;">🕐 آخر تحديث</td><td style="color:#fff;text-align:left;">${new Date(user.updatedAt).toLocaleString('ar-EG')}</td></tr>
                        <tr><td style="color:var(--text-dim);padding:8px;">🔑 الجلسات</td><td style="color:#fff;text-align:left;">${sessionsCount}</td></tr>
                        <tr><td style="color:var(--text-dim);padding:8px;">📝 الملاحظات</td><td style="color:#fff;text-align:left;">${notesCount}</td></tr>
                        <tr><td style="color:var(--text-dim);padding:8px;">🌐 اللغة</td><td style="color:#fff;text-align:left;">${settings.language === 'ar' ? 'العربية' : 'English'}</td></tr>
                    </table>
                    <button class="btn btn-primary btn-sm" onclick="openEditProfileModal()" style="margin-top:12px;">✏️ تعديل الملف</button>
                </div>
            `;
        }

        async function renderNotes() {
            const notes = await db.notes.where('userId').equals(currentUserId).reverse().sortBy('createdAt');
            panels.notes.innerHTML = `
                <div class="card">
                    <div class="card-header"><div class="card-icon gold">📝</div><div><div class="card-title">ملاحظاتي</div></div></div>
                    <button class="btn btn-primary btn-sm" onclick="addNotePrompt()" style="margin-bottom:12px;">➕ ملاحظة جديدة</button>
                    ${notes.length === 0 ? '<div style="color:var(--text-dim);text-align:center;padding:20px;">لا توجد ملاحظات بعد</div>' :
                    notes.map(n => `
                        <div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:12px;padding:12px;margin-bottom:8px;">
                            <div style="color:#fff;font-weight:600;">${escapeHTML(n.title)}</div>
                            <div style="color:var(--text-dim);font-size:11px;margin-top:6px;">${escapeHTML(n.content)}</div>
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
                                <span style="color:rgba(255,255,255,0.2);font-size:10px;">${new Date(n.createdAt).toLocaleString('ar-EG')}</span>
                                <button class="btn btn-danger btn-sm" onclick="deleteNote(${n.id})">🗑</button>
                            </div>
                        </div>`).join('')}
                </div>`;
        }

        async function renderSettings() {
            const settings = await getSettings(currentUserId);
            panels.settings.innerHTML = `
                <div class="card">
                    <div class="card-header"><div class="card-icon blue">⚙️</div><div><div class="card-title">الإعدادات</div></div></div>
                    <div style="display:flex;gap:12px;flex-wrap:wrap;">
                        <button class="btn btn-outline btn-sm" onclick="toggleNotifications()">${settings.notifications ? '🔕 إيقاف الإشعارات' : '🔔 تشغيل الإشعارات'}</button>
                        <button class="btn btn-outline btn-sm" onclick="switchLanguage()">🌍 تبديل اللغة (${settings.language === 'ar' ? 'English' : 'العربية'})</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteMyAccount()">🗑 حذف حسابي</button>
                    </div>
                </div>`;
        }

        async function renderAdminPanel() {
            if (!isAdmin) return;
            const users = await getAllUsers();
            panels.admin.innerHTML = `
                <div class="card">
                    <div class="card-header"><div class="card-icon gold">🛡️</div><div><div class="card-title">إدارة المستخدمين</div><div class="card-subtitle">عدد المستخدمين: ${users.length}</div></div></div>
                    <div style="overflow-x:auto;">
                        <table class="admin-table">
                            <thead><tr><th>Telegram ID</th><th>الاسم</th><th>اسم المستخدم</th><th>تاريخ التسجيل</th><th>إجراءات</th></tr></thead>
                            <tbody>
                                ${users.map(u => `
                                    <tr>
                                        <td>${u.telegramId}</td>
                                        <td>${escapeHTML(u.firstName||'')} ${escapeHTML(u.lastName||'')}</td>
                                        <td>@${escapeHTML(u.username||'غير معروف')}</td>
                                        <td>${new Date(u.createdAt).toLocaleDateString('ar-EG')}</td>
                                        <td class="admin-actions">
                                            <button class="btn btn-danger btn-sm" onclick="adminDeleteUser(${u.id})">🗑 حذف</button>
                                        </td>
                                    </tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
        }

        // ==================== ACTIONS ====================
        function openEditProfileModal() {
            db.users.get(currentUserId).then(user => {
                if (!user) return;
                const firstName = prompt('الاسم الأول:', user.firstName);
                if (firstName === null) return;
                const lastName = prompt('اسم العائلة:', user.lastName);
                if (lastName === null) return;
                const username = prompt('اسم المستخدم:', user.username);
                if (username === null) return;
                const photoUrl = prompt('رابط الصورة:', user.photoUrl);
                if (photoUrl === null) return;
                db.users.update(currentUserId, {
                    firstName,
                    lastName,
                    username,
                    photoUrl,
                    updatedAt: Date.now()
                }).then(async () => {
                    await logActivity(currentUserId, 'profile_updated');
                    updateUserPill();
                    switchPanel('profile');
                    showToast('✅ تم تحديث الملف الشخصي');
                });
            });
        }

        async function addNotePrompt() {
            const title = prompt('عنوان الملاحظة:');
            if (!title) return;
            const content = prompt('المحتوى:');
            if (content === null) return;
            await db.notes.add({
                userId: currentUserId,
                title,
                content: content || '',
                createdAt: Date.now()
            });
            await logActivity(currentUserId, 'note_added', title);
            switchPanel('notes');
            showToast('📝 تمت الإضافة');
        }

        async function deleteNote(noteId) {
            if (confirm('حذف الملاحظة؟')) {
                await db.notes.delete(noteId);
                await logActivity(currentUserId, 'note_deleted');
                switchPanel('notes');
                showToast('🗑 تم الحذف');
            }
        }

        async function toggleNotifications() {
            const s = await getSettings(currentUserId);
            await updateSettings(currentUserId, { notifications: !s.notifications });
            switchPanel('settings');
            showToast(s.notifications ? '🔕 تم الإيقاف' : '🔔 تم التشغيل');
        }

        async function switchLanguage() {
            const s = await getSettings(currentUserId);
            const newLang = s.language === 'ar' ? 'en' : 'ar';
            await updateSettings(currentUserId, { language: newLang });
            switchPanel('settings');
            showToast(newLang === 'ar' ? '🌐 العربية' : '🌐 English');
        }

        async function deleteMyAccount() {
            if (confirm('⚠️ هل أنت متأكد من حذف حسابك وجميع بياناتك؟')) {
                await deleteUserAccount(currentUserId);
                clearSession();
                location.reload();
            }
        }

        async function adminDeleteUser(userId) {
            if (confirm('حذف هذا المستخدم نهائياً؟')) {
                const success = await deleteUserAccount(userId);
                if (success) {
                    switchPanel('admin');
                    showToast('🗑 تم حذف المستخدم');
                }
            }
        }

        // ==================== UI HELPERS ====================
        async function updateUserPill() {
            const user = await db.users.get(currentUserId);
            if (!user) return;
            const name = [user.firstName, user.lastName].filter(Boolean).join(' ') || 'مستخدم';
            pillName.textContent = name;
            pillImg.src = user.photoUrl || `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=FFD700&color=000&size=40`;
            pillImg.onerror = () => { pillImg.src =
                    'https://ui-avatars.com/api/?name=U&background=555&color=fff&size=40'; };
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ==================== APP LOGIC ====================
        async function showApp(tgUser) {
            const userId = await findOrCreateUser(tgUser);
            currentUserId = userId;
            currentTelegramUser = tgUser;
            isAdmin = (tgUser.id.toString() === CONFIG.ADMIN_TELEGRAM_ID);
            setSession(userId, tgUser);
            await db.sessions.add({ userId, loginTime: Date.now() });
            await logActivity(userId, 'login', 'تسجيل دخول');

            gate.classList.add('hidden');
            scene.classList.remove('blurred');
            appShell.classList.add('active');
            botArea.classList.add('dimmed');
            footer.classList.add('dimmed');

            buildNavigationTabs();
            updateUserPill();
            switchPanel('dashboard');
            const name = [tgUser.first_name, tgUser.last_name].filter(Boolean).join(' ') || 'مستخدم';
            showToast(`👋 أهلاً ${name}! تم تحميل حسابك`);
        }

        async function logout() {
            if (currentUserId) await logActivity(currentUserId, 'logout');
            clearSession();
            currentUserId = null;
            isAdmin = false;
            appShell.classList.remove('active');
            botArea.classList.remove('dimmed');
            footer.classList.remove('dimmed');
            gate.classList.remove('hidden');
            scene.classList.add('blurred');
            loginContainer.innerHTML = '';
            createTelegramWidget();
            showToast('👋 تم تسجيل الخروج');
        }

        async function checkExistingSession() {
            const session = getSession();
            if (!session || !session.userId) return false;
            const user = await db.users.get(session.userId);
            if (!user) { clearSession(); return false; }
            currentUserId = user.id;
            currentTelegramUser = session.telegramUser;
            isAdmin = (user.telegramId.toString() === CONFIG.ADMIN_TELEGRAM_ID);
            gate.classList.add('hidden');
            scene.classList.remove('blurred');
            appShell.classList.add('active');
            botArea.classList.add('dimmed');
            footer.classList.add('dimmed');
            buildNavigationTabs();
            updateUserPill();
            switchPanel('dashboard');
            showToast('👋 مرحباً بعودتك');
            return true;
        }

        // ==================== TELEGRAM AUTH ====================
        function onTelegramAuth(userData) {
            if (!userData || !userData.id) { showError('بيانات غير مكتملة'); return; }
            const tgUser = {
                id: userData.id,
                first_name: userData.first_name || '',
                last_name: userData.last_name || '',
                username: userData.username || '',
                photo_url: userData.photo_url || '',
                auth_date: userData.auth_date || Math.floor(Date.now() / 1000),
                hash: userData.hash || '',
            };
            if (CONFIG.VERIFY_API_URL) {
                fetch(CONFIG.VERIFY_API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(userData) })
                    .then(r => r.json()).then(d => { if (d.valid) showApp(tgUser);
                        else showError('فشل التحقق'); })
                    .catch(() => showError('خطأ في السيرفر'));
            } else {
                showApp(tgUser);
            }
        }

        function handleWebAppAuth() {
            if (!window.Telegram?.WebApp?.initDataUnsafe?.user) return false;
            const u = window.Telegram.WebApp.initDataUnsafe.user;
            const tgUser = {
                id: u.id,
                first_name: u.first_name || '',
                last_name: u.last_name || '',
                username: u.username || '',
                photo_url: u.photo_url || '',
                auth_date: u.auth_date || Math.floor(Date.now() / 1000),
                hash: '',
            };
            showApp(tgUser);
            return true;
        }

        function createTelegramWidget() {
            loginContainer.innerHTML = '';
            const script = document.createElement('script');
            script.src = 'https://telegram.org/js/telegram-widget.js?22';
            script.async = true;
            script.setAttribute('data-telegram-login', CONFIG.BOT_USERNAME);
            script.setAttribute('data-size', 'large');
            script.setAttribute('data-radius', '12');
            script.setAttribute('data-onauth', 'onTelegramAuth(user)');
            loginContainer.appendChild(script);
        }

        // ==================== INIT ====================
        async function init() {
            if (await checkExistingSession()) return;
            if (handleWebAppAuth()) return;
            createTelegramWidget();
            gate.classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
