<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المحفظة الذكية - المتجر الإلكتروني</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts (Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <!-- Chart.js للإحصائيات -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #ffffff;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        /* Glassmorphism محسن */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(59, 130, 246, 0.3);
        }

        /* Animations */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-slide {
            animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* Loader */
        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: #3b82f6;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: 90%;
            max-width: 350px;
        }

        .toast {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 10px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
        }

        .toast.success { border-right: 4px solid #10b981; }
        .toast.error { border-right: 4px solid #ef4444; }
        .toast.warning { border-right: 4px solid #f59e0b; }
        .toast.info { border-right: 4px solid #3b82f6; }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastOut {
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* Badge متحرك */
        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.2);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Wallet Icon */
        .wallet-icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(145deg, #3b82f6, #8b5cf6);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: float 3s infinite ease-in-out;
            position: relative;
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.3);
        }

        .wallet-icon i {
            font-size: 40px;
            color: white;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

        .wallet-icon:hover {
            transform: scale(1.05) rotate(5deg);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: rgba(30, 41, 59, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            padding: 24px;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            transform: scale(0.9) translateY(20px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }

        /* Tabs */
        .modal-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 12px;
            background: transparent;
            border: none;
            color: #94a3b8;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-tab.active {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        /* Payment Methods */
        .payment-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            border-radius: 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
        }

        .payment-item:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: #3b82f6;
        }

        .payment-item.selected {
            background: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }

        .payment-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
        }

        /* Inputs */
        .custom-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            transition: all 0.2s;
        }

        .custom-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .custom-input::placeholder {
            color: #64748b;
        }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            font-size: 16px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 14px 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            font-size: 16px;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
        }

        /* Scrollbar */
        .scroll-custom::-webkit-scrollbar {
            width: 6px;
        }

        .scroll-custom::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        .scroll-custom::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.5);
            border-radius: 10px;
        }

        .scroll-custom::-webkit-scrollbar-thumb:hover {
            background: #3b82f6;
        }

        /* Product Card */
        .product-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-4px) scale(1.02);
            border-color: #3b82f6;
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.3);
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            transform: translateX(-100%);
            transition: transform 0.3s;
        }

        .product-card:hover::before {
            transform: translateX(0);
        }

        .discount-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 30px;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
        }

        .product-image {
            width: 100%;
            height: 140px;
            border-radius: 16px;
            object-fit: cover;
            background: linear-gradient(135deg, #3b82f620, #8b5cf620);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        /* Status Badges */
        .status-badge {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-pending { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .status-approved { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .status-rejected { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .status-processing { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .status-completed { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .status-cancelled { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

        /* Stars Rating */
        .stars {
            display: inline-flex;
            gap: 2px;
            direction: ltr;
        }

        .star {
            color: #f59e0b;
            font-size: 14px;
        }

        .star.empty {
            color: #475569;
        }

        /* Admin Card */
        .admin-card {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
        }

        .admin-card:hover {
            border-color: #f59e0b;
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.1);
        }

        /* Progress Bar */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border-radius: 10px;
            transition: width 0.3s;
        }

        /* Table */
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }

        .admin-table th {
            text-align: right;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            color: #94a3b8;
            font-weight: 600;
            font-size: 14px;
        }

        .admin-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #475569;
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #3b82f6;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        /* Color Picker */
        .color-picker {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.1);
            cursor: pointer;
        }

        /* Drag and Drop */
        .draggable {
            cursor: move;
        }

        .draggable.dragging {
            opacity: 0.5;
        }

        /* Gallery */
        .gallery-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
        }

        .gallery-item img {
            width: 100%;
            height: 80px;
            object-fit: cover;
        }

        .gallery-item .remove-image {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 24px;
            height: 24px;
            background: rgba(239, 68, 68, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .gallery-item:hover .remove-image {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="app" class="w-full max-w-md mx-auto p-4"></div>

    <!-- Modal Container -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        (function() {
            // ======================== إعدادات ثابتة محسنة ========================
            const CONFIG = {
                ADMIN_ID: 7609492965,
                DEFAULT_BALANCE: 1000,
                APP_NAME: 'المحفظة الذكية',
                STORAGE_KEYS: {
                    USERS: 'smart_wallet_users_v2',
                    WALLET: 'smart_wallet_data_v2',
                    PAYMENT_METHODS: 'smart_wallet_payments_v2',
                    DEPOSITS: 'smart_wallet_deposits_v2',
                    WITHDRAWALS: 'smart_wallet_withdrawals_v2',
                    PRODUCTS: 'smart_wallet_products_v2',
                    CATEGORIES: 'smart_wallet_categories_v2',
                    ORDERS: 'smart_wallet_orders_v2',
                    CART: 'smart_wallet_cart_v2',
                    NOTIFICATIONS: 'smart_wallet_notifications_v2',
                    STATS: 'smart_wallet_stats_v2',
                    COUPONS: 'smart_wallet_coupons_v2',
                    SETTINGS: 'smart_wallet_settings_v2'
                }
            };

            // ======================== Toast System ========================
            class Toast {
                constructor() {
                    this.container = document.getElementById('toastContainer');
                }

                show(message, type = 'info', duration = 3000) {
                    const toast = document.createElement('div');
                    toast.className = `toast ${type}`;
                    
                    const icons = {
                        success: 'fa-check-circle',
                        error: 'fa-exclamation-circle',
                        warning: 'fa-exclamation-triangle',
                        info: 'fa-info-circle'
                    };
                    
                    toast.innerHTML = `
                        <i class="fas ${icons[type]} text-${type === 'success' ? 'green' : type === 'error' ? 'red' : type === 'warning' ? 'yellow' : 'blue'}-400 text-xl"></i>
                        <div class="flex-1">${message}</div>
                    `;
                    
                    this.container.appendChild(toast);
                    
                    setTimeout(() => {
                        toast.remove();
                    }, duration);
                }

                success(message) { this.show(message, 'success'); }
                error(message) { this.show(message, 'error'); }
                warning(message) { this.show(message, 'warning'); }
                info(message) { this.show(message, 'info'); }
            }

            // ======================== Storage Service ========================
            class Storage {
                static get(key, defaultValue = null) {
                    try {
                        const data = localStorage.getItem(key);
                        return data ? JSON.parse(data) : defaultValue;
                    } catch {
                        return defaultValue;
                    }
                }

                static set(key, value) {
                    try {
                        localStorage.setItem(key, JSON.stringify(value));
                        return true;
                    } catch {
                        return false;
                    }
                }

                static remove(key) {
                    try {
                        localStorage.removeItem(key);
                        return true;
                    } catch {
                        return false;
                    }
                }
            }

            // ======================== ID Generator ========================
            const generateId = (prefix = '') => {
                return prefix + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            };

            // ======================== Date Utils ========================
            const formatDate = (isoString) => {
                return new Date(isoString).toLocaleString('ar-EG', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            };

            const formatRelativeTime = (isoString) => {
                const now = new Date();
                const date = new Date(isoString);
                const diff = Math.floor((now - date) / 1000);
                
                if (diff < 60) return 'منذ لحظات';
                if (diff < 3600) return `منذ ${Math.floor(diff / 60)} دقيقة`;
                if (diff < 86400) return `منذ ${Math.floor(diff / 3600)} ساعة`;
                return formatDate(isoString);
            };

            // ======================== Telegram Service ========================
            class TelegramService {
                constructor() {
                    this.tg = window.Telegram?.WebApp || null;
                    this.isAvailable = !!this.tg;
                }

                init() {
                    if (!this.isAvailable) return false;
                    this.tg.expand();
                    this.tg.ready();
                    this.tg.disableVerticalSwipes();
                    this.tg.setHeaderColor('#0f172a');
                    this.tg.setBackgroundColor('#0f172a');
                    return true;
                }

                getUser() {
                    return this.tg?.initDataUnsafe?.user || null;
                }

                close() {
                    this.tg?.close();
                }

                showAlert(message, title = 'تنبيه') {
                    this.tg?.showPopup({ title, message, buttons: [{ type: 'ok', text: 'حسناً' }] });
                }

                showConfirm(message, title = 'تأكيد', onConfirm) {
                    this.tg?.showPopup({
                        title,
                        message,
                        buttons: [
                            { id: 'confirm', type: 'ok', text: 'تأكيد' },
                            { id: 'cancel', type: 'cancel', text: 'إلغاء' }
                        ]
                    }, (btnId) => {
                        if (btnId === 'confirm' && onConfirm) onConfirm();
                    });
                }

                setMainButton(text, callback) {
                    if (!this.tg) return;
                    const btn = this.tg.MainButton;
                    btn.setText(text);
                    btn.setColor('#3b82f6');
                    btn.setTextColor('#ffffff');
                    btn.show();
                    btn.onClick(callback);
                }

                hideMainButton() {
                    this.tg?.MainButton.hide();
                }
            }

            // ======================== Advanced Data Service ========================
            class DataService {
                constructor() {
                    this.user = null;
                    this.balance = CONFIG.DEFAULT_BALANCE;
                    this.transactions = [];
                    this.paymentMethods = [];
                    this.deposits = [];
                    this.withdrawals = [];
                    this.categories = [];
                    this.products = [];
                    this.orders = [];
                    this.cart = [];
                    this.notifications = [];
                    this.coupons = [];
                    this.settings = {
                        storeName: 'المتجر الإلكتروني',
                        storeLogo: 'fa-store',
                        primaryColor: '#3b82f6',
                        secondaryColor: '#8b5cf6',
                        minWithdraw: 10,
                        maxWithdraw: 10000,
                        withdrawFee: 0,
                        enableReviews: true,
                        enableCoupons: true,
                        enableNotifications: true,
                        maintenance: false
                    };
                    this.stats = {
                        users: 0,
                        dailyOps: 0,
                        totalSales: 0,
                        totalOrders: 0,
                        totalProducts: 0,
                        totalCategories: 0,
                        revenue: 0,
                        lastUpdate: new Date().toISOString()
                    };
                    
                    this.loadAll();
                }

                loadAll() {
                    // Load user data
                    const wallet = Storage.get(CONFIG.STORAGE_KEYS.WALLET);
                    if (wallet) {
                        this.balance = wallet.balance || CONFIG.DEFAULT_BALANCE;
                        this.transactions = wallet.transactions || [];
                    }

                    // Load payment methods
                    this.paymentMethods = Storage.get(CONFIG.STORAGE_KEYS.PAYMENT_METHODS, [
                        { 
                            id: generateId('pm_'), 
                            name: 'USDT (TRC20)', 
                            icon: 'fa-brands fa-tether',
                            description: 'عملة رقمية مستقرة',
                            depositDetails: 'العنوان: T9eK3zX8qLp2mN5rV7bA1cD4fG6hJ8kQ\nالشبكة: TRC20',
                            withdrawDetails: 'أدخل عنوان USDT الخاص بك',
                            enabled: true
                        },
                        { 
                            id: generateId('pm_'), 
                            name: 'بطاقة فيزا', 
                            icon: 'fa-regular fa-credit-card',
                            description: 'بطاقات ائتمانية',
                            depositDetails: 'رقم البطاقة: **** **** **** 1234',
                            withdrawDetails: 'أدخل بيانات بطاقتك',
                            enabled: true
                        },
                        { 
                            id: generateId('pm_'), 
                            name: 'تحويل بنكي', 
                            icon: 'fa-solid fa-building-columns',
                            description: 'حوالة بنكية',
                            depositDetails: 'IBAN: SA0380000000608010167519',
                            withdrawDetails: 'أدخل رقم IBAN',

                addDeposit(amount, methodId, txId, user) {
                    if (amount < 10) return { success: false, message: 'الحد الأدنى للإيداع 10' };
                    
                    const method = this.paymentMethods.find(m => m.id === methodId);
                    const deposit = {
                        id: generateId('dep_'),
                        userId: user.id,
                        userName: `${user.first_name} ${user.last_name || ''}`.trim(),
                        amount,
                        method: method ? method.name : 'غير معروف',
                        methodId,
                        txId,
                        status: 'pending',
                        date: new Date().toISOString()
                    };
                    this.deposits.push(deposit);
                    this.saveRequests();
                    
                    this.addNotification(CONFIG.ADMIN_ID, 'طلب شحن جديد', `مبلغ: ${amount} من ${deposit.userName}`, 'info', { depositId: deposit.id });
                    
                    return { success: true, deposit };
                }

                addWithdrawal(amount, methodId, details, user) {
                    if (amount < this.settings.minWithdraw) {
                        return { success: false, message: `الحد الأدنى للسحب ${this.settings.minWithdraw}` };
                    }
                    if (amount > this.settings.maxWithdraw) {
                        return { success: false, message: `الحد الأقصى للسحب ${this.settings.maxWithdraw}` };
                    }
                    if (amount > this.balance) {
                        return { success: false, message: 'الرصيد غير كافٍ' };
                    }
                    
                    const method = this.paymentMethods.find(m => m.id === methodId);
                    const fee = (amount * this.settings.withdrawFee) / 100;
                    const finalAmount = amount - fee;
                    
                    const withdrawal = {
                        id: generateId('with_'),
                        userId: user.id,
                        userName: `${user.first_name} ${user.last_name || ''}`.trim(),
                        amount,
                        finalAmount,
                        fee,
                        method: method ? method.name : 'غير معروف',
                        methodId,
                        details,
                        status: 'pending',
                        date: new Date().toISOString()
                    };
                    this.withdrawals.push(withdrawal);
                    this.saveRequests();
                    
                    this.addNotification(CONFIG.ADMIN_ID, 'طلب سحب جديد', `مبلغ: ${amount} من ${withdrawal.userName}`, 'info', { withdrawalId: withdrawal.id });
                    
                    return { success: true, withdrawal };
                }

                approveDeposit(id) {
                    const deposit = this.deposits.find(d => d.id === id);
                    if (deposit && deposit.status === 'pending') {
                        deposit.status = 'approved';
                        this.balance += deposit.amount;
                        this.addTransaction('deposit', deposit.amount, `شحن عبر ${deposit.method}`, { depositId: id });
                        this.saveWallet();
                        this.saveRequests();
                        
                        this.addNotification(deposit.userId, '✅ تم قبول طلب الشحن', `تم شحن مبلغ ${deposit.amount} إلى محفظتك`, 'success');
                        this.stats.dailyOps++;
                        this.saveStats();
                        
                        return true;
                    }
                    return false;
                }

                rejectDeposit(id, reason = '') {
                    const deposit = this.deposits.find(d => d.id === id);
                    if (deposit) {
                        deposit.status = 'rejected';
                        deposit.rejectReason = reason;
                        this.saveRequests();
                        
                        this.addNotification(deposit.userId, '❌ تم رفض طلب الشحن', `تم رفض طلب الشحن بمبلغ ${deposit.amount}${reason ? ': ' + reason : ''}`, 'error');
                        
                        return true;
                    }
                    return false;
                }

                approveWithdrawal(id) {
                    const withdrawal = this.withdrawals.find(w => w.id === id);
                    if (withdrawal && withdrawal.status === 'pending' && this.balance >= withdrawal.amount) {
                        withdrawal.status = 'approved';
                        this.balance -= withdrawal.amount;
                        this.addTransaction('withdraw', -withdrawal.amount, `سحب عبر ${withdrawal.method}`, { withdrawalId: id });
                        this.saveWallet();
                        this.saveRequests();
                        
                        this.addNotification(withdrawal.userId, '✅ تم قبول طلب السحب', `تم سحب مبلغ ${withdrawal.amount} من محفظتك`, 'success');
                        this.stats.dailyOps++;

                    }
                    return false;

                addToCart(product, inputData = {}, quantity = 1) {
                    if (product.stock !== -1 && product.stock < quantity) {

                    }
                    
                    const item = {
                        id: generateId('cart_'),

                        quantity,

                        this.saveCart();
                        return true;
                    }
                    return false;
                }

                clearCart() {
                    this.cart = [];
                    this.saveCart();
                }

                getCartTotal() {
                    return this.cart.reduce((sum, item) => {
                        const price = item.price * (1 - (item.discount || 0) / 100);
                        return sum + (price * item.quantity);
                    }, 0);
                }

                // ========== Orders ==========
                saveOrders() {
                    Storage.set(CONFIG.STORAGE_KEYS.ORDERS, this.orders);
                }

                createOrder(product, inputData, quantity = 1) {
                    const finalPrice = product.price * (1 - (product.discount || 0) / 100);
                    const total = finalPrice * quantity;
                    
                    const order = {
                        id: generateId('ord_'),
                        userId: this.user?.id,
                        userName: this.user ? `${this.user.first_name} ${this.user.last_name || ''}`.trim() : 'مستخدم',
                        productId: product.id,
                        productName: product.name,
                        price: product.price,
                        finalPrice,
                        quantity,
                        total,
                        inputData,
                        status: 'pending',
                        fulfillment: product.fulfillment,
                        date: new Date().toISOString()
                    };
                    
                    this.orders.push(order);
                    this.saveOrders();
                    
                    // Update stock
                    if (product.stock !== -1) {
                        product.stock -= quantity;
                        this.saveProducts();
                    }
                    
                    // Update stats
                    this.stats.totalSales++;
                    this.stats.dailyOps++;
                    this.saveStats();
                    
                    return order;
                }

                checkout(couponCode = null) {
                    let total = this.getCartTotal();
                    let discount = 0;
                    
                    // Apply coupon
                    if (couponCode) {
                        const coupon = this.coupons.find(c => c.code === couponCode && c.enabled);
                        if (coupon && (!coupon.expiresAt || new Date(coupon.expiresAt) > new Date())) {
                            if (coupon.maxUses > coupon.used) {
                                if (total >= coupon.minPurchase) {
                                    if (coupon.type === 'percentage') {
                                        discount = (total * coupon.discount) / 100;
                                    } else {
                                        discount = coupon.discount;
                                    }
                                    total -= discount;
                                    coupon.used++;
                                    this.saveCoupons();
                                }
                            }
                        }
                    }
                    
                    if (total > this.balance) {
                        return { success: false, message: 'الرصيد غير كافٍ' };
                    }
                    
                    // Check stock for all items
                    for (const item of this.cart) {
                        const product = this.products.find(p => p.id === item.productId);
                        if (product && product.stock !== -1 && product.stock < item.quantity) {
                            return { success: false, message: `المنتج ${product.name} غير متوفر بالكمية المطلوبة` };
                        }
                    }
                    
                    // Create orders
                    const orders = [];
                    for (const item of this.cart) {
                        const product = this.products.find(p => p.id === item.productId);
                        const order = this.createOrder(product, item.inputData, item.quantity);
                        orders.push(order);
                        
                        this.addNotification(this.user.id, '✅ تم الطلب بنجاح', `تم طلب ${product.name} بنجاح`, 'success', { orderId: order.id });
                    }
                    
                    // Update balance
                    this.balance -= total;
                    this.addTransaction('purchase', -total, 'شراء من المتجر', { 
                        orders: orders.map(o => o.id),
                        discount,
                        coupon: couponCode
                    });
                    this.saveWallet();
                    
                    // Clear cart
                    this.clearCart();
                    
                    return { success: true, orders, total, discount };
                }

                validateCoupon(code, total) {
                    const coupon = this.coupons.find(c => c.code === code && c.enabled);
                    if (!coupon) return { valid: false, message: 'كوبون غير صالح' };
                    
                    if (coupon.expiresAt && new Date(coupon.expiresAt) < new Date()) {
                        return { valid: false, message: 'الكوبون منتهي الصلاحية' };
                    }
                    
                    if (coupon.maxUses <= coupon.used) {
                        return { valid: false, message: 'تم استنفاذ عدد استخدامات الكوبون' };
                    }
                    
                    if (total < coupon.minPurchase) {
                        return { valid: false, message: `الحد الأدنى للشراء ${coupon.minPurchase}` };
                    }
                    
                    let discount = 0;
                    if (coupon.type === 'percentage') {
                        discount = (total * coupon.discount) / 100;
                    } else {
                        discount = coupon.discount;
                    }
                    
                    return { 
                        valid: true, 
                        discount,
                        coupon
                    };
                }

                getSalesByDay(days = 7) {
                    const result = [];
                    const now = new Date();
                    
                    for (let i = days - 1; i >= 0; i--) {
                        const date = new Date(now);
                        date.setDate(date.getDate() - i);
                        const dateStr = date.toISOString().split('T')[0];
                        
                        const sales = this.orders.filter(o => 
                            o.date.startsWith(dateStr)
                        ).reduce((sum, o) => sum + o.total, 0);
                        
                        result.push({
                            date: dateStr,
                            sales
                        });
                    }
                    
                    return result;
                }

                getTopProducts(limit = 5) {
                    const productSales = {};
                    
                    this.orders.forEach(order => {
                        if (!productSales[order.productId]) {
                            productSales[order.productId] = {
                                id: order.productId,
                                name: order.productName,
                                quantity: 0,
                                revenue: 0
                            };
                        }
                        productSales[order.productId].quantity += order.quantity;
                        productSales[order.productId].revenue += order.total;
                    });
                    
                    return Object.values(productSales)
                        .sort((a, b) => b.revenue - a.revenue)
                        .slice(0, limit);
                }
            }

                bindWalletModalEvents() {
                    const closeBtn = this.modalContent.querySelector('.close-modal');
                    closeBtn?.addEventListener('click', () => this.modalOverlay.classList.remove('active'));
                    
                    // Tab switching
                    const tabs = this.modalContent.querySelectorAll('.modal-tab');
                    tabs.forEach(tab => {
                        tab.addEventListener('click', () => {
                            tabs.forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');
                            
                            const tabName = tab.dataset.tab;
                            this.modalContent.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                            this.modalContent.getElementById(`${tabName}Tab`).classList.remove('hidden');
                        });
                    });
                    
                    // Deposit method selection
                    let selectedMethod = null;
                    const methodItems = this.modalContent.querySelectorAll('.payment-item[data-method-id]');
                    const detailsDiv = this.modalContent.getElementById('depositDetails');
                    const detailsText = this.modalContent.getElementById('depositDetailsText');
                    
                    methodItems.forEach(item => {
                        item.addEventListener('click', () => {
                            methodItems.forEach(i => i.classList.remove('selected'));
                            item.classList.add('selected');
                            
                            const methodId = item.dataset.methodId;
                            selectedMethod = methodId;
                            
                            const method = this.data.paymentMethods.find(m => m.id === methodId);
                            if (method?.depositDetails) {
                                detailsText.textContent = method.depositDetails;
                                detailsDiv.classList.remove('hidden');
                            } else {
                                detailsDiv.classList.add('hidden');
                            }
                        });
                    });
                    
                    // Submit deposit
                    this.modalContent.getElementById('submitDeposit')?.addEventListener('click', () => {
                        const amount = parseFloat(this.modalContent.getElementById('depositAmount').value);
                        const txId = this.modalContent.getElementById('depositTxId').value.trim();
                        
                        if (isNaN(amount) || amount < 10) {
                            this.toast.error('أدخل مبلغ صحيح (10 فأكثر)');
                            return;
                        }
                        
                        if (!selectedMethod) {
                            this.toast.error('اختر طريقة دفع أولاً');
                            return;
                        }
                        
                        if (!txId) {
                            this.toast.error('أدخل رقم العملية');
                            return;
                        }
                        
                        const result = this.data.addDeposit(amount, selectedMethod, txId, this.data.user);
                        
                        if (result.success) {
                            this.toast.success(`✅ تم تقديم طلب الشحن رقم ${result.deposit.id.slice(-6)}`);
                            this.modalOverlay.classList.remove('active');
                        } else {
                            this.toast.error(result.message);
                        }
                    });
                    
                    // Withdraw method selection
                    let selectedWithdrawMethod = null;
                    const withdrawItems = this.modalContent.querySelectorAll('[data-withdraw-method]');
                    withdrawItems.forEach(item => {
                        item.addEventListener('click', () => {
                            withdrawItems.forEach(i => i.classList.remove('selected'));
                            item.classList.add('selected');
                            selectedWithdrawMethod = item.dataset.withdrawMethod;
                        });
                    });
                    
                    // Submit withdrawal
                    this.modalContent.getElementById('submitWithdraw')?.addEventListener('click', () => {
                        const amount = parseFloat(this.modalContent.getElementById('withdrawAmount').value);
                        const details = this.modalContent.getElementById('withdrawDetails').value.trim();
                        
                        if (isNaN(amount) || amount < this.data.settings.minWithdraw) {
                            this.toast.error(`أدخل مبلغ صحيح (${this.data.settings.minWithdraw} فأكثر)`);
                            return;
                        }
                        
                        if (!selectedWithdrawMethod) {
                            this.toast.error('اختر طريقة سحب أولاً');
                            return;
                        }
                        
                        if (!details) {
                            this.toast.error('أدخل التفاصيل المطلوبة');
                            return;
                        }
                        
                        const result = this.data.addWithdrawal(amount, selectedWithdrawMethod, details, this.data.user);
                        
                        if (result.success) {
                            this.toast.success(`✅ تم تقديم طلب السحب رقم ${result.withdrawal.id.slice(-6)}`);
                            this.modalOverlay.classList.remove('active');
                        } else {
                            this.toast.error(result.message);
                        }
                    });
                }

                    this.modalContent.getElementById('markAllRead')?.addEventListener('click', () => {
                        this.data.markAllAsRead();
                        this.toast.success('تم تحديد الكل كمقروء');
                        this.modalOverlay.classList.remove('active');
                        this.render();

                    this.modalContent.querySelectorAll('.mark-read').forEach(btn => {
                        btn.addEventListener('click', () => {

                            this.data.markNotificationAsRead(id);
                            this.modalOverlay.classList.remove('active');
                            this.render();

                            const itemTotal = item.price * item.quantity * (1 - (item.discount || 0) / 100);
                            return `
                                <div class="flex items-center gap-3 p-3 border-b border-white/5">
                                    <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-blue-500/20 to-purple-500/20 flex items-center justify-center shrink-0">
                                        <i class="${item.icon} text-xl text-blue-400"></i>
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <div class="font-bold text-sm truncate">${item.name}</div>

                    this.modalContent.innerHTML = `

                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                        
                        <!-- Search -->
                        <div class="mb-4">
                            <input type="text" id="storeSearch" class="custom-input" placeholder="🔍 ابحث عن منتج...">
                        </div>
                        
                        <!-- Categories -->
                        <div class="flex gap-2 mb-4 overflow-x-auto pb-2 scroll-custom">
                            <button class="category-tab px-4 py-2 rounded-full text-sm bg-blue-600 whitespace-nowrap" data-cat="all">الكل</button>
                            ${categoriesHtml}
                        </div>
                        
                        <!-- Products Grid -->
                        <div class="grid grid-cols-2 gap-3 mb-4 max-h-96 overflow-y-auto scroll-custom p-1" id="productsGrid">
                            ${productsHtml}
                        </div>
                        
                        <!-- Cart -->
                        <div class="glass-card p-4 rounded-2xl">
                            <div class="flex items-center justify-between mb-3">
                                <h3 class="font-bold flex items-center gap-2">
                                    <i class="fa-solid fa-cart-shopping"></i>
                                    سلة التسوق
                                </h3>
                                <span class="text-xs bg-blue-600 px-2 py-0.5 rounded-full">${cart.length}</span>

                                ${cartHtml}

                                <input type="text" id="couponCode" class="custom-input" placeholder="كود الخصم">

                            <div class="flex items-center justify-between pt-3 border-t border-white/10">
                                <span>المجموع:</span>
                                <span class="text-xl font-bold text-blue-400" id="cartTotal">${cartTotal.toFixed(2)}</span>
                            </div>
                            
                            <button class="btn-primary mt-3 ${cart.length === 0 ? 'opacity-50' : ''}" id="checkoutBtn" ${cart.length === 0 ? 'disabled' : ''}>

                    `;
                    
                    this.modalOverlay.classList.add('active');
                    this.bindStoreEvents();
                }

                bindStoreEvents() {
                    const closeBtn = this.modalContent.querySelector('.close-modal');
                    closeBtn?.addEventListener('click', () => this.modalOverlay.classList.remove('active'));
                    
                    // Category filter
                    const categoryTabs = this.modalContent.querySelectorAll('.category-tab');
                    categoryTabs.forEach(tab => {
                        tab.addEventListener('click', () => {
                            categoryTabs.forEach(t => t.classList.remove('bg-blue-600'));
                            tab.classList.add('bg-blue-600');
                            this.filterProducts();
                        });
                    });
                    
                    // Search
                    this.modalContent.getElementById('storeSearch')?.addEventListener('input', () => {
                        this.filterProducts();
                    });
                    
                    // Add to cart buttons
                    this.modalContent.querySelectorAll('.add-to-cart').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const productId = btn.dataset.productId;
                            const product = this.data.products.find(p => p.id === productId);
                            
                            if (product) {
                                const existing = this.data.cart.find(item => item.productId === productId);
                                
                                if (existing) {
                                    this.data.removeFromCart(existing.id);
                                    this.toast.info('تمت الإزالة من السلة');
                                } else {
                                    const result = this.data.addToCart(product, {}, 1);
                                    if (result.success) {
                                        this.toast.success('تمت الإضافة للسلة');
                                    }
                                }
                                
                                this.openStoreModal();
                            }
                        });
                    });
                    
                    // Product click for details
                    this.modalContent.querySelectorAll('.product-card').forEach(card => {
                        card.addEventListener('click', (e) => {
                            if (e.target.classList.contains('add-to-cart')) return;
                            const productId = card.dataset.productId;
                            this.openProductDetails(productId);
                        });
                    });
                    
                    // Remove from cart
                    this.modalContent.querySelectorAll('.remove-cart').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const cartId = btn.dataset.cartId;
                            this.data.removeFromCart(cartId);
                            this.toast.info('تمت الإزالة من السلة');
                            this.openStoreModal();
                        });
                    });
                    
                    // Checkout
                    this.modalContent.getElementById('checkoutBtn')?.addEventListener('click', () => {
                        const couponCode = this.modalContent.getElementById('couponCode').value;
                        const result = this.data.checkout(couponCode);
                        
                        if (result.success) {
                            this.toast.success('✅ تمت عملية الشراء بنجاح');
                            this.modalOverlay.classList.remove('active');
                            this.render();
                        } else {
                            this.toast.error(result.message);
                        }
                    });
                }

                filterProducts() {
                    const searchTerm = this.modalContent.getElementById('storeSearch').value.toLowerCase();
                    const activeCat = this.modalContent.querySelector('.category-tab.bg-blue-600')?.dataset.cat || 'all';
                    
                    const filtered = this.data.products.filter(p => {
                        const matchesSearch = p.name.toLowerCase().includes(searchTerm) || 
                                             (p.description && p.description.toLowerCase().includes(searchTerm));
                        const matchesCat = activeCat === 'all' || p.categoryId === activeCat;
                        return matchesSearch && matchesCat;
                    });
                    
                    const cart = this.data.cart;
                    
                    const html = filtered.map(p => {
                        const inCart = cart.some(item => item.productId === p.id);
                        const finalPrice = p.price * (1 - (p.discount || 0) / 100);
                        
                        return `
                            <div class="product-card" data-product-id="${p.id}">
                                ${p.discount ? `<span class="discount-badge">-${p.discount}%</span>` : ''}
                                <div class="product-image">
                                    <i class="${p.icon} text-4xl text-blue-400"></i>
                                </div>
                                <h3 class="font-bold mb-1 truncate">${p.name}</h3>
                                <div class="flex items-center gap-1 mb-2">
                                    <div class="stars">
                                        ${Array(5).fill(0).map((_, i) => `
                                            <i class="fa-solid fa-star ${i < Math.floor(p.rating) ? 'text-yellow-400' : 'text-gray-600'}"></i>
                                        `).join('')}
                                    </div>
                                    <span class="text-xs text-gray-400">(${p.reviews || 0})</span>
                                </div>
                                <div class="flex items-center justify-between">
                                    <div>
                                        ${p.discount ? `
                                            <span class="text-xs text-gray-400 line-through ml-1">${p.price}</span>
                                        ` : ''}
                                        <span class="text-blue-400 font-bold">${finalPrice}</span>
                                    </div>
                                    <button class="add-to-cart ${inCart ? 'bg-green-600' : 'bg-blue-600'} text-white px-3 py-1 rounded-lg text-sm" data-product-id="${p.id}">
                                        ${inCart ? '✓ في السلة' : '➕'}
                                    </button>
                                </div>
                            </div>
                        `;
                    }).join('');
                    
                    this.modalContent.getElementById('productsGrid').innerHTML = html || '<p class="text-center text-gray-400 py-8 col-span-2">لا توجد منتجات</p>';
                    
                    // Rebind events
                    this.modalContent.querySelectorAll('.add-to-cart').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const productId = btn.dataset.productId;
                            const product = this.data.products.find(p => p.id === productId);
                            
                            if (product) {
                                const existing = this.data.cart.find(item => item.productId === productId);
                                
                                if (existing) {
                                    this.data.removeFromCart(existing.id);
                                    this.toast.info('تمت الإزالة من السلة');
                                } else {
                                    const result = this.data.addToCart(product, {}, 1);
                                    if (result.success) {
                                        this.toast.success('تمت الإضافة للسلة');
                                    }
                                }
                                
                                this.filterProducts();
                                this.updateCartDisplay();
                            }
                        });
                    });
                    
                    this.modalContent.querySelectorAll('.product-card').forEach(card => {
                        card.addEventListener('click', (e) => {
                            if (e.target.classList.contains('add-to-cart')) return;
                            const productId = card.dataset.productId;
                            this.openProductDetails(productId);
                        });
                    });
                }

                updateCartDisplay() {
                    const cart = this.data.cart;
                    const cartTotal = this.data.getCartTotal();
                    
                    const cartHtml = cart.length === 0 
                        ? '<p class="text-center text-gray-400 py-4">السلة فارغة</p>'
                        : cart.map(item => {
                            const itemTotal = item.price * item.quantity * (1 - (item.discount || 0) / 100);
                            return `
                                <div class="flex items-center gap-3 p-3 border-b border-white/5">
                                    <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-blue-500/20 to-purple-500/20 flex items-center justify-center shrink-0">
                                        <i class="${item.icon} text-xl text-blue-400"></i>
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <div class="font-bold text-sm truncate">${item.name}</div>
                                        <div class="text-xs text-gray-400">الكمية: ${item.quantity}</div>
                                    </div>
                                    <div class="text-blue-400 font-bold">${itemTotal.toFixed(2)}</div>
                                    <button class="remove-cart text-red-400 hover:text-red-300 shrink-0" data-cart-id="${item.id}">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </div>
                            `;
                        }).join('');
                    
                    const cartItems = this.modalContent.getElementById('cartItems');
                    if (cartItems) cartItems.innerHTML = cartHtml;
                    
                    const totalEl = this.modalContent.querySelector('#cartTotal');
                    if (totalEl) totalEl.textContent = cartTotal.toFixed(2);
                    
                    const cartCount = this.modalContent.querySelector('.bg-blue-600.px-2.py-0.5');
                    if (cartCount) cartCount.textContent = cart.length;
                    
                    const checkoutBtn = this.modalContent.getElementById('checkoutBtn');
                    if (checkoutBtn) {
                        if (cart.length === 0) {
                            checkoutBtn.disabled = true;
                            checkoutBtn.classList.add('opacity-50');
                        } else {
                            checkoutBtn.disabled = false;
                            checkoutBtn.classList.remove('opacity-50');
                        }
                    }
                    
                    // Rebind remove events
                    this.modalContent.querySelectorAll('.remove-cart').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const cartId = btn.dataset.cartId;
                            this.data.removeFromCart(cartId);
                            this.toast.info('تمت الإزالة من السلة');
                            this.updateCartDisplay();
                        });
                    });
                }

                openProductDetails(productId) {
                    const product = this.data.products.find(p => p.id === productId);
                    if (!product) return;
                    
                    const inputFieldsHtml = product.inputFields.map(field => `
                        <div class="mb-3">
                            <label class="block text-sm text-gray-400 mb-1">${field.label}</label>
                            <input type="${field.type}" id="field_${field.name}" class="custom-input" placeholder="${field.placeholder || ''}" ${field.required ? 'required' : ''}>
                        </div>
                    `).join('');
                    
                    const finalPrice = product.price * (1 - (product.discount || 0) / 100);
                    
                    this.modalContent.innerHTML = `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">${product.name}</h2>
                            <button class="close-modal w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 transition">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                        
                        <div class="flex justify-center mb-4">
                            <div class="w-32 h-32 rounded-2xl bg-gradient-to-br from-blue-500/20 to-purple-500/20 flex items-center justify-center">
                                <i class="${product.icon} text-5xl text-blue-400"></i>
                            </div>
                        </div>
                        
                        <p class="text-gray-300 text-sm mb-4 text-center">${product.description || ''}</p>
                        
                        <!-- Rating -->
                        <div class="flex items-center justify-center gap-2 mb-4">
                            <div class="stars">
                                ${Array(5).fill(0).map((_, i) => `
                                    <i class="fa-solid fa-star ${i < Math.floor(product.rating) ? 'text-yellow-400' : 'text-gray-600'}"></i>
                                `).join('')}
                            </div>
                            <span class="text-sm text-gray-400">${product.rating} (${product.reviews || 0} تقييم)</span>
                        </div>
                        
                        <div class="glass-card p-4 rounded-2xl mb-4">
                            <div class="text-center mb-4">
                                ${product.discount ? `
                                    <span class="text-gray-400 line-through ml-2">${product.price}</span>
                                ` : ''}
                                <span class="text-3xl font-bold text-blue-400">${finalPrice}</span>
                            </div>
                            
                            <form id="productForm">
                                ${inputFieldsHtml}
                                
                                <div class="mb-3">
                                    <label class="block text-sm text-gray-400 mb-1">الكمية</label>
                                    <input type="number" id="productQuantity" value="1" min="1" max="${product.stock === -1 ? 100 : product.stock}" class="custom-input">
                                </div>
                                
                                <div class="flex gap-2">
                                    <button type="button" id="addToCartBtn" class="btn-secondary flex-1">
                                        <i class="fa-solid fa-cart-plus ml-1"></i>
                                        أضف للسلة
                                    </button>
                                    <button type="submit" id="buyNowBtn" class="btn-primary flex-1">
                                        <i class="fa-solid fa-bolt ml-1"></i>
                                        شراء الآن
                                    </button>
                                </div>
                            </form>
                        </div>
                        
                        <!-- Fulfillment Info -->
                        <div class="glass-card p-4 rounded-2xl">
                            <div class="flex items-center gap-2 text-sm text-gray-300">
                                <i class="fa-solid fa-truck"></i>
                                <span>${product.fulfillment?.instructions || 'سيتم توفير المنتج فور الشراء'}</span>
                            </div>
                        </div>
                    `;
                    
                    this.modalOverlay.classList.add('active');
                    
                    const closeBtn = this.modalContent.querySelector('.close-modal');
                    closeBtn?.addEventListener('click', () => this.modalOverlay.classList.remove('active'));
                    
                    // Add to cart
                    this.modalContent.getElementById('addToCartBtn')?.addEventListener('click', () => {
                        const quantity = parseInt(this.modalContent.getElementById('productQuantity').value) || 1;
                        const inputData = {};
                        
                        product.inputFields.forEach(field => {
                            const input = this.modalContent.getElementById(`field_${field.name}`);
                            if (input) inputData[field.name] = input.value;
                        });
                        
                        const result = this.data.addToCart(product, inputData, quantity);
                        
                        if (result.success) {
                            this.toast.success('تمت الإضافة للسلة');
                            this.modalOverlay.classList.remove('active');
                        } else {
                            this.toast.error(result.message);
                        }
                    });
                    
                    // Buy now
                    this.modalContent.getElementById('productForm')?.addEventListener('submit', (e) => {
                        e.preventDefault();
                        
                        const quantity = parseInt(this.modalContent.getElementById('productQuantity').value) || 1;
                        const total = finalPrice * quantity;
                        
                        if (total > this.data.balance) {
                            this.toast.error('الرصيد غير كافٍ');
                            return;
                        }
                        
                        const inputData = {};
                        product.inputFields.forEach(field => {
                            const input = this.modalContent.getElementById(`field_${field.name}`);
                            if (input) inputData[field.name] = input.value;
                        });
                        
                        // Create order
                        const order = this.data.createOrder(product, inputData, quantity);
                        
                        // Update balance
                        this.data.balance -= total;
                        this.data.addTransaction('purchase', -total, `شراء ${product.name}`, { orderId: order.id });
                        this.data.saveWallet();
                        
                        this.data.addNotification(this.data.user.id, '✅ تم الشراء بنجاح', `تم شراء ${product.name}`, 'success', { orderId: order.id });
                        
                        this.toast.success('✅ تمت عملية الشراء بنجاح');
                        this.modalOverlay.classList.remove('active');
                        this.render();
                    });
                }

                // ========== Orders Modal ==========
                openOrdersModal() {
                    const orders = this.data.getUserOrders();
                    
                    const ordersHtml = orders.length === 0 
                        ? '<p class="text-center text-gray-400 py-8">لا توجد طلبات</p>'

                    `;

                    const closeBtn = this.modalContent.querySelector('.close-modal');
                    closeBtn?.addEventListener('click', () => this.modalOverlay.classList.remove('active'));
                    
                    this.modalContent.getElementById('cancelBtn')?.addEventListener('click', () => {
                        this.modalOverlay.classList.remove('active');
                    });
                    
                    this.modalContent.getElementById('methodForm')?.addEventListener('submit', (e) => {
                        e.preventDefault();
                        
                        const formData = {
                            name: this.modalContent.getElementById('methodName').value,
                            icon: this.modalContent.getElementById('methodIcon').value,
                            description: this.modalContent.getElementById('methodDescription').value,
                            depositDetails: this.modalContent.getElementById('methodDepositDetails').value,
                            withdrawDetails: this.modalContent.getElementById('methodWithdrawDetails').value
                        };
                        
                        const id = this.modalContent.getElementById('methodId').value;
                        
                        if (id) {
                            this.data.updatePaymentMethod(id, formData);
                            this.toast.success('تم التحديث بنجاح');
                        } else {
                            this.data.addPaymentMethod(formData);
                            this.toast.success('تمت الإضافة بنجاح');
                        }
                        
                        this.modalOverlay.classList.remove('active');
                    });

                    `).join('');
                    
                    this.modalContent.innerHTML = `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">جميع الطلبات</h2>
                            <button class="close-modal w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 transition">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                        
                        <div class="scroll-custom" style="max-height: 600px; overflow-y: auto;">
                            ${ordersHtml || '<p class="text-center text-gray-400 py-8">لا توجد طلبات</p>'}
                        </div>
                    `;
                    
                    this.modalOverlay.classList.add('active');
                    
                    const closeBtn = this.modalContent.querySelector('.close-modal');
                    closeBtn?.addEventListener('click', () => this.modalOverlay.classList.remove('active'));
                    
                    this.modalContent.querySelectorAll('.order-status').forEach(select => {
                        select.addEventListener('change', (e) => {
                            const orderId = select.dataset.orderId;
                            const newStatus = e.target.value;
                            
                            if (this.data.updateOrderStatus(orderId, newStatus)) {
                                this.toast.success('تم تحديث حالة الطلب');
                            }
                        });
                    });
                }
            }

            // ======================== Main App ========================
            class App {
                constructor() {
                    this.toast = new Toast();
                    this.telegram = new TelegramService();
                    this.data = new DataService();
                    this.ui = null;
                    
                    this.init();
                }

                init() {
                    // Check Telegram
                    if (!this.telegram.isAvailable) {
                        this.showTelegramMissing();
                        return;
                    }
                    
                    this.telegram.init();
                    
                    // Get user
                    const user = this.telegram.getUser();
                    
                    if (!user) {
                        this.showAccessDenied();
                        return;
                    }
                    
                    // Set user
                    this.data.user = user;
                    
                    // Load cart for this user
                    const savedCart = Storage.get(`${CONFIG.STORAGE_KEYS.CART}_${user.id}`, []);
                    this.data.cart = savedCart;
                    
                    // Register user
                    this.data.registerUser(user.id);
                    
                    // Initialize UI
                    this.ui = new UIManager(this.data, this.telegram, this.toast);
                    
                    // Set main button
                    this.telegram.setMainButton('تحديث', () => {
                        this.ui.render();
                        this.toast.success('تم تحديث البيانات');
                    });
                    
                    // Welcome message
                    this.toast.success(`مرحباً ${user.first_name} 👋`);
                }

                showTelegramMissing() {
                    document.getElementById('app').innerHTML = `
                        <div class="glass-card p-8 rounded-3xl text-center animate-slide">
                            <div class="w-20 h-20 bg-orange-500/10 text-orange-500 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">
                                <i class="fa-solid fa-exclamation-triangle"></i>
                            </div>
                            <h2 class="text-2xl font-bold mb-2">بيئة غير مدعومة</h2>
                            <p class="text-gray-400 mb-6">يجب فتح هذا التطبيق من داخل تيليجرام</p>
                            <a href="https://t.me/your_bot" target="_blank" class="btn-primary inline-block">
                                <i class="fa-brands fa-telegram ml-2"></i>
                                فتح في تيليجرام
                            </a>
                        </div>
                    `;
                }

                showAccessDenied() {
                    document.getElementById('app').innerHTML = `
                        <div class="glass-card p-8 rounded-3xl text-center animate-slide">
                            <div class="w-20 h-20 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">
                                <i class="fa-solid fa-shield-halved"></i>
                            </div>
                            <h2 class="text-2xl font-bold mb-2">دخول محظور</h2>
                            <p class="text-gray-400 mb-6">يجب فتح هذا التطبيق من خلال البوت الرسمي</p>
                            <a href="https://t.me/your_bot" target="_blank" class="btn-primary inline-block">
                                <i class="fa-brands fa-telegram ml-2"></i>
                                فتح البوت
                            </a>
                        </div>
                    `;
                }
            }

            // Start the app
            new App();
        })();
    </script>
</body>
</html>
