<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>البوابة الذهبية | Gold Gate</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                        luxury: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        gold: {
                            100: '#F9F1D8',
                            300: '#E5C560',
                            400: '#D4AF37',
                            500: '#C5A028',
                            600: '#AA8820',
                            glow: '#FFD700',
                        },
                        black: {
                            900: '#050505',
                            800: '#0a0a0a',
                            700: '#121212',
                            card: '#1a1a1a',
                        }
                    },
                    backgroundImage: {
                        'gold-gradient': 'linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C)',
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'shine': 'shine 3s linear infinite',
                        'pulse-gold': 'pulseGold 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
                        shine: { '0%': { backgroundPosition: '-200% center' }, '100%': { backgroundPosition: '200% center' } },
                        pulseGold: { '0%, 100%': { opacity: 1, boxShadow: '0 0 10px rgba(212, 175, 55, 0.2)' }, '50%': { opacity: .8, boxShadow: '0 0 20px rgba(212, 175, 55, 0.5)' } },
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --glass-bg: rgba(20, 20, 20, 0.7);
            --glass-border: rgba(212, 175, 55, 0.15);
            --gold-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
            margin: 0;
        }

        /* Luxury Glassmorphism */
        .luxury-card {
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }
        
        .luxury-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.5), transparent);
        }

        .luxury-card:active {
            transform: scale(0.98);
            border-color: rgba(212, 175, 55, 0.3);
        }

        /* Gold Text Effect */
        .text-gold-gradient {
            background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 5s linear infinite;
        }

        /* Background Ambience */
        .ambient-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            animation: float 10s infinite ease-in-out;
            background: radial-gradient(circle, rgba(212,175,55,0.4) 0%, rgba(0,0,0,0) 70%);
        }
        .glow-1 { top: -10%; right: -10%; width: 400px; height: 400px; }
        .glow-2 { bottom: -10%; left: -10%; width: 300px; height: 300px; animation-delay: -5s; }

        /* Loader */
        .loader-ring {
            width: 60px; height: 60px;
            border: 2px solid rgba(212, 175, 55, 0.1);
            border-top-color: #D4AF37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast */
        .toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 90%; max-width: 350px; pointer-events: none; }
        .toast {
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #fff;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            pointer-events: auto;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .toast.hide { animation: slideUp 0.3s ease forwards; }
        @keyframes slideUp { to { opacity: 0; transform: translateY(-20px); } }

        .hidden-view { display: none !important; }
        .fade-in { animation: scaleIn 0.5s ease-out forwards; }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* Progress Bar */
        .progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #AA771C, #FCF6BA, #AA771C);
            background-size: 200% 100%;
            animation: shine 2s linear infinite;
            width: 0%;
            transition: width 1s ease-out;
        }
    </style>
</head>

    <script>
        const tg = window.Telegram.WebApp;
        
        // State Management
        const views = {
            loading: document.getElementById('loadingView'),
            denied: document.getElementById('accessDeniedView'),
            dashboard: document.getElementById('dashboardView')
        };

        const els = {
            userName: document.getElementById('userName'),
            userId: document.getElementById('userId'),
            photo: document.getElementById('userPhoto'),
            defaultAvatar: document.getElementById('defaultAvatar'),
            initials: document.getElementById('avatarInitials'),
            balance: document.getElementById('userBalance'),
            subtext: document.getElementById('loadingSubtext')
        };

        // --- PROFESSIONAL SMART WAIT LOGIC (FIXED) ---
        function init() {
            tg.expand();
            tg.ready(); // Tell Telegram we are ready
            
            // Update loading text dynamically
            let step = 0;
            const steps = ["جارِ التحقق من الهوية...", "تشفير البيانات...", "إنشاء الجلسة الآمنة..."];
            const intervalText = setInterval(() => {
                step = (step + 1) % steps.length;
                if(els.subtext) els.subtext.textContent = steps[step];
            }, 800);

            // Function to attempt login
            const attemptLogin = () => {
                // Check if initData and user exist
                if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                    clearInterval(intervalText);
                    clearInterval(pollInterval);
                    clearTimeout(timeoutId);
                    onAuthSuccess(tg.initDataUnsafe.user);
                    return true;
                }
                return false;
            };

            // 1. Try immediately
            if (attemptLogin()) return;

            // 2. Listen for 'ready' event explicitly
            tg.onEvent('ready', () => {
                if (!attemptLogin()) {
                    // If still no data after 'ready', start polling
                    startPolling();
                }
            });

            // 3. Polling Mechanism (Check every 50ms for faster response)
            let pollCount = 0;
            const maxPolls = 100; // 100 * 50ms = 5 seconds max wait
            let pollInterval;
            
            const startPolling = () => {
                pollInterval = setInterval(() => {
                    pollCount++;
                    if (attemptLogin()) return;
                    
                    if (pollCount >= maxPolls) {
                        clearInterval(pollInterval);
                        onAuthFailed();
                    }
                }, 50); // Faster check interval
            };

            // Start polling immediately as a fallback if 'ready' event is delayed
            startPolling();

            // 4. Safety Timeout (Fail-safe)
            let timeoutId = setTimeout(() => {
                if (!views.dashboard.classList.contains('hidden-view')) return; // Already success
                clearInterval(pollInterval);
                clearInterval(intervalText);
                onAuthFailed();
            }, 6000);
        }

        function onAuthSuccess(user) {
            loadUserData(user);
            switchView('dashboard');
            setupMainButton();
            // Force dark theme for Telegram header to match our black theme
            tg.setHeaderColor('#050505'); 
            tg.setBackgroundColor('#050505');
        }

        function onAuthFailed() {
            switchView('denied');
        }

        function switchView(viewName) {
            Object.values(views).forEach(el => el.classList.add('hidden-view'));
            views[viewName].classList.remove('hidden-view');
            
            if(viewName === 'loading') {
                views.loading.classList.remove('hidden-view');
                views.loading.style.opacity = '1';
            } else {
                views.loading.style.opacity = '0';
                setTimeout(() => views.loading.classList.add('hidden-view'), 700);
            }
        }

        function loadUserData(user) {
            const fullName = `${user.first_name} ${user.last_name || ''}`.trim();
            els.userName.textContent = fullName;
            els.userId.textContent = `ID: ${user.id}`;
            
            if (user.photo_url) {
                els.photo.src = user.photo_url;
                els.photo.classList.remove('hidden');
                els.defaultAvatar.classList.add('hidden');
            } else {
                els.photo.classList.add('hidden');
                els.defaultAvatar.classList.remove('hidden');
                const initials = (user.first_name.charAt(0) + (user.last_name ? user.last_name.charAt(0) : '')).toUpperCase();
                els.initials.textContent = initials || "U";
            }

            // Simulate Real Data Fetching with Animation
            const simulatedBalance = Math.floor(Math.random() * 5000) + 1000; 
            animateValue(els.balance, 0, simulatedBalance, 2000);
        }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const easeOutQuart = 1 - Math.pow(1 - progress, 4);
                
                const currentVal = Math.floor(easeOutQuart * (end - start) + start);
                obj.innerHTML = currentVal.toLocaleString('en-US');
                
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        function setupMainButton() {
            tg.MainButton.setText("تحديث الرصيد");
            tg.MainButton.setTextColor("#000000");
            tg.MainButton.setColor("#D4AF37"); // Gold Color
            tg.MainButton.show();
            
            tg.MainButton.onClick(() => {
                tg.HapticFeedback.notificationOccurred('success');
                showToast('تم مزامنة البيانات بنجاح', 'success');
                
                const current = parseInt(els.balance.innerText.replace(/,/g,''));
                const increase = Math.floor(Math.random() * 100) + 50;
                animateValue(els.balance, current, current + increase, 1000);
            });
        }

        function copyId() {
            const id = els.userId.textContent.replace('ID: ', '');
            navigator.clipboard.writeText(id).then(() => {
                tg.HapticFeedback.selectionChanged();
                showToast('تم نسخ المعرف ID', 'info');
            });
        }

        function handleAction(type) {
            tg.HapticFeedback.impactOccurred('light');
            if (type === 'deposit') {
                showToast('جارٍ فتح بوابة الإيداع...', 'info');
                setTimeout(() => showToast('خاصية قادمة قريباً', 'error'), 1000);
            } else if (type === 'withdraw') {
                showToast('جارٍ معالجة الطلب...', 'info');
            } else if (type === 'tasks') {
                showToast('قائمة المهام قيد التحميل', 'info');
            } else if (type === 'referral') {
                showToast('رابط الدعوة: t.me/yourbot?start=123', 'success');
            }
        }

        function confirmLogout() {
            tg.HapticFeedback.notificationOccurred('warning');
            tg.showConfirm("هل تريد إنهاء الجلسة؟", (confirmed) => {
                if (confirmed) tg.close();
            });
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            
            let icon = '<i class="fa-solid fa-circle-info text-yellow-500 text-lg"></i>';
            if (type === 'success') icon = '<i class="fa-solid fa-check-circle text-green-500 text-lg"></i>';
            if (type === 'error') icon = '<i class="fa-solid fa-triangle-exclamation text-red-500 text-lg"></i>';

            toast.innerHTML = `${icon}<span class="text-sm font-medium flex-1 text-gray-200">${message}</span>`;
            
            container.appendChild(toast);
            tg.HapticFeedback.impactOccurred('light');

            setTimeout(() => {
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Start the app
        init();
    </script>
</body>
</html>
