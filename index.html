<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة تيليجرام المتطورة - كازينو حقيقي</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts (Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--tg-theme-bg-color, #0f172a);
            color: var(--tg-theme-text-color, #ffffff);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* الخلفية المتحركة */
        .ambient-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }
        
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 10s infinite ease-in-out;
        }
        
        .orb-1 { top: -10%; right: -10%; width: 300px; height: 300px; background: #3b82f6; animation-delay: 0s; }
        .orb-2 { bottom: -10%; left: -10%; width: 250px; height: 250px; background: #8b5cf6; animation-delay: 5s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, 40px); }
        }

        /* Glassmorphism */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(40, 51, 69, 0.8);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Animations */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-enter {
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Loader */
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--tg-theme-button-color, #3b82f6);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Avatar */
        .default-avatar {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            font-weight: bold;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 90%;
            max-width: 350px;
            pointer-events: none;
        }

        .toast {
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 12px 20px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: toastSlideUp 0.3s ease, toastFadeOut 0.3s ease 5.7s forwards;
            pointer-events: auto;
            direction: rtl;
            white-space: pre-line;
            line-height: 1.6;
        }

        .toast.success { border-right: 4px solid #10b981; }
        .toast.error { border-right: 4px solid #ef4444; }
        .toast.warning { border-right: 4px solid #f59e0b; }
        .toast.info { border-right: 4px solid #3b82f6; }

        .toast-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .toast.success .toast-icon { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .toast.error .toast-icon { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .toast.warning .toast-icon { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .toast.info .toast-icon { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }

        .toast-message { flex: 1; }

        @keyframes toastSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastFadeOut {
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* Theme toggle */
        .theme-toggle {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: rgba(40, 51, 69, 0.8);
        }

        /* Settings panel */
        .settings-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 1000;
            border-radius: 30px 30px 0 0;
        }

        .settings-panel.open { transform: translateY(0); }

        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .settings-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        /* Wallet Modal */
        .wallet-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .wallet-modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .wallet-modal {
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .wallet-modal-overlay.open .wallet-modal { transform: scale(1); }

        .wallet-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 12px;
            flex-wrap: wrap;
        }

        .wallet-tab {
            flex: 1;
            min-width: 70px;
            padding: 8px 5px;
            text-align: center;
            border-radius: 12px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.5);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
        }

        .wallet-tab.active {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .wallet-tab i { margin-left: 6px; font-size: 14px; }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .transaction-item:last-child { border-bottom: none; }
        .transaction-amount.positive { color: #10b981; }
        .transaction-amount.negative { color: #ef4444; }

        /* أيقونة المحفظة الكبيرة والمتطورة */
        .wallet-icon-large {
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, #3b82f6, #8b5cf6);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.5), 0 0 0 2px rgba(255,255,255,0.1) inset;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: floatWallet 3s infinite ease-in-out;
            position: relative;
            overflow: hidden;
        }

        .wallet-icon-large::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), transparent 70%);
            opacity: 0.6;
        }

        .wallet-icon-large i {
            font-size: 36px;
            color: white;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            animation: pulseIcon 2s infinite ease-in-out;
            position: relative;
            z-index: 2;
        }

        .wallet-icon-large:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.8), 0 0 0 4px rgba(255,255,255,0.2) inset;
        }

        @keyframes floatWallet {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        @keyframes pulseIcon {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* بطاقة الرصيد الصغيرة */
        .balance-badge {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 6px 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 12px;
        }

        .balance-badge i { color: #fbbf24; }

        /* شارة الإشعارات */
        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.2);
            animation: pulse-badge 1.5s infinite;
        }

        @keyframes pulse-badge {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* طرق الدفع - صور وأيقونات */
        .payment-method {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
        }

        .payment-method:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .payment-method.selected {
            background: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
        }

        .payment-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: #334155;
            color: white;
            flex-shrink: 0;
            overflow: hidden;
        }
        
        .payment-icon img {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            object-fit: cover;
        }

        /* تفاصيل طريقة الدفع عند الاختيار */
        .payment-details {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 12px;
            margin: 10px 0 15px 0;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 13px;
            line-height: 1.6;
        }

        .payment-details strong { color: #3b82f6; }

        /* لوحة المشرف - إدارة المستخدمين */
        .user-item {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .user-item.blocked { opacity: 0.5; filter: grayscale(0.5); }

        .badge-blocked {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 600;
        }

        /* أزرار تحرير طرق الدفع */
        .payment-method-admin {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .payment-method-admin .actions button {
            background: transparent;
            border: none;
            color: #94a3b8;
            margin: 0 4px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .payment-method-admin .actions button:hover { color: white; }
        .payment-method-admin .actions button.delete:hover { color: #ef4444; }
        .payment-method-admin .actions button.edit:hover { color: #3b82f6; }

        /* Modal لتعديل رصيد المستخدم */
        .edit-balance-modal {
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            padding: 24px;
            width: 100%;
            max-width: 350px;
        }

        /* رفع الصور */
        .image-upload-area {
            border: 2px dashed rgba(59, 130, 246, 0.5);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(0,0,0,0.2);
        }
        .image-upload-area:hover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }
        .image-preview {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            object-fit: cover;
            border: 2px solid #3b82f6;
            margin: 10px auto;
        }
        .delete-image-btn {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-top: 5px;
        }
        .delete-image-btn:hover {
            background: #ef4444;
            color: white;
        }

        /* أنماط الكازينو */
        .casino-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        .casino-grid .glass-card {
            padding: 15px;
            text-align: center;
            cursor: pointer;
        }
        .casino-grid .glass-card i {
            font-size: 24px;
            margin-bottom: 8px;
            display: block;
            color: #fbbf24;
        }
        .casino-wheel-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 20px auto;
        }
        .wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #2d3748;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 3s cubic-bezier(0.25, 0.1, 0.15, 1);
        }
        .wheel-pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #f59e0b;
            filter: drop-shadow(0 4px 2px rgba(0,0,0,0.3));
            z-index: 5;
        }
        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: #1e293b;
            border-radius: 50%;
            border: 3px solid #f59e0b;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 6;
        }
        .bet-input {
            background: rgba(0,0,0,0.3);
            border: 1px solid #f59e0b;
            color: white;
            padding: 10px;
            border-radius: 30px;
            width: 120px;
            text-align: center;
            font-size: 16px;
            margin: 0 10px;
        }
        .spin-btn {
            background: linear-gradient(145deg, #f59e0b, #d97706);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.4);
            transition: all 0.2s;
        }
        .spin-btn:hover { transform: scale(1.05); }
        .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .casino-history {
            max-height: 150px;
            overflow-y: auto;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 10px;
            margin-top: 15px;
        }
        .casino-history-item {
            display: flex;
            justify-content: space-between;
            padding: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 12px;
        }
        .win-text { color: #10b981; }
        .lose-text { color: #ef4444; }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="ambient-light">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Theme Toggle -->
    <div class="theme-toggle" id="themeToggle">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
        <span class="text-sm">السمة</span>
    </div>

    <!-- Main Container -->
    <div id="app" class="w-full max-w-md p-5 relative"></div>

    <!-- Settings Panel -->
    <div class="settings-overlay" id="settingsOverlay"></div>
    <div class="settings-panel" id="settingsPanel">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-bold">الإعدادات</h3>
            <button id="closeSettings" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
        <div class="space-y-4">
            <div class="flex items-center justify-between">
                <span>اللغة</span>
                <select class="bg-white/10 rounded-lg p-2" id="languageSelect">
                    <option value="ar">العربية</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div class="flex items-center justify-between">
                <span>الإشعارات</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" id="notificationsToggle">
                    <div class="w-11 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600"></div>
                </label>
            </div>
            <div class="flex items-center justify-between">
                <span>تنبيه صوتي</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" id="soundToggle" checked>
                    <div class="w-11 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600"></div>
                </label>
            </div>
            <div class="flex items-center justify-between">
                <span>اهتزاز</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" id="vibrateToggle" checked>
                    <div class="w-11 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600"></div>
                </label>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Wallet Modal -->
    <div class="wallet-modal-overlay" id="walletModalOverlay">
        <div class="wallet-modal" id="walletModalContent"></div>
    </div>

    <!-- Admin Panel Modal -->
    <div class="wallet-modal-overlay" id="adminPanelOverlay">
        <div class="wallet-modal" id="adminPanelContent" style="max-width: 500px;"></div>
    </div>

    <!-- Payment Method Modal (مع رفع الصور) -->
    <div class="wallet-modal-overlay" id="paymentMethodModalOverlay">
        <div class="wallet-modal" id="paymentMethodModalContent" style="max-width: 450px;"></div>
    </div>

    <!-- Edit User Balance Modal -->
    <div class="wallet-modal-overlay" id="editBalanceModalOverlay">
        <div class="edit-balance-modal" id="editBalanceModalContent"></div>
    </div>

    <!-- Casino Modal -->
    <div class="wallet-modal-overlay" id="casinoModalOverlay">
        <div class="wallet-modal" id="casinoModalContent" style="max-width: 500px;"></div>
    </div>

    <script>
        (function() {
            // ======================== الإعدادات الثابتة ========================
            const CONFIG = {
                ADMIN_ID: 7609492965, // غيّر هذا إلى معرف المشرف الخاص بك
                DEFAULT_BALANCE: 1000,
                MAX_TRANSACTIONS: 50,
                STORAGE_KEYS: {
                    USERS_DATA: 'users_data',
                    DEPOSIT_REQUESTS: 'deposit_requests',
                    WITHDRAWAL_REQUESTS: 'withdrawal_requests',

            class StorageService {
                static get(key, defaultValue = null) {
                    try {
                        const value = localStorage.getItem(key);
                        return value !== null ? JSON.parse(value) : defaultValue;
                    } catch (e) {
                        console.warn(`Storage read error for key ${key}:`, e);
                        return defaultValue;
                    }
                }

                static set(key, value) {
                    try {
                        localStorage.setItem(key, JSON.stringify(value));
                        return true;
                    } catch (e) {
                        console.warn(`Storage write error for key ${key}:`, e);
                        return false;
                    }
                }

                static remove(key) {
                    try {
                        localStorage.removeItem(key);
                        return true;
                    } catch (e) {
                        console.warn(`Storage remove error for key ${key}:`, e);
                        return false;
                    }
                }
            }

            class ToastManager {
                constructor(containerId) {
                    this.container = document.getElementById(containerId);
                    if (!this.container) {
                        this.container = document.createElement('div');
                        this.container.id = containerId;
                        this.container.className = 'toast-container';
                        document.body.appendChild(this.container);
                    }
                    this.activeToasts = [];
                    this.soundEnabled = true;
                    this.vibrateEnabled = true;
                }

                show(message, type = 'info', duration = 5000) {
                    const toast = document.createElement('div');
                    toast.className = `toast ${type}`;
                    
                    const iconMap = {
                        success: 'fa-solid fa-check',
                        error: 'fa-solid fa-exclamation',
                        warning: 'fa-solid fa-triangle-exclamation',
                        info: 'fa-solid fa-info'
                    };
                    
                    toast.innerHTML = `
                        <div class="toast-icon"><i class="${iconMap[type] || iconMap.info}"></i></div>
                        <div class="toast-message">${message}</div>
                    `;
                    
                    this.container.appendChild(toast);
                    this.activeToasts.push(toast);
                    
                    if (this.soundEnabled && (type === 'success' || type === 'warning' || type === 'info')) {
                        this.playSound(type);
                    }
                    
                    if (this.vibrateEnabled && navigator.vibrate) {
                        navigator.vibrate(200);
                    }
                    
                    setTimeout(() => {
                        toast.remove();
                        this.activeToasts = this.activeToasts.filter(t => t !== toast);
                    }, duration);
                }

                playSound(type) {
                    try {
                        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        const oscillator = audioCtx.createOscillator();
                        const gainNode = audioCtx.createGain();
                        
                        oscillator.connect(gainNode);
                        gainNode.connect(audioCtx.destination);
                        
                        oscillator.type = 'sine';
                        oscillator.frequency.value = type === 'success' ? 800 : (type === 'warning' ? 600 : 400);
                        gainNode.gain.value = 0.1;
                        
                        oscillator.start();
                        oscillator.stop(audioCtx.currentTime + 0.2);
                    } catch (e) {
                        console.log('Web Audio not supported');
                    }
                }

                success(message) { this.show(message, 'success'); }
                error(message) { this.show(message, 'error'); }
                warning(message) { this.show(message, 'warning'); }
                info(message) { this.show(message, 'info'); }
            }

                updateUserBalance(userId, delta, reason, type = 'adjust') {
                    const userData = this.getUserData(userId);
                    userData.balance += delta;
                    
                    const transaction = {
                        id: IdGenerator.generate('tx_'),
                        type,
                        amount: delta,
                        note: reason,
                        date: new Date().toISOString(),
                        status: 'مكتمل'
                    };
                    userData.transactions.unshift(transaction);
                    if (userData.transactions.length > CONFIG.MAX_TRANSACTIONS) {
                        userData.transactions.pop();
                    }
                    
                    userData.lastActive = new Date().toISOString();
                    this.saveUserData(userId, userData);
                    
                    if (this.state.user && this.state.user.id == userId) {
                        this.state.currentUserData = userData;

                // ---------- الطلبات ----------
                loadRequests() {
                    this.state.depositRequests = StorageService.get(CONFIG.STORAGE_KEYS.DEPOSIT_REQUESTS, []);
                    this.state.withdrawalRequests = StorageService.get(CONFIG.STORAGE_KEYS.WITHDRAWAL_REQUESTS, []);

                saveRequests() {
                    StorageService.set(CONFIG.STORAGE_KEYS.DEPOSIT_REQUESTS, this.state.depositRequests);
                    StorageService.set(CONFIG.STORAGE_KEYS.WITHDRAWAL_REQUESTS, this.state.withdrawalRequests);
                }

                addDepositRequest(amount, methodId, transactionId, user) {
                    const method = this.state.paymentMethods.find(m => m.id === methodId);
                    const request = {
                        id: IdGenerator.generate('dep_'),
                        userId: user.id,
                        userName: `${user.first_name} ${user.last_name || ''}`.trim(),
                        amount,
                        method: method ? method.name : methodId,
                        methodId,
                        transactionId,
                        status: 'pending',
                        date: new Date().toISOString()
                    };
                    this.state.depositRequests.push(request);
                    this.saveRequests();
                    this.incrementDailyOps();
                    window.dispatchEvent(new CustomEvent('newDepositRequest', { detail: request }));
                    return request;
                }

                addWithdrawalRequest(amount, methodId, details, user) {
                    const userData = this.getUserData(user.id);
                    if (amount > userData.balance) {
                        return { success: false, message: 'الرصيد غير كافٍ', request: null };
                    }
                    const method = this.state.paymentMethods.find(m => m.id === methodId);
                    const request = {
                        id: IdGenerator.generate('with_'),
                        userId: user.id,
                        userName: `${user.first_name} ${user.last_name || ''}`.trim(),
                        amount,
                        method: method ? method.name : methodId,
                        methodId,
                        details,
                        status: 'pending',
                        date: new Date().toISOString()
                    };
                    this.state.withdrawalRequests.push(request);
                    this.saveRequests();
                    this.incrementDailyOps();
                    window.dispatchEvent(new CustomEvent('newWithdrawalRequest', { detail: request }));
                    return { success: true, id: request.id, request };
                }

                acceptRequest(request, type) {
                    if (type === 'deposit') {
                        const req = this.state.depositRequests.find(r => r.id === request.id);
                        if (req && req.status === 'pending') {
                            req.status = 'approved';
                            this.updateUserBalance(req.userId, req.amount, `شحن عبر ${req.method} (رقم العملية: ${req.transactionId || 'غير محدد'})`, 'deposit');
                            this.saveRequests();
                            this.notificationService.addNotification(
                                req.userId,
                                '✅ تم قبول طلب الشحن',
                                `تم قبول طلب الشحن بمبلغ ${req.amount} عبر ${req.method}. رقم العملية: ${req.transactionId || 'غير محدد'}`,
                                'success'
                            );
                            return true;
                        }
                    } else if (type === 'withdrawal') {
                        const req = this.state.withdrawalRequests.find(r => r.id === request.id);
                        if (req && req.status === 'pending') {
                            const userData = this.getUserData(req.userId);
                            if (userData.balance >= req.amount) {
                                req.status = 'approved';
                                this.updateUserBalance(req.userId, -req.amount, `سحب عبر ${req.method} إلى ${req.details || 'محفظة'}`, 'withdraw');
                                this.saveRequests();
                                this.notificationService.addNotification(
                                    req.userId,
                                    '✅ تم قبول طلب السحب',
                                    `تم قبول طلب السحب بمبلغ ${req.amount} عبر ${req.method}. التفاصيل: ${req.details}`,
                                    'success'
                                );
                                return true;
                            } else {
                                return false;
                            }
                        }
                    }
                    return false;
                }

                rejectRequest(request, type) {
                    if (type === 'deposit') {
                        const req = this.state.depositRequests.find(r => r.id === request.id);
                        if (req) {
                            req.status = 'rejected';
                            this.saveRequests();
                            this.notificationService.addNotification(
                                req.userId,
                                '❌ تم رفض طلب الشحن',
                                `تم رفض طلب الشحن بمبلغ ${req.amount} عبر ${req.method}.`,
                                'error'
                            );
                            return true;
                        }
                    } else if (type === 'withdrawal') {
                        const req = this.state.withdrawalRequests.find(r => r.id === request.id);
                        if (req) {
                            req.status = 'rejected';
                            this.saveRequests();
                            this.notificationService.addNotification(
                                req.userId,
                                '❌ تم رفض طلب السحب',
                                `تم رفض طلب السحب بمبلغ ${req.amount} عبر ${req.method}.`,
                                'error'
                            );
                            return true;
                        }
                    }
                    return false;
                }

                // إضافة جولة كازينو إلى السجل العام
                addCasinoGameRecord(userId, userName, bet, multiplier, result, winAmount) {
                    const record = {
                        id: IdGenerator.generate('casino_'),
                        userId,
                        userName,
                        bet,
                        multiplier,
                        result: winAmount > 0 ? 'win' : 'lose',
                        winAmount,
                        date: new Date().toISOString()
                    };
                    this.state.casinoHistory.unshift(record);
                    if (this.state.casinoHistory.length > 50) {
                        this.state.casinoHistory.pop();
                    }
                    this.saveCasinoHistory();
                    
                    // تحديث إحصائيات المستخدم
                    const userData = this.getUserData(userId);
                    if (!userData.casinoStats) userData.casinoStats = { totalBets: 0, totalWins: 0, totalLoss: 0, netProfit: 0 };
                    userData.casinoStats.totalBets += 1;
                    if (winAmount > 0) {
                        userData.casinoStats.totalWins += 1;
                        userData.casinoStats.netProfit += winAmount - bet;
                    } else {
                        userData.casinoStats.totalLoss += 1;
                        userData.casinoStats.netProfit -= bet;
                    }
                    this.saveUserData(userId, userData);
                }

                // جلب سجل كازينو مستخدم معين
                getUserCasinoHistory(userId) {
                    return this.state.casinoHistory.filter(r => r.userId === userId).slice(0, 20);
                }

                // معالجة رهان الكازينو (Spin Wheel)
                processWheelBet(userId, betAmount) {
                    const userData = this.getUserData(userId);
                    if (userData.blocked) {
                        return { success: false, message: 'حسابك محظور' };
                    }
                    if (userData.balance < betAmount) {
                        return { success: false, message: 'الرصيد غير كافٍ' };
                    }

                    const settings = this.state.casinoSettings;
                    const segments = settings.wheelSegments;
                    
                    // حساب الوزن التراكمي
                    let totalWeight = segments.reduce((sum, s) => sum + s.weight, 0);
                    let rand = Math.random() * totalWeight;
                    let cumulative = 0;
                    let selectedSegment = segments[0];
                    for (let seg of segments) {
                        cumulative += seg.weight;
                        if (rand < cumulative) {
                            selectedSegment = seg;
                            break;
                        }
                    }

                    const multiplier = selectedSegment.multiplier;
                    const winAmount = multiplier === 0 ? 0 : Math.round(betAmount * multiplier);
                    const delta = winAmount - betAmount; // صافي التغير في الرصيد

                    // خصم الرهان أولاً ثم إضافة الربح
                    this.updateUserBalance(userId, delta, `لعبة سبين: ${selectedSegment.label} (رهان ${betAmount})`, 'casino');

                    // تسجيل السجل
                    this.addCasinoGameRecord(userId, userData.name || `مستخدم ${userId}`, betAmount, multiplier, selectedSegment.label, winAmount);

                    return {
                        success: true,
                        segment: selectedSegment,
                        bet: betAmount,
                        winAmount,
                        newBalance: userData.balance + delta
                    };
                }
            }

                    window.addEventListener('newWithdrawalRequest', (e) => this.handleNewRequest(e.detail, 'سحب'));
                    window.addEventListener('newNotification', (e) => this.handleNewNotification(e.detail));
                }

                handleStateChange(e) {
                    const { key, value } = e.detail;
                    if (key === 'currentUserData' && value) {
                        this.updateBalanceDisplay();
                    }
                    if (key === 'stats') {
                        this.updateStatsDisplay();
                    }

                handleNewRequest(request, type) {
                    if (this.state.isAdmin) {

                            • المبلغ: ${request.amount}

                            • الرجاء مراجعة الطلب في لوحة الإدارة`);
                        
                        this.updatePendingBadge();
                    }
                }

                handleNewNotification(notification) {
                    if (this.state.user && this.state.user.id === notification.userId) {
                        this.toast.show(notification.message, notification.type);
                        this.updateNotificationBadge();
                        if (!this.state.isAdmin) {

                    const walletIcon = document.getElementById('walletIconLarge');
                    if (!walletIcon) return;
                    
                    const count = this.data.getPendingRequestsCount();
                    let badge = walletIcon.querySelector('.notification-badge');
                    
                    if (count > 0) {
                        if (!badge) {
                            badge = document.createElement('span');
                            badge.className = 'notification-badge';
                            walletIcon.style.position = 'relative';
                            walletIcon.appendChild(badge);

                        badge.textContent = count > 9 ? '9+' : count;

                                <div class="mb-3">
                                    <label class="text-sm text-gray-400">رقم العملية (TXID):</label>
                                    <input type="text" id="depositTransactionId" placeholder="أدخل رقم العملية" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">

                                <div class="flex gap-2">
                                    <input type="number" id="depositAmount" placeholder="المبلغ" class="flex-1 bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                                    <button id="depositBtn" class="bg-blue-600 px-4 rounded-lg font-bold">تقديم طلب</button>

                            </div>

                                <p class="text-sm text-gray-300 mb-3">اختر طريقة السحب:</p>

                                <div id="withdrawDetailsContainer" class="mb-3">
                                    <input type="text" id="withdrawDetails" placeholder="أدخل التفاصيل" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 mb-2 text-white">
                                </div>
                                <div class="flex gap-2">
                                    <input type="number" id="withdrawAmount" placeholder="المبلغ" class="flex-1 bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                                    <button id="withdrawBtn" class="bg-red-600 px-4 rounded-lg font-bold">طلب سحب</button>
                                </div>
                                <p class="text-xs text-gray-400 mt-2">سيتم مراجعة طلب السحب من قبل الإدارة.</p>

                                <p class="text-sm text-gray-300 mb-2">تحويل إلى مستخدم آخر:</p>
                                <input type="text" id="transferUserId" placeholder="معرف المستخدم" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 mb-2 text-white">
                                <div class="flex gap-2">
                                    <input type="number" id="transferAmount" placeholder="المبلغ" class="flex-1 bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                                    <button id="transferBtn" class="bg-green-600 px-4 rounded-lg font-bold">تحويل</button>
                                </div>
                            </div>

                            <div class="tab-pane hidden" id="tab-history">
                                <div class="max-h-64 overflow-y-auto">${transactionsHtml}</div>
                            </div>
                        </div>
                    `;
                }

                bindWalletModalEvents() {
                    const modalOverlay = document.getElementById('walletModalOverlay');
                    document.getElementById('closeWalletModal').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });
                    modalOverlay.addEventListener('click', (e) => {
                        if (e.target === modalOverlay) modalOverlay.classList.remove('open');
                    });

                    const tabs = document.querySelectorAll('.wallet-tab');
                    tabs.forEach(tab => {
                        tab.addEventListener('click', () => {
                            tabs.forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');
                            const tabId = tab.dataset.tab;
                            document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.add('hidden'));
                            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
                        });
                    });

                    // اختيار طريقة الشحن
                    const paymentMethods = document.querySelectorAll('.payment-methods-list .payment-method');
                    let selectedMethod = null;
                    const detailsDisplay = document.getElementById('depositDetailsDisplay');
                    const detailsText = document.getElementById('depositDetailsText');
                    
                    paymentMethods.forEach(method => {
                        method.addEventListener('click', () => {
                            paymentMethods.forEach(m => m.classList.remove('selected'));
                            method.classList.add('selected');
                            selectedMethod = method.dataset.methodId;
                            
                            const methodObj = this.state.paymentMethods.find(m => m.id === selectedMethod);
                            if (methodObj && methodObj.depositDetails) {
                                detailsText.innerHTML = methodObj.depositDetails.replace(/\n/g, '<br>');
                                detailsDisplay.classList.remove('hidden');
                            } else {
                                detailsDisplay.classList.add('hidden');
                            }
                        });
                    });

                    document.getElementById('depositBtn')?.addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('depositAmount').value);
                        const transactionId = document.getElementById('depositTransactionId').value.trim();
                        
                        if (isNaN(amount) || amount <= 0) {
                            this.toast.error('أدخل مبلغ صحيح');
                            return;
                        }
                        if (!selectedMethod) {
                            this.toast.error('اختر طريقة دفع أولاً');
                            return;
                        }
                        if (!transactionId) {
                            this.toast.error('يرجى إدخال رقم العملية');
                            return;
                        }
                        
                        const request = this.data.addDepositRequest(amount, selectedMethod, transactionId, this.state.user);
                        
                        this.toast.success(`✅ تم تقديم طلب الشحن بنجاح
                            • المستخدم: ${this.state.user.first_name} ${this.state.user.last_name || ''}
                            • المبلغ: ${amount}
                            • الطريقة: ${request.method}
                            • رقم العملية: ${transactionId}
                            • رقم الطلب: ${request.id}
                            • التاريخ: ${new Date(request.date).toLocaleString('ar-EG')}
                            • الحالة: قيد المراجعة
                            سيتم إشعارك عند اكتمال المعاملة.`);
                        
                        document.getElementById('depositAmount').value = '';
                        document.getElementById('depositTransactionId').value = '';
                        paymentMethods.forEach(m => m.classList.remove('selected'));
                        selectedMethod = null;
                        detailsDisplay.classList.add('hidden');
                    });

                    // اختيار طريقة السحب
                    const withdrawMethods = document.querySelectorAll('#withdrawMethodsList .payment-method');
                    let selectedWithdrawMethod = null;
                    withdrawMethods.forEach(method => {
                        method.addEventListener('click', () => {
                            withdrawMethods.forEach(m => m.classList.remove('selected'));
                            method.classList.add('selected');
                            selectedWithdrawMethod = method.dataset.methodId;
                            
                            const methodObj = this.state.paymentMethods.find(m => m.id === selectedWithdrawMethod);
                            const detailsInput = document.getElementById('withdrawDetails');
                            if (methodObj) {
                                detailsInput.placeholder = methodObj.withdrawDetails || 'أدخل التفاصيل';
                            }
                        });
                    });

                    document.getElementById('withdrawBtn')?.addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('withdrawAmount').value);
                        const details = document.getElementById('withdrawDetails').value.trim();
                        if (isNaN(amount) || amount <= 0) {
                            this.toast.error('أدخل مبلغ صحيح');
                            return;
                        }
                        if (!selectedWithdrawMethod) {
                            this.toast.error('اختر طريقة سحب أولاً');
                            return;
                        }
                        if (!details) {
                            this.toast.error('أدخل التفاصيل المطلوبة');
                            return;
                        }
                        const result = this.data.addWithdrawalRequest(amount, selectedWithdrawMethod, details, this.state.user);
                        if (result.success) {
                            const request = result.request;
                            this.toast.success(`✅ تم تقديم طلب السحب بنجاح
                                • المستخدم: ${this.state.user.first_name} ${this.state.user.last_name || ''}
                                • المبلغ: ${amount}
                                • الطريقة: ${request.method}
                                • التفاصيل: ${details}
                                • رقم الطلب: ${request.id}
                                • التاريخ: ${new Date(request.date).toLocaleString('ar-EG')}
                                • الحالة: قيد المراجعة
                                سيتم خصم المبلغ من رصيدك بعد الموافقة.`);
                            
                            document.getElementById('withdrawAmount').value = '';
                            document.getElementById('withdrawDetails').value = '';
                            withdrawMethods.forEach(m => m.classList.remove('selected'));
                            selectedWithdrawMethod = null;
                        } else {
                            this.toast.error(result.message);
                        }
                    });

                    document.getElementById('transferBtn')?.addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('transferAmount').value);
                        const targetId = document.getElementById('transferUserId').value.trim();
                        if (isNaN(amount) || amount <= 0) {
                            this.toast.error('أدخل مبلغ صحيح');
                            return;
                        }
                        if (!targetId) {
                            this.toast.error('أدخل معرف المستخدم');
                            return;
                        }
                        const targetUserData = this.data.getUserData(parseInt(targetId));
                        if (!targetUserData) {
                            this.toast.error('المستخدم غير موجود');
                            return;
                        }
                        if (amount > (this.state.currentUserData?.balance || 0)) {
                            this.toast.error('الرصيد غير كافٍ');
                            return;
                        }
                        
                        this.data.updateUserBalance(this.state.user.id, -amount, `تحويل إلى المستخدم ${targetId}`, 'transfer');
                        this.data.updateUserBalance(parseInt(targetId), amount, `تحويل من المستخدم ${this.state.user.id}`, 'transfer');
                        
                        this.toast.success('تم التحويل بنجاح');
                        document.getElementById('transferAmount').value = '';
                        document.getElementById('transferUserId').value = '';
                        this.updateBalanceDisplay();
                        this.openWalletModal();
                    });
                }

                // ---------- لوحة المشرف ----------
                openAdminPanel() {
                    const modalOverlay = document.getElementById('adminPanelOverlay');
                    const modalContent = document.getElementById('adminPanelContent');
                    modalContent.innerHTML = this.renderAdminPanel();
                    modalOverlay.classList.add('open');
                    this.bindAdminPanelEvents();
                }

                renderAdminPanel() {
                    const pendingDeposits = this.data.getPendingDeposits();
                    const pendingWithdrawals = this.data.getPendingWithdrawals();
                    const allUsers = this.data.getAllUsers();

                    const depositsHtml = pendingDeposits.length === 0 
                        ? '<p class="text-gray-400 text-center py-2">لا توجد طلبات شحن معلقة</p>'
                        : pendingDeposits.map(req => `
                            <div class="request-item glass-card p-3 mb-2" data-id="${req.id}" data-type="deposit">
                                <div class="request-header flex justify-between items-center">
                                    <span class="font-bold">${req.userName}</span>
                                    <span class="badge-pending text-yellow-400 text-xs">قيد الانتظار</span>
                                </div>
                                <div class="text-sm">المبلغ: <span class="text-blue-400">${req.amount.toLocaleString('ar-EG')}</span></div>
                                <div class="text-xs text-gray-400">الطريقة: ${req.method}</div>
                                <div class="text-xs text-gray-400">رقم العملية: <span class="text-yellow-400">${req.transactionId || 'غير محدد'}</span></div>
                                <div class="text-xs text-gray-400">التاريخ: ${DateUtils.formatDateTime(req.date)}</div>
                                <div class="request-actions flex gap-2 mt-2">
                                    <button class="btn-accept accept-request bg-green-600 px-3 py-1 rounded-lg text-sm" data-id="${req.id}" data-type="deposit">قبول</button>
                                    <button class="btn-reject reject-request bg-red-600 px-3 py-1 rounded-lg text-sm" data-id="${req.id}" data-type="deposit">رفض</button>
                                </div>
                            </div>
                        `).join('');

                    const withdrawalsHtml = pendingWithdrawals.length === 0 
                        ? '<p class="text-gray-400 text-center py-2">لا توجد طلبات سحب معلقة</p>'
                        : pendingWithdrawals.map(req => `
                            <div class="request-item glass-card p-3 mb-2" data-id="${req.id}" data-type="withdrawal">
                                <div class="request-header flex justify-between items-center">
                                    <span class="font-bold">${req.userName}</span>
                                    <span class="badge-pending text-yellow-400 text-xs">قيد الانتظار</span>
                                </div>
                                <div class="text-sm">المبلغ: <span class="text-red-400">${req.amount.toLocaleString('ar-EG')}</span></div>
                                <div class="text-xs text-gray-400">الطريقة: ${req.method}</div>
                                <div class="text-xs text-gray-400">التفاصيل: ${req.details || 'غير محدد'}</div>
                                <div class="text-xs text-gray-400">التاريخ: ${DateUtils.formatDateTime(req.date)}</div>
                                <div class="request-actions flex gap-2 mt-2">
                                    <button class="btn-accept accept-request bg-green-600 px-3 py-1 rounded-lg text-sm" data-id="${req.id}" data-type="withdrawal">قبول</button>
                                    <button class="btn-reject reject-request bg-red-600 px-3 py-1 rounded-lg text-sm" data-id="${req.id}" data-type="withdrawal">رفض</button>
                                </div>
                            </div>
                        `).join('');

                    // عرض طرق الدفع مع الصور
                    const paymentMethodsHtml = this.state.paymentMethods.map(m => {
                        let iconHtml = '';
                        if (m.iconType === 'image' && m.icon) {
                            iconHtml = `<img src="${m.icon}" alt="${m.name}" class="w-full h-full object-cover">`;
                        } else {
                            iconHtml = `<i class="${m.icon || 'fa-solid fa-credit-card'}"></i>`;
                        }
                        return `
                            <div class="payment-method-admin">
                                <div class="flex items-center gap-3">
                                    <div class="payment-icon">${iconHtml}</div>
                                    <div>
                                        <div class="font-bold">${m.name}</div>
                                        <div class="text-xs text-gray-400">${m.description || ''}</div>
                                    </div>
                                </div>
                                <div class="actions">
                                    <button class="edit-payment-method" data-id="${m.id}" title="تعديل"><i class="fa-solid fa-pen-to-square"></i></button>
                                    <button class="delete-payment-method" data-id="${m.id}" title="حذف"><i class="fa-solid fa-trash"></i></button>
                                </div>
                            </div>
                        `;
                    }).join('');

                    const usersHtml = allUsers.map(u => `
                        <div class="user-item ${u.blocked ? 'blocked' : ''}">
                            <div class="flex justify-between items-center">
                                <div>
                                    <div class="font-bold">${u.name}</div>
                                    <div class="text-xs text-gray-400">ID: ${u.id}</div>
                                    <div class="text-sm">الرصيد: ${u.balance.toLocaleString('ar-EG')}</div>
                                    <div class="text-xs text-gray-400">آخر نشاط: ${u.lastActive ? DateUtils.formatDateTime(u.lastActive) : 'غير معروف'}</div>
                                    ${u.casinoStats ? `
                                        <div class="text-xs text-gray-400">رهانات الكازينو: ${u.casinoStats.totalBets} | فوز: ${u.casinoStats.totalWins} | خسارة: ${u.casinoStats.totalLoss} | صافي: ${u.casinoStats.netProfit}</div>
                                    ` : ''}
                                </div>
                                <div class="flex gap-2">
                                    <button class="edit-user-balance" data-id="${u.id}" title="تعديل الرصيد">
                                        <i class="fa-solid fa-pen-to-square text-blue-400"></i>
                                    </button>
                                    <button class="toggle-user-block" data-id="${u.id}" title="${u.blocked ? 'رفع الحظر' : 'حظر'}">
                                        <i class="fa-solid ${u.blocked ? 'fa-lock-open text-green-400' : 'fa-lock text-red-400'}"></i>
                                    </button>
                                </div>
                            </div>
                            ${u.blocked ? '<span class="badge-blocked mt-2 inline-block">محظور</span>' : ''}
                        </div>
                    `).join('');

                    // إعدادات الكازينو (عرض وتعديل)
                    const casinoSettings = this.state.casinoSettings;
                    const segmentsHtml = casinoSettings.wheelSegments.map((seg, index) => `
                        <tr>
                            <td><input type="text" class="w-full bg-slate-800 border border-white/10 rounded p-1 text-white" value="${seg.label}" data-index="${index}" data-field="label"></td>
                            <td><input type="number" step="0.1" class="w-full bg-slate-800 border border-white/10 rounded p-1 text-white" value="${seg.multiplier}" data-index="${index}" data-field="multiplier"></td>
                            <td><input type="color" class="w-full bg-slate-800 border border-white/10 rounded p-1" value="${seg.color}" data-index="${index}" data-field="color"></td>
                            <td><input type="number" class="w-full bg-slate-800 border border-white/10 rounded p-1 text-white" value="${seg.weight}" data-index="${index}" data-field="weight" min="0" step="1"></td>
                        </tr>
                    `).join('');

                    return `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">لوحة الإدارة</h2>
                            <button id="closeAdminPanel" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="wallet-tabs mb-3">
                            <button class="wallet-tab active" data-admin-tab="requests">الطلبات</button>
                            <button class="wallet-tab" data-admin-tab="users">المستخدمين</button>
                            <button class="wallet-tab" data-admin-tab="payment-methods">طرق الدفع</button>
                            <button class="wallet-tab" data-admin-tab="casino">الكازينو</button>
                        </div>

                        <div id="adminRequestsTab" class="admin-tab-content">
                            <div class="space-y-6">
                                <div>
                                    <h3 class="text-lg font-bold mb-2 flex items-center gap-2">
                                        <i class="fa-solid fa-arrow-down text-green-400"></i>
                                        طلبات الشحن المعلقة
                                        <span class="bg-blue-600 text-white text-xs px-2 py-1 rounded-full">${pendingDeposits.length}</span>
                                    </h3>
                                    <div class="admin-requests-panel">${depositsHtml}</div>
                                </div>
                                <div>
                                    <h3 class="text-lg font-bold mb-2 flex items-center gap-2">
                                        <i class="fa-solid fa-arrow-up text-red-400"></i>
                                        طلبات السحب المعلقة
                                        <span class="bg-blue-600 text-white text-xs px-2 py-1 rounded-full">${pendingWithdrawals.length}</span>
                                    </h3>
                                    <div class="admin-requests-panel">${withdrawalsHtml}</div>
                                </div>
                            </div>
                        </div>

                        <div id="adminUsersTab" class="admin-tab-content hidden">
                            <h3 class="text-lg font-bold mb-2">قائمة المستخدمين (${allUsers.length})</h3>
                            <div class="space-y-2 max-h-96 overflow-y-auto">${usersHtml}</div>
                        </div>

                        <div id="adminPaymentMethodsTab" class="admin-tab-content hidden">
                            <div class="flex justify-between items-center mb-3">
                                <h3 class="text-lg font-bold">طرق الدفع المتاحة</h3>
                                <button id="addPaymentMethodBtn" class="bg-blue-600 px-3 py-1 rounded-lg text-sm"><i class="fa-solid fa-plus"></i> إضافة</button>
                            </div>
                            <div class="space-y-2 max-h-96 overflow-y-auto">${paymentMethodsHtml}</div>
                        </div>

                        <div id="adminCasinoTab" class="admin-tab-content hidden">
                            <h3 class="text-lg font-bold mb-3">إعدادات عجلة الحظ</h3>
                            <table class="w-full text-sm">
                                <thead>
                                    <tr><th>القطاع</th><th>المضاعف</th><th>اللون</th><th>الوزن</th></tr>
                                </thead>
                                <tbody>
                                    ${segmentsHtml}
                                </tbody>
                            </table>
                            <button id="saveCasinoSettings" class="mt-3 bg-green-600 px-4 py-2 rounded-lg w-full">حفظ الإعدادات</button>

                            <h3 class="text-lg font-bold mt-4 mb-2">سجل الكازينو العام</h3>
                            <div class="casino-history max-h-40 overflow-y-auto">
                                ${this.state.casinoHistory.slice(0, 20).map(r => `
                                    <div class="casino-history-item">
                                        <span>${r.userName}</span>
                                        <span>رهان ${r.bet}</span>
                                        <span class="${r.result === 'win' ? 'win-text' : 'lose-text'}">${r.result === 'win' ? '+' + r.winAmount : 'خسارة'}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }

                bindAdminPanelEvents() {
                    const modalOverlay = document.getElementById('adminPanelOverlay');
                    document.getElementById('closeAdminPanel').addEventListener('click', () => {
                        modalOverlay.classList.remove('open');
                    });
                    modalOverlay.addEventListener('click', (e) => {
                        if (e.target === modalOverlay) modalOverlay.classList.remove('open');
                    });

                    const adminTabs = document.querySelectorAll('[data-admin-tab]');
                    adminTabs.forEach(tab => {
                        tab.addEventListener('click', () => {
                            adminTabs.forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');
                            const tabName = tab.dataset.adminTab;
                            document.getElementById('adminRequestsTab').classList.add('hidden');
                            document.getElementById('adminUsersTab').classList.add('hidden');
                            document.getElementById('adminPaymentMethodsTab').classList.add('hidden');
                            document.getElementById('adminCasinoTab').classList.add('hidden');
                            
                            if (tabName === 'requests') {
                                document.getElementById('adminRequestsTab').classList.remove('hidden');
                            } else if (tabName === 'users') {
                                document.getElementById('adminUsersTab').classList.remove('hidden');
                            } else if (tabName === 'payment-methods') {
                                document.getElementById('adminPaymentMethodsTab').classList.remove('hidden');
                            } else if (tabName === 'casino') {
                                document.getElementById('adminCasinoTab').classList.remove('hidden');
                            }
                        });
                    });

                    document.querySelectorAll('.accept-request').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            const type = btn.dataset.type;
                            const request = type === 'deposit' 
                                ? this.state.depositRequests.find(r => r.id === id)
                                : this.state.withdrawalRequests.find(r => r.id === id);
                            if (request) {
                                const success = this.data.acceptRequest(request, type);
                                if (success) {
                                    this.toast.success(`✅ تم قبول طلب ${type === 'deposit' ? 'الشحن' : 'السحب'}
                                        • المستخدم: ${request.userName}
                                        • المبلغ: ${request.amount}
                                        • الطريقة: ${request.method}
                                        ${type === 'deposit' ? `• رقم العملية: ${request.transactionId}` : `• التفاصيل: ${request.details}`}
                                        • رقم الطلب: ${request.id}
                                        • تاريخ الطلب: ${DateUtils.formatDateTime(request.date)}
                                        تم تحديث الرصيد تلقائياً.`);
                                    this.openAdminPanel();
                                } else {
                                    this.toast.error('❌ حدث خطأ (قد يكون الرصيد غير كافٍ)');
                                }
                            }
                        });
                    });

                    document.querySelectorAll('.reject-request').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            const type = btn.dataset.type;
                            const request = type === 'deposit' 
                                ? this.state.depositRequests.find(r => r.id === id)
                                : this.state.withdrawalRequests.find(r => r.id === id);
                            if (request) {
                                this.data.rejectRequest(request, type);
                                this.toast.info(`❌ تم رفض طلب ${type === 'deposit' ? 'الشحن' : 'السحب'}
                                    • المستخدم: ${request.userName}
                                    • المبلغ: ${request.amount}
                                    • الطريقة: ${request.method}
                                    ${type === 'deposit' ? `• رقم العملية: ${request.transactionId}` : `• التفاصيل: ${request.details}`}
                                    • رقم الطلب: ${request.id}
                                    • تاريخ الطلب: ${DateUtils.formatDateTime(request.date)}`);
                                this.openAdminPanel();
                            }
                        });

                    modalContent.innerHTML = `

                            <button id="closeEditBalanceModal" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                        <div class="space-y-3">
                            <div class="text-center">
                                <span class="text-gray-400">الرصيد الحالي:</span>

                            </div>

                                <label class="text-sm text-gray-400">نوع العملية</label>
                                <select id="balanceOperation" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                                    <option value="add">إضافة</option>
                                    <option value="subtract">خصم</option>
                                    <option value="set">تعيين مباشر</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-sm text-gray-400">المبلغ</label>
                                <input type="number" id="balanceAmount" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                            </div>
                            <div>
                                <label class="text-sm text-gray-400">السبب (اختياري)</label>
                                <input type="text" id="balanceReason" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">

                    });
                    
                    document.getElementById('applyBalanceChange').addEventListener('click', () => {

                        const amount = parseFloat(document.getElementById('balanceAmount').value);

                    // ربط أحداث رفع الصورة

                    imageUploadArea.addEventListener('click', () => imageInput.click());
                    imageUploadArea.addEventListener('dragover', (e) => {
                        e.preventDefault();

                    imageUploadArea.addEventListener('dragleave', () => {

                    imageUploadArea.addEventListener('drop', (e) => {
                        e.preventDefault();
                        imageUploadArea.style.borderColor = 'rgba(59, 130, 246, 0.5)';
                        const file = e.dataTransfer.files[0];
                        if (file) handleImageFile(file);

                    imageInput.addEventListener('change', (e) => {
                        const file = e.target.files[0];
                        if (file) handleImageFile(file);

                    const handleImageFile = (file) => {
                        // التحقق من النوع والحجم
                        if (!CONFIG.ALLOWED_IMAGE_TYPES.includes(file.type)) {
                            this.toast.error('نوع الملف غير مسموح. اختر صورة PNG, JPEG, GIF, WEBP');

                        if (file.size > CONFIG.MAX_IMAGE_SIZE) {
                            this.toast.error('حجم الصورة كبير جداً. الحد الأقصى 2 ميجابايت');
                            return;
                        }

                        const reader = new FileReader();
                        reader.onload = (e) => {
                            const imageData = e.target.result;
                            // عرض المعاينة
                            imagePreviewContainer.innerHTML = `<img src="${imageData}" class="image-preview" id="imagePreview">`;
                            // تخزين الصورة في حقل مخفي أو data attribute

                                    `;
                                    deleteBtn.remove();
                                });
                                imageUploadArea.parentNode.appendChild(deleteBtn);
                            }
                        };
                        reader.readAsDataURL(file);
                    };

                    document.getElementById('paymentMethodForm').addEventListener('submit', (e) => {
                        e.preventDefault();

                // ---------- لعبة الكازينو: عجلة الحظ ----------
                openCasinoWheel() {
                    const modalOverlay = document.getElementById('casinoModalOverlay');

                    modalContent.innerHTML = this.renderCasinoWheel();
                    modalOverlay.classList.add('open');
