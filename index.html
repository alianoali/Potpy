<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة تيليجرام المالية</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts (Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { cairo: ['Cairo', 'sans-serif'] },
                    colors: {
                        tg-bg: 'var(--tg-theme-bg-color, #0f172a)',
                        tg-text: 'var(--tg-theme-text-color, #ffffff)',
                        tg-button: 'var(--tg-theme-button-color, #3b82f6)',
                        tg-hint: 'var(--tg-theme-hint-color, #94a3b8)',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--tg-theme-bg-color, #0f172a);
            color: var(--tg-theme-text-color, #ffffff);
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* خلفية ضبابية متحركة */
        .ambient-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float 12s infinite ease-in-out;
        }
        .orb-1 { top: -10%; right: -10%; width: 300px; height: 300px; background: #3b82f6; }
        .orb-2 { bottom: -10%; left: -10%; width: 250px; height: 250px; background: #10b981; animation-delay: 6s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 50px); }
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-enter { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* Glassmorphism */
        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        /* Loader */
        .spinner {
            width: 45px; height: 45px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden-content { display: none !important; }
        
        /* Avatar */
        .default-avatar {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: white; font-weight: bold;
        }

        /* Balance Pulse */
        .balance-update { animation: pulse-green 0.5s ease-in-out; }
        @keyframes pulse-green {
            0% { color: #fff; transform: scale(1); }
            50% { color: #4ade80; transform: scale(1.1); }
            100% { color: #fff; transform: scale(1); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 relative">

    <!-- Background -->
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- STATE 1: LOADING -->
    <div id="loadingState" class="flex flex-col items-center justify-center h-screen w-full animate-enter">
        <div class="spinner mb-4"></div>
        <h2 class="text-lg font-bold text-white">جاري التحقق...</h2>
        <p class="text-sm text-gray-400 mt-1">ربط الحساب مع تيليجرام</p>
    </div>

    <!-- STATE 2: ACCESS DENIED -->
    <div id="accessDeniedState" class="hidden-content glass-card p-8 rounded-3xl text-center max-w-sm w-full animate-enter mt-20 border-red-500/20">
        <div class="w-16 h-16 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
            <i class="fa-solid fa-triangle-exclamation"></i>
        </div>
        <h2 class="text-xl font-bold text-white mb-2">دخول غير مصرح به</h2>
        <p class="text-gray-400 text-sm mb-6">يجب فتح هذا التطبيق من خلال بوت تيليجرام الرسمي فقط.</p>
        <a href="https://telegram.org" class="block w-full py-3 rounded-xl bg-red-600 hover:bg-red-500 text-white font-bold transition-colors">
            الذهاب لتيليجرام
        </a>
    </div>

    <!-- STATE 3: DASHBOARD -->
    <div id="dashboardState" class="hidden-content w-full max-w-md space-y-5 animate-enter pb-8">
        
        <!-- Header Profile -->
        <div class="glass-card p-5 rounded-3xl flex items-center gap-4 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-24 h-24 bg-blue-500/10 rounded-full blur-xl -mr-8 -mt-8"></div>
            
            <div id="userPhotoContainer" class="w-14 h-14 rounded-2xl border border-white/10 overflow-hidden bg-slate-800 flex-shrink-0 shadow-lg">
                <img id="userPhoto" src="" class="w-full h-full object-cover hidden">
                <div id="defaultAvatar" class="w-full h-full default-avatar hidden"><span id="avatarInitials">U</span></div>
            </div>
            
            <div class="flex-1 min-w-0">
                <h2 class="text-lg font-bold text-white truncate" id="userName">مستخدم</h2>
                <p class="text-xs text-gray-400 font-mono mt-0.5" id="userId">ID: 0000</p>
                <div class="flex items-center gap-1.5 mt-1.5">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    <span class="text-[10px] text-green-400 font-bold uppercase">متصل</span>
                </div>
            </div>
        </div>

        <!-- WALLET SECTION (NEW) -->
        <div class="glass-card p-6 rounded-3xl relative overflow-hidden group">
            <!-- Decorative BG -->
            <div class="absolute inset-0 bg-gradient-to-br from-blue-600/20 to-purple-600/20 opacity-50 group-hover:opacity-70 transition-opacity"></div>
            
            <div class="relative z-10 text-center">
                <p class="text-gray-300 text-sm font-medium mb-1">الرصيد الحالي</p>
                <div class="flex items-center justify-center gap-2 mb-6">
                    <i class="fa-solid fa-coins text-yellow-400 text-2xl drop-shadow-lg"></i>
                    <h1 class="text-4xl font-black text-white tracking-tight" id="userBalance">0</h1>
                    <span class="text-lg text-gray-400 font-bold">$</span>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <!-- زر الشحن -->
                    <button onclick="openDepositModal()" class="bg-emerald-500 hover:bg-emerald-400 text-white py-3.5 rounded-2xl font-bold shadow-lg shadow-emerald-500/20 transition-all active:scale-95 flex flex-col items-center justify-center gap-1">
                        <i class="fa-solid fa-wallet text-lg"></i>
                        <span class="text-sm">شحن رصيد</span>
                    </button>
                    
                    <!-- زر السحب -->
                    <button onclick="openWithdrawModal()" class="bg-rose-500 hover:bg-rose-400 text-white py-3.5 rounded-2xl font-bold shadow-lg shadow-rose-500/20 transition-all active:scale-95 flex flex-col items-center justify-center gap-1">
                        <i class="fa-solid fa-money-bill-transfer text-lg"></i>
                        <span class="text-sm">سحب رصيد</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-2 gap-4">
            <div class="glass-card p-4 rounded-2xl text-center hover:bg-white/5 transition-colors">
                <i class="fa-solid fa-shield-halved text-blue-400 text-xl mb-2"></i>
                <div class="text-gray-400 text-xs mb-1">حالة الحساب</div>
                <div class="text-white font-bold text-sm">محفوظ وآمن</div>
            </div>
            <div class="glass-card p-4 rounded-2xl text-center hover:bg-white/5 transition-colors">
                <i class="fa-solid fa-bolt text-yellow-400 text-xl mb-2"></i>
                <div class="text-gray-400 text-xs mb-1">سرعة المعالجة</div>
                <div class="text-white font-bold text-sm">فورية</div>
            </div>
        </div>

        <!-- Logout -->
        <button onclick="logout()" class="w-full py-4 rounded-xl font-bold text-gray-400 hover:text-red-400 hover:bg-red-500/10 transition-all border border-transparent hover:border-red-500/20 flex items-center justify-center gap-2">
            <i class="fa-solid fa-right-from-bracket"></i>
            تسجيل الخروج
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        // Elements
        const loadingState = document.getElementById('loadingState');
        const accessDeniedState = document.getElementById('accessDeniedState');
        const dashboardState = document.getElementById('dashboardState');
        const balanceEl = document.getElementById('userBalance');
        
        let currentBalance = 0; // الرصيد المحلي (للمحاكاة)

        function initApp() {
            tg.expand();
            tg.ready();

            // Security Check
            if (!tg.initData || !tg.initDataUnsafe.user) {
                showAccessDenied();
                return;
            }

            const user = tg.initDataUnsafe.user;
            
            // Set User Info
            document.getElementById('userName').textContent = `${user.first_name} ${user.last_name || ''}`.trim() || "مستخدم";
            document.getElementById('userId').textContent = `ID: ${user.id}`;
            
            // Avatar Logic
            const photoContainer = document.getElementById('userPhotoContainer');
            const imgEl = document.getElementById('userPhoto');
            const defaultEl = document.getElementById('defaultAvatar');
            const initialsEl = document.getElementById('avatarInitials');

            if (user.photo_url) {
                imgEl.src = user.photo_url;
                imgEl.classList.remove('hidden');
                defaultEl.classList.add('hidden');
            } else {
                imgEl.classList.add('hidden');
                defaultEl.classList.remove('hidden');
                initialsEl.textContent = (user.first_name[0] + (user.last_name ? user.last_name[0] : '')).toUpperCase();
            }

            // Show Dashboard after delay
            setTimeout(() => {
                loadingState.style.display = 'none';
                dashboardState.classList.remove('hidden-content');
                dashboardState.style.display = 'block';
                
                // Setup Main Button
                tg.MainButton.setText("تحديث البيانات");
                tg.MainButton.show();
            }, 1000);
        }

        function showAccessDenied() {
            loadingState.style.display = 'none';
            accessDeniedState.classList.remove('hidden-content');
            accessDeniedState.style.display = 'block';
        }

        function logout() {
            tg.close();
        }

        // --- WALLET FUNCTIONS ---

        // دالة تنسيق الأرقام (مثال: 1,200)
        function formatNumber(num) {
            return num.toLocaleString('en-US');
        }

        // تحديث العرض مع تأثير بصري
        function updateBalanceDisplay(newBalance) {
            currentBalance = newBalance;
            balanceEl.textContent = formatNumber(currentBalance);
            
            // تأثير وميض عند التغيير
            balanceEl.classList.remove('balance-update');
            void balanceEl.offsetWidth; // trigger reflow
            balanceEl.classList.add('balance-update');
        }

        // 1. فتح نافذة الشحن
        function openDepositModal() {
            tg.showPopup({
                title: '💰 شحن الرصيد',
                message: 'أدخل المبلغ المراد شحنه إلى حسابك (بالدولار):',
                buttons: [
                    { type: 'cancel', text: 'إلغاء' },
                    { type: 'default', text: 'شحن', id: 'deposit_confirm' }
                ]
            }, (btnId) => {
                if (btnId === 'deposit_confirm') {
                    tg.showAlert('⚠️ ميزة تجريبية:\nفي النسخة الكاملة، سيتم تحويلك لبوت الدفع لإتمام العملية خصم المبلغ من محفظتك في تيليجرام وإضافته هنا.');
                    
                    // محاكاة عملية الشحن الناجحة
                    simulateTransaction('deposit', 100); 
                }
            });
            
            // ملاحظة: للحصول على إدخال رقمي دقيق، يفضل استخدام Custom Input في التحديثات الجديدة أو توجيه المستخدم للبوت مباشرة
            // هنا سنقوم بمحاكاة إدخال مبلغ افتراضي (100) للتوضيح لأن Popup لا يدعم حقول الإدخال المخصصة بسهولة دون HTML مخصص
        }

        // 2. فتح نافذة السحب
        function openWithdrawModal() {
            if (currentBalance <= 0) {
                tg.showAlert('❌ عذراً، رصيدك غير كافٍ للسحب.');
                return;
            }

            tg.showPopup({
                title: '💸 سحب الرصيد',
                message: `رصيدك الحالي: ${formatNumber(currentBalance)}$\n\nهل تريد سحب 50$ كتجربة؟\n(سيتم خصم المبلغ من رصيد الموقع)`,
                buttons: [
                    { type: 'cancel', text: 'لا' },
                    { type: 'destructive', text: 'سحب الآن', id: 'withdraw_confirm' }
                ]
            }, (btnId) => {
                if (btnId === 'withdraw_confirm') {
                    simulateTransaction('withdraw', 50);
                }
            });
        }

        // 3. محاكاة عملية التحديث (ترسل الطلب للبوت في الواقع)
        function simulateTransaction(type, amount) {
            tg.showLoading(); // إظهار تحميل تيليجرام
            
            setTimeout(() => {
                tg.hideLoading();
                
                if (type === 'deposit') {
                    const newBal = currentBalance + amount;
                    updateBalanceDisplay(newBal);
                    tg.showAlert(`✅ تمت العملية بنجاح!\nتم شحن ${amount}$ إلى رصيدك.\nالرصيد الجديد: ${formatNumber(newBal)}$`);
                    
                    // هنا يتم إرسال طلب API للبوت:
                    // fetch('/api/deposit', { method: 'POST', body: JSON.stringify({ user_id: tg.initDataUnsafe.user.id, amount: amount }) })
                    
                } else if (type === 'withdraw') {
                    if (currentBalance >= amount) {
                        const newBal = currentBalance - amount;
                        updateBalanceDisplay(newBal);
                        tg.showAlert(`✅ تم طلب السحب بنجاح!\nتم خصم ${amount}$.\nسيصلك المبلغ قريباً.`);
                        
                        // هنا يتم إرسال طلب API للبوت:
                        // fetch('/api/withdraw', { method: 'POST', body: JSON.stringify({ user_id: tg.initDataUnsafe.user.id, amount: amount }) })
                    }
                }
            }, 1500);
        }

        // زر التحديث الرئيسي
        tg.MainButton.onClick(() => {
            tg.showConfirm('هل تريد مزامنة الرصيد مع البوت؟', (result) => {
                if (result) {
                    tg.showLoading();
                    setTimeout(() => {
                        tg.hideLoading();
                        tg.showAlert('تم تحديث البيانات بنجاح! ✅');
                        // هنا تستدعي دالة جلب الرصيد الحقيقي من السيرفر
                    }, 1000);
                }
            });
        });

        // Start
        initApp();
    </script>
</body>
</html>
