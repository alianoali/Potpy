<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICHANCY BLACK BOT</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',Arial,sans-serif}
  .scene{width:100%;height:100%;position:relative;background:#060e1f;overflow:hidden}
  canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1}
  .overlay{position:absolute;inset:0;z-index:2;pointer-events:none}

  .top-logo{position:absolute;top:22px;left:50%;transform:translateX(-50%);z-index:10;display:flex;align-items:center;gap:6px}
  .bolt{width:18px;height:18px;position:relative}
  .bolt svg{width:100%;height:100%}
  .top-logo span{color:#fff;font-size:17px;font-weight:700;letter-spacing:0.5px}

  .dots-tr{position:absolute;top:26px;right:32px;z-index:10;display:flex;gap:7px}
  .dots-bl{position:absolute;bottom:26px;left:32px;z-index:10;display:flex;gap:7px}
  .dot-w{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.55)}

  .corner-tl{position:absolute;top:0;left:0;z-index:5;width:100px;height:180px}
  .corner-tl::before{content:'';position:absolute;top:0;left:0;width:1px;height:120px;background:linear-gradient(to bottom,rgba(255,255,255,0.5),transparent);transform:rotate(25deg);transform-origin:top left}
  .corner-br{position:absolute;bottom:0;right:0;z-index:5;width:100px;height:180px}
  .corner-br::before{content:'';position:absolute;bottom:0;right:0;width:1px;height:100px;background:linear-gradient(to top,rgba(255,255,255,0.3),transparent);transform:rotate(-15deg);transform-origin:bottom right}

  .streak-y1{position:absolute;bottom:130px;left:70px;z-index:5;width:1.5px;height:35px;background:rgba(255,200,0,0.25);transform:rotate(-18deg)}
  .streak-y2{position:absolute;top:90px;right:50px;z-index:5;width:50px;height:1.5px;background:rgba(255,200,0,0.15);transform:rotate(35deg)}

  .bot-area{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);z-index:10;display:flex;flex-direction:column;align-items:center}

  .ring-wrap{position:relative;width:280px;height:280px;display:flex;align-items:center;justify-content:center}
  .ring-svg{position:absolute;width:280px;height:280px}
  .ring-dot{position:absolute;width:11px;height:11px;border-radius:50%;top:50%;left:50%}
  .rd-glow{background:radial-gradient(circle,#ffe89a,#f0c040,#e8a020);box-shadow:0 0 10px rgba(240,192,64,0.9),0 0 25px rgba(240,192,64,0.4)}
  .rd-sm{background:radial-gradient(circle,#ffe070,#d8a830);box-shadow:0 0 8px rgba(216,168,48,0.7),0 0 18px rgba(216,168,48,0.3)}

  .head{width:190px;height:190px;border-radius:50%;position:relative;z-index:2;
    background:radial-gradient(circle at 38% 30%,#333 0%,#1a1a1a 35%,#0d0d0d 65%,#050505 100%);
    box-shadow:0 0 50px rgba(240,180,0,0.1),0 0 100px rgba(240,180,0,0.04),inset 0 -30px 50px rgba(0,0,0,0.9),inset 0 8px 25px rgba(80,80,80,0.2)}

  .head::after{content:'';position:absolute;top:12%;left:22%;width:56%;height:30%;background:radial-gradient(ellipse,rgba(255,255,255,0.06),transparent);border-radius:50%}

  .eye{position:absolute;width:26px;height:46px;border-radius:13px;
    background:radial-gradient(ellipse at 45% 40%,#fff5d0,#ffc840,#f0a020);
    box-shadow:0 0 18px rgba(255,200,50,0.85),0 0 40px rgba(255,200,50,0.4),0 0 70px rgba(255,180,30,0.2);
    top:50%;transform:translateY(-50%)}
  .eye-l{left:35px}
  .eye-r{right:35px}
  .eye::after{content:'';position:absolute;top:3px;left:50%;transform:translateX(-50%);width:7px;height:10px;background:rgba(255,255,255,0.5);border-radius:50%;filter:blur(1.5px)}

  .mouth{position:absolute;bottom:30%;left:50%;transform:translateX(-50%);width:52px;height:3.5px;border-radius:2px;
    background:linear-gradient(90deg,transparent,#ffc840,#e8a020,#ffc840,transparent);
    box-shadow:0 0 10px rgba(255,200,50,0.5)}

  .ear{position:absolute;width:16px;height:55px;border-radius:8px;top:50%;transform:translateY(-50%);
    background:linear-gradient(180deg,#1a1a1a,#0a0a0a);box-shadow:inset 0 0 8px rgba(0,0,0,0.9)}
  .ear-l{left:-3px}
  .ear-r{right:-3px}

  .title-area{text-align:center;margin-top:18px}
  .t-main{font-size:50px;font-weight:900;color:#fff;letter-spacing:4px;line-height:1;text-transform:uppercase}
  .t-sub{display:flex;align-items:center;justify-content:center;margin-top:3px}
  .t-black{background:linear-gradient(180deg,#ffd600,#f0a000);color:#000;font-size:24px;font-weight:900;padding:1px 12px 3px;letter-spacing:2px;text-transform:uppercase;display:inline-block;border-radius:2px}
  .t-bot{color:#fff;font-size:24px;font-weight:900;letter-spacing:2px;text-transform:uppercase;margin-left:4px}

  .footer{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:10;display:flex;flex-direction:column;align-items:center;gap:5px}
  .globe{width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(255,200,0,0.55);position:relative;
    background:radial-gradient(circle,rgba(255,200,0,0.08),transparent)}
  .globe::before{content:'';position:absolute;top:3px;left:3px;right:3px;bottom:3px;border-radius:50%;border:1px solid rgba(255,200,0,0.25)}
  .globe::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:100%;height:100%;border-radius:50%;border-left:1px solid rgba(255,200,0,0.25);border-right:1px solid rgba(255,200,0,0.25)}
  .url{font-size:10px;color:rgba(255,255,255,0.65);letter-spacing:2.5px;text-transform:uppercase}

  /* منع الوصول */
  .access-denied-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    background: #000;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffd000;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 20px;
    text-align: center;
    padding: 20px;
    flex-direction: column;
    gap: 20px;
  }
  .access-denied-overlay .bolt-large svg {
    width: 60px;
    height: 60px;
  }
  .hidden-content {
    display: none;
  }
</style>
</head>
<body>
<!-- طبقة المنع - تظهر فقط لو لم يدخل من تيليغرام -->
<div id="denied-overlay" class="access-denied-overlay">
  <div class="bolt-large">
    <svg viewBox="0 0 24 24" fill="none"><path d="M13 2L3 14h9l-1 10 10-12h-9l1-10z" fill="#ffd000"/></svg>
  </div>
  <div>لا يمكن الوصول إلى الموقع إلا عبر بوت تلغرام</div>
  <div style="font-size:14px;color:rgba(255,255,255,0.6)">Access only via Telegram Bot</div>
</div>

<!-- المحتوى الأصلي - مخفي حتى يتم التحقق -->
<div id="main-content" class="hidden-content">
<div class="scene">
  <canvas id="c"></canvas>
  <div class="overlay"></div>

  <div class="top-logo">
    <div class="bolt">
      <svg viewBox="0 0 24 24" fill="none"><path d="M13 2L3 14h9l-1 10 10-12h-9l1-10z" fill="#ffd000"/></svg>
    </div>
    <span>ichancy</span>
  </div>

  <div class="dots-tr"><div class="dot-w"></div><div class="dot-w"></div><div class="dot-w"></div><div class="dot-w"></div></div>
  <div class="dots-bl"><div class="dot-w"></div><div class="dot-w"></div><div class="dot-w"></div><div class="dot-w"></div></div>
  <div class="corner-tl"></div>
  <div class="corner-br"></div>
  <div class="streak-y1"></div>
  <div class="streak-y2"></div>

  <div class="bot-area">
    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 280 280">
        <circle cx="140" cy="140" r="128" fill="none" stroke="rgba(240,192,64,0.12)" stroke-width="1"/>
      </svg>
      <div id="rdots"></div>
      <div class="head">
        <div class="ear ear-l"></div>
        <div class="ear ear-r"></div>
        <div class="eye eye-l"></div>
        <div class="eye eye-r"></div>
        <div class="mouth"></div>
      </div>
    </div>
    <div class="title-area">
      <div class="t-main">ICHANCY</div>
      <div class="t-sub"><span class="t-black">BLACK</span><span class="t-bot">BOT</span></div>
    </div>
  </div>

  <div class="footer">
    <div class="globe"></div>
    <div class="url">www.ichancy.com</div>
  </div>
</div>
</div>

<!-- Telegram Web App SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
(function() {
  const deniedOverlay = document.getElementById('denied-overlay');
  const mainContent = document.getElementById('main-content');

  // التحقق من وجود Telegram WebApp وبيانات المستخدم
  if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user) {
    // الدخول من تيليغرام
    if (deniedOverlay) deniedOverlay.style.display = 'none';
    if (mainContent) mainContent.classList.remove('hidden-content');
  } else {
    // لم يتم الدخول من تيليغرام - ابق على طبقة المنع
    if (deniedOverlay) deniedOverlay.style.display = 'flex';
    if (mainContent) mainContent.classList.add('hidden-content');
  }
})();
</script>

<script>
// الكود الأصلي للرسم والتحريك (لن يعمل إلا بعد إظهار المحتوى)
(function(){
  if (!document.getElementById('main-content').classList.contains('hidden-content')) {
    // المحتوى ظاهر، نبدأ الرسم
    const C=document.getElementById('c'),X=C.getContext('2d');
    let W,H;
    function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight;draw()}
    function draw(){
      X.fillStyle='#060e1f';X.fillRect(0,0,W,H);
      const cx=W/2,cy=H/2;
      let g=X.createRadialGradient(cx,cy*0.85,0,cx,cy*0.85,W*0.55);
      g.addColorStop(0,'rgba(0,100,220,0.1)');g.addColorStop(0.4,'rgba(0,70,180,0.04)');g.addColorStop(1,'transparent');
      X.fillStyle=g;X.fillRect(0,0,W,H);

      g=X.createRadialGradient(cx,0,0,cx,0,H*0.5);
      g.addColorStop(0,'rgba(20,120,240,0.1)');g.addColorStop(1,'transparent');
      X.fillStyle=g;X.fillRect(0,0,W,H);

      X.save();X.globalAlpha=0.04;X.fillStyle='#0080e0';
      X.fillRect(cx-80,0,1.5,H*0.45);X.fillRect(cx+80,0,1,H*0.4);
      X.fillRect(cx-150,H*0.15,1,H*0.55);X.fillRect(cx+150,H*0.1,1,H*0.6);
      X.globalAlpha=1;X.restore();

      X.save();
      X.beginPath();X.moveTo(W*0.02,0);X.lineTo(W*0.32,H*0.12);X.lineTo(W*0.28,H*0.65);X.lineTo(0,H*0.48);X.closePath();
      let lg=X.createLinearGradient(W*0.1,0,W*0.2,H*0.4);
      lg.addColorStop(0,'rgba(0,110,230,0.07)');lg.addColorStop(1,'rgba(0,80,190,0.01)');
      X.fillStyle=lg;X.fill();X.restore();

      X.save();
      X.beginPath();X.moveTo(W*0.98,0);X.lineTo(W*0.68,H*0.12);X.lineTo(W*0.72,H*0.65);X.lineTo(W,H*0.48);X.closePath();
      lg=X.createLinearGradient(W*0.9,0,W*0.8,H*0.4);
      lg.addColorStop(0,'rgba(0,110,230,0.06)');lg.addColorStop(1,'rgba(0,80,190,0.01)');
      X.fillStyle=lg;X.fill();X.restore();

      X.save();
      X.beginPath();X.moveTo(0,H);X.lineTo(W*0.12,H*0.65);X.lineTo(W*0.18,H);X.closePath();
      X.fillStyle='rgba(0,80,180,0.04)';X.fill();X.restore();
      X.save();
      X.beginPath();X.moveTo(W,H);X.lineTo(W*0.88,H*0.65);X.lineTo(W*0.82,H);X.closePath();
      X.fillStyle='rgba(0,80,180,0.04)';X.fill();X.restore();

      g=X.createRadialGradient(W*0.92,H*0.08,0,W*0.92,H*0.08,W*0.22);
      g.addColorStop(0,'rgba(255,200,0,0.05)');g.addColorStop(1,'transparent');
      X.fillStyle=g;X.fillRect(0,0,W,H);

      g=X.createRadialGradient(W*0.08,H*0.92,0,W*0.08,H*0.92,W*0.18);
      g.addColorStop(0,'rgba(255,200,0,0.04)');g.addColorStop(1,'transparent');
      X.fillStyle=g;X.fillRect(0,0,W,H);

      g=X.createRadialGradient(cx,H,0,cx,H,H*0.35);
      g.addColorStop(0,'rgba(15,60,150,0.06)');g.addColorStop(1,'transparent');
      X.fillStyle=g;X.fillRect(0,0,W,H);
    }
    window.addEventListener('resize',resize);resize();

    const rd=document.getElementById('rdots');
    const R=128,n=16;
    for(let i=0;i<n;i++){
      const a=(i/n)*Math.PI*2-Math.PI/2;
      const d=document.createElement('div');
      const big=i%4===0;
      d.className='ring-dot '+(big?'rd-glow':'rd-sm');
      d.style.transform=`translate(calc(-50% + ${Math.cos(a)*R}px), calc(-50% + ${Math.sin(a)*R}px))`;
      if(big){d.style.width='14px';d.style.height='14px'}
      rd.appendChild(d);
    }

    const head=document.querySelector('.head');
    let f=0;
    function anim(){f++;head.style.transform=`translateY(${Math.sin(f*0.018)*3}px)`;requestAnimationFrame(anim)}
    anim();
  }
})();
</script>
</body>
</html>
