<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICHANCY BLACK BOT - Web App</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',Arial,sans-serif}

  .scene{width:100%;height:100%;position:relative;background:#060e1f;overflow:hidden;filter:blur(8px);transition:filter 0.5s ease}
  .scene.unlocked{filter:blur(0)}

  canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1}
  .overlay{position:absolute;inset:0;z-index:2;pointer-events:none}

  /* رسالة خارج تلغرام */
  .outside-warning{
    position:absolute;inset:0;z-index:200;
    background:rgba(5,10,25,0.95);
    backdrop-filter:blur(20px);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:#fff;text-align:center;padding:20px;
    transition:opacity 0.5s,visibility 0.5s;
  }
  .outside-warning.hidden{opacity:0;visibility:hidden;pointer-events:none}
  .outside-warning .icon{font-size:50px;margin-bottom:20px}
  .outside-warning h2{font-size:22px;margin-bottom:10px}
  .outside-warning p{color:rgba(255,255,255,0.6);max-width:300px}

  /* ملف المستخدم (أعلى اليمين) */
  .user-profile{
    position:absolute;top:20px;right:20px;z-index:50;
    display:none;align-items:center;gap:12px;
    background:rgba(20,30,50,0.8);
    border:1px solid rgba(255,215,0,0.2);
    padding:8px 16px 8px 8px;
    border-radius:50px;
    backdrop-filter:blur(10px);
    cursor:pointer;
    transition:all 0.3s ease;
  }
  .user-profile:hover{border-color:rgba(255,215,0,0.6);box-shadow:0 0 15px rgba(255,215,0,0.1)}
  .user-avatar{
    width:40px;height:40px;border-radius:50%;object-fit:cover;
    border:2px solid #FFD700;
  }
  .user-info{display:flex;flex-direction:column}
  .user-name{color:#fff;font-size:14px;font-weight:700;line-height:1.2}
  .user-id{color:rgba(255,255,255,0.4);font-size:11px;direction:ltr;text-align:right}
  
  .logout-btn{
    margin-right:10px;
    background:none;border:none;color:#ff4d4d;
    cursor:pointer;font-size:18px;opacity:0.6;
    transition:opacity 0.3s;
  }
  .logout-btn:hover{opacity:1}

  /* المودال */
  .modal-overlay{
    position:fixed;inset:0;z-index:200;
    background:rgba(0,0,0,0.8);backdrop-filter:blur(5px);
    display:none;align-items:center;justify-content:center;
  }
  .modal-overlay.active{display:flex}
  .modal-card{
    background:linear-gradient(160deg, #1a2035, #0a101d);
    border:1px solid rgba(255,215,0,0.3);
    border-radius:24px;width:340px;overflow:hidden;
    position:relative;animation:popIn 0.3s ease-out;
  }
  @keyframes popIn{from{transform:scale(0.9);opacity:0}to{transform:scale(1);opacity:1}}
  .modal-header{
    height:100px;
    background:linear-gradient(90deg, #2AABEE, #0088cc);
    position:relative;
  }
  .modal-close{
    position:absolute;top:10px;left:10px;
    background:rgba(0,0,0,0.3);border:none;color:#fff;
    width:30px;height:30px;border-radius:50%;
    cursor:pointer;font-size:16px;
    display:flex;align-items:center;justify-content:center;
  }
  .modal-body{padding:0 24px 24px;text-align:center;position:relative}
  .modal-avatar-wrap{
    width:90px;height:90px;margin:-45px auto 15px;
    border-radius:50%;padding:4px;
    background:linear-gradient(160deg, #1a2035, #0a101d);
  }
  .modal-avatar{
    width:100%;height:100%;border-radius:50%;object-fit:cover;
    border:3px solid #FFD700;
  }
  .modal-name{color:#fff;font-size:20px;font-weight:800;margin-bottom:4px}
  .modal-username{color:#2AABEE;font-size:14px;margin-bottom:20px;direction:ltr}
  .data-row{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.05);
    border-radius:12px;padding:12px;margin-bottom:10px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .data-label{color:rgba(255,255,255,0.4);font-size:12px}
  .data-value{color:#fff;font-size:14px;font-weight:600;direction:ltr}

  /* التصميم الأساسي للشعار والروبوت */
  .top-logo{position:absolute;top:22px;left:50%;transform:translateX(-50%);z-index:10;display:flex;align-items:center;gap:6px}
  .bolt{width:18px;height:18px}
  .bolt svg{width:100%;height:100%}
  .top-logo span{color:#fff;font-size:17px;font-weight:700;letter-spacing:0.5px}

  .dots-tr{position:absolute;top:26px;right:32px;z-index:10;display:flex;gap:7px}
  .dots-bl{position:absolute;bottom:26px;left:32px;z-index:10;display:flex;gap:7px}
  .dot-w{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.55)}

  .bot-area{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);z-index:10;display:flex;flex-direction:column;align-items:center;pointer-events:none}
  .ring-wrap{position:relative;width:280px;height:280px;display:flex;align-items:center;justify-content:center}
  .ring-svg{position:absolute;width:280px;height:280px}
  .ring-dot{position:absolute;width:11px;height:11px;border-radius:50%;top:50%;left:50%}
  .rd-glow{background:radial-gradient(circle,#ffe89a,#f0c040,#e8a020);box-shadow:0 0 10px rgba(240,192,64,0.9),0 0 25px rgba(240,192,64,0.4)}
  .rd-sm{background:radial-gradient(circle,#ffe070,#d8a830);box-shadow:0 0 8px rgba(216,168,48,0.7),0 0 18px rgba(216,168,48,0.3)}

  .head{width:190px;height:190px;border-radius:50%;position:relative;z-index:2;
    background:radial-gradient(circle at 38% 30%,#333 0%,#1a1a1a 35%,#0d0d0d 65%,#050505 100%);
    box-shadow:0 0 50px rgba(240,180,0,0.1),0 0 100px rgba(240,180,0,0.04),inset 0 -30px 50px rgba(0,0,0,0.9),inset 0 8px 25px rgba(80,80,80,0.2)}
  .head::after{content:'';position:absolute;top:12%;left:22%;width:56%;height:30%;background:radial-gradient(ellipse,rgba(255,255,255,0.06),transparent);border-radius:50%}
  .eye{position:absolute;width:26px;height:46px;border-radius:13px;background:radial-gradient(ellipse at 45% 40%,#fff5d0,#ffc840,#f0a020);box-shadow:0 0 18px rgba(255,200,50,0.85),0 0 40px rgba(255,200,50,0.4),0 0 70px rgba(255,180,30,0.2);top:50%;transform:translateY(-50%)}
  .eye-l{left:35px}.eye-r{right:35px}
  .eye::after{content:'';position:absolute;top:3px;left:50%;transform:translateX(-50%);width:7px;height:10px;background:rgba(255,255,255,0.5);border-radius:50%;filter:blur(1.5px)}
  .mouth{position:absolute;bottom:30%;left:50%;transform:translateX(-50%);width:52px;height:3.5px;border-radius:2px;background:linear-gradient(90deg,transparent,#ffc840,#e8a020,#ffc840,transparent);box-shadow:0 0 10px rgba(255,200,50,0.5)}
  .ear{position:absolute;width:16px;height:55px;border-radius:8px;top:50%;transform:translateY(-50%);background:linear-gradient(180deg,#1a1a1a,#0a0a0a);box-shadow:inset 0 0 8px rgba(0,0,0,0.9)}
  .ear-l{left:-3px}.ear-r{right:-3px}

  .title-area{text-align:center;margin-top:18px}
  .t-main{font-size:50px;font-weight:900;color:#fff;letter-spacing:4px;line-height:1;text-transform:uppercase}
  .t-sub{display:flex;align-items:center;justify-content:center;margin-top:3px}
  .t-black{background:linear-gradient(180deg,#ffd600,#f0a000);color:#000;font-size:24px;font-weight:900;padding:1px 12px 3px;letter-spacing:2px;text-transform:uppercase;display:inline-block;border-radius:2px}
  .t-bot{color:#fff;font-size:24px;font-weight:900;letter-spacing:2px;text-transform:uppercase;margin-left:4px}

  .footer{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:10;display:flex;flex-direction:column;align-items:center;gap:5px}
  .globe{width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(255,200,0,0.55);position:relative;background:radial-gradient(circle,rgba(255,200,0,0.08),transparent)}
  .globe::before{content:'';position:absolute;top:3px;left:3px;right:3px;bottom:3px;border-radius:50%;border:1px solid rgba(255,200,0,0.25)}
  .globe::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:100%;height:100%;border-radius:50%;border-left:1px solid rgba(255,200,0,0.25);border-right:1px solid rgba(255,200,0,0.25)}
  .url{font-size:10px;color:rgba(255,255,255,0.65);letter-spacing:2.5px;text-transform:uppercase}
</style>
</head>
<body>

<div class="scene" id="mainScene">
  <canvas id="c"></canvas>
  <div class="overlay"></div>

  <!-- شعار -->
  <div class="top-logo">
    <div class="bolt"><svg viewBox="0 0 24 24" fill="none"><path d="M13 2L3 14h9l-1 10 10-12h-9l1-10z" fill="#ffd000"/></svg></div>
    <span>ichancy</span>
  </div>

  <!-- الزخارف -->
  <div class="dots-tr"><div class="dot-w"></div><div class="dot-w"></div><div class="dot-w"></div><div class="dot-w"></div></div>
  <div class="dots-bl"><div class="dot-w"></div><div class="dot-w"></div><div class="dot-w"></div><div class="dot-w"></div></div>
  <div style="position:absolute;top:0;left:0;z-index:5;width:100px;height:180px">
    <div style="position:absolute;top:0;left:0;width:1px;height:120px;background:linear-gradient(to bottom,rgba(255,255,255,0.5),transparent);transform:rotate(25deg);transform-origin:top left"></div>
  </div>
  <div style="position:absolute;bottom:0;right:0;z-index:5;width:100px;height:180px">
    <div style="position:absolute;bottom:0;right:0;width:1px;height:100px;background:linear-gradient(to top,rgba(255,255,255,0.3),transparent);transform:rotate(-15deg);transform-origin:bottom right"></div>
  </div>
  <div style="position:absolute;bottom:130px;left:70px;z-index:5;width:1.5px;height:35px;background:rgba(255,200,0,0.25);transform:rotate(-18deg)"></div>
  <div style="position:absolute;top:90px;right:50px;z-index:5;width:50px;height:1.5px;background:rgba(255,200,0,0.15);transform:rotate(35deg)"></div>

  <!-- الروبوت -->
  <div class="bot-area">
    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 280 280"><circle cx="140" cy="140" r="128" fill="none" stroke="rgba(240,192,64,0.12)" stroke-width="1"/></svg>
      <div id="rdots"></div>
      <div class="head">
        <div class="ear ear-l"></div><div class="ear ear-r"></div>
        <div class="eye eye-l"></div><div class="eye eye-r"></div>
        <div class="mouth"></div>
      </div>
    </div>
    <div class="title-area">
      <div class="t-main">ICHANCY</div>
      <div class="t-sub"><span class="t-black">BLACK</span><span class="t-bot">BOT</span></div>
    </div>
  </div>

  <div class="footer">
    <div class="globe"></div>
    <div class="url">www.ichancy.com</div>
  </div>
</div>

<!-- شاشة خارج تلغرام -->
<div class="outside-warning" id="outsideWarning">
  <div class="icon">🔒</div>
  <h2>افتح من بوت تلغرام</h2>
  <p>هذا التطبيق يعمل حصرياً من خلال زر "تطبيق الويب" في بوت تلغرام. تأكد من أن الرابط HTTPS وأنك تستخدم الزر المخصص داخل المحادثة.</p>
</div>

<!-- ملف المستخدم (يظهر بعد الدخول التلقائي) -->
<div class="user-profile" id="userProfile" onclick="openModal()">
  <button class="logout-btn" onclick="event.stopPropagation(); logout()" title="خروج">×</button>
  <div class="user-info">
    <span class="user-name" id="badgeName">User</span>
    <span class="user-id" id="badgeId">@id</span>
  </div>
  <img src="" alt="" class="user-avatar" id="badgeImg">
</div>

<!-- مودال الملف الشخصي -->
<div class="modal-overlay" id="profileModal">
  <div class="modal-card">
    <div class="modal-header">
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-avatar-wrap">
        <img src="" class="modal-avatar" id="modalImg">
      </div>
      <div class="modal-name" id="modalName">User Name</div>
      <div class="modal-username" id="modalUsername">@username</div>
      <div class="data-row">
        <span class="data-label">معرف المستخدم (ID)</span>
        <span class="data-value" id="modalId">123456789</span>
      </div>
      <div class="data-row">
        <span class="data-label">حالة الحساب</span>
        <span class="data-value" style="color:#4ADE80">نشط</span>
      </div>
      <div class="data-row">
        <span class="data-label">تاريخ الدخول</span>
        <span class="data-value" id="modalDate">-</span>
      </div>
    </div>
  </div>
</div>

<script>
// ========== 1. الخلفية والرسوم ==========
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H;
function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight;draw()}
function draw(){
  X.fillStyle='#060e1f';X.fillRect(0,0,W,H);
  const cx=W/2,cy=H/2;
  let g=X.createRadialGradient(cx,cy*0.85,0,cx,cy*0.85,W*0.55);
  g.addColorStop(0,'rgba(0,100,220,0.1)');g.addColorStop(1,'transparent');
  X.fillStyle=g;X.fillRect(0,0,W,H);
  g=X.createRadialGradient(cx,0,0,cx,0,H*0.5);
  g.addColorStop(0,'rgba(20,120,240,0.1)');g.addColorStop(1,'transparent');
  X.fillStyle=g;X.fillRect(0,0,W,H);
}
window.addEventListener('resize',resize);resize();

// ========== 2. الحلقات حول الروبوت ==========
const rd=document.getElementById('rdots');
const R=128,n=16;
for(let i=0;i<n;i++){
  const a=(i/n)*Math.PI*2-Math.PI/2;
  const d=document.createElement('div');
  const big=i%4===0;
  d.className='ring-dot '+(big?'rd-glow':'rd-sm');
  d.style.transform=`translate(calc(-50% + ${Math.cos(a)*R}px), calc(-50% + ${Math.sin(a)*R}px))`;
  if(big){d.style.width='14px';d.style.height='14px'}
  rd.appendChild(d);
}

// ========== 3. تحريك الروبوت ==========
const head=document.querySelector('.head');
let f=0;
function anim(){f++;head.style.transform=`translateY(${Math.sin(f*0.018)*3}px)`;requestAnimationFrame(anim)}
anim();

// ========== 4. نظام التوثيق التلقائي عبر Telegram Web App (محسّن) ==========
const STORAGE_KEY = 'ichancy_tg_user';
const scene = document.getElementById('mainScene');
const profile = document.getElementById('userProfile');
const outsideWarning = document.getElementById('outsideWarning');

// دالة لعرض واجهة المستخدم بعد التأكد من البيانات
function showUserUI(user) {
  scene.classList.add('unlocked');
  profile.style.display = 'flex';
  document.getElementById('badgeName').textContent = user.first_name + (user.last_name ? ' ' + user.last_name : '');
  document.getElementById('badgeId').textContent = '@' + (user.username || 'no_username');
  document.getElementById('badgeImg').src = user.photo_url || '';
  document.getElementById('modalName').textContent = (user.first_name || '') + ' ' + (user.last_name || '');
  document.getElementById('modalUsername').textContent = '@' + (user.username || 'no_username');
  document.getElementById('modalId').textContent = user.id;
  document.getElementById('modalImg').src = user.photo_url || '';
  document.getElementById('modalDate').textContent = new Date().toLocaleDateString('ar-EG');
}

// دالة لتخزين وعرض المستخدم
function handleUser(userData) {
  if (!userData || !userData.id) return;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(userData));
  showUserUI(userData);
}

// دالة الخروج
function logout() {
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

// محاولة الكشف عن بيئة تلغرام مع إعادة محاولة
function initTelegramAuth(attempt = 0) {
  // التحقق من وجود كائن Telegram (يُحقن فقط داخل WebView في تلغرام)
  if (window.Telegram && window.Telegram.WebApp) {
    const tg = window.Telegram.WebApp;
    try {
      tg.ready(); // إعلام تلغرام أن التطبيق جاهز
    } catch(e) {}

    // الوصول إلى بيانات المستخدم
    if (tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id) {
      outsideWarning.classList.add('hidden');
      handleUser(tg.initDataUnsafe.user);
      return;
    }
  }
  
  // إن لم تنجح المحاولة، ربما لم يُحقن الكائن بعد
  if (attempt < 3) {
    // إعادة المحاولة بعد 300 مللي ثانية
    setTimeout(() => initTelegramAuth(attempt + 1), 300);
  } else {
    // بعد 3 محاولات: إظهار التحذير
    if (!window.Telegram && location.protocol !== 'https:') {
      // رسالة خاصة لـ HTTP
      outsideWarning.querySelector('p').textContent = 'يجب أن يكون الموقع HTTPS ليعمل تطبيق الويب من تلغرام. يرجى رفعه على استضافة آمنة.';
    } else {
      outsideWarning.querySelector('p').textContent = 'افتح التطبيق من زر "تطبيق الويب" داخل بوت تلغرام، وتأكد أنك تستخدم HTTPS.';
    }
    outsideWarning.classList.remove('hidden');
  }
}

// عند تحميل الصفحة
window.addEventListener('DOMContentLoaded', () => initTelegramAuth(0));

// دوال المودال
function openModal() {
  document.getElementById('profileModal').classList.add('active');
}
function closeModal() {
  document.getElementById('profileModal').classList.remove('active');
}
</script>
</body>
</html>
