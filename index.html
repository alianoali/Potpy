<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المحفظة الذكية المتطورة</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <!-- Chart.js للرسوم البيانية -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animations */
        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        .animate-slide-in {
            animation: slideIn 0.5s ease forwards;
        }

        .animate-pulse-slow {
            animation: pulse 2s infinite;
        }

        /* Cards */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        /* Loading Shimmer */
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            background-size: 1000px 100%;
            animation: shimmer 2s infinite;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.5);
            border-radius: 10px;
        }

        /* Progress Bar */
        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        /* Badges */
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge-warning {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .badge-error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Tooltips */
        .tooltip {
            position: relative;
        }

        .tooltip:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 12px;
            white-space: nowrap;
            z-index: 1000;
        }

        /* Responsive Grid */
        .grid-auto-fit {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
        }
    </style>
</head>
<body>

                                <div class="bg-white/5 rounded-xl p-4">

                                    <div class="text-2xl font-bold text-green-400" data-field="totalReferrals">0</div>
                                    <div class="text-sm text-gray-400">إجمالي الإحالات</div>

            </div>

    </template>

    <script>
        // ==================== Core Classes ====================

        class EventEmitter {
            constructor() {
                this.events = {};
            }

            on(event, listener) {
                if (!this.events[event]) this.events[event] = [];
                this.events[event].push(listener);
                return () => this.off(event, listener);
            }

            off(event, listener) {
                if (!this.events[event]) return;
                this.events[event] = this.events[event].filter(l => l !== listener);
            }

            emit(event, data) {
                if (!this.events[event]) return;
                this.events[event].forEach(listener => listener(data));
            }
        }

        // ==================== Database Service ====================

        class DatabaseService {
            constructor() {
                this.dbName = 'SmartWalletDB';
                this.dbVersion = 1;
                this.db = null;
            }

            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, this.dbVersion);

                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => {
                        this.db = request.result;
                        resolve();
                    };

                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;

                        // Users store
                        if (!db.objectStoreNames.contains('users')) {
                            const userStore = db.createObjectStore('users', { keyPath: 'id' });
                            userStore.createIndex('telegramId', 'telegramId', { unique: true });
                            userStore.createIndex('username', 'username', { unique: false });
                            userStore.createIndex('role', 'role', { unique: false });
                        }

                        // Transactions store
                        if (!db.objectStoreNames.contains('transactions')) {
                            const txStore = db.createObjectStore('transactions', { keyPath: 'id', autoIncrement: true });
                            txStore.createIndex('userId', 'userId', { unique: false });
                            txStore.createIndex('type', 'type', { unique: false });
                            txStore.createIndex('date', 'date', { unique: false });
                        }

                        // Payment methods store
                        if (!db.objectStoreNames.contains('paymentMethods')) {
                            db.createObjectStore('paymentMethods', { keyPath: 'id' });
                        }

                        // Settings store
                        if (!db.objectStoreNames.contains('settings')) {
                            db.createObjectStore('settings', { keyPath: 'key' });
                        }
                    };
                });
            }

            async get(storeName, key) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(storeName, 'readonly');
                    const store = transaction.objectStore(storeName);
                    const request = store.get(key);

                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async getAll(storeName, indexName = null, value = null) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(storeName, 'readonly');
                    const store = transaction.objectStore(storeName);
                    let request;

                    if (indexName && value !== null) {
                        const index = store.index(indexName);
                        request = index.getAll(value);
                    } else {
                        request = store.getAll();
                    }

                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async put(storeName, data) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(storeName, 'readwrite');
                    const store = transaction.objectStore(storeName);
                    const request = store.put(data);

                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async delete(storeName, key) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(storeName, 'readwrite');
                    const store = transaction.objectStore(storeName);
                    const request = store.delete(key);

                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }
        }

        // ==================== User Management ====================

        class UserManager extends EventEmitter {
            constructor(db) {
                super();
                this.db = db;
                this.currentUser = null;
                this.roles = {
                    super_admin: { level: 100, permissions: ['*'] },
                    admin: { level: 80, permissions: ['manage_users', 'manage_payments', 'view_stats'] },
                    moderator: { level: 60, permissions: ['view_users', 'approve_tx', 'handle_complaints'] },
                    vip: { level: 40, permissions: ['higher_limits', 'priority_support'] },
                    user: { level: 20, permissions: ['deposit', 'withdraw', 'transfer'] },
                    restricted: { level: 10, permissions: ['view_only'] }
                };
            }

            async createUser(telegramUser) {
                const user = {
                    id: this.generateId(),
                    telegramId: telegramUser.id,
                    username: telegramUser.username || '',
                    firstName: telegramUser.first_name,
                    lastName: telegramUser.last_name || '',
                    photoUrl: telegramUser.photo_url || '',
                    role: 'user',
                    status: 'active',
                    balance: 0,
                    totalDeposits: 0,
                    totalWithdrawals: 0,
                    joinedAt: new Date().toISOString(),
                    lastActive: new Date().toISOString(),
                    referralCode: this.generateReferralCode(),
                    referredBy: null,
                    referrals: [],
                    settings: {
                        language: 'ar',
                        notifications: true,
                        twoFactorEnabled: false,
                        loginAlerts: true
                    },
                    limits: {
                        daily: 10000,
                        monthly: 50000,
                        perTransaction: 5000
                    },
                    devices: [],
                    ipHistory: [],
                    verificationLevel: 1,
                    tags: []
                };

                await this.db.put('users', user);
                this.emit('userCreated', user);
                return user;
            }

            async getUserById(id) {
                return await this.db.get('users', id);
            }

            async getUserByTelegramId(telegramId) {
                const users = await this.db.getAll('users', 'telegramId', telegramId);
                return users[0] || null;
            }

            async updateUser(id, updates) {
                const user = await this.getUserById(id);
                if (!user) throw new Error('User not found');

                const updatedUser = { ...user, ...updates, lastActive: new Date().toISOString() };
                await this.db.put('users', updatedUser);
                this.emit('userUpdated', updatedUser);
                return updatedUser;
            }

            async getAllUsers(filters = {}) {
                let users = await this.db.getAll('users');

                if (filters.role) {
                    users = users.filter(u => u.role === filters.role);
                }
                if (filters.status) {
                    users = users.filter(u => u.status === filters.status);
                }
                if (filters.search) {
                    const search = filters.search.toLowerCase();
                    users = users.filter(u => 
                        u.firstName.toLowerCase().includes(search) ||
                        u.lastName.toLowerCase().includes(search) ||
                        u.username.toLowerCase().includes(search)
                    );
                }

                return users;
            }

            async banUser(id, reason) {
                const user = await this.getUserById(id);
                if (!user) throw new Error('User not found');

                user.status = 'banned';
                user.banReason = reason;
                user.bannedAt = new Date().toISOString();

                await this.db.put('users', user);
                this.emit('userBanned', { user, reason });
                return user;
            }

            async unbanUser(id) {
                const user = await this.getUserById(id);
                if (!user) throw new Error('User not found');

                user.status = 'active';
                delete user.banReason;
                delete user.bannedAt;

                await this.db.put('users', user);
                this.emit('userUnbanned', user);
                return user;
            }

            async changeUserRole(id, newRole) {
                if (!this.roles[newRole]) throw new Error('Invalid role');

                const user = await this.getUserById(id);
                if (!user) throw new Error('User not found');

                user.role = newRole;
                await this.db.put('users', user);
                this.emit('roleChanged', { user, newRole });
                return user;
            }

            checkPermission(user, permission) {
                if (!user || !user.role) return false;
                const role = this.roles[user.role];
                if (!role) return false;
                return role.permissions.includes('*') || role.permissions.includes(permission);
            }

            generateId() {
                return 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            }

            generateReferralCode() {
                return 'REF' + Math.random().toString(36).substr(2, 8).toUpperCase();
            }

            async processReferral(newUserId, referralCode) {
                const referrer = (await this.db.getAll('users')).find(u => u.referralCode === referralCode);
                if (!referrer) return false;

                const newUser = await this.getUserById(newUserId);
                if (!newUser) return false;

                // Update referrer
                referrer.referrals.push({
                    userId: newUserId,
                    date: new Date().toISOString(),
                    reward: 50
                });
                referrer.balance += 50;
                await this.db.put('users', referrer);

                // Update new user
                newUser.referredBy = referrer.id;
                newUser.balance += 25;
                await this.db.put('users', newUser);

                // Create transaction records
                await this.createReferralTransaction(referrer.id, 50, newUserId);
                await this.createReferralTransaction(newUserId, 25, null, 'welcome');

                this.emit('referralProcessed', { referrer, newUser });
                return true;
            }

            async createReferralTransaction(userId, amount, referredUserId, type = 'referral') {
                const transaction = {
                    id: 'tx_' + Date.now(),
                    userId,
                    type: 'referral_bonus',
                    amount,
                    referredUser: referredUserId,
                    status: 'completed',
                    date: new Date().toISOString(),
                    description: type === 'welcome' ? 'مكافأة ترحيبية' : 'مكافأة إحالة'
                };

                await this.db.put('transactions', transaction);
            }
        }

        // ==================== Transaction Manager ====================

        class TransactionManager extends EventEmitter {
            constructor(db, userManager) {
                super();
                this.db = db;
                this.userManager = userManager;
            }

            async createDeposit(userId, amount, method, details = {}) {
                const user = await this.userManager.getUserById(userId);
                if (!user) throw new Error('User not found');

                const transaction = {
                    id: 'dep_' + Date.now(),
                    userId,
                    type: 'deposit',
                    amount,
                    method,
                    status: 'pending',
                    date: new Date().toISOString(),
                    details,
                    metadata: {
                        ip: details.ip,
                        device: details.device,
                        location: details.location
                    }
                };

                await this.db.put('transactions', transaction);
                this.emit('depositRequested', transaction);
                return transaction;
            }

            async createWithdrawal(userId, amount, method, address) {
                const user = await this.userManager.getUserById(userId);
                if (!user) throw new Error('User not found');

                // Check balance
                if (user.balance < amount) {
                    throw new Error('Insufficient balance');
                }

                // Check limits
                await this.checkWithdrawalLimits(user, amount);

                const transaction = {
                    id: 'with_' + Date.now(),
                    userId,
                    type: 'withdrawal',
                    amount,
                    method,
                    address,
                    status: 'pending',
                    date: new Date().toISOString(),
                    fee: this.calculateFee(amount)
                };

                // Reserve amount
                user.balance -= amount;
                await this.userManager.updateUser(userId, { balance: user.balance });

                await this.db.put('transactions', transaction);
                this.emit('withdrawalRequested', transaction);
                return transaction;
            }

            async approveTransaction(transactionId, approverId) {
                const transaction = await this.db.get('transactions', transactionId);
                if (!transaction) throw new Error('Transaction not found');

                transaction.status = 'approved';
                transaction.approvedBy = approverId;
                transaction.approvedAt = new Date().toISOString();

                if (transaction.type === 'deposit') {
                    const user = await this.userManager.getUserById(transaction.userId);
                    user.balance += transaction.amount;
                    user.totalDeposits += transaction.amount;
                    await this.userManager.updateUser(transaction.userId, {
                        balance: user.balance,
                        totalDeposits: user.totalDeposits
                    });
                }

                await this.db.put('transactions', transaction);
                this.emit('transactionApproved', transaction);
                return transaction;
            }

            async rejectTransaction(transactionId, reason) {
                const transaction = await this.db.get('transactions', transactionId);
                if (!transaction) throw new Error('Transaction not found');

                transaction.status = 'rejected';
                transaction.rejectionReason = reason;

                // Return funds for withdrawals
                if (transaction.type === 'withdrawal' && transaction.status === 'pending') {
                    const user = await this.userManager.getUserById(transaction.userId);
                    user.balance += transaction.amount;
                    await this.userManager.updateUser(transaction.userId, { balance: user.balance });
                }

                await this.db.put('transactions', transaction);
                this.emit('transactionRejected', transaction);
                return transaction;
            }

            async getUserTransactions(userId, filters = {}) {
                let transactions = await this.db.getAll('transactions', 'userId', userId);

                if (filters.type) {
                    transactions = transactions.filter(t => t.type === filters.type);
                }
                if (filters.status) {
                    transactions = transactions.filter(t => t.status === filters.status);
                }
                if (filters.startDate) {
                    transactions = transactions.filter(t => new Date(t.date) >= new Date(filters.startDate));
                }
                if (filters.endDate) {
                    transactions = transactions.filter(t => new Date(t.date) <= new Date(filters.endDate));
                }

                return transactions.sort((a, b) => new Date(b.date) - new Date(a.date));
            }

            async checkWithdrawalLimits(user, amount) {
                const today = new Date().toISOString().split('T')[0];
                const transactions = await this.getUserTransactions(user.id, { 
                    type: 'withdrawal',
                    status: 'approved',
                    startDate: today
                });

                const todayTotal = transactions.reduce((sum, t) => sum + t.amount, 0);
                if (todayTotal + amount > user.limits.daily) {
                    throw new Error('Daily withdrawal limit exceeded');
                }
            }

            calculateFee(amount) {
                if (amount <= 100) return amount * 0.01;
                if (amount <= 1000) return amount * 0.005;
                return amount * 0.002;
            }

            async getStatistics() {
                const transactions = await this.db.getAll('transactions');
                const users = await this.db.getAll('users');

                const today = new Date().toISOString().split('T')[0];
                const thisMonth = new Date().toISOString().slice(0, 7);

                return {
                    totalUsers: users.length,
                    activeUsers: users.filter(u => u.status === 'active').length,
                    totalTransactions: transactions.length,
                    pendingTransactions: transactions.filter(t => t.status === 'pending').length,
                    totalVolume: transactions.reduce((sum, t) => sum + (t.amount || 0), 0),
                    todayVolume: transactions
                        .filter(t => t.date.startsWith(today))
                        .reduce((sum, t) => sum + (t.amount || 0), 0),
                    monthlyVolume: transactions
                        .filter(t => t.date.startsWith(thisMonth))
                        .reduce((sum, t) => sum + (t.amount || 0), 0)
                };
            }
        }

        // ==================== Security Manager ====================

        class SecurityManager extends EventEmitter {
            constructor(db, userManager) {
                super();
                this.db = db;
                this.userManager = userManager;
                this.loginAttempts = new Map();
                this.maxAttempts = 5;
                this.lockoutTime = 15 * 60 * 1000; // 15 minutes
            }

            async logLoginAttempt(userId, success, ip, device) {
                const attempt = {
                    userId,
                    success,
                    ip,
                    device,
                    timestamp: new Date().toISOString()
                };

                // Store in login attempts map
                if (!this.loginAttempts.has(userId)) {
                    this.loginAttempts.set(userId, []);
                }
                this.loginAttempts.get(userId).push(attempt);

                // Clean old attempts
                this.cleanOldAttempts(userId);

                // Check for suspicious activity
                if (!success) {
                    await this.handleFailedAttempt(userId, ip, device);
                }
            }

            async handleFailedAttempt(userId, ip, device) {
                const attempts = this.loginAttempts.get(userId) || [];
                const recentFailures = attempts.filter(a => 
                    !a.success && 
                    Date.now() - new Date(a.timestamp).getTime() < this.lockoutTime
                );

                if (recentFailures.length >= this.maxAttempts) {
                    await this.lockUser(userId, 'Too many failed login attempts');
                    this.emit('userLocked', { userId, reason: 'too_many_attempts' });
                }

                // Check if IP is suspicious
                const ipAttempts = attempts.filter(a => a.ip === ip && !a.success);
                if (ipAttempts.length >= 3) {
                    this.emit('suspiciousIP', { userId, ip, device });
                }
            }

            async lockUser(userId, reason) {
                await this.userManager.updateUser(userId, {
                    status: 'suspended',
                    suspensionReason: reason,
                    suspendedAt: new Date().toISOString()
                });
            }

            async unlockUser(userId) {
                await this.userManager.updateUser(userId, {
                    status: 'active',
                    suspensionReason: null,
                    suspendedAt: null
                });
            }

            cleanOldAttempts(userId) {
                const attempts = this.loginAttempts.get(userId) || [];
                const cutoff = Date.now() - (24 * 60 * 60 * 1000); // 24 hours
                this.loginAttempts.set(
                    userId, 
                    attempts.filter(a => new Date(a.timestamp).getTime() > cutoff)
                );
            }

            async enable2FA(userId) {
                const secret = this.generate2FASecret();
                const backupCodes = this.generateBackupCodes();

                await this.userManager.updateUser(userId, {
                    'settings.twoFactorEnabled': true,
                    'settings.twoFactorSecret': secret,
                    'settings.twoFactorBackupCodes': backupCodes
                });

                return { secret, backupCodes };
            }

            async verify2FA(userId, token) {
                const user = await this.userManager.getUserById(userId);
                if (!user.settings.twoFactorEnabled) return true;

                // Verify TOTP token
                const isValid = this.verifyTOTP(token, user.settings.twoFactorSecret);

                // Check backup codes
                if (!isValid && user.settings.twoFactorBackupCodes?.includes(token)) {
                    // Remove used backup code
                    user.settings.twoFactorBackupCodes = user.settings.twoFactorBackupCodes
                        .filter(code => code !== token);
                    await this.userManager.updateUser(userId, user);
                    return true;
                }

                return isValid;
            }

            generate2FASecret() {
                return Math.random().toString(36).substr(2, 16).toUpperCase();
            }

            generateBackupCodes() {
                const codes = [];
                for (let i = 0; i < 8; i++) {
                    codes.push(Math.random().toString(36).substr(2, 8).toUpperCase());
                }
                return codes;
            }

            verifyTOTP(token, secret) {
                // Simplified TOTP verification
                return token === secret.substr(0, 6);
            }

            async getSecurityLogs(userId) {
                return {
                    loginAttempts: this.loginAttempts.get(userId) || [],
                    status: (await this.userManager.getUserById(userId)).status,
                    twoFactorEnabled: (await this.userManager.getUserById(userId)).settings.twoFactorEnabled
                };
            }
        }

            async send(userId, type, data, channels = ['in_app']) {
                const user = await this.userManager.getUserById(userId);
                if (!user || user.settings.notifications === false) return;

                const notification = {
                    id: 'notif_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                    userId,
                    type,
                    data,
                    channels,
                    read: false,
                    createdAt: new Date().toISOString()
                };

                // Format message based on language
                const language = user.settings.language || 'ar';
                notification.message = this.formatMessage(type, data, language);

                // Store notification
                await this.storeNotification(notification);

                // Send through requested channels
                for (const channel of channels) {
                    await this.sendViaChannel(channel, notification);
                }

                this.emit('notificationSent', notification);
                return notification;
            }

            formatMessage(type, data, language) {
                const template = this.templates[type];
                if (!template) return '';

                let message = template[language] || template.ar;
                for (const [key, value] of Object.entries(data)) {
                    message = message.replace(`{${key}}`, value);
                }
                return message;
            }

            async storeNotification(notification) {
                const notifications = await this.getUserNotifications(notification.userId);
                notifications.unshift(notification);

                // Keep only last 50 notifications
                if (notifications.length > 50) {
                    notifications.pop();
                }

                localStorage.setItem(`notifications_${notification.userId}`, JSON.stringify(notifications));
            }

            async getUserNotifications(userId) {
                const stored = localStorage.getItem(`notifications_${userId}`);
                return stored ? JSON.parse(stored) : [];
            }

            async markAsRead(userId, notificationId) {
                const notifications = await this.getUserNotifications(userId);
                const notification = notifications.find(n => n.id === notificationId);
                if (notification) {
                    notification.read = true;
                    localStorage.setItem(`notifications_${userId}`, JSON.stringify(notifications));
                }
            }

            async markAllAsRead(userId) {
                const notifications = await this.getUserNotifications(userId);
                notifications.forEach(n => n.read = true);
                localStorage.setItem(`notifications_${userId}`, JSON.stringify(notifications));
            }

            async sendViaChannel(channel, notification) {
                switch (channel) {
                    case 'in_app':
                        // Already stored
                        break;
                    case 'telegram':
                        await this.sendTelegramNotification(notification);
                        break;
                    case 'email':
                        await this.sendEmailNotification(notification);
                        break;
                }
            }

            async sendTelegramNotification(notification) {
                // Implement Telegram bot API
                console.log('Sending Telegram notification:', notification);
            }

            async sendEmailNotification(notification) {
                // Implement email service
                console.log('Sending email notification:', notification);
            }

            async sendDailySummary() {
                const users = await this.userManager.getAllUsers();
                const today = new Date().toISOString().split('T')[0];

                for (const user of users) {
                    if (user.settings.dailySummary) {
                        const transactions = await this.db.getAll('transactions', 'userId', user.id);
                        const todayTransactions = transactions.filter(t => t.date.startsWith(today));
                        
                        if (todayTransactions.length > 0) {
                            const volume = todayTransactions.reduce((sum, t) => sum + t.amount, 0);
                            await this.send(user.id, 'daily_summary', {
                                transactions: todayTransactions.length,
                                volume: volume.toFixed(2)
                            });
                        }
                    }
                }
            }
        }

                return `
                    <div class="flex items-center justify-between p-3 bg-white/5 rounded-lg">
                        <div>
                            <div class="font-bold">${tx.type === 'deposit' ? 'إيداع' : 'سحب'}</div>
                            <div class="text-sm text-gray-400">المبلغ: ${tx.amount}</div>
                            <div class="text-xs text-gray-500">${new Date(tx.date).toLocaleString('ar-EG')}</div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="app.ui.approveTransaction('${tx.id}')" class="px-3 py-1 bg-green-600 hover:bg-green-700 rounded-lg text-sm">
                                قبول
                            </button>
                            <button onclick="app.ui.rejectTransaction('${tx.id}')" class="px-3 py-1 bg-red-600 hover:bg-red-700 rounded-lg text-sm">
                                رفض
                            </button>
                        </div>
                    </div>
                `;
            }

            renderTransactionItem(tx) {
                const icons = {
                    deposit: 'fa-arrow-down text-green-400',
                    withdrawal: 'fa-arrow-up text-red-400',
                    transfer: 'fa-exchange text-blue-400',
                    referral_bonus: 'fa-gift text-yellow-400'
                };

                return `
                    <div class="flex items-center justify-between p-3 bg-white/5 rounded-lg">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center">
                                <i class="fa-regular ${icons[tx.type] || 'fa-clock'}"></i>
                            </div>
                            <div>
                                <div class="font-bold">${tx.description || tx.type}</div>
                                <div class="text-xs text-gray-400">${new Date(tx.date).toLocaleString('ar-EG')}</div>
                            </div>
                        </div>
                        <div class="text-${tx.amount > 0 ? 'green' : 'red'}-400 font-bold">
                            ${tx.amount > 0 ? '+' : ''}${tx.amount}
                        </div>
                    </div>
                `;
            }

            fillTemplate(template, data) {
                for (const [key, value] of Object.entries(data)) {
                    const elements = template.querySelectorAll(`[data-field="${key}"]`);
                    elements.forEach(el => {
                        if (el.tagName === 'IMG') {
                            el.src = value;
                        } else if (el.tagName === 'INPUT') {
                            el.value = value;
                        } else {
                            el.textContent = value;
                        }
                    });
                }
            }

            async getUnreadBadge() {
                const notifications = await this.app.notificationManager.getUserNotifications(this.app.user.id);
                const unread = notifications.filter(n => !n.read).length;
                return unread > 0 ? `
                    <span class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white text-xs rounded-full flex items-center justify-center">
                        ${unread > 9 ? '9+' : unread}
                    </span>
                ` : '';
            }

            initCharts() {
                const canvas = document.getElementById('activityChart');
                if (!canvas) return;

                if (this.charts.activity) {
                    this.charts.activity.destroy();
                }

                this.charts.activity = new Chart(canvas, {
                    type: 'line',
                    data: {
                        labels: ['الأسبوع 1', 'الأسبوع 2', 'الأسبوع 3', 'الأسبوع 4'],
                        datasets: [{
                            label: 'المعاملات',
                            data: [12, 19, 15, 17],
                            borderColor: '#3b82f6',
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: false
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: {
                                    color: 'rgba(255,255,255,0.1)'
                                },
                                ticks: {
                                    color: '#9ca3af'
                                }
                            },
                            x: {
                                grid: {
                                    display: false
                                },
                                ticks: {
                                    color: '#9ca3af'
                                }
                            }
                        }
                    }
                });
            }

            attachEvents() {
                // Tabs
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const tabName = e.currentTarget.dataset.tab;
                        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                        e.currentTarget.classList.add('active');
                        
                        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                        document.querySelector(`.tab-content[data-tab="${tabName}"]`).classList.remove('hidden');
                    });
                });

                // Copy button
                document.querySelector('.copy-btn')?.addEventListener('click', (e) => {
                    const input = e.currentTarget.previousElementSibling;
                    input.select();
                    document.execCommand('copy');
                    this.showToast('تم النسخ!', 'success');
                });
            }

            showToast(message, type = 'info') {
                // Implement toast notification
                console.log('Toast:', message, type);
            }
        }

        // ==================== Main Application ====================

        class App {
            constructor() {
                this.loading = true;
                this.user = null;
                this.db = new DatabaseService();
                this.userManager = new UserManager(this.db);
                this.transactionManager = new TransactionManager(this.db, this.userManager);
                this.securityManager = new SecurityManager(this.db, this.userManager);
                this.notificationManager = new NotificationManager(this.db, this.userManager);
                this.ui = new UIManager(this);
                
                this.init();
            }

            async init() {
                try {
                    await this.db.init();
                    await this.checkTelegramAuth();
                    this.loading = false;
                    await this.ui.render();
                    
                    // Start daily summary scheduler
                    this.startDailySummaryScheduler();
                } catch (error) {
                    console.error('Initialization error:', error);
                    this.loading = false;
                    this.ui.render();
                }
            }

            async checkTelegramAuth() {
                const tg = window.Telegram?.WebApp;
                if (!tg) return;

                tg.expand();
                tg.ready();

                const telegramUser = tg.initDataUnsafe?.user;
                if (!telegramUser) return;

                // Check if user exists
                let user = await this.userManager.getUserByTelegramId(telegramUser.id);
                
                if (!user) {
                    // Create new user
                    user = await this.userManager.createUser(telegramUser);
                    
                    // Send welcome notification
                    await this.notificationManager.send(user.id, 'welcome', {
                        name: user.firstName
                    });
                }

                this.user = user;

                // Log login attempt
                await this.securityManager.logLoginAttempt(
                    user.id, 
                    true, 
                    tg.initDataUnsafe?.user?.ip || 'unknown',
                    navigator.userAgent
                );

                // Send login alert
                if (user.settings.loginAlerts) {
                    await this.notificationManager.send(user.id, 'login_alert', {
                        device: 'جهاز جديد',
                        time: new Date().toLocaleString('ar-EG')
                    });
                }
            }

            async login() {
                window.location.href = 'https://t.me/your_bot?start=auth';
            }

            startDailySummaryScheduler() {
                // Schedule daily summary at 9 PM
                const now = new Date();
                const target = new Date();
                target.setHours(21, 0, 0, 0);

                if (now > target) {
                    target.setDate(target.getDate() + 1);
                }

                const delay = target.getTime() - now.getTime();
                setTimeout(() => {
                    this.notificationManager.sendDailySummary();
                    setInterval(() => this.notificationManager.sendDailySummary(), 24 * 60 * 60 * 1000);
                }, delay);
            }
        }

        // ==================== Initialize App ====================

        window.app = new App();
    </script>
</body>
</html>
