<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة أرباحي المتطورة - Profits Platform</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts - Cairo & Tajawal -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a0f1f 0%, #1a1f35 100%);
            color: #ffffff;
            overflow-x: hidden;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        /* أنيميشن الخلفية المتقدمة */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            filter: blur(60px);
            opacity: 0.2;
            animation: particleFloat 20s infinite ease-in-out;
        }

        @keyframes particleFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(5%, 5%) scale(1.1); }
            66% { transform: translate(-5%, -5%) scale(0.9); }
        }

        /* بطاقات زجاجية متطورة */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: left 0.7s ease;
        }

        .glass-card:hover::before {
            left: 100%;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.2);
        }

        /* بطاقة رصيد متطورة */
        .balance-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 32px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .balance-card::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(59,130,246,0.2) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* عداد متحرك */
        .counter-value {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* أزرار متطورة */
        .btn-gradient {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 40px;
            padding: 14px 28px;
            font-weight: 700;
            color: white;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
            cursor: pointer;
        }

        .btn-gradient::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.6s ease;
        }

        .btn-gradient:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
        }

        .btn-gradient:hover::before {
            left: 100%;
        }

        .btn-gradient:active {
            transform: translateY(0);
        }

        /* مؤشرات تقدم متحركة */
        .progress-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: conic-gradient(#3b82f6 0deg, #8b5cf6 360deg);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .progress-ring-inner {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
        }

        /* لوحة الإحصائيات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }

        .stat-item {
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            padding: 16px 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }

        .stat-item:hover {
            background: rgba(59,130,246,0.1);
            border-color: #3b82f6;
            transform: scale(1.05);
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 16px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-size: 20px;
        }

        /* أيقونة المحفظة المتطورة */
        .wallet-icon-advanced {
            width: 100px;
            height: 100px;
            background: linear-gradient(145deg, #3b82f6, #8b5cf6);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            animation: morphing 8s infinite ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(59,130,246,0.5);
        }

        @keyframes morphing {
            0% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
            25% { border-radius: 58% 42% 75% 25% / 76% 46% 54% 24%; }
            50% { border-radius: 50% 50% 33% 67% / 55% 27% 73% 45%; }
            75% { border-radius: 33% 67% 58% 42% / 63% 68% 32% 37%; }
            100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
        }

        /* بطاقة الإعلان */
        .ad-card-advanced {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .ad-card-advanced::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .ad-card-advanced:hover::before {
            opacity: 1;
        }

        .ad-card-advanced:hover {
            transform: translateX(-5px);
            border-color: #3b82f6;
        }

        .ad-reward-badge {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #000;
            font-weight: 900;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 10px rgba(245,158,11,0.3);
        }

        /* شارة VIP */
        .vip-badge {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: #000;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 2px 10px rgba(245,158,11,0.3);
        }

        /* شارة الحالة */
        .badge-pending {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-warning {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }

        /* نظام النقاط والشارات */
        .badge-achievement {
            width: 50px;
            height: 50px;
            border-radius: 20px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            position: relative;
            animation: shine 2s infinite;
        }

        @keyframes shine {
            0% { filter: drop-shadow(0 0 5px #fbbf24); }
            50% { filter: drop-shadow(0 0 20px #fbbf24); }
            100% { filter: drop-shadow(0 0 5px #fbbf24); }
        }

        /* لوحة المتصدرين */
        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .leaderboard-rank {
            width: 30px;
            height: 30px;
            border-radius: 12px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: white;
        }

        /* شريط التقدم */
        .progress-bar-advanced {
            width: 100%;
            height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill-advanced {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border-radius: 20px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .progress-fill-advanced::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: progressShine 2s infinite;
        }

        @keyframes progressShine {
            to { left: 100%; }
        }

        /* مودال متطور */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            padding: 20px;
        }

        .modal-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .modal-advanced {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 40px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.open .modal-advanced {
            transform: scale(1);
        }

        /* زر الإغلاق */
        .close-button {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .close-button:hover {
            background: rgba(239,68,68,0.2);
            border-color: #ef4444;
            transform: rotate(90deg);
        }

        /* Toast متطور */
        .toast-advanced {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 60px;
            padding: 14px 24px;
            color: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 10px;
            animation: toastSlide 0.4s ease;
            max-width: 350px;
            width: 100%;
        }

        @keyframes toastSlide {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* شاشة التحميل */
        .loader-advanced {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(59,130,246,0.1);
            border-top-color: #3b82f6;
            border-right-color: #8b5cf6;
            border-bottom-color: #ec4899;
            border-left-color: #f59e0b;
            border-radius: 50%;
            animation: spinLoader 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        @keyframes spinLoader {
            to { transform: rotate(720deg); }
        }

        /* لوحة الإعدادات */
        .settings-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 90%;
            max-width: 350px;
            height: 100vh;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-left: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            transition: right 0.4s ease;
            z-index: 10000;
            overflow-y: auto;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        .settings-panel.open {
            right: 0;
        }

        /* تأثير الكتابة */
        .typing-effect {
            overflow: hidden;
            white-space: nowrap;
            animation: typing 3s steps(40, end);
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        /* زر المشاركة */
        .share-button {
            background: rgba(59,130,246,0.1);
            border: 1px solid rgba(59,130,246,0.3);
            border-radius: 40px;
            padding: 10px 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .share-button:hover {
            background: rgba(59,130,246,0.2);
            transform: translateY(-2px);
        }

        /* تدرجات نصية */
        .gradient-text {
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* شريط الحالة */
        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            font-size: 10px;
            font-weight: bold;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }

        .notification-badge.hidden {
            display: none;
        }

        /* Scrollbar مخصص */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <!-- جسيمات الخلفية المتطورة -->
    <div class="particles" id="particles"></div>

    <!-- شريط الحالة العلوي -->
    <div class="fixed top-0 left-0 right-0 z-50 p-4 flex justify-between items-center bg-gradient-to-r from-blue-600/20 to-purple-600/20 backdrop-blur-xl border-b border-white/10">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-bolt text-yellow-400 animate-pulse"></i>
            <span class="font-bold text-sm">منصة أرباحي المتطورة</span>
        </div>
        <div class="flex items-center gap-4">
            <button id="themeToggleAdvanced" class="w-10 h-10 rounded-2xl bg-white/5 flex items-center justify-center hover:bg-white/10 transition-all">
                <i class="fa-solid fa-moon" id="themeIconAdvanced"></i>
            </button>
            <button id="notificationBellAdvanced" class="w-10 h-10 rounded-2xl bg-white/5 flex items-center justify-center hover:bg-white/10 transition-all relative">
                <i class="fa-regular fa-bell"></i>
                <span class="notification-badge hidden" id="notificationBadge">0</span>
            </button>
            <button id="openSettingsAdvanced" class="w-10 h-10 rounded-2xl bg-white/5 flex items-center justify-center hover:bg-white/10 transition-all">
                <i class="fa-solid fa-gear"></i>
            </button>
        </div>
    </div>

    <!-- الحاوية الرئيسية -->
    <div id="app" class="w-full max-w-md mx-auto p-5 pt-24 pb-10 relative"></div>

    <!-- لوحة الإعدادات المتقدمة -->
    <div class="settings-panel" id="settingsPanelAdvanced">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold gradient-text">الإعدادات المتقدمة</h3>
            <button id="closeSettingsAdvanced" class="close-button">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
        <div class="space-y-5">
            <div class="flex items-center justify-between p-3 glass-card">
                <span class="flex items-center gap-2">
                    <i class="fa-solid fa-globe text-blue-400"></i>
                    اللغة
                </span>
                <select class="bg-white/10 rounded-xl p-2 border border-white/10" id="languageSelectAdvanced">
                    <option value="ar">العربية</option>
                    <option value="en">English</option>
                    <option value="fr">Français</option>
                </select>
            </div>
            <div class="flex items-center justify-between p-3 glass-card">
                <span class="flex items-center gap-2">
                    <i class="fa-solid fa-bell text-yellow-400"></i>
                    الإشعارات
                </span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" id="notificationsToggleAdvanced" checked>
                    <div class="w-12 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600 transition-all"></div>
                </label>
            </div>
            <div class="flex items-center justify-between p-3 glass-card">
                <span class="flex items-center gap-2">
                    <i class="fa-solid fa-music text-green-400"></i>
                    المؤثرات الصوتية
                </span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" id="soundToggleAdvanced" checked>
                    <div class="w-12 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600 transition-all"></div>
                </label>
            </div>
            <div class="flex items-center justify-between p-3 glass-card">
                <span class="flex items-center gap-2">
                    <i class="fa-solid fa-mobile-screen text-purple-400"></i>
                    الاهتزاز
                </span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" id="vibrateToggleAdvanced" checked>
                    <div class="w-12 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600 transition-all"></div>
                </label>
            </div>
        </div>
    </div>

    <!-- Toast Container المتطور -->
    <div class="fixed bottom-5 left-5 right-5 z-[9999] flex flex-col items-end gap-2 pointer-events-none" id="toastContainerAdvanced"></div>

    <!-- مودال المحفظة المتطور -->
    <div class="modal-overlay" id="walletModalOverlayAdvanced">
        <div class="modal-advanced" id="walletModalContentAdvanced"></div>
    </div>

    <!-- مودال الإعلانات المتطور -->
    <div class="modal-overlay" id="adModalOverlayAdvanced">
        <div class="modal-advanced" id="adModalContentAdvanced"></div>
    </div>

    <!-- مودال المهام المتطور -->
    <div class="modal-overlay" id="taskModalOverlayAdvanced">
        <div class="modal-advanced" id="taskModalContentAdvanced"></div>
    </div>

    <!-- مودال لوحة المشرف المتطورة -->
    <div class="modal-overlay" id="adminPanelOverlayAdvanced">
        <div class="modal-advanced" style="max-width: 500px;" id="adminPanelContentAdvanced"></div>
    </div>

    <!-- مودال المتصدرين -->
    <div class="modal-overlay" id="leaderboardModalOverlayAdvanced">
        <div class="modal-advanced" id="leaderboardModalContentAdvanced"></div>
    </div>

    <!-- مودال الإحالة -->
    <div class="modal-overlay" id="referralModalOverlayAdvanced">
        <div class="modal-advanced" id="referralModalContentAdvanced"></div>
    </div>

    <!-- مودال إدارة الإعلانات -->
    <div class="modal-overlay" id="manageAdsModalOverlayAdvanced">
        <div class="modal-advanced" id="manageAdsModalContentAdvanced"></div>
    </div>

    <script>
        (function() {
            'use strict';

            // ======================== الإعدادات المتقدمة ========================
            const ADVANCED_CONFIG = {
                ADMIN_ID: 7609492965,
                DEFAULT_BALANCE: 1000,
                REFERRAL_BONUS: 50,
                DAILY_BONUS: 25,
                MAX_ADS_PER_DAY: 10,
                TASKS_LIMIT: 20,
                LEVELS: {
                    BRONZE: { min: 0, max: 1000, multiplier: 1, name: 'برونزي' },
                    SILVER: { min: 1000, max: 5000, multiplier: 1.2, name: 'فضي' },
                    GOLD: { min: 5000, max: 10000, multiplier: 1.5, name: 'ذهبي' },
                    PLATINUM: { min: 10000, max: 50000, multiplier: 2, name: 'بلاتيني' },

            class AdvancedIdGenerator {
                static generate(prefix = '', length = 8) {
                    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                    let result = prefix;
                    for (let i = 0; i < length; i++) {
                        result += chars.charAt(Math.floor(Math.random() * chars.length));
                    }
                    return result + '_' + Date.now().toString(36);
                }
            }

            // ======================== تخزين متقدم ========================
            class AdvancedStorage {
                static set(key, value) {
                    try {
                        const serialized = JSON.stringify(value);
                        localStorage.setItem(key, serialized);
                        return true;
                    } catch (e) {
                        console.error('Storage error:', e);
                        return false;
                    }
                }

                static get(key, defaultValue = null) {
                    try {
                        const item = localStorage.getItem(key);
                        return item ? JSON.parse(item) : defaultValue;
                    } catch (e) {
                        console.error('Storage error:', e);
                        return defaultValue;
                    }
                }

                static remove(key) {
                    try {
                        localStorage.removeItem(key);
                        return true;
                    } catch (e) {
                        console.error('Storage error:', e);
                        return false;
                    }
                }

                static clear() {
                    try {
                        localStorage.clear();
                        return true;
                    } catch (e) {
                        console.error('Storage error:', e);
                        return false;
                    }
                }
            }

            // ======================== نظام المستويات ========================
            class LevelSystem {
                constructor(state) {
                    this.state = state;
                }

                getCurrentLevel() {
                    const balance = this.state.balance;
                    for (const [level, data] of Object.entries(ADVANCED_CONFIG.LEVELS)) {
                        if (balance >= data.min && balance < data.max) {
                            return { key: level, name: data.name, multiplier: data.multiplier, data };
                        }
                    }
                    return { key: 'BRONZE', name: 'برونزي', multiplier: 1, data: ADVANCED_CONFIG.LEVELS.BRONZE };
                }

                getNextLevel() {
                    const current = this.getCurrentLevel();
                    const levels = Object.keys(ADVANCED_CONFIG.LEVELS);
                    const currentIndex = levels.indexOf(current.key);
                    
                    if (currentIndex < levels.length - 1) {
                        const nextLevelKey = levels[currentIndex + 1];
                        const nextLevel = ADVANCED_CONFIG.LEVELS[nextLevelKey];
                        const needed = nextLevel.min - this.state.balance;
                        return { key: nextLevelKey, name: nextLevel.name, needed };
                    }
                    return null;
                }

                getProgress() {
                    const current = this.getCurrentLevel();
                    const next = this.getNextLevel();
                    
                    if (!next) return 100;
                    
                    const totalNeeded = ADVANCED_CONFIG.LEVELS[next.key].min - current.data.min;
                    const currentProgress = this.state.balance - current.data.min;
                    const progress = (currentProgress / totalNeeded) * 100;
                    
                    return Math.min(progress, 100);
                }
            }

                        }
                        if (existing.status === 'pending') {

                    });

                    this.saveUserTasks(userId, userTasks);

                    return { success: true, task };
                }

                completeTask(userId, taskId, verificationData = null) {
                    const task = this.state.tasks.find(t => t.id === taskId);
                    if (!task) return { success: false, message: 'المهمة غير موجودة' };

                    const userTasks = this.getUserTasks(userId);
                    const userTask = userTasks.find(t => t.taskId === taskId);

                    if (!userTask) {
                        return { success: false, message: 'لم تبدأ هذه المهمة' };
                    }

                    if (userTask.status === 'completed') {
                        return { success: false, message: 'المهمة مكتملة بالفعل' };
                    }

                    // تطبيق مضاعف المستوى
                    const levelSystem = new LevelSystem(this.state);
                    const multiplier = levelSystem.getCurrentLevel().multiplier;
                    const finalReward = Math.floor(task.reward * multiplier);

                    if (task.verification === 'auto') {
                        // إكمال تلقائي
                        userTask.status = 'completed';
                        userTask.completedAt = new Date().toISOString();
                        
                        this.state.updateBalance(this.state.balance + finalReward);
                        this.state.addTransaction('task', finalReward, `إكمال مهمة: ${task.title}`);
                        
                        this.saveUserTasks(userId, userTasks);
                        
                        // التحقق من الإنجازات
                        if (userTasks.filter(t => t.status === 'completed').length === 1) {

                        }

                        return { 
                            success: true, 
                            message: 'تم إكمال المهمة بنجاح',
                            reward: finalReward,
                            multiplier
                        };
                    } else {
                        // تحتاج مراجعة
                        userTask.status = 'pending';
                        userTask.verificationData = verificationData;
                        userTask.submittedAt = new Date().toISOString();
                        
                        this.saveUserTasks(userId, userTasks);
                        
                        return { 
                            success: true, 
                            message: 'تم إرسال المهمة للمراجعة',
                            pending: true
                        };
                    }
                }

                verifyTask(userId, taskId, approved) {
                    const task = this.state.tasks.find(t => t.id === taskId);
                    if (!task) return { success: false };

                    const userTasks = this.getUserTasks(userId);
                    const userTask = userTasks.find(t => t.taskId === taskId);

                    if (!userTask || userTask.status !== 'pending') return { success: false };

                    if (approved) {
                        userTask.status = 'completed';
                        userTask.completedAt = new Date().toISOString();
                        
                        const levelSystem = new LevelSystem(this.state);
                        const multiplier = levelSystem.getCurrentLevel().multiplier;
                        const finalReward = Math.floor(task.reward * multiplier);
                        
                        this.state.updateBalance(this.state.balance + finalReward);
                        this.state.addTransaction('task', finalReward, `إكمال مهمة (مراجعة): ${task.title}`);
                        
                        this.saveUserTasks(userId, userTasks);
                        
                        return { success: true, reward: finalReward };
                    } else {
                        userTask.status = 'started';
                        userTask.verificationData = null;
                        
                        this.saveUserTasks(userId, userTasks);
                        
                        return { success: false };
                    }
                }

                getAvailableTasks(userId) {
                    const userTasks = this.getUserTasks(userId);
                    
                    return this.state.tasks.filter(task => {
                        if (!task.active) return false;
                        
                        const userTask = userTasks.find(t => t.taskId === task.id);
                        return !userTask || userTask.status !== 'completed';
                    });

                    return {

                        total: this.state.tasks.length
                    };

                                        taskTitle: taskDetails.title,
                                        verificationData: task.verificationData,
                                        submittedAt: task.submittedAt
                                    });
                                }
                            }
                        });
                    }

                    return pending;
                }
            }

                    // حساب المكافأة (تزيد مع عدد الأيام المتتالية)

                    AdvancedStorage.set(key, today);

                    this.toast.show(`🎁 المكافأة اليومية: +${bonus}\nسلسلة الأيام: ${streak + 1}`, 'success');
                    
                    return { success: true, reward: bonus, streak: streak + 1 };

                    const streakKey = `daily_streak_${userId}`;
                    const lastDateKey = `daily_last_${userId}`;
                    
                    const lastDate = AdvancedStorage.get(lastDateKey);
                    const today = new Date().toDateString();
                    
                    if (!lastDate) return 0;
                    
                    const yesterday = new Date();
                    yesterday.setDate(yesterday.getDate() - 1);
                    
                    if (lastDate === yesterday.toDateString()) {
                        return AdvancedStorage.get(streakKey, 0);
                    }
                    
                    return 0;
                }

                    const streakKey = `daily_streak_${userId}`;
                    const lastDateKey = `daily_last_${userId}`;
                    const today = new Date().toDateString();
                    
                    const currentStreak = this.getStreak(userId);
                    AdvancedStorage.set(streakKey, currentStreak + 1);
                    AdvancedStorage.set(lastDateKey, today);
                }

                            balance: this.state.balance,

                        });

                        .slice(0, limit);

            // ======================== نظام الإشعارات المتطور ========================
            class AdvancedNotificationSystem {
                constructor() {
                    this.notifications = [];
                }

                add(userId, title, message, type = 'info') {
                    const notification = {
                        id: AdvancedIdGenerator.generate('notif_'),
                        userId,
                        title,
                        message,
                        type,
                        read: false,
                        date: new Date().toISOString()
                    };
                    
                    const userNotifications = this.getUserNotifications(userId);
                    userNotifications.push(notification);
                    this.saveUserNotifications(userId, userNotifications);
                    
                    return notification;
                }

                getUserNotifications(userId) {
                    const key = `notifications_${userId}`;
                    return AdvancedStorage.get(key, []);
                }

                saveUserNotifications(userId, notifications) {
                    const key = `notifications_${userId}`;
                    AdvancedStorage.set(key, notifications);
                }

                markAsRead(userId, notificationId) {
                    const notifications = this.getUserNotifications(userId);
                    const index = notifications.findIndex(n => n.id === notificationId);
                    
                    if (index !== -1) {
                        notifications[index].read = true;
                        this.saveUserNotifications(userId, notifications);
                        return true;
                    }
                    return false;
                }

                markAllAsRead(userId) {
                    const notifications = this.getUserNotifications(userId);
                    notifications.forEach(n => n.read = true);
                    this.saveUserNotifications(userId, notifications);
                }

                getUnreadCount(userId) {
                    const notifications = this.getUserNotifications(userId);
                    return notifications.filter(n => !n.read).length;
                }

                deleteNotification(userId, notificationId) {
                    const notifications = this.getUserNotifications(userId);
                    const filtered = notifications.filter(n => n.id !== notificationId);
                    this.saveUserNotifications(userId, filtered);
                }

                clearAll(userId) {
                    this.saveUserNotifications(userId, []);
                }
            }

            // ======================== نظام التنبيهات المتطور ========================
            class AdvancedToastManager {
                constructor(containerId) {
                    this.container = document.getElementById(containerId);
                    if (!this.container) {
                        this.container = document.createElement('div');
                        this.container.id = containerId;
                        this.container.className = 'fixed bottom-5 left-5 right-5 z-[9999] flex flex-col items-end gap-2 pointer-events-none';
                        document.body.appendChild(this.container);
                    }
                }

                show(message, type = 'info', duration = 5000) {
                    const toast = document.createElement('div');
                    toast.className = 'toast-advanced pointer-events-auto';
                    
                    const icons = {
                        success: 'fa-circle-check text-green-400',
                        error: 'fa-circle-exclamation text-red-400',
                        warning: 'fa-triangle-exclamation text-yellow-400',
                        info: 'fa-circle-info text-blue-400'
                    };
                    
                    toast.innerHTML = `
                        <i class="fa-solid ${icons[type] || icons.info} text-xl"></i>
                        <div class="flex-1 text-sm">${message}</div>
                        <button class="toast-close text-white/50 hover:text-white">
                            <i class="fa-solid fa-times"></i>
                        </button>
                    `;
                    
                    this.container.appendChild(toast);
                    
                    // زر الإغلاق
                    const closeBtn = toast.querySelector('.toast-close');
                    closeBtn.addEventListener('click', () => {
                        toast.remove();
                    });
                    
                    // إزالة تلقائية
                    setTimeout(() => {
                        if (toast.parentNode) {
                            toast.style.opacity = '0';
                            toast.style.transform = 'translateX(100px)';
                            setTimeout(() => toast.remove(), 400);
                        }
                    }, duration);
                }

                success(message) { this.show(message, 'success'); }
                error(message) { this.show(message, 'error'); }
                warning(message) { this.show(message, 'warning'); }
                info(message) { this.show(message, 'info'); }
            }

                }

                addTransaction(type, amount, note) {
                    const transaction = {
                        id: AdvancedIdGenerator.generate('tx_'),
                        type,
                        amount,
                        note,
                        date: new Date().toISOString()
                    };
                    this.transactions.unshift(transaction);
                    this.emit('transactionAdded', transaction);
                    return transaction;
                }

                on(event, callback) {
                    if (!this.listeners[event]) {
                        this.listeners[event] = [];
                    }
                    this.listeners[event].push(callback);
                }

                emit(event, data) {
                    if (this.listeners[event]) {
                        this.listeners[event].forEach(callback => callback(data));
                    }
                }
            }

                    const badge = document.getElementById('notificationBadge');
                    const count = this.notificationSystem.getUnreadCount(this.state.user?.id);
                    
                    if (count > 0) {
                        badge.classList.remove('hidden');
                        badge.textContent = count > 9 ? '9+' : count;

                        badge.classList.add('hidden');
                    }

                initializeParticles() {
                    const particles = document.getElementById('particles');
                    if (!particles) return;
                    
                    particles.innerHTML = '';
                    
                    for (let i = 0; i < 10; i++) {
                        const particle = document.createElement('div');
                        particle.className = 'particle';
                        particle.style.width = Math.random() * 200 + 50 + 'px';
                        particle.style.height = particle.style.width;
                        particle.style.top = Math.random() * 100 + '%';
                        particle.style.left = Math.random() * 100 + '%';
                        particle.style.animationDelay = Math.random() * 10 + 's';
                        particles.appendChild(particle);
                    }
                }

                bindWalletModalEvents() {
                    const modalOverlay = document.getElementById('walletModalOverlayAdvanced');

                    if (closeBtn) {
                        closeBtn.addEventListener('click', () => {
                            modalOverlay.classList.remove('open');

                            modalOverlay.classList.remove('open');
                        }
                    });

                    if (depositBtn) {
                        depositBtn.addEventListener('click', () => {
                            const amount = parseFloat(prompt('أدخل المبلغ للإيداع:'));
                            if (amount && amount > 0) {
                                this.state.updateBalance(this.state.balance + amount);
                                this.state.addTransaction('deposit', amount, 'إيداع');
                                this.toast.success(`تم إيداع ${amount} بنجاح`);
                                this.openWalletModal();
                            }
                        });
                    }

                    const withdrawBtn = document.getElementById('withdrawBtn');
                    if (withdrawBtn) {
                        withdrawBtn.addEventListener('click', () => {
                            const amount = parseFloat(prompt('أدخل المبلغ للسحب:'));
                            if (amount && amount > 0) {
                                if (amount <= this.state.balance) {
                                    this.state.updateBalance(this.state.balance - amount);
                                    this.state.addTransaction('withdraw', -amount, 'سحب');
                                    this.toast.success(`تم سحب ${amount} بنجاح`);
                                    this.openWalletModal();
                                } else {
                                    this.toast.error('الرصيد غير كافٍ');

                            }

                                <h3 class="font-bold mb-3 flex items-center gap-2">
                                    <i class="fa-solid fa-check-circle text-green-400"></i>
                                    طلبات التحقق من المهام (${pendingVerifications.length})
                                </h3>
                                ${pendingVerifications.length > 0 ? pendingVerifications.map(req => `
                                    <div class="bg-white/5 rounded-2xl p-3 mb-2">
                                        <div class="flex justify-between">
                                            <span class="font-bold">المستخدم: ${req.userId}</span>
                                            <span class="badge-pending">مراجعة</span>
                                        </div>
                                        <div class="text-sm mt-1">المهمة: ${req.taskTitle}</div>
                                        <div class="text-xs text-gray-400 truncate">البيان: ${req.verificationData || 'لا يوجد'}</div>
                                        <div class="flex gap-2 mt-2">
                                            <button class="accept-task-verify btn-gradient py-1 px-3 text-sm" data-user-id="${req.userId}" data-task-id="${req.taskId}">قبول</button>
                                            <button class="reject-task-verify bg-red-600 py-1 px-3 rounded-full text-sm" data-user-id="${req.userId}" data-task-id="${req.taskId}">رفض</button>
                                        </div>
                                    </div>
                                `).join('') : 
                                '<p class="text-gray-400 text-center py-2">لا توجد طلبات مراجعة</p>'}
                            </div>
                        </div>
                    `;
                }

                bindAdminPanelEvents() {
                    const modalOverlay = document.getElementById('adminPanelOverlayAdvanced');

                    const closeBtn = document.getElementById('closeAdminPanel');
                    if (closeBtn) {
                        closeBtn.addEventListener('click', () => {
                            modalOverlay.classList.remove('open');
                        });
                    }

                    modalOverlay.addEventListener('click', (e) => {
                        if (e.target === modalOverlay) {
                            modalOverlay.classList.remove('open');
                        }
                    });

                    // قبول التحقق من مهمة
                    document.querySelectorAll('.accept-task-verify').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const userId = btn.dataset.userId;
                            const taskId = btn.dataset.taskId;
                            const result = this.taskSystem.verifyTask(userId, taskId, true);
                            if (result && result.success) {
                                this.toast.success(`تم قبول المهمة وإضافة ${result.reward} للمستخدم`);
                                this.leaderboardSystem.updateUserData(userId, { balance: this.state.balance });
                            } else {
                                this.toast.error('حدث خطأ في قبول المهمة');
                            }
                            this.openAdminPanel();
                        });
                    });

                    // رفض التحقق من مهمة
                    document.querySelectorAll('.reject-task-verify').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const userId = btn.dataset.userId;
                            const taskId = btn.dataset.taskId;
                            const result = this.taskSystem.verifyTask(userId, taskId, false);
                            if (result) {
                                this.toast.warning(`تم رفض المهمة`);
                            } else {
                                this.toast.error('حدث خطأ في رفض المهمة');
                            }
                            this.openAdminPanel();
                        });
                    });
                }

                openAdsManagementModal() {
                    const modalOverlay = document.getElementById('manageAdsModalOverlayAdvanced');
                    const modalContent = document.getElementById('manageAdsModalContentAdvanced');
                    
                    modalContent.innerHTML = this.renderAdsManagementModal();
                    modalOverlay.classList.add('open');
                    
                    this.bindAdsManagementEvents();
                }

                renderAdsManagementModal() {
                    return `
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-xl font-bold gradient-text">إدارة الإعلانات</h2>
                            <button class="close-button" id="closeManageAdsModal">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="mb-4">
                            <button id="addAdBtn" class="btn-gradient w-full">
                                <i class="fa-solid fa-plus ml-2"></i>
                                إضافة إعلان جديد
                            </button>
                        </div>

                        <div class="space-y-3 max-h-96 overflow-y-auto">
                            ${this.state.ads.map(ad => `
                                <div class="glass-card p-3">
                                    <div class="flex justify-between items-start">
                                        <div>
                                            <h3 class="font-bold">${ad.title}</h3>
                                            <p class="text-xs text-gray-400">${ad.description}</p>
                                            <div class="flex gap-2 mt-1 text-xs">
                                                <span>المكافأة: ${ad.reward}</span>
                                                <span>المشاهدات: ${ad.views}</span>
                                            </div>
                                        </div>
                                        <div class="flex gap-2">
                                            <button class="edit-ad-btn text-blue-400" data-ad-id="${ad.id}">
                                                <i class="fa-solid fa-edit"></i>
                                            </button>
                                            <button class="delete-ad-btn text-red-400" data-ad-id="${ad.id}">
                                                <i class="fa-solid fa-trash"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }

                bindAdsManagementEvents() {
                    const modalOverlay = document.getElementById('manageAdsModalOverlayAdvanced');
                    
                    const closeBtn = document.getElementById('closeManageAdsModal');
                    if (closeBtn) {
                        closeBtn.addEventListener('click', () => {
                            modalOverlay.classList.remove('open');
                        });
                    }

                    modalOverlay.addEventListener('click', (e) => {
                        if (e.target === modalOverlay) {
                            modalOverlay.classList.remove('open');
                        }
                    });

                    const addBtn = document.getElementById('addAdBtn');
                    if (addBtn) {
                        addBtn.addEventListener('click', () => {
                            const title = prompt('أدخل عنوان الإعلان:');
                            if (!title) return;
                            
                            const description = prompt('أدخل وصف الإعلان:');
                            if (!description) return;
                            
                            const reward = parseInt(prompt('أدخل مكافأة الإعلان:'));
                            if (isNaN(reward)) return;
                            
                            const newAd = {
                                title,
                                description,
                                reward,
                                image: 'fa-solid fa-ad',
                                link: 'https://example.com',
                                duration: 30,
                                category: 'عام',
                                maxViews: 1000
                            };
                            
                            this.adSystem.addAd(newAd);
                            this.toast.success('تم إضافة الإعلان بنجاح');
                            this.openAdsManagementModal();
                        });
                    }

                    document.querySelectorAll('.edit-ad-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const adId = btn.dataset.adId;
                            const ad = this.state.ads.find(a => a.id === adId);
                            
                            if (ad) {
                                const newReward = parseInt(prompt('أدخل المكافأة الجديدة:', ad.reward));
                                if (!isNaN(newReward)) {
                                    this.adSystem.updateAd(adId, { reward: newReward });
                                    this.toast.success('تم تحديث الإعلان');
                                    this.openAdsManagementModal();
                                }
                            }
                        });
                    });

                    document.querySelectorAll('.delete-ad-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const adId = btn.dataset.adId;
                            
                            if (confirm('هل أنت متأكد من حذف هذا الإعلان؟')) {
                                this.adSystem.deleteAd(adId);
                                this.toast.success('تم حذف الإعلان');
                                this.openAdsManagementModal();
                            }
                        });
                    });
                }

                claimDailyReward() {
                    const result = this.dailyRewardSystem.claimDaily(this.state.user?.id);
                    if (result.success) {
                        this.updateBalanceDisplay();
                    }
                }

                shareProfile() {
                    const user = this.state.user;
                    const level = this.levelSystem.getCurrentLevel();
                    const shareText = `🎉 انضموا إلي على منصة أرباحي المتطورة!\n👤 المستوى: ${level.name}\n💰 الرصيد: ${this.state.balance}\n📲 حمل التطبيق الآن وابدأ الربح!`;
                    
                    if (this.telegram.isAvailable) {
                        this.telegram.openTelegramLink?.(`https://t.me/share/url?url=${encodeURIComponent('https://t.me/your_bot')}&text=${encodeURIComponent(shareText)}`);
                    } else {
                        navigator.clipboard?.writeText(shareText).then(() => {
                            this.toast.success('تم نسخ النص للمشاركة');
                        }).catch(() => {
                            this.toast.error('تعذر النسخ');
                        });
                    }
                }
            }

            // ======================== التهيئة والتشغيل الرئيسي ========================
            (async function initApp() {
                // إنشاء الكائنات الرئيسية
                const state = new AdvancedAppState();
                const telegram = new AdvancedTelegramService();
                const toast = new AdvancedToastManager('toastContainerAdvanced');
                const notificationSystem = new AdvancedNotificationSystem();

                // محاولة تهيئة تيليجرام
                telegram.init();

                // التحقق من وجود تيليجرام
                if (!telegram.isAvailable) {
                    state.telegramMissing = true;
                } else {
                    // الحصول على بيانات المستخدم
                    const user = telegram.getUser();
                    
                    if (user) {
                        state.user = user;
                        state.isAdmin = (user.id.toString() === ADVANCED_CONFIG.ADMIN_ID.toString());

                        // تحميل البيانات المحفوظة
                        const savedBalance = AdvancedStorage.get(`user_balance_${user.id}`);
                        if (savedBalance !== null) {
                            state.balance = savedBalance;
                        } else {
                            state.balance = ADVANCED_CONFIG.DEFAULT_BALANCE;
                            AdvancedStorage.set(`user_balance_${user.id}`, state.balance);
                        }

                        // تحديث بيانات المستخدم في نظام المتصدرين
                        const levelSystem = new LevelSystem(state);
                        new LeaderboardSystem(state).updateUserData(user.id.toString(), {
                            name: user.first_name,
                            balance: state.balance,
                            level: levelSystem.getCurrentLevel().name
                        });

                        // التحقق من أول دخول
                        const firstLogin = AdvancedStorage.get(`first_login_${user.id}`);
                        if (!firstLogin) {
                            const achievementSystem = new AchievementSystem(state, toast);
                            achievementSystem.checkAndAward(user.id, 'FIRST_LOGIN');
                            AdvancedStorage.set(`first_login_${user.id}`, true);
                        }

                        // التحقق من Referral Code إذا كان موجوداً
                        const startParam = telegram.getStartParam();
                        if (startParam) {
                            // محاولة فك التشفير
                            try {
                                const referralSystem = new ReferralSystem(state, toast);
                                const referredBy = atob(startParam.replace(/[^A-Za-z0-9]/g, ''));
                                if (referredBy && referredBy !== user.id.toString()) {
                                    referralSystem.addReferral(referredBy, user.id.toString());
                                }
                            } catch (e) {
                                console.log('Invalid referral code');
                            }
                        }

                    } else {
                        state.accessDenied = true;
                    }
                }

                // إنشاء مدير واجهة المستخدم
                const uiManager = new AdvancedUIManager(state, telegram, toast, notificationSystem);

                // ربط حدث تغيير الرصيد لحفظه تلقائياً
                state.on('balanceChanged', (newBalance) => {
                    if (state.user) {
                        AdvancedStorage.set(`user_balance_${state.user.id}`, newBalance);
                        // تحديث بيانات المستخدم في نظام المتصدرين
                        uiManager.leaderboardSystem.updateUserData(state.user.id.toString(), {
                            balance: newBalance,
                            level: uiManager.levelSystem.getCurrentLevel().name
                        });
                    }
                });

                // إنهاء حالة التحميل
                setTimeout(() => {
                    state.loading = false;
                    uiManager.render();
                }, 1500);

                // ربط أزرار الواجهة العامة
                const themeToggle = document.getElementById('themeToggleAdvanced');
                if (themeToggle) {
                    themeToggle.addEventListener('click', () => {
                        toast.info('وضع الظل قيد التطوير');
                    });
                }

                const notificationBell = document.getElementById('notificationBellAdvanced');
                if (notificationBell) {
                    notificationBell.addEventListener('click', () => {
                        if (state.user) {
                            const count = notificationSystem.getUnreadCount(state.user.id);
                            toast.info(`لديك ${count} إشعار غير مقروء`);
                            // تعليم الكل كمقروء
                            notificationSystem.markAllAsRead(state.user.id);
                            uiManager.updateNotificationBadge();
                        }
                    });
                }

                // فتح وإغلاق لوحة الإعدادات
                const openSettings = document.getElementById('openSettingsAdvanced');
                const settingsPanel = document.getElementById('settingsPanelAdvanced');
                const closeSettings = document.getElementById('closeSettingsAdvanced');

                if (openSettings) {
                    openSettings.addEventListener('click', () => {
                        settingsPanel.classList.add('open');
                    });
                }

                if (closeSettings) {
                    closeSettings.addEventListener('click', () => {
                        settingsPanel.classList.remove('open');
                    });
                }

                // إعدادات اللغة
                const languageSelect = document.getElementById('languageSelectAdvanced');
                if (languageSelect) {
                    languageSelect.addEventListener('change', (e) => {
                        const lang = e.target.value;
                        state.settings.language = lang;
                        toast.info(`تم تغيير اللغة إلى: ${lang === 'ar' ? 'العربية' : lang === 'en' ? 'English' : 'Français'}`);
                        // TODO: تنفيذ تغيير اللغة الفعلي
                    });
                }

                // إعدادات الإشعارات
                const notificationsToggle = document.getElementById('notificationsToggleAdvanced');
                if (notificationsToggle) {
                    notificationsToggle.addEventListener('change', (e) => {
                        state.settings.notifications = e.target.checked;
                        toast.info(`الإشعارات: ${e.target.checked ? 'مفعلة' : 'معطلة'}`);
                    });
                }

                // إعدادات الصوت
                const soundToggle = document.getElementById('soundToggleAdvanced');
                if (soundToggle) {
                    soundToggle.addEventListener('change', (e) => {
                        state.settings.sound = e.target.checked;
                        toast.info(`المؤثرات الصوتية: ${e.target.checked ? 'مفعلة' : 'معطلة'}`);
                    });
                }

                // إعدادات الاهتزاز
                const vibrateToggle = document.getElementById('vibrateToggleAdvanced');
                if (vibrateToggle) {
                    vibrateToggle.addEventListener('change', (e) => {
                        state.settings.vibrate = e.target.checked;
                        toast.info(`الاهتزاز: ${e.target.checked ? 'مفعل' : 'معطل'}`);
                    });
                }
            })();
        })();
    </script>
</body>
</html>
