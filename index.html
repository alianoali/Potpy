<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المحفظة الذكية - Telegram Web App</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <!-- Emoji Support -->
    <link href="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.14.0/dist/emoji-picker-element.min.css" rel="stylesheet">

    <style>
        /* ========== نفس الأنماط السابقة (لم يتم تغييرها) ========== */
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --secondary: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark-bg: #0f172a;
            --light-bg: #f8fafc;
            --dark-text: #ffffff;
            --light-text: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--tg-theme-bg-color, var(--dark-bg));
            color: var(--tg-theme-text-color, var(--dark-text));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease;
        }

        .ambient-bg {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }
        
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 10s infinite ease-in-out;
        }
        
        .orb-1 { top: -10%; right: -10%; width: 300px; height: 300px; background: var(--primary); }
        .orb-2 { bottom: -10%; left: -10%; width: 250px; height: 250px; background: var(--secondary); animation-delay: 5s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, 40px); }
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: var(--transition);
        }

        .glass-card:hover {
            background: rgba(40, 51, 69, 0.8);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--tg-theme-button-color, var(--primary));
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        .avatar {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            font-weight: bold;
        }

        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 90%;
            max-width: 350px;
            pointer-events: none;
        }

        .toast {
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 12px 20px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: toastIn 0.3s ease, toastOut 0.3s ease 4.7s forwards;
            pointer-events: auto;
            direction: rtl;
            line-height: 1.5;
        }

        .toast.success { border-right: 4px solid var(--success); }
        .toast.error { border-right: 4px solid var(--danger); }
        .toast.warning { border-right: 4px solid var(--warning); }
        .toast.info { border-right: 4px solid var(--primary); }

        .toast-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .toast.success .toast-icon { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .toast.error .toast-icon { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .toast.warning .toast-icon { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .toast.info .toast-icon { background: rgba(59, 130, 246, 0.2); color: var(--primary); }

        .toast-message { flex: 1; }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastOut {
            to { opacity: 0; transform: translateY(-10px); }
        }

        .theme-toggle {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: var(--transition);
        }

        .theme-toggle:hover {
            background: rgba(40, 51, 69, 0.8);
            transform: scale(1.05);
        }

        .wallet-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, var(--primary), var(--secondary));
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.5), 0 0 0 2px rgba(255, 255, 255, 0.1) inset;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            animation: floatWallet 3s infinite ease-in-out;
            position: relative;
            overflow: hidden;
        }

        .wallet-icon::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.4), transparent 70%);
        }

        .wallet-icon i {
            font-size: 36px;
            color: white;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
            animation: pulse 2s infinite ease-in-out;
            position: relative;
            z-index: 2;
        }

        .wallet-icon:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.8), 0 0 0 4px rgba(255, 255, 255, 0.2) inset;
        }

        @keyframes floatWallet {
            0% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .balance-badge {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 8px 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: 600;
            transition: var(--transition);
        }

        .balance-badge i { color: var(--warning); }

        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            min-width: 20px;
            height: 20px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.2);
            animation: pulse-badge 1.5s infinite;
            padding: 0 4px;
        }

        @keyframes pulse-badge {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .balance-progress {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
        }

        .balance-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 20px;
            transition: width 0.5s ease;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--glass-border);
            transition: var(--transition);
        }

        .transaction-item:hover {
            background: rgba(59, 130, 246, 0.05);
        }

        .transaction-amount.positive { color: var(--success); }
        .transaction-amount.negative { color: var(--danger); }

        .wallet-tabs {
            display: flex;
            gap: 8px;
            margin: 16px 0;
            padding: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 40px;
        }

        .wallet-tab {
            flex: 1;
            padding: 8px;
            border-radius: 30px;
            background: transparent;
            border: none;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .wallet-tab.active {
            background: var(--primary);
            color: white;
        }

        .wallet-tab i { font-size: 12px; }

        .payment-methods-list {
            max-height: 200px;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .payment-methods-list::-webkit-scrollbar { display: none; }

        .payment-method {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .payment-method:hover { background: rgba(59, 130, 246, 0.1); }
        .payment-method.selected {
            background: rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .payment-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            flex-shrink: 0;
        }

        .payment-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }

        .payment-details {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 12px;
            margin: 12px 0;
            font-size: 13px;
            line-height: 1.6;
            border: 1px solid var(--glass-border);
        }

        .user-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 12px;
            border: 1px solid var(--glass-border);
            transition: var(--transition);
        }

        .user-item:hover { background: rgba(59, 130, 246, 0.1); }
        .user-item.blocked { opacity: 0.6; background: rgba(239, 68, 68, 0.1); }

        .badge-blocked {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-primary:hover { background: var(--primary-dark); transform: scale(1.02); }

        .btn-success {
            background: var(--success);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-success:hover { background: #0ca678; transform: scale(1.02); }

        .btn-danger {
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-danger:hover { background: #dc2626; transform: scale(1.02); }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 500px;
            max-height: 70vh;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            scroll-behavior: smooth;
        }

        .chat-message {
            display: flex;
            margin-bottom: 12px;
            animation: fadeIn 0.3s ease;
        }

        .chat-message.incoming { justify-content: flex-start; }
        .chat-message.outgoing { justify-content: flex-end; }

        .message-bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 20px;
            position: relative;
            word-wrap: break-word;
        }

        .incoming .message-bubble {
            background: rgba(59, 130, 246, 0.2);
            border-bottom-right-radius: 5px;
        }

        .outgoing .message-bubble {
            background: rgba(16, 185, 129, 0.2);
            border-bottom-left-radius: 5px;
        }

        .message-info {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
            display: flex;
            gap: 8px;
        }

        .message-status {
            display: inline-flex;
            align-items: center;
            gap: 2px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: typing 1s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 100% { transform: translateY(0); opacity: 0.5; }
            50% { transform: translateY(-5px); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .quick-replies {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding: 10px;
            border-top: 1px solid var(--glass-border);
        }

        .quick-reply-btn {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }

        .quick-reply-btn:hover {
            background: rgba(59, 130, 246, 0.2);
            transform: scale(1.05);
        }

        .ticket-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: var(--transition);
        }

        .ticket-item:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .ticket-item.closed { opacity: 0.6; }

        .ticket-status {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 12px;
            display: inline-block;
        }

        .ticket-status.open { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .ticket-status.closed { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .ticket-status.pending { background: rgba(245, 158, 11, 0.2); color: var(--warning); }

        .faq-item {
            border-bottom: 1px solid var(--glass-border);
            padding: 12px 0;
        }

        .faq-question {
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            padding-right: 15px;
        }

        .faq-item.open .faq-answer { max-height: 200px; margin-top: 8px; }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal-overlay.open { display: flex; }

        .modal-content {
            position: relative;
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 24px 20px 20px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            animation: slideUp 0.3s ease;
        }

        .modal-content::-webkit-scrollbar { display: none; }

        .modal-close-btn {
            position: absolute;
            top: 16px;
            left: 16px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            z-index: 10;
        }

        .modal-close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .auto-update-indicator {
            position: fixed;
            top: 16px;
            right: 16px;
            background: var(--primary);
            color: white;
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .auto-update-indicator i { animation: spin 1s linear infinite; }
        .auto-update-indicator.hidden { display: none; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .image-upload-area {
            border: 2px dashed rgba(59, 130, 246, 0.5);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .image-upload-area:hover { border-color: var(--primary); background: rgba(59, 130, 246, 0.05); }

        .image-preview {
            max-width: 100px;
            max-height: 100px;
            border-radius: 12px;
            margin: 10px auto;
        }

        .delete-image-btn {
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 5px 15px;
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
        }

        .delete-image-btn:hover { background: #dc2626; }

        .hide-scrollbar {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }

        .balance-update {
            animation: balancePulse 0.5s ease;
        }

        @keyframes balancePulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); color: var(--success); }
            100% { transform: scale(1); }
        }

        .animate-slide-up {
            animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .currency-symbol {
            font-size: 0.8em;
            margin-left: 2px;
            color: var(--warning);
        }

        /* تحسينات إضافية */
        .copy-btn {
            cursor: pointer;
            transition: var(--transition);
        }
        .copy-btn:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <!-- ========== العناصر الخلفية ========== -->
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- ========== مبدل السمة ========== -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
        <span class="text-sm">السمة</span>
    </button>

    <!-- ========== الحاوية الرئيسية ========== -->
    <div id="app" class="w-full max-w-md p-5 relative"></div>

    <!-- ========== حاوية الإشعارات ========== -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ========== النوافذ المنبثقة ========== -->
    <div class="modal-overlay" id="walletModalOverlay">
        <div class="modal-content" id="walletModalContent"></div>
    </div>

    <div class="modal-overlay" id="adminPanelOverlay">
        <div class="modal-content" id="adminPanelContent" style="max-width: 500px;"></div>
    </div>

    <div class="modal-overlay" id="paymentMethodModalOverlay">
        <div class="modal-content" id="paymentMethodModalContent"></div>
    </div>

    <div class="modal-overlay" id="editBalanceModalOverlay">
        <div class="modal-content" id="editBalanceModalContent" style="max-width: 350px;"></div>
    </div>

    <div class="modal-overlay" id="supportChatModalOverlay">
        <div class="modal-content" id="supportChatModalContent" style="max-width: 450px;"></div>
    </div>

    <div class="modal-overlay" id="ticketModalOverlay">
        <div class="modal-content" id="ticketModalContent" style="max-width: 400px;"></div>
    </div>

    <div class="modal-overlay" id="settingsOverlay">
        <div class="modal-content" id="settingsPanel" style="max-width: 350px;"></div>
    </div>

    <!-- ========== منتقي الإيموجي ========== -->
    <div class="emoji-picker-container hidden" id="emojiPickerContainer">
        <emoji-picker class="light"></emoji-picker>
    </div>

            // ==================== فئة الأدوات المساعدة (مع تحديثات) ====================
            class Utils {
                static generateId(prefix = '') {
                    return prefix + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                }
                
                static getTodayDate() {
                    return new Date().toISOString().split('T')[0];
                }
                
                static formatDateTime(isoString) {
                    try {
                        return new Date(isoString).toLocaleString('ar-EG');
                    } catch {
                        return isoString;
                    }
                }
                
                static formatDate(isoString) {
                    try {
                        return new Date(isoString).toLocaleDateString('ar-EG');
                    } catch {
                        return isoString;
                    }
                }
                
                static formatTime(isoString) {
                    try {
                        return new Date(isoString).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
                    } catch {
                        return isoString;
                    }
                }
                
                static formatNumber(num) {
                    return num?.toLocaleString('ar-EG') || '0';
                }
                
                static formatUSD(num) {
                    return `$${Utils.formatNumber(num)}`;
                }
                
                static validateImage(file) {
                    if (!CONFIG.ALLOWED_IMAGE_TYPES.includes(file.type)) {
                        return { valid: false, error: 'نوع الملف غير مسموح' };
                    }
                    if (file.size > CONFIG.MAX_IMAGE_SIZE) {
                        return { valid: false, error: 'حجم الصورة كبير جداً (الحد الأقصى 2 ميجابايت)' };
                    }
                    return { valid: true };
                }
                
                static calculateBalanceLevel(balance) {
                    const level = CONFIG.BALANCE_LEVELS
                        .slice()
                        .reverse()
                        .find(l => balance >= l.threshold);
                    return level || CONFIG.BALANCE_LEVELS[0];
                }
                
                static safeJSONParse(str, fallback = null) {
                    try {
                        return JSON.parse(str);
                    } catch {
                        return fallback;
                    }
                }
                
                static debounce(func, wait) {
                    let timeout;
                    return function executedFunction(...args) {
                        const later = () => {
                            clearTimeout(timeout);
                            func(...args);
                        };
                        clearTimeout(timeout);
                        timeout = setTimeout(later, wait);
                    };
                }
                
                static truncate(str, length = 50) {
                    return str.length > length ? str.substring(0, length) + '...' : str;
                }
                
                // دالة هروب HTML محسّنة
                static escapeHtml(text) {
                    if (!text) return '';
                    const div = document.createElement('div');
                    div.textContent = text;
                    return div.innerHTML;
                }

                // دالة للنسخ إلى الحافظة
                static async copyToClipboard(text) {
                    try {
                        await navigator.clipboard.writeText(text);
                        return true;
                    } catch {
                        // fallback
                        const textarea = document.createElement('textarea');
                        textarea.value = text;
                        document.body.appendChild(textarea);
                        textarea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textarea);
                        return true;
                    }
                }
            }

            // ==================== فئة التخزين المحلي (بدون تغيير) ====================
            class StorageService {
                static get(key, defaultValue = null) {
                    try {
                        const value = localStorage.getItem(key);
                        return value ? Utils.safeJSONParse(value, defaultValue) : defaultValue;
                    } catch (error) {
                        console.error(`Storage get error: ${key}`, error);
                        return defaultValue;
                    }
                }

                static set(key, value) {
                    try {
                        localStorage.setItem(key, JSON.stringify(value));
                        return true;
                    } catch (error) {
                        console.error(`Storage set error: ${key}`, error);
                        return false;
                    }
                }

                static remove(key) {
                    try {
                        localStorage.removeItem(key);
                        return true;
                    } catch (error) {
                        console.error(`Storage remove error: ${key}`, error);
                        return false;
                    }
                }
            }

            // ==================== فئة إدارة الإشعارات (بدون تغيير) ====================
            class ToastManager {
                constructor() {
                    this.container = document.getElementById('toastContainer');
                    if (!this.container) {
                        this.container = document.createElement('div');
                        this.container.id = 'toastContainer';
                        this.container.className = 'toast-container';
                        document.body.appendChild(this.container);
                    }
                    this.soundEnabled = true;
                    this.vibrateEnabled = true;
                }

                show(message, type = 'info', duration = 5000) {
                    const toast = document.createElement('div');
                    toast.className = `toast ${type}`;
                    
                    const icons = {
                        success: 'fa-solid fa-check',
                        error: 'fa-solid fa-exclamation',
                        warning: 'fa-solid fa-triangle-exclamation',
                        info: 'fa-solid fa-info'
                    };
                    
                    toast.innerHTML = `
                        <div class="toast-icon"><i class="${icons[type] || icons.info}"></i></div>
                        <div class="toast-message">${message}</div>
                    `;
                    
                    this.container.appendChild(toast);
                    
                    if (this.soundEnabled) this.playSound(type);
                    if (this.vibrateEnabled && navigator.vibrate) navigator.vibrate(200);
                    
                    setTimeout(() => toast.remove(), duration);
                }

                playSound(type) {
                    try {
                        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        const oscillator = audioContext.createOscillator();
                        const gainNode = audioContext.createGain();
                        
                        oscillator.connect(gainNode);
                        gainNode.connect(audioContext.destination);
                        
                        oscillator.type = 'sine';
                        oscillator.frequency.value = type === 'success' ? 800 : (type === 'warning' ? 600 : 400);
                        gainNode.gain.value = 0.1;
                        
                        oscillator.start();
                        oscillator.stop(audioContext.currentTime + 0.2);
                        
                        audioContext.resume();
                    } catch (error) {
                        console.log('Audio not supported', error);
                    }
                }

                success(message) { this.show(message, 'success'); }
                error(message) { this.show(message, 'error'); }
                warning(message) { this.show(message, 'warning'); }
                info(message) { this.show(message, 'info'); }
            }

            // ==================== فئة إدارة البيانات (مع تحديثات) ====================
            class DataService {
                constructor(state) {
                    this.state = state;
                    this.refreshInterval = null;
                    this.loadInitialData();
                }

                loadInitialData() {
                    this.loadUsers();
                    this.loadRequests();
                    this.loadPaymentMethods();
                    this.loadSettings();
                    this.loadNotifications();
                    this.loadChatMessages();
                    this.loadSupportTickets();
                    this.loadFAQItems();
                }

                // المستخدمين
                loadUsers() {
                    this.state.users = StorageService.get(CONFIG.STORAGE_KEYS.USERS_DATA, {});
                }

                saveUsers() {
                    StorageService.set(CONFIG.STORAGE_KEYS.USERS_DATA, this.state.users);
                }

                getUserData(userId) {
                    if (!this.state.users[userId]) {
                        this.state.users[userId] = {
                            balance: CONFIG.DEFAULT_BALANCE,
                            transactions: [],
                            blocked: false,
                            createdAt: new Date().toISOString(),
                            lastActive: new Date().toISOString(),
                            name: this.state.user ? `${this.state.user.first_name} ${this.state.user.last_name || ''}`.trim() : `مستخدم ${userId}`,
                            username: this.state.user?.username || '',
                            supportTickets: 0,
                            totalChats: 0
                        };
                        this.saveUsers();
                    }
                    return this.state.users[userId];
                }

                updateUser(userId, data) {
                    this.state.users[userId] = { ...this.state.users[userId], ...data };
                    this.saveUsers();
                    
                    if (this.state.user && this.state.user.id == userId) {
                        this.state.set('currentUser', this.state.users[userId]);
                    }
                }

                updateBalance(userId, delta, reason, type = 'adjust') {
                    const user = this.getUserData(userId);
                    const oldBalance = user.balance;
                    const newBalance = user.balance + delta;
                    
                    if (newBalance < 0) {
                        return { success: false, error: 'الرصيد غير كافٍ' };
                    }
                    
                    user.balance = newBalance;
                    
                    const transaction = {
                        id: Utils.generateId('tx_'),
                        type,
                        amount: delta,
                        note: reason, // ملاحظة قد تحتوي على نصوص من المستخدم
                        date: new Date().toISOString(),
                        status: 'completed',
                        oldBalance,
                        newBalance
                    };
                    
                    user.transactions.unshift(transaction);
                    if (user.transactions.length > CONFIG.MAX_TRANSACTIONS) {
                        user.transactions.pop();
                    }
                    
                    user.lastActive = new Date().toISOString();
                    this.updateUser(userId, user);
                    
                    this.addNotification(
                        userId,
                        delta > 0 ? '💰 إيداع' : '💸 سحب',
                        `${delta > 0 ? 'تمت إضافة' : 'تم خصم'} ${Utils.formatUSD(Math.abs(delta))} إلى رصيدك. الرصيد الجديد: ${Utils.formatUSD(newBalance)}`,
                        delta > 0 ? 'success' : 'warning'
                    );
                    
                    return { success: true, transaction, newBalance, oldBalance };
                }

                getAllUsers() {
                    return Object.entries(this.state.users).map(([id, data]) => ({
                        id: parseInt(id),
                        name: data.name || `مستخدم ${id}`,
                        username: data.username || '',
                        balance: data.balance,
                        blocked: data.blocked || false,
                        transactionsCount: data.transactions.length,
                        lastActive: data.lastActive,
                        createdAt: data.createdAt,
                        supportTickets: data.supportTickets || 0
                    }));
                }

                // الطلبات
                loadRequests() {
                    this.state.depositRequests = StorageService.get(CONFIG.STORAGE_KEYS.DEPOSIT_REQUESTS, []);
                    this.state.withdrawalRequests = StorageService.get(CONFIG.STORAGE_KEYS.WITHDRAWAL_REQUESTS, []);
                }

                saveRequests() {
                    StorageService.set(CONFIG.STORAGE_KEYS.DEPOSIT_REQUESTS, this.state.depositRequests);
                    StorageService.set(CONFIG.STORAGE_KEYS.WITHDRAWAL_REQUESTS, this.state.withdrawalRequests);
                }

                addDepositRequest(amount, methodId, transactionId) {
                    if (!this.state.user) return null;
                    
                    // تحسين: التحقق من صحة TXID
                    if (!transactionId || transactionId.length < CONFIG.TXID_MIN_LENGTH) {
                        this.state.toast?.error(`رقم العملية يجب أن يكون على الأقل ${CONFIG.TXID_MIN_LENGTH} أحرف`);
                        return null;
                    }

                    const method = this.state.paymentMethods.find(m => m.id === methodId);
                    const request = {
                        id: Utils.generateId('dep_'),
                        userId: this.state.user.id,
                        userName: `${this.state.user.first_name} ${this.state.user.last_name || ''}`.trim(),
                        amount,
                        method: method ? method.name : methodId,
                        methodId,
                        transactionId: Utils.escapeHtml(transactionId), // هروب
                        status: 'pending',
                        date: new Date().toISOString()
                    };
                    
                    this.state.depositRequests.push(request);
                    this.saveRequests();
                    this.incrementDailyOps();
                    
                    return request;
                }

                addWithdrawalRequest(amount, methodId, details) {
                    if (!this.state.user) return { success: false, error: 'المستخدم غير موجود' };
                    
                    const user = this.getUserData(this.state.user.id);
                    if (amount > user.balance) {
                        return { success: false, error: 'الرصيد غير كافٍ' };
                    }
                    
                    const method = this.state.paymentMethods.find(m => m.id === methodId);
                    const request = {
                        id: Utils.generateId('with_'),
                        userId: this.state.user.id,
                        userName: `${this.state.user.first_name} ${this.state.user.last_name || ''}`.trim(),
                        amount,
                        method: method ? method.name : methodId,
                        methodId,
                        details: Utils.escapeHtml(details), // هروب
                        status: 'pending',
                        date: new Date().toISOString()
                    };
                    
                    this.state.withdrawalRequests.push(request);
                    this.saveRequests();
                    this.incrementDailyOps();
                    
                    return { success: true, request };
                }

                acceptRequest(requestId, type) {
                    if (type === 'deposit') {
                        const request = this.state.depositRequests.find(r => r.id === requestId);
                        if (request && request.status === 'pending') {
                            request.status = 'approved';
                            const result = this.updateBalance(
                                request.userId,
                                request.amount,
                                `شحن عبر ${request.method}`,
                                'deposit'
                            );
                            if (result.success) {
                                this.saveRequests();
                                this.addNotification(
                                    request.userId,
                                    '✅ تم قبول طلب الشحن',
                                    `تمت إضافة ${Utils.formatUSD(request.amount)} إلى رصيدك.`,
                                    'success'
                                );
                                return true;
                            }
                        }
                    } else if (type === 'withdrawal') {
                        const request = this.state.withdrawalRequests.find(r => r.id === requestId);
                        if (request && request.status === 'pending') {
                            const user = this.getUserData(request.userId);
                            if (user.balance >= request.amount) {
                                request.status = 'approved';
                                const result = this.updateBalance(
                                    request.userId,
                                    -request.amount,
                                    `سحب عبر ${request.method}`,
                                    'withdraw'
                                );
                                if (result.success) {
                                    this.saveRequests();
                                    this.addNotification(
                                        request.userId,
                                        '✅ تم قبول طلب السحب',
                                        `تم خصم ${Utils.formatUSD(request.amount)} من رصيدك.`,
                                        'success'
                                    );
                                    return true;
                                }
                            }
                        }
                    }
                    return false;
                }

                rejectRequest(requestId, type) {
                    if (type === 'deposit') {
                        const request = this.state.depositRequests.find(r => r.id === requestId);
                        if (request) {
                            request.status = 'rejected';
                            this.saveRequests();
                            this.addNotification(
                                request.userId,
                                '❌ تم رفض طلب الشحن',
                                `تم رفض طلب الشحن بمبلغ ${Utils.formatUSD(request.amount)}`,
                                'error'
                            );
                            return true;
                        }
                    } else if (type === 'withdrawal') {
                        const request = this.state.withdrawalRequests.find(r => r.id === requestId);
                        if (request) {
                            request.status = 'rejected';
                            this.saveRequests();
                            this.addNotification(
                                request.userId,
                                '❌ تم رفض طلب السحب',
                                `تم رفض طلب السحب بمبلغ ${Utils.formatUSD(request.amount)}`,
                                'error'
                            );
                            return true;
                        }
                    }
                    return false;
                }

                getPendingRequestsCount() {
                    return this.state.depositRequests.filter(r => r.status === 'pending').length +
                           this.state.withdrawalRequests.filter(r => r.status === 'pending').length;
                }

                // طرق الدفع (بدون تغيير)
                loadPaymentMethods() {
                    const saved = StorageService.get(CONFIG.STORAGE_KEYS.PAYMENT_METHODS, null);
                    if (saved && saved.length) {
                        this.state.paymentMethods = saved;
                    } else {
                        this.state.paymentMethods = [
                            { 
                                id: Utils.generateId('usdt_'), 
                                name: 'USDT (TRC20)', 
                                icon: 'fa-brands fa-tether', 
                                iconType: 'fa', 
                                description: 'عملة رقمية مستقرة - دولار',
                                depositDetails: 'عنوان المحفظة: T9eK3zX8qLp2mN5rV7bA1cD4fG6hJ8kQ\nشبكة: TRC20',
                                withdrawDetails: 'أدخل عنوان USDT الخاص بك'
                            },
                            { 
                                id: Utils.generateId('visa_'), 
                                name: 'Visa / Mastercard', 
                                icon: 'fa-regular fa-credit-card', 
                                iconType: 'fa', 
                                description: 'بطاقات ائتمانية - دولار',
                                depositDetails: 'رقم البطاقة: **** **** **** 1234\nتاريخ الانتهاء: 12/25\nCVV: ***',
                                withdrawDetails: 'أدخل بيانات بطاقتك'
                            },
                            { 
                                id: Utils.generateId('bank_'), 
                                name: 'تحويل بنكي', 
                                icon: 'fa-solid fa-building-columns', 
                                iconType: 'fa', 
                                description: 'حوالة بنكية - دولار',
                                depositDetails: 'IBAN: SA0380000000608010167519\nاسم المستفيد: شركة المدفوعات\nالبنك: الأهلي السعودي',
                                withdrawDetails: 'أدخل رقم IBAN الخاص بك'
                            }
                        ];
                    }

                savePaymentMethods() {
                    StorageService.set(CONFIG.STORAGE_KEYS.PAYMENT_METHODS, this.state.paymentMethods);
                }

                addPaymentMethod(method) {
                    const newMethod = { id: Utils.generateId('pm_'), ...method };
                    this.state.paymentMethods.push(newMethod);
                    this.savePaymentMethods();
                    return newMethod;
                }

                updatePaymentMethod(id, data) {
                    const index = this.state.paymentMethods.findIndex(m => m.id === id);
                    if (index !== -1) {
                        this.state.paymentMethods[index] = { ...this.state.paymentMethods[index], ...data };
                        this.savePaymentMethods();
                        return true;
                    }
                    return false;
                }

                deletePaymentMethod(id) {
                    this.state.paymentMethods = this.state.paymentMethods.filter(m => m.id !== id);
                    this.savePaymentMethods();
                }

                // الإشعارات
                loadNotifications() {
                    this.state.notifications = StorageService.get(CONFIG.STORAGE_KEYS.NOTIFICATIONS, []);
                }

                saveNotifications() {
                    StorageService.set(CONFIG.STORAGE_KEYS.NOTIFICATIONS, this.state.notifications);
                }

                addNotification(userId, title, message, type = 'info') {
                    const notification = {
                        id: Utils.generateId('notif_'),
                        userId,
                        title,
                        message,
                        type,
                        read: false,
                        date: new Date().toISOString()
                    };
                    this.state.notifications.push(notification);
                    this.saveNotifications();
                    
                    if (this.state.user && this.state.user.id == userId) {
                        this.state.set('unreadNotifications', this.getUnreadCount(userId));
                    }
                    
                    return notification;
                }

                markNotificationAsRead(id) {
                    const notification = this.state.notifications.find(n => n.id === id);
                    if (notification) {
                        notification.read = true;
                        this.saveNotifications();
                        if (this.state.user) {
                            this.state.set('unreadNotifications', this.getUnreadCount(this.state.user.id));
                        }
                    }
                }

                markAllAsRead(userId) {
                    this.state.notifications.forEach(n => {
                        if (n.userId === userId && !n.read) n.read = true;
                    });

                        userName: this.state.user ? `${this.state.user.first_name} ${this.state.user.last_name || ''}`.trim() : 'مستخدم',
                        message: Utils.escapeHtml(message), // هروب
                        isSupport: isSupport,

                        supportName: isSupport ? CONFIG.SUPPORT_TEAM[Math.floor(Math.random() * CONFIG.SUPPORT_TEAM.length)].name : null,
                        read: false,
                        date: new Date().toISOString(),
                        status: 'sent'
                    };
                    
                    this.state.chatMessages.push(msg);
                    this.saveChatMessages();
                    
                    if (!isSupport && this.state.user && !this.state.isAdmin) {

                    let messages = this.state.chatMessages;
                    
                    if (userId) {
                        messages = messages.filter(m => m.userId === userId || m.isSupport);
                    }
                    
                    return messages
                        .sort((a, b) => new Date(a.date) - new Date(b.date))
                        .slice(-limit);
                }

                    this.state.chatMessages.forEach(m => {
                        if (m.userId === userId && !m.read) m.read = true;

                    if (userId) {

                createSupportTicket(title, description, priority = 'medium') {
                    if (!this.state.user) return null;
                    
                    const user = this.getUserData(this.state.user.id);
                    
                    const ticket = {
                        id: Utils.generateId('ticket_'),
                        userId: this.state.user.id,
                        userName: `${this.state.user.first_name} ${this.state.user.last_name || ''}`.trim(),
                        title: Utils.escapeHtml(title), // هروب
                        description: Utils.escapeHtml(description), // هروب
                        priority: priority,
                        status: 'open',
                        createdAt: new Date().toISOString(),
                        updatedAt: new Date().toISOString(),
                        messages: [
                            {
                                id: Utils.generateId('tmsg_'),
                                sender: 'user',
                                message: Utils.escapeHtml(description),
                                date: new Date().toISOString()
                            }
                        ]
                    };
                    
                    this.state.supportTickets.push(ticket);
                    
                    user.supportTickets = (user.supportTickets || 0) + 1;
                    this.updateUser(this.state.user.id, user);
                    
                    this.saveSupportTickets();
                    
                    this.addNotification(
                        CONFIG.ADMIN_ID,
                        '🎫 تذكرة دعم جديدة',
                        `من: ${ticket.userName}\nالعنوان: ${Utils.truncate(title, 30)}`,
                        'warning'
                    );
                    
                    return ticket;
                }

                addTicketMessage(ticketId, message, sender = 'user') {
                    const ticket = this.state.supportTickets.find(t => t.id === ticketId);
                    if (ticket) {
                        const msg = {
                            id: Utils.generateId('tmsg_'),
                            sender: sender,
                            message: Utils.escapeHtml(message), // هروب
                            date: new Date().toISOString()
                        };
                        
                        ticket.messages.push(msg);
                        ticket.updatedAt = new Date().toISOString();
                        
                        if (sender === 'user' && ticket.status === 'closed') {
                            ticket.status = 'pending';
                        }
                        
                        this.saveSupportTickets();
                        
                        if (sender === 'user') {
                            this.addNotification(
                                CONFIG.ADMIN_ID,
                                '📝 رد على تذكرة',
                                `التذكرة: ${Utils.truncate(ticket.title, 30)}`,
                                'info'
                            );
                        }
                        
                        return msg;
                    }
                    return null;
                }

                updateTicketStatus(ticketId, status) {
                    const ticket = this.state.supportTickets.find(t => t.id === ticketId);
                    if (ticket) {
                        ticket.status = status;
                        ticket.updatedAt = new Date().toISOString();
                        this.saveSupportTickets();
                        
                        this.addNotification(
                            ticket.userId,
                            status === 'closed' ? '🔒 تم إغلاق التذكرة' : '📬 تحديث على التذكرة',

                            status === 'closed' ? 'error' : 'info'
                        );
                        
                        return true;
                    }
                    return false;
                }

                getUserTickets(userId) {
                    return this.state.supportTickets
                        .filter(t => t.userId === userId)
                        .sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));

                handleStateChange(e) {
                    const { key, value } = e.detail;
                    if (key === 'currentUser') {
                        this.updateBalanceDisplays(value?.balance);
                    }
                }

                updateBalanceDisplays(balance) {
                    const elements = document.querySelectorAll('[data-balance]');
                    elements.forEach(el => {
                        el.textContent = Utils.formatUSD(balance);
                        el.classList.add('balance-update');
                        setTimeout(() => el.classList.remove('balance-update'), 500);
                    });
                    
                    const progressBar = document.getElementById('balanceProgressBar');
                    if (progressBar && balance !== undefined) {
                        const maxBalance = CONFIG.BALANCE_LEVELS[CONFIG.BALANCE_LEVELS.length - 1].threshold;
                        const percentage = Math.min((balance / maxBalance) * 100, 100);
                        progressBar.style.width = `${percentage}%`;
                    }
                    
                    const levelElement = document.getElementById('balanceLevel');
                    if (levelElement && balance !== undefined) {
                        const level = Utils.calculateBalanceLevel(balance);
                        levelElement.textContent = level.name;
                        levelElement.style.color = level.color;
                    }
                }

                // دالة موحدة لإغلاق جميع النوافذ
                closeAllModals() {
                    const overlays = [
                        'walletModalOverlay',
                        'adminPanelOverlay',
                        'paymentMethodModalOverlay',
                        'editBalanceModalOverlay',
                        'supportChatModalOverlay',
                        'ticketModalOverlay',
                        'settingsOverlay'
                    ];
                    overlays.forEach(id => {
                        const el = document.getElementById(id);
                        if (el) el.classList.remove('open');
                    });
                }

                // دالة موحدة لفتح نافذة مع إضافة سلوك الإغلاق
                openModal(overlayId, contentHtml, onCloseCallback = null) {
                    this.closeAllModals();
                    
                    const overlay = document.getElementById(overlayId);
                    const content = overlay.querySelector('.modal-content');
                    content.innerHTML = contentHtml;
                    
                    if (!content.querySelector('.modal-close-btn')) {
                        const closeBtn = document.createElement('button');
                        closeBtn.className = 'modal-close-btn';
                        closeBtn.innerHTML = '<i class="fa-solid fa-times"></i>';
                        closeBtn.setAttribute('aria-label', 'إغلاق');
                        content.prepend(closeBtn);
                    }
                    
                    overlay.classList.add('open');
                    
                    const closeHandler = (e) => {
                        if (e.target === overlay) {
                            overlay.classList.remove('open');
                            if (onCloseCallback) onCloseCallback();
                        }
                    };
                    overlay.addEventListener('click', closeHandler);
                    
                    const escHandler = (e) => {
                        if (e.key === 'Escape' && overlay.classList.contains('open')) {
                            overlay.classList.remove('open');
                            if (onCloseCallback) onCloseCallback();
                            document.removeEventListener('keydown', escHandler);
                        }
                    };
                    document.addEventListener('keydown', escHandler);
                    
                    const closeBtnInContent = content.querySelector('.modal-close-btn, [id^="close"]');
                    if (closeBtnInContent) {
                        closeBtnInContent.addEventListener('click', () => {
                            overlay.classList.remove('open');
                            if (onCloseCallback) onCloseCallback();
                        });
                    }
                    
                    const cleanup = () => {
                        overlay.removeEventListener('click', closeHandler);
                        document.removeEventListener('keydown', escHandler);
                    };
                    overlay.addEventListener('transitionend', function onTransitionEnd(e) {
                        if (!overlay.classList.contains('open')) {
                            cleanup();
                            overlay.removeEventListener('transitionend', onTransitionEnd);
                        }
                    });
                }

                // ========== نظام الدردشة ==========
                openSupportChat() {
                    const contentHtml = this.renderSupportChat();
                    this.openModal('supportChatModalOverlay', contentHtml, () => {
                        this.data.markChatAsRead(this.state.user.id);
                    });
                    
                    this.loadEmojiPicker();
                }

                renderSupportChat() {
                    const isAdmin = this.state.isAdmin;
                    const messages = this.data.getChatMessages(isAdmin ? null : this.state.user?.id, 50);
                    
                    const messagesHtml = messages.map(msg => {
                        const isOutgoing = isAdmin ? !msg.isSupport : (msg.userId === this.state.user?.id && !msg.isSupport);
                        return `
                            <div class="chat-message ${isOutgoing ? 'outgoing' : 'incoming'}">
                                <div class="message-bubble">
                                    <div class="text-sm">${Utils.escapeHtml(msg.message)}</div>
                                    <div class="message-info">
                                        <span>${Utils.formatTime(msg.date)}</span>
                                        ${msg.isSupport ? `<span>فريق الدعم</span>` : ''}
                                        ${isOutgoing ? `
                                            <span class="message-status">
                                                <i class="fa-regular fa-circle-check"></i>
                                            </span>
                                        ` : ''}
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');

                    const quickReplies = isAdmin ? CONFIG.QUICK_REPLIES.admin : CONFIG.QUICK_REPLIES.user;

                    return `
                        <h2 class="text-xl font-bold mb-4 text-center">
                            <i class="fa-solid fa-headset ml-2 text-green-400"></i>
                            ${isAdmin ? 'دردشة الدعم - جميع المستخدمين' : 'التواصل مع فريق الدعم'}
                        </h2>

                        <div class="chat-container glass-card p-3 rounded-2xl">
                            <div class="chat-messages hide-scrollbar" id="chatMessages">
                                ${messagesHtml || '<p class="text-center text-gray-400 py-4">لا توجد رسائل بعد... ابدأ المحادثة الآن</p>'}
                            </div>

                            <div id="typingIndicator" class="typing-indicator hidden">

                            </div>

                                `).join('')}
                            </div>

                                </button>

                                <button id="sendChatMessage" class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center hover:bg-blue-700 transition-colors flex-shrink-0">
                                    <i class="fa-solid fa-paper-plane"></i>
                                </button>
                            </div>

                            ${isAdmin ? `
                                <div class="mt-2 text-xs text-gray-400">
                                    <i class="fa-regular fa-circle-info ml-1"></i>
                                    أنت تتحدث كفريق الدعم
                                </div>
                            ` : ''}
                        </div>
                    `;
                }

                bindChatEvents() {
                    const modal = document.getElementById('supportChatModalOverlay');
                    const messagesContainer = document.getElementById('chatMessages');
                    const input = document.getElementById('chatMessageInput');
                    const sendBtn = document.getElementById('sendChatMessage');
                    const emojiBtn = document.getElementById('emojiPickerBtn');
                    const emojiContainer = document.getElementById('emojiPickerContainer');
                    
                    const sendMessage = () => {
                        const message = input.value.trim();
                        if (!message) return;

                        this.data.addChatMessage(message, this.state.user?.id, this.state.isAdmin);
                        
                        const msgDiv = document.createElement('div');
                        msgDiv.className = 'chat-message outgoing';
                        msgDiv.innerHTML = `
                            <div class="message-bubble">
                                <div class="text-sm">${Utils.escapeHtml(message)}</div>
                                <div class="message-info">
                                    <span>${Utils.formatTime(new Date().toISOString())}</span>
                                    <span class="message-status"><i class="fa-regular fa-circle-check"></i></span>
                                </div>
                            </div>
                        `;
                        messagesContainer.appendChild(msgDiv);
                        messagesContainer.scrollTop = messagesContainer.scrollHeight;
                        
                        input.value = '';
                        
                        if (!this.state.isAdmin) {
                            setTimeout(() => {
                                this.simulateSupportReply(message);
                            }, 2000);
                        }
                    };

                    sendBtn.addEventListener('click', sendMessage);
                    
                    input.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') sendMessage();
                    });

                    if (emojiBtn) {
                        emojiBtn.addEventListener('click', () => {
                            emojiContainer.classList.toggle('hidden');
                        });
                    }

                    document.querySelectorAll('.quick-reply-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            input.value = btn.textContent;
                            sendMessage();
                        });
                    });

                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }

                simulateSupportReply(userMessage) {
                    const messagesContainer = document.getElementById('chatMessages');
                    const typingIndicator = document.getElementById('typingIndicator');
                    
                    typingIndicator.classList.remove('hidden');
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    
                    setTimeout(() => {
                        typingIndicator.classList.add('hidden');
                        
                        let reply = 'شكراً لتواصلك معنا. سيتم الرد عليك في أقرب وقت ممكن.';
                        
                        if (userMessage.includes('شحن') || userMessage.includes('إيداع')) {
                            reply = 'لشحن المحفظة، يرجى اختيار طريقة الدفع المناسبة من قسم المحفظة وإدخال رقم العملية. فريق الدعم متاح للمساعدة.';
                        } else if (userMessage.includes('سحب')) {
                            reply = 'لطلب السحب، تأكد من توفر الرصيد الكافي واختر طريقة السحب المناسبة. سيتم مراجعة طلبك خلال 24 ساعة.';
                        } else if (userMessage.includes('تحويل')) {
                            reply = 'التحويل بين المستخدمين سهل! أدخل معرف المستخدم المستهدف والمبلغ من قسم التحويل في المحفظة.';
                        }
                        
                        this.data.addChatMessage(reply, null, true);
                        
                        const msgDiv = document.createElement('div');
                        msgDiv.className = 'chat-message incoming';
                        msgDiv.innerHTML = `
                            <div class="message-bubble">
                                <div class="text-sm">${Utils.escapeHtml(reply)}</div>
                                <div class="message-info">
                                    <span>${Utils.formatTime(new Date().toISOString())}</span>
                                    <span>فريق الدعم</span>
                                </div>
                            </div>
                        `;
                        messagesContainer.appendChild(msgDiv);
                        messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    }, 2000);
                }

                renderUserTickets() {

                        </button>

                            ${tickets.map(ticket => `
                                <div class="ticket-item ${ticket.status === 'closed' ? 'closed' : ''}" data-id="${ticket.id}">
                                    <div class="flex justify-between items-start">
                                        <div class="flex-1">
                                            <div class="font-bold">${Utils.escapeHtml(ticket.title)}</div>
                                            <div class="text-xs text-gray-400 mt-1">${Utils.escapeHtml(Utils.truncate(ticket.description, 50))}</div>
                                            <div class="flex items-center gap-2 mt-2">

                                            </div>
                                        </div>
                                        <i class="fa-solid fa-chevron-left text-gray-400"></i>
                                    </div>
                                </div>
                            `).join('') || '<p class="text-center text-gray-400 py-4">لا توجد تذاكر بعد</p>'}

                            <input type="text" id="ticketTitle" placeholder="عنوان التذكرة" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 mb-2 text-white">
                            <textarea id="ticketDescription" placeholder="وصف المشكلة بالتفصيل" rows="3" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 mb-2 text-white"></textarea>
                            <select id="ticketPriority" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 mb-3 text-white">
                                <option value="low">منخفضة</option>
                                <option value="medium" selected>متوسطة</option>
                                <option value="high">عالية</option>
                            </select>
                            <div class="flex gap-2">

                                <button id="cancelCreateTicket" class="flex-1 bg-gray-600 py-2 rounded-lg font-bold hover:bg-gray-700 transition-colors">إلغاء</button>

                    const modal = document.getElementById('ticketModalOverlay');
