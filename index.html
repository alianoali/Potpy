<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المحفظة الذكية - Telegram Web App</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --secondary: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark-bg: #0f172a;
            --light-bg: #f8fafc;
            --dark-text: #ffffff;
            --light-text: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--tg-theme-bg-color, var(--dark-bg));
            color: var(--tg-theme-text-color, var(--dark-text));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease;
        }

        /* الخلفية المتحركة */
        .ambient-bg {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }
        
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 10s infinite ease-in-out;
        }
        
        .orb-1 { top: -10%; right: -10%; width: 300px; height: 300px; background: var(--primary); }
        .orb-2 { bottom: -10%; left: -10%; width: 250px; height: 250px; background: var(--secondary); animation-delay: 5s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, 40px); }
        }

        /* Glassmorphism المحسن */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            background: rgba(40, 51, 69, 0.8);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-slide-up {
            animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* Loader المحسن */
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--tg-theme-button-color, var(--primary));
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Avatar */
        .avatar {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            font-weight: bold;
        }

        /* Toast Notifications المحسنة */
        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 90%;
            max-width: 350px;
            pointer-events: none;
        }

        .toast {
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 12px 20px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: toastIn 0.3s ease, toastOut 0.3s ease 4.7s forwards;
            pointer-events: auto;
            direction: rtl;
            line-height: 1.5;
        }

        .toast.success { border-right: 4px solid var(--success); }
        .toast.error { border-right: 4px solid var(--danger); }
        .toast.warning { border-right: 4px solid var(--warning); }
        .toast.info { border-right: 4px solid var(--primary); }

        .toast-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .toast.success .toast-icon { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .toast.error .toast-icon { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .toast.warning .toast-icon { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .toast.info .toast-icon { background: rgba(59, 130, 246, 0.2); color: var(--primary); }

        .toast-message { flex: 1; }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastOut {
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* Theme Toggle المحسن */
        .theme-toggle {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: rgba(40, 51, 69, 0.8);
            transform: scale(1.05);
        }

        /* Settings Panel المحسن */
        .settings-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            padding: 24px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            border-radius: 30px 30px 0 0;
        }

        .settings-panel.open { transform: translateY(0); }

        .settings-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .settings-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        /* أيقونة المحفظة المتطورة */
        .wallet-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, var(--primary), var(--secondary));
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.5), 0 0 0 2px rgba(255, 255, 255, 0.1) inset;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: floatWallet 3s infinite ease-in-out;
            position: relative;
            overflow: hidden;
        }

        .wallet-icon::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.4), transparent 70%);
        }

        .wallet-icon i {
            font-size: 36px;
            color: white;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
            animation: pulse 2s infinite ease-in-out;
            position: relative;
            z-index: 2;
        }

        .wallet-icon:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.8), 0 0 0 4px rgba(255, 255, 255, 0.2) inset;
        }

        @keyframes floatWallet {
            0% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Badge الرصيد */
        .balance-badge {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 8px 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .balance-badge i { color: var(--warning); }

        /* Notification Badge */
        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            min-width: 20px;
            height: 20px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.2);
            animation: pulse-badge 1.5s infinite;
            padding: 0 4px;
        }

        @keyframes pulse-badge {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Payment Methods */
        .payment-method {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
        }

        .payment-method:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .payment-method.selected {
            background: rgba(59, 130, 246, 0.2);
            border-color: var(--primary);
        }

        .payment-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: #334155;
            color: white;
            flex-shrink: 0;
            overflow: hidden;
        }
        
        .payment-icon img {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            object-fit: cover;
        }

        /* Payment Details */
        .payment-details {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid var(--glass-border);
            font-size: 13px;
            line-height: 1.6;
        }

        .payment-details strong { color: var(--primary); }

        /* Tabs */
        .wallet-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 12px;
            flex-wrap: wrap;
        }

        .wallet-tab {
            flex: 1;
            min-width: 70px;
            padding: 8px 5px;
            text-align: center;
            border-radius: 12px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
        }

        .wallet-tab.active {
            background: rgba(59, 130, 246, 0.2);
            color: var(--primary);
        }

        .wallet-tab i { margin-left: 6px; }

        /* Transactions */
        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--glass-border);
        }

        .transaction-item:last-child { border-bottom: none; }
        .transaction-amount.positive { color: var(--success); }
        .transaction-amount.negative { color: var(--danger); }

        /* Balance Progress */
        .balance-progress {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }

        .balance-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        /* Auto Update Indicator */
        .auto-update-indicator {
            position: fixed;
            bottom: 80px;
            right: 16px;
            background: rgba(16, 185, 129, 0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 11px;
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 999;
            animation: slideInRight 0.3s ease;
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .auto-update-indicator i {
            animation: spin 1s linear infinite;
        }

        /* Image Upload */
        .image-upload-area {
            border: 2px dashed rgba(59, 130, 246, 0.5);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(0, 0, 0, 0.2);
        }

        .image-upload-area:hover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.1);
        }

        .image-preview {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            object-fit: cover;
            border: 2px solid var(--primary);
            margin: 10px auto;
        }

        .delete-image-btn {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .delete-image-btn:hover {
            background: var(--danger);
            color: white;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 24px;
            width: 100%;
            max-width: 450px;
            max-height: 80vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-overlay.open .modal-content { transform: scale(1); }

        /* Form Elements */
        input, select, textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 10px 12px;
            color: inherit;
            width: 100%;
            transition: all 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        /* User Item */
        .user-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid var(--glass-border);
        }

        .user-item.blocked { opacity: 0.5; }

        .badge-blocked {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 600;
        }

        /* Balance Update Animation */
        .balance-update {
            animation: balancePulse 0.5s ease;
        }

        @keyframes balancePulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); color: var(--success); }
            100% { transform: scale(1); }
        }

        /* Hide scrollbar but keep functionality */
        .hide-scrollbar {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
        <span class="text-sm">السمة</span>
    </button>

    <!-- Main Container -->
    <div id="app" class="w-full max-w-md p-5 relative"></div>

    <!-- Settings Panel -->
    <div class="settings-overlay" id="settingsOverlay"></div>
    <div class="settings-panel" id="settingsPanel">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold">الإعدادات</h3>
            <button id="closeSettings" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
        <div class="space-y-4">
            <div class="flex items-center justify-between">
                <span class="text-gray-300">اللغة</span>
                <select class="bg-white/10 rounded-lg p-2 w-32" id="languageSelect">
                    <option value="ar">العربية</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div class="flex items-center justify-between">
                <span class="text-gray-300">الإشعارات</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" id="notificationsToggle">
                    <div class="w-11 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600 transition-colors"></div>
                </label>
            </div>
            <div class="flex items-center justify-between">
                <span class="text-gray-300">تنبيه صوتي</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" id="soundToggle" checked>
                    <div class="w-11 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600 transition-colors"></div>
                </label>
            </div>
            <div class="flex items-center justify-between">
                <span class="text-gray-300">اهتزاز</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" id="vibrateToggle" checked>
                    <div class="w-11 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600 transition-colors"></div>
                </label>
            </div>
            <div class="flex items-center justify-between">
                <span class="text-gray-300">تحديث تلقائي</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" id="autoRefreshToggle" checked>
                    <div class="w-11 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600 transition-colors"></div>
                </label>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Modals Container -->
    <div class="modal-overlay" id="walletModalOverlay">
        <div class="modal-content" id="walletModalContent"></div>
    </div>

    <div class="modal-overlay" id="adminPanelOverlay">
        <div class="modal-content" id="adminPanelContent" style="max-width: 500px;"></div>
    </div>

    <div class="modal-overlay" id="paymentMethodModalOverlay">
        <div class="modal-content" id="paymentMethodModalContent"></div>
    </div>

    <div class="modal-overlay" id="editBalanceModalOverlay">
        <div class="modal-content" id="editBalanceModalContent" style="max-width: 350px;"></div>
    </div>

    <!-- Auto Update Indicator -->
    <div id="autoUpdateIndicator" class="auto-update-indicator hidden">
        <i class="fa-solid fa-rotate"></i>
        <span>جاري تحديث الرصيد...</span>
    </div>

    <script>
        (function() {
            'use strict';

            // ==================== Configuration ====================
            const CONFIG = {
                ADMIN_ID: 7609492965,
                DEFAULT_BALANCE: 1000,
                MAX_TRANSACTIONS: 50,
                MAX_IMAGE_SIZE: 2 * 1024 * 1024, // 2MB
                ALLOWED_IMAGE_TYPES: ['image/jpeg', 'image/png', 'image/gif', 'image/webp'],
                AUTO_REFRESH_INTERVAL: 3000,
                STORAGE_KEYS: {
                    USERS_DATA: 'wallet_users_data',
                    DEPOSIT_REQUESTS: 'wallet_deposit_requests',
                    WITHDRAWAL_REQUESTS: 'wallet_withdrawal_requests',
                    PAYMENT_METHODS: 'wallet_payment_methods',
                    THEME: 'wallet_theme',
                    SETTINGS: 'wallet_settings',
                    NOTIFICATIONS: 'wallet_notifications',
                    DAILY_OPS: 'wallet_daily_ops'
                },
                BALANCE_LEVELS: [
                    { threshold: 0, color: '#ef4444', name: 'منخفض' },
                    { threshold: 1000, color: '#f59e0b', name: 'متوسط' },
                    { threshold: 5000, color: '#10b981', name: 'جيد' },
                    { threshold: 10000, color: '#3b82f6', name: 'ممتاز' },
                    { threshold: 50000, color: '#8b5cf6', name: 'ماسي' }
                ]
            };

            // ==================== Utilities ====================
            const Utils = {
                generateId: (prefix = '') => prefix + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                
                getTodayDate: () => new Date().toISOString().split('T')[0],
                
                formatDateTime: (isoString) => {
                    try {
                        return new Date(isoString).toLocaleString('ar-EG');
                    } catch {
                        return isoString;
                    }
                },
                
                formatDate: (isoString) => {
                    try {
                        return new Date(isoString).toLocaleDateString('ar-EG');
                    } catch {
                        return isoString;
                    }
                },
                
                formatNumber: (num) => {
                    return num?.toLocaleString('ar-EG') || '0';
                },
                
                validateImage: (file) => {
                    if (!CONFIG.ALLOWED_IMAGE_TYPES.includes(file.type)) {
                        return { valid: false, error: 'نوع الملف غير مسموح' };
                    }
                    if (file.size > CONFIG.MAX_IMAGE_SIZE) {
                        return { valid: false, error: 'حجم الصورة كبير جداً (الحد الأقصى 2 ميجابايت)' };
                    }
                    return { valid: true };
                },
                
                calculateBalanceLevel: (balance) => {
                    const level = CONFIG.BALANCE_LEVELS
                        .slice()
                        .reverse()
                        .find(l => balance >= l.threshold);
                    return level || CONFIG.BALANCE_LEVELS[0];
                },
                
                safeJSONParse: (str, fallback = null) => {
                    try {
                        return JSON.parse(str);
                    } catch {
                        return fallback;
                    }
                },
                
                debounce: (func, wait) => {
                    let timeout;
                    return function executedFunction(...args) {
                        const later = () => {
                            clearTimeout(timeout);
                            func(...args);
                        };
                        clearTimeout(timeout);
                        timeout = setTimeout(later, wait);
                    };
                }
            };

            // ==================== Storage Service ====================
            class StorageService {
                static get(key, defaultValue = null) {
                    try {
                        const value = localStorage.getItem(key);
                        return value ? Utils.safeJSONParse(value, defaultValue) : defaultValue;
                    } catch (error) {
                        console.error(`Storage get error: ${key}`, error);
                        return defaultValue;
                    }
                }

                static set(key, value) {
                    try {
                        localStorage.setItem(key, JSON.stringify(value));
                        return true;
                    } catch (error) {
                        console.error(`Storage set error: ${key}`, error);
                        return false;
                    }
                }

                static remove(key) {
                    try {
                        localStorage.removeItem(key);
                        return true;
                    } catch (error) {
                        console.error(`Storage remove error: ${key}`, error);
                        return false;
                    }
                }
            }

            // ==================== Toast Manager ====================
            class ToastManager {
                constructor() {
                    this.container = document.getElementById('toastContainer');
                    if (!this.container) {
                        this.container = document.createElement('div');
                        this.container.id = 'toastContainer';
                        this.container.className = 'toast-container';
                        document.body.appendChild(this.container);
                    }
                    this.soundEnabled = true;
                    this.vibrateEnabled = true;
                }

                show(message, type = 'info', duration = 5000) {
                    const toast = document.createElement('div');
                    toast.className = `toast ${type}`;
                    
                    const icons = {
                        success: 'fa-solid fa-check',
                        error: 'fa-solid fa-exclamation',
                        warning: 'fa-solid fa-triangle-exclamation',
                        info: 'fa-solid fa-info'
                    };
                    
                    toast.innerHTML = `
                        <div class="toast-icon"><i class="${icons[type] || icons.info}"></i></div>
                        <div class="toast-message">${message}</div>
                    `;
                    
                    this.container.appendChild(toast);
                    
                    if (this.soundEnabled) this.playSound(type);
                    if (this.vibrateEnabled && navigator.vibrate) navigator.vibrate(200);
                    
                    setTimeout(() => toast.remove(), duration);
                }

                playSound(type) {
                    try {
                        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        const oscillator = audioContext.createOscillator();
                        const gainNode = audioContext.createGain();
                        
                        oscillator.connect(gainNode);
                        gainNode.connect(audioContext.destination);
                        
                        oscillator.type = 'sine';
                        oscillator.frequency.value = type === 'success' ? 800 : (type === 'warning' ? 600 : 400);
                        gainNode.gain.value = 0.1;
                        
                        oscillator.start();
                        oscillator.stop(audioContext.currentTime + 0.2);
                        
                        audioContext.resume();
                    } catch (error) {
                        console.log('Audio not supported', error);
                    }
                }

                success(message) { this.show(message, 'success'); }
                error(message) { this.show(message, 'error'); }
                warning(message) { this.show(message, 'warning'); }
                info(message) { this.show(message, 'info'); }
            }

            // ==================== Data Service ====================
            class DataService {
                constructor(state) {
                    this.state = state;
                    this.refreshInterval = null;
                    this.loadInitialData();
                }

                loadInitialData() {
                    this.loadUsers();
                    this.loadRequests();
                    this.loadPaymentMethods();
                    this.loadSettings();
                    this.loadNotifications();
                }

                // Users
                loadUsers() {
                    this.state.users = StorageService.get(CONFIG.STORAGE_KEYS.USERS_DATA, {});
                }

                saveUsers() {
                    StorageService.set(CONFIG.STORAGE_KEYS.USERS_DATA, this.state.users);
                }

                getUserData(userId) {
                    if (!this.state.users[userId]) {
                        this.state.users[userId] = {
                            balance: CONFIG.DEFAULT_BALANCE,
                            transactions: [],
                            blocked: false,
                            createdAt: new Date().toISOString(),
                            lastActive: new Date().toISOString(),
                            name: this.state.user ? `${this.state.user.first_name} ${this.state.user.last_name || ''}`.trim() : `مستخدم ${userId}`
                        };
                        this.saveUsers();
                    }
                    return this.state.users[userId];
                }

                updateUser(userId, data) {
                    this.state.users[userId] = { ...this.state.users[userId], ...data };
                    this.saveUsers();
                    
                    if (this.state.user && this.state.user.id == userId) {
                        this.state.set('currentUser', this.state.users[userId]);
                    }
                }

                updateBalance(userId, delta, reason, type = 'adjust') {
                    const user = this.getUserData(userId);
                    const oldBalance = user.balance;
                    const newBalance = user.balance + delta;
                    
                    if (newBalance < 0) {
                        return { success: false, error: 'الرصيد غير كافٍ' };
                    }
                    
                    user.balance = newBalance;
                    
                    const transaction = {
                        id: Utils.generateId('tx_'),
                        type,
                        amount: delta,
                        note: reason,
                        date: new Date().toISOString(),
                        status: 'completed',
                        oldBalance,
                        newBalance
                    };
                    
                    user.transactions.unshift(transaction);
                    if (user.transactions.length > CONFIG.MAX_TRANSACTIONS) {
                        user.transactions.pop();
                    }
                    
                    user.lastActive = new Date().toISOString();
                    this.updateUser(userId, user);
                    
                    this.addNotification(
                        userId,
                        delta > 0 ? '💰 إيداع' : '💸 سحب',
                        `${delta > 0 ? 'تمت إضافة' : 'تم خصم'} ${Math.abs(delta)} إلى رصيدك. الرصيد الجديد: ${newBalance}`,
                        delta > 0 ? 'success' : 'warning'
                    );
                    
                    return { success: true, transaction, newBalance, oldBalance };
                }

                getAllUsers() {
                    return Object.entries(this.state.users).map(([id, data]) => ({
                        id: parseInt(id),
                        name: data.name || `مستخدم ${id}`,
                        balance: data.balance,
                        blocked: data.blocked || false,
                        transactionsCount: data.transactions.length,
                        lastActive: data.lastActive,
                        createdAt: data.createdAt
                    }));
                }

                // Requests
                loadRequests() {
                    this.state.depositRequests = StorageService.get(CONFIG.STORAGE_KEYS.DEPOSIT_REQUESTS, []);
                    this.state.withdrawalRequests = StorageService.get(CONFIG.STORAGE_KEYS.WITHDRAWAL_REQUESTS, []);
                }

                saveRequests() {
                    StorageService.set(CONFIG.STORAGE_KEYS.DEPOSIT_REQUESTS, this.state.depositRequests);
                    StorageService.set(CONFIG.STORAGE_KEYS.WITHDRAWAL_REQUESTS, this.state.withdrawalRequests);
                }

                addDepositRequest(amount, methodId, transactionId) {
                    if (!this.state.user) return null;
                    
                    const method = this.state.paymentMethods.find(m => m.id === methodId);
                    const request = {
                        id: Utils.generateId('dep_'),
                        userId: this.state.user.id,
                        userName: `${this.state.user.first_name} ${this.state.user.last_name || ''}`.trim(),
                        amount,
                        method: method ? method.name : methodId,
                        methodId,
                        transactionId,
                        status: 'pending',
                        date: new Date().toISOString()
                    };
                    
                    this.state.depositRequests.push(request);
                    this.saveRequests();
                    this.incrementDailyOps();
                    
                    return request;
                }

                addWithdrawalRequest(amount, methodId, details) {
                    if (!this.state.user) return { success: false, error: 'المستخدم غير موجود' };
                    
                    const user = this.getUserData(this.state.user.id);
                    if (amount > user.balance) {
                        return { success: false, error: 'الرصيد غير كافٍ' };
                    }
                    
                    const method = this.state.paymentMethods.find(m => m.id === methodId);
                    const request = {
                        id: Utils.generateId('with_'),
                        userId: this.state.user.id,
                        userName: `${this.state.user.first_name} ${this.state.user.last_name || ''}`.trim(),
                        amount,
                        method: method ? method.name : methodId,
                        methodId,
                        details,
                        status: 'pending',
                        date: new Date().toISOString()
                    };
                    
                    this.state.withdrawalRequests.push(request);
                    this.saveRequests();
                    this.incrementDailyOps();
                    
                    return { success: true, request };
                }

                acceptRequest(requestId, type) {
                    if (type === 'deposit') {
                        const request = this.state.depositRequests.find(r => r.id === requestId);
                        if (request && request.status === 'pending') {
                            request.status = 'approved';
                            const result = this.updateBalance(
                                request.userId,
                                request.amount,
                                `شحن عبر ${request.method}`,
                                'deposit'
                            );
                            if (result.success) {
                                this.saveRequests();
                                return true;
                            }
                        }
                    } else if (type === 'withdrawal') {
                        const request = this.state.withdrawalRequests.find(r => r.id === requestId);
                        if (request && request.status === 'pending') {
                            const user = this.getUserData(request.userId);
                            if (user.balance >= request.amount) {
                                request.status = 'approved';
                                const result = this.updateBalance(
                                    request.userId,
                                    -request.amount,
                                    `سحب عبر ${request.method}`,
                                    'withdraw'
                                );
                                if (result.success) {
                                    this.saveRequests();
                                    return true;
                                }
                            }
                        }
                    }
                    return false;
                }

                rejectRequest(requestId, type) {
                    if (type === 'deposit') {
                        const request = this.state.depositRequests.find(r => r.id === requestId);
                        if (request) {
                            request.status = 'rejected';
                            this.saveRequests();
                            this.addNotification(
                                request.userId,
                                '❌ تم رفض طلب الشحن',
                                `تم رفض طلب الشحن بمبلغ ${request.amount}`,
                                'error'
                            );
                            return true;
                        }
                    } else if (type === 'withdrawal') {
                        const request = this.state.withdrawalRequests.find(r => r.id === requestId);
                        if (request) {
                            request.status = 'rejected';
                            this.saveRequests();
                            this.addNotification(
                                request.userId,
                                '❌ تم رفض طلب السحب',
                                `تم رفض طلب السحب بمبلغ ${request.amount}`,
                                'error'
                            );
                            return true;
                        }
                    }
                    return false;
                }

                getPendingRequestsCount() {
                    return this.state.depositRequests.filter(r => r.status === 'pending').length +
                           this.state.withdrawalRequests.filter(r => r.status === 'pending').length;
                }

                incrementDailyOps() {
                    const today = Utils.getTodayDate();
                    const ops = StorageService.get(CONFIG.STORAGE_KEYS.DAILY_OPS, {});
                    ops[today] = (ops[today] || 0) + 1;
                    StorageService.set(CONFIG.STORAGE_KEYS.DAILY_OPS, ops);
                    this.state.stats.dailyOps = ops[today] || 0;
                }

                // Auto Refresh
                startAutoRefresh(callback) {
                    this.stopAutoRefresh();
                    if (this.state.settings.autoRefresh) {
                        this.refreshInterval = setInterval(() => {

                    }

                        clearInterval(this.refreshInterval);
                        this.refreshInterval = null;
                    }

                bindWalletModalEvents() {
                    const overlay = document.getElementById('walletModalOverlay');
                    
                    document.getElementById('closeWalletModal').addEventListener('click', () => {
                        overlay.classList.remove('open');
                    });
                    
                    overlay.addEventListener('click', (e) => {
                        if (e.target === overlay) overlay.classList.remove('open');
                    });

                    // Tab switching
                    const tabs = document.querySelectorAll('.wallet-tab');
                    tabs.forEach(tab => {
                        tab.addEventListener('click', () => {
                            tabs.forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');
                            
                            document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.add('hidden'));
                            document.getElementById(`tab-${tab.dataset.tab}`).classList.remove('hidden');
                        });
                    });

                    // Show deposit tab by default
                    document.getElementById('tab-deposit').classList.remove('hidden');

                    // Payment method selection
                    let selectedMethod = null;
                    const methods = document.querySelectorAll('.payment-methods-list .payment-method');
                    const detailsDiv = document.getElementById('depositDetails');
                    const detailsText = document.getElementById('depositDetailsText');

                    methods.forEach(method => {
                        method.addEventListener('click', () => {
                            methods.forEach(m => m.classList.remove('selected'));
                            method.classList.add('selected');
                            selectedMethod = method.dataset.methodId;

                            const methodObj = this.state.paymentMethods.find(m => m.id === selectedMethod);
                            if (methodObj?.depositDetails) {
                                detailsText.innerHTML = methodObj.depositDetails.replace(/\n/g, '<br>');
                                detailsDiv.classList.remove('hidden');
                            } else {
                                detailsDiv.classList.add('hidden');
                            }
                        });
                    });

                    // Deposit
                    document.getElementById('depositBtn')?.addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('depositAmount').value);
                        const txId = document.getElementById('depositTransactionId').value.trim();

                        if (isNaN(amount) || amount <= 0) {
                            this.toast.error('أدخل مبلغ صحيح');
                            return;
                        }
                        if (!selectedMethod) {
                            this.toast.error('اختر طريقة دفع');
                            return;
                        }
                        if (!txId) {
                            this.toast.error('أدخل رقم العملية');
                            return;
                        }

                        const request = this.data.addDepositRequest(amount, selectedMethod, txId);
                        if (request) {
                            this.toast.success(`✅ تم تقديم طلب الشحن بنجاح`);
                            document.getElementById('depositAmount').value = '';
                            document.getElementById('depositTransactionId').value = '';
                            methods.forEach(m => m.classList.remove('selected'));
                            detailsDiv.classList.add('hidden');
                            selectedMethod = null;
                        }
                    });

                    // Withdraw
                    let selectedWithdrawMethod = null;
                    document.querySelectorAll('#tab-withdraw .payment-method').forEach(method => {
                        method.addEventListener('click', () => {
                            document.querySelectorAll('#tab-withdraw .payment-method').forEach(m => m.classList.remove('selected'));
                            method.classList.add('selected');
                            selectedWithdrawMethod = method.dataset.methodId;
                            
                            const methodObj = this.state.paymentMethods.find(m => m.id === selectedWithdrawMethod);
                            const detailsInput = document.getElementById('withdrawDetails');
                            if (methodObj) {
                                detailsInput.placeholder = methodObj.withdrawDetails || 'أدخل التفاصيل';
                            }
                        });
                    });

                    document.getElementById('withdrawBtn')?.addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('withdrawAmount').value);
                        const details = document.getElementById('withdrawDetails').value.trim();

                        if (isNaN(amount) || amount <= 0) {
                            this.toast.error('أدخل مبلغ صحيح');
                            return;
                        }
                        if (!selectedWithdrawMethod) {
                            this.toast.error('اختر طريقة سحب');
                            return;
                        }
                        if (!details) {
                            this.toast.error('أدخل التفاصيل');
                            return;
                        }

                        const result = this.data.addWithdrawalRequest(amount, selectedWithdrawMethod, details);
                        if (result.success) {
                            this.toast.success(`✅ تم تقديم طلب السحب بنجاح`);
                            document.getElementById('withdrawAmount').value = '';
                            document.getElementById('withdrawDetails').value = '';
                            document.querySelectorAll('#tab-withdraw .payment-method').forEach(m => m.classList.remove('selected'));
                            selectedWithdrawMethod = null;
                        } else {
                            this.toast.error(result.error);
                        }
                    });

                    // Transfer
                    document.getElementById('transferBtn')?.addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('transferAmount').value);
                        const targetId = parseInt(document.getElementById('transferUserId').value);

                        if (isNaN(amount) || amount <= 0) {
                            this.toast.error('أدخل مبلغ صحيح');
                            return;
                        }
                        if (!targetId || isNaN(targetId)) {
                            this.toast.error('أدخل معرف المستخدم');
                            return;
                        }

                        const userData = this.data.getUserData(targetId);
                        if (!userData) {
                            this.toast.error('المستخدم غير موجود');
                            return;
                        }

                        if (amount > (this.state.currentUser?.balance || 0)) {
                            this.toast.error('الرصيد غير كافٍ');
                            return;
                        }

                        const withdrawResult = this.data.updateBalance(
                            this.state.user.id,
                            -amount,
                            `تحويل إلى المستخدم ${targetId}`,
                            'transfer_out'
                        );

                        if (withdrawResult.success) {
                            this.data.updateBalance(
                                targetId,
                                amount,
                                `تحويل من المستخدم ${this.state.user.id}`,
                                'transfer_in'
                            );

                            this.toast.success(`✅ تم التحويل بنجاح`);
                            document.getElementById('transferAmount').value = '';
                            document.getElementById('transferUserId').value = '';
                        }
                    });
                }

                bindAdminPanelEvents() {
                    const overlay = document.getElementById('adminPanelOverlay');
                    
                    document.getElementById('closeAdminPanel').addEventListener('click', () => {
                        overlay.classList.remove('open');
                    });
                    
                    overlay.addEventListener('click', (e) => {
                        if (e.target === overlay) overlay.classList.remove('open');
                    });

                    // Tab switching
                    const tabs = document.querySelectorAll('[data-admin-tab]');
                    tabs.forEach(tab => {
                        tab.addEventListener('click', () => {
                            tabs.forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');
                            
                            document.getElementById('adminRequestsTab').classList.add('hidden');
                            document.getElementById('adminUsersTab').classList.add('hidden');
                            document.getElementById('adminPaymentTab').classList.add('hidden');
                            
                            if (tab.dataset.adminTab === 'requests') {
                                document.getElementById('adminRequestsTab').classList.remove('hidden');
                            } else if (tab.dataset.adminTab === 'users') {
                                document.getElementById('adminUsersTab').classList.remove('hidden');
                            } else if (tab.dataset.adminTab === 'payment') {
                                document.getElementById('adminPaymentTab').classList.remove('hidden');
                            }
                        });
                    });

                    // Accept/Reject requests
                    document.querySelectorAll('.accept-request').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const item = e.target.closest('[data-id]');
                            const id = item.dataset.id;
                            const type = item.dataset.type;
                            
                            if (this.data.acceptRequest(id, type)) {
                                this.toast.success('تم قبول الطلب');
                                this.openAdminPanel();
                            } else {
                                this.toast.error('حدث خطأ');
                            }
                        });
                    });

                    document.querySelectorAll('.reject-request').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const item = e.target.closest('[data-id]');
                            const id = item.dataset.id;
                            const type = item.dataset.type;
                            
                            if (this.data.rejectRequest(id, type)) {
                                this.toast.info('تم رفض الطلب');
                                this.openAdminPanel();
                            }
                        });
                    });

                    // User actions
                    document.querySelectorAll('.edit-user-balance').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const userId = btn.dataset.id;
                            this.openEditBalanceModal(userId);
                        });
                    });

                    document.querySelectorAll('.toggle-user-block').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const userId = btn.dataset.id;
                            const user = this.data.getUserData(parseInt(userId));
                            user.blocked = !user.blocked;
                            this.data.updateUser(parseInt(userId), user);
                            this.toast.success(user.blocked ? 'تم حظر المستخدم' : 'تم رفع الحظر');
                            this.openAdminPanel();
                        });
                    });

                    // Payment methods
                    document.getElementById('addPaymentMethodBtn')?.addEventListener('click', () => {
                        this.openPaymentMethodModal();
                    });

                    document.querySelectorAll('.edit-payment-method').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            this.openPaymentMethodModal(id);
                        });
                    });

                    document.querySelectorAll('.delete-payment-method').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            if (confirm('هل أنت متأكد من الحذف؟')) {
                                this.data.deletePaymentMethod(id);
                                this.toast.success('تم الحذف بنجاح');
                                this.openAdminPanel();
                            }
                        });
                    });
                }

                openEditBalanceModal(userId) {
                    const overlay = document.getElementById('editBalanceModalOverlay');
                    const content = document.getElementById('editBalanceModalContent');
                    const user = this.data.getUserData(parseInt(userId));
                    
                    content.innerHTML = `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">تعديل رصيد المستخدم ${userId}</h2>
                            <button id="closeEditBalanceModal" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                        <div class="space-y-3">
                            <div class="text-center">
                                <span class="text-gray-400">الرصيد الحالي:</span>
                                <span class="text-xl font-bold text-white">${user.balance}</span>
                            </div>
                            <div>
                                <select id="balanceOperation" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                                    <option value="add">إضافة</option>
                                    <option value="subtract">خصم</option>
                                    <option value="set">تعيين</option>
                                </select>
                            </div>
                            <div>
                                <input type="number" id="balanceAmount" placeholder="المبلغ" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                            </div>
                            <div>
                                <input type="text" id="balanceReason" placeholder="السبب (اختياري)" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                            </div>
                            <button id="applyBalanceChange" class="w-full btn-primary py-2 mt-2">تطبيق</button>
                        </div>
                    `;
                    
                    overlay.classList.add('open');
                    
                    document.getElementById('closeEditBalanceModal').addEventListener('click', () => {
                        overlay.classList.remove('open');
                    });
                    
                    document.getElementById('applyBalanceChange').addEventListener('click', () => {
                        const operation = document.getElementById('balanceOperation').value;
                        const amount = parseFloat(document.getElementById('balanceAmount').value);
                        const reason = document.getElementById('balanceReason').value || 'تعديل يدوي';
                        
                        if (isNaN(amount) || amount < 0) {
                            this.toast.error('أدخل مبلغ صحيح');
                            return;
                        }
                        
                        let delta = 0;
                        if (operation === 'add') delta = amount;
                        else if (operation === 'subtract') delta = -amount;
                        else delta = amount - user.balance;
                        
                        const result = this.data.updateBalance(parseInt(userId), delta, reason, 'admin');
                        if (result.success) {
                            this.toast.success(`✅ تم تعديل الرصيد بنجاح`);
                            overlay.classList.remove('open');
                            this.openAdminPanel();
                        }
                    });
                }

                openPaymentMethodModal(editingId = null) {
                    const overlay = document.getElementById('paymentMethodModalOverlay');
                    const content = document.getElementById('paymentMethodModalContent');
                    const method = editingId ? this.state.paymentMethods.find(m => m.id === editingId) : null;
                    
                    content.innerHTML = `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">${method ? 'تعديل طريقة دفع' : 'إضافة طريقة دفع'}</h2>
                            <button id="closePaymentMethodModal" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                        <form id="paymentMethodForm" class="space-y-3">
                            <input type="hidden" id="methodId" value="${method?.id || ''}">
                            
                            <div>
                                <label class="text-sm text-gray-400">صورة الطريقة</label>
                                <div class="image-upload-area" id="imageUploadArea">
                                    <input type="file" id="imageInput" accept="image/*" class="hidden">
                                    <div id="imagePreviewContainer" class="flex flex-col items-center">
                                        ${method && method.iconType === 'image' && method.icon ? 
                                            `<img src="${method.icon}" class="image-preview" id="imagePreview">` : 
                                            `<i class="fa-solid fa-cloud-upload-alt text-3xl text-gray-400 mb-2"></i>
                                             <p class="text-sm text-gray-400">انقر أو اسحب صورة</p>`
                                        }
                                    </div>
                                </div>
                                ${method && method.iconType === 'image' && method.icon ? 
                                    `<button type="button" id="deleteImageBtn" class="delete-image-btn mt-2"><i class="fa-solid fa-trash"></i></button>` : ''
                                }
                            </div>

                            <div>
                                <input type="text" id="methodName" placeholder="اسم الطريقة" value="${method?.name || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white" required>
                            </div>
                            <div>
                                <input type="text" id="methodIcon" placeholder="أيقونة FontAwesome" value="${method?.iconType !== 'image' ? (method?.icon || '') : ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                            </div>
                            <div>
                                <input type="text" id="methodDescription" placeholder="وصف مختصر" value="${method?.description || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                            </div>
                            <div>
                                <textarea id="methodDepositDetails" placeholder="تفاصيل الإيداع" rows="2" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">${method?.depositDetails || ''}</textarea>
                            </div>
                            <div>
                                                                <input type="text" id="methodWithdrawDetails" placeholder="تفاصيل السحب" value="${method?.withdrawDetails || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                            </div>
                            <div class="flex gap-2 pt-2">
                                <button type="submit" class="flex-1 btn-primary py-2">حفظ</button>
                                <button type="button" id="cancelPaymentMethod" class="flex-1 bg-gray-600 py-2 rounded-lg font-bold hover:bg-gray-700 transition-colors">إلغاء</button>
                            </div>
                        </form>
                    `;
                    
                    overlay.classList.add('open');
                    
                    // Image upload handling
                    const imageInput = document.getElementById('imageInput');
                    const imageUploadArea = document.getElementById('imageUploadArea');
                    const imagePreviewContainer = document.getElementById('imagePreviewContainer');
                    
                    imageUploadArea.addEventListener('click', () => imageInput.click());
                    
                    imageUploadArea.addEventListener('dragover', (e) => {
                        e.preventDefault();
                        imageUploadArea.style.borderColor = '#3b82f6';
                    });
                    
                    imageUploadArea.addEventListener('dragleave', () => {
                        imageUploadArea.style.borderColor = 'rgba(59, 130, 246, 0.5)';
                    });
                    
                    imageUploadArea.addEventListener('drop', (e) => {
                        e.preventDefault();
                        imageUploadArea.style.borderColor = 'rgba(59, 130, 246, 0.5)';
                        const file = e.dataTransfer.files[0];
                        if (file) handleImageFile(file);
                    });
                    
                    imageInput.addEventListener('change', (e) => {
                        const file = e.target.files[0];
                        if (file) handleImageFile(file);
                    });

                    const handleImageFile = (file) => {
                        const validation = Utils.validateImage(file);
                        if (!validation.valid) {
                            this.toast.error(validation.error);
                            return;
                        }

                        const reader = new FileReader();
                        reader.onload = (e) => {
                            const imageData = e.target.result;
                            imagePreviewContainer.innerHTML = `<img src="${imageData}" class="image-preview" id="imagePreview">`;
                            imageUploadArea.dataset.imageBase64 = imageData;
                            
                            if (!document.getElementById('deleteImageBtn')) {
                                const deleteBtn = document.createElement('button');
                                deleteBtn.type = 'button';
                                deleteBtn.id = 'deleteImageBtn';
                                deleteBtn.className = 'delete-image-btn mt-2';
                                deleteBtn.innerHTML = '<i class="fa-solid fa-trash"></i>';
                                deleteBtn.addEventListener('click', () => {
                                    delete imageUploadArea.dataset.imageBase64;
                                    imageInput.value = '';
                                    imagePreviewContainer.innerHTML = `
                                        <i class="fa-solid fa-cloud-upload-alt text-3xl text-gray-400 mb-2"></i>
                                        <p class="text-sm text-gray-400">انقر أو اسحب صورة</p>
                                    `;
                                    deleteBtn.remove();
                                });
                                imageUploadArea.parentNode.appendChild(deleteBtn);
                            }
                        };
                        reader.readAsDataURL(file);
                    };

                    const deleteImageBtn = document.getElementById('deleteImageBtn');
                    if (deleteImageBtn) {
                        deleteImageBtn.addEventListener('click', () => {
                            delete imageUploadArea.dataset.imageBase64;
                            imageInput.value = '';
                            imagePreviewContainer.innerHTML = `
                                <i class="fa-solid fa-cloud-upload-alt text-3xl text-gray-400 mb-2"></i>
                                <p class="text-sm text-gray-400">انقر أو اسحب صورة</p>
                            `;
                            deleteImageBtn.remove();
                        });
                    }

                    document.getElementById('closePaymentMethodModal').addEventListener('click', () => {
                        overlay.classList.remove('open');
                    });
                    
                    document.getElementById('cancelPaymentMethod').addEventListener('click', () => {
                        overlay.classList.remove('open');
                    });
                    
                    overlay.addEventListener('click', (e) => {
                        if (e.target === overlay) overlay.classList.remove('open');
                    });

                    document.getElementById('paymentMethodForm').addEventListener('submit', (e) => {
                        e.preventDefault();
                        
                        const imageBase64 = imageUploadArea.dataset.imageBase64;
                        const iconType = imageBase64 ? 'image' : 'fa';
                        const icon = imageBase64 ? imageBase64 : document.getElementById('methodIcon').value;
                        
                        const formData = {
                            name: document.getElementById('methodName').value,
                            icon: icon,
                            iconType: iconType,
                            description: document.getElementById('methodDescription').value,
                            depositDetails: document.getElementById('methodDepositDetails').value,
                            withdrawDetails: document.getElementById('methodWithdrawDetails').value
                        };
                        
                        const id = document.getElementById('methodId').value;
                        
                        if (id) {
                            this.data.updatePaymentMethod(id, formData);
                            this.toast.success('تم التحديث بنجاح');
                        } else {
                            this.data.addPaymentMethod(formData);
                            this.toast.success('تمت الإضافة بنجاح');
                        }
                        
                        overlay.classList.remove('open');
                        this.openAdminPanel();
                    });
                }

                openNotificationsModal() {
                    const modal = document.getElementById('walletModalOverlay');
                    const content = document.getElementById('walletModalContent');
                    content.innerHTML = this.renderNotificationsModal();
                    modal.classList.add('open');
                    this.bindNotificationsModalEvents();

                renderNotificationsModal() {
                    const userId = this.state.user.id;
                    const notifications = this.data.getUserNotifications(userId);
                    
                    const notificationsHtml = notifications.length ? 
                        notifications.map(n => `
                            <div class="transaction-item ${n.read ? 'opacity-60' : ''}" data-id="${n.id}">
                                <div class="flex-1">
                                    <div class="font-bold flex items-center gap-2">
                                        ${!n.read ? '<span class="w-2 h-2 bg-blue-500 rounded-full"></span>' : ''}
                                        ${n.title}
                                    </div>
                                    <div class="text-sm">${n.message}</div>
                                    <div class="text-xs text-gray-400 mt-1">${Utils.formatDateTime(n.date)}</div>
                                </div>
                                ${!n.read ? `
                                    <button class="mark-read text-blue-400 hover:text-blue-300 text-sm" data-id="${n.id}">
                                        <i class="fa-regular fa-circle-check"></i>
                                    </button>
                                ` : ''}
                            </div>

                        '<p class="text-center text-gray-400 py-8">لا توجد إشعارات</p>';
                    
                    return `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">الإشعارات</h2>
                            <button id="closeNotificationsModal" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                        <div class="flex justify-end mb-3">
                            <button id="markAllRead" class="btn-primary px-3 py-1 text-sm">
                                <i class="fa-regular fa-bell-slash ml-1"></i> تحديد الكل كمقروء
                            </button>
                        </div>
                        <div class="max-h-96 overflow-y-auto hide-scrollbar space-y-2">${notificationsHtml}</div>
                    `;
