<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>NEON APEX: Ultimate Gameplay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Tajawal:wght@400;700;900&display=swap');

        :root {
            --primary: #00f3ff;
            --secondary: #ff00ff;
            --accent: #ccff00;
            --danger: #ff004c;
            --bg: #050508;
            --shield: #00ff88;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Tajawal', sans-serif;
            color: #fff;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: -webkit-optimize-contrast;
        }

        /* UI Layer */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
            z-index: 10;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }

        .score-container {
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 15px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-right: 3px solid var(--primary);
            transform: skewX(-5deg);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 5px;
        }

        #score-val {
            font-size: 2.5rem;
            font-weight: 900;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
            font-variant-numeric: tabular-nums;
        }

        .level-badge {
            background: rgba(204, 255, 0, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 5px 15px;
            border-radius: 10px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 0 0 10px var(--accent);
            margin-bottom: 10px;
            display: inline-block;
            transform: skewX(-5deg);
        }

        .combo-container {
            text-align: left;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(20, 0, 20, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 10px 25px;
            border-radius: 15px;
            border: 1px solid rgba(255, 0, 85, 0.3);
            border-left: 3px solid var(--secondary);
        }

        .combo-container.active {
            opacity: 1;
            transform: scale(1.2);
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.3);
        }

        #combo-val {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--secondary);
            line-height: 1;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 20px var(--secondary);
        }

        #combo-label {
            font-size: 1rem;
            color: #fff;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .bars-wrapper {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            width: min(500px, 90%);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bar-track {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .bar-fill {
            height: 100%;
            width: 100%;
            position: relative;
            transition: width 0.1s linear;
        }

        .bar-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 1.5s infinite;
        }

        #health-fill {
            background: linear-gradient(90deg, #ff004c, #ff5e00);
            box-shadow: 0 0 15px #ff004c;
        }

        #focus-fill {
            background: linear-gradient(90deg, #00f3ff, #0066ff);
            box-shadow: 0 0 15px #00f3ff;
        }

        #shield-fill {
            background: linear-gradient(90deg, #00ff88, #00cc6a);
            box-shadow: 0 0 15px #00ff88;
            display: none;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Screens */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(10, 10, 20, 0.95) 0%, rgba(0, 0, 0, 0.98) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            z-index: 20;
            transition: opacity 0.5s ease, visibility 0.5s;
            padding: 20px;
        }

        .screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            margin: 0;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 50%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(0, 243, 255, 0.3));
            text-align: center;
            line-height: 1.1;
            font-weight: 900;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        h2 {
            color: var(--accent);
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin: 10px 0 30px 0;
            text-shadow: 0 0 20px var(--accent);
            text-transform: uppercase;
            letter-spacing: 5px;
            font-family: 'Orbitron', sans-serif;
        }

        p {
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            max-width: 600px;
            text-align: center;
            line-height: 1.8;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 500px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-val {
            font-size: 1.8rem;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            display: block;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: transparent;
            border: 2px solid var(--primary);
            padding: 18px 40px;
            color: var(--primary);
            font-size: 1.1rem;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 2px;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
            min-width: 200px;
            z-index: 30;
            transform: translateZ(0); 
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.3), transparent);
            transition: 0.5s;
        }

        button:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 40px var(--primary);
            transform: translateY(-3px);
        }

        button:hover::before {
            left: 100%;
        }

        button.secondary {
            border-color: var(--secondary);
            color: var(--secondary);
        }

        button.secondary:hover {
            background: var(--secondary);
            box-shadow: 0 0 40px var(--secondary);
        }

        .tutorial {
            position: absolute;
            bottom: max(150px, env(safe-area-inset-bottom));
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            animation: pulse 2s infinite;
            letter-spacing: 1px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        .flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 15;
            mix-blend-mode: overlay;
        }

        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 60%, black 100%);
            pointer-events: none;
            z-index: 5;
            opacity: 0.7;
        }
        
        .powerup-indicator {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }
        
        .powerup-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 0 15px currentColor;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        @keyframes popIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="vignette"></div>
    <div class="flash" id="flash"></div>

    <div id="ui-layer">
        <div class="hud-top">
            <div class="score-container">
                <div class="level-badge" id="level-display">مستوى 1</div>
                <div class="label">النقاط</div>
                <div id="score-val">0</div>
            </div>
            <div class="combo-container" id="combo-box">
                <div id="combo-val">x0</div>
                <div id="combo-label">كومبو</div>
            </div>
        </div>
        
        <div class="powerup-indicator" id="powerup-container"></div>
        
        <div class="tutorial" id="tutorial">حرك للتحكم | اضغط للتركيز (إبطاء الزمن)</div>

        <div class="bars-wrapper">
            <div class="bar-track">
                <div id="shield-fill" class="bar-fill"></div>
            </div>
            <div class="bar-track">
                <div id="health-fill" class="bar-fill"></div>
            </div>
            <div class="bar-track">
                <div id="focus-fill" class="bar-fill"></div>
            </div>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="screen">
        <h1>NEON APEX</h1>
        <h2>Ultimate Gameplay</h2>
        <p>نظام لعب متكامل: مستويات متصاعدة، أعداء أذكياء، وقوى خاصة. اجمع الطاقة، تجنب الأخطار، وكن الأسطورة.</p>
        <div class="btn-group">
            <button id="start-btn">ابدأ المهمة</button>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="screen hidden">
        <h1 style="background: linear-gradient(135deg, #fff 0%, #ff004c 100%); -webkit-background-clip: text;">نظام محطم</h1>
        <p>انتهت الجلسة. سجل إنجازك وتحدى نفسك مرة أخرى.</p>
        
        <div class="stats-grid">
            <div class="stat-box">
                <span class="stat-val" id="final-score" style="color: #fff">0</span>
                <span class="stat-label">النتيجة</span>
            </div>
            <div class="stat-box">
                <span class="stat-val" id="final-combo" style="color: var(--accent)">x0</span>
                <span class="stat-label">أعلى كومبو</span>
            </div>
            <div class="stat-box">
                <span class="stat-val" id="final-level" style="color: var(--primary)">1</span>
                <span class="stat-label">المستوى</span>
            </div>
        </div>

        <div class="btn-group">
            <button id="restart-btn">إعادة المحاولة</button>
            <button class="secondary" id="menu-btn">القائمة</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        /**
         * NEON APEX: ULTIMATE GAMEPLAY SYSTEM
         * Features: Levels, Smart Enemies, Power-ups, Advanced Particles
         */

        // === Core Configuration ===
        const CONFIG = {
            colors: {
                primary: '#00f3ff',
                secondary: '#ff00ff',
                accent: '#ccff00',
                danger: '#ff004c',
                gold: '#ffd700',
                white: '#ffffff',
                shield: '#00ff88'
            },
            audio: {
                masterVolume: 0.3,
                sfxVolume: 0.4
            },
            levels: [
                { threshold: 0, enemyRate: 100, spawnRate: 50, types: ['chaser'] },
                { threshold: 1000, enemyRate: 80, spawnRate: 45, types: ['chaser', 'shooter'] },
                { threshold: 3000, enemyRate: 60, spawnRate: 40, types: ['chaser', 'shooter', 'bomber'] },
                { threshold: 6000, enemyRate: 45, spawnRate: 35, types: ['chaser', 'shooter', 'bomber', 'fast'] },
                { threshold: 10000, enemyRate: 30, spawnRate: 30, types: ['chaser', 'shooter', 'bomber', 'fast', 'tank'] }
            ]
        };

        // === State Management ===
        const state = {
            current: 'MENU',
            score: 0,
            highScore: parseInt(localStorage.getItem('neonApex_highScore')) || 0,
            combo: 0,
            maxCombo: 0,
            comboTimer: 0,
            health: 100,
            maxHealth: 100,
            focus: 100,
            maxFocus: 100,
            shield: 0,
            maxShield: 100,
            difficulty: 1,
            level: 1,
            xp: 0,
            nextLevelXp: 1000,
            timeScale: 1.0,
            targetTimeScale: 1.0,
            shake: 0,
            frames: 0,
            lastTime: 0,
            isRunning: false,
            animationId: null,
            powerups: []
        };

        // === DOM Elements ===
        const ui = {
            canvas: document.getElementById('gameCanvas'),
            ctx: null,
            score: document.getElementById('score-val'),
            comboBox: document.getElementById('combo-box'),
            combo: document.getElementById('combo-val'),
            health: document.getElementById('health-fill'),
            focus: document.getElementById('focus-fill'),
            shield: document.getElementById('shield-fill'),
            level: document.getElementById('level-display'),
            startScreen: document.getElementById('start-screen'),
            gameOverScreen: document.getElementById('game-over-screen'),
            finalScore: document.getElementById('final-score'),
            finalCombo: document.getElementById('final-combo'),
            finalLevel: document.getElementById('final-level'),
            tutorial: document.getElementById('tutorial'),
            flash: document.getElementById('flash'),
            powerupContainer: document.getElementById('powerup-container')
        };

        // === Input System ===
        const input = {
            x: 0,
            y: 0,
            isDown: false
        };

        function initInput() {
            const updatePos = (x, y) => {
                input.x = x;
                input.y = y;
                if (state.current === 'PLAYING') {
                    ui.tutorial.style.opacity = '0';
                }
            };

            window.addEventListener('mousemove', e => updatePos(e.clientX, e.clientY));
            window.addEventListener('mousedown', () => input.isDown = true);
            window.addEventListener('mouseup', () => input.isDown = false);

            window.addEventListener('touchstart', e => {
                input.isDown = true;
                updatePos(e.touches[0].clientX, e.touches[0].clientY);
                e.preventDefault();
            }, { passive: false });

            window.addEventListener('touchmove', e => {
                updatePos(e.touches[0].clientX, e.touches[0].clientY);
                e.preventDefault();
            }, { passive: false });

            window.addEventListener('touchend', () => input.isDown = false);
            
            window.addEventListener('keydown', e => {
                if (e.code === 'Space') input.isDown = true;
            });
            window.addEventListener('keyup', e => {
                if (e.code === 'Space') input.isDown = false;
            });

            updatePos(window.innerWidth / 2, window.innerHeight / 2);
        }

        // === Audio System ===
        const audio = {
            ctx: null,
            masterGain: null,
            bgmOscillators: [],
            initialized: false,
            enabled: true
        };

        function initAudio() {
            if (!audio.enabled) return;
            if (audio.initialized) return;
            
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) {
                    audio.enabled = false;
                    return;
                }
                
                audio.ctx = new AudioContext();
                audio.masterGain = audio.ctx.createGain();
                audio.masterGain.gain.value = CONFIG.audio.masterVolume;
                audio.masterGain.connect(audio.ctx.destination);
                audio.initialized = true;
                
                if (audio.ctx.state === 'suspended') {
                    audio.ctx.resume().catch(() => {});
                }
            } catch (e) {
                audio.enabled = false;
            }
        }

        function playSound(type, pitchMod = 0, pan = 0) {
            if (!audio.enabled || !audio.initialized || !audio.ctx) return;
            
            try {
                if (audio.ctx.state === 'suspended') audio.ctx.resume().catch(() => {});

                const osc = audio.ctx.createOscillator();
                const gain = audio.ctx.createGain();
                const panner = audio.ctx.createStereoPanner();
                
                osc.connect(panner);
                panner.connect(gain);
                gain.connect(audio.masterGain);

                const now = audio.ctx.currentTime;
                panner.pan.value = Math.max(-1, Math.min(1, pan));

                if (type === 'collect') {
                    osc.type = 'sine';
                    const freq = 600 + (state.combo * 10) + (pitchMod * 100);
                    osc.frequency.setValueAtTime(freq, now);
                    osc.frequency.exponentialRampToValueAtTime(freq * 1.5, now + 0.1);
                    gain.gain.setValueAtTime(CONFIG.audio.sfxVolume, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.start(now);
                    osc.stop(now + 0.15);
                } else if (type === 'hit') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(10, now + 0.4);
                    gain.gain.setValueAtTime(CONFIG.audio.sfxVolume * 1.5, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now);
                    osc.stop(now + 0.4);
                } else if (type === 'powerup') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.linearRampToValueAtTime(1200, now + 0.3);
                    gain.gain.setValueAtTime(CONFIG.audio.sfxVolume, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                } else if (type === 'levelup') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(440, now);
                    osc.frequency.setValueAtTime(554, now + 0.1);
                    osc.frequency.setValueAtTime(659, now + 0.2);
                    gain.gain.setValueAtTime(CONFIG.audio.sfxVolume, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.6);
                    osc.start(now);
                    osc.stop(now + 0.6);
                } else if (type === 'shoot') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(800, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
                    gain.gain.setValueAtTime(CONFIG.audio.sfxVolume * 0.5, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now);
                    osc.stop(now + 0.2);
                }
            } catch (e) {}
        }

        function startBGM() {
            if (!audio.enabled || !audio.initialized || !audio.ctx || audio.bgmOscillators.length > 0) return;
            try {
                if (audio.ctx.state === 'suspended') audio.ctx.resume().catch(() => {});
                const freqs = [110, 164.81, 196, 220];
                freqs.forEach((f, i) => {
                    const osc = audio.ctx.createOscillator();
                    const gain = audio.ctx.createGain();
                    osc.type = i % 2 === 0 ? 'sine' : 'triangle';
                    osc.frequency.value = f;
                    gain.gain.value = 0.03;
                    osc.connect(gain);
                    gain.connect(audio.masterGain);
                    osc.start();
                    audio.bgmOscillators.push({ osc, gain });
                });
            } catch (e) {
                audio.enabled = false;
            }
        }

        function stopBGM() {
            audio.bgmOscillators.forEach(o => {
                try { o.osc.stop(); } catch(e){}
                try { o.osc.disconnect(); } catch(e){}
            });
            audio.bgmOscillators = [];
        }

        // === Graphics ===
        let width, height, pixelRatio;

        function resize() {
            pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
            width = window.innerWidth;
            height = window.innerHeight;
            ui.canvas.width = width * pixelRatio;
            ui.canvas.height = height * pixelRatio;
            ui.canvas.style.width = `${width}px`;
            ui.canvas.style.height = `${height}px`;
            if (ui.ctx) {
                ui.ctx.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);
            }
        }

        // === Entities ===
        class Player {
            constructor() {
                this.x = width / 2;
                this.y = height / 2;
                this.radius = 15;
                this.trail = [];
                this.maxTrail = 30;
                this.velocity = { x: 0, y: 0 };
                this.invincible = false;
                this.invincibleTimer = 0;
            }

            update(dt) {
                const dx = input.x - this.x;
                const dy = input.y - this.y;
                
                this.velocity.x += dx * 0.008 * state.timeScale;
                this.velocity.y += dy * 0.008 * state.timeScale;
                this.velocity.x *= 0.85;
                this.velocity.y *= 0.85;
                
                this.x += this.velocity.x;
                this.y += this.velocity.y;

                // Boundaries
                this.x = Math.max(this.radius, Math.min(width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(height - this.radius, this.y));

                if (input.isDown && state.focus > 0) {
                    state.targetTimeScale = 0.2;
                    state.focus = Math.max(0, state.focus - 0.8 * dt);
                } else {
                    state.targetTimeScale = 1.0;
                    state.focus = Math.min(100, state.focus + 0.4 * dt);
                }
                
                state.timeScale += (state.targetTimeScale - state.timeScale) * 0.1;

                // Invincibility
                if (this.invincible) {
                    this.invincibleTimer -= dt;
                    if (this.invincibleTimer <= 0) this.invincible = false;
                }

                this.trail.push({ x: this.x, y: this.y, age: 0 });
                if (this.trail.length > this.maxTrail) this.trail.shift();
                this.trail.forEach(t => t.age++);
            }

            draw(ctx) {
                if (this.invincible && Math.floor(state.frames * 0.5) % 2 === 0) return;

                ctx.globalCompositeOperation = 'lighter';
                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const alpha = (i / this.trail.length) * 0.8 * state.timeScale;
                    const size = this.radius * (i / this.trail.length);
                    const color = state.shield > 0 ? CONFIG.colors.shield : CONFIG.colors.primary;
                    ctx.fillStyle = color.replace(')', `, ${alpha})`).replace('rgb', 'rgba');
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalCompositeOperation = 'source-over';

                ctx.shadowBlur = 30;
                ctx.shadowColor = state.shield > 0 ? CONFIG.colors.shield : CONFIG.colors.primary;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.moveTo(this.x + 20, this.y);
                ctx.quadraticCurveTo(this.x - 10, this.y + 15, this.x - 15, this.y);
                ctx.quadraticCurveTo(this.x - 10, this.y - 15, this.x + 20, this.y);
                ctx.fill();
                
                // Shield visual
                if (state.shield > 0) {
                    ctx.strokeStyle = CONFIG.colors.shield;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius + 10, 0, Math.PI * 2);
                    ctx.stroke();
                }
                
                ctx.shadowBlur = 0;
            }
        }

        class Orb {
            constructor() {
                this.reset();
                this.y = -50;
            }

            reset() {
                this.radius = 8 + Math.random() * 6;
                this.x = Math.random() * width;
                this.y = -50;
                this.baseSpeed = 4 + Math.random() * 5;
                this.type = Math.random();
                this.angle = Math.random() * Math.PI * 2;
                this.spin = (Math.random() - 0.5) * 0.3;
                this.markedForDeletion = false;
                this.oscillation = Math.random() * Math.PI * 2;
                
                // Power-up chance
                if (Math.random() < 0.02) {
                    this.kind = 'POWERUP';
                    const types = ['SHIELD', 'HEALTH', 'MAGNET', 'SCORE'];
                    this.powerType = types[Math.floor(Math.random() * types.length)];
                    this.color = '#fff';
                    this.score = 0;
                    this.glow = '#fff';
                    this.radius = 12;
                } else if (this.type > 0.97) {
                    this.kind = 'LEGENDARY';
                    this.color = CONFIG.colors.white;
                    this.score = 500;
                    this.glow = CONFIG.colors.white;
                } else if (this.type > 0.90) {
                    this.kind = 'GOLD';
                    this.color = CONFIG.colors.gold;
                    this.score = 100;
                    this.glow = CONFIG.colors.gold;
                } else if (this.type > 0.75) {
                    this.kind = 'BLUE';
                    this.color = '#0088ff';
                    this.score = 30;
                    this.glow = '#0088ff';
                } else {
                    this.kind = 'NORMAL';
                    this.color = CONFIG.colors.secondary;
                    this.score = 10;
                    this.glow = CONFIG.colors.secondary;
                }
            }

            update(player, dt) {
                const speed = this.baseSpeed * state.timeScale;
                this.y += speed * dt;
                this.angle += this.spin * state.timeScale * dt;
                this.oscillation += 0.1 * state.timeScale * dt;
                this.x += Math.sin(this.oscillation) * 2 * state.timeScale * dt;

                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const dist = Math.hypot(dx, dy);

                // Magnet effect
                const magnetRange = state.powerups.includes('MAGNET') ? 400 : 250;
                if (dist < magnetRange) {
                    const force = (magnetRange - dist) / magnetRange;
                    const magnetStrength = input.isDown ? 0.25 : 0.15;
                    this.x += dx * force * magnetStrength * state.timeScale * dt;
                    this.y += dy * force * magnetStrength * state.timeScale * dt;
                }

                if (this.y > height + 50) this.markedForDeletion = true;

                if (dist < player.radius + this.radius) {
                    this.collect(player);
                }
            }

            collect(player) {
                this.markedForDeletion = true;
                
                if (this.kind === 'POWERUP') {
                    activatePowerUp(this.powerType);
                    return;
                }

                state.combo++;
                if (state.combo > state.maxCombo) state.maxCombo = state.combo;
                state.comboTimer = 150;
                
                const multiplier = 1 + Math.floor(state.combo / 10);
                const points = this.score * multiplier;
                state.score += points;
                state.xp += points;
                
                checkLevelUp();
                createParticles(this.x, this.y, this.color, 20);
                playSound('collect', this.kind === 'LEGENDARY' ? 2 : 0, (this.x - width/2) / width);
                
                if (state.combo % 20 === 0) {
                    playSound('powerup');
                    screenShake(15);
                }
                updateUI();
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.glow;
                ctx.fillStyle = this.color;
                
                ctx.beginPath();
                if (this.kind === 'POWERUP') {
                    ctx.font = '20px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = '#fff';
                    let symbol = '?';
                    if (this.powerType === 'SHIELD') symbol = '🛡️';
                    if (this.powerType === 'HEALTH') symbol = '❤️';
                    if (this.powerType === 'MAGNET') symbol = '🧲';
                    if (this.powerType === 'SCORE') symbol = '⭐';
                    ctx.fillText(symbol, 0, 0);
                } else if (this.kind === 'LEGENDARY') {
                    for (let i = 0; i < 8; i++) {
                        const r = (i % 2 === 0) ? this.radius : this.radius/2;
                        const a = (i / 8) * Math.PI * 2;
                        ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
                    }
                } else if (this.kind === 'GOLD') {
                    for (let i = 0; i < 5; i++) {
                        ctx.lineTo(Math.cos((18 + i * 72) * Math.PI / 180) * this.radius, 
                                   Math.sin((18 + i * 72) * Math.PI / 180) * this.radius);
                        ctx.lineTo(Math.cos((54 + i * 72) * Math.PI / 180) * (this.radius/2), 
                                   Math.sin((54 + i * 72) * Math.PI / 180) * (this.radius/2));
                    }
                } else {
                    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                }
                ctx.fill();
                
                if (this.kind !== 'POWERUP') {
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.beginPath();
                    ctx.arc(-this.radius*0.3, -this.radius*0.3, this.radius*0.3, 0, Math.PI*2);
                    ctx.fill();
                }
                
                ctx.restore();
            }
        }

        class Enemy {
            constructor(type) {
                this.type = type;
                this.radius = 18;
                this.markedForDeletion = false;
                this.angle = 0;
                this.timer = 0;
                
                // Spawn logic
                const side = Math.floor(Math.random() * 4);
                if (side === 0) { this.x = Math.random() * width; this.y = -50; }
                else if (side === 1) { this.x = width + 50; this.y = Math.random() * height; }
                else if (side === 2) { this.x = Math.random() * width; this.y = height + 50; }
                else { this.x = -50; this.y = Math.random() * height; }

                // Stats based on type
                switch(type) {
                    case 'chaser':
                        this.speed = 2.5;
                        this.color = CONFIG.colors.danger;
                        this.health = 1;
                        break;
                    case 'shooter':
                        this.speed = 1.5;
                        this.color = '#ff8800';
                        this.health = 2;
                        this.shootInterval = 120;
                        break;
                    case 'bomber':
                        this.speed = 2.0;
                        this.color = '#aa00ff';
                        this.health = 3;
                        this.explosionRadius = 150;
                        break;
                    case 'fast':
                        this.speed = 4.5;
                        this.color = '#ffff00';
                        this.health = 1;
                        this.radius = 12;
                        break;
                    case 'tank':
                        this.speed = 1.0;
                        this.color = '#888888';
                        this.health = 10;
                        this.radius = 25;
                        break;
                }
                this.baseSpeed = this.speed;
            }

            update(player, dt) {
                const speed = this.baseSpeed * state.timeScale * dt;
                this.timer += dt;
                
                let targetX = player.x;
                let targetY = player.y;

                // AI Behaviors
                if (this.type === 'shooter') {
                    // Keep distance
                    const dist = Math.hypot(player.x - this.x, player.y - this.y);
                    if (dist < 300) {
                        targetX = this.x - (player.x - this.x);
                        targetY = this.y - (player.y - this.y);
                    }
                    
                    // Shoot
                    if (this.timer > this.shootInterval / state.timeScale) {
                        this.shoot(player);
                        this.timer = 0;
                    }
                } else if (this.type === 'bomber') {
                    const dist = Math.hypot(player.x - this.x, player.y - this.y);
                    if (dist < this.explosionRadius) {
                        this.explode();
                        return;
                    }
                }

                const dx = targetX - this.x;
                const dy = targetY - this.y;
                const dist = Math.hypot(dx, dy);
                
                if (dist > 0) {
                    this.x += (dx / dist) * speed;
                    this.y += (dy / dist) * speed;
                }
                this.angle += 0.1 * state.timeScale * dt;

                if (dist < player.radius + this.radius) {
                    this.hitPlayer();
                }
            }
            
            shoot(player) {
                playSound('shoot', 0, (this.x - width/2)/width);
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const dist = Math.hypot(dx, dy);
                projectiles.push(new Projectile(this.x, this.y, (dx/dist)*8, (dy/dist)*8));
            }
            
            explode() {
                this.markedForDeletion = true;
                createParticles(this.x, this.y, this.color, 40, 'explosion');
                screenShake(20);
                playSound('hit');
                
                // Damage player if close
                const dist = Math.hypot(player.x - this.x, player.y - this.y);
                if (dist < this.explosionRadius) {
                    takeDamage(30);
                }
                
                // Destroy nearby orbs
                orbs.forEach(orb => {
                    const d = Math.hypot(orb.x - this.x, orb.y - this.y);
                    if (d < this.explosionRadius) orb.markedForDeletion = true;
                });
            }

            hitPlayer() {
                if (this.type === 'bomber') {
                    this.explode();
                } else {
                    this.markedForDeletion = true;
                    takeDamage(20);
                    createParticles(this.x, this.y, CONFIG.colors.danger, 30);
                    playSound('hit', 0, (this.x - width/2) / width);
                    screenShake(25);
                    
                    ui.flash.style.opacity = '0.4';
                    setTimeout(() => ui.flash.style.opacity = '0', 150);
                }
            }
            
            takeDamage(amount) {
                this.health -= amount;
                if (this.health <= 0) {
                    this.markedForDeletion = true;
                    createParticles(this.x, this.y, this.color, 20);
                    state.score += 50;
                    updateUI();
                } else {
                    screenShake(5);
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                ctx.shadowBlur = 25;
                ctx.shadowColor = this.color;
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 3;
                
                ctx.beginPath();
                if (this.type === 'tank') {
                    ctx.rect(-this.radius, -this.radius, this.radius*2, this.radius*2);
                } else if (this.type === 'fast') {
                    ctx.moveTo(0, -this.radius);
                    ctx.lineTo(this.radius, 0);
                    ctx.lineTo(0, this.radius);
                    ctx.lineTo(-this.radius, 0);
                } else {
                    ctx.moveTo(0, -this.radius);
                    ctx.lineTo(this.radius, 0);
                    ctx.lineTo(0, this.radius);
                    ctx.lineTo(-this.radius, 0);
                }
                ctx.closePath();
                ctx.stroke();
                
                ctx.fillStyle = this.color.replace(')', ', 0.2)').replace('rgb', 'rgba').replace('#', 'rgba(');
                // Simple hex to rgba conversion for fill
                ctx.fillStyle = this.color + '33'; 
                ctx.fill();
                
                // Health bar for tank
                if (this.type === 'tank' && this.health < 10) {
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(-15, -30, 30 * (this.health/10), 4);
                }
                
                ctx.restore();
            }
        }
        
        class Projectile {
            constructor(x, y, vx, vy) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.radius = 6;
                this.markedForDeletion = false;
                this.color = '#ff8800';
            }
            
            update(dt) {
                this.x += this.vx * state.timeScale * dt;
                this.y += this.vy * state.timeScale * dt;
                
                if (this.x < -50 || this.x > width+50 || this.y < -50 || this.y > height+50) {
                    this.markedForDeletion = true;
                }
                
                const dist = Math.hypot(player.x - this.x, player.y - this.y);
                if (dist < player.radius + this.radius) {
                    this.hitPlayer();
                }
            }
            
            hitPlayer() {
                this.markedForDeletion = true;
                takeDamage(15);
                createParticles(this.x, this.y, this.color, 10);
                playSound('hit');
            }
            
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color, type = 'normal') {
                this.x = x;
                this.y = y;
                this.color = color;
                this.type = type;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 10 + 3;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0;
                this.decay = Math.random() * 0.03 + 0.01;
                this.size = Math.random() * 5 + 2;
                this.gravity = 0.2;
                this.drag = 0.94;
                
                if (type === 'explosion') {
                    this.vx *= 2;
                    this.vy *= 2;
                    this.decay *= 0.5;
                }
            }

            update(dt) {
                this.x += this.vx * state.timeScale * dt;
                this.y += this.vy * state.timeScale * dt;
                this.vy += this.gravity * state.timeScale * dt;
                this.vx *= this.drag;
                this.vy *= this.drag;
                this.life -= this.decay * state.timeScale * dt;
            }

            draw(ctx) {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        class Background {
            constructor() {
                this.gridSize = 60;
                this.offsetY = 0;
                this.stars = [];
                for(let i=0; i<150; i++) {
                    this.stars.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        size: Math.random() * 2.5,
                        alpha: Math.random(),
                        twinkleSpeed: Math.random() * 0.05 + 0.01
                    });
                }
            }

            update(dt) {
                this.offsetY += 3 * state.timeScale * dt;
                if (this.offsetY > this.gridSize) this.offsetY = 0;
                
                this.stars.forEach(star => {
                    star.alpha += Math.sin(state.frames * star.twinkleSpeed) * 0.01;
                    if (star.alpha < 0.2) star.alpha = 0.2;
                    if (star.alpha > 0.8) star.alpha = 0.8;
                });
            }

            draw(ctx) {
                const gradient = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width);
                gradient.addColorStop(0, '#0a0a1a');
                gradient.addColorStop(1, '#000000');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, width, height);

                ctx.fillStyle = '#fff';
                this.stars.forEach(star => {
                    ctx.globalAlpha = star.alpha * 0.6;
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI*2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;

                ctx.strokeStyle = 'rgba(0, 243, 255, 0.15)';
                ctx.lineWidth = 1;
                
                const centerX = width / 2;
                for (let i = -20; i <= 20; i++) {
                    const x = centerX + (i * 60);
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(centerX + (i * 12), height);
                    ctx.stroke();
                }

                for (let y = this.offsetY; y < height; y += this.gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(width, y);
                    ctx.stroke();
                }
            }
        }

        // === Game Logic Functions ===
        let player;
        let orbs = [];
        let enemies = [];
        let particles = [];
        let projectiles = [];
        let bg;

        function initGame() {
            player = new Player();
            bg = new Background();
            orbs = [];
            enemies = [];
            particles = [];
            projectiles = [];
            state.powerups = [];
            
            state.score = 0;
            state.combo = 0;
            state.maxCombo = 0;
            state.health = 100;
            state.focus = 100;
            state.shield = 0;
            state.difficulty = 1;
            state.level = 1;
            state.xp = 0;
            state.nextLevelXp = 1000;
            state.timeScale = 1.0;
            state.targetTimeScale = 1.0;
            state.shake = 0;
            state.frames = 0;
            state.isRunning = true;
            
            updateLevelConfig();
            updateUI();
        }

        function updateLevelConfig() {
            const currentLevelConfig = CONFIG.levels.slice().reverse().find(l => state.score >= l.threshold) || CONFIG.levels[0];
            state.level = CONFIG.levels.indexOf(currentLevelConfig) + 1;
            // Apply config
        }

        function checkLevelUp() {
            const prevLevel = state.level;
            updateLevelConfig();
            
            if (state.level > prevLevel) {
                state.xp = 0; // Reset XP for visual simplicity in this version
                state.health = Math.min(state.health + 30, state.maxHealth);
                state.focus = state.maxFocus;
                playSound('levelup');
                screenShake(30);
                
                // Flash level up text
                ui.level.style.transform = 'translateX(-50%) scale(1.5)';
                ui.level.style.color = '#fff';
                setTimeout(() => {
                    ui.level.style.transform = 'translateX(-50%) scale(1)';
                    ui.level.style.color = '';
                }, 500);
            }
        }

        function activatePowerUp(type) {
            playSound('powerup');
            createParticles(player.x, player.y, '#fff', 30);
            screenShake(10);
            
            // Add to active powerups
            if (!state.powerups.includes(type)) {
                state.powerups.push(type);
                showPowerUpIcon(type);
            }
            
            // Immediate effects
            if (type === 'HEALTH') {
                state.health = Math.min(state.health + 50, state.maxHealth);
            } else if (type === 'SHIELD') {
                state.shield = 100;
            } else if (type === 'SCORE') {
                state.score += 500;
            }
            
            // Timed effects handled in update loop
            setTimeout(() => {
                state.powerups = state.powerups.filter(p => p !== type);
                updateUI();
                renderPowerUpIcons();
            }, 10000); // 10 seconds duration
            
            updateUI();
        }
        
        function showPowerUpIcon(type) {
            const icon = document.createElement('div');
            icon.className = 'powerup-icon';
            icon.style.color = '#fff';
            icon.style.borderColor = '#fff';
            
            if (type === 'SHIELD') { icon.innerText = '🛡️'; icon.style.backgroundColor = CONFIG.colors.shield; }
            if (type === 'HEALTH') { icon.innerText = '❤️'; icon.style.backgroundColor = '#ff004c'; }
            if (type === 'MAGNET') { icon.innerText = '🧲'; icon.style.backgroundColor = '#0088ff'; }
            if (type === 'SCORE') { icon.innerText = '⭐'; icon.style.backgroundColor = '#ffd700'; }
            
            ui.powerupContainer.appendChild(icon);
        }
        
        function renderPowerUpIcons() {
            ui.powerupContainer.innerHTML = '';
            state.powerups.forEach(type => showPowerUpIcon(type));
        }

        function startGame() {
            initAudio();
            initGame();
            state.current = 'PLAYING';
            ui.startScreen.classList.add('hidden');
            ui.gameOverScreen.classList.add('hidden');
            ui.tutorial.style.opacity = '1';
            
            startBGM();
            
            state.lastTime = performance.now();
            if (state.animationId) cancelAnimationFrame(state.animationId);
            loop(state.lastTime);
        }

        function gameOver() {
            state.current = 'GAMEOVER';
            state.isRunning = false;
            if (state.score > state.highScore) {
                state.highScore = state.score;
                localStorage.setItem('neonApex_highScore', state.highScore);
            }
            ui.finalScore.innerText = state.score.toLocaleString();
            ui.finalCombo.innerText = 'x' + state.maxCombo;
            ui.finalLevel.innerText = state.level;
            ui.gameOverScreen.classList.remove('hidden');
            stopBGM();
        }

        function createParticles(x, y, color, count, type) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color, type));
            }
        }

        function screenShake(amount) {
            state.shake = amount;
        }

        function takeDamage(amount) {
            if (player.invincible) return;
            
            if (state.shield > 0) {
                state.shield -= amount;
                if (state.shield < 0) {
                    state.health += state.shield; // Carry over damage
                    state.shield = 0;
                }
                player.invincible = true;
                player.invincibleTimer = 60; // 1 second invincibility
            } else {
                state.health -= amount;
                player.invincible = true;
                player.invincibleTimer = 60;
            }
            
            if (state.health <= 0) {
                state.health = 0;
                gameOver();
            }
            updateUI();
        }

        function updateUI() {
            ui.score.innerText = state.score.toLocaleString();
            ui.combo.innerText = 'x' + state.combo;
            ui.health.style.width = `${state.health}%`;
            ui.focus.style.width = `${state.focus}%`;
            ui.level.innerText = `مستوى ${state.level}`;
            
            if (state.shield > 0) {
                ui.shield.style.display = 'block';
                ui.shield.style.width = `${state.shield}%`;
            } else {
                ui.shield.style.display = 'none';
            }
            
            if (state.combo > 0) {
                ui.comboBox.classList.add('active');
                if (state.combo > 100) ui.combo.style.color = CONFIG.colors.white;
                else if (state.combo > 50) ui.combo.style.color = CONFIG.colors.gold;
                else if (state.combo > 20) ui.combo.style.color = CONFIG.colors.primary;
                else ui.combo.style.color = CONFIG.colors.secondary;
            } else {
                ui.comboBox.classList.remove('active');
            }
        }

        function loop(timestamp) {
            if (!state.isRunning) return;
            
            const dt = Math.min((timestamp - state.lastTime) / 16.67, 2);
            state.lastTime = timestamp;
            state.frames++;

            const ctx = ui.ctx;
            if (!ctx) return;
            
            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            if (state.shake > 0) {
                const dx = (Math.random() - 0.5) * state.shake;
                const dy = (Math.random() - 0.5) * state.shake;
                ctx.translate(dx, dy);
                state.shake *= 0.9;
                if (state.shake < 0.5) state.shake = 0;
            }

            bg.update(dt);
            bg.draw(ctx);

            if (state.combo > 0) {
                state.comboTimer -= dt;
                if (state.comboTimer <= 0) {
                    state.combo = 0;
                    updateUI();
                }
            }

            // Spawning
            const currentConfig = CONFIG.levels.slice().reverse().find(l => state.score >= l.threshold) || CONFIG.levels[0];
            
            if (state.frames % currentConfig.spawnRate === 0) orbs.push(new Orb());
            
            if (state.frames % currentConfig.enemyRate === 0) {
                const type = currentConfig.types[Math.floor(Math.random() * currentConfig.types.length)];
                enemies.push(new Enemy(type));
            }

            const subSteps = 2;
            const subDt = dt / subSteps;
            
            for (let s = 0; s < subSteps; s++) {
                player.update(subDt);
                orbs.forEach(orb => orb.update(player, subDt));
                enemies.forEach(enemy => enemy.update(player, subDt));
                projectiles.forEach(proj => proj.update(subDt));
                particles.forEach(p => p.update(subDt));
            }

            orbs = orbs.filter(o => !o.markedForDeletion);
            enemies = enemies.filter(e => !e.markedForDeletion);
            projectiles = projectiles.filter(p => !p.markedForDeletion);
            particles = particles.filter(p => p.life > 0);

            player.draw(ctx);
            
            ctx.globalCompositeOperation = 'lighter';
            orbs.forEach(orb => orb.draw(ctx));
            projectiles.forEach(proj => proj.draw(ctx));
            ctx.globalCompositeOperation = 'source-over';
            
            enemies.forEach(enemy => enemy.draw(ctx));
            particles.forEach(p => p.draw(ctx));

            ctx.restore();
            
            if (state.isRunning) {
                state.animationId = requestAnimationFrame(loop);
            }
        }

        function menuLoop(timestamp) {
            if (state.current !== 'MENU') return;
            const ctx = ui.ctx;
            if (!ctx) return;
            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, width, height);
            if (!bg) bg = new Background();
            bg.update(1);
            bg.draw(ctx);
            requestAnimationFrame(menuLoop);
        }

        // === Initialization ===
        function init() {
            try {
                ui.ctx = ui.canvas.getContext('2d', { alpha: false, desynchronized: true });
                if (!ui.ctx) throw new Error("Canvas not supported");
                
                initInput();
                resize();
                window.addEventListener('resize', resize);
                
                document.getElementById('start-btn').addEventListener('click', startGame);
                document.getElementById('restart-btn').addEventListener('click', startGame);
                document.getElementById('menu-btn').addEventListener('click', () => {
                    state.current = 'MENU';
                    ui.gameOverScreen.classList.add('hidden');
                    ui.startScreen.classList.remove('hidden');
                    menuLoop(performance.now());
                });

                menuLoop(performance.now());
            } catch (e) {
                console.error("Critical Init Error:", e);
                alert("حدث خطأ في تهيئة اللعبة. يرجى تحديث الصفحة.");
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
