<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-88">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ Russian Roulette Elite | روليت روسي احترافي</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts - Cairo & Orbitron -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Orbitron:wght@400;600;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(145deg, #0a0c14 0%, #1a1f2e 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية متحركة سينمائية */
        .cinematic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            animation: floatOrb 15s infinite alternate;
        }

        .orb-1 {
            top: -20%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #ff3b3b, #8b0000);
        }

        .orb-2 {
            bottom: -20%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #3b82f6, #1e3a8a);
            animation-delay: -5s;
        }

        .orb-3 {
            top: 40%;
            left: 30%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #a855f7, #581c87);
            animation-delay: -10s;
            opacity: 0.2;
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 100px) scale(1.2); }
        }

        /* تأثير الضباب */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 40%, rgba(0,0,0,0.7) 100%);
            z-index: -1;
            pointer-events: none;
        }

        /* الحاوية الرئيسية */
        .app-container {
            width: 100%;
            max-width: 420px;
            padding: 16px;
            position: relative;
            z-index: 10;
        }

        /* بطاقات زجاجية فاخرة */
        .premium-card {
            background: rgba(20, 25, 40, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(255, 255, 255, 0.02) inset;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .premium-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px -10px rgba(0, 0, 0, 0.6);
        }

        /* تصميم السلاح الفاخر */
        .gun-premium {
            width: 100%;
            height: 140px;
            background: linear-gradient(180deg, #2d3748 0%, #1a202c 100%);
            border-radius: 80px 80px 40px 40px;
            position: relative;
            margin: 40px 0 60px;
            box-shadow: 0 20px 30px -5px rgba(0, 0, 0, 0.8),
                        0 0 0 2px rgba(255, 215, 0, 0.3) inset,
                        0 0 20px rgba(255, 215, 0, 0.2);
            transform: perspective(500px) rotateX(5deg);
        }

        .gun-barrel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 30px;
            background: linear-gradient(90deg, #4a5568, #718096, #4a5568);
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        /* الغرف الدوارة */
        .chambers-container {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 20;
        }

        .chamber-premium {
            width: 50px;
            height: 50px;
            background: linear-gradient(145deg, #2d3748, #1a202c);
            border-radius: 50%;
            border: 3px solid #ffd700;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5),
                        0 0 20px rgba(255, 215, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            position: relative;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .chamber-premium.loaded {
            border-color: #ff4444;
            box-shadow: 0 0 30px #ff4444;
            animation: pulseRed 1.5s infinite;
        }

        .chamber-premium.current {
            transform: scale(1.2);
            border-color: #00ff88;
            box-shadow: 0 0 30px #00ff88;
            z-index: 30;
        }

        .chamber-premium.shot {
            background: #330000;
            border-color: #660000;
            transform: scale(0.9);
            opacity: 0.5;
        }

        @keyframes pulseRed {
            0%, 100% { box-shadow: 0 0 30px #ff4444; }
            50% { box-shadow: 0 0 60px #ff4444; }
        }

        /* اللاعبين */
        .player-card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 24px;
            padding: 16px;
            transition: all 0.3s ease;
        }

        .player-card.current-turn {
            border-color: #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            transform: scale(1.02);
        }

        .player-card.winner {
            border-color: #00ff88;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.4);
        }

        .player-card.loser {
            border-color: #ff4444;
            opacity: 0.6;
            filter: grayscale(0.5);
        }

        .player-avatar-premium {
            width: 70px;
            height: 70px;
            border-radius: 35px;
            background: linear-gradient(135deg, #ffd700, #ff8800);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            border: 3px solid #fff;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        /* مؤشر الرصاص */
        .bullet-track {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
        }

        .bullet-cell {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 215, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .bullet-cell.live {
            background: #ff4444;
            border-color: #ff0000;
            box-shadow: 0 0 20px #ff4444;
        }

        .bullet-cell.spent {
            background: #330000;
            opacity: 0.3;
        }

        .bullet-cell.current {
            border-color: #00ff88;
            transform: scale(1.2);
        }

        /* زر الزناد */
        .trigger-btn {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 60px;
            background: linear-gradient(145deg, #ff4444, #cc0000);
            color: white;
            font-size: 24px;
            font-weight: 900;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease;
            box-shadow: 0 20px 30px -5px rgba(255, 0, 0, 0.5),
                        0 0 0 2px rgba(255, 255, 255, 0.3) inset;
        }

        .trigger-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 30px 40px -5px rgba(255, 0, 0, 0.7);
        }

        .trigger-btn:active {
            transform: scale(0.95);
        }

        .trigger-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.3), transparent 70%);
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* شريط الرهان */
        .bet-slider-premium {
            width: 100%;
            height: 10px;
            background: linear-gradient(90deg, #00ff88, #ffd700, #ff4444);
            border-radius: 10px;
            -webkit-appearance: none;
        }

        .bet-slider-premium::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 30px;
            height: 30px;
            background: #ffd700;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 20px #ffd700;
            cursor: pointer;
        }

        /* أيقونة المحفظة */
        .wallet-icon-3d {
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, #ffd700, #ff8800);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #1a1a1a;
            box-shadow: 0 20px 30px rgba(255, 215, 0, 0.4),
                        0 0 0 3px rgba(255,255,255,0.2) inset;
            animation: float 3s infinite ease-in-out;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .wallet-icon-3d:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 30px 40px rgba(255, 215, 0, 0.6);
        }

        /* إشعارات */
        .toast-premium {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 25, 40, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 60px;
            padding: 16px 24px;
            color: white;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            z-index: 10000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translate(-50%, 20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        /* تحديات نشطة */
        .challenge-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4444;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid white;
            animation: pulseBadge 1.5s infinite;
        }

        @keyframes pulseBadge {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* النوافذ المنبثقة */
        .modal-premium {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-premium.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content-premium {
            width: 90%;
            max-width: 400px;
            background: linear-gradient(145deg, #1a1f2e, #0a0c14);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 40px;
            padding: 24px;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal-premium.open .modal-content-premium {
            transform: scale(1);
        }

        /* شارة المستخدم */
        .user-tag {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* أزرار */
        .btn-premium {
            padding: 14px 24px;
            border-radius: 40px;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-size: 16px;
        }

        .btn-gold {
            background: linear-gradient(145deg, #ffd700, #ff8800);
            color: #1a1a1a;
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.3);
        }

        .btn-gold:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 30px rgba(255, 215, 0, 0.4);
        }

        .btn-red {
            background: linear-gradient(145deg, #ff4444, #cc0000);
            color: white;
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.3);
        }

        .btn-red:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 30px rgba(255, 0, 0, 0.4);
        }
    </style>
</head>
<body>
    <!-- خلفية سينمائية -->
    <div class="cinematic-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>
    <div class="vignette"></div>

    <!-- الحاوية الرئيسية -->
    <div class="app-container" id="app"></div>

    <!-- قالب اللعبة -->
    <template id="game-template">
        <div class="premium-card p-6 mb-4">
            <!-- رأس اللعبة -->
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black" style="font-family: 'Orbitron';">🔫 ROULETTE</h2>
                <div class="user-tag">
                    <i class="fa-regular fa-user"></i>
                    <span id="playerName">Player</span>
                </div>
            </div>

            <!-- السلاح الفاخر -->
            <div class="gun-premium" id="gunModel">
                <div class="gun-barrel"></div>
                <div class="chambers-container" id="chambers"></div>
            </div>

            <!-- اللاعبين -->
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="player-card" id="player1Card">
                    <div class="flex flex-col items-center">
                        <div class="player-avatar-premium mb-2" id="player1Avatar">P1</div>
                        <div class="font-bold" id="player1Name">اللاعب 1</div>
                        <div class="text-sm text-yellow-400" id="player1Status"></div>
                    </div>
                </div>
                <div class="player-card" id="player2Card">
                    <div class="flex flex-col items-center">
                        <div class="player-avatar-premium mb-2" id="player2Avatar">P2</div>
                        <div class="font-bold" id="player2Name">في انتظار...</div>
                        <div class="text-sm text-yellow-400" id="player2Status"></div>
                    </div>
                </div>
            </div>

            <!-- مؤشر الرصاص -->
            <div class="bullet-track" id="bulletTrack"></div>

            <!-- معلومات الرهان -->
            <div class="flex justify-between items-center mb-4">
                <div class="text-sm text-gray-400">💰 الرهان</div>
                <div class="text-2xl font-bold text-yellow-400" id="betAmount">1000</div>
            </div>

            <!-- شريط الرهان (لإنشاء التحدي) -->
            <div class="mb-6" id="betSliderContainer">
                <input type="range" class="bet-slider-premium" id="betSlider" min="100" max="10000" step="100" value="1000">
                <div class="flex justify-between text-xs text-gray-400 mt-2">
                    <span>100</span>
                    <span>5000</span>
                    <span>10000</span>
                </div>
            </div>

            <!-- أزرار التحكم -->
            <div class="space-y-3">
                <button class="trigger-btn" id="triggerBtn">
                    <i class="fa-solid fa-gun ml-2"></i>
                    اسحب الزناد
                </button>
                
                <div class="grid grid-cols-2 gap-3">
                    <button class="btn-premium btn-gold" id="createChallengeBtn">
                        <i class="fa-solid fa-plus"></i> تحدٍ جديد
                    </button>
                    <button class="btn-premium btn-gold" id="joinChallengeBtn">
                        <i class="fa-solid fa-users"></i> انضمام
                    </button>
                </div>

                <button class="btn-premium btn-red w-full" id="cancelGameBtn">
                    <i class="fa-solid fa-xmark"></i> إلغاء
                </button>
            </div>
        </div>
    </template>

    <script>
        (function() {
            // ==================== الإعدادات الثابتة ====================
            const CONFIG = {
                ADMIN_ID: 7609492965,
                DEFAULT_BALANCE: 5000,
                STORAGE_KEY: 'roulette_elite_data'
            };

            // ==================== نظام التخزين المحلي ====================
            class StorageManager {
                static getUserData(userId) {
                    const key = `${CONFIG.STORAGE_KEY}_${userId}`;
                    const data = localStorage.getItem(key);
                    return data ? JSON.parse(data) : {
                        balance: CONFIG.DEFAULT_BALANCE,
                        gamesPlayed: 0,
                        gamesWon: 0,
                        totalEarned: 0,
                        transactions: []
                    };
                }

                static saveUserData(userId, data) {
                    const key = `${CONFIG.STORAGE_KEY}_${userId}`;
                    localStorage.setItem(key, JSON.stringify(data));
                }

                static updateBalance(userId, amount, type, note) {
                    const data = this.getUserData(userId);
                    data.balance += amount;
                    data.transactions.unshift({
                        type,
                        amount,
                        note,
                        date: new Date().toISOString(),
                        balance: data.balance
                    });
                    
                    if (data.transactions.length > 50) data.transactions.pop();
                    this.saveUserData(userId, data);
                    return data;
                }

                static getAllChallenges() {
                    const challenges = localStorage.getItem('roulette_challenges');
                    return challenges ? JSON.parse(challenges) : [];
                }

                static saveChallenges(challenges) {
                    localStorage.setItem('roulette_challenges', JSON.stringify(challenges));
                }
            }

            // ==================== نظام الإشعارات ====================
            class ToastSystem {
                constructor() {
                    this.container = document.createElement('div');
                    this.container.style.cssText = `
                        position: fixed;
                        bottom: 20px;
                        left: 50%;
                        transform: translateX(-50%);
                        z-index: 10000;
                        display: flex;
                        flex-direction: column;
                        gap: 10px;
                        width: 90%;
                        max-width: 350px;
                        pointer-events: none;
                    `;
                    document.body.appendChild(this.container);
                }

                show(message, type = 'info', duration = 4000) {
                    const toast = document.createElement('div');
                    toast.className = 'toast-premium';
                    
                    const icons = {
                        success: 'fa-circle-check',
                        error: 'fa-circle-exclamation',
                        warning: 'fa-triangle-exclamation',
                        info: 'fa-circle-info'
                    };

                    const colors = {
                        success: '#00ff88',
                        error: '#ff4444',
                        warning: '#ffd700',
                        info: '#3b82f6'
                    };

                    toast.innerHTML = `
                        <i class="fa-solid ${icons[type]}" style="color: ${colors[type]};"></i>
                        <span>${message}</span>
                    `;

                    this.container.appendChild(toast);

                    setTimeout(() => {
                        toast.style.animation = 'slideUp 0.3s ease reverse';
                        setTimeout(() => toast.remove(), 300);
                    }, duration);

                    // اهتزاز للموبايل
                    if (navigator.vibrate) navigator.vibrate(100);
                }

                success(msg) { this.show(msg, 'success'); }
                error(msg) { this.show(msg, 'error'); }
                warning(msg) { this.show(msg, 'warning'); }
                info(msg) { this.show(msg, 'info'); }
            }

            // ==================== فئة اللعبة الرئيسية ====================
            class RussianRouletteElite {
                constructor() {
                    this.toast = new ToastSystem();
                    this.tg = window.Telegram?.WebApp;
                    this.user = null;
                    this.userData = null;
                    this.currentChallenge = null;
                    this.challenges = [];
                    
                    this.init();
                }

                init() {
                    // التحقق من بيئة تيليجرام
                    if (!this.tg) {
                        this.renderError('يجب فتح التطبيق من داخل تيليجرام');
                        return;
                    }

                    this.tg.expand();
                    this.tg.ready();
                    
                    this.user = this.tg.initDataUnsafe?.user;
                    
                    if (!this.user) {
                        this.renderError('لم يتم التحقق من هويتك');
                        return;
                    }

                    // تحميل بيانات المستخدم
                    this.userData = StorageManager.getUserData(this.user.id);
                    this.challenges = StorageManager.getAllChallenges();
                    
                    // التحقق من وجود تحدي نشط للمستخدم
                    this.currentChallenge = this.challenges.find(c => 
                        (c.player1.id === this.user.id || c.player2?.id === this.user.id) && 
                        c.status !== 'finished'
                    );

                    this.render();
                }

                render() {
                    const app = document.getElementById('app');
                    const template = document.getElementById('game-template').content.cloneNode(true);
                    
                    // تعبئة بيانات المستخدم
                    template.getElementById('playerName').textContent = this.user.first_name;
                    
                    // عرض الرصيد
                    const balanceEl = document.createElement('div');
                    balanceEl.className = 'wallet-icon-3d mx-auto my-4';
                    balanceEl.innerHTML = '<i class="fa-solid fa-wallet"></i>';
                    balanceEl.onclick = () => this.showWallet();
                    
                    // عرض الرصيد
                    const balanceText = document.createElement('div');
                    balanceText.className = 'text-center text-yellow-400 font-bold text-xl mb-4';
                    balanceText.innerHTML = `${this.userData.balance.toLocaleString()} <span class="text-sm text-gray-400">نقاط</span>`;
                    
                    app.innerHTML = '';
                    app.appendChild(balanceEl);
                    app.appendChild(balanceText);
                    app.appendChild(template);

                    // تجهيز اللعبة
                    this.setupGame();
                }

                setupGame() {
                    // تحديث واجهة اللعبة حسب حالة التحدي
                    if (this.currentChallenge) {
                        this.updateGameUI(this.currentChallenge);
                    } else {
                        this.showLobby();
                    }

                    // ربط الأزرار
                    document.getElementById('triggerBtn').onclick = () => this.pullTrigger();
                    document.getElementById('createChallengeBtn').onclick = () => this.createChallenge();
                    document.getElementById('joinChallengeBtn').onclick = () => this.showChallenges();
                    document.getElementById('cancelGameBtn').onclick = () => this.cancelGame();

                    // شريط الرهان
                    const slider = document.getElementById('betSlider');
                    slider.oninput = (e) => {
                        document.getElementById('betAmount').textContent = e.target.value;
                    };
                }

                createChallenge() {
                    const betAmount = parseInt(document.getElementById('betSlider').value);
                    
                    if (betAmount > this.userData.balance) {
                        this.toast.error('الرصيد غير كافٍ');
                        return;
                    }

                    if (this.currentChallenge) {
                        this.toast.warning('لديك تحدي نشط بالفعل');
                        return;
                    }

                    const challenge = {
                        id: Date.now().toString(),
                        player1: {
                            id: this.user.id,
                            name: this.user.first_name,
                            avatar: this.user.first_name.charAt(0)
                        },
                        player2: null,
                        betAmount,
                        status: 'waiting',
                        createdAt: new Date().toISOString(),
                        gameState: {
                            chambers: 6,
                            bulletPosition: Math.floor(Math.random() * 6),
                            currentChamber: 0,
                            turn: this.user.id,
                            results: []
                        }
                    };

                    // خصم الرهان
                    this.userData = StorageManager.updateBalance(
                        this.user.id, 
                        -betAmount, 
                        'challenge_created',
                        `إنشاء تحدي بمبلغ ${betAmount}`
                    );

                    this.challenges.push(challenge);
                    StorageManager.saveChallenges(this.challenges);
                    
                    this.currentChallenge = challenge;
                    this.updateGameUI(challenge);
                    this.toast.success('تم إنشاء التحدي بنجاح! في انتظار المنافس');
                }

                joinChallenge(challengeId) {
                    const challenge = this.challenges.find(c => c.id === challengeId);
                    
                    if (!challenge || challenge.player2) {
                        this.toast.error('هذا التحدي غير متاح');
                        return;
                    }

                    if (challenge.betAmount > this.userData.balance) {
                        this.toast.error('الرصيد غير كافٍ للانضمام');
                        return;
                    }

                    if (challenge.player1.id === this.user.id) {
                        this.toast.warning('لا يمكنك الانضمام إلى تحديك الخاص');
                        return;
                    }

                    // خصم الرهان
                    this.userData = StorageManager.updateBalance(
                        this.user.id,
                        -challenge.betAmount,
                        'challenge_joined',
                        `انضمام إلى تحدي بمبلغ ${challenge.betAmount}`
                    );

                    challenge.player2 = {
                        id: this.user.id,
                        name: this.user.first_name,
                        avatar: this.user.first_name.charAt(0)
                    };
                    
                    challenge.status = 'active';
                    
                    // اختيار من يبدأ عشوائياً
                    challenge.gameState.turn = Math.random() < 0.5 ? 
                        challenge.player1.id : challenge.player2.id;

                    this.challenges = this.challenges.map(c => 
                        c.id === challenge.id ? challenge : c
                    );
                    
                    StorageManager.saveChallenges(this.challenges);
                    
                    this.currentChallenge = challenge;
                    this.updateGameUI(challenge);
                    
                    this.toast.success('تم الانضمام إلى التحدي! حظاً موفقاً');
                }

                pullTrigger() {
                    if (!this.currentChallenge) {
                        this.toast.warning('لا يوجد تحدي نشط');
                        return;
                    }

                    const challenge = this.currentChallenge;
                    
                    if (challenge.status !== 'active') {
                        this.toast.warning('اللعبة غير نشطة');
                        return;
                    }

                    if (challenge.gameState.turn !== this.user.id) {
                        this.toast.warning('ليس دورك الآن');
                        return;
                    }

                    if (!challenge.player2) {
                        this.toast.warning('في انتظار المنافس');
                        return;
                    }

                    const state = challenge.gameState;
                    const currentChamber = state.currentChamber;
                    const isShot = currentChamber === state.bulletPosition;

                    // تسجيل النتيجة
                    state.results.push({
                        playerId: this.user.id,
                        chamber: currentChamber,
                        isShot,
                        timestamp: new Date().toISOString()
                    });

                    // تحديث واجهة الغرف
                    this.animateChamber(currentChamber, isShot);

                    if (isShot) {
                        // اللاعب خسر
                        const loser = this.user;
                        const winner = challenge.player1.id === this.user.id ? 
                            challenge.player2 : challenge.player1;

                        // تحويل الرهان إلى الفائز
                        const totalPrize = challenge.betAmount * 2;
                        
                        StorageManager.updateBalance(
                            winner.id,
                            totalPrize,
                            'game_win',
                            `فوز في الروليت ضد ${loser.name}`
                        );

                        // تحديث إحصائيات
                        const winnerData = StorageManager.getUserData(winner.id);
                        winnerData.gamesWon++;
                        winnerData.totalEarned += totalPrize;
                        StorageManager.saveUserData(winner.id, winnerData);

                        const loserData = StorageManager.getUserData(loser.id);
                        loserData.gamesPlayed++;
                        StorageManager.saveUserData(loser.id, loserData);

                        challenge.status = 'finished';
                        challenge.winner = winner.id;

                        this.toast.error(`💥 انفجرت الرصاصة! ${loser.name} خسر التحدي`);
                        this.toast.success(`🏆 ${winner.name} فاز بمبلغ ${totalPrize}`);

                        // تحديث الرصيد للمستخدم الحالي
                        if (this.user.id === winner.id) {
                            this.userData.balance += totalPrize;
                        }

                        // إنهاء اللعبة
                        setTimeout(() => {
                            this.currentChallenge = null;
                            this.challenges = this.challenges.filter(c => c.id !== challenge.id);
                            StorageManager.saveChallenges(this.challenges);
                            this.render();
                        }, 3000);
                    } else {
                        // طلقة فارغة
                        state.currentChamber++;
                        
                        // تبديل الدور
                        state.turn = challenge.player1.id === this.user.id ? 
                            challenge.player2.id : challenge.player1.id;

                        this.toast.info('💨 طلقة فارغة...');

                        // تحديث واجهة اللعبة
                        this.updateGameUI(challenge);
                        
                        // حفظ التغييرات
                        this.challenges = this.challenges.map(c => 
                            c.id === challenge.id ? challenge : c
                        );
                        StorageManager.saveChallenges(this.challenges);
                    }
                }

                animateChamber(chamberIndex, isShot) {
                    const chambers = document.querySelectorAll('.chamber-premium');
                    if (chambers[chamberIndex]) {
                        chambers[chamberIndex].classList.add(isShot ? 'shot' : 'current');
                        
                        if (isShot) {
                            chambers[chamberIndex].innerHTML = '💥';
                            
                            // تأثير الاهتزاز
                            document.querySelector('.gun-premium').style.animation = 'shake 0.5s ease';
                            setTimeout(() => {
                                document.querySelector('.gun-premium').style.animation = '';
                            }, 500);
                        }
                    }
                }

                updateGameUI(challenge) {
                    const player1Card = document.getElementById('player1Card');
                    const player2Card = document.getElementById('player2Card');
                    
                    // تحديث معلومات اللاعب 1
                    document.getElementById('player1Name').textContent = challenge.player1.name;
                    document.getElementById('player1Avatar').textContent = challenge.player1.avatar;
                    
                    // تحديث معلومات اللاعب 2
                    if (challenge.player2) {
                        document.getElementById('player2Name').textContent = challenge.player2.name;
                        document.getElementById('player2Avatar').textContent = challenge.player2.avatar;
                    }

                    // تحديث حالة الأدوار
                    player1Card.classList.remove('current-turn', 'winner', 'loser');
                    player2Card.classList.remove('current-turn', 'winner', 'loser');

                    if (challenge.status === 'active') {
                        if (challenge.gameState.turn === challenge.player1.id) {
                            player1Card.classList.add('current-turn');
                            document.getElementById('player1Status').textContent = '🔫 دورك';
                        } else {
                            player2Card.classList.add('current-turn');
                            document.getElementById('player2Status').textContent = '🔫 دورك';
                        }
                    } else if (challenge.status === 'finished') {
                        if (challenge.winner === challenge.player1.id) {
                            player1Card.classList.add('winner');
                            player2Card.classList.add('loser');
                        } else {
                            player2Card.classList.add('winner');
                            player1Card.classList.add('loser');
                        }
                    }

                    // تحديث الغرف
                    this.updateChambers(challenge);
                    
                    // تحديث مؤشر الرصاص
                    this.updateBulletTrack(challenge);
                    
                    // تحديث مبلغ الرهان
                    document.getElementById('betAmount').textContent = challenge.betAmount;
                    
                    // إخفاء شريط الرهان في اللعبة النشطة
                    if (challenge.player2) {
                        document.getElementById('betSliderContainer').style.display = 'none';
                    }
                }

                updateChambers(challenge) {
                    const chambersContainer = document.getElementById('chambers');
                    const state = challenge.gameState;
                    
                    let html = '';
                    for (let i = 0; i < state.chambers; i++) {
                        const isLoaded = i === state.bulletPosition;
                        const isCurrent = i === state.currentChamber && challenge.status === 'active';
                        const isShot = state.results.some(r => r.chamber === i && r.isShot);
                        
                        html += `
                            <div class="chamber-premium ${isLoaded ? 'loaded' : ''} ${isCurrent ? 'current' : ''} ${isShot ? 'shot' : ''}">
                                ${isShot ? '💥' : (isLoaded && i < state.currentChamber ? '💀' : '')}
                            </div>
                        `;
                    }
                    chambersContainer.innerHTML = html;
                }

                updateBulletTrack(challenge) {
                    const track = document.getElementById('bulletTrack');
                    const state = challenge.gameState;
                    
                    let html = '';
                    for (let i = 0; i < state.chambers; i++) {
                        const isLive = i === state.bulletPosition;
                        const isSpent = i < state.currentChamber;
                        const isCurrent = i === state.currentChamber;
                        
                        html += `
                            <div class="bullet-cell ${isLive ? 'live' : ''} ${isSpent ? 'spent' : ''} ${isCurrent ? 'current' : ''}">
                                ${i + 1}
                            </div>
                        `;
                    }
                    track.innerHTML = html;
                }

                showLobby() {
                    document.getElementById('betSliderContainer').style.display = 'block';
                    document.getElementById('triggerBtn').disabled = true;
                    document.getElementById('triggerBtn').style.opacity = '0.5';
                }

                showChallenges() {
                    const availableChallenges = this.challenges.filter(c => 
                        c.status === 'waiting' && 
                        c.player1.id !== this.user.id
                    );

                    if (availableChallenges.length === 0) {
                        this.toast.info('لا توجد تحديات متاحة حالياً');
                        return;
                    }

                    // عرض قائمة التحديات
                    const modal = document.createElement('div');
                    modal.className = 'modal-premium open';
                    
                    let challengesList = '';
                    availableChallenges.forEach(c => {
                        challengesList += `
                            <div class="premium-card p-4 mb-3 cursor-pointer hover:border-yellow-400 transition-all"
                                 onclick="app.joinChallenge('${c.id}')">
                                <div class="flex justify-between items-center">
                                    <div>
                                        <div class="font-bold">${c.player1.name}</div>
                                        <div class="text-sm text-gray-400">رهان: ${c.betAmount}</div>
                                    </div>
                                    <button class="btn-premium btn-gold text-sm py-2">انضمام</button>
                                </div>
                            </div>
                        `;
                    });

                    modal.innerHTML = `
                        <div class="modal-content-premium">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="text-xl font-bold">التحديات المتاحة</h3>
                                <button class="w-8 h-8 rounded-full bg-white/10" onclick="this.closest('.modal-premium').remove()">
                                    <i class="fa-solid fa-times"></i>
                                </button>
                            </div>
                            <div class="max-h-96 overflow-y-auto">
                                ${challengesList}
                            </div>
                        </div>
                    `;

                    document.body.appendChild(modal);
                }

                cancelGame() {
                    if (!this.currentChallenge) return;

                    const challenge = this.currentChallenge;
                    
                    if (challenge.player2) {
                        this.toast.warning('لا يمكن إلغاء التحدي بعد بدئه');
                        return;
                    }

                    // استرجاع الرصيد
                    if (challenge.player1.id === this.user.id) {
                        this.userData = StorageManager.updateBalance(
                            this.user.id,
                            challenge.betAmount,
                            'challenge_cancelled',
                            'إلغاء التحدي'
                        );
                    }

                    this.challenges = this.challenges.filter(c => c.id !== challenge.id);
                    StorageManager.saveChallenges(this.challenges);
                    
                    this.currentChallenge = null;
                    this.render();
                    
                    this.toast.info('تم إلغاء التحدي');
                }

                showWallet() {
                    const modal = document.createElement('div');
                    modal.className = 'modal-premium open';
                    
                    const transactions = this.userData.transactions.slice(0, 10);
                    
                    modal.innerHTML = `
                        <div class="modal-content-premium">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="text-xl font-bold">محفظتي</h3>
                                <button class="w-8 h-8 rounded-full bg-white/10" onclick="this.closest('.modal-premium').remove()">
                                    <i class="fa-solid fa-times"></i>
                                </button>
                            </div>
                            
                            <div class="text-center mb-6">
                                <div class="text-3xl font-bold text-yellow-400">${this.userData.balance.toLocaleString()}</div>
                                <div class="text-sm text-gray-400">الرصيد الحالي</div>
                            </div>

                            <div class="mb-4">
                                <div class="text-sm font-bold mb-2">آخر المعاملات</div>
                                <div class="space-y-2 max-h-60 overflow-y-auto">
                                    ${transactions.map(t => `
                                        <div class="flex justify-between items-center p-2 bg-black/20 rounded-lg">
                                            <div>
                                                <div class="text-sm">${t.note}</div>
                                                <div class="text-xs text-gray-400">${new Date(t.date).toLocaleString('ar-EG')}</div>
                                            </div>
                                            <div class="${t.amount > 0 ? 'text-green-400' : 'text-red-400'} font-bold">
                                                ${t.amount > 0 ? '+' : ''}${t.amount}
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-3">
                                <div class="text-center p-3 bg-blue-600/20 rounded-lg">
                                    <div class="text-xl font-bold">${this.userData.gamesPlayed || 0}</div>
                                    <div class="text-xs">عدد الألعاب</div>
                                </div>
                                <div class="text-center p-3 bg-green-600/20 rounded-lg">
                                    <div class="text-xl font-bold">${this.userData.gamesWon || 0}</div>
                                    <div class="text-xs">مرات الفوز</div>
                                </div>
                            </div>
                        </div>
                    `;

                    document.body.appendChild(modal);
                }

                renderError(message) {
                    document.getElementById('app').innerHTML = `
                        <div class="premium-card p-8 text-center">
                            <i class="fa-solid fa-circle-exclamation text-6xl text-red-500 mb-4"></i>
                            <h2 class="text-2xl font-bold mb-2">خطأ</h2>
                            <p class="text-gray-400">${message}</p>
                        </div>
                    `;
                }
            }

            // ==================== تشغيل التطبيق ====================
            window.app = new RussianRouletteElite();

            // إضافة تأثير الاهتزاز
            const style = document.createElement('style');
            style.textContent = `
                @keyframes shake {
                    0%, 100% { transform: perspective(500px) rotateX(5deg) translateX(0); }
                    25% { transform: perspective(500px) rotateX(5deg) translateX(-10px); }
                    75% { transform: perspective(500px) rotateX(5deg) translateX(10px); }
                }
            `;
            document.head.appendChild(style);
        })();
    </script>
</body>
</html>
