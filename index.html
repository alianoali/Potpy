<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>البوابة المطلقة | The Ultimate Gateway</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                        amiri: ['Amiri', 'serif'],
                    },
                    colors: {
                        void: '#000000',
                        deep: '#050505',
                        gold: {
                            100: '#FDFBF7',
                            300: '#F4E4BC',
                            400: '#D4AF37',
                            500: '#C5A028',
                            600: '#AA8820',
                            glow: '#FFD700',
                        }
                    },
                    animation: {
                        'breathe': 'breathe 4s ease-in-out infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'shimmer': 'shimmer 2s linear infinite',
                        'pop': 'pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'slide-up-fade': 'slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'spin-slow': 'spin 12s linear infinite',
                    },
                    keyframes: {
                        breathe: {
                            '0%, 100%': { opacity: '0.4', transform: 'scale(1)' },
                            '50%': { opacity: '0.7', transform: 'scale(1.1)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-15px)' },
                        },
                        shimmer: {
                            '0%': { backgroundPosition: '-200% center' },
                            '100%': { backgroundPosition: '200% center' }
                        },
                        pop: {
                            '0%': { transform: 'scale(0.9)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' }
                        },
                        slideUpFade: {
                            '0%': { opacity: '0', transform: 'translateY(30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    },
                    backgroundImage: {
                        'liquid-gold': 'linear-gradient(135deg, #BF953F 0%, #FCF6BA 25%, #B38728 50%, #FBF5B7 75%, #AA771C 100%)',
                        'dark-void': 'radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000000 100%)',
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --gold-glow: 0 0 30px rgba(212, 175, 55, 0.3);
            --intense-glow: 0 0 50px rgba(212, 175, 55, 0.6);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #000000;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
            touch-action: manipulation;
        }

        /* Hypnotic Gold Text */
        .text-hypno-gold {
            background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200% auto;
            animation: shimmer 3s linear infinite;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4));
            font-weight: 900;
        }

        /* Addictive Card Design */
        .addict-card {
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            border-radius: 1.5rem;
        }

        .addict-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: 0.5s;
            pointer-events: none;
        }

        .addict-card:hover::before {
            left: 100%;
        }

        .addict-card:active {
            transform: scale(0.96);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.6);
        }

        .addict-card:hover {
            border-color: rgba(212, 175, 55, 0.4);
            box-shadow: var(--gold-glow);
            transform: translateY(-5px);
        }

        /* Dynamic Background */
        .dynamic-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: #000;
            overflow: hidden;
        }
        
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.2;
            animation: float 10s infinite ease-in-out;
            background: radial-gradient(circle, #D4AF37, transparent 70%);
        }
        .orb-1 { top: -10%; right: -10%; width: 60vw; height: 60vw; animation-delay: 0s; }
        .orb-2 { bottom: -10%; left: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, #8A6D18, transparent 70%); animation-delay: -5s; }
        .orb-3 { top: 40%; left: 50%; transform: translateX(-50%); width: 40vw; height: 40vw; opacity: 0.1; animation-delay: -10s; }

        /* Loader */
        .loader-ring {
            width: 80px;
            height: 80px;
            border: 2px solid rgba(212, 175, 55, 0.1);
            border-top: 3px solid #D4AF37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        /* Toast */
        .toast {
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid rgba(212, 175, 55, 0.4);
            backdrop-filter: blur(16px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 0 20px rgba(212, 175, 55, 0.2);
            border-right: 4px solid #D4AF37;
            animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 12px;
            min-width: 280px;
        }

        .hidden-view { display: none !important; }
        
        /* Button Glow Effect */
        .glow-btn {
            position: relative;
            overflow: hidden;
        }
        .glow-btn::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);
            opacity: 0;
            transform: scale(0.5);
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
        }
        .glow-btn:active::after {
            opacity: 1;
            transform: scale(1);
            transition: 0s;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col items-center justify-start p-4 sm:p-6 relative selection:bg-yellow-900 selection:text-white">

                </button>

                <!-- Action Item 4 (Locked) -->
                <button disabled class="w-full p-4 rounded-2xl flex items-center justify-between opacity-40 cursor-not-allowed border border-dashed border-gray-800 bg-transparent grayscale">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-xl bg-gray-900/50 text-gray-600 flex items-center justify-center border border-gray-800">
                            <i class="fa-solid fa-lock"></i>
                        </div>
                        <span class="text-gray-500 text-sm font-medium">الميزات الأسطورية (قريباً)</span>
                    </div>
                </button>
            </div>
        </div>

        <!-- Footer / Logout -->
        <button onclick="confirmLogout()" class="w-full py-4 rounded-2xl font-bold text-red-400/80 hover:text-red-400 hover:bg-red-900/10 transition-all duration-300 border border-transparent hover:border-red-900/30 flex items-center justify-center gap-3 group mt-6 backdrop-blur-sm touch-feedback">
            <i class="fa-solid fa-arrow-right-from-bracket group-hover:-translate-x-1 transition-transform"></i>
            إنهاء الجلسة
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        // State Management
        const views = {
            loading: document.getElementById('loadingView'),
            denied: document.getElementById('accessDeniedView'),
            dashboard: document.getElementById('dashboardView')
        };

        // Elements
        const els = {
            userName: document.getElementById('userName'),
            headerName: document.getElementById('headerUserName'),
            userId: document.getElementById('userId'),
            photo: document.getElementById('userPhoto'),
            defaultAvatar: document.getElementById('defaultAvatar'),
            initials: document.getElementById('avatarInitials'),
            balance: document.getElementById('userBalance'),
            date: document.getElementById('currentDate'),
        };

        // Initialize
        function init() {
            tg.expand();
            tg.ready();
            
            const now = new Date();
            els.date.textContent = now.toLocaleDateString('ar-EG', { weekday: 'long', day: 'numeric', month: 'long' });

            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                onAuthSuccess(tg.initDataUnsafe.user);
            } else {
                tg.onEvent('ready', () => {
                    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                        onAuthSuccess(tg.initDataUnsafe.user);
                    } else {
                        setTimeout(() => {
                            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                                onAuthSuccess(tg.initDataUnsafe.user);
                            } else {
                                onAuthFailed();
                            }
                        }, 500);
                    }
                });
                setTimeout(() => {
                    if (!views.dashboard.classList.contains('hidden-view') && !views.denied.classList.contains('hidden-view')) {
                        if (!(tg.initDataUnsafe && tg.initDataUnsafe.user)) {
                            onAuthFailed();
                        }
                    }
                }, 4000);
            }
        }

        function onAuthSuccess(user) {
            loadUserData(user);
            switchView('dashboard');
            setupMainButton();
            try { tg.setHeaderColor('#000000'); } catch(e){}
        }

        function onAuthFailed() {
            switchView('denied');
            try { tg.setHeaderColor('#000000'); } catch(e){}
        }

        function switchView(viewName) {
            Object.values(views).forEach(el => el.classList.add('hidden-view'));
            views[viewName].classList.remove('hidden-view');
            
            if(viewName === 'loading') {
                views.loading.classList.remove('hidden-view');
                views.loading.style.opacity = '1';
            } else {
                views.loading.style.opacity = '0';
                setTimeout(() => views.loading.classList.add('hidden-view'), 1000);
            }
        }

        function loadUserData(user) {
            const fullName = `${user.first_name} ${user.last_name || ''}`.trim();
            els.userName.textContent = fullName;
            els.headerName.textContent = user.first_name;
            els.userId.textContent = `ID: ${user.id}`;
            
            if (user.photo_url) {
                els.photo.src = user.photo_url;
                els.photo.classList.remove('hidden');
                els.defaultAvatar.classList.add('hidden');
            } else {
                els.photo.classList.add('hidden');
                els.defaultAvatar.classList.remove('hidden');
                const initials = (user.first_name.charAt(0) + (user.last_name ? user.last_name.charAt(0) : '')).toUpperCase();
                els.initials.textContent = initials || "U";
            }

            // Addictive Counter Animation
            animateValue(els.balance, 0, 2500, 2500);
        }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                // Elastic easing for addictive feel
                const easeOutElastic = Math.pow(2, -10 * progress) * Math.sin((progress * 10 - 0.75) * (2 * Math.PI) / 3) + 1;
                
                obj.innerHTML = Math.floor(easeOutElastic * (end - start) + start).toLocaleString('en-US');
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        function setupMainButton() {
            tg.MainButton.setText("زيادة الرصيد");
            tg.MainButton.setTextColor("#000000");
            tg.MainButton.setColor("#D4AF37");
            tg.MainButton.show();
            
            tg.MainButton.onClick(() => {
                tg.HapticFeedback.notificationOccurred('success');
                showToast('تمت إضافة مكافأة ذهبية!', 'success');
                
                // Visual explosion effect on balance
                const current = parseInt(els.balance.innerText.replace(/,/g,''));
                animateValue(els.balance, current, current + 500, 1000);
                
                // Trigger confetti or particle effect here if possible
            });
        }

        function copyId() {
            const id = els.userId.textContent.replace('ID: ', '');
            navigator.clipboard.writeText(id).then(() => {
                tg.HapticFeedback.selectionChanged();
                showToast('تم نسخ المعرف بنجاح', 'info');
            });
        }

        function handleAction(type) {
            tg.HapticFeedback.impactOccurred('light');
            if (type === 'refresh') {
                showToast('جاري تحديث البيانات...', 'info');
                setTimeout(() => {
                    showToast('تم التحديث بنجاح', 'success');
                    // Re-animate balance slightly to show change
                    const current = parseInt(els.balance.innerText.replace(/,/g,''));
                    animateValue(els.balance, current, current + 50, 800);
                }, 1000);
            } else if (type === 'support') {
                showToast('جاري الاتصال بالدعم...', 'info');
                setTimeout(() => tg.openLink('https://telegram.org'), 800);
            } else if (type === 'settings') {
                showToast('الإعدادات متاحة قريباً', 'info');
            }
        }

        function confirmLogout() {
            tg.HapticFeedback.notificationOccurred('warning');
            tg.showConfirm("هل أنت متأكد من رغبتك في مغادرة هذا العالم؟", (confirmed) => {
                if (confirmed) {
                    tg.close();
                }
            });
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast pointer-events-auto';
            
            let icon = '<i class="fa-solid fa-circle-info text-gold-400 text-lg"></i>';
            if (type === 'success') icon = '<i class="fa-solid fa-check-circle text-green-500 text-lg animate-bounce"></i>';
            if (type === 'error') icon = '<i class="fa-solid fa-triangle-exclamation text-red-500 text-lg"></i>';

            toast.innerHTML = `${icon}<span class="text-sm font-medium flex-1 text-gray-200">${message}</span>`;
            
            container.appendChild(toast);
            tg.HapticFeedback.impactOccurred('light');

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        init();
    </script>
</body>
</html>
