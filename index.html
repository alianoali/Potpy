<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>البوابة الذهبية | Telegram Gateway</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                        amiri: ['Amiri', 'serif'],
                    },
                    colors: {
                        // Luxury Gold Palette
                        gold: {
                            50: '#FBF8E8',
                            100: '#F5EDC9',
                            200: '#EAD692',
                            300: '#D4AF37', /* Classic Gold */
                            400: '#C5A028',
                            500: '#AA8820',
                            600: '#8A6D18',
                            700: '#6B5514',
                            800: '#594713',
                            900: '#4B3B0A',
                            950: '#2C2205',
                        },
                        // Deep Luxury Black
                        rich: {
                            900: '#020202',
                            800: '#0a0a0a',
                            700: '#111111',
                            card: '#161616',
                        }
                    },
                    animation: {
                        'float': 'float 10s ease-in-out infinite',
                        'float-delayed': 'float 10s ease-in-out 5s infinite',
                        'shine': 'shine 4s linear infinite',
                        'pulse-slow': 'pulse 5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'scale-in': 'scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'spin-slow': 'spin 8s linear infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        shine: {
                            '0%': { backgroundPosition: '-200% center' },
                            '100%': { backgroundPosition: '200% center' }
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(40px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        scaleIn: {
                            '0%': { opacity: '0', transform: 'scale(0.95)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        }
                    },
                    backgroundImage: {
                        // Complex Metallic Gradient
                        'gold-gradient': 'linear-gradient(135deg, #BF953F 0%, #FCF6BA 25%, #B38728 50%, #FBF5B7 75%, #AA771C 100%)',
                        'gold-text': 'linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C)',
                        'dark-gradient': 'radial-gradient(circle at top, #1a1a1a 0%, #000000 100%)',
                        'grid-pattern': "linear-gradient(to right, #ffffff05 1px, transparent 1px), linear-gradient(to bottom, #ffffff05 1px, transparent 1px)"
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --glass-bg: rgba(22, 22, 22, 0.65);
            --glass-border: rgba(212, 175, 55, 0.15);
            --gold-glow: 0 0 30px rgba(212, 175, 55, 0.1);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #020202;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Advanced Gold Text Effect */
        .text-gold {
            background: var(--gold-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200% auto;
            animation: shine 6s linear infinite;
            text-shadow: 0 2px 10px rgba(212, 175, 55, 0.2);
        }

        /* Premium Borders */
        .border-gold-premium {
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: inset 0 0 20px rgba(212, 175, 55, 0.05);
        }

        /* Ultra Glassmorphism */
        .glass-panel {
            background: rgba(22, 22, 22, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
        }

        /* Subtle Shine on Cards */
        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0; left: -50%;
            width: 100%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.03), transparent);
            transform: skewX(-25deg);
            pointer-events: none;
        }

        .glass-card {
            background: linear-gradient(145deg, rgba(30,30,30,0.4) 0%, rgba(10,10,10,0.6) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .glass-card:hover {
            border-color: rgba(212, 175, 55, 0.4);
            transform: translateY(-4px);
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.5), 0 0 15px rgba(212, 175, 55, 0.1);
        }

        .glass-card:active {
            transform: scale(0.98);
        }

        /* Ambient Background */
        .ambient-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
            background: radial-gradient(circle at 50% 50%, #111111 0%, #000000 100%);
        }
        
        /* Grid Overlay */
        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image: var(--grid-pattern);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
            opacity: 0.3;
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            animation: float 15s infinite ease-in-out;
            background: radial-gradient(circle, #D4AF37 0%, transparent 70%);
        }
        .glow-1 { top: -10%; right: -10%; width: 500px; height: 500px; animation-delay: 0s; }
        .glow-2 { bottom: -10%; left: -10%; width: 400px; height: 400px; animation-delay: -5s; background: radial-gradient(circle, #8A6D18 0%, transparent 70%); }
        .glow-3 { top: 40%; left: 40%; width: 300px; height: 300px; animation-delay: -10s; opacity: 0.08; }

        /* Loader */
        .loader-ring {
            width: 70px;
            height: 70px;
            border: 2px solid rgba(212, 175, 55, 0.1);
            border-top-color: #D4AF37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: 90%;
            max-width: 350px;
            pointer-events: none;
        }
        .toast {
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #F9F1D8;
            padding: 16px 20px;
            border-radius: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            animation: slideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            pointer-events: auto;
            backdrop-filter: blur(12px);
            border-left: 4px solid #D4AF37;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .toast.hide { animation: slideUp 0.4s ease forwards; }
        @keyframes slideUp { to { opacity: 0; transform: translateY(-30px); } }

        .hidden-view { display: none !important; }
        .fade-in { animation: scale-in 0.6s ease-out forwards; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #D4AF37; }

        /* Input Focus Glow */
        input:focus, textarea:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
        }
    </style>
</head>

    <script>
        const tg = window.Telegram.WebApp;
        
        // State Management
        const views = {
            loading: document.getElementById('loadingView'),
            denied: document.getElementById('accessDeniedView'),
            dashboard: document.getElementById('dashboardView')
        };

        // Elements
        const els = {
            userName: document.getElementById('userName'),
            headerName: document.getElementById('headerUserName'),
            userId: document.getElementById('userId'),
            photo: document.getElementById('userPhoto'),
            defaultAvatar: document.getElementById('defaultAvatar'),
            initials: document.getElementById('avatarInitials'),
            balance: document.getElementById('userBalance'),
            date: document.getElementById('currentDate'),
        };

        // Initialize with Robust Error Handling
        function init() {
            tg.expand();
            tg.ready();
            
            // Set Date
            const now = new Date();
            els.date.textContent = now.toLocaleDateString('ar-EG', { weekday: 'long', day: 'numeric', month: 'long' });

            // Wait for initData
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                onAuthSuccess(tg.initDataUnsafe.user);
            } else {
                tg.onEvent('ready', () => {
                    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                        onAuthSuccess(tg.initDataUnsafe.user);
                    } else {
                        setTimeout(() => {
                            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                                onAuthSuccess(tg.initDataUnsafe.user);
                            } else {
                                onAuthFailed();
                            }
                        }, 500);
                    }
                });

                // Safety timeout
                setTimeout(() => {
                    if (!views.dashboard.classList.contains('hidden-view') && !views.denied.classList.contains('hidden-view')) {
                        if (!(tg.initDataUnsafe && tg.initDataUnsafe.user)) {
                            onAuthFailed();
                        }
                    }
                }, 4000);
            }
        }

        function onAuthSuccess(user) {
            loadUserData(user);
            switchView('dashboard');
            setupMainButton();
            // Force dark header for luxury feel even if TG theme is light
            try { tg.setHeaderColor('#020202'); } catch(e){}
        }

        function onAuthFailed() {
            switchView('denied');
            try { tg.setHeaderColor('#000000'); } catch(e){}
        }

        function switchView(viewName) {
            Object.values(views).forEach(el => el.classList.add('hidden-view'));
            views[viewName].classList.remove('hidden-view');
            
            if(viewName === 'loading') {
                views.loading.classList.remove('hidden-view');
                views.loading.style.opacity = '1';
            } else {
                views.loading.style.opacity = '0';
                setTimeout(() => views.loading.classList.add('hidden-view'), 700);
            }
        }

        function loadUserData(user) {
            const fullName = `${user.first_name} ${user.last_name || ''}`.trim();
            els.userName.textContent = fullName;
            els.headerName.textContent = user.first_name;
            els.userId.textContent = `ID: ${user.id}`;
            
            // Avatar Logic
            if (user.photo_url) {
                els.photo.src = user.photo_url;
                els.photo.classList.remove('hidden');
                els.defaultAvatar.classList.add('hidden');
            } else {
                els.photo.classList.add('hidden');
                els.defaultAvatar.classList.remove('hidden');
                const initials = (user.first_name.charAt(0) + (user.last_name ? user.last_name.charAt(0) : '')).toUpperCase();
                els.initials.textContent = initials || "U";
            }

            // Animate Balance with Gold Counter
            animateValue(els.balance, 0, 2500, 2000);
        }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                // Easing function for smooth finish
                const easeOutQuart = 1 - Math.pow(1 - progress, 4);
                obj.innerHTML = Math.floor(easeOutQuart * (end - start) + start).toLocaleString('en-US');
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        function setupMainButton() {
            tg.MainButton.setText("تحديث الرصيد");
            tg.MainButton.setTextColor("#000000");
            tg.MainButton.setColor("#D4AF37"); // Gold Color
            tg.MainButton.show();
            
            tg.MainButton.onClick(() => {
                tg.HapticFeedback.notificationOccurred('success');
                showToast('تم مزامنة البيانات بنجاح', 'success');
                animateValue(els.balance, parseInt(els.balance.innerText.replace(/,/g,'')), parseInt(els.balance.innerText.replace(/,/g,'')) + 100, 1000);
            });
        }

        // Utilities
        function copyId() {
            const id = els.userId.textContent.replace('ID: ', '');
            navigator.clipboard.writeText(id).then(() => {
                tg.HapticFeedback.selectionChanged();
                showToast('تم نسخ المعرف ID', 'info');
            });
        }

        function handleAction(type) {
            tg.HapticFeedback.impactOccurred('light');
            if (type === 'refresh') {
                showToast('جارٍ تحديث البيانات...', 'info');
                setTimeout(() => showToast('تم التحديث بنجاح', 'success'), 1000);
            } else if (type === 'support') {
                showToast('جارٍ فتح الدعم...', 'info');
                setTimeout(() => tg.openLink('https://telegram.org'), 800);
            }
        }

        function confirmLogout() {
            tg.HapticFeedback.notificationOccurred('warning');
            tg.showConfirm("هل أنت متأكد من رغبتك في إنهاء الجلسة؟", (confirmed) => {
                if (confirmed) {
                    tg.close();
                }
            });
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            
            let icon = '<i class="fa-solid fa-circle-info text-gold-400 text-lg"></i>';
            if (type === 'success') icon = '<i class="fa-solid fa-check-circle text-green-500 text-lg"></i>';
            if (type === 'error') icon = '<i class="fa-solid fa-triangle-exclamation text-red-500 text-lg"></i>';

            toast.innerHTML = `${icon}<span class="text-sm font-medium flex-1">${message}</span>`;
            
            container.appendChild(toast);
            tg.HapticFeedback.impactOccurred('light');

            setTimeout(() => {
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Start the app
        init();
    </script>
</body>
</html>
