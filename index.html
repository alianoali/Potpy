<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المتجر الذكي - المحفظة والمتجر الرقمي</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts (Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--tg-theme-bg-color, #0f172a);
            color: var(--tg-theme-text-color, #ffffff);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* الخلفية المتحركة */
        .ambient-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }
        
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 10s infinite ease-in-out;
        }
        
        .orb-1 { top: -10%; right: -10%; width: 300px; height: 300px; background: #3b82f6; animation-delay: 0s; }
        .orb-2 { bottom: -10%; left: -10%; width: 250px; height: 250px; background: #8b5cf6; animation-delay: 5s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, 40px); }
        }

        /* Glassmorphism */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(40, 51, 69, 0.8);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Animations */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-enter {
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Loader */
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--tg-theme-button-color, #3b82f6);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 90%;
            max-width: 350px;
            pointer-events: none;
        }

        .toast {
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 12px 20px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: toastSlideUp 0.3s ease, toastFadeOut 0.3s ease 5.7s forwards;
            pointer-events: auto;
            direction: rtl;
            white-space: pre-line;
            line-height: 1.6;
        }

        .toast.success { border-right: 4px solid #10b981; }
        .toast.error { border-right: 4px solid #ef4444; }
        .toast.warning { border-right: 4px solid #f59e0b; }
        .toast.info { border-right: 4px solid #3b82f6; }

        .toast-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .toast.success .toast-icon { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .toast.error .toast-icon { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .toast.warning .toast-icon { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .toast.info .toast-icon { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }

        @keyframes toastSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastFadeOut {
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* أيقونة المحفظة */
        .wallet-icon-large {
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, #3b82f6, #8b5cf6);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.5), 0 0 0 2px rgba(255,255,255,0.1) inset;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: floatWallet 3s infinite ease-in-out;
            position: relative;
            overflow: hidden;
        }

        .wallet-icon-large::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), transparent 70%);
            opacity: 0.6;
        }

        .wallet-icon-large i {
            font-size: 36px;
            color: white;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            animation: pulseIcon 2s infinite ease-in-out;
            position: relative;
            z-index: 2;
        }

        .wallet-icon-large:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.8), 0 0 0 4px rgba(255,255,255,0.2) inset;
        }

        @keyframes floatWallet {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        @keyframes pulseIcon {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* بطاقة الرصيد */
        .balance-badge {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 6px 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 12px;
        }

        .balance-badge i { color: #fbbf24; }

        /* شارة الإشعارات */
        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.2);
            animation: pulse-badge 1.5s infinite;
        }

        @keyframes pulse-badge {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* تنسيقات المتجر */
        .category-tab {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .category-tab:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.3);
        }
        .category-tab.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }

        .product-card {
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .product-card:hover {
            transform: translateY(-2px);
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 10px 20px -10px rgba(59, 130, 246, 0.3);
        }

        /* شريط التمرير المخصص */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }
        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="ambient-light">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Theme Toggle -->
    <div class="theme-toggle" id="themeToggle">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
        <span class="text-sm">السمة</span>
    </div>

    <!-- Main Container -->
    <div id="app" class="w-full max-w-md p-5 relative"></div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Modal Overlay (يستخدم لجميع النوافذ المنبثقة) -->
    <div class="wallet-modal-overlay" id="modalOverlay">
        <div class="wallet-modal" id="modalContent"></div>
    </div>

    <!-- Settings Panel -->
    <div class="settings-overlay" id="settingsOverlay"></div>
    <div class="settings-panel" id="settingsPanel">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-bold">الإعدادات</h3>
            <button id="closeSettings" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
        <div class="space-y-4">
            <div class="flex items-center justify-between">
                <span>اللغة</span>
                <select class="bg-white/10 rounded-lg p-2" id="languageSelect">
                    <option value="ar">العربية</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div class="flex items-center justify-between">
                <span>الإشعارات</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" id="notificationsToggle">
                    <div class="w-11 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600"></div>
                </label>
            </div>
            <div class="flex items-center justify-between">
                <span>تنبيه صوتي</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" id="soundToggle" checked>
                    <div class="w-11 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600"></div>
                </label>
            </div>
            <div class="flex items-center justify-between">
                <span>اهتزاز</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" id="vibrateToggle" checked>
                    <div class="w-11 h-6 bg-gray-600 rounded-full peer peer-checked:bg-blue-600"></div>
                </label>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ======================== الإعدادات الثابتة ========================
            const CONFIG = {
                ADMIN_ID: 7609492965, // غيّر هذا إلى معرف المشرف الخاص بك
                DEFAULT_BALANCE: 1000,
                STORAGE_KEYS: {
                    USERS: 'app_users',
                    WALLET: 'wallet_data',
                    PAYMENT_METHODS: 'payment_methods',
                    DEPOSIT_REQUESTS: 'deposit_requests',
                    WITHDRAWAL_REQUESTS: 'withdrawal_requests',
                    CATEGORIES: 'store_categories',
                    PRODUCTS: 'store_products',
                    ORDERS: 'store_orders',
                    NOTIFICATIONS: 'notifications',
                    THEME: 'theme',
                    SETTINGS: 'settings'
                }
            };

            // ======================== خدمات مساعدة ========================
            class StorageService {
                static get(key, defaultValue = null) {
                    try {
                        const value = localStorage.getItem(key);
                        return value ? JSON.parse(value) : defaultValue;
                    } catch (e) {
                        console.warn(`Storage read error for ${key}:`, e);
                        return defaultValue;
                    }
                }
                static set(key, value) {
                    try {
                        localStorage.setItem(key, JSON.stringify(value));
                        return true;
                    } catch (e) {
                        console.warn(`Storage write error for ${key}:`, e);
                        return false;
                    }
                }
                static remove(key) {
                    localStorage.removeItem(key);
                }
            }

            class IdGenerator {
                static generate(prefix = '') {
                    return prefix + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                }
            }

            class DateUtils {
                static formatDateTime(isoString) {
                    return new Date(isoString).toLocaleString('ar-EG');
                }
            }

            // ======================== نظام التنبيهات ========================
            class ToastManager {
                constructor(containerId) {
                    this.container = document.getElementById(containerId);
                    this.soundEnabled = true;
                    this.vibrateEnabled = true;
                }
                show(message, type = 'info', duration = 5000) {
                    const toast = document.createElement('div');
                    toast.className = `toast ${type}`;
                    const iconMap = {
                        success: 'fa-check', error: 'fa-exclamation', warning: 'fa-triangle-exclamation', info: 'fa-info'
                    };
                    toast.innerHTML = `
                        <div class="toast-icon"><i class="fa-solid ${iconMap[type] || 'fa-info'}"></i></div>
                        <div class="toast-message">${message}</div>
                    `;
                    this.container.appendChild(toast);
                    if (this.soundEnabled && type !== 'error') this.playSound(type);
                    if (this.vibrateEnabled && navigator.vibrate) navigator.vibrate(200);
                    setTimeout(() => toast.remove(), duration);
                }
                playSound(type) {
                    try {
                        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.type = 'sine';
                        osc.frequency.value = type === 'success' ? 800 : 600;
                        gain.gain.value = 0.1;
                        osc.start();
                        osc.stop(audioCtx.currentTime + 0.2);
                    } catch (e) {}
                }
                success(m) { this.show(m, 'success'); }
                error(m) { this.show(m, 'error'); }
                warning(m) { this.show(m, 'warning'); }
                info(m) { this.show(m, 'info'); }
            }

            // ======================== خدمة تيليجرام ========================
            class TelegramService {
                constructor() {
                    this.tg = window.Telegram?.WebApp || null;
                }
                init() {
                    if (!this.tg) return false;
                    this.tg.expand();
                    this.tg.ready();
                    return true;
                }
                getUser() {
                    return this.tg?.initDataUnsafe?.user || null;
                }
                isValid() {
                    return !!this.tg?.initData;
                }
                close() {
                    this.tg?.close();
                }
                showPopup(params) {
                    this.tg?.showPopup(params);
                }
            }

            // ======================== نظام الإشعارات الداخلي ========================
            class NotificationService {
                constructor(state) {
                    this.state = state;
                }
                load() {
                    this.state.notifications = StorageService.get(CONFIG.STORAGE_KEYS.NOTIFICATIONS, []);
                }
                save() {
                    StorageService.set(CONFIG.STORAGE_KEYS.NOTIFICATIONS, this.state.notifications);
                }
                add(userId, title, message, type = 'info') {
                    const notif = {
                        id: IdGenerator.generate('notif_'),
                        userId, title, message, type,
                        read: false,
                        date: new Date().toISOString()
                    };
                    this.state.notifications.push(notif);
                    this.save();
                    window.dispatchEvent(new CustomEvent('newNotification', { detail: notif }));
                    return notif;
                }
                markAsRead(id) {
                    const n = this.state.notifications.find(n => n.id === id);
                    if (n) { n.read = true; this.save(); }
                }
                markAllRead(userId) {
                    this.state.notifications.forEach(n => { if (n.userId === userId) n.read = true; });
                    this.save();
                }
                getUnreadCount(userId) {
                    return this.state.notifications.filter(n => n.userId === userId && !n.read).length;
                }
                getUserNotifications(userId) {
                    return this.state.notifications.filter(n => n.userId === userId).sort((a,b) => new Date(b.date) - new Date(a.date));
                }
            }

            // ======================== الحالة المركزية ========================
            class AppState {
                constructor() {
                    this.user = null;
                    this.isAdmin = false;
                    this.loading = true;
                    this.accessDenied = false;
                    this.telegramMissing = false;
                    this.balance = CONFIG.DEFAULT_BALANCE;
                    this.theme = 'dark';
                    this.settings = { language: 'ar', notifications: true, sound: true, vibrate: true };
                    
                    // بيانات المحفظة
                    this.wallet = { transactions: [], address: 'T9eK3zX8qLp2mN5rV7bA1cD4fG6hJ8kQ' };
                    this.depositRequests = [];
                    this.withdrawalRequests = [];
                    this.paymentMethods = [];
                    
                    // بيانات المتجر
                    this.categories = [];
                    this.products = [];
                    this.orders = [];
                    this.cart = []; // سلة مؤقتة
                    
                    // الإشعارات الداخلية
                    this.notifications = [];
                }
            }

            // ======================== إدارة البيانات ========================
            class DataService {
                constructor(state) {
                    this.state = state;
                    this.notifications = new NotificationService(state);
                    this.loadAll();
                }

                loadAll() {
                    this.loadWallet();
                    this.loadPaymentMethods();
                    this.loadRequests();
                    this.loadCategories();
                    this.loadProducts();
                    this.loadOrders();
                    this.notifications.load();
                }

                // المحفظة
                loadWallet() {
                    const data = StorageService.get(CONFIG.STORAGE_KEYS.WALLET);
                    if (data) {
                        this.state.balance = data.balance || CONFIG.DEFAULT_BALANCE;
                        this.state.wallet.transactions = data.transactions || [];
                        this.state.wallet.address = data.address || this.state.wallet.address;
                    } else {
                        this.state.balance = CONFIG.DEFAULT_BALANCE;
                    }
                }
                saveWallet() {
                    StorageService.set(CONFIG.STORAGE_KEYS.WALLET, {
                        balance: this.state.balance,
                        transactions: this.state.wallet.transactions,
                        address: this.state.wallet.address
                    });
                }
                addTransaction(type, amount, note) {
                    this.state.wallet.transactions.unshift({
                        id: IdGenerator.generate('tx_'),
                        type, amount, note,
                        date: new Date().toISOString()
                    });
                    if (this.state.wallet.transactions.length > 50) this.state.wallet.transactions.pop();
                    this.saveWallet();
                }

                // طرق الدفع
                loadPaymentMethods() {
                    const saved = StorageService.get(CONFIG.STORAGE_KEYS.PAYMENT_METHODS);
                    if (saved && saved.length) {
                        this.state.paymentMethods = saved;
                    } else {
                        this.state.paymentMethods = [
                            { id: IdGenerator.generate('pm_'), name: 'USDT (TRC20)', icon: 'fa-brands fa-tether', description: 'عملة رقمية', depositDetails: 'عنوان: T9eK3zX8qLp2mN5rV7bA1cD4fG6hJ8kQ', withdrawDetails: 'أدخل عنوان USDT' },
                            { id: IdGenerator.generate('pm_'), name: 'Visa / Mastercard', icon: 'fa-regular fa-credit-card', description: 'بطاقة ائتمان', depositDetails: 'رقم البطاقة: **** **** **** 1234', withdrawDetails: 'بيانات البطاقة' },
                            { id: IdGenerator.generate('pm_'), name: 'تحويل بنكي', icon: 'fa-solid fa-building-columns', description: 'حوالة محلية', depositDetails: 'IBAN: SA0380000000608010167519', withdrawDetails: 'أدخل IBAN' }
                        ];
                    }
                }
                savePaymentMethods() {
                    StorageService.set(CONFIG.STORAGE_KEYS.PAYMENT_METHODS, this.state.paymentMethods);
                }
                addPaymentMethod(m) {
                    m.id = IdGenerator.generate('pm_');
                    this.state.paymentMethods.push(m);
                    this.savePaymentMethods();
                }
                updatePaymentMethod(id, data) {
                    const index = this.state.paymentMethods.findIndex(p => p.id === id);
                    if (index !== -1) {
                        this.state.paymentMethods[index] = { ...this.state.paymentMethods[index], ...data };
                        this.savePaymentMethods();
                    }
                }
                deletePaymentMethod(id) {
                    this.state.paymentMethods = this.state.paymentMethods.filter(p => p.id !== id);
                    this.savePaymentMethods();
                }

                // طلبات الإيداع والسحب
                loadRequests() {
                    this.state.depositRequests = StorageService.get(CONFIG.STORAGE_KEYS.DEPOSIT_REQUESTS, []);
                    this.state.withdrawalRequests = StorageService.get(CONFIG.STORAGE_KEYS.WITHDRAWAL_REQUESTS, []);
                }
                saveRequests() {
                    StorageService.set(CONFIG.STORAGE_KEYS.DEPOSIT_REQUESTS, this.state.depositRequests);
                    StorageService.set(CONFIG.STORAGE_KEYS.WITHDRAWAL_REQUESTS, this.state.withdrawalRequests);
                }
                addDepositRequest(amount, methodId, transactionId, user) {
                    const method = this.state.paymentMethods.find(m => m.id === methodId);
                    const req = {
                        id: IdGenerator.generate('dep_'),
                        userId: user.id,
                        userName: `${user.first_name} ${user.last_name || ''}`.trim(),
                        amount, methodId, methodName: method?.name, transactionId,
                        status: 'pending',
                        date: new Date().toISOString()
                    };
                    this.state.depositRequests.push(req);
                    this.saveRequests();
                    window.dispatchEvent(new CustomEvent('newDepositRequest', { detail: req }));
                    return req;
                }
                addWithdrawalRequest(amount, methodId, details, user) {
                    if (amount > this.state.balance) return { success: false, message: 'الرصيد غير كافٍ' };
                    const method = this.state.paymentMethods.find(m => m.id === methodId);
                    const req = {
                        id: IdGenerator.generate('with_'),
                        userId: user.id,
                        userName: `${user.first_name} ${user.last_name || ''}`.trim(),
                        amount, methodId, methodName: method?.name, details,
                        status: 'pending',
                        date: new Date().toISOString()
                    };
                    this.state.withdrawalRequests.push(req);
                    this.saveRequests();
                    window.dispatchEvent(new CustomEvent('newWithdrawalRequest', { detail: req }));
                    return { success: true, request: req };
                }
                acceptRequest(req, type) {
                    if (type === 'deposit') {
                        const r = this.state.depositRequests.find(x => x.id === req.id);
                        if (r && r.status === 'pending') {
                            r.status = 'approved';
                            this.state.balance += r.amount;
                            this.addTransaction('deposit', r.amount, `شحن عبر ${r.methodName}`);
                            this.saveWallet();
                            this.saveRequests();
                            this.notifications.add(r.userId, '✅ تم قبول طلب الشحن', `تم شحن ${r.amount} بنجاح.`, 'success');
                            return true;
                        }
                    } else {
                        const r = this.state.withdrawalRequests.find(x => x.id === req.id);
                        if (r && r.status === 'pending' && this.state.balance >= r.amount) {
                            r.status = 'approved';
                            this.state.balance -= r.amount;
                            this.addTransaction('withdraw', -r.amount, `سحب عبر ${r.methodName}`);
                            this.saveWallet();
                            this.saveRequests();
                            this.notifications.add(r.userId, '✅ تم قبول طلب السحب', `تم سحب ${r.amount}.`, 'success');
                            return true;
                        }
                    }
                    return false;
                }
                rejectRequest(req, type) {
                    if (type === 'deposit') {
                        const r = this.state.depositRequests.find(x => x.id === req.id);
                        if (r) {
                            r.status = 'rejected';
                            this.saveRequests();
                            this.notifications.add(r.userId, '❌ تم رفض طلب الشحن', `رفض طلب بمبلغ ${r.amount}.`, 'error');
                            return true;
                        }
                    } else {
                        const r = this.state.withdrawalRequests.find(x => x.id === req.id);
                        if (r) {
                            r.status = 'rejected';
                            this.saveRequests();
                            this.notifications.add(r.userId, '❌ تم رفض طلب السحب', `رفض طلب بمبلغ ${r.amount}.`, 'error');
                            return true;
                        }
                    }
                    return false;
                }
                getPendingDeposits() { return this.state.depositRequests.filter(r => r.status === 'pending'); }
                getPendingWithdrawals() { return this.state.withdrawalRequests.filter(r => r.status === 'pending'); }
                getPendingCount() { return this.getPendingDeposits().length + this.getPendingWithdrawals().length; }

                createOrder(product, inputData, userId) {
                    const order = {
                        id: IdGenerator.generate('ord_'),
                        userId, productId: product.id, productName: product.name, price: product.price,
                        status: product.fulfillmentData.type === 'manual' ? 'pending' : 'completed',
                        inputData, fulfillment: product.fulfillmentData,
                        date: new Date().toISOString()
                    };
                    this.state.orders.push(order);
                    this.saveOrders();
                    return order;
                }
                getUserOrders(userId) {
                    return this.state.orders.filter(o => o.userId === userId).sort((a,b) => new Date(b.date) - new Date(a.date));
                }
                completeOrder(orderId, fulfillmentDetails) {
                    const order = this.state.orders.find(o => o.id === orderId);
                    if (order && order.status !== 'completed') {
                        order.status = 'completed';
                        if (fulfillmentDetails) order.fulfillment = { ...order.fulfillment, ...fulfillmentDetails };
                        this.saveOrders();
                        this.notifications.add(order.userId, '✅ طلب جاهز', `طلبك "${order.productName}" جاهز. التفاصيل: ${JSON.stringify(order.fulfillment)}`, 'success');

                    return false;
                }

                    window.addEventListener('newNotification', (e) => this.handleNewNotification(e.detail));

                        this.render(); // تحديث واجهة المستخدم لتحديث عداد الإشعارات

                updateAdminBadge() {
                    const count = this.data.getPendingCount();
                    const walletIcon = document.getElementById('walletIconLarge');
                    if (!walletIcon) return;
                    let badge = walletIcon.querySelector('.notification-badge');
                    if (count > 0) {
                        if (!badge) {
                            badge = document.createElement('span');
                            badge.className = 'notification-badge';
                            walletIcon.style.position = 'relative';
                            walletIcon.appendChild(badge);
                        }
                        badge.textContent = count > 9 ? '9+' : count;
                    } else if (badge) {
                        badge.remove();
                    }
                }

                updateNotificationBadge() {
                    const bell = document.getElementById('notificationBell');
                    if (!bell) return;
                    const count = this.data.notifications.getUnreadCount(this.state.user?.id);
                    let badge = bell.querySelector('.notification-badge');
                    if (count > 0) {
                        if (!badge) {
                            badge = document.createElement('span');
                            badge.className = 'notification-badge';
                            bell.style.position = 'relative';
                            bell.appendChild(badge);

                        badge.textContent = count > 9 ? '9+' : count;

                            <input type="text" id="withdrawDetails" placeholder="التفاصيل (مثال: عنوان المحفظة)" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 mb-2">
                            <div class="flex gap-2">
                                <input type="number" id="withdrawAmount" placeholder="المبلغ" class="flex-1 bg-slate-800 border border-white/10 rounded-lg p-2">
                                <button id="withdrawBtn" class="bg-red-600 px-4 rounded-lg">طلب</button>
                            </div>
                        </div>

                        <div id="tab-history" class="tab-pane hidden">
                            <div class="max-h-64 overflow-y-auto">
                                ${txs.length === 0 ? '<p class="text-gray-400 text-center py-4">لا توجد معاملات</p>' : txs.map(tx => `
                                    <div class="flex justify-between items-center py-2 border-b border-white/5">
                                        <div>
                                            <div class="font-medium">${tx.note || tx.type}</div>
                                            <div class="text-xs text-gray-400">${DateUtils.formatDateTime(tx.date)}</div>
                                        </div>
                                        <div class="${tx.amount > 0 ? 'text-green-400' : 'text-red-400'}">${tx.amount > 0 ? '+' : ''}${tx.amount}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }

                bindWalletEvents() {
                    document.querySelectorAll('.close-modal').forEach(btn => {
                        btn.addEventListener('click', () => this.modalOverlay.classList.remove('open'));
                    });
                    this.modalOverlay.addEventListener('click', (e) => {
                        if (e.target === this.modalOverlay) this.modalOverlay.classList.remove('open');
                    });

                    // تبديل التبويبات
                    document.querySelectorAll('.wallet-tab').forEach(tab => {
                        tab.addEventListener('click', () => {
                            document.querySelectorAll('.wallet-tab').forEach(t => t.classList.remove('active', 'bg-blue-600'));
                            tab.classList.add('active', 'bg-blue-600');
                            document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));
                            document.getElementById(`tab-${tab.dataset.tab}`).classList.remove('hidden');
                        });
                    });

                    // اختيار طريقة دفع
                    let selectedMethod = null;
                    document.querySelectorAll('.payment-method').forEach(el => {
                        el.addEventListener('click', () => {
                            document.querySelectorAll('.payment-method').forEach(e => e.classList.remove('border-blue-500', 'bg-blue-500/10'));
                            el.classList.add('border-blue-500', 'bg-blue-500/10');
                            selectedMethod = el.dataset.methodId;
                            const method = this.state.paymentMethods.find(m => m.id === selectedMethod);
                            const detailsDiv = document.getElementById('depositDetails');
                            if (method && method.depositDetails) {
                                detailsDiv.innerHTML = `<strong>تفاصيل الإيداع:</strong><br>${method.depositDetails.replace(/\n/g, '<br>')}`;
                                detailsDiv.classList.remove('hidden');
                            } else {
                                detailsDiv.classList.add('hidden');
                            }
                        });
                    });

                    // إيداع
                    document.getElementById('depositBtn')?.addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('depositAmount').value);
                        const txId = document.getElementById('depositTxId').value.trim();
                        if (!amount || amount <= 0) return this.toast.error('أدخل مبلغاً صحيحاً');
                        if (!selectedMethod) return this.toast.error('اختر طريقة دفع');
                        if (!txId) return this.toast.error('أدخل رقم العملية');
                        const req = this.data.addDepositRequest(amount, selectedMethod, txId, this.state.user);
                        this.toast.success(`تم تقديم طلب الإيداع بنجاح (رقم: ${req.id})`);
                        this.modalOverlay.classList.remove('open');
                    });

                    // سحب
                    document.getElementById('withdrawBtn')?.addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('withdrawAmount').value);
                        const details = document.getElementById('withdrawDetails').value.trim();
                        if (!amount || amount <= 0) return this.toast.error('أدخل مبلغاً صحيحاً');
                        if (!selectedMethod) return this.toast.error('اختر طريقة دفع');
                        if (!details) return this.toast.error('أدخل التفاصيل المطلوبة');
                        const result = this.data.addWithdrawalRequest(amount, selectedMethod, details, this.state.user);
                        if (result.success) {
                            this.toast.success('تم تقديم طلب السحب بنجاح');
                            this.modalOverlay.classList.remove('open');
                        } else {
                            this.toast.error(result.message);
                        }
                    });
                }

                // ========== المتجر ==========
                openStore() {
                    this.modalContent.innerHTML = this.renderStoreModal();
                    this.modalOverlay.classList.add('open');
                    this.bindStoreEvents();
                }

                renderStoreModal() {
                    const categories = this.state.categories;
                    const products = this.state.products;
                    const cart = this.state.cart;

                    const categoriesTabs = categories.map(cat => `
                        <button class="category-tab px-3 py-1 rounded-full text-sm" data-cat-id="${cat.id}">
                            <i class="${cat.icon} ml-1"></i> ${cat.name}
                        </button>
                    `).join('');

                    const productsGrid = products.map(prod => {
                        const inCart = cart.some(item => item.id === prod.id);
                        return `
                            <div class="product-card glass-card p-3 rounded-2xl cursor-pointer" data-prod-id="${prod.id}">
                                <div class="w-full h-20 bg-gradient-to-br from-blue-500/20 to-purple-500/20 rounded-xl flex items-center justify-center mb-2">
                                    <i class="${prod.icon} text-3xl text-blue-400"></i>
                                </div>
                                <h3 class="font-bold text-sm">${prod.name}</h3>
                                <p class="text-xs text-gray-400 mb-2">${prod.description?.substring(0, 25) || ''}...</p>
                                <div class="flex justify-between items-center">
                                    <span class="text-blue-400 font-bold">${prod.price}</span>
                                    <button class="add-to-cart-btn ${inCart ? 'bg-green-600' : 'bg-blue-600'} text-white px-2 py-1 rounded-lg text-xs" data-prod-id="${prod.id}">
                                        ${inCart ? '✓ في السلة' : '➕'}
                                    </button>
                                </div>
                            </div>
                        `;
                    }).join('');

                    const cartTotal = cart.reduce((sum, item) => sum + item.price, 0);
                    const cartItems = cart.map(item => `
                        <div class="flex justify-between items-center text-sm border-b border-white/5 py-2">
                            <span>${item.name}</span>
                            <span>${item.price}</span>
                        </div>
                    `).join('');

                    return `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">🛍️ المتجر الإلكتروني</h2>
                            <button class="close-modal w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="flex gap-2 mb-4">
                            <input type="text" id="storeSearch" placeholder="🔍 بحث..." class="flex-1 bg-slate-800 border border-white/10 rounded-lg p-2 text-sm">
                            <select id="storeCategoryFilter" class="bg-slate-800 border border-white/10 rounded-lg p-2 text-sm">
                                <option value="all">كل الأقسام</option>
                                ${categories.map(cat => `<option value="${cat.id}">${cat.name}</option>`).join('')}
                            </select>
                        </div>

                        <div class="flex flex-wrap gap-2 mb-4 overflow-x-auto pb-2" id="categoryTabs">
                            <button class="category-tab active px-3 py-1 rounded-full text-sm bg-blue-600" data-cat-id="all">الكل</button>
                            ${categoriesTabs}
                        </div>

                        <div class="grid grid-cols-2 gap-3 max-h-80 overflow-y-auto p-1" id="productsGrid">
                            ${productsGrid}
                        </div>

                        <div class="mt-4 glass-card p-3 rounded-2xl">
                            <h3 class="font-bold mb-2 flex items-center gap-2">
                                <i class="fa-solid fa-cart-shopping"></i> السلة
                            </h3>
                            <div id="cartItems" class="max-h-32 overflow-y-auto">
                                ${cartItems || '<p class="text-gray-400 text-xs">السلة فارغة</p>'}
                            </div>
                            <div class="flex justify-between items-center mt-2 pt-2 border-t border-white/10">
                                <span>المجموع:</span>
                                <span class="font-bold text-blue-400" id="cartTotal">${cartTotal}</span>
                            </div>
                            <button id="checkoutBtn" class="w-full mt-3 bg-green-600 py-2 rounded-xl font-bold ${cart.length === 0 ? 'opacity-50' : ''}" ${cart.length === 0 ? 'disabled' : ''}>
                                إتمام الشراء
                            </button>
                        </div>
                    `;
                }

                bindStoreEvents() {
                    document.querySelectorAll('.close-modal').forEach(btn => {
                        btn.addEventListener('click', () => this.modalOverlay.classList.remove('open'));
                    });
                    this.modalOverlay.addEventListener('click', (e) => {
                        if (e.target === this.modalOverlay) this.modalOverlay.classList.remove('open');
                    });

                    // فلترة حسب القسم
                    const filterByCategory = (catId) => {
                        document.querySelectorAll('.product-card').forEach(card => {
                            const prodId = card.dataset.prodId;
                            const product = this.state.products.find(p => p.id === prodId);
                            if (catId === 'all' || product.categoryId === catId) {
                                card.style.display = 'block';
                            } else {
                                card.style.display = 'none';
                            }
                        });
                        // تحديث التبويب النشط
                        document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active', 'bg-blue-600'));
                        document.querySelector(`.category-tab[data-cat-id="${catId}"]`).classList.add('active', 'bg-blue-600');
                    };

                    document.querySelectorAll('.category-tab').forEach(tab => {
                        tab.addEventListener('click', () => filterByCategory(tab.dataset.catId));
                    });

                    document.getElementById('storeCategoryFilter')?.addEventListener('change', (e) => {
                        filterByCategory(e.target.value);
                    });

                    // بحث
                    document.getElementById('storeSearch')?.addEventListener('input', (e) => {
                        const term = e.target.value.toLowerCase();
                        document.querySelectorAll('.product-card').forEach(card => {
                            const prodId = card.dataset.prodId;
                            const product = this.state.products.find(p => p.id === prodId);
                            if (product.name.toLowerCase().includes(term) || product.description?.toLowerCase().includes(term)) {
                                card.style.display = 'block';
                            } else {
                                card.style.display = 'none';
                            }
                        });
                    });

                    // إضافة إلى السلة
                    document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const prodId = btn.dataset.prodId;
                            const product = this.state.products.find(p => p.id === prodId);
                            const index = this.state.cart.findIndex(item => item.id === prodId);
                            if (index === -1) {
                                this.state.cart.push(product);
                                btn.textContent = '✓ في السلة';
                                btn.classList.remove('bg-blue-600');
                                btn.classList.add('bg-green-600');
                            } else {
                                this.state.cart.splice(index, 1);
                                btn.textContent = '➕';
                                btn.classList.remove('bg-green-600');
                                btn.classList.add('bg-blue-600');
                            }
                            // تحديث واجهة السلة
                            this.updateCartUI();
                        });
                    });

                    // فتح تفاصيل المنتج
                    document.querySelectorAll('.product-card').forEach(card => {
                        card.addEventListener('click', (e) => {
                            if (e.target.classList.contains('add-to-cart-btn')) return;
                            const prodId = card.dataset.prodId;
                            this.showProductDetails(prodId);
                        });
                    });

                    // إتمام الشراء
                    document.getElementById('checkoutBtn').addEventListener('click', () => this.checkout());
                }

                updateCartUI() {
                    const cart = this.state.cart;
                    const cartItemsDiv = document.getElementById('cartItems');
                    const cartTotalSpan = document.getElementById('cartTotal');
                    const checkoutBtn = document.getElementById('checkoutBtn');
                    const total = cart.reduce((sum, item) => sum + item.price, 0);
                    cartItemsDiv.innerHTML = cart.length === 0 ? '<p class="text-gray-400 text-xs">السلة فارغة</p>' : cart.map(item => `
                        <div class="flex justify-between items-center text-sm border-b border-white/5 py-2">
                            <span>${item.name}</span>
                            <span>${item.price}</span>
                        </div>
                    `).join('');
                    cartTotalSpan.textContent = total;
                    if (cart.length === 0) {
                        checkoutBtn.disabled = true;
                        checkoutBtn.classList.add('opacity-50');
                    } else {
                        checkoutBtn.disabled = false;
                        checkoutBtn.classList.remove('opacity-50');
                    }
                }

                showProductDetails(prodId) {
                    const product = this.state.products.find(p => p.id === prodId);
                    if (!product) return;

                    const inputFieldsHtml = product.inputFields?.map(field => {
                        if (field.type === 'select') {
                            const options = field.options.map(opt => `<option value="${opt}">${opt}</option>`).join('');
                            return `
                                <div class="mb-3">
                                    <label class="text-sm text-gray-400">${field.label}</label>
                                    <select id="field_${field.name}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                                        ${options}
                                    </select>
                                </div>
                            `;
                        } else {
                            return `
                                <div class="mb-3">
                                    <label class="text-sm text-gray-400">${field.label}</label>
                                    <input type="${field.type}" id="field_${field.name}" placeholder="${field.placeholder || ''}" class="w-full bg-slate-800 border border-white/10 rounded-lg p-2 text-white">
                                </div>
                            `;
                        }
                    }).join('');

                    this.modalContent.innerHTML = `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">${product.name}</h2>
                            <button class="close-modal w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                        <div class="flex justify-center mb-4">
                            <div class="w-24 h-24 rounded-2xl bg-gradient-to-br from-blue-500/20 to-purple-500/20 flex items-center justify-center">
                                <i class="${product.icon} text-4xl text-blue-400"></i>
                            </div>
                        </div>
                        <p class="text-gray-300 text-sm mb-4">${product.description || ''}</p>
                        <div class="glass-card p-4 rounded-2xl mb-4">
                            <div class="text-center mb-2">
                                <span class="text-gray-400">السعر:</span>
                                <span class="text-2xl font-bold text-blue-400">${product.price}</span>
                            </div>
                            <form id="productPurchaseForm">
                                ${inputFieldsHtml}
                                <div class="flex gap-2 mt-4">
                                    <button type="button" id="addToCartFromDetails" class="flex-1 bg-blue-600 py-2 rounded-lg font-bold">➕ أضف للسلة</button>
                                    <button type="submit" class="flex-1 bg-green-600 py-2 rounded-lg font-bold">💳 شراء الآن</button>
                                </div>
                            </form>
                        </div>
                    `;
                    this.modalOverlay.classList.add('open');

                    document.querySelectorAll('.close-modal').forEach(btn => {
                        btn.addEventListener('click', () => this.modalOverlay.classList.remove('open'));
                    });

                    document.getElementById('addToCartFromDetails').addEventListener('click', () => {
                        const inputData = this.collectInputFields(product.inputFields);
                        // إضافة للسلة مع البيانات
                        const cartItem = { ...product, inputData, cartId: IdGenerator.generate('cart_') };
                        this.state.cart.push(cartItem);
                        this.toast.success('تمت الإضافة للسلة');
                        this.modalOverlay.classList.remove('open');
                        this.openStore(); // إعادة فتح المتجر لتحديث السلة
                    });

                    document.getElementById('productPurchaseForm').addEventListener('submit', (e) => {
                        e.preventDefault();
                        const inputData = this.collectInputFields(product.inputFields);
                        this.buyNow(product, inputData);
                    });
                }

                collectInputFields(fields) {
                    const data = {};
                    if (!fields) return data;
                    fields.forEach(field => {
                        const el = document.getElementById(`field_${field.name}`);
                        if (el) data[field.name] = el.value;
                    });
                    return data;
                }

                checkout() {
                    const cart = this.state.cart;
                    const total = cart.reduce((sum, item) => sum + item.price, 0);
                    if (total > this.state.balance) {
                        this.toast.error('الرصيد غير كافٍ');
                        return;
                    }
                    // خصم الرصيد
                    this.state.balance -= total;
                    this.data.saveWallet();

                    // إنشاء الطلبات
                    cart.forEach(item => {
                        const order = this.data.createOrder(item, item.inputData || {}, this.state.user.id);
                        if (item.fulfillmentData.type !== 'manual') {
                            // تسليم فوري
                            this.data.notifications.add(this.state.user.id, '✅ طلب جاهز', `طلبك "${item.name}" جاهز. التفاصيل: ${JSON.stringify(item.fulfillmentData)}`, 'success');
                        } else {
                            this.data.notifications.add(this.state.user.id, '📦 طلب قيد المعالجة', `طلب "${item.name}" قيد المراجعة.`, 'info');
                        }
                    });

                    // تفريغ السلة
                    this.state.cart = [];
                    this.toast.success('تمت عملية الشراء بنجاح! تحقق من الإشعارات.');
                    this.modalOverlay.classList.remove('open');
                }

                buyNow(product, inputData) {
                    const total = product.price;
                    if (total > this.state.balance) {
                        this.toast.error('الرصيد غير كافٍ');
                        return;
                    }
                    this.state.balance -= total;
                    this.data.saveWallet();
                    const order = this.data.createOrder(product, inputData, this.state.user.id);
                    if (product.fulfillmentData.type !== 'manual') {
                        this.data.notifications.add(this.state.user.id, '✅ طلب جاهز', `طلبك "${product.name}" جاهز. التفاصيل: ${JSON.stringify(product.fulfillmentData)}`, 'success');
                    } else {
                        this.data.notifications.add(this.state.user.id, '📦 طلب قيد المعالجة', `طلب "${product.name}" قيد المراجعة.`, 'info');
                    }
                    this.toast.success('تم الشراء بنجاح!');
                    this.modalOverlay.classList.remove('open');
                }

                // ========== طلبات المستخدم ==========
                openOrders() {
                    const orders = this.data.getUserOrders(this.state.user.id);
                    this.modalContent.innerHTML = `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">طلباتي</h2>
                            <button class="close-modal w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                        <div class="max-h-96 overflow-y-auto">
                            ${orders.length === 0 ? '<p class="text-gray-400 text-center py-8">لا توجد طلبات سابقة</p>' : orders.map(o => `
                                <div class="glass-card p-3 rounded-2xl mb-2">
                                    <div class="flex justify-between">
                                        <span class="font-bold">${o.productName}</span>
                                        <span class="text-${o.status === 'completed' ? 'green' : 'yellow'}-400">${o.status === 'completed' ? 'مكتمل' : 'قيد المعالجة'}</span>
                                    </div>
                                    <div class="text-sm text-gray-400">المبلغ: ${o.price}</div>
                                    <div class="text-xs text-gray-500">${DateUtils.formatDateTime(o.date)}</div>
                                    ${o.status === 'completed' ? `<div class="mt-2 text-xs bg-green-500/10 p-2 rounded">📦 ${JSON.stringify(o.fulfillment)}</div>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    `;
                    this.modalOverlay.classList.add('open');
                    document.querySelectorAll('.close-modal').forEach(btn => {
                        btn.addEventListener('click', () => this.modalOverlay.classList.remove('open'));
                    });
                    this.modalOverlay.addEventListener('click', (e) => {
                        if (e.target === this.modalOverlay) this.modalOverlay.classList.remove('open');
                    });
                }

                // ========== لوحة المشرف ==========
                openAdminPanel() {
                    this.modalContent.innerHTML = this.renderAdminPanel();
                    this.modalOverlay.classList.add('open');
                    this.bindAdminEvents();
                }

                renderAdminPanel() {
                    const pendingDeposits = this.data.getPendingDeposits();
                    const pendingWithdrawals = this.data.getPendingWithdrawals();
                    const categories = this.state.categories;
                    const products = this.state.products;

                    return `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">لوحة الإدارة</h2>
                            <button class="close-modal w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <div class="wallet-tabs flex gap-2 mb-4 flex-wrap">
                            <button class="admin-tab active px-4 py-2 rounded-lg bg-blue-600" data-tab="requests">الطلبات</button>
                            <button class="admin-tab px-4 py-2 rounded-lg bg-white/10" data-tab="categories">الأقسام</button>
                            <button class="admin-tab px-4 py-2 rounded-lg bg-white/10" data-tab="products">المنتجات</button>
                            <button class="admin-tab px-4 py-2 rounded-lg bg-white/10" data-tab="payment">طرق الدفع</button>
                        </div>

                        <!-- تبويب الطلبات -->
                        <div id="admin-requests" class="admin-tab-pane">
                            <h3 class="font-bold mb-2">طلبات الإيداع</h3>
                            ${pendingDeposits.length === 0 ? '<p class="text-gray-400 text-sm">لا توجد طلبات إيداع معلقة</p>' : pendingDeposits.map(req => `
                                <div class="request-item bg-white/5 p-3 rounded-xl mb-2">
                                    <div class="flex justify-between">
                                        <span>${req.userName}</span>
                                        <span class="text-yellow-400 text-xs">مبلغ: ${req.amount}</span>
                                    </div>
                                    <div class="text-xs text-gray-400">الطريقة: ${req.methodName}</div>
                                    <div class="text-xs text-gray-400">رقم العملية: ${req.transactionId}</div>
                                    <div class="flex gap-2 mt-2">
                                        <button class="accept-request bg-green-600 text-xs px-3 py-1 rounded-lg" data-id="${req.id}" data-type="deposit">قبول</button>
                                        <button class="reject-request bg-red-600 text-xs px-3 py-1 rounded-lg" data-id="${req.id}" data-type="deposit">رفض</button>
                                    </div>
                                </div>
                            `).join('')}

                            <h3 class="font-bold mt-4 mb-2">طلبات السحب</h3>
                            ${pendingWithdrawals.length === 0 ? '<p class="text-gray-400 text-sm">لا توجد طلبات سحب معلقة</p>' : pendingWithdrawals.map(req => `
                                <div class="request-item bg-white/5 p-3 rounded-xl mb-2">
                                    <div class="flex justify-between">
                                        <span>${req.userName}</span>
                                        <span class="text-yellow-400 text-xs">مبلغ: ${req.amount}</span>
                                    </div>
                                    <div class="text-xs text-gray-400">الطريقة: ${req.methodName}</div>
                                    <div class="text-xs text-gray-400">التفاصيل: ${req.details}</div>
                                    <div class="flex gap-2 mt-2">
                                        <button class="accept-request bg-green-600 text-xs px-3 py-1 rounded-lg" data-id="${req.id}" data-type="withdrawal">قبول</button>

                bindAdminEvents() {
                    document.querySelectorAll('.close-modal').forEach(btn => {
                        btn.addEventListener('click', () => this.modalOverlay.classList.remove('open'));
                    });
                    this.modalOverlay.addEventListener('click', (e) => {
                        if (e.target === this.modalOverlay) this.modalOverlay.classList.remove('open');
                    });

                    // تبديل التبويبات
                    document.querySelectorAll('.admin-tab').forEach(tab => {
                        tab.addEventListener('click', () => {
                            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active', 'bg-blue-600'));
                            tab.classList.add('active', 'bg-blue-600');
                            document.querySelectorAll('.admin-tab-pane').forEach(p => p.classList.add('hidden'));
                            document.getElementById(`admin-${tab.dataset.tab}`).classList.remove('hidden');
                        });
                    });

                    // قبول ورفض الطلبات
                    document.querySelectorAll('.accept-request').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            const type = btn.dataset.type;
                            const req = type === 'deposit' 
                                ? this.state.depositRequests.find(r => r.id === id)
                                : this.state.withdrawalRequests.find(r => r.id === id);
                            if (req) {
                                if (this.data.acceptRequest(req, type)) {
                                    this.toast.success('تم قبول الطلب');
                                    this.openAdminPanel(); // إعادة فتح اللوحة
                                } else {
                                    this.toast.error('فشل قبول الطلب');
                                }
                            }
                        });
                    });

                    document.querySelectorAll('.reject-request').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            const type = btn.dataset.type;
                            const req = type === 'deposit' 
                                ? this.state.depositRequests.find(r => r.id === id)
                                : this.state.withdrawalRequests.find(r => r.id === id);
                            if (req) {
                                this.data.rejectRequest(req, type);
                                this.toast.info('تم رفض الطلب');
                                this.openAdminPanel();
                            }
                        });
                    });

                    // إضافة قسم
                    document.getElementById('addCategoryBtn')?.addEventListener('click', () => {
                        this.showCategoryModal();
                    });

                    // تعديل وحذف الأقسام
                    document.querySelectorAll('.edit-category').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            const cat = this.state.categories.find(c => c.id === id);
                            if (cat) this.showCategoryModal(cat);
                        });
                    });
                    document.querySelectorAll('.delete-category').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            if (confirm('هل أنت متأكد؟')) {
                                this.data.deleteCategory(id);
                                this.toast.success('تم الحذف');
                                this.openAdminPanel();
                            }
                        });
                    });

                    // إضافة منتج
                    document.getElementById('addProductBtn')?.addEventListener('click', () => {
                        this.showProductModal();
                    });

                    document.querySelectorAll('.edit-product').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            const prod = this.state.products.find(p => p.id === id);
                            if (prod) this.showProductModal(prod);
                        });
                    });
                    document.querySelectorAll('.delete-product').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            if (confirm('هل أنت متأكد؟')) {
                                this.data.deleteProduct(id);
                                this.toast.success('تم الحذف');
                                this.openAdminPanel();
                            }
                        });

                    // طرق الدفع
                    document.getElementById('addPaymentBtn')?.addEventListener('click', () => {
                        this.showPaymentMethodModal();
                    });
                    document.querySelectorAll('.edit-payment').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = btn.dataset.id;
                            const pm = this.state.paymentMethods.find(p => p.id === id);
                            if (pm) this.showPaymentMethodModal(pm);
                        });

                    document.querySelectorAll('.delete-payment').forEach(btn => {

                            const id = btn.dataset.id;
                            if (confirm('هل أنت متأكد؟')) {
                                this.data.deletePaymentMethod(id);
                                this.toast.success('تم الحذف');
                                this.openAdminPanel();

            // ======================== التطبيق الرئيسي ========================
            class App {
                constructor() {
                    this.state = new AppState();
                    this.tg = new TelegramService();
                    this.toast = new ToastManager('toastContainer');
                    this.data = new DataService(this.state);
                    this.ui = new UIManager(this.state, this.data, this.tg, this.toast);

                    this.init();
                }

                async init() {
                    if (!this.tg.isAvailable) {
                        this.state.telegramMissing = true;
                        this.state.loading = false;
                        this.ui.render();
                        return;
                    }

                    this.tg.init();

                    if (!this.tg.isValid() || !this.tg.getUser()) {
                        this.state.accessDenied = true;
                        this.state.loading = false;
                        this.ui.render();
                        return;
                    }

                    const user = this.tg.getUser();
                    this.state.user = user;
                    this.state.isAdmin = (user.id === CONFIG.ADMIN_ID);

                    this.data.registerUser(user.id);

                    // تحميل الثيم
                    const savedTheme = StorageService.get(CONFIG.STORAGE_KEYS.THEME, 'dark');
                    this.state.theme = savedTheme;
                    this.applyTheme(savedTheme);

                    // تحميل الإعدادات
                    const settings = StorageService.get(CONFIG.STORAGE_KEYS.SETTINGS, this.state.settings);
                    this.state.settings = settings;
                    this.toast.soundEnabled = settings.sound;
                    this.toast.vibrateEnabled = settings.vibrate;

                    // محاكاة تحميل
                    this.state.loading = true;
                    this.ui.render();
                    await new Promise(r => setTimeout(r, 1000));
                    this.state.loading = false;
                    this.ui.render();

                    this.toast.success(`مرحباً ${user.first_name}!`);
                }

                applyTheme(theme) {
                    const root = document.documentElement;
                    const icon = document.getElementById('themeIcon');
                    if (theme === 'light') {
                        root.style.setProperty('--tg-theme-bg-color', '#f8fafc');
                        root.style.setProperty('--tg-theme-text-color', '#0f172a');
                        icon.className = 'fa-solid fa-sun';
                    } else {
                        root.style.setProperty('--tg-theme-bg-color', '#0f172a');
                        root.style.setProperty('--tg-theme-text-color', '#ffffff');
                        icon.className = 'fa-solid fa-moon';
                    }
                }
            }

            // ======================== بدء التطبيق ========================
            const app = new App();

            // أحداث السمة والإعدادات
            document.getElementById('themeToggle').addEventListener('click', () => {
                const newTheme = app.state.theme === 'dark' ? 'light' : 'dark';
                app.state.theme = newTheme;
                StorageService.set(CONFIG.STORAGE_KEYS.THEME, newTheme);
                app.applyTheme(newTheme);
                app.toast.info(`السمة: ${newTheme === 'dark' ? 'داكنة' : 'فاتحة'}`);
            });

            // إعدادات
            const settingsOverlay = document.getElementById('settingsOverlay');
            const settingsPanel = document.getElementById('settingsPanel');

            document.getElementById('closeSettings').addEventListener('click', () => {
                settingsOverlay.classList.remove('open');
                settingsPanel.classList.remove('open');
            });
            settingsOverlay.addEventListener('click', () => {
                settingsOverlay.classList.remove('open');
                settingsPanel.classList.remove('open');
            });

            document.getElementById('languageSelect').addEventListener('change', (e) => {
                app.state.settings.language = e.target.value;
                StorageService.set(CONFIG.STORAGE_KEYS.SETTINGS, app.state.settings);
                app.toast.success(`اللغة: ${e.target.value === 'ar' ? 'العربية' : 'English'}`);
            });

            document.getElementById('notificationsToggle').addEventListener('change', (e) => {
                app.state.settings.notifications = e.target.checked;
                StorageService.set(CONFIG.STORAGE_KEYS.SETTINGS, app.state.settings);
            });

            document.getElementById('soundToggle').addEventListener('change', (e) => {
                app.state.settings.sound = e.target.checked;
                StorageService.set(CONFIG.STORAGE_KEYS.SETTINGS, app.state.settings);
                app.toast.soundEnabled = e.target.checked;
            });

            document.getElementById('vibrateToggle').addEventListener('change', (e) => {
                app.state.settings.vibrate = e.target.checked;
                StorageService.set(CONFIG.STORAGE_KEYS.SETTINGS, app.state.settings);
                app.toast.vibrateEnabled = e.target.checked;
            });
        })();
    </script>
</body>
</html>
