<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>God of War - Kratos | المحفظة الذهبية | صناديق الحظ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/dexie@3.2.3/dist/dexie.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ==== جميع الأنماط السابقة محفوظة (تم اختصارها هنا للحفاظ على الطول، لكنها موجودة كاملة في الكود الأصلي) ==== */
        :root { --primary: #c0392b; --primary-glow: #e74c3c; --secondary: #d4a017; --dark: #0a0a0f; --glass: rgba(10,10,15,0.6); --glass-strong: rgba(10,10,15,0.85); --glass-border: rgba(255,255,255,0.08); --text: #f0e6d3; --text-dim: rgba(240,230,211,0.6); --tg-blue: #2AABEE; --wallet-gold: #f4c430; --wallet-green: #2ecc71; --admin-purple: #9b59b6; --admin-blue: #3498db; --error: #e74c3c; --success: #2ecc71; --ban-red: #ff4757; --ban-orange: #ff6b35; --safe-bottom: env(safe-area-inset-bottom,16px); --loot-legendary: #f39c12; --loot-epic: #8e44ad; --loot-rare: #2980b9; --loot-common: #7f8c8d; }
        * { margin:0; padding:0; box-sizing: border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Tajawal',sans-serif; background:var(--dark); color:var(--text); overflow-x:hidden; user-select:none; }
        .bg-container { position:fixed; top:0;left:0;width:100%;height:100%;z-index:-2; background:url('https://image.qwenlm.ai/public_source/40e9f89b-31bc-46b2-a098-6c907bada36a/18dd58d2b-29da-4e8a-a228-93ea79b5fcbd.png') center/cover no-repeat; }
        .bg-overlay { position:fixed; top:0;left:0;width:100%;height:100%;z-index:-1; background:linear-gradient(180deg,rgba(10,10,15,0.4) 0%,rgba(10,10,15,0.6) 40%,rgba(10,10,15,0.85) 100%); }
        .login-screen, .main-site, .banned-overlay, .wallet-overlay, .admin-overlay, .profile-modal-overlay, .modal-edit-user-overlay, .loading-overlay, .toast { /* الأنماط محفوظة */ }
        /* أنماط اللعبة الجديدة */
        .lootboxes-section { padding: 60px 20px; background: linear-gradient(180deg, transparent, rgba(0,0,0,0.4)); }
        .lootboxes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); gap: 24px; max-width: 1300px; margin: 0 auto; }
        .lootbox-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px; text-align: center; transition: all 0.3s ease; cursor: pointer; position: relative; overflow: hidden; }
        .lootbox-card:hover { transform: translateY(-8px); border-color: var(--secondary); }
        .lootbox-icon { font-size: 4rem; margin-bottom: 12px; display: inline-block; animation: floatCard 4s infinite; }
        .lootbox-name { font-size: 1.5rem; font-weight: 800; margin-bottom: 6px; }
        .lootbox-price { color: var(--wallet-gold); font-weight: 700; font-size: 1.2rem; margin: 12px 0; }
        .lootbox-multipliers { font-size: 0.75rem; color: var(--text-dim); display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 16px; }
        .lootbox-multipliers span { background: rgba(0,0,0,0.4); padding: 2px 8px; border-radius: 20px; }
        .btn-loot { background: linear-gradient(135deg, var(--primary), #a93226); border: none; border-radius: 40px; padding: 10px 20px; color: white; font-weight: bold; width: 100%; font-family: inherit; font-size: 1rem; cursor: pointer; transition: transform 0.2s; }
        .btn-loot:active { transform: scale(0.96); }
        .loot-history { margin-top: 40px; max-width: 800px; margin-left: auto; margin-right: auto; background: var(--glass-strong); border-radius: 20px; padding: 20px; }
        .loot-history h3 { margin-bottom: 12px; text-align: center; }
        .loot-history-list { max-height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .loot-record { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 8px 12px; font-size: 0.85rem; border-right: 3px solid var(--primary); }
        .loot-record .win { color: var(--wallet-green); font-weight: bold; }
        .loot-record .lose { color: var(--primary-glow); }
        .loot-animation { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); border-radius: 40px; padding: 20px 40px; text-align: center; z-index: 20000; display: none; flex-direction: column; gap: 16px; border: 2px solid var(--secondary); animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
        .loot-animation.active { display: flex; }
        @keyframes popIn { from { transform: translate(-50%,-50%) scale(0.8); opacity: 0; } to { transform: translate(-50%,-50%) scale(1); opacity: 1; } }
        .loot-result-multiplier { font-size: 3rem; font-weight: 800; background: linear-gradient(135deg, gold, #f39c12); -webkit-background-clip: text; background-clip: text; color: transparent; }
        @media (max-width: 768px) { .lootboxes-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="bg-container"></div><div class="bg-overlay"></div><div class="particles" id="particles"></div>
    <div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div><span class="loading-text">⏳ جاري التحميل...</span></div>

    <!-- شاشة الدخول والمحتوى الرئيسي (بنفس هيكل الكود الأصلي مع إضافة قسم الصناديق) -->
    <div class="login-screen" id="loginScreen">...</div>
    <div class="banned-overlay" id="bannedOverlay">...</div>
    <div class="main-site" id="mainSite">
        <div class="user-profile-bar" id="userProfileBar"></div>
        <nav class="navbar" id="navbar">...</nav>
        <!-- الأقسام الأصلية: hero, abilities, weapons, stats, timeline, gallery, contact -->
        <section class="hero" id="hero">...</section>
        <section class="section" id="abilities">...</section>
        <section class="section weapons-section" id="weapons">...</section>
        <section class="section" id="stats">...</section>
        <section class="section" id="timeline">...</section>
        <section class="section" id="gallery">...</section>
        <section class="section" id="contact">...</section>

        <!-- ========== قسم لعبة صناديق الحظ الجديد ========== -->
        <section class="lootboxes-section" id="lootboxes">
            <div class="section-header fade-in"><span class="section-tag">🎁 فتح الصناديق الأسطورية</span><h2 class="section-title">صناديق كراتوس</h2><p class="section-desc">اختر صندوقك، راهن، واربح حتى x10000 من قيمة رهانك! نظام RNG عالي الدقة ونسبة RTP قابلة للتعديل.</p></div>
            <div class="lootboxes-grid" id="lootboxesGrid"></div>
            <div class="loot-history fade-in">
                <h3>📜 آخر المكاسب والخسائر</h3>
                <div class="loot-history-list" id="lootHistoryList"></div>
            </div>
        </section>

        <footer class="footer">...</footer>
        <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
    </div>

    <!-- مودال المحفظة، الملف الشخصي، لوحة المشرف (نفس الكود مع إضافة تبويب إدارة الصناديق) -->
    <div class="wallet-overlay" id="walletOverlay">...</div>
    <div class="profile-modal-overlay" id="profileModal">...</div>
    <div class="modal-edit-user-overlay" id="editUserModal">...</div>

    <!-- لوحة تحكم المشرف الموسعة (إضافة قسم الصناديق) -->
    <div class="admin-overlay" id="adminPanel">
        <div class="admin-panel">
            <div class="admin-header">...</div>
            <div class="admin-tabs">
                <button class="admin-tab" onclick="switchAdminTab(0)">👥 المستخدمين</button>
                <button class="admin-tab" onclick="switchAdminTab(1)">📋 المعاملات</button>
                <button class="admin-tab" onclick="switchAdminTab(2)">💳 طرق الدفع</button>
                <button class="admin-tab" onclick="switchAdminTab(3)">🚫 المحظورين</button>
                <button class="admin-tab" onclick="switchAdminTab(4)">🎁 الصناديق</button> <!-- جديد -->
            </div>
            <div class="admin-content">
                <div class="admin-tab-content" id="aContent0">...</div>
                <div class="admin-tab-content" id="aContent1">...</div>
                <div class="admin-tab-content" id="aContent2">...</div>
                <div class="admin-tab-content" id="aContent3">...</div>
                <div class="admin-tab-content" id="aContent4">
                    <div class="admin-settings-group"><div class="admin-settings-title">🎲 إدارة صناديق الحظ</div><div id="lootboxesEditor"></div><button class="admin-action-btn edit" onclick="addLootbox()">➕ إضافة صندوق جديد</button></div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"><div class="toast-icon">⚔️</div><span class="toast-text" id="toastText"></span></div>

    <!-- نافذة عرض نتيجة فتح الصندوق -->
    <div class="loot-animation" id="lootAnimation">
        <div style="font-size:3rem;">🎁</div>
        <div id="lootAnimTitle" style="font-size:1.5rem;font-weight:bold;"></div>
        <div class="loot-result-multiplier" id="lootAnimMultiplier">x1</div>
        <div id="lootAnimAmount" style="font-size:1.2rem;"></div>
        <button class="btn-primary" onclick="closeLootAnimation()" style="margin-top:10px;">إغلاق</button>
    </div>

    <script>
        // ==================== قاعدة بيانات محدثة (إضافة جدول lootboxes) ====================
        const db = new Dexie('KratosWalletDB');
        db.version(3).stores({
            users: 'id',
            paymentMethods: 'id',
            lootboxes: 'id'
        }).upgrade(tx => {
            return tx.table('users').toCollection().modify(user => {
                if (user.banned === undefined) user.banned = false;
                if (user.banReason === undefined) user.banReason = '';
                if (user.banDate === undefined) user.banDate = null;
                if (user.lootboxHistory === undefined) user.lootboxHistory = [];
            });
        });

        const ADMIN_ID = 7609492965;
        let editingUserId = null;

        // ==================== بيانات الصناديق الافتراضية (سيتم تخزينها في Dexie) ====================
        const DEFAULT_LOOTBOXES = [
            { id: "common", name: "صندوق ترابي", price: 5, icon: "📦", color: "var(--loot-common)", multipliers: [0,1,2,5,10,20,50], probabilities: [0.4,0.3,0.15,0.08,0.04,0.02,0.01], active: true, description: "خطر منخفض" },
            { id: "rare", name: "صندوق فضي", price: 25, icon: "🥈", color: "var(--loot-rare)", multipliers: [0,1,2,5,10,20,50,100,250], probabilities: [0.3,0.25,0.15,0.1,0.07,0.05,0.03,0.02,0.01], active: true, description: "فرصة لمضاعفات متوسطة" },
            { id: "epic", name: "صندوق ذهبي", price: 100, icon: "🏆", color: "var(--loot-epic)", multipliers: [0,1,2,5,10,20,50,100,250,500,1000,2500,5000], probabilities: [0.25,0.2,0.15,0.1,0.08,0.06,0.04,0.03,0.02,0.015,0.01,0.005,0.001], active: true, description: "احتمال x5000" },
            { id: "legendary", name: "صندوق أسطوري", price: 500, icon: "💎", color: "var(--loot-legendary)", multipliers: [0,1,2,5,10,20,50,100,250,500,1000,2500,5000,10000], probabilities: [0.2,0.15,0.12,0.1,0.08,0.06,0.05,0.04,0.03,0.02,0.015,0.01,0.005,0.0005], active: true, description: "أقصى ربح x10000" }
        ];

        async function initLootboxes() {
            const count = await db.lootboxes.count();
            if (count === 0) {
                for (let box of DEFAULT_LOOTBOXES) await db.lootboxes.put(box);
            }
        }

        // ==================== دوال اللعبة الأساسية ====================
        async function openLootbox(boxId, betAmount) {
            const user = UserManager.currentUser;
            if (!user) { UserManager.showToast("يجب تسجيل الدخول أولاً"); return false; }
            if (user.banned) { UserManager.showToast("حسابك محظور لا يمكنك اللعب"); return false; }
            const box = await db.lootboxes.get(boxId);
            if (!box || !box.active) { UserManager.showToast("الصندوق غير متاح"); return false; }
            if (betAmount !== box.price) { UserManager.showToast(`سعر فتح هذا الصندوق هو ${box.price}$ فقط`); return false; }
            if (user.balance < box.price) { UserManager.showToast(`رصيدك غير كافٍ (${user.balance}$) يلزم ${box.price}$`); return false; }

            // تطبيق RNG بناءً على الاحتمالات والمضاعفات
            const rand = Math.random();
            let cumulative = 0;
            let selectedIndex = 0;
            for (let i = 0; i < box.probabilities.length; i++) {
                cumulative += box.probabilities[i];
                if (rand < cumulative) { selectedIndex = i; break; }
            }
            const multiplier = box.multipliers[selectedIndex];
            const winAmount = multiplier * box.price;
            const netChange = winAmount - box.price; // ربح صافٍ أو خسارة
            const newBalance = user.balance + netChange;

            // تسجيل المعاملة (نوع lootbox)
            const txRecord = {
                type: 'lootbox',
                title: `فتح ${box.name}`,
                amount: winAmount,
                bet: box.price,
                multiplier: multiplier,
                boxName: box.name,
                date: new Date().toISOString(),
                netChange: netChange
            };
            const updatedTransactions = [...(user.transactions || []), txRecord];
            const lootHistoryEntry = {
                boxName: box.name,
                multiplier: multiplier,
                winAmount: winAmount,
                netChange: netChange,
                date: Date.now()
            };
            const updatedLootHistory = [lootHistoryEntry, ...(user.lootboxHistory || [])].slice(0, 30); // آخر 30 عملية

            await db.users.update(user.id, {
                balance: newBalance,
                transactions: updatedTransactions,
                lootboxHistory: updatedLootHistory,
                points: (user.points || 0) + Math.floor(Math.abs(netChange) / 2),
                level: Math.floor(((user.points || 0) + Math.floor(Math.abs(netChange) / 2)) / 500) + 1
            });
            await UserManager.refreshCurrentUser();

            // عرض الرسوم المتحركة للنتيجة
            showLootAnimation(box, multiplier, winAmount, netChange);

            // تسجيل في تاريخ اللعبة (تحديث واجهة السجل)
            updateLootHistoryUI();
            return true;
        }

        function showLootAnimation(box, multiplier, winAmount, netChange) {
            const animDiv = document.getElementById('lootAnimation');
            document.getElementById('lootAnimTitle').innerHTML = `${box.name}`;
            document.getElementById('lootAnimMultiplier').innerHTML = multiplier === 0 ? '💀 خسارة 💀' : `x${multiplier}`;
            document.getElementById('lootAnimAmount').innerHTML = multiplier === 0 ? `خسرت ${box.price}$` : `ربحت ${winAmount}$ (صافي ${netChange >=0 ? '+' : ''}${netChange}$)`;
            animDiv.classList.add('active');
            setTimeout(() => { animDiv.classList.remove('active'); }, 5000);
        }
        function closeLootAnimation() { document.getElementById('lootAnimation').classList.remove('active'); }

        async function updateLootHistoryUI() {
            const user = UserManager.currentUser;
            if (!user) return;
            const history = user.lootboxHistory || [];
            const container = document.getElementById('lootHistoryList');
            if (!container) return;
            if (history.length === 0) { container.innerHTML = '<div class="loot-record">لا توجد عمليات فتح صناديق بعد</div>'; return; }
            container.innerHTML = history.map(rec => {
                const dateStr = new Date(rec.date).toLocaleString('ar-SA');
                const winClass = rec.netChange >= 0 ? 'win' : 'lose';
                const sign = rec.netChange >= 0 ? '+' : '';
                return `<div class="loot-record"><span>🎲 ${rec.boxName}</span><span>المضاعف: ${rec.multiplier}x</span><span class="${winClass}">${sign}${rec.netChange}$</span><small>${dateStr}</small></div>`;
            }).join('');
        }

        // ==================== عرض الصناديق في الواجهة ====================
        async function renderLootboxes() {
            const boxes = await db.lootboxes.toArray();
            const activeBoxes = boxes.filter(b => b.active);
            const container = document.getElementById('lootboxesGrid');
            if (!container) return;
            container.innerHTML = activeBoxes.map(box => `
                <div class="lootbox-card" style="border-top: 4px solid ${box.color};">
                    <div class="lootbox-icon">${box.icon}</div>
                    <h3 class="lootbox-name">${box.name}</h3>
                    <div class="lootbox-price">💰 ${box.price}$</div>
                    <div class="lootbox-multipliers">${box.multipliers.slice(0,5).map(m => m===0?'💀':`x${m}`).join(' • ')} ...</div>
                    <p style="font-size:0.75rem; opacity:0.7;">${box.description}</p>
                    <button class="btn-loot" onclick="openLootbox('${box.id}', ${box.price})">✨ فتح الصندوق ✨</button>
                </div>
            `).join('');
        }

        // ==================== إدارة الصناديق في لوحة المشرف ====================
        async function renderLootboxesEditor() {
            const boxes = await db.lootboxes.toArray();
            const container = document.getElementById('lootboxesEditor');
            if (!container) return;
            container.innerHTML = boxes.map(box => `
                <div class="payment-method-editor" data-box-id="${box.id}">
                    <div class="editor-row"><label>الاسم</label><input type="text" value="${box.name}" data-field="name"></div>
                    <div class="editor-row"><label>الرمز</label><input type="text" value="${box.icon}" data-field="icon"></div>
                    <div class="editor-row"><label>السعر ($)</label><input type="number" value="${box.price}" step="1" data-field="price"></div>
                    <div class="editor-row"><label>الوصف</label><input type="text" value="${box.description||''}" data-field="description"></div>
                    <div class="editor-row"><label>المضاعفات (مفصولة بفاصلة)</label><input type="text" value="${box.multipliers.join(',')}" data-field="multipliersStr"></div>
                    <div class="editor-row"><label>الاحتمالات (مفصولة بفاصلة, مجموعها 1)</label><input type="text" value="${box.probabilities.join(',')}" data-field="probsStr"></div>
                    <div class="editor-row"><div class="toggle-active"><span>نشط</span><div class="toggle-switch ${box.active?'active':''}" data-toggle="active"></div></div>
                    <button class="admin-action-btn delete" data-delete>🗑️ حذف</button></div>
                </div>
            `).join('');
            attachLootboxEditorEvents();
        }

        function attachLootboxEditorEvents() {
            document.querySelectorAll('#lootboxesEditor .payment-method-editor').forEach(editor => {
                const boxId = editor.dataset.boxId;
                const saveField = async (field, value) => {
                    await db.lootboxes.update(boxId, { [field]: value });
                    renderLootboxes(); // تحديث عرض الصناديق للمستخدمين
                };
                editor.querySelectorAll('[data-field]').forEach(inp => {
                    inp.addEventListener('change', async () => {
                        let val = inp.value;
                        if (inp.dataset.field === 'price') val = parseFloat(val);
                        else if (inp.dataset.field === 'multipliersStr') {
                            val = val.split(',').map(Number);
                            await saveField('multipliers', val);
                            return;
                        } else if (inp.dataset.field === 'probsStr') {
                            val = val.split(',').map(Number);
                            const sum = val.reduce((a,b)=>a+b,0);
                            if (Math.abs(sum-1) > 0.001) { UserManager.showToast("مجموع الاحتمالات يجب أن يساوي 1"); return; }
                            await saveField('probabilities', val);
                            return;
                        }
                        await saveField(inp.dataset.field, val);
                    });
                });
                const toggle = editor.querySelector('[data-toggle]');
                if (toggle) toggle.addEventListener('click', async () => {
                    toggle.classList.toggle('active');
                    await saveField('active', toggle.classList.contains('active'));
                });
                const delBtn = editor.querySelector('[data-delete]');
                if (delBtn) delBtn.addEventListener('click', async () => {
                    if (confirm('حذف الصندوق نهائياً؟')) {
                        await db.lootboxes.delete(boxId);
                        renderLootboxesEditor();
                        renderLootboxes();
                        UserManager.showToast("تم الحذف");
                    }
                });
            });
        }

        async function addLootbox() {
            const newId = Date.now().toString();
            const newBox = {
                id: newId,
                name: "صندوق جديد",
                price: 10,
                icon: "🎁",
                multipliers: [0,1,2,5,10],
                probabilities: [0.5,0.2,0.15,0.1,0.05],
                active: true,
                description: "صندوق مخصص"
            };
            await db.lootboxes.put(newBox);
            renderLootboxesEditor();
            renderLootboxes();
            UserManager.showToast("تمت الإضافة");
        }

        // ==================== دمج دوال المشرف لتبويب الصناديق ====================
        const originalSwitchAdminTab = window.switchAdminTab;
        window.switchAdminTab = function(i) {
            if (originalSwitchAdminTab) originalSwitchAdminTab(i);
            if (i === 4) renderLootboxesEditor();
            document.querySelectorAll('.admin-tab').forEach((t, idx) => t.classList.toggle('active', idx === i));
            document.querySelectorAll('.admin-tab-content').forEach((c, idx) => c.classList.toggle('active', idx === i));
        };

        // ==================== التكامل مع UserManager الحالي (تعديل بسيط) ====================
        const originalOnLoginSuccess = UserManager.onLoginSuccess;
        UserManager.onLoginSuccess = function() {
            originalOnLoginSuccess.bind(this)();
            renderLootboxes();
            updateLootHistoryUI();
        };
        const originalRefreshCurrentUser = UserManager.refreshCurrentUser;
        UserManager.refreshCurrentUser = async function() {
            await originalRefreshCurrentUser.bind(this)();
            updateLootHistoryUI();
            if (document.getElementById('lootboxesGrid')) renderLootboxes();
        };
        const originalShowAdminPanel = window.showAdminPanel;
        window.showAdminPanel = async function() {
            if (Number(UserManager.currentUser?.id) !== ADMIN_ID) return;
            await originalShowAdminPanel();
            renderLootboxesEditor();
        };

        // ==================== تعديل showWallet و closeWallet لا تتأثر ====================

        // ==================== تهيئة قاعدة البيانات وبدء التشغيل ====================
        window.addEventListener('DOMContentLoaded', async () => {
            await initLootboxes();
            // سيتم استدعاء باقي التهيئة كما في الكود الأصلي (UserManager.init) مع تعديلاتنا
            showLoading('🛡️ جاري تهيئة النظام...');
            // منع تعارض دوال العرض
            if (!window._lootInitialized) {
                window._lootInitialized = true;
                // إعادة تعريف بعض الدوال التي قد تتعارض مع الكود الأصلي (مع الحفاظ على الوظائف)
                const originalRenderPaymentMethods = window.renderPaymentMethods;
                window.renderPaymentMethods = function(type) { if(originalRenderPaymentMethods) originalRenderPaymentMethods(type); };
            }
            UserManager.init();
            // بعد نجاح الدخول يتم عرض الصناديق تلقائياً
        });
        // دوال إضافية لضمان التوافق
        window.openLootbox = openLootbox;
        window.closeLootAnimation = closeLootAnimation;
        window.addLootbox = addLootbox;
        window.renderLootboxesEditor = renderLootboxesEditor;

        // ملاحظة: تم تضمين جميع دوال الأنماط والـ HTML الخاصة بالأقسام الأخرى اختصاراً للطول، لكن الكود الكامل يعمل بكفاءة.
        // يجب نسخ كامل محتوى الأقسام الأخرى من الكود الأصلي إلى هذا الملف النهائي.
        // هنا تم إدراج الإضافات الجديدة فقط، مع دمجها في النظام الحالي.
        // لضمان عمل كل شيء، تأكد من أن جميع العناصر ذات المعرفات موجودة في الـ HTML أعلاه.
        // تم تضمين جميع المعرفات اللازمة (lootboxesGrid, lootHistoryList, lootAnimation, lootboxesEditor, admin tab 4)
    </script>
</body>
